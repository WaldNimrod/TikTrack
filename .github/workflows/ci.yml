name: CI Quality Gate

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'documentation/**'
      - '_COMMUNICATION/**'
      - 'Agents_OS/**'
      - 'blueprints/**'
      - 'raw_inputs/**'
      - '*.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'documentation/**'
      - '_COMMUNICATION/**'
      - 'Agents_OS/**'
      - 'blueprints/**'
      - 'raw_inputs/**'
      - '*.md'

jobs:
  backend-tests:
    name: Backend — Tests & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd api
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt -q
          pip install bandit pip-audit -q

      - name: Unit Tests
        run: |
          source api/venv/bin/activate
          python3 -m pytest tests/unit/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET_KEY: "ci-test-key-must-be-at-least-64-characters-long-for-validation-to-pass-abcdefghijklmnop"
          ENCRYPTION_KEY: "ci-test-encryption-key-32chars-ab"

      - name: Suite B — Cache & Failover
        run: |
          source api/venv/bin/activate
          python3 -m pytest tests/test_external_data_cache_failover_pytest.py -v
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET_KEY: "ci-test-key-must-be-at-least-64-characters-long-for-validation-to-pass-abcdefghijklmnop"
          ENCRYPTION_KEY: "ci-test-encryption-key-32chars-ab"

      - name: Security Scan (bandit)
        run: |
          source api/venv/bin/activate
          bandit -r api/ --exclude api/venv -ll

      - name: Dependency Audit (pip-audit)
        run: |
          source api/venv/bin/activate
          pip-audit --format columns || true
        continue-on-error: true

  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: ./node_modules/.bin/eslint . --ext js,jsx --report-unused-disable-directives || true
        continue-on-error: true

      - name: Vite Build
        run: npx vite build

      - name: npm audit
        run: npm audit || true
        continue-on-error: true
