name: Portfolio Auto Sync

on:
  workflow_dispatch:
    inputs:
      sync_scope:
        description: "Sync scope for GitHub Issues"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - stages
      close_stale:
        description: "Mark non-canon issues as 'ממתין לסיווג' (unclassified) instead of closing"
        required: false
        default: true
        type: boolean
      clean_repo_labels:
        description: "Remove from repo any portfolio-* label not in canon (one-time cleanup)"
        required: false
        default: false
        type: boolean
  push:
    branches: ["**"]
    paths:
      - "documentation/docs-governance/00-INDEX/PORTFOLIO_INDEX.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_MASTER_WSM_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PORTFOLIO_ROADMAP_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PROGRAM_REGISTRY_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_WORK_PACKAGE_REGISTRY_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PORTFOLIO_WSM_SYNC_RULES_v1.0.0.md"
      - "scripts/portfolio/**"
      - ".github/workflows/portfolio-auto-sync.yml"
  pull_request:
    paths:
      - "documentation/docs-governance/00-INDEX/PORTFOLIO_INDEX.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_MASTER_WSM_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PORTFOLIO_ROADMAP_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PROGRAM_REGISTRY_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PHOENIX_WORK_PACKAGE_REGISTRY_v1.0.0.md"
      - "documentation/docs-governance/01-FOUNDATIONS/PORTFOLIO_WSM_SYNC_RULES_v1.0.0.md"
      - "scripts/portfolio/**"
      - ".github/workflows/portfolio-auto-sync.yml"

permissions:
  contents: read
  issues: write

jobs:
  validate_and_snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and validate portfolio snapshot
        run: |
          python scripts/portfolio/build_portfolio_snapshot.py --check \
            --out-json portfolio_project/portfolio_snapshot.json \
            --out-md portfolio_project/portfolio_snapshot.md

      - name: Publish summary
        run: |
          cat portfolio_project/portfolio_snapshot.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-snapshot
          path: |
            portfolio_project/portfolio_snapshot.json
            portfolio_project/portfolio_snapshot.md

  sync_github_issues:
    runs-on: ubuntu-latest
    needs: validate_and_snapshot
    # Run on manual trigger or on push to default branch (main) — roadmap/program/WP sync to GitHub Issues for project view
    if: github.event_name == 'workflow_dispatch' || (github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild snapshot (fresh in this job)
        run: |
          python scripts/portfolio/build_portfolio_snapshot.py --check \
            --out-json portfolio_project/portfolio_snapshot.json \
            --out-md portfolio_project/portfolio_snapshot.md

      - name: Sync portfolio issues (GitHub built-in project feed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          SCOPE="${{ github.event.inputs.sync_scope || 'full' }}"
          CLOSE_STALE="${{ github.event.inputs.close_stale || 'true' }}"
          CLEAN_LABELS="${{ github.event.inputs.clean_repo_labels || 'false' }}"
          CMD="python scripts/portfolio/sync_github_portfolio_issues.py --snapshot portfolio_project/portfolio_snapshot.json --scope $SCOPE"
          if [ "$CLOSE_STALE" = "true" ]; then CMD="$CMD --close-stale"; fi
          if [ "$CLEAN_LABELS" = "true" ]; then CMD="$CMD --clean-repo-labels"; fi
          $CMD
