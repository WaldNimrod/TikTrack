# Sync canonical portfolio tables FROM GitHub Issues (reverse direction).
# Trial mode (2026-03-01): check-only enforcement.
# This workflow may detect drift from Issues, but must not commit/push to main.
# When you update Issues (titles, labels, hierarchy), run this to verify whether
# PHOENIX_PORTFOLIO_ROADMAP / PHOENIX_PROGRAM_REGISTRY / PHOENIX_WORK_PACKAGE_REGISTRY
# require a manual local update.
name: Portfolio Sync From Issues (Trial Check-Only)

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  sync_tables_from_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update tables from GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/portfolio/update_tables_from_github_issues.py

      - name: Fail on reverse-sync drift (trial check-only)
        run: |
          if git diff --quiet -- documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PORTFOLIO_ROADMAP_v1.0.0.md \
            documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PROGRAM_REGISTRY_v1.0.0.md \
            documentation/docs-governance/01-FOUNDATIONS/PHOENIX_WORK_PACKAGE_REGISTRY_v1.0.0.md; then
            echo "No reverse-sync drift detected"
          else
            echo "Reverse-sync drift detected. Trial mode is check-only; run the update locally and push manually."
            git diff -- documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PORTFOLIO_ROADMAP_v1.0.0.md \
              documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PROGRAM_REGISTRY_v1.0.0.md \
              documentation/docs-governance/01-FOUNDATIONS/PHOENIX_WORK_PACKAGE_REGISTRY_v1.0.0.md
            exit 1
          fi
