# Sync canonical portfolio tables FROM GitHub Issues (reverse direction).
# When you update Issues (titles, labels, hierarchy), run this to update
# PHOENIX_PORTFOLIO_ROADMAP, PHOENIX_PROGRAM_REGISTRY, PHOENIX_WORK_PACKAGE_REGISTRY.
name: Portfolio Sync From Issues

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_tables_from_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update tables from GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/portfolio/update_tables_from_github_issues.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PORTFOLIO_ROADMAP_v1.0.0.md \
            documentation/docs-governance/01-FOUNDATIONS/PHOENIX_PROGRAM_REGISTRY_v1.0.0.md \
            documentation/docs-governance/01-FOUNDATIONS/PHOENIX_WORK_PACKAGE_REGISTRY_v1.0.0.md || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(portfolio): sync tables from GitHub Issues"
            git push
          fi
