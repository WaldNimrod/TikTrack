# Phoenix Project - Pre-commit Quality Gate
# See: ARCHITECT_DIRECTIVE_QUALITY_INFRASTRUCTURE_v1.0.0 §6
# PHASE2_PROMOTION: add mypy/ESLint/audit hooks once KB-006/008/009/010-013 cleared

repos:
  # Blocking hooks (all must pass for commit to proceed)
  - repo: local
    hooks:
      - id: phoenix-unit-tests
        name: "Phoenix Unit Tests [BLOCKING on Python changes]"
        entry: bash -c 'git diff --cached --name-only --diff-filter=ACMR | grep -Eq "^(api/.*\.py|tests/.*\.py)$" || exit 0; source api/venv/bin/activate 2>/dev/null || true; DEBUG=false python3 -m pytest tests/unit/ -q --tb=short'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: phoenix-date-lint-staged
        name: "Phoenix Date-Lint (staged governance/communication) [BLOCKING]"
        entry: scripts/lint_governance_dates_staged.sh
        language: system
        pass_filenames: false
        files: '^(_COMMUNICATION/|documentation/docs-governance/).+\.md$'
        stages: [pre-commit]

      - id: phoenix-aos-v3-file-index-auto-update
        name: "AOS v3 FILE_INDEX — auto-stub new files [NON-BLOCKING]"
        entry: python3 scripts/update_aos_v3_file_index.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: false
        types: [python]

      - id: phoenix-aos-v3-file-index-v2-freeze
        name: "AOS v3 — FILE_INDEX + agents_os_v2 FREEZE [BLOCKING when staged]"
        entry: bash scripts/lint_aos_v3_file_index_and_v2_freeze.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: phoenix-process-functional-separation
        name: "Phoenix — Process-Functional Separation Guard"
        language: system
        entry: bash -c 'scripts/lint_process_functional_separation.sh "$@"; ec=$?; if [ "$ec" -eq 2 ]; then exit 0; fi; exit "$ec"' --
        pass_filenames: true
        files: '^_COMMUNICATION/team_(190|90|50|51)/'
        types: [markdown]
        stages: [pre-commit]

      - id: phoenix-bandit-security
        name: "Phoenix Security Scan - Bandit HIGH [BLOCKING]"
        entry: bash -c "source api/venv/bin/activate 2>/dev/null || true; bandit -r api/ --exclude api/venv -lll"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: phoenix-detect-secrets
        name: "Phoenix Secret Scan - detect-secrets [BLOCKING]"
        entry: bash -c "source api/venv/bin/activate 2>/dev/null || true; detect-secrets-hook --baseline .secrets.baseline"
        language: system
        pass_filenames: true
        files: '.*'
        exclude: '^_COMMUNICATION/.*/evidence/runtime/.*\.log$'
        stages: [pre-commit]

      - id: phoenix-frontend-build
        name: "Phoenix Frontend Build [BLOCKING on JS changes]"
        entry: bash -c "cd ui && npx vite build --mode development --outDir /tmp/phoenix-precommit-dist --emptyOutDir"
        language: system
        pass_filenames: false
        files: '^(ui/.*\.(jsx?|css|html|json)|ui/vite\.config\.js|ui/package(-lock)?\.json)$'
        stages: [pre-commit]

      - id: phoenix-black
        name: "Black [BLOCKING on Python changes]"
        entry: bash -c "source api/venv/bin/activate 2>/dev/null || true; black api/ --check"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: phoenix-prettier
        name: "Prettier [BLOCKING on JS/CSS changes]"
        entry: bash -c "cd ui && npx prettier --check ."
        language: system
        pass_filenames: false
        files: '^(ui/.*\.(jsx?|css|html|json))$'
        stages: [pre-commit]

