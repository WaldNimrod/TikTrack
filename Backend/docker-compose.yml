version: '3.8'

services:
  tiktrack-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiktrack_prod}
      POSTGRES_USER: ${POSTGRES_USER:-tiktrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tiktrack} -d ${POSTGRES_DB:-tiktrack_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  tiktrack-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TIKTRACK_ENV=production
      - POSTGRES_HOST=tiktrack-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-tiktrack_prod}
      - POSTGRES_USER=${POSTGRES_USER:-tiktrack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-tiktrack}:${POSTGRES_PASSWORD:-change_me}@tiktrack-postgres:5432/${POSTGRES_DB:-tiktrack_prod}
    volumes:
      - ./logs:/app/logs
    depends_on:
      tiktrack-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tiktrack-frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../trading-ui:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - tiktrack-backend
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  default:
    name: tiktrack-network

