openapi: 3.0.0
info:
  title: TikTrack Project Phoenix - Identity API Schema
  description: |
    Identity & Authentication API Schema for External Audit.
    Extracted from main OpenAPI specification.
  version: 2.54.1

servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

paths:
  /auth/login:
    post:
      summary: User login
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username_or_email, password]
              properties:
                username_or_email:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /auth/register:
    post:
      summary: User registration
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                phone_number:
                  type: string
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
        '409':
          description: User already exists

  /auth/logout:
    post:
      summary: User logout
      tags: [Identity]
      responses:
        '200':
          description: Logout successful

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Identity]
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid refresh token

  /auth/reset-password:
    post:
      summary: Request password reset
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [EMAIL, SMS]
                email:
                  type: string
                  format: email
                phone_number:
                  type: string
      responses:
        '200':
          description: Reset request sent
        '400':
          description: Invalid input

  /auth/verify-reset:
    post:
      summary: Verify and reset password
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                reset_token:
                  type: string
                verification_code:
                  type: string
                new_password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid token/code

  /auth/verify-phone:
    post:
      summary: Verify phone number
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verification_code]
              properties:
                verification_code:
                  type: string
                  pattern: '^[0-9]{6}$'
      responses:
        '200':
          description: Phone verified
        '400':
          description: Invalid code

  /users/me:
    get:
      summary: Get current user identity
      tags: [Identity]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized

    put:
      summary: Update user profile
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /users/me/password:
    put:
      summary: Change password
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password changed
        '400':
          description: Invalid password
        '401':
          description: Unauthorized

components:
  schemas:
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    RegisterResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string

    UserResponse:
      type: object
      properties:
        external_ulids:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: ULID - External identifier
        username:
          type: string
        email_addresses:
          type: string
          format: email
        phone_numbers:
          type: string
          description: Secondary unique identifier
        user_tier_levels:
          type: string
          enum: [Bronze, Silver, Gold, Platinum]
        is_email_verified:
          type: boolean
        is_phone_verified:
          type: boolean

    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
        email_addresses:
          type: string
          format: email
        phone_numbers:
          type: string
