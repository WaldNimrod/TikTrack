<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Phoenix DOM Inspector</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    pre {
      background: #252526;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
    .instructions {
      background: #2d2d30;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      border-left: 4px solid #26baac;
    }
  </style>
</head>
<body>
  <h1>🔍 Phoenix DOM Inspector</h1>
  
  <div class="instructions">
    <h2>שימוש:</h2>
    <ol>
      <li>פתח את העמוד שברצונך לבדוק בדפדפן</li>
      <li>פתח את הקונסולה (F12 > Console)</li>
      <li>העתק והדבק את הקוד מהקופסה למטה</li>
      <li>הקוד יחזיר לך את כל ה-DOM עם כל המחלקות וה-CSS</li>
    </ol>
  </div>

  <h2>📋 הסקריפט:</h2>
  <pre id="script-content"></pre>

  <script>
    // Load the inspector script
    fetch('DOM_INSPECTOR.js')
      .then(r => r.text())
      .then(code => {
        document.getElementById('script-content').textContent = code;
      })
      .catch(() => {
        document.getElementById('script-content').textContent = '⚠️ לא ניתן לטעון את הסקריפט. פתח את DOM_INSPECTOR.js ישירות.';
      });
  </script>
</body>
</html>
