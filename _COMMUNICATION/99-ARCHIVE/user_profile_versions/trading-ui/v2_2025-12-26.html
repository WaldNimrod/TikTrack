<body class="user-profile-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <main class="main-content" data-section="user-profile">

                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h2><img src="/trading-ui/images/icons/tabler/user.svg" width="24" height="24" alt="user" class="icon"> פרופיל משתמש</h2>
                        <div class="section-header-controls">
                            <button data-button-type="EDIT" data-onclick="editProfile()" data-text="ערוך" title="ערוך פרופיל">
                            </button>
                            <button data-button-type="SAVE" data-onclick="saveProfile()" data-text="שמור" title="שמור שינויים">
                            </button>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="content-section" data-section="user-profile-content">
                        <div class="section-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="card">
                                        <div class="card-body text-center">
                                            <div class="mb-3">
                                                <img src="/trading-ui/images/icons/tabler/user.svg" width="80" height="80" alt="User Avatar" class="rounded-circle bg-light p-2">
                                            </div>
                                            <h5 id="userDisplayName">משתמש TikTrack</h5>
                                            <p class="text-muted" id="userEmail">user@tiktrack.com</p>
                                            <span class="badge bg-primary" id="userRole">מנהל</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-8">
                                    <div class="card">
                                        <div class="card-header">
                                            <h6>פרטים אישיים</h6>
                                        </div>
                                        <div class="card-body">
                                            <form id="userProfileForm">
                                                <div class="row">
                                                    <div class="col-md-6">
                                                        <div class="mb-3">
                                                            <label for="firstName" class="form-label">שם פרטי</label>
                                                            <input type="text" class="form-control" id="firstName" value="משתמש">
                                                        </div>
                                                    </div>
                                                    <div class="col-md-6">
                                                        <div class="mb-3">
                                                            <label for="lastName" class="form-label">שם משפחה</label>
                                                            <input type="text" class="form-control" id="lastName" value="TikTrack">
                                                        </div>
                                                    </div>
                                                </div>

                                                <div class="mb-3">
                                                    <label for="email" class="form-label">דואר אלקטרוני</label>
                                                    <input type="email" class="form-control" id="email" value="user@tiktrack.com">
                                                </div>

                                                <div class="mb-3">
                                                    <label for="phone" class="form-label">טלפון</label>
                                                    <input type="tel" class="form-control" id="phone" placeholder="הכנס מספר טלפון">
                                                </div>

                                                <div class="mb-3">
                                                    <label for="timezone" class="form-label">אזור זמן</label>
                                                    <select class="form-select" id="timezone">
                                                        <option value="Asia/Jerusalem" selected>ישראל (Asia/Jerusalem)</option>
                                                        <option value="America/New_York">ניו יורק (America/New_York)</option>
                                                        <option value="Europe/London">לונדון (Europe/London)</option>
                                                    </select>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </main> <!-- .main-content -->
        </div> <!-- .page-body -->
    </div> <!-- .background-wrapper -->

    <script src="scripts/page-initialization-configs.js?v=1.0.0" defer></script> <!-- Page initialization configurations -->

    <!-- Page-specific script -->
    <script>
        // User Profile page functionality
        window.editProfile = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('פרופיל משתמש', 'עריכת פרופיל זמינה בקרוב...', 3000);
            }
        };

        window.saveProfile = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showSuccess('פרופיל משתמש', 'הפרופיל נשמר בהצלחה!', 3000);
            }
        };

        // Load user profile data
        async function loadUserProfile() {
            try {
                // Simulate loading user data
                const userData = {
                    firstName: 'משתמש',
                    lastName: 'TikTrack',
                    email: 'user@tiktrack.com',
                    phone: '',
                    timezone: 'Asia/Jerusalem',
                    role: 'מנהל'
                };

                // Update form fields
                document.getElementById('firstName').value = userData.firstName;
                document.getElementById('lastName').value = userData.lastName;
                document.getElementById('email').value = userData.email;
                document.getElementById('phone').value = userData.phone;
                document.getElementById('timezone').value = userData.timezone;
                document.getElementById('userRole').textContent = userData.role;

                // Update display info
                document.getElementById('userDisplayName').textContent = `${userData.firstName} ${userData.lastName}`;
                document.getElementById('userEmail').textContent = userData.email;

            } catch (error) {
                console.error('Error loading user profile:', error);
                if (window.NotificationSystem) {
                    window.NotificationSystem.showError('שגיאה', 'שגיאה בטעינת פרופיל המשתמש');
                }
            }
        }

        // Auto-initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎯 User Profile page loaded');
            loadUserProfile();
        });
    </script>
  <script src="scripts/color-scheme-system.js?v=1.0.0" defer></script> <!-- Dynamic color system -->
