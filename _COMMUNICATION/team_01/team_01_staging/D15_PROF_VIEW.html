<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרופיל משתמש | TikTrack</title>
  <!-- CSS Loading Order: Pico CSS FIRST, then base, then components, then header -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <link rel="stylesheet" href="./phoenix-base.css">
  <link rel="stylesheet" href="./phoenix-components.css">
  <link rel="stylesheet" href="./phoenix-header.css">
</head>
<body class="system-body context-settings">
    <!-- Unified Header: LOD 400 - Row 1: 98px, Row 2: 60px, Total: 158px, Z-Index: 950 -->
    <header id="unified-header" data-lod-height="158px" data-lod-z-index="950">
        <!-- Row 1: Brand & Primary Nav (98px) -->
        <div class="header-top-bar">
            <div class="container-fluid">
                <div class="header-flex-row">
                    <img src="./images/logo.svg" alt="TikTrack" class="header-logo">
                    <div class="user-zone">
                        <div class="user-info">
                            <span class="u-name">ישראל ישראלי</span>
                            <span class="u-role">אדריכל מערכת</span>
                        </div>
                        <div class="u-avatar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Row 2: Contextual Nav / Actions (60px) -->
        <nav class="header-nav-bar">
            <div class="container-fluid">
                <ul class="nav-main-list">
                    <li class="nav-item active">
                        <a href="#">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                            <span class="nav-txt">בית</span>
                        </a>
                    </li>
                    <li class="nav-item"><a href="#">תיק השקעות</a></li>
                    <li class="nav-item"><a href="#">חשבונות</a></li>
                </ul>
            </div>
        </nav>
    </header>
    
    <section class="sub-header-filter">
        <div class="container-fluid">
            <div class="search-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" class="form-control-sm" placeholder="חיפוש מהיר...">
            </div>
        </div>
    </section>
    
    <!-- Main Content: Settings Context -->
    <main class="viewport-main" data-context="settings">
        <tt-container>
            <div class="page-header-minimal">
                <h1>פרופיל משתמש</h1>
            </div>
            
            <!-- Lego Component Architecture: tt-section-row for grid layout -->
            <tt-section-row>
                <!-- User Settings Section -->
                <tt-section data-title="הגדרות משתמש">
                    <p class="subtitle-sm">ניהול העדפות ומידע אישי.</p>
                    
                    <form>
                        <div class="form-group">
                            <label class="form-label">שם מלא:</label>
                            <input type="text" class="form-control" value="ישראל ישראלי" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">אימייל:</label>
                            <input type="email" class="form-control" value="israel@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">טלפון:</label>
                            <input type="tel" class="form-control" value="050-1234567" placeholder="05x-xxxxxxx" required>
                        </div>
                        <button type="submit" class="btn btn-full">שמור שינויים</button>
                    </form>
                </tt-section>

                <!-- Security Settings Section -->
                <tt-section data-title="אבטחה">
                    <p class="subtitle-sm">ניהול סיסמה והגדרות אבטחה.</p>
                    
                    <form>
                        <div class="form-group">
                            <label class="form-label">סיסמה נוכחית:</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">סיסמה חדשה:</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">אימות סיסמה:</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-full">עדכן סיסמה</button>
                    </form>
                </tt-section>
            </tt-section-row>

            <!-- API Keys Management Section (Full Width) -->
            <tt-section data-title="מפתחות API">
                <p class="subtitle-sm">ניהול מפתחות API לחיבורים חיצוניים.</p>
                
                <div class="action-row-compact">
                    <button type="button" class="btn btn-sm">+ מפתח API חדש</button>
                </div>
                <table class="tiktrack-table-dense">
                    <thead>
                        <tr>
                            <th>ספק</th>
                            <th>תווית</th>
                            <th>סטטוס</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>IBKR</td>
                            <td>Interactive Brokers</td>
                            <td><span style="color: var(--color-brand);">פעיל</span></td>
                            <td>
                                <button type="button" class="btn btn-sm">ערוך</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Polygon.io</td>
                            <td>Polygon - Primary</td>
                            <td><span style="color: var(--color-text-muted);">לא פעיל</span></td>
                            <td>
                                <button type="button" class="btn btn-sm">ערוך</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </tt-section>
        </tt-container>
    </main>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>window.onload=()=>{ if(window.lucide) lucide.createIcons(); };</script>
</body>
</html>
