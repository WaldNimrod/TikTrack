<div class="g-bridge-banner">🛡️ G-BRIDGE | APPROVED | REVIEW READY</div>
  <main id="phoenix-root">
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה - TikTrack</title>
    <link rel="stylesheet" href="./D15_IDENTITY_STYLES.css">
</head>
<body data-page-key="register">
    <div class="login-wrapper" data-lod-verified="true">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <img src="./images/logo.svg" alt="TikTrack Logo" />
                </div>
                <h1 class="login-title">הרשמה</h1>
                <p class="login-subtitle">הצטרפו ל-TikTrack</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">שם משתמש</label>
                    <input type="text" id="username" class="form-control" placeholder="הכנס שם משתמש" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">טלפון</label>
                    <input type="tel" id="phone" class="form-control" placeholder="05x-xxxxxxx">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">אימייל (אופציונלי)</label>
                    <input type="email" id="email" class="form-control" placeholder="הכנס אימייל">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">סיסמה</label>
                    <input type="password" id="password" class="form-control" placeholder="הכנס סיסמה" required>
                </div>

                <button type="submit" class="btn-login" id="registerBtn">
                    הרשמה
                </button>
            </form>

            <div class="login-links">
                <a href="./D15_LOGIN.html">כבר יש לך חשבון? התחבר</a>
            </div>
        </div>
    </div>
</body>
</html>
  </main>
  <script>window.onload=()=>{ if(window.lucide) lucide.createIcons(); };</script>
</body></html>
