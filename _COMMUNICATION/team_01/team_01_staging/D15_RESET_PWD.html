<div class="g-bridge-banner">🛡️ G-BRIDGE | APPROVED | REVIEW READY</div>
  <main id="phoenix-root">
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שחזור סיסמה - TikTrack</title>
    <link rel="stylesheet" href="./D15_IDENTITY_STYLES.css">
</head>
<body data-page-key="forgot_password">
    <div class="auth-card" data-lod-verified="true">
        <div class="login-header-explicit">
            <div class="mb-3">
                <img src="./images/logo.svg" alt="TikTrack Logo" style="height: 52px;">
            </div>
            <h1>שחזור סיסמה</h1>
            <p>הזן את כתובת האימייל שלך ונשלח לך קישור לאיפוס הסיסמה</p>
        </div>

        <form id="forgotPasswordForm" class="text-start">
            <div class="mb-3">
                <label for="email" class="form-label">כתובת אימייל</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn-login" id="submitBtn">
                    שלח קישור איפוס
                </button>
            </div>
        </form>

        <div class="login-links mt-3">
            <a href="./D15_LOGIN.html">חזרה להתחברות</a>
        </div>
    </div>
</body>
</html>
  </main>
  <script>window.onload=()=>{ if(window.lucide) lucide.createIcons(); };</script>
</body></html>
