<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>התחברות | TikTrack Phoenix</title>
  <link rel="stylesheet" href="./D15_IDENTITY_STYLES.css">
</head>
<body class="auth-layout-root">
  <tt-container>
    <tt-section>
      <div class="auth-header">
        <div class="auth-logo">
          <img src="./images/logo.svg" alt="TikTrack Logo" />
        </div>
        <h1 class="auth-title">התחברות</h1>
        <p class="auth-subtitle">ברוכים הבאים ל-TikTrack</p>
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">שם משתמש / אימייל:</label>
          <input type="text" class="form-control" required placeholder="הכנס שם משתמש">
        </div>
        <div class="form-group">
          <label class="form-label">סיסמה:</label>
          <input type="password" class="form-control" required placeholder="הכנס סיסמה">
        </div>
        <div class="form-options">
          <label class="remember-me"><input type="checkbox" class="lod-checkbox"> זכור אותי</label>
          <a href="./D15_RESET_PWD.html" class="auth-link">שכחת סיסמה?</a>
        </div>
        <button type="submit" class="btn-auth-primary">התחבר</button>
      </form>

      <div class="auth-footer-zone">
        <span>אין לך חשבון?</span> <a href="./D15_REGISTER.html" class="auth-link-bold">הרשמה עכשיו</a>
      </div>
    </tt-section>
  </tt-container>
  
  <script>window.onload=()=>{ if(window.lucide) lucide.createIcons(); };</script>
</body>
</html>
