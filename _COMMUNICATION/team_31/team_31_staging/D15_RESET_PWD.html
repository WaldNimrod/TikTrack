<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שחזור סיסמה | TikTrack Phoenix</title>
  <!-- CSS Loading Order: Pico CSS FIRST, then base, then components, then auth-specific -->
  <!-- Note: Auth pages don't use header, so phoenix-header.css is not loaded -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <link rel="stylesheet" href="./phoenix-base.css">
  <link rel="stylesheet" href="./phoenix-components.css">
  <link rel="stylesheet" href="./D15_IDENTITY_STYLES.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* G-Bridge Banner - Fixed position banner for validation status */
    .g-bridge-banner {
      position: fixed;
      top: 0;
      inset-inline-start: 0;
      inset-inline-end: 0;
      background: var(--color-success, #059669);
      color: white;
      padding: 8px 20px;
      font-size: 10px;
      font-weight: 900;
      z-index: 10002;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="auth-layout-root">
  <!--
    Phoenix-Core-Ver: v1.2.1 | Batch 1 - Auth Core (FINAL APPROVED)
    Sync-Time: 2026-01-31 21:30:00 IST
    Team: Team 30 (Frontend) | Team 50 (QA Review)
    Status: ✅ FINALLY APPROVED | ✅ READY FOR DEVELOPMENT | ✅ SIGNED OFF
    Compliance: RTL Charter ✅ | DNA Sync ✅ | LEGO System ✅ | G-Bridge Validated ✅
    Visual Approval: ✅ FINAL APPROVAL GRANTED
  -->
  <div class="g-bridge-banner">🛡️ G-BRIDGE [21:30:00] | ✅ FINALLY APPROVED | ✅ READY FOR DEVELOPMENT | ✅ SIGNED OFF</div>
  
  <tt-container>
    <tt-section>
      <div class="auth-header">
        <div class="auth-logo">
          <img src="./images/logo.svg" alt="TikTrack Logo" />
        </div>
        <p class="auth-subtitle">הזן אימייל או טלפון לקבלת קישור איפוס</p>
        <h1 class="auth-title">שחזור סיסמה</h1>
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">אימייל או טלפון:</label>
          <input type="text" class="form-control" required placeholder="your@email.com או +972-5x-xxxxxxx">
        </div>
        <button type="submit" class="btn-auth-primary">שלח קישור איפוס</button>
      </form>

      <div class="auth-footer-zone">
        <a href="./D15_LOGIN.html" class="auth-link">חזרה להתחברות</a>
      </div>
    </tt-section>
  </tt-container>
  
  <script>window.onload=()=>{ if(window.lucide) lucide.createIcons(); };</script>
</body>
</html>
