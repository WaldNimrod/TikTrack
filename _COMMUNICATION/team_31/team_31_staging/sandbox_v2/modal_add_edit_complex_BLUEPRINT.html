<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מודול הוספה/עריכה מורכב - תזרימי מזומנים | TikTrack Phoenix - Blueprint [v1.0.0]</title>
  <!-- ============================================
       CSS Loading Order (CRITICAL - DO NOT CHANGE)
       ============================================
       Linking to LIVE CSS files in system: ui/src/styles/
       All CSS files are loaded from the actual system files.
       ============================================ -->
  
  <!-- 1. Pico CSS FIRST (Framework) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  
  <!-- 2. Phoenix Base Styles (Global defaults & DNA variables) - LIVE FILE -->
  <link rel="stylesheet" href="../../../../ui/src/styles/phoenix-base.css">
  
  <!-- 3. LEGO Components (Reusable components) - LIVE FILE -->
  <link rel="stylesheet" href="../../../../ui/src/styles/phoenix-components.css">
  
  <!-- 4. Header Component (Unified Header Styles) - LIVE FILE -->
  <link rel="stylesheet" href="../../../../ui/src/styles/phoenix-header.css">
  
  <!-- 5. Page-Specific Styles (Dashboard-specific styles) - LIVE FILE -->
  <link rel="stylesheet" href="../../../../ui/src/styles/D15_DASHBOARD_STYLES.css">
  
  <!-- 6. Modal Styles - LIVE FILE -->
  <link rel="stylesheet" href="../../../../ui/src/styles/phoenix-modal.css">
  
  <style>
    /* ============================================
       BLUEPRINT-SPECIFIC STYLES
       ============================================
       Additional styles for blueprint demonstration
       ============================================ */
    
    /* Page wrapper for blueprint demo */
    body {
      background: var(--apple-bg-secondary, #f5f5f7);
      padding: var(--spacing-lg, 24px);
      min-height: 100vh;
    }
    
    /* Demo trigger button */
    .demo-trigger-btn {
      margin-bottom: var(--spacing-lg, 24px);
      padding: var(--spacing-md, 16px) var(--spacing-lg, 24px);
      background: var(--color-brand, #26baac);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: var(--font-size-base, 0.92rem);
      font-weight: 600;
      cursor: pointer;
    }
    
    .demo-trigger-btn:hover {
      background: var(--color-brand-dark, #1fa89a);
    }
    
    /* Modal size variants */
    .phoenix-modal--large {
      max-width: 800px;
    }
    
    .phoenix-modal--small {
      max-width: 400px;
    }
    
    /* Required field indicator */
    .form-label--required::after {
      content: " *";
      color: var(--color-error-red, #dc2626);
    }
    
    /* Form help text */
    .form-help-text {
      font-size: 0.875rem;
      color: var(--apple-text-secondary, #8e8e93);
      margin-top: var(--spacing-xs, 4px);
    }
    
    /* Form row layout */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-lg, 24px);
    }
    
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    
    /* Error state */
    .form-group--error input,
    .form-group--error select,
    .form-group--error textarea {
      border-color: var(--color-error-red, #dc2626);
    }
    
    /* Hidden elements - replaces inline style */
    .hidden {
      display: none !important;
    }
    
    /* Currency input wrapper */
    .currency-input-wrapper {
      display: flex;
      gap: var(--spacing-xs, 4px);
    }
    
    .currency-input-wrapper input {
      flex: 1;
    }
    
    .currency-select {
      min-width: 80px;
    }
  </style>
</head>
<body>
  
  <!-- ============================================
       DEMO TRIGGER BUTTON
       ============================================
       This button is for blueprint demonstration only
       ============================================ -->
  
  <button class="demo-trigger-btn" data-action="open-modal" data-modal-id="cashFlowModal">
    פתח מודול הוספה/עריכה מורכב - תזרימי מזומנים
  </button>
  
  <!-- ============================================
       MODAL: ADD/EDIT CASH FLOW (D21)
       ============================================
       Example: Cash Flows CRUD Modal (Complex)
       Mode: Add / Edit
       Entity: D21 - Cash Flows
       ============================================ -->
  
  <!-- NOTE: For blueprint demo, modal is shown by default. In production, Team 30 will control visibility -->
  <div class="phoenix-modal-backdrop" id="cashFlowModalBackdrop">
    <div class="phoenix-modal phoenix-modal--large" id="cashFlowModal">
      
      <!-- Modal Header -->
      <div class="phoenix-modal__header">
        <h2 class="phoenix-modal__title" id="cashFlowModalTitle">הוספת תזרים מזומנים</h2>
        <button class="phoenix-modal__close" aria-label="סגור" data-action="close-modal" data-modal-id="cashFlowModal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      
      <!-- Modal Body -->
      <div class="phoenix-modal__body">
        <form id="cashFlowForm" data-entity-type="cash_flow">
          
          <!-- Trading Account -->
          <div class="form-group">
            <label for="tradingAccount" class="form-label form-label--required">חשבון מסחר</label>
            <select 
              id="tradingAccount" 
              name="trading_account_id" 
              class="form-control" 
              required
              data-field="trading_account_id"
            >
              <option value="">בחר חשבון מסחר...</option>
              <option value="01ARZ3NDEKTSV4RRFFQ69G5FAV" selected>חשבון מסחר מרכזי (IBKR)</option>
              <option value="01BRZ4NDEKTSV4RRFFQ69G5FBW">חשבון מסחר משני (TD Ameritrade)</option>
              <option value="01CRZ5NDEKTSV4RRFFQ69G5FCX">חשבון מסחר אופציות (Interactive Brokers)</option>
            </select>
            <div class="form-help-text">בחר את חשבון המסחר אליו שייך התזרים</div>
            <div class="form-error hidden" id="tradingAccountError"></div>
          </div>
          
          <!-- Transaction Date & Flow Type -->
          <div class="form-row">
            <div class="form-group">
              <label for="transactionDate" class="form-label form-label--required">תאריך תזרים</label>
              <input 
                type="date" 
                id="transactionDate" 
                name="transaction_date" 
                class="form-control" 
                required
                data-field="transaction_date"
              >
              <div class="form-error" id="transactionDateError" style="display: none;"></div>
            </div>
            
            <div class="form-group">
              <label for="flowType" class="form-label form-label--required">סוג תזרים</label>
              <select 
                id="flowType" 
                name="flow_type" 
                class="form-control" 
                required
                data-field="flow_type"
              >
                <option value="">בחר סוג תזרים...</option>
                <option value="DEPOSIT">הפקדה (DEPOSIT)</option>
                <option value="WITHDRAWAL">משיכה (WITHDRAWAL)</option>
                <option value="DIVIDEND">דיבידנד (DIVIDEND)</option>
                <option value="INTEREST">ריבית (INTEREST)</option>
                <option value="FEE">עמלה (FEE)</option>
                <option value="OTHER">אחר (OTHER)</option>
              </select>
              <div class="form-error" id="flowTypeError" style="display: none;"></div>
            </div>
          </div>
          
          <!-- Amount & Currency -->
          <div class="form-row">
            <div class="form-group">
              <label for="amount" class="form-label form-label--required">סכום</label>
              <div class="currency-input-wrapper">
                <input 
                  type="number" 
                  id="amount" 
                  name="amount" 
                  class="form-control" 
                  placeholder="0.00"
                  step="0.01"
                  required
                  data-field="amount"
                >
                <select 
                  id="currency" 
                  name="currency" 
                  class="form-control currency-select" 
                  required
                  data-field="currency"
                >
                  <option value="USD" selected>USD</option>
                  <option value="EUR">EUR</option>
                  <option value="ILS">ILS</option>
                  <option value="GBP">GBP</option>
                </select>
              </div>
              <div class="form-help-text">הזן את הסכום והמטבע</div>
              <div class="form-error" id="amountError" style="display: none;"></div>
            </div>
            
            <div class="form-group">
              <label for="subtype" class="form-label">תת-סוג (אופציונלי)</label>
              <select 
                id="subtype" 
                name="subtype" 
                class="form-control" 
                data-field="subtype"
              >
                <option value="">בחר תת-סוג...</option>
                <option value="BANK_TRANSFER">העברה בנקאית</option>
                <option value="WIRE_TRANSFER">העברה בנקאית בינלאומית</option>
                <option value="CREDIT_CARD">כרטיס אשראי</option>
                <option value="CHECK">צ'ק</option>
                <option value="OTHER">אחר</option>
              </select>
              <div class="form-help-text">תת-סוג של התזרים (אופציונלי)</div>
            </div>
          </div>
          
          <!-- Status -->
          <div class="form-group">
            <label for="status" class="form-label">סטטוס (אופציונלי)</label>
            <select 
              id="status" 
              name="status" 
              class="form-control" 
              data-field="status"
            >
              <option value="">בחר סטטוס...</option>
              <option value="VERIFIED" selected>מאומת (VERIFIED)</option>
              <option value="PENDING">ממתין לאימות (PENDING)</option>
              <option value="REJECTED">נדחה (REJECTED)</option>
            </select>
            <div class="form-help-text">סטטוס התזרים (אופציונלי)</div>
          </div>
          
          <!-- Description -->
          <div class="form-group">
            <label for="description" class="form-label">תיאור (אופציונלי)</label>
            <textarea 
              id="description" 
              name="description" 
              class="form-control" 
              rows="3"
              placeholder="הזן תיאור לתזרים..."
              data-field="description"
            ></textarea>
            <div class="form-help-text">תיאור נוסף של התזרים (אופציונלי)</div>
          </div>
          
          <!-- External Reference -->
          <div class="form-group">
            <label for="externalReference" class="form-label">התייחסות חיצונית (אופציונלי)</label>
            <input 
              type="text" 
              id="externalReference" 
              name="external_reference" 
              class="form-control" 
              placeholder="לדוגמה: BANK_TXN_12345"
              maxlength="100"
              data-field="external_reference"
            >
            <div class="form-help-text">מספר התייחסות ממערכת חיצונית (אופציונלי, עד 100 תווים)</div>
          </div>
          
        </form>
      </div>
      
      <!-- Modal Footer -->
      <div class="phoenix-modal__footer">
        <button type="button" class="phoenix-modal__cancel-btn" data-action="close-modal" data-modal-id="cashFlowModal">
          ביטול
        </button>
        <button type="button" class="phoenix-modal__save-btn" data-action="save-cash-flow" data-form-id="cashFlowForm">
          שמור
        </button>
      </div>
      
    </div>
  </div>
  
  <!-- ============================================
       NOTE: Modal Logic
       ============================================
       CRITICAL FOR TEAM 30: Modal opening/closing logic must be implemented
       using external JavaScript. Use data-action attributes for event handlers.
       
       Modal should be opened by setting backdrop display to 'flex'
       Modal should be closed by setting backdrop display to 'none'
       ============================================ -->
  
</body>
</html>
