    :root {
      --bg: #0f1419;

      --text: #e8eef5;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --border: #2a3548;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", "Noto Sans Hebrew", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .lead { color: var(--muted); margin: 0; font-size: 0.95rem; }
    .lead code { background: var(--card); padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.85em; }
    .grid {
      display: grid;
      gap: 2rem;
    }
    figure {
      margin: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    figcaption {
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--border);
    }
    figcaption .num { color: var(--muted); font-size: 0.8rem; }
    figcaption h2 { margin: 0.25rem 0 0.35rem; font-size: 1.05rem; }
    .meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }
    .meta strong { color: #b8c9dc; }
    figure a.mock {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
    }
    figure a.mock:hover { text-decoration: underline; }
    figure img {
      width: 100%;
      height: auto;
      vertical-align: middle;
      display: block;
      background: #000;
    }
  </style>
</head>
