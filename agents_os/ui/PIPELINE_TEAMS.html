<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
  (function(){document.documentElement.classList.add("theme-tiktrack");})();
  </script>
  <title>Agents OS — Team Management</title>
  <link rel="stylesheet" href="css/pipeline-shared.css?v=4" />
  <link rel="stylesheet" href="css/pipeline-teams.css?v=4" />
</head>
<body>

<!-- ── Logo + Title (above nav) ── -->
<header class="agents-header">
  <div class="agents-header-left">
    <h1 class="agents-header-title">👥 Agents OS — <span>Team Management</span></h1>
    <span class="agents-refresh-label">Identity reinforcement · Onboarding · Governance prompts</span>
  </div>
  <div class="agents-header-right">
    <span class="agents-refresh-label agents-header-sub" id="header-sub">← Select a team</span>
    <button class="btn agents-refresh-btn btn-primary" onclick="loadState()">↺ Refresh State</button>
  </div>
</header>

<nav class="pipeline-nav">
  <a class="nav-link" href="PIPELINE_DASHBOARD.html">📊 Dashboard</a>
  <span class="nav-sep"></span>
  <a class="nav-link" href="PIPELINE_ROADMAP.html">🗺️ Roadmap</a>
  <span class="nav-sep"></span>
  <a class="nav-link active" href="PIPELINE_TEAMS.html">👥 Teams</a>
</nav>

<div class="teams-layout">

  <!-- ── Left: Team List ── -->
  <div class="team-list">
    <div class="agents-domain-bar agents-domain-bar--sidebar agents-domain-bar--no-domain">
      <button class="btn btn-primary" onclick="loadState()">↺ Refresh State</button>
    </div>
    <!-- SA-01: Dual-domain rows — WP/Gate per domain with provenance badge -->
    <div class="teams-domain-rows" id="teams-domain-rows">
      <div class="teams-domain-row" data-testid="teams-domain-row-tiktrack" id="teams-domain-row-tiktrack">
        <span class="teams-domain-name">TikTrack</span>
        <span data-testid="teams-provenance-badge" class="teams-provenance-badge">[domain_file]</span>
        <span class="teams-domain-wp">—</span>
        <span class="teams-domain-gate">—</span>
      </div>
      <div class="teams-domain-row" data-testid="teams-domain-row-agents_os" id="teams-domain-row-agents_os">
        <span class="teams-domain-name">Agents_OS</span>
        <span data-testid="teams-provenance-badge" class="teams-provenance-badge">[domain_file]</span>
        <span class="teams-domain-wp">—</span>
        <span class="teams-domain-gate">—</span>
      </div>
    </div>
    <div class="team-list-header">Teams (from Roster Lock)</div>
    <div id="team-list-content">
      <div style="padding:14px;font-size:11px;color:var(--text-muted)">Loading…</div>
    </div>
  </div>

  <!-- ── Right: Team Detail + Prompt Generator ── -->
  <div class="team-panel" id="team-panel">
    <div class="team-panel-empty">← Select a team to generate prompts</div>
  </div>

</div>

<script src="js/pipeline-config.js?v=4"></script>
<script src="js/pipeline-state.js?v=4"></script>
<script src="js/pipeline-dom.js?v=4"></script>
<script src="js/pipeline-teams.js?v=5"></script>
</body>
</html>
