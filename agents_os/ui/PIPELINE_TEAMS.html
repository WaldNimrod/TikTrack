<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents OS — Team Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0d1117;  --surface:    #161b22;  --surface2:   #1c2128;
      --border:     #30363d;  --text:       #c9d1d9;  --text-muted: #8b949e;
      --accent:     #58a6ff;  --success:    #3fb950;  --warning:    #d29922;
      --danger:     #f85149;  --current:    #1f6feb;
      --mono:       'SF Mono', 'Fira Code', monospace;
    }
    body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; font-size:14px; min-height:100vh; }

    /* ── Top nav ── */
    .pipeline-nav { background:var(--surface2); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:4px; height:36px; position:sticky; top:0; z-index:110; }
    .nav-link { color:var(--text-muted); text-decoration:none; font-size:12px; padding:6px 12px; border-radius:4px; transition:background 0.12s,color 0.12s; display:flex; align-items:center; gap:5px; }
    .nav-link:hover { background:rgba(88,166,255,0.08); color:var(--accent); }
    .nav-link.active { background:rgba(31,111,235,0.18); color:var(--accent); font-weight:600; }
    .nav-sep { width:1px; height:18px; background:var(--border); margin:0 4px; }

    /* ── Header ── */
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; }
    header h1 { font-size:15px; font-weight:600; }
    header h1 span { color:var(--accent); }
    .header-meta { color:var(--text-muted); font-size:12px; margin-top:2px; }
    .header-right { display:flex; gap:8px; align-items:center; }

    /* ── Buttons ── */
    button.btn, a.btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; transition:border-color 0.15s; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
    button.btn:hover, a.btn:hover { border-color:var(--accent); color:var(--accent); }
    .btn-primary { background:var(--current) !important; border-color:var(--current) !important; color:#fff !important; }
    .btn-primary:hover { background:#388bfd !important; }
    .copy-flash { border-color:var(--success) !important; color:var(--success) !important; }

    /* ── Layout ── */
    .layout { display:grid; grid-template-columns:220px 1fr; height:calc(100vh - 88px); overflow:hidden; }

    /* ── Team list (left) ── */
    .team-list { border-right:1px solid var(--border); overflow-y:auto; background:var(--surface); }
    .team-list-header { padding:12px 14px; font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); border-bottom:1px solid var(--border); font-weight:600; }
    .team-item { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; border-bottom:1px solid rgba(48,54,61,0.5); transition:background 0.12s; }
    .team-item:hover { background:rgba(88,166,255,0.06); }
    .team-item.active { background:rgba(31,111,235,0.14); border-left:3px solid var(--accent); }
    .team-badge { font-size:10px; font-weight:700; font-family:var(--mono); color:var(--accent); min-width:52px; }
    .team-item-name { font-size:12px; flex:1; }
    .team-engine-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .dot-cursor  { background:#f0883e; }
    .dot-codex   { background:var(--success); }
    .dot-human   { background:var(--warning); }
    .dot-auto    { background:var(--text-muted); }

    /* ── Main panel (right) ── */
    .team-panel { overflow-y:auto; padding:20px; }
    .team-panel-empty { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:13px; }

    /* ── Team detail header ── */
    .team-header-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-bottom:16px; }
    .team-header-card h2 { font-size:16px; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
    .team-id-badge { font-family:var(--mono); font-size:13px; color:var(--accent); font-weight:700; background:rgba(88,166,255,0.1); border:1px solid rgba(88,166,255,0.3); border-radius:6px; padding:2px 10px; }
    .team-role-text { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
    .team-meta-row { display:flex; gap:20px; flex-wrap:wrap; margin-top:8px; }
    .team-meta-item { font-size:11px; }
    .team-meta-lbl { color:var(--text-muted); }
    .team-meta-val { color:var(--text); font-weight:500; }
    .team-resp-list { margin-top:10px; font-size:11px; color:var(--text-muted); }
    .team-resp-list li { margin-left:14px; margin-bottom:2px; }

    /* ── Prompt type tabs ── */
    .prompt-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .prompt-tab { padding:6px 14px; border-radius:6px; border:1px solid var(--border); cursor:pointer; font-size:12px; color:var(--text-muted); background:var(--surface); transition:all 0.12s; }
    .prompt-tab:hover { border-color:var(--accent); color:var(--accent); }
    .prompt-tab.active { background:rgba(31,111,235,0.2); border-color:var(--accent); color:var(--accent); font-weight:600; }

    /* ── Prompt output ── */
    .prompt-output-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .prompt-output-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--surface2); }
    .prompt-output-title { font-size:12px; font-weight:600; color:var(--text-muted); }
    .prompt-output-actions { display:flex; gap:6px; }
    .prompt-output-pre { font-family:var(--mono); font-size:11px; line-height:1.6; padding:14px 16px; white-space:pre-wrap; word-break:break-word; max-height:55vh; overflow-y:auto; color:var(--text); }
    .prompt-state-badge { font-size:10px; color:var(--text-muted); padding:2px 8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; }

    /* ── Section card ── */
    .section-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:14px; }
    .section-title { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px; }

    /* ── Domain badges ── */
    .domain-badge { font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; flex-shrink:0; }
    .domain-tiktrack { background:rgba(88,166,255,0.15); color:#58a6ff; border:1px solid rgba(88,166,255,0.3); }
    .domain-agents_os { background:rgba(63,185,80,0.15); color:#3fb950; border:1px solid rgba(63,185,80,0.3); }
    .domain-multi { background:rgba(139,148,158,0.15); color:#8b949e; border:1px solid rgba(139,148,158,0.3); }

    /* ── Misc ── */
    .loading { color:var(--text-muted); font-style:italic; font-size:12px; }
    .state-strip { font-size:11px; color:var(--text-muted); padding:6px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; margin-bottom:14px; display:flex; gap:14px; flex-wrap:wrap; }
    .state-strip strong { color:var(--text); }

    /* ── Prompt validation panel ── */
    .pv-panel { background:rgba(248,81,73,0.06); border:1px solid rgba(248,81,73,0.35); border-radius:8px; padding:14px 16px; margin-bottom:12px; }
    .pv-title { font-size:12px; font-weight:700; color:var(--danger); margin-bottom:8px; }
    .pv-desc { font-size:11px; color:var(--text-muted); margin-bottom:12px; line-height:1.5; }
    .pv-field { margin-bottom:10px; }
    .pv-field label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:4px; font-weight:600; }
    .pv-field input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:5px; font-size:12px; font-family:var(--mono); outline:none; }
    .pv-field input:focus { border-color:var(--accent); }
    .pv-field input.pv-ok { border-color:var(--success); }
    .pv-actions { display:flex; gap:8px; margin-top:12px; }
    .pv-hint { font-size:10px; color:var(--text-muted); margin-top:6px; }
    .pv-warn { background:rgba(210,153,34,0.07); border:1px solid rgba(210,153,34,0.3); border-radius:6px; padding:6px 10px; font-size:10px; color:var(--warning); margin-top:8px; }
  </style>
</head>

// ── Prompt type definitions ────────────────────────────────────────────────

    id: "reset",

];

// ── State ──────────────────────────────────────────────────────────────────
let pipelineState = null;
let selectedTeam  = null;
let selectedPromptType = "reset";

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function loadState() {
  try {
    const r = await fetch("_COMMUNICATION/agents_os/pipeline_state.json?t=" + Date.now());
    if (r.ok) {
      pipelineState = await r.json();
      document.getElementById("state-bar").style.display = "flex";
      document.getElementById("sb-wp").textContent    = pipelineState.work_package_id || "—";
      document.getElementById("sb-gate").textContent  = pipelineState.current_gate    || "—";
      document.getElementById("sb-stage").textContent = pipelineState.stage_id         || "—";
    }
  } catch(e) {
    /* state unavailable — prompts still work without it */
  }
  if (selectedTeam) renderTeamPanel(selectedTeam);
}

// ── Engine dot ────────────────────────────────────────────────────────────
function engineDotClass(engine) {
  if (engine === "cursor")  return "dot-cursor";
  if (engine === "codex")   return "dot-codex";
  if (engine === "human")   return "dot-human";
  return "dot-auto";
}

// ── Domain badge ──────────────────────────────────────────────────────────
function domainBadgeHtml(domain, short=false) {
  const labels = { tiktrack: short ? "TT" : "tiktrack", agents_os: short ? "AOS" : "agents_os", multi: short ? "✦" : "multi" };
  const cls    = { tiktrack: "tiktrack", agents_os: "agents_os", multi: "multi" };
  const label  = labels[domain] || domain;
  const c      = cls[domain]    || "multi";
  return `<span class="domain-badge domain-${c}" title="${domain}">${label}</span>`;
}

// ── Build team list ────────────────────────────────────────────────────────
function buildTeamList() {
  const el = document.getElementById("team-list-content");
  el.innerHTML = TEAMS.map(t => `
    <div class="team-item" id="tli-${t.id}" onclick="selectTeam('${t.id}')">
      <span class="team-engine-dot ${engineDotClass(t.engine)}" title="${t.engine}"></span>
      <span class="team-badge">${t.label}</span>
      <span class="team-item-name">${t.name}</span>
      ${t.domain ? domainBadgeHtml(t.domain, true) : ''}
    </div>`).join("");
}

// ── Select team ────────────────────────────────────────────────────────────
function selectTeam(teamId) {
  _ctxOverride = {};  // Clear manual overrides when switching team
  selectedTeam = TEAMS.find(t => t.id === teamId);
  document.querySelectorAll(".team-item").forEach(el => el.classList.remove("active"));
  const li = document.getElementById(`tli-${teamId}`);
  if (li) li.classList.add("active");
  renderTeamPanel(selectedTeam);
}

// ── Render team panel ──────────────────────────────────────────────────────

  if (!team) return;

  const engineColors = { cursor:"#f0883e", codex:"var(--success)", human:"var(--warning)", auto:"var(--text-muted)" };

    ? `WP: ${pipelineState.work_package_id || '—'} · Gate: ${pipelineState.current_gate || '—'} · Stage: ${pipelineState.stage_id || '—'}`
    : "Pipeline state not loaded";

  panel.innerHTML = `
    <!-- State strip -->
    <div class="state-strip" id="state-bar">
      <span>⚡ Active pipeline: <strong id="sb-wp">${escHtml(pipelineState?.work_package_id||'—')}</strong></span>
      <span>Gate: <strong id="sb-gate">${escHtml(pipelineState?.current_gate||'—')}</strong></span>
      <span>Stage: <strong id="sb-stage">${escHtml(pipelineState?.stage_id||'—')}</strong></span>
      <span style="color:var(--text-muted);font-size:10px">← prompts are dynamically generated with this context</span>
    </div>

    <!-- Team header card -->
    <div class="team-header-card">
      <h2>
        <span class="team-id-badge">${escHtml(team.label)}</span>
        ${escHtml(team.name)}
        <span style="font-size:10px;color:${eColor};padding:2px 8px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid ${eColor}">${escHtml(team.engine)}</span>
      </h2>
      <div class="team-role-text">${escHtml(team.role)}</div>
      <div class="team-meta-row">
        <span class="team-meta-item"><span class="team-meta-lbl">Writes to: </span><span class="team-meta-val" style="font-family:var(--mono);font-size:10px">${team.writesTo.join(', ')}</span></span>
        <span class="team-meta-item"><span class="team-meta-lbl">Governed by: </span><span class="team-meta-val">${team.governedBy.join(' · ')}</span></span>
        ${team.domain ? `<span class="team-meta-item"><span class="team-meta-lbl">Domain: </span>${domainBadgeHtml(team.domain)}</span>` : ''}
      </div>
      <div class="team-resp-list">
        <ul>${team.responsibilities.map(r => `<li>${escHtml(r)}</li>`).join("")}</ul>
      </div>
      ${team.isoRules && team.isoRules.length ? `
      <div style="margin-top:10px;padding:8px 10px;background:rgba(248,81,73,0.07);border:1px solid rgba(248,81,73,0.25);border-radius:6px">
        <div style="font-size:10px;font-weight:700;color:var(--danger);margin-bottom:4px">⚠ Iron Rules for this team</div>
        <ul style="list-style:disc;padding-left:14px">
          ${team.isoRules.map(r => `<li style="font-size:11px;color:var(--text-muted);margin-bottom:2px">${escHtml(r)}</li>`).join("")}
        </ul>
      </div>` : ""}
    </div>

    <!-- Prompt type tabs -->
    <div class="prompt-tabs">
      ${PROMPT_TYPES.map(pt => `
        <button class="prompt-tab${selectedPromptType===pt.id?' active':''}"
                onclick="selectPromptType('${pt.id}')"
                title="${escHtml(pt.desc)}">
          ${escHtml(pt.label)}
        </button>`).join("")}
    </div>

    <!-- Prompt output -->
    <div class="prompt-output-card">
      <div class="prompt-output-header">
        <span class="prompt-output-title" id="pt-title">${escHtml(PROMPT_TYPES.find(p=>p.id===selectedPromptType)?.label||'')}</span>
        <div class="prompt-output-actions">
          <span class="prompt-state-badge" id="pt-badge">${escHtml(team.label)}</span>
          <button class="btn" onclick="copyPrompt()" id="copy-btn">📋 Copy to clipboard</button>
        </div>
      </div>
      <pre class="prompt-output-pre" id="prompt-output">Generating…</pre>
    </div>
  `;

  renderPrompt();
}

// ── Select prompt type ─────────────────────────────────────────────────────
function selectPromptType(typeId) {
  _ctxOverride = {};  // Clear manual overrides when switching type
  selectedPromptType = typeId;
  document.querySelectorAll(".prompt-tab").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".prompt-tab").forEach(el => {
    if (el.textContent.trim() === (PROMPT_TYPES.find(p=>p.id===typeId)?.label||'').trim()) {
      el.classList.add("active");
    }
  });
  const ptTitle = document.getElementById("pt-title");
  if (ptTitle) ptTitle.textContent = PROMPT_TYPES.find(p=>p.id===typeId)?.label || '';
  renderPrompt();
}

// ── System context state (overrides if user manually fills validation form) ─
let _ctxOverride = {};  // { wp, gate, stage } — set by validation form

function _resolveCtx() {
  const today = new Date().toISOString().split("T")[0];
  const wp    = _ctxOverride.wp    ?? pipelineState?.work_package_id ?? null;
  const gate  = _ctxOverride.gate  ?? pipelineState?.current_gate    ?? null;
  const stage = _ctxOverride.stage ?? pipelineState?.stage_id         ?? null;
  return { today, wp, gate, stage };
}

function _missingSystemVars() {
  // Returns array of { key, label } for any system variable that is null/undefined
  const ctx = _resolveCtx();
  const missing = [];
  if (!ctx.wp)    missing.push({ key:"wp",    label:"Work Package ID",  placeholder:"e.g. S001-P002-WP001" });
  if (!ctx.gate)  missing.push({ key:"gate",  label:"Current Gate",     placeholder:"e.g. GATE_5" });
  if (!ctx.stage) missing.push({ key:"stage", label:"Stage ID",         placeholder:"e.g. S001" });
  return missing;
}

// ── Generate prompt text ───────────────────────────────────────────────────
function buildPrompt(team, typeId) {
  const ctx   = _resolveCtx();
  const today = ctx.today;
  const wp    = ctx.wp    || "—";
  const gate  = ctx.gate  || "—";
  const stage = ctx.stage || "—";
  const resp  = team.responsibilities.map(r => `  - ${r}`).join("\n");
  const irons = (team.isoRules||[]).map(r => `  - ${r}`).join("\n");
  const writes = team.writesTo.join(", ");
  const domain = team.domain || "—";

  switch (typeId) {

    case "reset":
      return `╔══════════════════════════════════════════════════════════════╗
║  FULL RESET — ${(team.label + " — " + team.name).padEnd(46)} ║
╚══════════════════════════════════════════════════════════════╝

You are starting a new session as ${team.label} — ${team.name}.

## Identity

**Team:** ${team.label}
**Name:** ${team.name}
**Engine:** ${team.engine}
**Domain:** ${domain}
**Role:** ${team.role}

## Responsibilities

${resp}

## Writing Authority

You write ONLY to:
  ${writes}

You do NOT modify SSM, WSM, canonical governance docs, or other teams' folders.

## Iron Rules (mandatory — non-negotiable)

${irons || "  - Follow SSM v1.0.0 and canonical governance at all times"}
  - Identity header mandatory on ALL outputs
  - Do NOT drift into other teams' roles or responsibilities
  - Governed by: ${team.governedBy.join(", ")}

## Current Pipeline Context

WP:    ${wp}
Gate:  ${gate}
Stage: ${stage}
Date:  ${today}

## Task

[Paste your specific task for this session here]

---
Locked. ${team.label} (${team.name}) context adopted.`;

    case "reinforce":
      return `╔══════════════════════════════════════════════════════════════╗
║  IDENTITY REINFORCEMENT — ${(team.label + " — " + team.name).padEnd(33)} ║
╚══════════════════════════════════════════════════════════════╝

REMINDER: You are ${team.label} — ${team.name}.

Role: ${team.role}

You are currently working on:
  WP:   ${wp}
  Gate: ${gate}

Do NOT drift into other teams' roles.
Do NOT modify files outside your writing authority.
Writing authority: ${writes}

Iron Rules for this session:
${irons || "  - Follow SSM v1.0.0 and canonical governance at all times"}

Your task is the one we were just working on — continue without deviation.
Do NOT re-initialize. Do NOT re-introduce yourself. Just continue the work.`;

    case "handoff":
      return `╔══════════════════════════════════════════════════════════════╗
║  HANDOFF / ONBOARD — ${(team.label + " — " + team.name).padEnd(38)} ║
╚══════════════════════════════════════════════════════════════╝

You are ${team.label} — ${team.name}.
Role: ${team.role}
Engine: ${team.engine}
Domain: ${domain}

## Context from prior session

WP:    ${wp}
Gate:  ${gate}
Stage: ${stage}
Date:  ${today}

## Prior session summary

[Paste the summary from the previous session here]

## What was completed

[List artifacts produced / tasks completed]

## What remains

[List what still needs to be done in this session]

## Your task for this session

[Describe the specific next action]

## Authority and constraints

You write ONLY to: ${writes}
Iron Rules: ${(team.isoRules||[]).join(" | ") || "SSM v1.0.0"}

---
Locked. ${team.label} (${team.name}) context adopted. Continuing prior work.`;

    case "governance":
      return `╔══════════════════════════════════════════════════════════════╗
║  GOVERNANCE REMINDER — ${(team.label + " — " + team.name).padEnd(36)} ║
╚══════════════════════════════════════════════════════════════╝

${team.label} — ${team.name} — governance compliance check.

## SSM / Iron Rules (mandatory — cannot be overridden)

  - maskedLog mandatory on ALL server-side logging
  - NUMERIC(20,8) for all financial / monetary data
  - 4-state status model everywhere: pending / active / inactive / cancelled
  - collapsible-container Iron Rule: ALL pages use this template
  - Rich text: ONE unified rich-text object (no per-entity customization)
  - Do NOT modify SSM, WSM, canonical governance docs
  - Do NOT modify other teams' folders

## This team's specific iron rules

${irons || "  - Follow SSM v1.0.0 and canonical governance at all times"}

## Current state

WP:    ${wp}
Gate:  ${gate}
Stage: ${stage}

## Writing authority

You write ONLY to: ${writes}

If you are about to write to a path NOT in your writing authority → STOP and ask Team 00.

---
Governance reminder delivered. ${team.label} context locked.`;

    default:
      return `[Unknown prompt type: ${typeId}]`;
  }
}

// ── Validation panel ────────────────────────────────────────────────────────
function _showValidationPanel(missing) {
  const out = document.getElementById("prompt-output");
  if (!out) return;

  // Intentional user-fill placeholders in these types (not system vars)
  const intentionalTypes = new Set(["reset","handoff"]);
  const hasIntentional = intentionalTypes.has(selectedPromptType);

  const fields = missing.map(f => `
    <div class="pv-field">
      <label>${escHtml(f.label)} <span style="color:var(--danger)">*</span></label>
      <input type="text" id="pvi-${f.key}" placeholder="${escHtml(f.placeholder)}"
             value="${escHtml(_ctxOverride[f.key]||'')}"
             oninput="document.getElementById('pvi-${f.key}').classList.toggle('pv-ok', this.value.trim().length>0)">
    </div>`).join("");

  const warnBlock = hasIntentional
    ? `<div class="pv-warn">ℹ️  Note: This prompt type (<strong>${escHtml(selectedPromptType)}</strong>) also contains intentional placeholders like <code>[Paste summary here]</code> — those are meant for you to fill in after copying.</div>`
    : "";

  out.innerHTML = `
    <div class="pv-panel">
      <div class="pv-title">⛔ Pipeline state not loaded — system variables missing</div>
      <div class="pv-desc">
        The following variables are required to generate this prompt but could not be read from
        <code>pipeline_state.json</code>. Enter them manually to generate the prompt, or
        refresh state and try again.
      </div>
      ${fields}
      <div class="pv-actions">
        <button class="btn btn-primary" onclick="_applyManualCtx()">✅ Generate prompt</button>
        <button class="btn" onclick="_clearValidation()">✕ Cancel</button>
        <button class="btn" onclick="loadState().then(renderPrompt)" style="margin-left:auto">↺ Reload state</button>
      </div>
      ${warnBlock}
      <div class="pv-hint">
        These values are used only for this prompt and not saved anywhere.
        Missing: ${missing.map(f => f.label).join(", ")}.
      </div>
    </div>`;
}

function _applyManualCtx() {
  const missing = _missingSystemVars();
  const newOverrides = {};
  let allFilled = true;
  for (const f of missing) {
    const val = (document.getElementById(`pvi-${f.key}`)?.value || "").trim();
    if (!val) { allFilled = false; continue; }
    newOverrides[f.key] = val;
  }
  if (!allFilled) {
    // Highlight empty fields
    for (const f of missing) {
      const el = document.getElementById(`pvi-${f.key}`);
      if (el && !el.value.trim()) el.style.borderColor = "var(--danger)";
    }
    return;
  }
  _ctxOverride = { ..._ctxOverride, ...newOverrides };
  renderPrompt();
}

function _clearValidation() {
  _ctxOverride = {};
  const out = document.getElementById("prompt-output");
  if (out) out.innerHTML = "<em style='color:var(--text-muted);font-size:12px'>Prompt generation cancelled. Load pipeline state and try again.</em>";
}

function renderPrompt() {
  const out = document.getElementById("prompt-output");
  if (!out || !selectedTeam) return;

  // Validate system variables — these MUST be resolved before showing the prompt
  const missing = _missingSystemVars();
  if (missing.length > 0) {
    _showValidationPanel(missing);
    return;
  }

  // All system vars resolved — generate the prompt
  out.textContent = buildPrompt(selectedTeam, selectedPromptType);
}

function copyPrompt() {
  const out = document.getElementById("prompt-output");
  const btn = document.getElementById("copy-btn");
  if (!out || !btn) return;
  const text = out.textContent || out.innerText || "";
  if (!text || text.startsWith("⛔") || text.includes("pv-panel")) {
    alert("Cannot copy — prompt has unresolved system variables. Fill in the required fields first.");
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("copy-flash");
    const orig = btn.textContent;
    btn.textContent = "✓ Copied!";
    setTimeout(() => { btn.classList.remove("copy-flash"); btn.textContent = orig; }, 1800);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
buildTeamList();
loadState();
</script>
