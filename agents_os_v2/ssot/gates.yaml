  # ⚠️ LEGACY — GATE_6/7/8 are NOT active pipeline gates (2026-03-24).
  # Active pipeline: GATE_0 through GATE_5 only. Aliases retained for old-state compat only.
  # GATE_6 = organizational admin action (not a pipeline gate). GATE_7/8 = historical drift.
  GATE_6: GATE_4
  WAITING_GATE6_APPROVAL: GATE_4
  GATE_7: GATE_4
  GATE_8: GATE_5
