    GATE_0: awareness_only
    GATE_1: awareness_only
    GATE_2: delegated_to_team_100_for_aos__team_00_approval_for_tiktrack
    GATE_6: delegated_to_team_100_for_aos__team_00_approval_for_tiktrack
    GATE_7: personal_approval_required__nimrod_browser_signoff__cannot_delegate
