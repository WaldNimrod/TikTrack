team_00:
  id: team_00
  label: Team 00
  name: System Designer (Principal / human operator)
  engine: human
  domain_scope: multi
  in_gate_process: 1
  group: leadership
  profession: principal
  operating_mode: GATE
  roster_version: "1.6.0"
  created_at: "2026-03-26T00:00:00Z"
  parent_team_id: null
  role_description: "Dual-nature authority: (A) Product Principal — defines WHAT and WHY, gives requirements, sets vision; (B) Constitutional Architect — sets all Iron Rules, holds final approval. Nimrod is the single human operator. The Claude Code session is the architectural advisory instrument."
