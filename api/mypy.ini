[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
exclude = venv|__pycache__

[mypy-api.models.*]
ignore_errors = False

[mypy-api.services.*]
ignore_errors = False

[mypy-api.schemas.*]
ignore_errors = False
