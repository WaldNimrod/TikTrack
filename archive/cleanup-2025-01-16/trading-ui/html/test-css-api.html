<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת CSS API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=2fba6e8_20251013_051239" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>בדיקת CSS API</h1>
        
        <div class="row">
            <div class="col-md-6">
                <button class="btn btn-primary" onclick="testFilesAPI()">בדיקת API קבצים</button>
                <div id="filesResult" class="mt-3"></div>
            </div>
            
            <div class="col-md-6">
                <button class="btn btn-secondary" onclick="testContentAPI()">בדיקת API תוכן</button>
                <div id="contentResult" class="mt-3"></div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <button class="btn btn-success" onclick="testDuplicatesAPI()">בדיקת API כפילויות</button>
                <div id="duplicatesResult" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        async function testFilesAPI() {
            const result = document.getElementById('filesResult');
            result.innerHTML = '<div class="spinner-border" role="status"></div> טוען...';
            
            try {
                const response = await fetch('/api/css/files');
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✅ הצלחה!</strong><br>
                            נמצאו ${data.count} קבצי CSS<br>
                            <small>קבצים ראשונים: ${data.files.slice(0, 5).join(', ')}...</small>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${data.message}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
        
        async function testContentAPI() {
            const result = document.getElementById('contentResult');
            result.innerHTML = '<div class="spinner-border" role="status"></div> טוען...';
            
            try {
                const response = await fetch('/api/css/content?file=styles-new/06-components/_buttons-advanced.css');
                const data = await response.json();
                
                if (data.success) {
                    const contentPreview = data.content.substring(0, 200) + '...';
                    result.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✅ הצלחה!</strong><br>
                            קובץ: ${data.file}<br>
                            <small>תוכן ראשוני: ${contentPreview}</small>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${data.message}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
        
        async function testDuplicatesAPI() {
            const result = document.getElementById('duplicatesResult');
            result.innerHTML = '<div class="spinner-border" role="status"></div> טוען...';
            
            try {
                // בדיקה פשוטה - נטען כמה קבצים ונחפש כפילויות
                const filesResponse = await fetch('/api/css/files');
                const filesData = await filesResponse.json();
                
                if (!filesData.success) {
                    result.innerHTML = `<div class="alert alert-danger">❌ שגיאה בקבלת קבצים</div>`;
                    return;
                }
                
                const files = filesData.files.slice(0, 5); // רק 5 קבצים לבדיקה
                const selectorMap = new Map();
                
                for (const file of files) {
                    try {
                        const contentResponse = await fetch(`/api/css/content?file=${encodeURIComponent(file)}`);
                        const contentData = await contentResponse.json();
                        
                        if (contentData.success) {
                            // חיפוש סלקטורים פשוט
                            const selectors = contentData.content.match(/[.#][a-zA-Z0-9_-]+/g) || [];
                            
                            for (const selector of selectors) {
                                if (!selectorMap.has(selector)) {
                                    selectorMap.set(selector, []);
                                }
                                selectorMap.get(selector).push(file);
                            }
                        }
                    } catch (error) {
                        console.warn(`שגיאה בקובץ ${file}:`, error);
                    }
                }
                
                const duplicates = [];
                for (const [selector, files] of selectorMap.entries()) {
                    if (files.length > 1) {
                        duplicates.push({ selector, files });
                    }
                }
                
                result.innerHTML = `
                    <div class="alert alert-info">
                        <strong>🔍 תוצאות בדיקת כפילויות</strong><br>
                        נסרקו ${files.length} קבצים<br>
                        נמצאו ${duplicates.length} כפילויות<br>
                        <small>כפילויות ראשונות: ${duplicates.slice(0, 3).map(d => d.selector).join(', ')}</small>
                    </div>
                `;
                
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
