<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>Test Executions Colors</title>
</head>
<body>
<h1>העתק ולחץ על הכפתור בדף executions</h1>
<pre id="output"></pre>

<script>
async function checkExecutionColors() {
    const report = [];
    report.push('═══════════════════════════════════════════════════════════════════');
    report.push('         🔍 בדיקת צבעים - עמוד EXECUTIONS 🔍');
    report.push('═══════════════════════════════════════════════════════════════════');
    report.push('');
    
    // 1. בדיקת CSS Variables בדף
    report.push('📌 1. CSS Variables (מה שמוגדר ב-:root):');
    report.push('───────────────────────────────────────────────────────────────────');
    const root = document.documentElement;
    const computedStyle = getComputedStyle(root);
    
    const vars = [
        '--entity-execution-color',
        '--entity-execution-bg',
        '--entity-execution-text',
        '--entity-execution-border'
    ];
    
    vars.forEach(varName => {
        const value = computedStyle.getPropertyValue(varName).trim();
        report.push(`${varName}: ${value || '❌ לא מוגדר'}`);
    });
    
    report.push('');
    
    // 2. בדיקת הכותרת בפועל
    report.push('📌 2. כותרת ראשית (.entity-execution-main-header):');
    report.push('───────────────────────────────────────────────────────────────────');
    const header = document.querySelector('.entity-execution-main-header');
    
    if (header) {
        const headerStyle = getComputedStyle(header);
        report.push(`✅ אלמנט נמצא`);
        report.push(`   רקע: ${headerStyle.backgroundColor}`);
        report.push(`   טקסט: ${headerStyle.color}`);
        report.push(`   גבול תחתון: ${headerStyle.borderBottom}`);
    } else {
        report.push(`❌ אלמנט לא נמצא!`);
    }
    
    report.push('');
    
    // 3. בדיקת כותרת משנית
    report.push('📌 3. כותרת משנית (.entity-execution-sub-header):');
    report.push('───────────────────────────────────────────────────────────────────');
    const subHeader = document.querySelector('.entity-execution-sub-header');
    
    if (subHeader) {
        const subHeaderStyle = getComputedStyle(subHeader);
        report.push(`✅ אלמנט נמצא`);
        report.push(`   רקע: ${subHeaderStyle.backgroundColor}`);
        report.push(`   טקסט: ${subHeaderStyle.color}`);
        report.push(`   גבול תחתון: ${subHeaderStyle.borderBottom}`);
    } else {
        report.push(`❌ אלמנט לא נמצא!`);
    }
    
    report.push('');
    
    // 4. בדיקת טעינת העדפות
    report.push('📌 4. בדיקת העדפות מהשרת:');
    report.push('───────────────────────────────────────────────────────────────────');
    
    try {
        const response = await fetch('/api/preferences/user');
        const data = await response.json();
        
        if (data.success && data.data.preferences) {
            const prefs = data.data.preferences;
            report.push(`✅ העדפות נטענו מהשרת`);
            report.push(`   entityExecutionColor: ${prefs.entityExecutionColor || '❌ לא מוגדר'}`);
            report.push(`   entityExecutionColorDark: ${prefs.entityExecutionColorDark || '❌ לא מוגדר'}`);
            report.push(`   entityExecutionColorLight: ${prefs.entityExecutionColorLight || '❌ לא מוגדר'}`);
        } else {
            report.push(`❌ שגיאה בטעינת העדפות`);
        }
    } catch (error) {
        report.push(`❌ שגיאה: ${error.message}`);
    }
    
    report.push('');
    
    // 5. בדיקת פונקציות
    report.push('📌 5. בדיקת פונקציות זמינות:');
    report.push('───────────────────────────────────────────────────────────────────');
    report.push(`loadColorPreferences: ${typeof window.loadColorPreferences === 'function' ? '✅ קיימת' : '❌ לא קיימת'}`);
    report.push(`loadDynamicColors: ${typeof window.loadDynamicColors === 'function' ? '✅ קיימת' : '❌ לא קיימת'}`);
    report.push(`colorPreferencesLoaded: ${window.colorPreferencesLoaded ? '✅ נטענו' : '❌ לא נטענו'}`);
    
    report.push('');
    report.push('═══════════════════════════════════════════════════════════════════');
    
    const output = report.join('\n');
    console.log(output);
    
    // העתקה ללוח אוטומטית
    try {
        await navigator.clipboard.writeText(output);
        console.log('✅ הדוח הועתק ללוח!');
    } catch (e) {
        console.log('⚠️ לא ניתן להעתיק אוטומטית');
    }
    
    return output;
}

// הרץ אוטומטית
checkExecutionColors();
</script>
</body>
</html>
