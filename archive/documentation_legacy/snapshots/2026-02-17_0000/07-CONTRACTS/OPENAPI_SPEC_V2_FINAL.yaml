openapi: 3.0.0
info:
  title: TikTrack Project Phoenix API (Master Release)
  version: 1.0.0
  description: Unified API Specification (Fortress Protocol)
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: "System Health Check"
      responses:
        '200':
          description: "OK"
  /auth/login:
    post:
      summary: "User authentication (Auth Contract SSOT)"
      description: "Returns access_token, token_type, expires_at, user per SSOT_AUTH_CONTRACT"
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: "Invalid credentials"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register:
    post:
      summary: "Register new user (Auth Contract SSOT)"
      responses:
        '201':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      summary: "Refresh access token (Auth Contract SSOT)"
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      summary: "Get current user profile (D25)"
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /trading_accounts:
    get:
      summary: "List all trading accounts"
      description: "Get trading accounts for current user with calculated fields (positions_count, total_pl, account_value, holdings_value)"
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: "Filter by is_active status"
          schema:
            type: boolean
        - name: search
          in: query
          description: "Search by account_name (partial match)"
          schema:
            type: string
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingAccountListResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    /summary:
      get:
        summary: "Get trading accounts summary (Option A - SSOT)"
        description: "Get trading accounts summary statistics without list of accounts"
        x-option: "A"
        security:
          - bearerAuth: []
        parameters:
          - name: status
            in: query
            description: "Filter by canonical status (active|inactive|pending|cancelled)"
            schema:
              type: string
              enum: [active, inactive, pending, cancelled]
        responses:
          '200':
            description: "Success"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TradingAccountSummaryResponse'
          '401':
            description: "Unauthorized"
          '500':
            description: "Internal Server Error"
    /{id}/api-import-eligible:
      get:
        summary: "ADR-018: Check if account eligible for API/import"
        description: "Returns 200+eligible=true when broker is_supported; 403 when broker is 'other' or unsupported"
        security:
          - bearerAuth: []
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: string
              pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
        responses:
          '200':
            description: "Eligible"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    eligible: { type: boolean, example: true }
                    account_id: { type: string }
          '403':
            description: "Broker not supported (other/custom)"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: "Unauthorized"
  /brokers_fees:
    get:
      summary: "List all broker fees (D18)"
      description: "Get broker fees for current user with filters"
      security:
        - bearerAuth: []
      parameters:
        - name: trading_account_id
          in: query
          description: "Filter by trading account ULID (ADR-015)"
          schema:
            type: string
        - name: broker
          in: query
          description: "Filter by broker name"
          schema:
            type: string
        - name: commission_type
          in: query
          description: "Filter by commission type (TIERED/FLAT)"
          schema:
            type: string
            enum: [TIERED, FLAT]
        - name: search
          in: query
          description: "Search in account name, broker, commission value"
          schema:
            type: string
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerFeeListResponse'
        '401':
          description: "Unauthorized"
        '500':
          description: "Internal Server Error"
    /summary:
      get:
        summary: "Get brokers fees summary (Option A - SSOT)"
        description: "Get brokers fees summary statistics without list"
        x-option: "A"
        security:
          - bearerAuth: []
        parameters:
          - name: trading_account_id
            in: query
            description: "Filter by trading account ULID"
            schema:
              type: string
          - name: broker
            in: query
            schema:
              type: string
          - name: commission_type
            in: query
            schema:
              type: string
              enum: [TIERED, FLAT]
        responses:
          '200':
            description: "Success"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BrokerFeeSummaryResponse'
          '401':
            description: "Unauthorized"
          '500':
            description: "Internal Server Error"
  /cash_flows:
    get:
      summary: "List all cash flows"
      description: "Get cash flows for current user with filters and summary statistics"
      security:
        - bearerAuth: []
      parameters:
        - name: trading_account_id
          in: query
          description: "Filter by trading account ULID"
          schema:
            type: string
            pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
        - name: date_from
          in: query
          description: "Filter by transaction_date >= date_from"
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: "Filter by transaction_date <= date_to"
          schema:
            type: string
            format: date
        - name: flow_type
          in: query
          description: "Filter by flow_type"
          schema:
            type: string
            enum: [DEPOSIT, WITHDRAWAL, DIVIDEND, INTEREST, FEE, OTHER, CURRENCY_CONVERSION]
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashFlowListResponse'
        '400':
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    /summary:
      get:
        summary: "Get cash flows summary only (Option A - SSOT)"
        description: "Get cash flows summary statistics without list of transactions"
        x-option: "A"
        security:
          - bearerAuth: []
        parameters:
          - name: trading_account_id
            in: query
            description: "Filter by trading account ULID"
            schema:
              type: string
              pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          - name: date_from
            in: query
            description: "Filter by transaction_date >= date_from"
            schema:
              type: string
              format: date
          - name: date_to
            in: query
            description: "Filter by transaction_date <= date_to"
            schema:
              type: string
              format: date
        responses:
          '200':
            description: "Success"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CashFlowListResponse'
          '400':
            description: "Bad Request"
          '401':
            description: "Unauthorized"
          '500':
            description: "Internal Server Error"
    /currency_conversions:
      get:
        summary: "Get currency conversions (Option A - SSOT)"
        description: "Get list of currency conversion transactions (flow_type=CURRENCY_CONVERSION)"
        x-option: "A"
        security:
          - bearerAuth: []
        parameters:
          - name: trading_account_id
            in: query
            description: "Filter by trading account ULID"
            schema:
              type: string
          - name: date_from
            in: query
            description: "Filter by transaction_date >= date_from"
            schema:
              type: string
              format: date
          - name: date_to
            in: query
            description: "Filter by transaction_date <= date_to"
            schema:
              type: string
              format: date
        responses:
          '200':
            description: "Success"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CurrencyConversionListResponse'
          '400':
            description: "Bad Request"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: "Unauthorized"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: "Internal Server Error"
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /positions:
    get:
      summary: "List all positions"
      description: "Get positions for current user (aggregated from trades by ticker_id and trading_account_id)"
      security:
        - bearerAuth: []
      parameters:
        - name: trading_account_id
          in: query
          description: "Filter by trading account ULID"
          schema:
            type: string
            pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionListResponse'
        '400':
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /trades:
    get:
      summary: "Hierarchical Trades View"
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradeResponse'
  /analytics/portfolios:
    get:
      summary: "Portfolio Performance Analytics"
      responses:
        '200': { description: "Success" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthResponse:
      type: object
      description: "Auth Contract SSOT (Team 90) - login, register, refresh"
      required: [access_token, token_type, expires_at, user]
      properties:
        access_token: { type: string, description: "JWT access token" }
        token_type: { type: string, example: "bearer" }
        expires_at: { type: string, format: date-time }
        user:
          $ref: '#/components/schemas/AuthUser'
    AuthUser:
      type: object
      description: "User object in Auth response"
      properties:
        id: { type: string, description: "User ID (ULID)" }
        email: { type: string }
        role: { type: string, enum: [ADMIN, USER, SUPERADMIN] }
        user_tier: { type: string, description: "FREE|PRO|Bronze|Silver|Gold|Platinum" }
    UserResponse:
      type: object
      properties:
        external_ulids: { type: string, pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$' }
        phone_numbers: { type: string }
        user_tier_levels: { type: string, enum: [Bronze, Silver, Gold, Platinum] }
    TradeResponse:
      type: object
      properties:
        external_ulids: { type: string }
        parent_id: { type: string, nullable: true }
        calculated_statuses: { type: string }
        aggregated_pnl_amounts: { type: number }
        children:
          type: array
          items:
            $ref: '#/components/schemas/TradeResponse'
    TradingAccountResponse:
      type: object
      required:
        - external_ulid
        - display_name
        - currency
        - balance
        - positions_count
        - total_pl
        - account_value
        - holdings_value
        - is_active
        - updated_at
      properties:
        external_ulid:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "External ULID identifier"
        display_name:
          type: string
          description: "Account display name"
        broker:
          type: string
          nullable: true
          description: "Broker name"
        currency:
          type: string
          description: "Account currency"
        balance:
          type: number
          format: decimal
          description: "Current cash balance"
        positions_count:
          type: integer
          description: "Number of open positions"
        total_pl:
          type: number
          format: decimal
          description: "Total unrealized P/L"
        account_value:
          type: number
          format: decimal
          description: "Total account value (cash + holdings)"
        holdings_value:
          type: number
          format: decimal
          description: "Total holdings value"
        is_active:
          type: boolean
          description: "Account active status"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp"
    TradingAccountListResponse:
      type: object
      required:
        - data
        - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TradingAccountResponse'
        total:
          type: integer
          description: "Total count"
    TradingAccountSummaryResponse:
      type: object
      required:
        - total_accounts
        - active_accounts
        - total_account_value
        - total_cash_balance
        - total_holdings_value
        - total_unrealized_pl
        - total_positions
      properties:
        total_accounts: { type: integer, description: "Total number of trading accounts" }
        active_accounts: { type: integer, description: "Number of active accounts" }
        total_account_value: { type: number, format: decimal }
        total_cash_balance: { type: number, format: decimal }
        total_holdings_value: { type: number, format: decimal }
        total_unrealized_pl: { type: number, format: decimal }
        total_positions: { type: integer }
    BrokerFeeResponse:
      type: object
      properties:
        id: { type: string, description: "External ULID" }
        trading_account_id: { type: string }
        account_name: { type: string }
        commission_type: { type: string, enum: [TIERED, FLAT] }
        commission_value: { type: number }
        minimum: { type: number }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BrokerFeeListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BrokerFeeResponse'
        total: { type: integer }
    BrokerFeeSummaryResponse:
      type: object
      required:
        - total_brokers
        - active_brokers
      properties:
        total_brokers: { type: integer }
        active_brokers: { type: integer }
        avg_commission_per_trade: { type: number }
        monthly_fixed_commissions: { type: number }
        yearly_fixed_commissions: { type: number }
    CurrencyConversionResponse:
      type: object
      properties:
        id: { type: string }
        date: { type: string, format: date }
        account: { type: string }
        from_currency: { type: string }
        from_amount: { type: number }
        to_currency: { type: string }
        to_amount: { type: number }
        rate: { type: number }
    CurrencyConversionListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CurrencyConversionResponse'
        total: { type: integer }
    CashFlowResponse:
      type: object
      required:
        - external_ulid
        - transaction_date
        - flow_type
        - trading_account_id
        - account_name
        - amount
        - currency
      properties:
        external_ulid:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "External ULID identifier"
        transaction_date:
          type: string
          format: date
          description: "Transaction date"
        flow_type:
          type: string
          enum: [DEPOSIT, WITHDRAWAL, DIVIDEND, INTEREST, FEE, OTHER, CURRENCY_CONVERSION]
          description: "Flow type"
        subtype:
          type: string
          nullable: true
          description: "Flow subtype (from metadata)"
        trading_account_id:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "Trading account ULID"
        account_name:
          type: string
          description: "Trading account name"
        amount:
          type: number
          format: decimal
          description: "Transaction amount"
        currency:
          type: string
          description: "Currency"
        status:
          type: string
          nullable: true
          description: "Status (VERIFIED, PENDING, from metadata)"
        description:
          type: string
          nullable: true
          description: "Transaction description"
    CashFlowSummaryResponse:
      type: object
      required:
        - total_deposits
        - total_withdrawals
        - net_flow
      properties:
        total_deposits:
          type: number
          format: decimal
          description: "Total deposits"
        total_withdrawals:
          type: number
          format: decimal
          description: "Total withdrawals"
        net_flow:
          type: number
          format: decimal
          description: "Net cash flow"
    CashFlowListResponse:
      type: object
      required:
        - data
        - total
        - summary
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CashFlowResponse'
        total:
          type: integer
          description: "Total count"
        summary:
          $ref: '#/components/schemas/CashFlowSummaryResponse'
    PositionResponse:
      type: object
      required:
        - external_ulid
        - symbol
        - ticker_id
        - quantity
        - avg_price
        - current_price
        - daily_change
        - daily_change_percent
        - market_value
        - unrealized_pl
        - unrealized_pl_percent
        - percent_of_account
        - status
        - direction
      properties:
        external_ulid:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "External ULID identifier (ticker_id)"
        symbol:
          type: string
          description: "Ticker symbol"
        ticker_id:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "Ticker ULID"
        quantity:
          type: number
          format: decimal
          description: "Total quantity (aggregated)"
        avg_price:
          type: number
          format: decimal
          description: "Average entry price"
        current_price:
          type: number
          format: decimal
          description: "Current market price"
        daily_change:
          type: number
          format: decimal
          description: "Daily price change"
        daily_change_percent:
          type: number
          format: decimal
          description: "Daily price change percentage"
        market_value:
          type: number
          format: decimal
          description: "Current market value (quantity * current_price)"
        unrealized_pl:
          type: number
          format: decimal
          description: "Unrealized P/L"
        unrealized_pl_percent:
          type: number
          format: decimal
          description: "Unrealized P/L percentage"
        percent_of_account:
          type: number
          format: decimal
          description: "Percentage of account value"
        status:
          type: string
          description: "Position status (OPEN, CLOSED, etc.)"
        direction:
          type: string
          enum: [LONG, SHORT]
          description: "Trade direction"
    PositionListResponse:
      type: object
      required:
        - data
        - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PositionResponse'
        total:
          type: integer
          description: "Total count"
    ErrorResponse:
      type: object
      description: "PDSC Error Schema (Team 90 SSOT)"
      required:
        - error_code
        - detail
      properties:
        error_code:
          type: string
          description: "Machine-readable error code (VALIDATION_INVALID_FORMAT, AUTH_INVALID_TOKEN, etc.)"
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
          description: "Human-readable error message"
        field_errors:
          type: array
          description: "Validation field errors (optional)"
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
        trace_id:
          type: string
          description: "Trace ID for debugging (optional)"