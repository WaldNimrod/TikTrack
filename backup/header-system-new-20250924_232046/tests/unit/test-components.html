<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת רכיבים - Header System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            direction: rtl;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #test-element {
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            margin: 10px 0;
        }
        .theme-light {
            background-color: #ffffff;
            color: #000000;
        }
        .theme-dark {
            background-color: #000000;
            color: #ffffff;
        }
        .compact-mode {
            font-size: 12px;
        }
        .high-contrast {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .large-text {
            font-size: 18px;
        }
        .reduced-motion * {
            animation: none !important;
            transition: none !important;
        }
    </style>
</head>
<body>
    <h1>🧩 בדיקת רכיבים - Header System</h1>
    
    <div class="test-section">
        <h2>StateComponent Tests</h2>
        <button onclick="testStateComponent()">בדוק StateComponent</button>
        <div id="statecomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>UIComponent Tests</h2>
        <button onclick="testUIComponent()">בדוק UIComponent</button>
        <div id="uicomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>TranslationComponent Tests</h2>
        <button onclick="testTranslationComponent()">בדוק TranslationComponent</button>
        <div id="translationcomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>PreferencesComponent Tests</h2>
        <button onclick="testPreferencesComponent()">בדוק PreferencesComponent</button>
        <div id="preferencescomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Components Integration Tests</h2>
        <button onclick="testComponentsIntegration()">בדוק אינטגרציה</button>
        <div id="integration-results"></div>
    </div>
    
    <!-- אלמנט לבדיקות -->
    <div id="test-element">
        <p data-translate="menu.dashboard">לוח בקרה</p>
        <button data-translate="button.save">שמירה</button>
        <input type="text" data-translate="filter.search" placeholder="חיפוש...">
    </div>
    
    <!-- טעינת קבצי המערכת -->
    <script src="../utils/DOMUtils.js"></script>
    <script src="../utils/EventUtils.js"></script>
    <script src="../utils/StateUtils.js"></script>
    <script src="../constants/Events.js"></script>
    <script src="../constants/Selectors.js"></script>
    <script src="../constants/Config.js"></script>
    <script src="../services/EventService.js"></script>
    <script src="../services/StateService.js"></script>
    <script src="../services/UIService.js"></script>
    <script src="../components/StateComponent.js"></script>
    <script src="../components/UIComponent.js"></script>
    <script src="../components/TranslationComponent.js"></script>
    <script src="../components/PreferencesComponent.js"></script>
    <script src="../index.js"></script>
    
    <script>
        // פונקציות בדיקה
        
        function addResult(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            container.appendChild(div);
        }
        
        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }
        
        function testStateComponent() {
            clearResults('statecomponent-results');
            addResult('statecomponent-results', 'מתחיל בדיקת StateComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof StateComponent === 'undefined') {
                    addResult('statecomponent-results', '❌ StateComponent לא קיים', 'error');
                    return;
                }
                addResult('statecomponent-results', '✅ StateComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const stateComponent = new StateComponent(headerSystem);
                
                if (stateComponent) {
                    addResult('statecomponent-results', '✅ יצירת מופע StateComponent עובד', 'success');
                } else {
                    addResult('statecomponent-results', '❌ יצירת מופע StateComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['getFiltersState', 'getMenuState', 'getUIState', 'getPreferencesState', 'updateFiltersState', 'updateMenuState', 'updateUIState', 'updatePreferencesState'];
                
                methods.forEach(method => {
                    if (typeof stateComponent[method] === 'function') {
                        addResult('statecomponent-results', `✅ StateComponent.${method} קיים`, 'success');
                    } else {
                        addResult('statecomponent-results', `❌ StateComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת getInfo
                const info = stateComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('statecomponent-results', '✅ StateComponent.getInfo עובד', 'success');
                } else {
                    addResult('statecomponent-results', '❌ StateComponent.getInfo לא עובד', 'error');
                }
                
                addResult('statecomponent-results', '✅ בדיקת StateComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('statecomponent-results', `❌ שגיאה בבדיקת StateComponent: ${error.message}`, 'error');
            }
        }
        
        function testUIComponent() {
            clearResults('uicomponent-results');
            addResult('uicomponent-results', 'מתחיל בדיקת UIComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof UIComponent === 'undefined') {
                    addResult('uicomponent-results', '❌ UIComponent לא קיים', 'error');
                    return;
                }
                addResult('uicomponent-results', '✅ UIComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const uiComponent = new UIComponent(headerSystem);
                
                if (uiComponent) {
                    addResult('uicomponent-results', '✅ יצירת מופע UIComponent עובד', 'success');
                } else {
                    addResult('uicomponent-results', '❌ יצירת מופע UIComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['createHeaderElement', 'createMenuElement', 'createFiltersElement', 'createNavigationElement', 'updateMenuUI', 'updateFiltersUI', 'updateUIState'];
                
                methods.forEach(method => {
                    if (typeof uiComponent[method] === 'function') {
                        addResult('uicomponent-results', `✅ UIComponent.${method} קיים`, 'success');
                    } else {
                        addResult('uicomponent-results', `❌ UIComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת יצירת אלמנטים
                const headerElement = uiComponent.createHeaderElement();
                if (headerElement && headerElement.tagName === 'DIV') {
                    addResult('uicomponent-results', '✅ UIComponent.createHeaderElement עובד', 'success');
                } else {
                    addResult('uicomponent-results', '❌ UIComponent.createHeaderElement לא עובד', 'error');
                }
                
                const menuElement = uiComponent.createMenuElement();
                if (menuElement && menuElement.tagName === 'UL') {
                    addResult('uicomponent-results', '✅ UIComponent.createMenuElement עובד', 'success');
                } else {
                    addResult('uicomponent-results', '❌ UIComponent.createMenuElement לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = uiComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('uicomponent-results', '✅ UIComponent.getInfo עובד', 'success');
                } else {
                    addResult('uicomponent-results', '❌ UIComponent.getInfo לא עובד', 'error');
                }
                
                addResult('uicomponent-results', '✅ בדיקת UIComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('uicomponent-results', `❌ שגיאה בבדיקת UIComponent: ${error.message}`, 'error');
            }
        }
        
        function testTranslationComponent() {
            clearResults('translationcomponent-results');
            addResult('translationcomponent-results', 'מתחיל בדיקת TranslationComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof TranslationComponent === 'undefined') {
                    addResult('translationcomponent-results', '❌ TranslationComponent לא קיים', 'error');
                    return;
                }
                addResult('translationcomponent-results', '✅ TranslationComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const translationComponent = new TranslationComponent(headerSystem);
                
                if (translationComponent) {
                    addResult('translationcomponent-results', '✅ יצירת מופע TranslationComponent עובד', 'success');
                } else {
                    addResult('translationcomponent-results', '❌ יצירת מופע TranslationComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['translate', 'translateElement', 'translateElementAttribute', 'setLanguage', 'getCurrentLanguage', 'getAvailableLanguages'];
                
                methods.forEach(method => {
                    if (typeof translationComponent[method] === 'function') {
                        addResult('translationcomponent-results', `✅ TranslationComponent.${method} קיים`, 'success');
                    } else {
                        addResult('translationcomponent-results', `❌ TranslationComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת תרגום
                const translatedText = translationComponent.translate('menu.dashboard');
                if (translatedText && translatedText !== 'menu.dashboard') {
                    addResult('translationcomponent-results', '✅ TranslationComponent.translate עובד', 'success');
                } else {
                    addResult('translationcomponent-results', '❌ TranslationComponent.translate לא עובד', 'error');
                }
                
                // בדיקת שפות זמינות
                const languages = translationComponent.getAvailableLanguages();
                if (Array.isArray(languages) && languages.length > 0) {
                    addResult('translationcomponent-results', '✅ TranslationComponent.getAvailableLanguages עובד', 'success');
                } else {
                    addResult('translationcomponent-results', '❌ TranslationComponent.getAvailableLanguages לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = translationComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('translationcomponent-results', '✅ TranslationComponent.getInfo עובד', 'success');
                } else {
                    addResult('translationcomponent-results', '❌ TranslationComponent.getInfo לא עובד', 'error');
                }
                
                addResult('translationcomponent-results', '✅ בדיקת TranslationComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('translationcomponent-results', `❌ שגיאה בבדיקת TranslationComponent: ${error.message}`, 'error');
            }
        }
        
        function testPreferencesComponent() {
            clearResults('preferencescomponent-results');
            addResult('preferencescomponent-results', 'מתחיל בדיקת PreferencesComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof PreferencesComponent === 'undefined') {
                    addResult('preferencescomponent-results', '❌ PreferencesComponent לא קיים', 'error');
                    return;
                }
                addResult('preferencescomponent-results', '✅ PreferencesComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const preferencesComponent = new PreferencesComponent(headerSystem);
                
                if (preferencesComponent) {
                    addResult('preferencescomponent-results', '✅ יצירת מופע PreferencesComponent עובד', 'success');
                } else {
                    addResult('preferencescomponent-results', '❌ יצירת מופע PreferencesComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['getPreference', 'setPreference', 'getAllPreferences', 'setAllPreferences', 'resetPreference', 'resetAllPreferences'];
                
                methods.forEach(method => {
                    if (typeof preferencesComponent[method] === 'function') {
                        addResult('preferencescomponent-results', `✅ PreferencesComponent.${method} קיים`, 'success');
                    } else {
                        addResult('preferencescomponent-results', `❌ PreferencesComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת העדפות
                const theme = preferencesComponent.getPreference('theme', 'light');
                if (theme === 'light') {
                    addResult('preferencescomponent-results', '✅ PreferencesComponent.getPreference עובד', 'success');
                } else {
                    addResult('preferencescomponent-results', '❌ PreferencesComponent.getPreference לא עובד', 'error');
                }
                
                preferencesComponent.setPreference('theme', 'dark');
                const newTheme = preferencesComponent.getPreference('theme');
                if (newTheme === 'dark') {
                    addResult('preferencescomponent-results', '✅ PreferencesComponent.setPreference עובד', 'success');
                } else {
                    addResult('preferencescomponent-results', '❌ PreferencesComponent.setPreference לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = preferencesComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('preferencescomponent-results', '✅ PreferencesComponent.getInfo עובד', 'success');
                } else {
                    addResult('preferencescomponent-results', '❌ PreferencesComponent.getInfo לא עובד', 'error');
                }
                
                addResult('preferencescomponent-results', '✅ בדיקת PreferencesComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('preferencescomponent-results', `❌ שגיאה בבדיקת PreferencesComponent: ${error.message}`, 'error');
            }
        }
        
        function testComponentsIntegration() {
            clearResults('integration-results');
            addResult('integration-results', 'מתחיל בדיקת אינטגרציה בין רכיבים...', 'info');
            
            try {
                // יצירת מערכת
                const headerSystem = new HeaderSystem();
                
                // יצירת רכיבים
                const stateComponent = new StateComponent(headerSystem);
                const uiComponent = new UIComponent(headerSystem);
                const translationComponent = new TranslationComponent(headerSystem);
                const preferencesComponent = new PreferencesComponent(headerSystem);
                
                // בדיקת אינטגרציה בין StateComponent ו-UIComponent
                stateComponent.updateFiltersState({ status: 'open', type: 'investment' });
                const filtersState = stateComponent.getFiltersState();
                
                if (filtersState.status === 'open' && filtersState.type === 'investment') {
                    addResult('integration-results', '✅ אינטגרציה בין StateComponent ו-UIComponent עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה בין StateComponent ו-UIComponent לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה בין TranslationComponent ו-UIComponent
                const translatedText = translationComponent.translate('menu.dashboard');
                if (translatedText && translatedText !== 'menu.dashboard') {
                    addResult('integration-results', '✅ אינטגרציה בין TranslationComponent ו-UIComponent עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה בין TranslationComponent ו-UIComponent לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה בין PreferencesComponent ו-UIComponent
                preferencesComponent.setPreference('theme', 'dark');
                const theme = preferencesComponent.getPreference('theme');
                
                if (theme === 'dark') {
                    addResult('integration-results', '✅ אינטגרציה בין PreferencesComponent ו-UIComponent עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה בין PreferencesComponent ו-UIComponent לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה מלאה
                const allComponentsWorking = stateComponent && uiComponent && translationComponent && preferencesComponent;
                
                if (allComponentsWorking) {
                    addResult('integration-results', '✅ אינטגרציה מלאה בין כל הרכיבים עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה מלאה בין כל הרכיבים לא עובדת', 'error');
                }
                
                addResult('integration-results', '✅ בדיקת אינטגרציה הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('integration-results', `❌ שגיאה בבדיקת אינטגרציה: ${error.message}`, 'error');
            }
        }
        
        // בדיקה אוטומטית בטעינת העמוד
        window.addEventListener('load', () => {
            addResult('statecomponent-results', 'עמוד נטען - מוכן לבדיקות רכיבים', 'info');
        });
    </script>
</body>
</html>
