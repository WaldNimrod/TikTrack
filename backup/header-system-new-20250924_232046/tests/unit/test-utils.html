<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת כלי עזר - Header System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            direction: rtl;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #test-element {
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🔧 בדיקת כלי עזר - Header System</h1>
    
    <div class="test-section">
        <h2>DOMUtils Tests</h2>
        <button onclick="testDOMUtils()">בדוק DOMUtils</button>
        <div id="domutils-results"></div>
    </div>
    
    <div class="test-section">
        <h2>EventUtils Tests</h2>
        <button onclick="testEventUtils()">בדוק EventUtils</button>
        <div id="eventutils-results"></div>
    </div>
    
    <div class="test-section">
        <h2>StateUtils Tests</h2>
        <button onclick="testStateUtils()">בדוק StateUtils</button>
        <div id="stateutils-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Constants Tests</h2>
        <button onclick="testConstants()">בדוק קבועים</button>
        <div id="constants-results"></div>
    </div>
    
    <div class="test-section">
        <h2>HeaderSystem Tests</h2>
        <button onclick="testHeaderSystem()">בדוק HeaderSystem</button>
        <div id="headersystem-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Integration Tests</h2>
        <button onclick="testIntegration()">בדוק אינטגרציה</button>
        <div id="integration-results"></div>
    </div>
    
    <!-- אלמנט לבדיקות -->
    <div id="test-element">
        <p>אלמנט לבדיקות</p>
        <button id="test-button">כפתור בדיקה</button>
    </div>
    
    <!-- טעינת קבצי המערכת -->
    <script src="../utils/DOMUtils.js"></script>
    <script src="../utils/EventUtils.js"></script>
    <script src="../utils/StateUtils.js"></script>
    <script src="../constants/Events.js"></script>
    <script src="../constants/Selectors.js"></script>
    <script src="../constants/Config.js"></script>
    <script src="../index.js"></script>
    
    <script>
        // פונקציות בדיקה
        
        function addResult(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            container.appendChild(div);
        }
        
        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }
        
        function testDOMUtils() {
            clearResults('domutils-results');
            addResult('domutils-results', 'מתחיל בדיקת DOMUtils...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof DOMUtils === 'undefined') {
                    addResult('domutils-results', '❌ DOMUtils לא קיים', 'error');
                    return;
                }
                addResult('domutils-results', '✅ DOMUtils קיים', 'success');
                
                // בדיקת פונקציות בסיסיות
                const testElement = document.getElementById('test-element');
                
                // בדיקת select
                const selected = DOMUtils.select('#test-element');
                if (selected) {
                    addResult('domutils-results', '✅ DOMUtils.select עובד', 'success');
                } else {
                    addResult('domutils-results', '❌ DOMUtils.select לא עובד', 'error');
                }
                
                // בדיקת addClass
                DOMUtils.addClass(testElement, 'test-class');
                if (DOMUtils.hasClass(testElement, 'test-class')) {
                    addResult('domutils-results', '✅ DOMUtils.addClass ו-hasClass עובדים', 'success');
                } else {
                    addResult('domutils-results', '❌ DOMUtils.addClass או hasClass לא עובדים', 'error');
                }
                
                // בדיקת removeClass
                DOMUtils.removeClass(testElement, 'test-class');
                if (!DOMUtils.hasClass(testElement, 'test-class')) {
                    addResult('domutils-results', '✅ DOMUtils.removeClass עובד', 'success');
                } else {
                    addResult('domutils-results', '❌ DOMUtils.removeClass לא עובד', 'error');
                }
                
                // בדיקת create
                const newElement = DOMUtils.create('div', { className: 'test-div' }, 'תוכן בדיקה');
                if (newElement && newElement.tagName === 'DIV') {
                    addResult('domutils-results', '✅ DOMUtils.create עובד', 'success');
                } else {
                    addResult('domutils-results', '❌ DOMUtils.create לא עובד', 'error');
                }
                
                addResult('domutils-results', '✅ בדיקת DOMUtils הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('domutils-results', `❌ שגיאה בבדיקת DOMUtils: ${error.message}`, 'error');
            }
        }
        
        function testEventUtils() {
            clearResults('eventutils-results');
            addResult('eventutils-results', 'מתחיל בדיקת EventUtils...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof EventUtils === 'undefined') {
                    addResult('eventutils-results', '❌ EventUtils לא קיים', 'error');
                    return;
                }
                addResult('eventutils-results', '✅ EventUtils קיים', 'success');
                
                // בדיקת addListener
                let clickCount = 0;
                const testButton = document.getElementById('test-button');
                
                EventUtils.addListener(testButton, 'click', () => {
                    clickCount++;
                });
                
                // סימולציית לחיצה
                testButton.click();
                
                if (clickCount === 1) {
                    addResult('eventutils-results', '✅ EventUtils.addListener עובד', 'success');
                } else {
                    addResult('eventutils-results', '❌ EventUtils.addListener לא עובד', 'error');
                }
                
                // בדיקת createCustomEvent
                const customEvent = EventUtils.createCustomEvent('test-event', { data: 'test' });
                if (customEvent && customEvent.type === 'test-event') {
                    addResult('eventutils-results', '✅ EventUtils.createCustomEvent עובד', 'success');
                } else {
                    addResult('eventutils-results', '❌ EventUtils.createCustomEvent לא עובד', 'error');
                }
                
                // בדיקת dispatchCustomEvent
                let eventReceived = false;
                EventUtils.addListener(testButton, 'test-event', () => {
                    eventReceived = true;
                });
                
                EventUtils.dispatchCustomEvent(testButton, 'test-event', { data: 'test' });
                
                if (eventReceived) {
                    addResult('eventutils-results', '✅ EventUtils.dispatchCustomEvent עובד', 'success');
                } else {
                    addResult('eventutils-results', '❌ EventUtils.dispatchCustomEvent לא עובד', 'error');
                }
                
                addResult('eventutils-results', '✅ בדיקת EventUtils הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('eventutils-results', `❌ שגיאה בבדיקת EventUtils: ${error.message}`, 'error');
            }
        }
        
        function testStateUtils() {
            clearResults('stateutils-results');
            addResult('stateutils-results', 'מתחיל בדיקת StateUtils...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof StateUtils === 'undefined') {
                    addResult('stateutils-results', '❌ StateUtils לא קיים', 'error');
                    return;
                }
                addResult('stateutils-results', '✅ StateUtils קיים', 'success');
                
                // בדיקת saveToLocalStorage
                const testData = { test: 'data', number: 123 };
                const saveResult = StateUtils.saveToLocalStorage('test-key', testData);
                if (saveResult) {
                    addResult('stateutils-results', '✅ StateUtils.saveToLocalStorage עובד', 'success');
                } else {
                    addResult('stateutils-results', '❌ StateUtils.saveToLocalStorage לא עובד', 'error');
                }
                
                // בדיקת loadFromLocalStorage
                const loadedData = StateUtils.loadFromLocalStorage('test-key');
                if (loadedData && loadedData.test === 'data') {
                    addResult('stateutils-results', '✅ StateUtils.loadFromLocalStorage עובד', 'success');
                } else {
                    addResult('stateutils-results', '❌ StateUtils.loadFromLocalStorage לא עובד', 'error');
                }
                
                // בדיקת removeFromLocalStorage
                const removeResult = StateUtils.removeFromLocalStorage('test-key');
                if (removeResult) {
                    addResult('stateutils-results', '✅ StateUtils.removeFromLocalStorage עובד', 'success');
                } else {
                    addResult('stateutils-results', '❌ StateUtils.removeFromLocalStorage לא עובד', 'error');
                }
                
                // בדיקת SystemState
                StateUtils.systemState.set('test-state', 'test-value');
                const stateValue = StateUtils.systemState.get('test-state');
                if (stateValue === 'test-value') {
                    addResult('stateutils-results', '✅ StateUtils.SystemState עובד', 'success');
                } else {
                    addResult('stateutils-results', '❌ StateUtils.SystemState לא עובד', 'error');
                }
                
                // בדיקת checkStorageSupport
                const support = StateUtils.checkStorageSupport();
                if (support && typeof support.localStorage === 'boolean') {
                    addResult('stateutils-results', '✅ StateUtils.checkStorageSupport עובד', 'success');
                } else {
                    addResult('stateutils-results', '❌ StateUtils.checkStorageSupport לא עובד', 'error');
                }
                
                addResult('stateutils-results', '✅ בדיקת StateUtils הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('stateutils-results', `❌ שגיאה בבדיקת StateUtils: ${error.message}`, 'error');
            }
        }
        
        function testConstants() {
            clearResults('constants-results');
            addResult('constants-results', 'מתחיל בדיקת קבועים...', 'info');
            
            try {
                // בדיקת HEADER_EVENTS
                if (typeof HEADER_EVENTS === 'undefined') {
                    addResult('constants-results', '❌ HEADER_EVENTS לא קיים', 'error');
                } else {
                    addResult('constants-results', '✅ HEADER_EVENTS קיים', 'success');
                    if (HEADER_EVENTS.SYSTEM_INIT) {
                        addResult('constants-results', '✅ HEADER_EVENTS מכיל אירועים', 'success');
                    }
                }
                
                // בדיקת HEADER_SELECTORS
                if (typeof HEADER_SELECTORS === 'undefined') {
                    addResult('constants-results', '❌ HEADER_SELECTORS לא קיים', 'error');
                } else {
                    addResult('constants-results', '✅ HEADER_SELECTORS קיים', 'success');
                    if (HEADER_SELECTORS.HEADER_CONTAINER) {
                        addResult('constants-results', '✅ HEADER_SELECTORS מכיל סלקטורים', 'success');
                    }
                }
                
                // בדיקת HEADER_CONFIG
                if (typeof HEADER_CONFIG === 'undefined') {
                    addResult('constants-results', '❌ HEADER_CONFIG לא קיים', 'error');
                } else {
                    addResult('constants-results', '✅ HEADER_CONFIG קיים', 'success');
                    if (HEADER_CONFIG.SYSTEM) {
                        addResult('constants-results', '✅ HEADER_CONFIG מכיל הגדרות', 'success');
                    }
                }
                
                addResult('constants-results', '✅ בדיקת קבועים הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('constants-results', `❌ שגיאה בבדיקת קבועים: ${error.message}`, 'error');
            }
        }
        
        function testHeaderSystem() {
            clearResults('headersystem-results');
            addResult('headersystem-results', 'מתחיל בדיקת HeaderSystem...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof HeaderSystem === 'undefined') {
                    addResult('headersystem-results', '❌ HeaderSystem לא קיים', 'error');
                    return;
                }
                addResult('headersystem-results', '✅ HeaderSystem קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem({ SYSTEM: { AUTO_INIT: false } });
                if (headerSystem) {
                    addResult('headersystem-results', '✅ יצירת מופע HeaderSystem עובד', 'success');
                } else {
                    addResult('headersystem-results', '❌ יצירת מופע HeaderSystem לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = headerSystem.getInfo();
                if (info && info.version) {
                    addResult('headersystem-results', '✅ HeaderSystem.getInfo עובד', 'success');
                } else {
                    addResult('headersystem-results', '❌ HeaderSystem.getInfo לא עובד', 'error');
                }
                
                // בדיקת getHeaderSystem
                if (typeof getHeaderSystem === 'function') {
                    const globalSystem = getHeaderSystem();
                    if (globalSystem) {
                        addResult('headersystem-results', '✅ getHeaderSystem עובד', 'success');
                    } else {
                        addResult('headersystem-results', '❌ getHeaderSystem לא עובד', 'error');
                    }
                }
                
                addResult('headersystem-results', '✅ בדיקת HeaderSystem הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('headersystem-results', `❌ שגיאה בבדיקת HeaderSystem: ${error.message}`, 'error');
            }
        }
        
        function testIntegration() {
            clearResults('integration-results');
            addResult('integration-results', 'מתחיל בדיקת אינטגרציה...', 'info');
            
            try {
                // בדיקת אינטגרציה בין כלי העזר
                const testElement = document.getElementById('test-element');
                
                // שימוש ב-DOMUtils ו-EventUtils יחד
                DOMUtils.addClass(testElement, 'integration-test');
                let integrationTestPassed = false;
                
                EventUtils.addListener(testElement, 'click', () => {
                    integrationTestPassed = true;
                });
                
                testElement.click();
                
                if (integrationTestPassed && DOMUtils.hasClass(testElement, 'integration-test')) {
                    addResult('integration-results', '✅ אינטגרציה בין DOMUtils ו-EventUtils עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה בין DOMUtils ו-EventUtils לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה עם StateUtils
                StateUtils.systemState.set('integration-test', 'success');
                const stateValue = StateUtils.systemState.get('integration-test');
                
                if (stateValue === 'success') {
                    addResult('integration-results', '✅ אינטגרציה עם StateUtils עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה עם StateUtils לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה עם קבועים
                if (HEADER_EVENTS.SYSTEM_INIT && HEADER_SELECTORS.HEADER_CONTAINER && HEADER_CONFIG.SYSTEM) {
                    addResult('integration-results', '✅ אינטגרציה עם קבועים עובדת', 'success');
                } else {
                    addResult('integration-results', '❌ אינטגרציה עם קבועים לא עובדת', 'error');
                }
                
                addResult('integration-results', '✅ בדיקת אינטגרציה הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('integration-results', `❌ שגיאה בבדיקת אינטגרציה: ${error.message}`, 'error');
            }
        }
        
        // בדיקה אוטומטית בטעינת העמוד
        window.addEventListener('load', () => {
            addResult('domutils-results', 'עמוד נטען - מוכן לבדיקות', 'info');
        });
    </script>
</body>
</html>
