<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fill-ink { fill: #000000; }
      .fill-teal { fill: #26b7a9; }
      .fill-orange { fill: #fa5a00; }
      .ink { stroke: #000000; fill: none; }
      .teal { stroke: #26b7a9; fill: none; }
      .mono { fill: #000000; }
      .mono-soft { fill: #7a7a7a; }
      .mono-light { fill: #ffffff; }
    </style>
  </defs>

  <g>
    <!-- gear simplified -->
    <circle cx="50" cy="50" r="16" class="fill-teal"/>
    <g class="fill-ink">
      <rect x="48" y="10" width="4" height="12" rx="2"/>
      <rect x="48" y="78" width="4" height="12" rx="2"/>
      <rect x="10" y="48" width="12" height="4" rx="2"/>
      <rect x="78" y="48" width="12" height="4" rx="2"/>
      <rect x="18" y="22" width="12" height="4" rx="2" transform="rotate(-45 24 24)"/>
      <rect x="70" y="74" width="12" height="4" rx="2" transform="rotate(-45 76 76)"/>
      <rect x="70" y="22" width="12" height="4" rx="2" transform="rotate(45 76 24)"/>
      <rect x="18" y="74" width="12" height="4" rx="2" transform="rotate(45 24 76)"/>
    </g>
    <circle cx="50" cy="50" r="6" class="fill-ink"/>
    <circle cx="82" cy="22" r="4" class="fill-orange"/>
  </g>

</svg>