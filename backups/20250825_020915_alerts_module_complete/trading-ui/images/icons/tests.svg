<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fill-ink { fill: #000000; }
      .fill-teal { fill: #26b7a9; }
      .fill-orange { fill: #fa5a00; }
      .ink { stroke: #000000; fill: none; }
      .teal { stroke: #26b7a9; fill: none; }
      .mono { fill: #000000; }
      .mono-soft { fill: #7a7a7a; }
      .mono-light { fill: #ffffff; }
    </style>
  </defs>

  <g>
    <!-- beaker -->
    <path d="M34 18 H66 V24 L58 44 V78 H42 V44 L34 24 Z" class="mono"/>
    <!-- liquid level -->
    <path d="M42 56 H58 V78 H42 Z" class="mono-soft"/>
    <!-- bubbles -->
    <circle cx="48" cy="52" r="3" class="mono-light"/>
    <circle cx="54" cy="64" r="2.5" class="mono-light"/>
  </g>

</svg>