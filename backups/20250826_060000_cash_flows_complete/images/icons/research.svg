<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fill-ink { fill: #000000; }
      .fill-teal { fill: #26b7a9; }
      .fill-orange { fill: #fa5a00; }
      .ink { stroke: #000000; fill: none; }
      .teal { stroke: #26b7a9; fill: none; }
      .mono { fill: #000000; }
      .mono-soft { fill: #7a7a7a; }
      .mono-light { fill: #ffffff; }
    </style>
  </defs>

  <g>
    <!-- bars -->
    <rect x="14" y="52" width="10" height="28" class="fill-ink"/>
    <rect x="30" y="44" width="10" height="36" class="fill-ink"/>
    <rect x="46" y="34" width="10" height="46" class="fill-ink"/>
    <rect x="62" y="58" width="10" height="22" class="fill-ink"/>
    <!-- magnifier -->
    <circle cx="72" cy="34" r="10" class="fill-teal"/>
    <rect x="78" y="42" width="14" height="6" rx="3" class="fill-teal" transform="rotate(35 78 42)"/>
    <!-- orange highlight -->
    <circle cx="62" cy="30" r="4" class="fill-orange"/>
  </g>

</svg>