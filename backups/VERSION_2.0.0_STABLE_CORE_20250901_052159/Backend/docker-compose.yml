version: '3.8'

services:
  tiktrack-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///db/tiktrack.db
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tiktrack-frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../trading-ui:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - tiktrack-backend
    restart: unless-stopped

networks:
  default:
    name: tiktrack-network

