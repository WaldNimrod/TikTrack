<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת סטטיסטיקות מערכת - TikTrack</title>

    <!-- Font Awesome -->

<body>
    <!-- רקע כללי -->
    <div class="background-wrapper">

        <!-- unified-header ייווצר כאן אוטומטית -->

        <!-- גוף הדף - כל התוכן אחרי הכותרת -->
        <div class="page-body">
            <!-- אזור בדיקת סטטיסטיקות - top-Section -->
            <div class="top-section system-stats-test-page">
                <!-- כותרת בדיקת סטטיסטיקות -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="/images/icons/development.svg" alt="בדיקת סטטיסטיקות" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        בדיקת סטטיסטיקות מערכת
                    </div>
                    <div class="table-actions">
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור בדיקת סטטיסטיקות">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>
            </div> <!-- סוף top-section -->

            <!-- תוכן ראשי -->
            <div class="main-content">

                <!-- אזור בדיקת סטטיסטיקות - content-section -->
                <div class="content-section system-stats-test-page">
                    <!-- כותרת בדיקת סטטיסטיקות -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="/images/icons/development.svg" alt="בדיקת סטטיסטיקות" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                            בדיקת סטטיסטיקות מערכת
                        </div>
                        <div class="table-count">
                            <img src="/images/icons/development.svg" alt="בדיקות" style="width: 16px; height: 16px; margin-left: 4px; vertical-align: middle;">
                            בדיקות
                        </div>
                        <div class="table-actions">
                            <button class="refresh-btn" onclick="clearStatsLogs()" title="נקה לוגים">
                                <img src="/images/icons/development.svg" alt="נקה" class="action-icon" style="width: 16px; height: 16px;"> נקה
                            </button>

                            <div class="action-separator"></div>
                            <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור בדיקת סטטיסטיקות">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- תוכן בדיקות -->
                    <div class="section-body">
                        <!-- Loading Indicator -->
                        <div id="loading-indicator" class="loading-overlay" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">טוען...</span>
                            </div>
                        </div>

                        <!-- Error Display -->
                        <div id="error-display" class="alert alert-danger" style="display: none;">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span id="error-message"></span>
                        </div>

                        <!-- Current Time Display -->
                        <div class="text-muted mb-3">
                            <i class="fas fa-clock me-1"></i>
                            <span id="current-time">טוען זמן...</span>
                        </div>

                        <!-- Two Column Layout -->
                        <div class="row">
                            <!-- Left Column - Tests -->
                            <div class="col-md-6">
                                <h6 class="mb-3"><i class="fas fa-flask me-2"></i>בדיקות</h6>
                                
                                <!-- System Tests -->
                                <div class="row">
                                    <!-- Memory Usage Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-memory me-1"></i>
                                                    זיכרון
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-info btn-sm" id="test-memory-usage" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-chart-pie me-1"></i>שימוש זיכרון
                                                    </button>
                                                    <button class="btn btn-outline-warning btn-sm" id="test-memory-leaks" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-search me-1"></i>דליפות
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Performance Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-tachometer-alt me-1"></i>
                                                    ביצועים
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-success btn-sm" id="test-response-time" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-stopwatch me-1"></i>זמן תגובה
                                                    </button>
                                                    <button class="btn btn-outline-primary btn-sm" id="test-cpu-usage" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-microchip me-1"></i>שימוש CPU
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Database Stats Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-database me-1"></i>
                                                    בסיס נתונים
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-secondary btn-sm" id="test-db-size" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-hdd me-1"></i>גודל DB
                                                    </button>
                                                    <button class="btn btn-outline-info btn-sm" id="test-db-connections" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-plug me-1"></i>חיבורים
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Network Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-network-wired me-1"></i>
                                                    רשת
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-warning btn-sm" id="test-network-latency" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-signal me-1"></i>עיכוב
                                                    </button>
                                                    <button class="btn btn-outline-success btn-sm" id="test-bandwidth" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-tachometer-alt me-1"></i>רוחב פס
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- System Info Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-info-circle me-1"></i>
                                                    מידע מערכת
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-primary btn-sm" id="test-system-info" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-server me-1"></i>פרטי מערכת
                                                    </button>
                                                    <button class="btn btn-outline-secondary btn-sm" id="test-uptime" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-clock me-1"></i>זמן פעילות
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Custom Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-cog me-1"></i>
                                                    בדיקה מותאמת
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="mb-1">
                                                    <div class="d-flex align-items-center mb-1">
                                                        <label class="form-label small mb-0 me-2">פקודה:</label>
                                                        <button class="btn btn-outline-secondary btn-sm" onclick="editCustomCommand()" title="ערוך">
                                                            <i class="fas fa-edit" style="font-size: 10px;"></i>
                                                        </button>
                                                    </div>
                                                    <div class="data-label" id="custom-command-label" style="font-size: 11px; line-height: 1.2; max-height: 30px; overflow: hidden; background: #f8f9fa; padding: 4px; border-radius: 3px;">free -h</div>
                                                    <textarea class="form-control form-control-sm" id="custom-command" rows="2" style="display: none; font-size: 10px;">free -h</textarea>
                                                </div>
                                                <button class="btn btn-warning btn-sm w-100" id="test-custom-command" style="font-size: 10px; padding: 2px 8px;">
                                                    <i class="fas fa-play me-1"></i>הרץ
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Right Column - Feedback -->
                            <div class="col-md-6">
                                <h6 class="mb-3"><i class="fas fa-comments me-2"></i>משוב</h6>
                                
                                <!-- Stats Results -->
                                <div class="card result-card mb-3">
                                    <div class="card-header py-2">
                                        <h6 class="card-title mb-0">
                                            <i class="fas fa-chart-bar me-2"></i>
                                            תוצאות סטטיסטיקות
                                        </h6>
                                    </div>
                                    <div class="card-body py-2">
                                        <div id="stats-results" style="max-height: 200px; overflow-y: auto;">
                                            <!-- תוצאות יוצגו כאן -->
                                        </div>
                                    </div>
                                </div>

                                <!-- Stats Logs -->
                                <div class="card log-card">
                                    <div class="card-header py-2">
                                        <h6 class="card-title mb-0">
                                            <i class="fas fa-file-alt me-2"></i>
                                            לוג בדיקות
                                            <button class="btn btn-sm btn-outline-secondary float-start" onclick="clearStatsLogs()">
                                                <i class="fas fa-trash me-1"></i>נקה
                                            </button>
                                        </h6>
                                    </div>
                                    <div class="card-body py-2">
                                        <div class="log-container" id="stats-test-logs" style="max-height: 300px; overflow-y: auto;">
                                            <!-- לוגים יוצגו כאן -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- סוף content-section -->
            </div> <!-- סוף main-content -->
        </div> <!-- סוף page-body -->
    </div> <!-- סוף background-wrapper -->

    <!-- JavaScript Files -->
    <script src="/scripts/header-system.js"></script>
    
    <script>
        // אתחול HeaderSystem
        document.addEventListener('DOMContentLoaded', () => {
            if (window.headerSystem && !window.headerSystem.isInitialized) {
                window.headerSystem.init();
            }
        });

        // ===== פונקציות בדיקת סטטיסטיקות מערכת =====
        
        // משתנים גלובליים
        let statsTestResults = [];

        // פונקציה לבדיקת שימוש זיכרון
        function testMemoryUsage() {
            console.log('🧪 Testing memory usage...');
            
            const memoryInfo = {
                total: Math.floor(Math.random() * 1000000) + 500000, // 500MB - 1.5GB
                used: Math.floor(Math.random() * 800000) + 200000,  // 200MB - 1GB
                free: Math.floor(Math.random() * 300000) + 100000,  // 100MB - 400MB
                timestamp: new Date().toISOString()
            };
            
            memoryInfo.usagePercent = ((memoryInfo.used / memoryInfo.total) * 100).toFixed(2);
            
            addResult('Memory Usage', 'info', 
                `שימוש זיכרון: ${memoryInfo.usagePercent}% (${formatBytes(memoryInfo.used)} / ${formatBytes(memoryInfo.total)})`, 
                memoryInfo
            );
        }

        // פונקציה לבדיקת דליפות זיכרון
        function testMemoryLeaks() {
            console.log('🧪 Testing memory leaks...');
            
            const leakTest = {
                iterations: 1000,
                memoryBefore: Math.floor(Math.random() * 100000) + 50000,
                memoryAfter: Math.floor(Math.random() * 100000) + 50000,
                timestamp: new Date().toISOString()
            };
            
            leakTest.difference = leakTest.memoryAfter - leakTest.memoryBefore;
            leakTest.hasLeak = leakTest.difference > 1000; // יותר מ-1KB נחשב דליפה
            
            addResult('Memory Leaks', leakTest.hasLeak ? 'warning' : 'success', 
                leakTest.hasLeak ? 
                    `נמצאה דליפת זיכרון: +${formatBytes(leakTest.difference)}` :
                    `לא נמצאו דליפות זיכרון: ${formatBytes(leakTest.difference)}`, 
                leakTest
            );
        }

        // פונקציה לבדיקת שימוש CPU
        function testCpuUsage() {
            console.log('🧪 Testing CPU usage...');
            
            const cpuInfo = {
                usage: Math.floor(Math.random() * 100), // 0-100%
                cores: 8,
                temperature: Math.floor(Math.random() * 30) + 40, // 40-70°C
                frequency: Math.floor(Math.random() * 2000) + 2000, // 2-4GHz
                timestamp: new Date().toISOString()
            };
            
            const status = cpuInfo.usage > 80 ? 'warning' : 
                          cpuInfo.usage > 60 ? 'info' : 'success';
            
            addResult('CPU Usage', status, 
                `שימוש CPU: ${cpuInfo.usage}% | טמפרטורה: ${cpuInfo.temperature}°C | תדר: ${cpuInfo.frequency}MHz`, 
                cpuInfo
            );
        }

        // פונקציה לבדיקת צוואר בקבוק CPU
        function testCpuBottleneck() {
            console.log('🧪 Testing CPU bottleneck...');
            
            const bottleneckTest = {
                processes: Math.floor(Math.random() * 50) + 10,
                highCpuProcesses: Math.floor(Math.random() * 10),
                avgResponseTime: Math.floor(Math.random() * 1000) + 100, // 100-1100ms
                timestamp: new Date().toISOString()
            };
            
            bottleneckTest.bottleneckDetected = bottleneckTest.highCpuProcesses > 5 || 
                                               bottleneckTest.avgResponseTime > 500;
            
            addResult('CPU Bottleneck', bottleneckTest.bottleneckDetected ? 'warning' : 'success', 
                bottleneckTest.bottleneckDetected ? 
                    `נמצא צוואר בקבוק: ${bottleneckTest.highCpuProcesses} תהליכים עם CPU גבוה` :
                    `לא נמצאו צווארי בקבוק CPU`, 
                bottleneckTest
            );
        }

        // פונקציה לבדיקת ביצועי בסיס נתונים
        function testDatabasePerformance() {
            console.log('🧪 Testing database performance...');
            
            const dbPerformance = {
                queries: Math.floor(Math.random() * 1000) + 100,
                avgQueryTime: Math.floor(Math.random() * 100) + 10, // 10-110ms
                slowQueries: Math.floor(Math.random() * 20),
                connections: Math.floor(Math.random() * 50) + 5,
                timestamp: new Date().toISOString()
            };
            
            const status = dbPerformance.avgQueryTime > 50 ? 'warning' : 
                          dbPerformance.avgQueryTime > 30 ? 'info' : 'success';
            
            addResult('Database Performance', status, 
                `זמן ממוצע לשאילתה: ${dbPerformance.avgQueryTime}ms | שאילתות איטיות: ${dbPerformance.slowQueries}`, 
                dbPerformance
            );
        }

        // פונקציה לבדיקת ביצועי רשת
        function testNetworkPerformance() {
            console.log('🧪 Testing network performance...');
            
            const networkPerformance = {
                latency: Math.floor(Math.random() * 100) + 10, // 10-110ms
                bandwidth: Math.floor(Math.random() * 100) + 50, // 50-150Mbps
                packetLoss: Math.random() * 5, // 0-5%
                connections: Math.floor(Math.random() * 100) + 10,
                timestamp: new Date().toISOString()
            };
            
            const status = networkPerformance.latency > 50 || networkPerformance.packetLoss > 2 ? 'warning' : 'success';
            
            addResult('Network Performance', status, 
                `עיכוב: ${networkPerformance.latency}ms | רוחב פס: ${networkPerformance.bandwidth}Mbps | אובדן חבילות: ${networkPerformance.packetLoss.toFixed(2)}%`, 
                networkPerformance
            );
        }

        // פונקציה לבדיקת מידע מערכת
        function testSystemInfo() {
            console.log('🧪 Testing system info...');
            
            const systemInfo = {
                platform: 'macOS',
                version: '14.0',
                architecture: 'x64',
                uptime: Math.floor(Math.random() * 86400) + 3600, // 1-24 שעות
                loadAverage: [Math.random() * 2, Math.random() * 2, Math.random() * 2],
                timestamp: new Date().toISOString()
            };
            
            systemInfo.uptimeFormatted = formatUptime(systemInfo.uptime);
            
            addResult('System Info', 'info', 
                `מערכת: ${systemInfo.platform} ${systemInfo.version} | זמן פעילות: ${systemInfo.uptimeFormatted}`, 
                systemInfo
            );
        }

        // פונקציה לבדיקת פקודה מותאמת
        function testCustomCommand() {
            console.log('🧪 Testing custom command...');
            
            const customCommandElement = document.getElementById('custom-command');
            if (!customCommandElement) {
                addResult('Custom Command', 'error', 'אלמנט פקודה מותאמת לא נמצא');
                return;
            }

            const command = customCommandElement.value.trim();
            if (!command) {
                addResult('Custom Command', 'warning', 'אין פקודה מותאמת להרצה');
                return;
            }

            // סימולציה של הרצת פקודה
            const commandResult = {
                command: command,
                output: `Output for: ${command}`,
                exitCode: Math.random() > 0.1 ? 0 : 1, // 90% הצלחה
                executionTime: Math.floor(Math.random() * 5000) + 100, // 100-5100ms
                timestamp: new Date().toISOString()
            };
            
            const status = commandResult.exitCode === 0 ? 'success' : 'error';
            
            addResult('Custom Command', status, 
                commandResult.exitCode === 0 ? 
                    `פקודה הורצה בהצלחה תוך ${commandResult.executionTime}ms` :
                    `פקודה נכשלה עם קוד יציאה ${commandResult.exitCode}`, 
                commandResult
            );
        }

        // פונקציה להוספת תוצאה
        function addResult(test, status, message, data = null) {
            console.log('📝 Adding result:', { test, status, message });
            
            const result = {
                timestamp: new Date().toLocaleTimeString('he-IL'),
                test: test,
                status: status,
                message: message,
                data: data
            };
            
            statsTestResults.push(result);
            displayResult(result);
        }

        // פונקציה לתצוגת תוצאה
        function displayResult(result) {
            const resultsContainer = document.getElementById('stats-results');
            if (!resultsContainer) {
                console.error('❌ Results container not found');
                return;
            }

            const resultElement = document.createElement('div');
            resultElement.className = `alert alert-${getStatusClass(result.status)} mb-2 fade-in`;
            
            let content = `
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong>${result.test}</strong> - ${result.message}
                        <br><small class="text-muted">${result.timestamp}</small>
                    </div>
                    <span class="badge bg-${getStatusClass(result.status)}">
                        ${getStatusText(result.status)}
                    </span>
                </div>
            `;
            
            if (result.data) {
                content += `
                    <details class="mt-2">
                        <summary>פרטי הנתונים</summary>
                        <pre class="mt-2 bg-light p-2 rounded"><code>${JSON.stringify(result.data, null, 2)}</code></pre>
                    </details>
                `;
            }
            
            resultElement.innerHTML = content;
            resultsContainer.appendChild(resultElement);
            
            // Scroll to bottom
            resultsContainer.scrollTop = resultsContainer.scrollHeight;
            
            console.log('✅ Result displayed');
        }

        // פונקציה לקבלת מחלקת סטטוס
        function getStatusClass(status) {
            switch (status) {
                case 'success': return 'success';
                case 'error': return 'danger';
                case 'warning': return 'warning';
                case 'info': return 'info';
                default: return 'secondary';
            }
        }

        // פונקציה לקבלת טקסט סטטוס
        function getStatusText(status) {
            switch (status) {
                case 'success': return 'הצלחה';
                case 'error': return 'שגיאה';
                case 'warning': return 'אזהרה';
                case 'info': return 'מידע';
                default: return 'לא ידוע';
            }
        }

        // פונקציה לניקוי לוגים
        function clearStatsLogs() {
            const resultsContainer = document.getElementById('stats-results');
            if (resultsContainer) {
                resultsContainer.innerHTML = '';
                statsTestResults = [];
                console.log('🧹 Stats logs cleared');
            }
        }

        // פונקציה לעריכת פקודה מותאמת
        function editCustomCommand() {
            const label = document.getElementById('custom-command-label');
            const textarea = document.getElementById('custom-command');
            if (label && textarea) {
                label.style.display = 'none';
                textarea.style.display = 'block';
                textarea.focus();
            }
        }

        // פונקציות עזר
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${hours}h ${minutes}m`;
        }

        // אתחול event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // אתחול עריכת פקודה מותאמת
            const customTextarea = document.getElementById('custom-command');
            const customLabel = document.getElementById('custom-command-label');
            if (customTextarea && customLabel) {
                customTextarea.addEventListener('blur', function() {
                    customLabel.textContent = this.value || 'אין פקודה';
                    customLabel.style.display = 'block';
                    this.style.display = 'none';
                });
            }

            // הוספת event listeners לכפתורים
            document.getElementById('test-memory-usage')?.addEventListener('click', testMemoryUsage);
            document.getElementById('test-memory-leaks')?.addEventListener('click', testMemoryLeaks);
            document.getElementById('test-cpu-usage')?.addEventListener('click', testCpuUsage);
            document.getElementById('test-cpu-bottleneck')?.addEventListener('click', testCpuBottleneck);
            document.getElementById('test-database-performance')?.addEventListener('click', testDatabasePerformance);
            document.getElementById('test-network-performance')?.addEventListener('click', testNetworkPerformance);
            document.getElementById('test-system-info')?.addEventListener('click', testSystemInfo);
            document.getElementById('test-custom-command')?.addEventListener('click', testCustomCommand);

            // הוספת הודעה ראשונית
            addResult('System', 'info', 'דף בדיקת סטטיסטיקות מערכת נטען בהצלחה');
        });
    </script>
