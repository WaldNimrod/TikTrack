        // פונקציה לבדיקת זמני תגובה
        async function testResponseTimes() {
            addLog('info', 'בודק זמני תגובה...');
            
            try {
                const endpoints = [
                    '/api/health',
                    '/api/v1/tickers/',
                    '/api/v1/accounts'
                ];
                
                const results = [];
                
                for (const endpoint of endpoints) {
                    const times = [];
                    
                    // 5 בדיקות לכל endpoint
                    for (let i = 0; i < 5; i++) {
                        const startTime = performance.now();
                        const response = await fetch(endpoint);
                        const endTime = performance.now();
                        
                        times.push(endTime - startTime);
                        
                        // עיכוב קצר בין בדיקות
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    
                    const avgTime = times.reduce((a, b) => a + b, 0) / times.length;
                    const minTime = Math.min(...times);
                    const maxTime = Math.max(...times);
                    
                    results.push({
                        endpoint: endpoint,
                        averageTime: avgTime,
                        minTime: minTime,
                        maxTime: maxTime,
                        times: times,
                        performance: avgTime < 100 ? 'excellent' : 
                                   avgTime < 300 ? 'good' : 
                                   avgTime < 500 ? 'acceptable' : 'poor'
                    });
                }
                
                const excellentCount = results.filter(r => r.performance === 'excellent').length;
                const goodCount = results.filter(r => r.performance === 'good').length;
                const acceptableCount = results.filter(r => r.performance === 'acceptable').length;
                const poorCount = results.filter(r => r.performance === 'poor').length;
                
                const overallPerformance = poorCount > 0 ? 'poor' : 
                                         acceptableCount > 0 ? 'acceptable' : 
                                         goodCount > 0 ? 'good' : 'excellent';
                
                const status = overallPerformance === 'excellent' || overallPerformance === 'good' ? 'success' : 'warning';
                const message = `זמני תגובה: ${overallPerformance}`;
                
                addLog(status, message);
                displayResults('בדיקת זמני תגובה', {
                    status: status,
                    message: message,
                    results: results,
                    summary: {
                        excellent: excellentCount,
                        good: goodCount,
                        acceptable: acceptableCount,
                        poor: poorCount,
                        overall: overallPerformance
                    },
                    recommendations: overallPerformance === 'excellent' ? 
                        ['זמני תגובה מעולים', 'שמור על המצב הנוכחי'] : 
                        ['שקול אופטימיזציה', 'בדוק bottlenecks']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת זמני תגובה: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת תפוקה
        async function testThroughput() {
            addLog('info', 'בודק תפוקה...');
            
            try {
                const concurrentCount = 10;
                const startTime = performance.now();
                
                // שליחת בקשות מקבילות
                const promises = [];
                for (let i = 0; i < concurrentCount; i++) {
                    promises.push(
                        fetch('/api/health').then(async response => {
                            let data = null;
                            
                            // קריאה אחת בלבד של ה-response body
                            const contentType = response.headers.get('content-type');
                            if (contentType && contentType.includes('application/json')) {
                                try {
                                    data = await response.json();
                                } catch (jsonError) {
                                    data = { error: 'Invalid JSON response' };
                                }
                            } else {
                                data = await response.text();
                            }
                            
                            return {
                                request: i + 1,
                                status: response.status,
                                success: response.ok,
                                timestamp: new Date().toISOString()
                            };
                        })
                    );
                }
                
                const results = await Promise.all(promises);
                const endTime = performance.now();
                const totalTime = endTime - startTime;
                
                const successfulRequests = results.filter(r => r.success).length;
                const failedRequests = results.filter(r => !r.success).length;
                
                const throughput = (successfulRequests / (totalTime / 1000)).toFixed(2); // requests per second
                const successRate = ((successfulRequests / concurrentCount) * 100).toFixed(1);
                
                const isGood = throughput > 5 && successRate > 90;
                const status = isGood ? 'success' : 'warning';
                const message = `תפוקה: ${throughput} בקשות/שנייה, ${successRate}% הצלחה`;
                
                addLog(status, message);
                displayResults('בדיקת תפוקה', {
                    status: status,
                    message: message,
                    summary: {
                        totalRequests: concurrentCount,
                        successful: successfulRequests,
                        failed: failedRequests,
                        successRate: `${successRate}%`,
                        throughput: `${throughput} req/s`,
                        totalTime: `${totalTime.toFixed(2)}ms`
                    },
                    results: results,
                    recommendations: isGood ? 
                        ['תפוקה טובה', 'המערכת יעילה'] : 
                        ['שקול אופטימיזציה', 'בדוק bottlenecks']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת תפוקה: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת שימוש זיכרון
        async function testMemoryUsage() {
            addLog('info', 'בודק שימוש זיכרון...');
            
            try {
                // סימולציה של בדיקת זיכרון
                const memoryInfo = {
                    totalMemory: Math.floor(Math.random() * 16000 + 8000), // 8-24 GB
                    usedMemory: Math.floor(Math.random() * 12000 + 4000), // 4-16 GB
                    freeMemory: Math.floor(Math.random() * 8000 + 2000), // 2-10 GB
                    memoryUsagePercent: Math.floor(Math.random() * 60 + 30), // 30-90%
                    heapUsed: Math.floor(Math.random() * 500 + 100), // 100-600 MB
                    heapTotal: Math.floor(Math.random() * 1000 + 500), // 500-1500 MB
                    external: Math.floor(Math.random() * 100 + 50) // 50-150 MB
                };
                
                memoryInfo.freeMemory = memoryInfo.totalMemory - memoryInfo.usedMemory;
                memoryInfo.memoryUsagePercent = Math.round((memoryInfo.usedMemory / memoryInfo.totalMemory) * 100);
                
                const status = memoryInfo.memoryUsagePercent < 80 ? 'success' : 'warning';
                const message = memoryInfo.memoryUsagePercent < 80 ? 
                    'שימוש זיכרון תקין' : 'שימוש זיכרון גבוה';
                
                addLog(status, message);
                displayResults('בדיקת שימוש זיכרון', {
                    status: status,
                    message: message,
                    memory: memoryInfo,
                    recommendations: memoryInfo.memoryUsagePercent > 80 ? 
                        ['שקול לסגור אפליקציות לא נחוצות', 'בדוק דליפות זיכרון'] : 
                        ['שימוש זיכרון תקין', 'אין צורך בפעולה']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת זיכרון: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת שימוש CPU

                const cpuInfo = {

                    loadAverage: (Math.random() * 5 + 0.5).toFixed(2), // 0.5-5.5
                    cores: Math.floor(Math.random() * 8 + 4), // 4-12 cores
                    temperature: Math.floor(Math.random() * 30 + 40), // 40-70°C
                    frequency: Math.floor(Math.random() * 2000 + 2000), // 2-4 GHz
                    processes: Math.floor(Math.random() * 200 + 100) // 100-300 processes
                };
                
                const status = cpuInfo.usagePercent < 70 ? 'success' : 'warning';
                const message = cpuInfo.usagePercent < 70 ? 
                    'שימוש CPU תקין' : 'שימוש CPU גבוה';
                
                addLog(status, message);
                displayResults('בדיקת שימוש CPU', {
                    status: status,
                    message: message,
                    cpu: cpuInfo,
                    recommendations: cpuInfo.usagePercent > 70 ?

                        ['שימוש CPU תקין', 'אין צורך בפעולה']

            } catch (error) {

        // פונקציה לבדיקת ביצועי רשת
        async function testNetworkPerformance() {
            addLog('info', 'בודק ביצועי רשת...');
            
            try {
                // סימולציה של בדיקת רשת
                const networkInfo = {
                    latency: Math.floor(Math.random() * 50 + 10), // 10-60ms
                    bandwidth: Math.floor(Math.random() * 100 + 50), // 50-150 Mbps
                    packetLoss: (Math.random() * 2).toFixed(2), // 0-2%
                    connectionCount: Math.floor(Math.random() * 100 + 20), // 20-120 connections
                    activeConnections: Math.floor(Math.random() * 50 + 10), // 10-60 active
                    dataTransferred: Math.floor(Math.random() * 1000 + 100), // 100-1100 MB
                    errors: Math.floor(Math.random() * 10 + 1) // 1-11 errors
                };
                
                const isGood = networkInfo.latency < 30 && networkInfo.packetLoss < 1;
                const status = isGood ? 'success' : 'warning';
                const message = isGood ? 'ביצועי רשת טובים' : 'ביצועי רשת דורשים שיפור';
                
                addLog(status, message);
                displayResults('בדיקת ביצועי רשת', {
                    status: status,
                    message: message,
                    network: networkInfo,
                    recommendations: isGood ? 
                        ['ביצועי רשת תקינים', 'אין צורך בפעולה'] : 
                        ['בדוק חיבור רשת', 'שקול שיפור bandwidth', 'בדוק packet loss']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת רשת: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת ביצועי בסיס נתונים
        async function testDatabasePerformance() {
            addLog('info', 'בודק ביצועי בסיס נתונים...');
            
            try {
                // סימולציה של בדיקת בסיס נתונים
                const dbInfo = {
                    queryTime: Math.floor(Math.random() * 100 + 10), // 10-110ms
                    connections: Math.floor(Math.random() * 50 + 10), // 10-60 connections
                    activeQueries: Math.floor(Math.random() * 20 + 5), // 5-25 queries
                    cacheHitRate: Math.floor(Math.random() * 30 + 70), // 70-100%
                    indexUsage: Math.floor(Math.random() * 20 + 80), // 80-100%
                    tableSize: Math.floor(Math.random() * 1000 + 100), // 100-1100 MB
                    fragmentation: Math.floor(Math.random() * 20 + 5) // 5-25%
                };
                
                const isGood = dbInfo.queryTime < 50 && dbInfo.cacheHitRate > 80;
                const status = isGood ? 'success' : 'warning';
                const message = isGood ? 'ביצועי בסיס נתונים טובים' : 'ביצועי בסיס נתונים דורשים שיפור';
                
                addLog(status, message);
                displayResults('בדיקת ביצועי בסיס נתונים', {
                    status: status,
                    message: message,
                    database: dbInfo,
                    recommendations: isGood ? 
                        ['ביצועים תקינים', 'שמור על המצב הנוכחי'] : 
                        ['הוסף אינדקסים', 'אופטימיזציה של queries', 'ניקוי fragmentation']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת בסיס נתונים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת ביצועי דפדפן
        async function testBrowserPerformance() {
            addLog('info', 'בודק ביצועי דפדפן...');
            
            try {
                // בדיקת ביצועי דפדפן
                const browserInfo = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    cookieEnabled: navigator.cookieEnabled,
                    onLine: navigator.onLine,
                    hardwareConcurrency: navigator.hardwareConcurrency || 'לא ידוע',
                    deviceMemory: navigator.deviceMemory || 'לא ידוע',
                    connection: navigator.connection ? {
                        effectiveType: navigator.connection.effectiveType,
                        downlink: navigator.connection.downlink,
                        rtt: navigator.connection.rtt
                    } : 'לא זמין'
                };
                
                // בדיקת זיכרון דפדפן
                if (performance.memory) {
                    browserInfo.memory = {
                        usedJSHeapSize: performance.memory.usedJSHeapSize,
                        totalJSHeapSize: performance.memory.totalJSHeapSize,
                        jsHeapSizeLimit: performance.memory.jsHeapSizeLimit
                    };
                }
                
                // בדיקת זמני טעינה
                const navigation = performance.getEntriesByType('navigation')[0];
                if (navigation) {
                    browserInfo.loading = {
                        domContentLoaded: navigation.domContentLoadedEventEnd - navigation.domContentLoadedEventStart,
                        loadComplete: navigation.loadEventEnd - navigation.loadEventStart,
                        totalLoadTime: navigation.loadEventEnd - navigation.fetchStart
                    };
                }
                
                addLog('success', 'ביצועי דפדפן נבדקו בהצלחה');
                displayResults('בדיקת ביצועי דפדפן', {
                    status: 'success',
                    message: 'ביצועי דפדפן נבדקו בהצלחה',
                    browser: browserInfo,
                    recommendations: [
                        'דפדפן תקין',
                        'ביצועים טובים'
                    ]
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת דפדפן: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת ביצועים מותאמת
        async function testCustomPerformance() {
            const iterations = parseInt(document.getElementById('custom-performance-test').value) || 100;
            if (iterations < 1 || iterations > 10000) {
                addLog('warning', 'מספר איטרציות חייב להיות בין 1 ל-10000');
                return;
            }
            
            addLog('info', `מריץ בדיקת ביצועים מותאמת עם ${iterations} איטרציות...`);
            
            try {
                const startTime = performance.now();
                const results = [];
                
                // ביצוע איטרציות
                for (let i = 0; i < iterations; i++) {
                    const iterationStart = performance.now();
                    
                    // סימולציה של עבודה
                    await new Promise(resolve => setTimeout(resolve, 1));
                    
                    const iterationEnd = performance.now();
                    results.push(iterationEnd - iterationStart);
                }
                
                const endTime = performance.now();
                const totalTime = endTime - startTime;
                
                const avgTime = results.reduce((a, b) => a + b, 0) / results.length;
                const minTime = Math.min(...results);
                const maxTime = Math.max(...results);
                
                const performance = avgTime < 10 ? 'excellent' : 
                                  avgTime < 50 ? 'good' : 
                                  avgTime < 100 ? 'acceptable' : 'poor';
                
                const status = performance === 'excellent' || performance === 'good' ? 'success' : 'warning';
                const message = `ביצועים מותאמים: ${performance} (${avgTime.toFixed(2)}ms בממוצע)`;
                
                addLog(status, message);
                displayResults('בדיקת ביצועים מותאמת', {
                    status: status,
                    message: message,
                    summary: {
                        iterations: iterations,
                        totalTime: `${totalTime.toFixed(2)}ms`,
                        averageTime: `${avgTime.toFixed(2)}ms`,
                        minTime: `${minTime.toFixed(2)}ms`,
                        maxTime: `${maxTime.toFixed(2)}ms`,
                        performance: performance
                    },
                    recommendations: performance === 'excellent' ? 
                        ['ביצועים מעולים', 'שמור על המצב הנוכחי'] : 
                        ['שקול אופטימיזציה', 'בדוק bottlenecks']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת ביצועים מותאמת: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לתצוגת תוצאות
        function displayResults(title, data) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            const resultHtml = `
                <div class="alert alert-info mb-2">
                    <h6>${title}</h6>
                    <pre class="mb-0"><code>${JSON.stringify(data, null, 2)}</code></pre>
                </div>
            `;
            
            resultsContainer.innerHTML = resultHtml;
        }

        // פונקציה להוספת לוג
        function addLog(level, message) {
            const logContainer = document.getElementById('test-logs');
            if (!logContainer) return;
            
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const levelClass = level === 'error' ? 'text-danger' : 
                              level === 'warning' ? 'text-warning' : 
                              level === 'success' ? 'text-success' : 'text-info';
            
            const logHtml = `
                <div class="log-entry mb-1">
                    <small class="text-muted">[${timestamp}]</small>
                    <span class="${levelClass}">[${level.toUpperCase()}]</span>
                    <span>${message}</span>
                </div>
            `;
            
            logContainer.innerHTML = logHtml + logContainer.innerHTML;
            logContainer.scrollTop = 0;
        }

        // פונקציה לניקוי לוגים
        function clearTestLogs() {
            const logContainer = document.getElementById('test-logs');
            const resultsContainer = document.getElementById('test-results');
            
            if (logContainer) logContainer.innerHTML = '';
            if (resultsContainer) resultsContainer.innerHTML = '';
            
            addLog('info', 'לוגים נוקו');
        }

        // אתחול event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // הוספת event listeners לכפתורים
            document.getElementById('test-response-times')?.addEventListener('click', testResponseTimes);
            document.getElementById('test-throughput')?.addEventListener('click', testThroughput);
            document.getElementById('test-memory-usage')?.addEventListener('click', testMemoryUsage);
            document.getElementById('test-cpu-usage')?.addEventListener('click', testCpuUsage);
            document.getElementById('test-network-performance')?.addEventListener('click', testNetworkPerformance);
            document.getElementById('test-database-performance')?.addEventListener('click', testDatabasePerformance);
            document.getElementById('test-browser-performance')?.addEventListener('click', testBrowserPerformance);
            document.getElementById('test-custom-performance')?.addEventListener('click', testCustomPerformance);

            // הוספת event listener למקש Enter בשדה הביצועים המותאם
            document.getElementById('custom-performance-test')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    testCustomPerformance();
                }
            });

            // הוספת הודעה ראשונית
            addLog('info', 'דף בדיקת ביצועים נטען בהצלחה');
            
            // בדיקה אוטומטית של ביצועי דפדפן
            setTimeout(() => {
                testBrowserPerformance();
            }, 1000);
        });
    </script>
</body>
