<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת טיקרים - Tik.track</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles/table.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .test-header {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .test-status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .test-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .test-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .test-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="test-header">
            <h1>🧪 בדיקת טיקרים - דף בדיקה</h1>
            <p>דף פשוט לבדיקת טעינת נתוני טיקרים</p>
            <div id="testStatus"></div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>טבלת טיקרים</h5>
                        <button class="btn btn-primary btn-sm" onclick="loadTickersTest()">🔄 טען נתונים</button>
                        <button class="btn btn-success btn-sm" onclick="addTestData()">➕ הוסף נתוני בדיקה</button>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped" id="tickersTable">
                            <thead>
                                <tr>
                                    <th>סמל</th>
                                    <th>שם</th>
                                    <th>סוג</th>
                                    <th>מטבע</th>
                                    <th>פעיל</th>
                                    <th>נוצר ב</th>
                                    <th>עודכן ב</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="text-center text-muted">טוען נתונים...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/date-utils.js"></script>
    <script src="scripts/header-system.js"></script>
    <script src="scripts/console-cleanup.js"></script>
    <script src="scripts/simple-filter.js"></script>
    <script src="scripts/translation-utils.js"></script>
    <script src="scripts/data-utils.js"></script>
    <script src="scripts/ui-utils.js"></script>
    <script src="scripts/table-mappings.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/linked-items.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/alerts.js"></script>

    <script>
        // משתנים גלובליים
        let tickersData = [];

        // פונקציה להוספת הודעת בדיקה
        function addTestMessage(message, type = 'info') {
            const statusDiv = document.getElementById('testStatus');
            const messageDiv = document.createElement('div');
            messageDiv.className = `test-status test-${type}`;
            messageDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            statusDiv.appendChild(messageDiv);
        }

        // פונקציה לטעינת נתונים מהשרת
        async function loadTickersTest() {
            addTestMessage('🔄 מתחיל טעינת נתונים...', 'info');
            addTestMessage(`🔍 tickersData לפני טעינה: ${tickersData.length}`, 'info');

            try {
                const response = await fetch('/api/v1/tickers/');
                addTestMessage(`📡 תגובה מהשרת: ${response.status} ${response.statusText}`, 'info');

                if (response.ok) {
                    const data = await response.json();
                    tickersData = data.data || data;
                    addTestMessage(`✅ נטענו ${tickersData.length} טיקרים`, 'success');
                    addTestMessage(`🔍 tickersData אחרי טעינה: ${tickersData.length}`, 'info');
                    updateTickersTableTest();
                } else {
                    addTestMessage(`❌ שגיאה: ${response.status} ${response.statusText}`, 'error');
                    if (typeof window.showErrorNotification === 'function') {
                        window.showErrorNotification('❌ שגיאה בטעינת נתונים');
                    }
                }
            } catch (error) {
                addTestMessage(`❌ שגיאה בטעינה: ${error.message}`, 'error');
                if (typeof window.showErrorNotification === 'function') {
                    window.showErrorNotification('❌ שגיאה בטעינת נתונים');
                }
            }
        }

        // פונקציה לעדכון הטבלה
        function updateTickersTableTest() {
            const tbody = document.querySelector('#tickersTable tbody');
            if (!tbody) {
                addTestMessage('❌ לא נמצא tbody בטבלה', 'error');
                return;
            }

            addTestMessage(`🔄 מעדכן טבלה עם ${tickersData.length} שורות`, 'info');

            if (tickersData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">לא נמצאו טיקרים</td></tr>';
                addTestMessage('⚠️ אין נתונים להצגה', 'info');
                return;
            }

            const tableRows = tickersData.map(ticker => {
                return `
                    <tr>
                        <td><strong>${ticker.symbol || 'N/A'}</strong></td>
                        <td>${ticker.name || 'N/A'}</td>
                        <td>${ticker.type || 'N/A'}</td>
                        <td>${ticker.currency_id || 'N/A'}</td>
                        <td>${ticker.active_trades ? '✅' : '❌'}</td>
                        <td>${ticker.created_at ? (typeof window.formatDateOnly === 'function' ? window.formatDateOnly(ticker.created_at) : new Date(ticker.created_at).toLocaleDateString('he-IL')) : 'N/A'}</td>
                        <td>${ticker.updated_at ? (typeof window.formatDateOnly === 'function' ? window.formatDateOnly(ticker.updated_at) : new Date(ticker.updated_at).toLocaleDateString('he-IL')) : 'N/A'}</td>
                    </tr>
                `;
            }).join('');

            tbody.innerHTML = tableRows;
            addTestMessage(`✅ טבלה עודכנה בהצלחה עם ${tickersData.length} שורות`, 'success');
        }

        // פונקציה להוספת נתוני בדיקה
        function addTestData() {
            tickersData = [
                {
                    id: 1,
                    symbol: 'AAPL',
                    name: 'Apple Inc.',
                    type: 'stock',
                    currency_id: 1,
                    active_trades: true,
                    created_at: '2025-01-01T00:00:00',
                    updated_at: '2025-01-01T00:00:00'
                },
                {
                    id: 2,
                    symbol: 'GOOGL',
                    name: 'Alphabet Inc.',
                    type: 'stock',
                    currency_id: 1,
                    active_trades: false,
                    created_at: '2025-01-01T00:00:00',
                    updated_at: '2025-01-01T00:00:00'
                }
            ];
            addTestMessage('➕ הוספתי נתוני בדיקה', 'success');
            updateTickersTableTest();
        }

        // טעינה אוטומטית בטעינת הדף
        document.addEventListener('DOMContentLoaded', function () {
            addTestMessage('🚀 דף בדיקה נטען', 'success');

            // אתחול מערכת הכותרת
            if (typeof window.headerSystem !== 'undefined') {
                addTestMessage('🔧 מאתחל מערכת כותרת', 'info');
                window.headerSystem.init();
            }

            loadTickersTest();
        });
    </script>
</body>

</html>
