<!DOCTYPE html>

<head>

<body class="trading-accounts-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Trading Accounts area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/accounts.svg" alt="חשבונות מסחר" class="section-icon">
                        חשבונות מסחר
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והחשבונות">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור חשבונות מסחר">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ חשבונות: <strong id="totalAccounts">0</strong></div>
                        <div>חשבונות פעילים: <strong id="activeAccounts">0</strong></div>
                        <div>חשבונות פתוחים: <strong id="openAccounts">0</strong></div>
                        <div>סה"כ יתרה: <strong id="totalBalance">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Accounts management area - content-section -->
                <div class="content-section" id="main">
                    <!-- Accounts header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/accounts.svg" alt="ניהול חשבונות מסחר" class="section-icon">
                            ניהול חשבונות מסחר
                        </div>
                        <div class="table-count" id="accountsCount">טוען...</div>
                        <div class="table-actions">
                            <button id="addAccountBtn" class="refresh-btn" onclick="showAddAccountModal()" title="הוסף חשבון מסחר חדש">
                                <img src="images/icons/accounts.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול חשבונות מסחר">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- Accounts table -->
                    <div class="section-body">
                        <div class="table-responsive" id="accountsContainer">
                            <table class="table" id="accountsTable" data-table-type="accounts">
                                <thead>
                                    <tr>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                שם החשבון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מטבע <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                יתרה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                נוצר ב <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="actions-cell">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="7" class="loading">טוען חשבונות...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Account Modal -->
        <div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addAccountModalLabel">הוספת חשבון מסחר חדש</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addAccountForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountName" class="form-label">שם החשבון</label>
                                        <input type="text" class="form-control" id="accountName" placeholder="שם החשבון" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountType" class="form-label">סוג החשבון</label>
                                        <select class="form-select" id="accountType" required>
                                            <option value="">בחר סוג חשבון</option>
                                            <option value="demo">דמו</option>
                                            <option value="live">חי</option>
                                            <option value="paper">נייר</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="accountCurrency" required>
                                            <option value="">בחר מטבע</option>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountBalance" class="form-label">יתרה התחלתית</label>
                                        <input type="number" class="form-control" id="accountBalance" step="0.01" min="0" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="accountDescription" class="form-label">תיאור החשבון</label>
                                        <textarea class="form-control" id="accountDescription" rows="3" placeholder="תיאור החשבון..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="addAccount()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            חשבון</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Account Modal -->
        <div class="modal fade" id="editAccountModal" tabindex="-1" aria-labelledby="editAccountModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editAccountModalLabel">עריכת חשבון מסחר</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editAccountForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountName" class="form-label">שם החשבון</label>
                                        <input type="text" class="form-control" id="editAccountName" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountType" class="form-label">סוג החשבון</label>
                                        <select class="form-select" id="editAccountType" required>
                                            <option value="demo">דמו</option>
                                            <option value="live">חי</option>
                                            <option value="paper">נייר</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="editAccountCurrency" required>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountBalance" class="form-label">יתרה נוכחית</label>
                                        <input type="number" class="form-control" id="editAccountBalance" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editAccountDescription" class="form-label">תיאור החשבון</label>
                                        <textarea class="form-control" id="editAccountDescription" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="updateAccount()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
                            חשבון</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=20251001"></script>
    <script src="scripts/unified-app-initializer.js?v=20251001"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=20251001"></script>
    <script src="scripts/translation-system.js?v=20251001"></script>
    <script src="scripts/page-state-management.js?v=20251001"></script>
    <script src="scripts/section-state-persistence.js?v=20251001"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/modal-management.js?v=20251001"></script>
    <script src="scripts/notification-system.js?v=20251001"></script>
    <script src="scripts/confirm-replacement.js?v=20251001"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=20251001"></script>
    <script src="scripts/unified-cache-manager.js?v=20251001"></script>
    <script src="scripts/cache-policy-manager.js?v=20251001"></script>
    <script src="scripts/memory-optimizer.js?v=20251001"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
    <script src="scripts/ui-utils.js?v=20251001"></script>
    <script src="scripts/color-scheme-system.js?v=20251001"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- Stage 6: Data and Utility Systems -->
    <script src="scripts/data-utils.js?v=20251001"></script>
    <script src="scripts/tables.js?v=20251001"></script>
    <script src="scripts/table-mapping.js?v=20251001"></script>
    <script src="scripts/page-utils.js?v=20251001"></script>
    
    <!-- Stage 7: Additional Systems (As needed) -->
    <script src="scripts/notification-category-detector.js?v=20251001"></script>
    <script src="scripts/global-notification-collector.js?v=20251001"></script>
    <script src="scripts/system-management.js?v=20251001"></script>
    <script src="scripts/realtime-notifications-client.js?v=20251001"></script>
    <script src="scripts/error-handlers.js?v=20251001"></script>
    
    <!-- Stage 8: Page-specific Script -->
    <script src="scripts/trading_accounts.js?v=20251001"></script>
    
    <!-- Local copyDetailedLog function for trading_accounts page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
