[tool:pytest]
testpaths = unit_tests integration_tests e2e_tests performance_tests load_tests security_tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --maxfail=10
    --timeout=300
    --durations=10
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    performance: Performance tests
    load: Load tests
    security: Security tests
    slow: Slow running tests
    critical: Critical tests
    safe: Safe tests (database protected)
    fast: Fast tests
    database: Database tests
    api: API tests
    ui: UI tests
    smoke: Smoke tests
    regression: Regression tests
    unit_tests: Unit test category
    integration_tests: Integration test category
    e2e_tests: End-to-end test category
    performance_tests: Performance test category
    load_tests: Load test category
    security_tests: Security test category

# Safety settings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# Test discovery
norecursedirs = 
    .git
    .pytest_cache
    __pycache__
    *.egg
    build
    dist
    node_modules
    venv
    env
    .venv
    .env

# Coverage settings
[coverage:run]
source = 
    ../models
    ../routes
    ../services
    ../config
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
