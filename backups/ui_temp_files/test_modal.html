<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מודל פריטים מקושרים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1>בדיקת מודל פריטים מקושרים</h1>
        <button class="btn btn-primary" onclick="testDisplayFunction()">בדוק פונקציית displayLinkedItems</button>
        <button class="btn btn-danger" onclick="testModal()">בדוק מודל</button>

        <div class="mt-3">
            <h3>תוצאה:</h3>
            <div id="testResult" class="border p-3" style="min-height: 200px;"></div>
        </div>
    </div>

    <!-- מודל פריטים מקושרים -->
    <div class="modal fade" id="linkedItemsModal" tabindex="-1" aria-labelledby="linkedItemsModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="linkedItemsModalLabel">לא ניתן למחוק טיקר עם פריטים מקושרים</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-warning">
                        <strong>⚠️ לא ניתן למחוק את הטיקר <span id="linkedTickerName"></span></strong>
                        <br>
                        הטיקר מקושר לפריטים הבאים במערכת. יש לטפל בהם תחילה:
                    </div>

                    <div id="linkedItemsContent">
                        <!-- תוכן הפריטים המקושרים יוצג כאן -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // נתוני בדיקה
        const testData = {
            "alerts": [],
            "has_linked_items": true,
            "notes": [],
            "open_trade_plans": [],
            "open_trades": [
                {
                    "account_id": 20,
                    "account_name": "Test Account for Trade",
                    "cancel_reason": null,
                    "cancelled_at": null,
                    "closed_at": null,
                    "created_at": "2025-08-18 21:29:34",
                    "id": 10,
                    "notes": "Test trade",
                    "side": "Long",
                    "status": "open",
                    "ticker_id": 44,
                    "ticker_symbol": "TEST_TRADE_1755552574",
                    "total_pl": 0.0,
                    "trade_plan_id": 1,
                    "type": "swing"
                }
            ]
        };

        // פונקציית displayLinkedItems מפושטת
        function displayLinkedItems(linkedItems) {
            console.log('🔄 הצגת פריטים מקושרים:', linkedItems);
            console.log('📊 סוג הנתונים:', typeof linkedItems);
            console.log('📊 מפתחות:', Object.keys(linkedItems || {}));

            const contentDiv = document.getElementById('linkedItemsContent');
            let html = '';

            // טריידים פתוחים
            console.log('🔍 בדיקת טריידים פתוחים:', linkedItems.open_trades);
            console.log('🔍 האם קיים open_trades?', !!linkedItems.open_trades);
            console.log('🔍 אורך open_trades:', linkedItems.open_trades ? linkedItems.open_trades.length : 'undefined');

            if (linkedItems.open_trades && linkedItems.open_trades.length > 0) {
                console.log('✅ נמצאו טריידים פתוחים, יוצר HTML');
                html += `
                    <div class="card mb-3">
                        <div class="card-header bg-warning text-dark">
                            <h6 class="mb-0">🔄 טריידים פתוחים (${linkedItems.open_trades.length})</h6>
                        </div>
                        <div class="card-body">
                            <p><strong>נמצאו ${linkedItems.open_trades.length} טריידים פתוחים:</strong></p>
                            <ul>
                                ${linkedItems.open_trades.map(trade => `
                                    <li>
                                        טרייד #${trade.id} - חשבון: ${trade.account_name || 'לא זמין'} - סטטוס: ${trade.status}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }

            console.log('🔍 HTML שנוצר:', html);

            if (!html) {
                html = '<div class="alert alert-success">✅ לא נמצאו פריטים מקושרים פתוחים. ניתן למחוק את הטיקר בבטחה.</div>';
            }

            contentDiv.innerHTML = html;
        }

        // פונקציית בדיקה
        function testDisplayFunction() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '';

            displayLinkedItems(testData);

            resultDiv.innerHTML = `
                <h4>פונקציית displayLinkedItems הורצה</h4>
                <p>בדוק את הקונסול לפרטים נוספים</p>
                <p>תוכן המודל עודכן</p>
            `;
        }

        // פונקציית בדיקת מודל
        function testModal() {
            document.getElementById('linkedTickerName').textContent = 'TEST_TRADE_1755552574 - Test Ticker';
            displayLinkedItems(testData);

            const modal = new bootstrap.Modal(document.getElementById('linkedItemsModal'));
            modal.show();
        }
    </script>
</body>

</html>
