<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>Modal Navigation Debug</title>
</head>
<body>
    <h1>Modal Navigation Debug Console</h1>
    <p>פתח את הקונסולה (F12) והעתק את הפלט</p>
    
    <script>
        // קוד בדיקה מקיף
        console.log('=== MODAL NAVIGATION DEBUG ===');
        console.log('1. Checking ModalNavigationManager class:', typeof ModalNavigationManager);
        console.log('2. Checking window.modalNavigationManager:', typeof window.modalNavigationManager);
        console.log('3. Checking if initialized:', window.modalNavigationManager?.isInitialized);
        console.log('4. Checking modalHistory:', window.modalNavigationManager?.modalHistory?.length || 0);
        console.log('5. Document ready state:', document.readyState);
        console.log('6. Checking for shown.bs.modal listeners:', 'Check event listeners in DevTools');
        
        // בדיקה אם יש שגיאות בטעינת הקובץ
        const scripts = Array.from(document.querySelectorAll('script[src]'));
        const modalNavScript = scripts.find(s => s.src.includes('modal-navigation-manager'));
        console.log('7. modal-navigation-manager script found:', !!modalNavScript);
        if (modalNavScript) {
            console.log('   Script URL:', modalNavScript.src);
        }
        
        // בדיקת Bootstrap
        console.log('8. Bootstrap available:', typeof bootstrap !== 'undefined');
        if (typeof bootstrap !== 'undefined') {
            console.log('   Bootstrap version:', bootstrap?.Modal?.VERSION || 'unknown');
        }
        
        // בדיקת event listeners
        console.log('9. Event listeners check:');
        console.log('   Use DevTools -> Elements -> Event Listeners tab to check shown.bs.modal');
        
        // בדיקת modal element
        const modal = document.getElementById('entityDetailsModal');
        console.log('10. entityDetailsModal element:', !!modal);
        if (modal) {
            console.log('    Modal classes:', modal.className);
            console.log('    Modal display:', window.getComputedStyle(modal).display);
        }
        
        // בדיקה אם יש breadcrumb
        const breadcrumb = document.getElementById('entityDetailsBreadcrumb');
        console.log('11. Breadcrumb element:', !!breadcrumb);
        if (breadcrumb) {
            console.log('    Breadcrumb HTML:', breadcrumb.innerHTML.substring(0, 100));
        }
        
        // בדיקה אם יש כפתור חזור
        const backButton = document.querySelector('[data-button-type="BACK"]');
        console.log('12. Back button found:', !!backButton);
        if (backButton) {
            console.log('    Back button display:', window.getComputedStyle(backButton).display);
            console.log('    Back button disabled:', backButton.disabled);
        }
        
        console.log('=== END DEBUG ===');
        console.log('Copy all the output above and send to developer');
    </script>
</body>
</html>
