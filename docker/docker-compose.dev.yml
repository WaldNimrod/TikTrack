version: "3.8"

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: tiktrack-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiktrack_dev}
      POSTGRES_USER: ${POSTGRES_USER:-tiktrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiktrack_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tiktrack} -d ${POSTGRES_DB:-tiktrack_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend-dev:
    build:
      context: ../Backend
    container_name: tiktrack-backend-dev
    command: ["python", "app.py"]
    environment:
      TIKTRACK_ENV: development
      TIKTRACK_DEV_MODE: "true"
      POSTGRES_HOST: postgres-dev
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-tiktrack_dev}
      POSTGRES_USER: ${POSTGRES_USER:-tiktrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiktrack_dev_password}
      DATABASE_URL: >-
        postgresql+psycopg2://${POSTGRES_USER:-tiktrack}:${POSTGRES_PASSWORD:-tiktrack_dev_password}@postgres-dev:5432/${POSTGRES_DB:-tiktrack_dev}
    volumes:
      - ../Backend:/app
      - ../Backend/logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres-dev:
        condition: service_healthy
    restart: unless-stopped

  frontend-dev:
    image: nginx:alpine
    container_name: tiktrack-frontend-dev
    ports:
      - "8081:80"
    volumes:
      - ../trading-ui:/usr/share/nginx/html:ro
      - ../Backend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-dev
    restart: unless-stopped

volumes:
  postgres-dev-data:

