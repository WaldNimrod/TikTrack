# Market Data System Settings (MD-SETTINGS) — OpenAPI Addendum
# Integrate paths into OPENAPI_SPEC_V2.5.2.yaml (or OPENAPI_SPEC_V2_FINAL.yaml).
# SSOT: TT2_MARKET_DATA_SYSTEM_SETTINGS_SSOT
# Admin-only. Resolution: DB > env. Error contract: 403 (non-admin), 422 (validation / no fields).

paths:
  /settings/market-data:
    get:
      summary: "Get Market Data System Settings (Admin-only)"
      tags: [settings]
      security: [{ bearerAuth: [] }]
      description: "Returns current settings. Resolution DB > env. TT2_MARKET_DATA_SYSTEM_SETTINGS_SSOT."
      responses:
        '200':
          description: "OK — current settings"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketDataSettingsResponse' }
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: "Forbidden — non-admin user"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      summary: "Update Market Data System Settings (Admin-only)"
      tags: [settings]
      security: [{ bearerAuth: [] }]
      description: "Partial update. Persists to market_data.system_settings. Validates min/max per SSOT."
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MarketDataSettingsPatch' }
      responses:
        '200':
          description: "OK — updated settings"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketDataSettingsResponse' }
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: "Forbidden — non-admin user"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: "Unprocessable — no fields to update, or validation errors (out of range)"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '503':
          description: "Service Unavailable — table not migrated"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

components:
  schemas:
    MarketDataSettingsResponse:
      type: object
      required:
        - max_active_tickers
        - intraday_interval_minutes
        - provider_cooldown_minutes
        - max_symbols_per_request
        - delay_between_symbols_seconds
        - intraday_enabled
      properties:
        max_active_tickers: { type: integer, minimum: 1, maximum: 500 }
        intraday_interval_minutes: { type: integer, minimum: 5, maximum: 240 }
        provider_cooldown_minutes: { type: integer, minimum: 5, maximum: 120 }
        max_symbols_per_request: { type: integer, minimum: 1, maximum: 50 }
        delay_between_symbols_seconds: { type: integer, minimum: 0, maximum: 30 }
        intraday_enabled: { type: boolean }
    MarketDataSettingsPatch:
      type: object
      description: "Partial update — only provided keys are updated."
      properties:
        max_active_tickers: { type: integer, minimum: 1, maximum: 500, nullable: true }
        intraday_interval_minutes: { type: integer, minimum: 5, maximum: 240, nullable: true }
        provider_cooldown_minutes: { type: integer, minimum: 5, maximum: 120, nullable: true }
        max_symbols_per_request: { type: integer, minimum: 1, maximum: 50, nullable: true }
        delay_between_symbols_seconds: { type: integer, minimum: 0, maximum: 30, nullable: true }
        intraday_enabled: { type: boolean, nullable: true }
