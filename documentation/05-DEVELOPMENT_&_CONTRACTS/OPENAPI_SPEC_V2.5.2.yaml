openapi: 3.0.0
info:
  title: TikTrack Project Phoenix API (Master Release)
  version: 2.5.2
  description: Unified API Specification (Fortress Protocol) - Updated with Authentication & Identity endpoints
servers:
  - url: http://localhost:8080/api/v1
    description: Development server

paths:
  /health:
    get:
      summary: "System Health Check"
      tags:
        - system
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /auth/register:
    post:
      summary: "Register new user"
      tags:
        - authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: "User registered successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "refresh_token=httpOnly cookie"
        '400':
          description: "Bad request (duplicate user, validation error)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: "User authentication"
      tags:
        - authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: "Authentication successful"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "refresh_token=httpOnly cookie"
        '401':
          description: "Invalid credentials"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: "Refresh access token (with rotation)"
      tags:
        - authentication
      description: |
        Refreshes access token using refresh token from httpOnly cookie.
        Implements refresh token rotation - issues new refresh token.
      responses:
        '200':
          description: "Token refreshed successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "refresh_token=httpOnly cookie (new token)"
        '401':
          description: "Invalid or expired refresh token"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: "Logout user - revoke tokens"
      tags:
        - authentication
      description: |
        Revokes access token (adds to blacklist) and refresh token.
        Clears refresh token cookie.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: "Logout successful"
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 GMT (cleared)"
        '401':
          description: "Invalid token"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      summary: "Request password reset (EMAIL or SMS)"
      tags:
        - authentication
      description: "Request password reset via EMAIL (token) or SMS (verification code). Always returns success to prevent user enumeration."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: "Reset request accepted (always returns success for security)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "If the account exists, a reset link has been sent"
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-reset:
    post:
      summary: "Verify and complete password reset"
      tags:
        - authentication
      description: "Verify reset token (EMAIL) or verification code (SMS) and update password."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetVerify'
      responses:
        '200':
          description: "Password reset successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successfully"
                  user_id:
                    type: string
                    pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
                    example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        '400':
          description: "Invalid token/code or expired"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-phone:
    post:
      summary: "Verify phone number with SMS code"
      tags:
        - authentication
      security:
        - bearerAuth: []
      description: "Verify user's phone number using SMS verification code. If no pending code exists, sends a new code."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verification_code
              properties:
                verification_code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: "6-digit verification code from SMS"
                  example: "123456"
      responses:
        '200':
          description: "Phone verified successfully or code sent"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Phone number verified successfully"
                  phone_number:
                    type: string
                    example: "+1234567890"
                  verified:
                    type: boolean
                    example: true
                  verified_at:
                    type: string
                    format: date-time
                    nullable: true
        '400':
          description: "Invalid code or missing phone number"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      summary: "Get current user profile (D25)"
      tags:
        - users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "User profile"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: "Update user profile (D25)"
      tags:
        - users
      security:
        - bearerAuth: []
      description: "Update user profile fields. Phone number changes require verification via /auth/verify-phone."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: "Profile updated successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: "Invalid input"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/api-keys:
    get:
      summary: "List user's API keys (D24)"
      tags:
        - api-keys
      security:
        - bearerAuth: []
      description: "List all API keys for the authenticated user. Returns masked keys."
      responses:
        '200':
          description: "List of API keys"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserApiKeyResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: "Create new API key (D24)"
      tags:
        - api-keys
      security:
        - bearerAuth: []
      description: "Create a new API key for a provider. Keys are encrypted before storage."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserApiKeyCreate'
      responses:
        '201':
          description: "API key created successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiKeyResponse'
        '400':
          description: "Invalid input or duplicate key"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/api-keys/{key_id}:
    put:
      summary: "Update API key (D24)"
      tags:
        - api-keys
      security:
        - bearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "API key ULID"
      description: "Update API key (label, status, or re-encrypt keys)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_label:
                  type: string
                  nullable: true
                is_active:
                  type: boolean
                  nullable: true
                api_key:
                  type: string
                  nullable: true
                api_secret:
                  type: string
                  nullable: true
                additional_config:
                  type: object
                  nullable: true
      responses:
        '200':
          description: "API key updated successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiKeyResponse'
        '400':
          description: "Invalid input"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "API key not found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: "Delete API key (D24)"
      tags:
        - api-keys
      security:
        - bearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "API key ULID"
      description: "Delete API key (soft delete - sets deleted_at timestamp)."
      responses:
        '204':
          description: "API key deleted successfully"
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "API key not found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/api-keys/{key_id}/verify:
    post:
      summary: "Verify API key against provider (D24)"
      tags:
        - api-keys
      security:
        - bearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "API key ULID"
      description: "Verify API key against provider API and update verification status."
      responses:
        '200':
          description: "Verification result"
          content:
            application/json:
              schema:
                type: object
                properties:
                  key_id:
                    type: string
                    example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
                  is_verified:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API key verified successfully"
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "API key not found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trading_accounts:
    get:
      summary: "List all trading accounts (Plural)"
      tags:
        - trading
      responses:
        '200': { description: "Success" }

  /trades:
    get:
      summary: "Hierarchical Trades View"
      tags:
        - trading
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradeResponse'

  /analytics/portfolios:
    get:
      summary: "Portfolio Performance Analytics"
      tags:
        - analytics
      responses:
        '200': { description: "Success" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token in Authorization header"

  schemas:
    # Authentication Schemas
    LoginRequest:
      type: object
      required:
        - username_or_email
        - password
      properties:
        username_or_email:
          type: string
          description: "Username or email address"
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 1
          description: "User password"
          example: "secure_password_123"

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "JWT access token"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          default: "bearer"
          example: "bearer"
        expires_at:
          type: string
          format: date-time
          description: "Token expiration timestamp"
          example: "2026-02-01T12:00:00Z"
        user:
          $ref: '#/components/schemas/UserResponse'

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: "Username"
          example: "johndoe"
        email:
          type: string
          format: email
          description: "Email address"
          example: "john@example.com"
        password:
          type: string
          format: password
          minLength: 8
          description: "Password (min 8 characters)"
          example: "secure_password_123"
        phone_number:
          type: string
          nullable: true
          pattern: '^\+?[1-9]\d{1,14}$'
          description: "Phone number (E.164 format, optional)"
          example: "+12025551234"

    RegisterResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "JWT access token"
        token_type:
          type: string
          default: "bearer"
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "New JWT access token"
        token_type:
          type: string
          default: "bearer"
        expires_at:
          type: string
          format: date-time
          description: "Token expiration timestamp"

    # User Schemas
    UserResponse:
      type: object
      required:
        - external_ulids
        - email
        - created_at
      properties:
        external_ulids:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "User ULID (external identifier)"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        email:
          type: string
          format: email
          description: "Email address"
          example: "user@example.com"
        phone_numbers:
          type: string
          nullable: true
          description: "Phone number"
          example: "+12025551234"
        user_tier_levels:
          type: string
          enum: [Bronze, Silver, Gold, Platinum]
          default: Bronze
          description: "User tier level"
        username:
          type: string
          nullable: true
          description: "Username"
        display_name:
          type: string
          nullable: true
          description: "Display name"
        role:
          type: string
          enum: [USER, ADMIN, SUPERADMIN]
          default: USER
        is_email_verified:
          type: boolean
          default: false
        phone_verified:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time

    UserUpdate:
      type: object
      description: "User profile update request schema"
      properties:
        first_name:
          type: string
          maxLength: 100
          nullable: true
          description: "First name"
          example: "John"
        last_name:
          type: string
          maxLength: 100
          nullable: true
          description: "Last name"
          example: "Doe"
        display_name:
          type: string
          maxLength: 100
          nullable: true
          description: "Display name"
          example: "Johnny"
        phone_number:
          type: string
          nullable: true
          pattern: '^\+?[1-9]\d{1,14}$'
          description: "Phone number (E.164 format). Changing phone number resets verification status."
          example: "+1234567890"
        timezone:
          type: string
          maxLength: 50
          nullable: true
          description: "Timezone (e.g., 'America/New_York')"
          example: "America/New_York"
        language:
          type: string
          maxLength: 5
          nullable: true
          description: "Language code (e.g., 'en', 'he')"
          example: "en"

    # Password Reset Schemas
    PasswordResetRequest:
      type: object
      required:
        - method
      properties:
        method:
          type: string
          enum: [EMAIL, SMS]
          description: "Reset method"
          example: "EMAIL"
        email:
          type: string
          format: email
          nullable: true
          description: "Email address (required if method=EMAIL)"
          example: "user@example.com"
        phone_number:
          type: string
          nullable: true
          pattern: '^\+?[1-9]\d{1,14}$'
          description: "Phone number (required if method=SMS)"
          example: "+1234567890"

    PasswordResetVerify:
      type: object
      required:
        - new_password
      properties:
        reset_token:
          type: string
          minLength: 32
          nullable: true
          description: "Reset token (from email, required if method=EMAIL)"
          example: "abc123def456..."
        verification_code:
          type: string
          minLength: 6
          maxLength: 6
          nullable: true
          description: "Verification code (from SMS, required if method=SMS)"
          example: "123456"
        new_password:
          type: string
          minLength: 8
          description: "New password"
          example: "new_secure_password_123"

    # API Keys Schemas
    UserApiKeyCreate:
      type: object
      required:
        - provider
        - api_key
      properties:
        provider:
          type: string
          enum: [IBKR, POLYGON, YAHOO_FINANCE, ALPHA_VANTAGE, FINNHUB, TWELVE_DATA, IEX_CLOUD, CUSTOM]
          description: "API provider"
          example: "POLYGON"
        provider_label:
          type: string
          maxLength: 100
          nullable: true
          description: "Custom label for this key"
          example: "Production Key"
        api_key:
          type: string
          minLength: 1
          description: "API key (will be encrypted)"
          example: "your_api_key_here"
        api_secret:
          type: string
          nullable: true
          description: "API secret (will be encrypted)"
          example: "your_api_secret_here"
        additional_config:
          type: object
          nullable: true
          description: "Additional configuration (JSON)"
          example: {}

    UserApiKeyResponse:
      type: object
      required:
        - external_ulids
        - provider
        - masked_key
        - is_active
        - is_verified
        - created_at
      properties:
        external_ulids:
          type: string
          pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
          description: "API key ULID (external identifier)"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        provider:
          type: string
          enum: [IBKR, POLYGON, YAHOO_FINANCE, ALPHA_VANTAGE, FINNHUB, TWELVE_DATA, IEX_CLOUD, CUSTOM]
          description: "API provider"
          example: "POLYGON"
        provider_label:
          type: string
          nullable: true
          description: "Custom label"
          example: "Production Key"
        masked_key:
          type: string
          description: "Masked API key (always returns ********************)"
          example: "********************"
        is_active:
          type: boolean
          description: "Active status"
          example: true
        is_verified:
          type: boolean
          description: "Verification status"
          example: true
        last_verified_at:
          type: string
          format: date-time
          nullable: true
          description: "Last verification timestamp"
          example: "2026-01-31T12:00:00Z"
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp"
          example: "2026-01-31T10:00:00Z"

    # Error Schemas
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: "Error message"
          example: "Invalid credentials"

    # Trading Schemas (existing)
    TradeResponse:
      type: object
      properties:
        external_ulids:
          type: string
        parent_id:
          type: string
          nullable: true
        calculated_statuses:
          type: string
        aggregated_pnl_amounts:
          type: number
        children:
          type: array
          items:
            $ref: '#/components/schemas/TradeResponse'
