<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מודלים - TikTrack</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles/external_data_test.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-database me-2"></i>
                TikTrack - בדיקת מודלים
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="test_external_data.html">
                    <i class="fas fa-chart-line me-1"></i>
                    בדיקת API
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <!-- Model Testing Section -->
        <div class="row">
            <div class="col-md-6">
                <!-- Ticker Model Test -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-tag me-2"></i>בדיקת מודל Ticker</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="ticker-symbol" class="form-label">סמל:</label>
                            <input type="text" class="form-control" id="ticker-symbol" placeholder="AAPL" value="AAPL">
                        </div>
                        <div class="mb-3">
                            <label for="ticker-name" class="form-label">שם:</label>
                            <input type="text" class="form-control" id="ticker-name" placeholder="Apple Inc." value="Apple Inc.">
                        </div>
                        <div class="mb-3">
                            <label for="ticker-status" class="form-label">סטטוס:</label>
                            <select class="form-select" id="ticker-status">
                                <option value="active">פעיל</option>
                                <option value="inactive">לא פעיל</option>
                                <option value="watch">מעקב</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="ticker-active-trades">
                                <label class="form-check-label" for="ticker-active-trades">
                                    יש מסחר פעיל
                                </label>
                            </div>
                        </div>
                        <button class="btn btn-primary" id="test-ticker-model">
                            <i class="fas fa-play me-1"></i>בדוק מודל
                        </button>
                    </div>
                </div>

                <!-- Quote Model Test -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-line me-2"></i>בדיקת מודל Quote</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="quote-ticker-id" class="form-label">Ticker ID:</label>
                            <input type="number" class="form-control" id="quote-ticker-id" value="1">
                        </div>
                        <div class="mb-3">
                            <label for="quote-price" class="form-label">מחיר:</label>
                            <input type="number" class="form-control" id="quote-price" step="0.01" value="150.25">
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="quote-change-amount" class="form-label">שינוי כמותי:</label>
                                    <input type="number" class="form-control" id="quote-change-amount" step="0.01" value="2.50">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="quote-change-percent" class="form-label">שינוי אחוזי:</label>
                                    <input type="number" class="form-control" id="quote-change-percent" step="0.01" value="1.69">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="quote-volume" class="form-label">נפח:</label>
                            <input type="number" class="form-control" id="quote-volume" value="50000000">
                        </div>
                        <div class="mb-3">
                            <label for="quote-provider" class="form-label">ספק:</label>
                            <select class="form-select" id="quote-provider">
                                <option value="yahoo_finance">Yahoo Finance</option>
                                <option value="alpha_vantage">Alpha Vantage</option>
                                <option value="ibkr">Interactive Brokers</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="test-quote-model">
                            <i class="fas fa-play me-1"></i>בדוק מודל
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <!-- Market Preferences Test -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-cog me-2"></i>בדיקת מודל Market Preferences</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="pref-user-id" class="form-label">User ID:</label>
                            <input type="number" class="form-control" id="pref-user-id" value="1">
                        </div>
                        <div class="mb-3">
                            <label for="pref-timezone" class="form-label">אזור זמן:</label>
                            <select class="form-select" id="pref-timezone">
                                <option value="UTC">UTC</option>
                                <option value="Asia/Jerusalem" selected>Asia/Jerusalem</option>
                                <option value="America/New_York">America/New_York</option>
                                <option value="Europe/London">Europe/London</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="pref-refresh-mode" class="form-label">מצב רענון:</label>
                            <select class="form-select" id="pref-refresh-mode">
                                <option value="auto">אוטומטי</option>
                                <option value="manual">ידני</option>
                                <option value="custom">מותאם אישית</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="pref-interval" class="form-label">מרווח (דקות):</label>
                            <input type="number" class="form-control" id="pref-interval" value="5" min="1" max="1440">
                        </div>
                        <button class="btn btn-primary" id="test-preferences-model">
                            <i class="fas fa-play me-1"></i>בדוק מודל
                        </button>
                    </div>
                </div>

                <!-- Validation Test -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-check-circle me-2"></i>בדיקת Validation</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="validation-timezone" class="form-label">בדיקת אזור זמן:</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="validation-timezone" placeholder="Asia/Jerusalem">
                                <button class="btn btn-outline-secondary" id="validate-timezone">
                                    <i class="fas fa-check me-1"></i>בדוק
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="validation-interval" class="form-label">בדיקת מרווח:</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="validation-interval" placeholder="5">
                                <button class="btn btn-outline-secondary" id="validate-interval">
                                    <i class="fas fa-check me-1"></i>בדוק
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="validation-mode" class="form-label">בדיקת מצב:</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="validation-mode" placeholder="auto">
                                <button class="btn btn-outline-secondary" id="validate-mode">
                                    <i class="fas fa-check me-1"></i>בדוק
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-list me-2"></i>תוצאות בדיקה</h5>
                        <button class="btn btn-sm btn-outline-secondary float-start" id="clear-results">
                            <i class="fas fa-trash me-1"></i>נקה תוצאות
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="test-results"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="../scripts/models_test.js"></script>
</body>
</html>
