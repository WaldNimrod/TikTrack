<body class="alerts-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <div class="main-content">
                <!-- Top Section Start -->
                <div class="top-section" id="topSection" data-section="top">
                    <div class="section-header">
                        <h2>🔔 התראות - סקירה כללית</h2>
                        <div class="section-actions">
                            <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('top')" data-text="הצג/הסתר" title="הצג/הסתר סקשן"></button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- Color Scheme Demo for Alerts -->
                        <div id="alertsColorDemo" class="mb-3" style="display: none;">
                            <div class="d-flex gap-2 mb-2">
                                <span class="entity-alert-badge">התראה פעילה</span>
                                <span class="entity-ticker-badge">טיקר AAPL</span>
                                <span class="entity-trade-badge">טרייד #123</span>
                            </div>
                            <div class="alert alert-info">
                                <small>🎨 דמונסטרציה למערכת הצבעים הדינמית - נוצרה אוטומטית עם מחלקות ישויות</small>
                            </div>
                        </div>
                        
                        <!-- Active alerts web component -->
                        <active-alerts></active-alerts>

                        <!-- Data summary -->
                        <div class="info-summary" id="summaryStats">
                            <div>סה"כ התראות: <strong id="totalAlerts">12</strong></div>
                            <div>התראות פעילות: <strong id="activeAlerts">8</strong></div>
                            <div>התראות חדשות: <strong id="newAlerts">0</strong></div>
                            <div>התראות היום: <strong id="todayAlerts">0</strong></div>
                            <div>התראות השבוע: <strong id="weekAlerts">0</strong></div>
                        </div>
                    </div>
                </div>
                <!-- Top Section End -->

                <!-- UI Content Section 1 Start -->
                <div class="content-section" id="section1">
                    <div class="section-header entity-test-sub-header">
                        <h2>📋 ניהול התראות</h2>
                        <div class="filter-buttons-container button-row">
                            <button data-button-type="ADD" data-entity-type="alert" data-variant="full" data-onclick="showAddAlertModal()" data-text="הוסף התראה" title="הוסף התראה חדשה"></button>
                            <div class="action-separator"></div>
                            <button class="btn btn-sm active" onclick="filterAlertsByRelatedObjectType('all')" data-type="all" title="הצג הכל" data-tooltip="הצג הכל" data-tooltip-placement="top" data-tooltip-trigger="hover" style="background-color: white; color: #28a745; border-color: #28a745;">
                                הכל
                            </button>
                            <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('account')" data-type="account" title="חשבונות" data-tooltip="סינון לפי חשבון מסחר" data-tooltip-placement="top" data-tooltip-trigger="hover" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                <img src="images/icons/entities/trading_accounts.svg" alt="חשבונות מסחר" class="filter-icon" style="width: 14px; height: 14px;">
                            </button>
                            <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('trade')" data-type="trade" title="טריידים" data-tooltip="סינון לפי טרייד" data-tooltip-placement="top" data-tooltip-trigger="hover" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                <img src="images/icons/entities/trades.svg" alt="טריידים" class="filter-icon" style="width: 14px; height: 14px;">
                            </button>
                            <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('trade_plan')" data-type="trade_plan" title="תוכניות" data-tooltip="סינון לפי תכנית השקעה" data-tooltip-placement="top" data-tooltip-trigger="hover" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                <img src="images/icons/entities/trade_plans.svg" alt="תוכניות" class="filter-icon" style="width: 14px; height: 14px;">
                            </button>
                            <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('ticker')" data-type="ticker" title="טיקרים" data-tooltip="סינון לפי טיקר" data-tooltip-placement="top" data-tooltip-trigger="hover" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                <img src="images/icons/entities/tickers.svg" alt="טיקרים" class="filter-icon" style="width: 14px; height: 14px;">
                            </button>
                            
                            <span style="margin: 0 10px; color: #666;">|</span>
                        </div>
                        <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('section1')" data-text="הצג/הסתר" title="הצג/הסתר סקשן"></button>
                    </div>
                    <div class="section-body">
                        <!-- Alerts table -->
                        <div class="table-responsive" id="alertsContainer">
                            <table class="table" id="alertsTable" data-table-type="alerts">
                                <thead>
                                    <tr>
                                        <th style="width: 10%;">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                טיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th style="width: 18%;">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTableData(1, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                תנאי <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th style="width: 8%;">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTableData(2, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th style="width: 8%;">
                                            <button class="btn btn-link sortable-header"

                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                הופעל <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th style="width: 20%;">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTableData(4, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                קשור ל: <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th style="width: 12%;">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTableData(5, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                הודעה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th style="width: 10%;">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTableData(6, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                                                נוצר ב: <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="actions-cell" style="width: 14%;">
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Toast container for notifications -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

    <!-- Add Alert Modal -->
    <div class="modal fade" id="addAlertModal" tabindex="-1" aria-labelledby="addAlertModalLabel" aria-hidden="true"
        data-bs-backdrop="true" data-bs-keyboard="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header modal-header-colored">
                    <h5 class="modal-title" id="addAlertModalLabel">הוספת התראה</h5>
                    <button data-button-type="CLOSE" data-entity-type="alert" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
                </div>
                <div class="modal-body">
                    <!-- Navigation tabs -->
                    <ul class="nav nav-tabs" id="addAlertTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="add-manual-tab" data-bs-toggle="tab" data-bs-target="#add-manual-pane" type="button" role="tab">
                                <i class="fa fa-plus me-2"></i>התראה ידנית
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="add-from-condition-tab" data-bs-toggle="tab" data-bs-target="#add-from-condition-pane" type="button" role="tab">
                                <i class="fa fa-chart-line me-2"></i>מתנאי קיים
                            </button>
                        </li>
                    </ul>
                    
                    <!-- Tab content -->
                    <div class="tab-content" id="addAlertTabContent">
                        <!-- Manual Alert Tab -->
                        <div class="tab-pane fade show active" id="add-manual-pane" role="tabpanel">
                            <form id="addAlertForm">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-3">
                                    <label class="form-label">התראה עבור:</label>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="radio-group-item">
                                                <input type="radio" name="alertRelationType" id="alertRelationTradePlan" value="3" required
                                                    onchange="onRelationTypeChange(this)">
                                                <label for="alertRelationTradePlan">תוכנית טרייד</label>
                                            </div>
                                            <div class="radio-group-item">
                                                <input type="radio" name="alertRelationType" id="alertRelationTrade" value="2" required
                                                    onchange="onRelationTypeChange(this)">
                                                <label for="alertRelationTrade">טרייד</label>
                                            </div>
                                            <div class="radio-group-item">
                                                <input type="radio" name="alertRelationType" id="alertRelationAccount" value="1" required
                                                    onchange="onRelationTypeChange(this)">
                                                <label for="alertRelationAccount">חשבון</label>
                                            </div>
                                            <div class="radio-group-item">
                                                <input type="radio" name="alertRelationType" id="alertRelationTicker" value="4" required
                                                    onchange="onRelationTypeChange(this)">
                                                <label for="alertRelationTicker">טיקר</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
