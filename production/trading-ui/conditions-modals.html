<!-- Conditions System Modals -->
<!-- Modal for method selection -->
<div class="modal fade" id="methodSelectorModal" tabindex="-1" aria-labelledby="methodSelectorModalLabel" aria-hidden="true"
     data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header modal-header-colored">
                <h5 class="modal-title" id="methodSelectorModalLabel">
                    <i class="fa fa-chart-line me-2"></i>בחירת שיטת מסחר
                </h5>
                <button data-button-type="CLOSE" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
            </div>
            <div class="modal-body">
                <div id="methodSelectorBody">
                    <!-- Method categories and methods will be loaded here -->
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">טוען...</span>
                        </div>
                        <p class="mt-2 text-muted">טוען שיטות מסחר...</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa fa-times me-2"></i>ביטול
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for condition details -->
<div class="modal fade" id="conditionDetailsModal" tabindex="-1" aria-labelledby="conditionDetailsModalLabel" aria-hidden="true"
     data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header modal-header-colored">
                <h5 class="modal-title" id="conditionDetailsModalLabel">
                    <i class="fa fa-info-circle me-2"></i>פרטי תנאי
                </h5>
                <button data-button-type="CLOSE" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
            </div>
            <div class="modal-body">
                <div id="conditionDetailsBody">
                    <!-- Condition details will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="editConditionBtn">
                    <i class="fa fa-edit me-2"></i>ערוך
                </button>
                <button type="button" class="btn btn-success" id="createAlertFromConditionBtn">
                    <i class="fa fa-bell me-2"></i>צור התראה
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa fa-times me-2"></i>סגור
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for alert creation from condition -->
<div class="modal fade" id="createAlertFromConditionModal" tabindex="-1" aria-labelledby="createAlertFromConditionModalLabel" aria-hidden="true"
     data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header modal-header-colored">
                <h5 class="modal-title" id="createAlertFromConditionModalLabel">
                    <i class="fa fa-bell me-2"></i>יצירת התראה מתנאי
                </h5>
                <button data-button-type="CLOSE" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
            </div>
            <div class="modal-body">
                <form id="createAlertFromConditionForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">שם ההתראה</label>
                                <input type="text" name="alert_name" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">סוג ההתראה</label>
                                <select name="alert_type" class="form-select" required>
                                    <option value="price_condition">תנאי מחיר</option>
                                    <option value="volume_condition">תנאי נפח</option>
                                    <option value="technical_condition">תנאי טכני</option>
                                    <option value="custom_condition">מותאם אישית</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">תיאור ההתראה</label>
                        <textarea name="alert_description" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">תכונה</label>
                                <select name="condition_attribute" class="form-select" required>
                                    <option value="price">מחיר</option>
                                    <option value="volume">נפח</option>
                                    <option value="change">שינוי</option>
                                    <option value="ma">ממוצע נע</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">אופרטור</label>
                                <select name="condition_operator" class="form-select" required>
                                    <option value="above">מעל</option>
                                    <option value="below">מתחת</option>
                                    <option value="equals">שווה ל</option>
                                    <option value="cross">חוצה</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">ערך</label>
                                <input type="number" name="condition_number" class="form-control" step="0.01" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="auto_create" class="form-check-input" id="autoCreateCheck" checked>
                            <label class="form-check-label" for="autoCreateCheck">
                                צור התראה אוטומטית בעתיד
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="saveAlertFromConditionBtn">
                    <i class="fa fa-save me-2"></i>צור התראה
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa fa-times me-2"></i>ביטול
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for condition testing -->
<div class="modal fade" id="testConditionModal" tabindex="-1" aria-labelledby="testConditionModalLabel" aria-hidden="true"
     data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header modal-header-colored">
                <h5 class="modal-title" id="testConditionModalLabel">
                    <i class="fa fa-flask me-2"></i>בדיקת תנאי
                </h5>
                <button data-button-type="CLOSE" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
            </div>
            <div class="modal-body">
                <div id="testConditionBody">
                    <!-- Test results will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="runTestBtn">
                    <i class="fa fa-play me-2"></i>הרץ בדיקה
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa fa-times me-2"></i>סגור
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for bulk condition operations -->
<div class="modal fade" id="bulkConditionsModal" tabindex="-1" aria-labelledby="bulkConditionsModalLabel" aria-hidden="true"
     data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header modal-header-colored">
                <h5 class="modal-title" id="bulkConditionsModalLabel">
                    <i class="fa fa-tasks me-2"></i>פעולות מרובות על תנאים
                </h5>
                <button data-button-type="CLOSE" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6>פעולות זמינות</h6>
                        <div class="list-group">
                            <button type="button" class="list-group-item list-group-item-action" id="bulkActivateBtn">
                                <i class="fa fa-check-circle me-2"></i>הפעל כל התנאים
                            </button>
                            <button type="button" class="list-group-item list-group-item-action" id="bulkDeactivateBtn">
                                <i class="fa fa-times-circle me-2"></i>השבת כל התנאים
                            </button>
                            <button type="button" class="list-group-item list-group-item-action" id="bulkDeleteBtn">
                                <i class="fa fa-trash me-2"></i>מחק תנאים נבחרים
                            </button>
                            <button type="button" class="list-group-item list-group-item-action" id="bulkCreateAlertsBtn">
                                <i class="fa fa-bell me-2"></i>צור התראות לכל התנאים
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6>תנאים נבחרים</h6>
                        <div id="selectedConditionsList" class="border rounded p-3" style="min-height: 200px;">
                            <p class="text-muted text-center">אין תנאים נבחרים</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="executeBulkOperationBtn" disabled>
                    <i class="fa fa-play me-2"></i>בצע פעולה
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa fa-times me-2"></i>סגור
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for condition import/export -->
<div class="modal fade" id="conditionImportExportModal" tabindex="-1" aria-labelledby="conditionImportExportModalLabel" aria-hidden="true"
     data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header modal-header-colored">
                <h5 class="modal-title" id="conditionImportExportModalLabel">
                    <i class="fa fa-exchange-alt me-2"></i>ייבוא/ייצוא תנאים
                </h5>
                <button data-button-type="CLOSE" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
            </div>
            <div class="modal-body">
                <ul class="nav nav-tabs" id="importExportTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="export-tab" data-bs-toggle="tab" data-bs-target="#export-pane" type="button" role="tab">
                            <i class="fa fa-download me-2"></i>ייצוא
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="import-tab" data-bs-toggle="tab" data-bs-target="#import-pane" type="button" role="tab">
                            <i class="fa fa-upload me-2"></i>ייבוא
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content" id="importExportTabContent">
                    <div class="tab-pane fade show active" id="export-pane" role="tabpanel">
                        <div class="p-3">
                            <h6>ייצוא תנאים</h6>
                            <p class="text-muted">ייצא את כל התנאים של הישות הנוכחית לקובץ JSON</p>
                            
                            <div class="mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="includeParametersCheck" checked>
                                    <label class="form-check-label" for="includeParametersCheck">
                                        כלול פרמטרים
                                    </label>
                                </div>
                            </div>
                            
                            <button type="button" class="btn btn-primary" id="exportConditionsBtn">
                                <i class="fa fa-download me-2"></i>ייצא תנאים
                            </button>
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="import-pane" role="tabpanel">
                        <div class="p-3">
                            <h6>ייבוא תנאים</h6>
                            <p class="text-muted">ייבא תנאים מקובץ JSON</p>
                            
                            <div class="mb-3">
                                <label class="form-label">קובץ JSON</label>
                                <input type="file" class="form-control" id="importConditionsFile" accept=".json">
                            </div>
                            
                            <div class="mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="overwriteExistingCheck">
                                    <label class="form-check-label" for="overwriteExistingCheck">
                                        החלף תנאים קיימים
                                    </label>
                                </div>
                            </div>
                            
                            <button type="button" class="btn btn-primary" id="importConditionsBtn" disabled>
                                <i class="fa fa-upload me-2"></i>ייבא תנאים
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa fa-times me-2"></i>סגור
                </button>
            </div>
        </div>
    </div>
</div>
