<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="הגדרות והעדפות מערכת TikTrack - ניהול הגדרות משתמש, צבעים, התראות ועוד">
    <meta name="keywords" content="TikTrack, העדפות, הגדרות, מערכת מסחר">
    <meta name="author" content="TikTrack">
    <!-- Favicon will be set by global-favicon.js -->
    <title>העדפות - TikTrack</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS - חייב להיות קודם -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js?v=0da3519a_20251102_104906"></script>
    
    <!-- TikTrack CSS - Unified CSS (No @import) -->
    <!-- CSS Files - אחרי Bootstrap כדי לדרוס אותו -->
    <!-- 🔄 MAJOR ARCHITECTURE CHANGE - September 2025: Individual <link> tags instead of @import -->
    <link rel="stylesheet" href="styles-new/02-tools/_mixins.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/02-tools/_functions.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/02-tools/_utilities.css?v=0da3519a_20251102_104906">
    
    <!-- 04-elements - Basic HTML Elements -->
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/04-elements/_links.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/04-elements/_forms-base.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/04-elements/_buttons-base.css?v=0da3519a_20251102_104906">
    
    <!-- 06-components - Component Styles -->
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=0da3519a_20251102_104906">
    
    <!-- External Libraries -->
    <!-- Bootstrap Icons and FontAwesome removed - using Tabler Icons via IconSystem -->
    
    
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906">
</head>
<body class="preferences-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <div class="main-content">
                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h2><img src="/trading-ui/images/icons/tabler/settings.svg" width="16" height="16" alt="settings" class="icon"> העדפות</h2>
                            <div class="section-header-controls">
                                <button class="btn btn-outline-secondary btn-sm" onclick="window.toggleSection('infoSummary')" id="toggleInfoBtn">
                                    <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon">
                                </button>
                                <button class="btn btn-success btn-sm" onclick="window.saveAllPreferences()" id="saveAllBtn">
                                    <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> שמור הכל
                                </button>
                                <button class="btn btn-warning btn-sm" onclick="window.resetToDefaults()" id="resetBtn">
                                    <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> איפוס
                                </button>
                                <button class="btn btn-outline-secondary btn-sm" onclick="window.toggleAllSections()" id="toggleAllBtn">
                                    <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> פתח/סגור הכל
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="section-body" id="infoSummary">
                        <div class="card">
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <small class="text-muted">פרופיל פעיל</small>
                                            <div id="activeProfileInfo" class="fw-bold">ברירת מחדל</div>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <small class="text-muted">מספר העדפות</small>
                                            <div id="preferencesCount" class="fw-bold">טוען...</div>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <small class="text-muted">מספר פרופילים</small>
                                            <div id="profilesCount" class="fw-bold">טוען...</div>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <small class="text-muted">מספר קבוצות</small>
                                            <div id="groupsCount" class="fw-bold">טוען...</div>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <small class="text-muted">סטטוס מערכת</small>
                                            <div id="systemStatus" class="text-success fw-bold">פעיל</div>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <small class="text-muted">גרסת מערכת</small>
                                            <div id="systemVersion" class="fw-bold">3.0</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section Top End -->
                
                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="section1">
                    <div class="section-header">
                        <h2>👤 ניהול פרופילים</h2>
                        <button class="btn btn-outline-warning" onclick="window.toggleSection('section1')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" id="activeProfileInfo">פרופיל נוכחי</label>
                                    <select id="profileSelect" class="form-select">
                                        <option>ברירת מחדל</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">שם פרופיל חדש</label>
                                    <input type="text" id="newProfileName" class="form-control" placeholder="הכנס שם פרופיל">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <div class="profile-buttons d-flex flex-wrap gap-2">
                                    <button class="btn btn-primary" onclick="window.saveAsActiveProfile()">
                                        <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> שמור כפרופיל פעיל
                                    </button>
                                    <button class="btn btn-danger" onclick="window.deleteProfile()">
                                        <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> מחק
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 1 End -->
                
                <!-- UI Content Section 2 Start-->
                <div class="content-section" id="section2">
                    <div class="section-header">
                        <h2>🏦 הגדרות בסיסיות</h2>
                        <button class="btn btn-outline-warning" onclick="window.toggleSection('section2')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">מטבע ראשי</label>
                                    <select id="primaryCurrency" class="form-select control-narrow">
                                        <option value="USD - דולר ארה"ב">USD - דולר ארה"ב</option>
                                        <option value="EUR - יורו">EUR - יורו</option>
                                        <option value="GBP - לירה שטרלינג">GBP - לירה שטרלינג</option>
                                        <option value="ILS - שקל חדש">ILS - שקל חדש</option>
                                    </select>
                                    <small class="text-muted">כרגע נתמך רק דולר ארה"ב</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">מטבע משני <span class="text-muted">(עתידי)</span></label>
                                    <select id="secondaryCurrency" class="form-select control-narrow" disabled>
                                        <option value="USD - דולר ארה"ב">USD - דולר ארה"ב</option>
                                        <option value="EUR - יורו">EUR - יורו</option>
                                        <option value="GBP - לירה שטרלינג">GBP - לירה שטרלינג</option>
                                        <option value="ILS - שקל חדש">ILS - שקל חדש</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">אזור זמן</label>
                                    <select id="timezone" class="form-select">
                                        <option value="Asia/Jerusalem">Asia/Jerusalem</option>
                                        <option value="America/New_York">America/New_York</option>
                                        <option value="Europe/London">Europe/London</option>
                                        <option value="Asia/Tokyo">Asia/Tokyo</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">שפה <span class="text-muted">(עתידי)</span></label>
                                    <select id="language" class="form-select control-narrow" disabled>
                                        <option value="עברית">עברית</option>
                                        <option value="English">English</option>
                                        <option value="العربية">العربية</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">ערכת נושא <span class="text-muted">(עתידי)</span>:</label>
                                    <select id="theme" class="form-select control-narrow" disabled>
                                        <option value="light">בהיר</option>
                                        <!-- Dark mode removed - light mode only -->
                                        <option value="auto" disabled>אוטומטי (לא זמין)</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">מצב קומפקטי <span class="text-muted">(עתידי)</span>:</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="compactMode" disabled>
                                        <label class="form-check-label" for="compactMode">
                                            הפעל מצב קומפקטי
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">הצג אנימציות <span class="text-muted">(עתידי)</span>:</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="showAnimations" checked disabled>
                                        <label class="form-check-label" for="showAnimations">
                                            הפעל אנימציות
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">גודל עמוד בטבלה <span class="text-muted">(עתידי)</span>:</label>
                                    <select id="tablePageSize" class="form-select control-narrow" disabled>
                                        <option value="10">10</option>
                                        <option value="25" selected>25</option>
                                        <option value="50">50</option>
                                        <option value="100">100</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 2 End-->
                
                <!-- UI Content Section 3 Start-->
                <div class="content-section" id="section3">
                    <div class="section-header">
                        <h2>📈 הגדרות מסחר</h2>
                        <button class="btn btn-outline-warning" onclick="window.toggleSection('section3')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h5>הגדרות בסיסיות</h5>
                                <div class="mb-3">
                                    <label class="form-label">Stop Loss ברירת מחדל (%)</label>
                                    <input type="number" id="defaultStopLoss" class="form-control control-narrow" 
                                           step="0.1" min="0" max="100">
                                </div>
                                <div class="mb-3">
