<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איפוס סיסמה - TikTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles-new/master.css">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #eef2ff 0%, #f8fafc 45%, #e0e7ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-card p {
      color: var(--apple-text-secondary, #555);
      margin-bottom: 1.5rem;
    }
    .auth-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .auth-status {
      margin-top: 1rem;
      color: var(--apple-text-secondary, #555);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="mb-3">
      <img src="images/logo.svg" alt="TikTrack Logo" style="height: 52px;">
    </div>
    <h1>איפוס סיסמה</h1>
    <p>העמוד משתמש במודל האיפוס המאוחד. מזהה הטוקן מזוהה מהקישור שקיבלת.</p>
    <div class="auth-actions">
      <button class="btn btn-primary" id="openResetModalBtn">פתח מודל איפוס</button>
      <a class="btn btn-outline-secondary" href="/">חזרה לדף הבית</a>
    </div>
    <div class="auth-status" id="resetStatus"></div>
  </div>

  <!-- Core scripts -->
  <script src="scripts/api-config.js" defer></script>
  <script src="scripts/logger-service.js" defer></script>
  <script src="scripts/notification-system.js" defer></script>
  <script src="scripts/unified-cache-manager.js" defer></script>
  <script src="scripts/modal-manager-v2.js" defer></script>
  <script src="scripts/modal-z-index-manager.js" defer></script>
  <script src="scripts/auth.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const statusEl = document.getElementById('resetStatus');
      const setStatus = msg => { if (statusEl) statusEl.textContent = msg || ''; };

      const openModal = async () => {
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
          setStatus('קישור איפוס לא תקף או חסר token.');
          return;
        }
        setStatus('פותח מודל איפוס...');
        try {
          if (window.TikTrackAuth?.showResetPasswordModal) {
            await window.TikTrackAuth.showResetPasswordModal(token);
            setStatus('');
          } else {
            setStatus('מודל איפוס לא זמין (auth.js)');
          }
        } catch (err) {
          setStatus(err?.message || 'שגיאה בפתיחת מודל איפוס');
        }
      };

      document.getElementById('openResetModalBtn')?.addEventListener('click', openModal);
      openModal();
    });
  </script>
</body>
</html>
