<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill.js Test</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        #editor {
            height: 300px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <h1>Quill.js Test Page</h1>
    
    <div id="status"></div>
    
    <div id="editor"></div>
    
    <button onclick="testQuill()">Test Quill.js</button>
    <button onclick="loadQuill()">Load Quill.js Dynamically</button>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        function logStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
            console.log(message);
        }
        
        // בדיקה ראשונית
        window.addEventListener('DOMContentLoaded', () => {
            logStatus('DOM Content Loaded', 'info');
            
            // בדיקה אם Quill.js נטען
            setTimeout(() => {
                if (typeof window.Quill !== 'undefined') {
                    logStatus('✅ Quill.js is available', 'success');
                    initEditor();
                } else {
                    logStatus('❌ Quill.js is NOT available', 'error');
                    logStatus('Checking for script tag...', 'info');
                    
                    const script = document.querySelector('script[src*="quill"]');
                    if (script) {
                        logStatus('✅ Found Quill.js script tag', 'info');
                        logStatus(`Script src: ${script.src}`, 'info');
                        logStatus(`Script complete: ${script.complete}`, 'info');
                        logStatus(`Script readyState: ${script.readyState}`, 'info');
                        
                        script.addEventListener('load', () => {
                            logStatus('✅ Script load event fired', 'success');
                            setTimeout(() => {
                                if (typeof window.Quill !== 'undefined') {
                                    logStatus('✅ Quill.js is now available', 'success');
                                    initEditor();
                                } else {
                                    logStatus('❌ Quill.js still not available after load event', 'error');
                                }
                            }, 100);
                        });
                        
                        script.addEventListener('error', (e) => {
                            logStatus('❌ Script error event fired', 'error');
                            logStatus(`Error: ${e.message || 'Unknown error'}`, 'error');
                        });
                    } else {
                        logStatus('❌ No Quill.js script tag found', 'error');
                    }
                }
            }, 1000);
        });
        
        function initEditor() {
            try {
                const quill = new Quill('#editor', {
                    theme: 'snow',
                    direction: 'rtl'
                });
                logStatus('✅ Quill editor initialized successfully', 'success');
            } catch (error) {
                logStatus(`❌ Error initializing Quill: ${error.message}`, 'error');
            }
        }
        
        function testQuill() {
            if (typeof window.Quill !== 'undefined') {
                logStatus('✅ Quill.js is available', 'success');
                initEditor();
            } else {
                logStatus('❌ Quill.js is NOT available', 'error');
            }
        }
        
        function loadQuill() {
            logStatus('Attempting to load Quill.js dynamically...', 'info');
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js';
            script.async = false;
            script.onload = () => {
                logStatus('✅ Script loaded', 'success');
                setTimeout(() => {
                    if (typeof window.Quill !== 'undefined') {
                        logStatus('✅ Quill.js is now available', 'success');
                        initEditor();
                    } else {
                        logStatus('❌ Quill.js still not available', 'error');
                    }
                }, 100);
            };
            script.onerror = (e) => {
                logStatus('❌ Script load error', 'error');
                logStatus(`Error: ${e.message || 'Unknown error'}`, 'error');
            };
            document.head.appendChild(script);
        }
    </script>
    
    <!-- Quill.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js" 
            onload="console.log('✅ Quill.js loaded from CDN'); window.QuillLoaded = true;" 
            onerror="console.error('❌ Failed to load Quill.js from CDN');"></script>
</body>
</html>
