<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת ביצועים - וויגיטים דשבורד טיקרים</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            padding: 20px;
            font-family: 'Noto Sans Hebrew', sans-serif;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .test-result.success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .test-result.error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .test-result.warning {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
        }
        .metric {
            display: inline-block;
            margin: 5px 10px;
            padding: 5px 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }
        .metric-label {
            font-weight: bold;
            color: #6c757d;
        }
        .metric-value {
            color: #212529;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>בדיקת ביצועים - וויגיטים דשבורד טיקרים</h1>
        
        <div class="test-section">
            <h2>1. בדיקת טעינת נתונים</h2>
            <button id="testDataLoad" class="btn btn-primary">הרץ בדיקה</button>
            <div id="dataLoadResult" class="test-result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h2>2. בדיקת רינדור KPI Cards</h2>
            <button id="testKPIRender" class="btn btn-primary">הרץ בדיקה</button>
            <div id="kpiRenderResult" class="test-result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h2>3. בדיקת רינדור Mini Charts</h2>
            <button id="testChartRender" class="btn btn-primary">הרץ בדיקה</button>
            <div id="chartRenderResult" class="test-result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h2>4. בדיקת זיכרון</h2>
            <button id="testMemory" class="btn btn-primary">הרץ בדיקה</button>
            <div id="memoryResult" class="test-result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h2>5. בדיקה מקיפה</h2>
            <button id="testComprehensive" class="btn btn-success">הרץ כל הבדיקות</button>
            <div id="comprehensiveResult" class="test-result" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        // Mock performance measurement functions
        function measureDataLoad() {
            return new Promise(async (resolve) => {
                const startTime = performance.now();
                const startMemory = performance.memory ? performance.memory.usedJSHeapSize : 0;
                
                try {
                    const response = await fetch('/api/tickers/with-initial-data', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        }
                    });
                    
                    const endTime = performance.now();
                    const endMemory = performance.memory ? performance.memory.usedJSHeapSize : 0;
                    
                    if (response.ok) {
                        const data = await response.json();
                        resolve({
                            success: true,
                            time: endTime - startTime,
                            memory: endMemory - startMemory,
                            tickerCount: data.data ? data.data.length : 0
                        });
                    } else {
                        resolve({
                            success: false,
                            error: `HTTP ${response.status}`
                        });
                    }
                } catch (error) {
                    const endTime = performance.now();
                    resolve({
                        success: false,
                        error: error.message,
                        time: endTime - startTime
                    });
                }
            });
        }
        
        function measureKPIRender(tickers) {
            return new Promise((resolve) => {
                const startTime = performance.now();
                const startMemory = performance.memory ? performance.memory.usedJSHeapSize : 0;
                
                // Simulate rendering
                const container = document.createElement('div');
                tickers.forEach(ticker => {
                    const card = document.createElement('div');
                    card.className = 'ticker-list-widget-item';
                    card.innerHTML = `
                        <div>${ticker.symbol}</div>
                        <div>${ticker.current_price || 'N/A'}</div>
                    `;
                    container.appendChild(card);
                });
                
                const endTime = performance.now();
                const endMemory = performance.memory ? performance.memory.usedJSHeapSize : 0;
                
                resolve({
                    success: true,
                    time: endTime - startTime,
                    memory: endMemory - startMemory,
                    itemCount: tickers.length
                });
            });
        }
        
        function measureChartRender(tickers) {
            return new Promise((resolve) => {
                const startTime = performance.now();
                const startMemory = performance.memory ? performance.memory.usedJSHeapSize : 0;
                
                // Simulate chart rendering (just DOM creation)
                const container = document.createElement('div');
                tickers.forEach(ticker => {
                    const chartContainer = document.createElement('div');
                    chartContainer.className = 'ticker-chart-widget-item-chart';
                    chartContainer.id = `chart-${ticker.id}`;
                    container.appendChild(chartContainer);
                });
                
                const endTime = performance.now();
                const endMemory = performance.memory ? performance.memory.usedJSHeapSize : 0;
                
                resolve({
                    success: true,
                    time: endTime - startTime,
                    memory: endMemory - startMemory,
                    chartCount: tickers.length
                });
            });
        }
        
        function getMemoryInfo() {
            if (performance.memory) {
                return {
                    used: performance.memory.usedJSHeapSize,
                    total: performance.memory.totalJSHeapSize,
                    limit: performance.memory.jsHeapSizeLimit
                };
            }
            return null;
        }
        
        // Test handlers
        document.getElementById('testDataLoad').addEventListener('click', async () => {
            const resultEl = document.getElementById('dataLoadResult');
            resultEl.style.display = 'block';
            resultEl.className = 'test-result';
            resultEl.innerHTML = '<div>טוען...</div>';
            
            const result = await measureDataLoad();
            
            if (result.success) {
                resultEl.className = 'test-result success';
                resultEl.innerHTML = `
                    <h4>✅ הצלחה</h4>
                    <div class="metric">
                        <span class="metric-label">זמן תגובה:</span>
                        <span class="metric-value">${result.time.toFixed(2)}ms</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">שימוש זיכרון:</span>
                        <span class="metric-value">${(result.memory / 1024).toFixed(2)}KB</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">מספר טיקרים:</span>
                        <span class="metric-value">${result.tickerCount}</span>
                    </div>
                `;
            } else {
                resultEl.className = 'test-result error';
                resultEl.innerHTML = `<h4>❌ שגיאה</h4><p>${result.error}</p>`;
            }
        });
        
        document.getElementById('testKPIRender').addEventListener('click', async () => {
            const resultEl = document.getElementById('kpiRenderResult');
            resultEl.style.display = 'block';
            resultEl.className = 'test-result';
            resultEl.innerHTML = '<div>טוען נתונים...</div>';
            
            // Load data first
            const dataResult = await measureDataLoad();
            if (!dataResult.success) {
                resultEl.className = 'test-result error';
                resultEl.innerHTML = `<h4>❌ שגיאה בטעינת נתונים</h4><p>${dataResult.error}</p>`;
                return;
            }
            
            // Get tickers
            const response = await fetch('/api/tickers/with-initial-data');
            const data = await response.json();
            const tickers = data.data || [];
            
            if (tickers.length === 0) {
                resultEl.className = 'test-result warning';
                resultEl.innerHTML = '<h4>⚠️ אין נתונים לבדיקה</h4>';
                return;
            }
            
            // Measure rendering
            const result = await measureKPIRender(tickers.slice(0, 5));
            
            resultEl.className = 'test-result success';
            resultEl.innerHTML = `
                <h4>✅ הצלחה</h4>
                <div class="metric">
                    <span class="metric-label">זמן רינדור:</span>
                    <span class="metric-value">${result.time.toFixed(2)}ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">שימוש זיכרון:</span>
                    <span class="metric-value">${(result.memory / 1024).toFixed(2)}KB</span>
                </div>
                <div class="metric">
                    <span class="metric-label">מספר כרטיסים:</span>
                    <span class="metric-value">${result.itemCount}</span>
                </div>
            `;
        });
        
        document.getElementById('testChartRender').addEventListener('click', async () => {
            const resultEl = document.getElementById('chartRenderResult');
            resultEl.style.display = 'block';
            resultEl.className = 'test-result';
            resultEl.innerHTML = '<div>טוען נתונים...</div>';
            
            // Load data first
            const response = await fetch('/api/tickers/with-initial-data');
            const data = await response.json();
            const tickers = data.data || [];
            
            if (tickers.length === 0) {
                resultEl.className = 'test-result warning';
                resultEl.innerHTML = '<h4>⚠️ אין נתונים לבדיקה</h4>';
                return;
            }
            
            // Measure rendering
            const result = await measureChartRender(tickers.slice(0, 3));
            
            resultEl.className = 'test-result success';
            resultEl.innerHTML = `
                <h4>✅ הצלחה</h4>
                <div class="metric">
                    <span class="metric-label">זמן רינדור:</span>
                    <span class="metric-value">${result.time.toFixed(2)}ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">שימוש זיכרון:</span>
                    <span class="metric-value">${(result.memory / 1024).toFixed(2)}KB</span>
                </div>
                <div class="metric">
                    <span class="metric-label">מספר גרפים:</span>
                    <span class="metric-value">${result.chartCount}</span>
                </div>
            `;
        });
        
        document.getElementById('testMemory').addEventListener('click', () => {
            const resultEl = document.getElementById('memoryResult');
            resultEl.style.display = 'block';
            
            const memory = getMemoryInfo();
            if (memory) {
                resultEl.className = 'test-result success';
                resultEl.innerHTML = `
                    <h4>✅ מידע זיכרון</h4>
                    <div class="metric">
                        <span class="metric-label">זיכרון בשימוש:</span>
                        <span class="metric-value">${(memory.used / 1024 / 1024).toFixed(2)}MB</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">זיכרון כולל:</span>
                        <span class="metric-value">${(memory.total / 1024 / 1024).toFixed(2)}MB</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">גבול זיכרון:</span>
                        <span class="metric-value">${(memory.limit / 1024 / 1024).toFixed(2)}MB</span>
                    </div>
                `;
            } else {
                resultEl.className = 'test-result warning';
                resultEl.innerHTML = '<h4>⚠️ מידע זיכרון לא זמין בדפדפן זה</h4>';
            }
        });
        
        document.getElementById('testComprehensive').addEventListener('click', async () => {
            const resultEl = document.getElementById('comprehensiveResult');
            resultEl.style.display = 'block';
            resultEl.className = 'test-result';
            resultEl.innerHTML = '<div>מריץ בדיקות מקיפות...</div>';
            
            const results = {
                dataLoad: null,
                kpiRender: null,
                chartRender: null,
                memory: null
            };
            
            // Run all tests
            results.dataLoad = await measureDataLoad();
            
            if (results.dataLoad.success) {
                const response = await fetch('/api/tickers/with-initial-data');
                const data = await response.json();
                const tickers = data.data || [];
                
                if (tickers.length > 0) {
                    results.kpiRender = await measureKPIRender(tickers.slice(0, 5));
                    results.chartRender = await measureChartRender(tickers.slice(0, 3));
                }
            }
            
            results.memory = getMemoryInfo();
            
            // Build summary
            let html = '<h4>📊 סיכום בדיקות</h4>';
            
            html += '<h5>1. טעינת נתונים</h5>';
            if (results.dataLoad.success) {
                html += `<div class="metric"><span class="metric-label">זמן:</span><span class="metric-value">${results.dataLoad.time.toFixed(2)}ms</span></div>`;
                html += `<div class="metric"><span class="metric-label">טיקרים:</span><span class="metric-value">${results.dataLoad.tickerCount}</span></div>`;
            } else {
                html += `<p class="text-danger">❌ ${results.dataLoad.error}</p>`;
            }
            
            if (results.kpiRender) {
                html += '<h5>2. רינדור KPI Cards</h5>';
                html += `<div class="metric"><span class="metric-label">זמן:</span><span class="metric-value">${results.kpiRender.time.toFixed(2)}ms</span></div>`;
            }
            
            if (results.chartRender) {
                html += '<h5>3. רינדור Mini Charts</h5>';
                html += `<div class="metric"><span class="metric-label">זמן:</span><span class="metric-value">${results.chartRender.time.toFixed(2)}ms</span></div>`;
            }
            
            if (results.memory) {
                html += '<h5>4. זיכרון</h5>';
                html += `<div class="metric"><span class="metric-label">בשימוש:</span><span class="metric-value">${(results.memory.used / 1024 / 1024).toFixed(2)}MB</span></div>`;
            }
            
            resultEl.className = 'test-result success';
            resultEl.innerHTML = html;
        });
    </script>
</body>
</html>
