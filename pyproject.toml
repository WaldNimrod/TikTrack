# Lint Enforcement Fast-Track — S002-P001. Ruff check-only; no auto-fix in CI.
[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Only fail on critical/blocking; ignore style/unused until aligned
select = ["E", "F"]
ignore = [
    "E402",   # module level import not at top (scripts/lazy imports)
    "E501",   # line too long
    "E712",   # equality comparison to True/False
    "F401",   # unused import
    "F541",   # f-string without placeholders
    "F821",   # undefined name (SQLAlchemy/forward refs in models)
    "F841",   # local variable assigned but never used
]

[tool.ruff.lint.per-file-ignores]
"api/scripts/*" = ["E402"]
