<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete All Cash Flows</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            direction: rtl;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #c82333;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>🗑️ מחיקת כל תזרימי המזומנים</h1>
    <p>פעולה זו תמחק <strong>את כל</strong> תזרימי המזומנים מבסיס הנתונים.</p>
    
    <button onclick="deleteAll()">🗑️ מחק הכל</button>
    
    <div id="result"></div>

    <script>
        async function deleteAll() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ מוחק...';
            resultDiv.className = '';
            
            try {
                const response = await fetch('http://localhost:8080/api/cash_flows/delete-all', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <h3>✅ הצלחה!</h3>
                        <p>נמחקו ${data.deleted_count} תזרימי מזומנים</p>
                        <p>${data.message}</p>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `
                        <h3>❌ שגיאה</h3>
                        <p>${data.error?.message || 'שגיאה לא צפויה'}</p>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h3>❌ שגיאת רשת</h3>
                    <p>${error.message}</p>
                    <p>ודא שהשרת רץ על http://localhost:8080</p>
                `;
            }
        }
    </script>
</body>
</html>
