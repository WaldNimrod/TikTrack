
<!DOCTYPE html>
<html lang='he' dir='rtl'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Stage 2 Batch 1 Test Runner</title>
</head>
<body>
    <h1>Stage 2 Batch 1 Test Runner</h1>
    <div id='results'></div>
    
    <script>
    // Load required scripts
    const scripts = [
        'scripts/jquery-3.6.0.min.js',
        'scripts/logger-service.js',
        'scripts/unified-cache-manager.js',
        'scripts/unified-crud-service.js',
        'scripts/crud_testing_dashboard.js'
    ];

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    async function loadAllScripts() {
        for (const src of scripts) {
            await loadScript(src);
        }
    }

    async function runTests() {
        try {
            console.log('🔄 Loading scripts...');
            await loadAllScripts();
            
            console.log('🚀 Running Stage 2 Batch 1 tests...');
            
            // Run executions test
            console.log('📊 Testing executions...');
            await window.runExecutionTestOnly();
            
            // Run trading_accounts test  
            console.log('💰 Testing trading_accounts...');
            await window.runTradingAccountTestOnly();
            
            document.getElementById('results').innerHTML = '<h2>✅ Tests completed - check console for results</h2>';
            
        } catch (error) {
            console.error('❌ Tests failed:', error);
            document.getElementById('results').innerHTML = '<h2 style="color:red">❌ Tests failed - check console</h2>';
        }
    }

    // Run tests when page loads
    window.addEventListener('load', runTests);
    </script>
</body>
</html>
