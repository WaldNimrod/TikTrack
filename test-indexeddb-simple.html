<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת IndexedDB פשוטה</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>🧪 בדיקת IndexedDB פשוטה</h1>
    <div id="results"></div>

    <!-- Load the unified initialization system -->
    <script src="trading-ui/scripts/unified-indexeddb-adapter.js"></script>
    <script src="trading-ui/scripts/application-initializer.js"></script>
    <script src="trading-ui/scripts/page-initialization-configs.js"></script>
    <script src="trading-ui/scripts/unified-app-initializer.js"></script>

    <script>
        async function testIndexedDB() {
            const resultsDiv = document.getElementById('results');
            let results = '';

            // Test 1: Check if UnifiedIndexedDB exists
            results += '<div class="status info">🔍 בודק UnifiedIndexedDB...</div>';
            
            if (typeof window.UnifiedIndexedDB === 'undefined') {
                results += '<div class="status error">❌ UnifiedIndexedDB לא נמצא</div>';
                resultsDiv.innerHTML = results;
                return;
            }
            
            results += '<div class="status success">✅ UnifiedIndexedDB נמצא</div>';

            // Test 2: Check initialization status
            results += '<div class="status info">🔍 בודק סטטוס אתחול...</div>';
            
            const isInitialized = window.UnifiedIndexedDB.isInitialized;
            if (isInitialized) {
                results += '<div class="status success">✅ IndexedDB מאותחל</div>';
            } else {
                results += '<div class="status error">❌ IndexedDB לא מאותחל</div>';
            }

            // Test 3: Try to use IndexedDB
            if (isInitialized) {
                results += '<div class="status info">🔍 בודק שימוש ב-IndexedDB...</div>';
                
                try {
                    // Try to save a test notification
                    const testNotification = {
                        title: 'בדיקה',
                        message: 'זהו הודעת בדיקה',
                        type: 'info',
                        timestamp: new Date().toISOString()
                    };
                    
                    await window.UnifiedIndexedDB.saveNotificationHistory(testNotification);
                    results += '<div class="status success">✅ שמירה ב-IndexedDB הצליחה</div>';
                    
                    // Try to read back
                    const history = await window.UnifiedIndexedDB.getNotificationHistory();
                    results += '<div class="status success">✅ קריאה מ-IndexedDB הצליחה (' + history.length + ' רשומות)</div>';
                    
                } catch (error) {
                    results += '<div class="status error">❌ שגיאה בשימוש ב-IndexedDB: ' + error.message + '</div>';
                }
            }

            // Test 4: Check if there are any console errors
            results += '<div class="status info">🔍 בודק שגיאות בקונסולה...</div>';
            
            // Check for common error patterns
            const hasIndexedDBErrors = consoleOutput.includes('UnifiedIndexedDB לא מאותחל עדיין');
            if (hasIndexedDBErrors) {
                results += '<div class="status error">❌ נמצאו שגיאות IndexedDB בקונסולה</div>';
            } else {
                results += '<div class="status success">✅ לא נמצאו שגיאות IndexedDB בקונסולה</div>';
            }

            resultsDiv.innerHTML = results;
        }

        // Capture console output
        let consoleOutput = '';
        const originalConsoleLog = console.log;
        const originalConsoleError = console.error;
        const originalConsoleWarn = console.warn;

        console.log = function(...args) {
            consoleOutput += args.join(' ') + '\n';
            originalConsoleLog.apply(console, args);
        };

        console.error = function(...args) {
            consoleOutput += 'ERROR: ' + args.join(' ') + '\n';
            originalConsoleError.apply(console, args);
        };

        console.warn = function(...args) {
            consoleOutput += 'WARN: ' + args.join(' ') + '\n';
            originalConsoleWarn.apply(console, args);
        };

        // Run test after page loads
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                testIndexedDB();
            }, 3000); // Wait 3 seconds for initialization
        });
    </script>
</body>
</html>
