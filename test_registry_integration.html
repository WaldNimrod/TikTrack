<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registry Integration</title>
</head>
<body>
    <h1>Registry Integration Test</h1>
    <div id="results"></div>

    <!-- Load the test scripts -->
    <script src="trading-ui/scripts/test-registry.js"></script>
    <script src="trading-ui/scripts/test-relevancy-rules.js"></script>
    <script src="trading-ui/scripts/testing/test-results-model.js"></script>
    <script src="trading-ui/scripts/testing/test-orchestrator.js"></script>

    <script>
        async function testRegistryIntegration() {
            const resultsDiv = document.getElementById('results');
            let output = '<h2>Registry Integration Test Results</h2>';

            try {
                // Test 1: Check if registry is loaded
                if (typeof window.TestRegistry !== 'undefined') {
                    output += '<p>✅ TestRegistry loaded: ' + Object.keys(window.TestRegistry).length + ' properties</p>';
                    output += '<p>Registry has ' + window.TestRegistry.TEST_REGISTRY.length + ' tests</p>';
                } else {
                    output += '<p>❌ TestRegistry not loaded</p>';
                }

                // Test 2: Check if relevancy rules are loaded
                if (typeof window.TestRelevancyRules !== 'undefined') {
                    output += '<p>✅ TestRelevancyRules loaded</p>';
                } else {
                    output += '<p>❌ TestRelevancyRules not loaded</p>';
                }

                // Test 3: Check if results model is loaded
                if (typeof window.TestResultsModel !== 'undefined') {
                    output += '<p>✅ TestResultsModel loaded</p>';
                } else {
                    output += '<p>❌ TestResultsModel not loaded</p>';
                }

                // Test 4: Check if orchestrator is loaded
                if (typeof window.TestOrchestrator !== 'undefined') {
                    output += '<p>✅ TestOrchestrator loaded</p>';
                } else {
                    output += '<p>❌ TestOrchestrator not loaded</p>';
                }

                // Test 5: Test page detection
                const currentPath = window.location.pathname;
                const pageKey = currentPath.substring(1) || 'index';
                output += '<p>Current page detected: ' + pageKey + '</p>';

                // Test 6: Test relevancy filtering for trades page
                if (window.TestRegistry && window.TestRelevancyRules) {
                    const relevantTests = window.TestRegistry.getTestsForPage('trades');
                    const filtered = window.TestRelevancyRules.filterRelevantTests(relevantTests, 'trades');

                    output += '<p>Trades page: ' + relevantTests.length + ' relevant tests, ' + filtered.length + ' after filtering</p>';

                    // Show some test names
                    const testNames = filtered.slice(0, 3).map(t => t.name);
                    output += '<p>Sample tests: ' + testNames.join(', ') + '</p>';
                }

            } catch (error) {
                output += '<p>❌ Error: ' + error.message + '</p>';
            }

            resultsDiv.innerHTML = output;
        }

        // Run test when page loads
        window.addEventListener('load', testRegistryIntegration);
    </script>
</body>
</html>
