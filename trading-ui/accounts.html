    - unified-header: כותרת האפליקציה החדשה עם ניווט ופילטרים מאוחדים

    - חלון ראשון: אישור סטנדרטי

    - החלפת app-header במערכת header-system החדשה
    - העתקת מבנה מדף העיצובים
    - הסרת טבלת התכנונים

    <script>
      // ===== Sorting system - adapted for accounts =====

      // Global variables for sorting
      let accountsCurrentSortColumn = null;
      let accountsCurrentSortDirection = 'asc';

      /**
       * Function for sorting the table
       * 
       * This function uses the global sorting system from main.js
       * to sort the accounts table by the selected column.
       * 
       * @param {number} columnIndex - column index for sorting (0-6)
       * 
       * @requires window.sortTableData - global function from main.js
       * @requires window.filteredAccountsData - filtered data
       * @requires accountsData - original data
       * @requires updateAccountsTable - function to update table
       * 
       * @since 2.0
       */
      function sortTable(columnIndex) {
        console.log(`🔄 מיון טבלת חשבונות לפי עמודה ${columnIndex}`);

        // Use global function
        if (typeof window.sortTableData === 'function') {
          const sortedData = window.sortTableData(
            columnIndex,
            window.filteredAccountsData || accountsData,
            'accounts',
            updateAccountsTable
          );

          // Update filtered data
          window.filteredAccountsData = sortedData;
        } else {
          if (typeof handleFunctionNotFound === 'function') {
            handleFunctionNotFound('sortTableData', 'פונקציית מיון טבלה לא נמצאה');
          }
        }
      }

      // Define function as global
      window.sortTable = sortTable;

      // ===== Account functions =====

      // Account data - will be loaded from server
      let accountsData = [];

      // Function to load account data - simplified like database.js
      async function loadAccountsData() {
        console.log('🚀🚀🚀 accounts.html loadAccountsData STARTED 🚀🚀🚀');
        try {
          console.log('🔄 טוען נתוני חשבונות...');
          console.log('🔄 About to fetch /api/v1/accounts/ directly...');

          const response = await fetch('/api/v1/accounts/');
          console.log('🚀 Response received:', response.status);

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          console.log('🚀 Data received:', data);
          console.log('🚀 Data type:', typeof data);
          console.log('🚀 Data has data property:', data && data.hasOwnProperty('data'));

          const accounts = data.data || data || [];
          console.log('🚀 Accounts extracted:', accounts);
          console.log('🚀 Accounts type:', typeof accounts);
          console.log('🚀 Accounts is array:', Array.isArray(accounts));
          console.log('🚀 Accounts length:', accounts.length);

          if (Array.isArray(accounts)) {
            accountsData = accounts;
            console.log('🔄 נתונים נטענו בהצלחה:', accounts.length, 'חשבונות');
            console.log('🚀🚀🚀 accounts.html loadAccountsData SUCCESS 🚀🚀🚀');

            // Update the table
            if (typeof window.updateAccountsTable === 'function') {
              window.updateAccountsTable(accounts);
            }

            // Update statistics
            if (typeof window.updateAccountStatistics === 'function') {
              window.updateAccountStatistics(accounts);
            }
          } else {
            throw new Error('הנתונים שהתקבלו אינם מערך');
          }
        } catch (error) {
          showNotification('שגיאה בטעינת נתוני חשבונות', 'error');
        }
      }

      // All functions moved to accounts.js?v=20250830_1 - using window functions from accounts.js?v=20250830_1
    </script>
