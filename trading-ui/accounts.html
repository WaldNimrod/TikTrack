<!DOCTYPE html>
<!--
  ========================================
  דף החשבונות - Accounts Page
  ========================================
  
  דף זה מציג את כל החשבונות במערכת
  כולל טבלה עם מיון ופילטרים, הוספה ועריכה
  
  תכונות:
  - טבלת חשבונות עם מיון ופילטרים
  - הוספת חשבון חדש
  - עריכת חשבון קיים
  - מחיקת חשבון
  - מערכת התראות גלובלית
  
  מחבר: Tik.track Development Team
  תאריך עדכון אחרון: 2025
  ========================================
-->
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חשבונות - Tik.track</title>

  <!-- 
    ===== דף חשבונות - TikTrack =====
    
    דף זה מכיל:
    1. כרטיסיות התראות - בחלק העליון
    2. טבלת חשבונות - הסקשן הראשי
    3. מערכת פילטרים ומיון מתקדמת
    4. מערכת אישור כפול למחיקת חשבונות
    
    מבנה הדף:
    - app-header: כותרת האפליקציה עם ניווט
    - page-body: תוכן ראשי מוגבל ברוחב (1400px)
      - top-section: כרטיסיות התראות וסיכום נתונים
      - content-section: טבלת חשבונות
    
    מערכת אישור כפול:
    - חלון ראשון: אישור סטנדרטי
    - חלון שני: בדיקת אובייקטים מקושרים (טריידים, התראות, תזרימי מזומן, הערות)
    - תצוגה מפורטת של אובייקטים מקושרים עם אפשרות הרחבה
    
    שינויים אחרונים:
    - העתקת מבנה מדף העיצובים
    - הסרת טבלת התכנונים
    - התמקדות בחשבונות בלבד
    - שיפור עיצוב כרטיסיות התראות
    - ריכוז פונקציות חשבונות ב-accounts.js
    - הוספת מערכת אישור כפול למחיקת חשבונות
    - אינטגרציה עם מערכת הפילטרים הגלובלית
  -->

  <!-- CSS Files - Ordered by priority (weak to strong) -->
  <!-- 1. Apple theme (base) -->
  <link rel="stylesheet" href="styles/apple-theme.css">

  <!-- 2. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 3. General styles -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- 4. Typography -->
  <link rel="stylesheet" href="styles/typography.css">

  <!-- 5. Table styles -->
  <link rel="stylesheet" href="styles/table.css">

  <!-- 6. Header system styles (highest priority) -->
  <link rel="stylesheet" href="styles/header-system.css">



  <!-- Modular grid files -->
  <script src="scripts/app-header.js"></script>
  <script src="scripts/console-cleanup.js"></script>
  <script src="scripts/header-system.js"></script>
  <script src="scripts/filter-system.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/alerts.js"></script>
  <script src="scripts/active-alerts-component.js"></script>
  <script src="scripts/accounts.js"></script>
</head>

<body>
  <!-- General background -->
  <div class="background-wrapper">

    <!-- Application header -->
    <app-header></app-header>

    <!-- Page body - all content after header -->
    <div class="page-body">
      <!-- Accounts area - top-Section -->
      <div class="top-section">
        <!-- Accounts header -->
        <div class="section-header">
          <div class="table-title">
            📋 חשבונות
          </div>
          <div class="table-actions">
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור סיכום">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- Data summary -->
        <div class="section-body">
          <div class="info-summary" id="summaryStats">
            <div>סה"כ חשבונות: <strong id="totalAccounts">0</strong></div>
            <div>חשבונות פתוחים: <strong id="activeAccounts">0</strong></div>
            <div>שווי כולל: <strong id="totalValue">₪0</strong></div>
            <div>רווח כולל: <strong id="totalProfit">₪0</strong></div>
          </div>
        </div>
      </div> <!-- End top-section -->

      <!-- Main content -->
      <div class="main-content">
        <!-- My accounts area - content-section -->
        <div class="content-section">
          <!-- My accounts header -->
          <div class="section-header">
            <div class="table-title">
              💰 החשבונות שלי
            </div>
            <div class="table-count">טוען...</div>
            <div class="table-actions">
              <button class="refresh-btn" onclick="showAddAccountModalLocal()" title="הוסף חשבון חדש">
                <span class="action-icon">➕</span> הוסף
              </button>

              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור חשבונות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- Accounts table -->
          <div class="section-body">
            <div class="table-responsive" id="accountsContainer">
              <table class="table" id="accountsTable" data-table-type="accounts">
                <thead>
                  <tr>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(0)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>שם
                        <br><span class="header-subtitle">Name</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(1)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>מטבע
                        <br><span class="header-subtitle">Currency</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(2)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>סטטוס
                        <br><span class="header-subtitle">Status</span>
                      </button>
                    </th>
                    <th class="actions-header">
                      פעולות
                      <br><span class="header-subtitle">Actions</span>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="8" class="loading">טוען חשבונות...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- End page-body -->

    <!-- Bottom page spacing -->
    <div style="height: 3rem;"></div>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modular files -->
    <script src="scripts/accounts.js"></script>

    <script>
      // ===== Sorting system - adapted for accounts =====

      // Global variables for sorting
      let accountsCurrentSortColumn = null;
      let accountsCurrentSortDirection = 'asc';

      /**
       * Function for sorting the table
       * 
       * This function uses the global sorting system from main.js
       * to sort the accounts table by the selected column.
       * 
       * @param {number} columnIndex - column index for sorting (0-6)
       * 
       * @requires window.sortTableData - global function from main.js
       * @requires window.filteredAccountsData - filtered data
       * @requires accountsData - original data
       * @requires updateAccountsTable - function to update table
       * 
       * @since 2.0
       */
      function sortTable(columnIndex) {
        console.log(`🔄 מיון טבלת חשבונות לפי עמודה ${columnIndex}`);

        // Use global function
        if (typeof window.sortTableData === 'function') {
          const sortedData = window.sortTableData(
            columnIndex,
            window.filteredAccountsData || accountsData,
            'accounts',
            updateAccountsTable
          );

          // Update filtered data
          window.filteredAccountsData = sortedData;
        } else {
          console.error('❌ sortTableData function not found in main.js');
        }
      }

      // Define function as global
      window.sortTable = sortTable;

      // ===== Account functions =====

      // Account data - will be loaded from server
      let accountsData = [];

      // Function to load account data
      async function loadAccountsData() {
        try {
          console.log('🔄 טוען נתוני חשבונות...');

          // Call function from accounts.js
          if (typeof window.loadAccountsDataFromAPI === 'function') {
            console.log('🔄 קורא נתונים מ-API...');
            const accounts = await window.loadAccountsDataFromAPI();

            // Check that array was received
            if (Array.isArray(accounts)) {
              accountsData = accounts;
              console.log('🔄 נתונים נטענו בהצלחה:', accounts.length, 'חשבונות');
            } else {
              console.error('❌ הנתונים שהתקבלו אינם מערך:', typeof accounts);
              throw new Error('הנתונים שהתקבלו אינם מערך');
            }
          } else {
            console.log('🔄 משתמש בנתוני דוגמה');
            // Use sample data already defined
          }
        } catch (error) {
          console.error('❌ שגיאה בטעינת נתוני חשבונות:', error);
          showNotification('שגיאה בטעינת נתוני חשבונות', 'error');
        }
      }

      // Function to update accounts table
      function updateAccountsTable(accounts = null) {
        try {
          const dataToShow = accounts || accountsData;
          const tableBody = document.querySelector('#accountsTable tbody');

          if (!tableBody) {
            console.error('❌ Table body not found');
            return;
          }

          if (!dataToShow || dataToShow.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="8" class="no-data">אין נתונים להצגה</td></tr>';
            return;
          }

          const rows = dataToShow.map(account => `
            <tr data-account-id="${account.id}">
              <td>${account.name || 'ללא שם'}</td>
              <td>${account.currency || 'N/A'}</td>
              <td>
                <span class="status-badge status-${account.status || 'unknown'}">
                  ${getStatusText(account.status)}
                </span>
              </td>
              <td class="actions-cell">
                <button class="btn btn-sm btn-outline-primary" onclick="editAccount(${account.id})" title="ערוך חשבון">
                  ✏️
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteAccount(${account.id})" title="מחק חשבון">
                  🗑️
                </button>
                <button class="btn btn-sm btn-outline-info" onclick="viewLinkedItems(${account.id})" title="צפה באלמנטים מקושרים">
                  🔗
                </button>
              </td>
            </tr>
          `).join('');

          tableBody.innerHTML = rows;

          // Update count
          const countElement = document.querySelector('.table-count');
          if (countElement) {
            countElement.textContent = `${dataToShow.length} חשבונות`;
          }

          console.log('✅ טבלת חשבונות עודכנה:', dataToShow.length, 'חשבונות');
        } catch (error) {
          console.error('❌ שגיאה בעדכון טבלת חשבונות:', error);
        }
      }

      // Function to get status text
      function getStatusText(status) {
        const statusMap = {
          'active': 'פעיל',
          'inactive': 'לא פעיל',
          'closed': 'סגור',
          'pending': 'ממתין'
        };
        return statusMap[status] || status || 'לא ידוע';
      }

      // Function to edit account
      async function editAccount(accountId) {
        try {
          console.log('🔄 עריכת חשבון:', accountId);

          // Find account in data
          const account = accountsData.find(a => a.id === accountId);
          if (!account) {
            showNotification('חשבון לא נמצא', 'error');
            return;
          }

          // Show edit modal (implement as needed)
          showNotification('פונקציית עריכה תפותח בקרוב', 'info');
        } catch (error) {
          console.error('❌ שגיאה בעריכת חשבון:', error);
          showNotification('שגיאה בעריכת חשבון', 'error');
        }
      }

      // Function to delete account
      async function deleteAccount(accountId) {
        try {
          console.log('🔄 מחיקת חשבון:', accountId);

          // Check for linked items first
          const linkedItems = await checkLinkedItems(accountId);

          if (linkedItems.hasLinkedItems) {
            // Show confirmation with linked items warning
            const confirmed = confirm(`החשבון מכיל אלמנטים מקושרים:\n\n${linkedItems.summary}\n\nהאם אתה בטוח שברצונך למחוק את החשבון?`);
            if (!confirmed) return;
          } else {
            // Regular confirmation
            const confirmed = confirm('האם אתה בטוח שברצונך למחוק חשבון זה?');
            if (!confirmed) return;
          }

          // Call delete function from accounts.js
          if (typeof window.deleteAccountFromAPI === 'function') {
            const success = await window.deleteAccountFromAPI(accountId);
            if (success) {
              // Remove from local data
              accountsData = accountsData.filter(a => a.id !== accountId);
              updateAccountsTable();
              showNotification('חשבון נמחק בהצלחה', 'success');
            } else {
              showNotification('שגיאה במחיקת החשבון', 'error');
            }
          } else {
            showNotification('פונקציית מחיקה לא זמינה', 'error');
          }
        } catch (error) {
          console.error('❌ שגיאה במחיקת חשבון:', error);
          showNotification('שגיאה במחיקת חשבון', 'error');
        }
      }

      // Function to view linked items
      async function viewLinkedItems(accountId) {
        try {
          console.log('🔄 צפייה באלמנטים מקושרים לחשבון:', accountId);

          const linkedItems = await checkLinkedItems(accountId);

          // Show modal with linked items details
          const modalContent = `
            <div class="modal-header">
              <h5 class="modal-title">אלמנטים מקושרים לחשבון</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${linkedItems.summary}
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
            </div>
          `;

          // Show modal (implement as needed)
          showNotification('פונקציית הצגת אלמנטים מקושרים תפותח בקרוב', 'info');
        } catch (error) {
          console.error('❌ שגיאה בצפייה באלמנטים מקושרים:', error);
          showNotification('שגיאה בצפייה באלמנטים מקושרים', 'error');
        }
      }

      // Function to check linked items
      async function checkLinkedItems(accountId) {
        try {
          console.log('🔄 בדיקת אלמנטים מקושרים לחשבון:', accountId);

          // Call API to get linked items
          if (typeof window.getLinkedItemsFromAPI === 'function') {
            const linkedItems = await window.getLinkedItemsFromAPI('account', accountId);
            return linkedItems;
          } else {
            // Mock data for testing
            const mockLinkedItems = {
              hasLinkedItems: false,
              summary: '<div class="text-muted">אין אלמנטים מקושרים</div>',
              details: {}
            };
            return mockLinkedItems;
          }
        } catch (error) {
          console.error('❌ שגיאה בבדיקת אלמנטים מקושרים:', error);
          return {
            hasLinkedItems: false,
            summary: '<div class="text-danger">שגיאה בבדיקת אלמנטים מקושרים</div>',
            details: {}
          };
        }
      }

      // Function to show/hide linked items details
      function toggleLinkedItemsDetails(itemType) {
        const detailsDiv = document.getElementById('linkedItemsDetails');
        if (!detailsDiv) return;

        if (detailsDiv.style.display === 'none') {
          // Show details
          let detailsContent = '';

          switch (itemType) {
            case 'טריידים':
              if (window.currentLinkedItems && window.currentLinkedItems.details.trades) {
                detailsContent = createTradesTable(window.currentLinkedItems.details.trades);
              }
              break;
            case 'התראות':
              if (window.currentLinkedItems && window.currentLinkedItems.details.alerts) {
                detailsContent = createAlertsTable(window.currentLinkedItems.details.alerts);
              }
              break;
            case 'תזרימי':
              if (window.currentLinkedItems && window.currentLinkedItems.details.cashFlows) {
                detailsContent = createCashFlowsTable(window.currentLinkedItems.details.cashFlows);
              }
              break;
            case 'הערות':
              if (window.currentLinkedItems && window.currentLinkedItems.details.notes) {
                detailsContent = createNotesTable(window.currentLinkedItems.details.notes);
              }
              break;
          }

          detailsDiv.innerHTML = detailsContent;
          detailsDiv.style.display = 'block';
        } else {
          // Hide details
          detailsDiv.style.display = 'none';
        }
      }

      // Helper functions to create tables
      function createTradesTable(trades) {
        const rows = trades.map(trade => `
        <tr>
          <td>${trade.ticker_symbol || `טיקר ${trade.ticker_id}`}</td>
          <td>${trade.status === 'open' ? 'פתוח' : trade.status === 'closed' ? 'סגור' : trade.status}</td>
          <td>${new Date(trade.created_at).toLocaleDateString('he-IL')}</td>
        </tr>
        `).join('');

        return `
        <table class="table table-sm">
          <thead>
            <tr>
              <th>טיקר</th>
              <th>סטטוס</th>
              <th>תאריך יצירה</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        `;
      }

      function createAlertsTable(alerts) {
        const rows = alerts.map(alert => `
        <tr>
          <td>${alert.message}</td>
          <td>${alert.status === 'open' ? 'פתוחה' : alert.status === 'closed' ? 'סגורה' : alert.status}</td>
          <td>${new Date(alert.created_at).toLocaleDateString('he-IL')}</td>
        </tr>
        `).join('');

        return `
        <table class="table table-sm">
          <thead>
            <tr>
              <th>הודעה</th>
              <th>סטטוס</th>
              <th>תאריך יצירה</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        `;
      }

      function createCashFlowsTable(cashFlows) {
        const rows = cashFlows.map(cf => `
        <tr>
          <td>${cf.amount}</td>
          <td>${cf.type}</td>
          <td>${new Date(cf.date).toLocaleDateString('he-IL')}</td>
        </tr>
        `).join('');

        return `
        <table class="table table-sm">
          <thead>
            <tr>
              <th>סכום</th>
              <th>סוג</th>
              <th>תאריך</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        `;
      }

      function createNotesTable(notes) {
        const rows = notes.map(note => `
        <tr>
          <td>${note.content.substring(0, 50)}...</td>
          <td>${new Date(note.created_at).toLocaleDateString('he-IL')}</td>
        </tr>
        `).join('');

        return `
        <table class="table table-sm">
          <thead>
            <tr>
              <th>תוכן</th>
              <th>תאריך יצירה</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        `;
      }

      // Function to show add account modal
      function showAddAccountModalLocal() {
        showNotification('פונקציית הוספת חשבון תפותח בקרוב', 'info');
      }

      // Function to show notification
      function showNotification(message, type = 'info') {
        if (typeof window.showNotification === 'function') {
          window.showNotification(message, type);
        } else {
          console.log(`[${type.toUpperCase()}] ${message}`);
        }
      }

      // Initialize page
      document.addEventListener('DOMContentLoaded', function () {
        console.log('🚀 Initializing accounts page...');
        loadAccountsData();
      });
    </script>
</body>

</html>
