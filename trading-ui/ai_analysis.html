                                                </div>
                                            </div>
                                        </div>

                                                    <div class="text-center">
                                                        <div class="spinner-border text-success" role="status">

                                                        </div>

    <!-- Page-specific script -->
    <script>
        // AI Analysis page functionality
        window.refreshAIAnalysis = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('ניתוח AI', 'מרענן נתונים...', 2000);
            }

            // Simulate AI processing
            setTimeout(() => {
                if (window.NotificationSystem) {
                    window.NotificationSystem.showSuccess('ניתוח AI', 'הנתונים עודכנו בהצלחה!', 3000);
                }
            }, 2000);
        };

        // Auto-initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎯 AI Analysis page loaded');
        });
    </script>
