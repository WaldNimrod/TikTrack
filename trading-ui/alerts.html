<!DOCTYPE html>
<!--
  ========================================
  דף ההתראות - Alerts Page
  ========================================
  
  דף זה מציג את כל ההתראות במערכת
  כולל טבלה עם מיון ופילטרים, הוספה ועריכה
  
  תכונות:
  - טבלת התראות עם מיון ופילטרים
  - הוספת התראה חדשה
  - עריכת התראה קיימת
  - מחיקת התראה
  - מערכת התראות גלובלית
  
  מחבר: Tik.track Development Team
  תאריך עדכון אחרון: 2025
  ========================================
-->
<html lang="he" dir="rtl">

            <!-- ===== CSS Architecture - Unified CSS ===== -->
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack CSS - Unified CSS (No @import) -->
    <link rel="stylesheet" href="styles-new/unified.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Error Handlers -->
    <script src="scripts/error-handlers.js"></script></head>

<body class="alerts-page">
  <!-- General background -->
  <div class="background-wrapper">

    <!-- unified-header ייווצר כאן אוטומטית -->

    <!-- Page body - All content after header -->
    <div class="page-body">
      <!-- Alerts area - top-Section -->
      <div class="top-section" id="alertsTopSection">
        <!-- Alerts header -->
        <div class="section-header">
          <div class="table-title">
            <img src="images/icons/alerts.svg" alt="התראות" class="section-icon">
            התראות
          </div>
          <div class="table-actions">
            <button id="addAlertBtn" class="refresh-btn" onclick="showAddAlertModal()" title="הוסף התראה חדשה">
              <span class="action-icon">➕</span> הוסף
            </button>
            
            <!-- כפתורי עריכה ומחיקה נסתרים (לזיהוי בבדיקות) -->
            <button id="editAlertBtn" class="refresh-btn d-none" onclick="editAlert('')" title="ערוך התראה נבחרת">
              <span class="action-icon">✏️</span> ערוך
            </button>
            <button id="deleteAlertBtn" class="refresh-btn d-none" onclick="deleteAlert('')" title="מחק התראה נבחרת">
              <span class="action-icon">🗑️</span> מחק
            </button>
            
            <div class="action-separator"></div>
            <div class="action-separator"></div>
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור התראות">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- Alert cards -->
        <div class="section-body">
          <!-- Color Scheme Demo for Alerts -->
          <div id="alertsColorDemo" class="mb-3 d-none">
            <div class="d-flex gap-2 mb-2">
              <span class="entity-alert-badge">התראה פעילה</span>
              <span class="entity-ticker-badge">טיקר AAPL</span>
              <span class="entity-trade-badge">טרייד #123</span>
            </div>
            <div class="alert alert-info">
              <small>🎨 דמונסטרציה למערכת הצבעים הדינמית - נוצרה אוטומטית עם מחלקות ישויות</small>
            </div>
          </div>
          
          <!-- Active alerts web component -->
          <active-alerts></active-alerts>

          <!-- Data summary -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ התראות: <strong id="totalAlerts">0</strong></div>
            <div>התראות פעילות: <strong id="activeAlerts">0</strong></div>
            <div>התראות חדשות: <strong id="newAlerts">0</strong></div>
            <div>התראות היום: <strong id="todayAlerts">0</strong></div>
            <div>התראות השבוע: <strong id="weekAlerts">0</strong></div>
          </div>
        </div>
      </div> <!-- End top-section -->

      <!-- Main content -->
      <div class="main-content">

        <!-- Alerts area - content-section -->
        <div class="content-section alerts-page" id="alertsMainSection">
          <!-- Alerts header -->
          <div class="section-header">
            <div class="table-title">
              <img src="images/icons/alerts.svg" alt="ההתראות שלי" class="section-icon">
              ההתראות שלי
            </div>
            <div class="table-count">טוען...</div>
            <div class="table-actions">
              <!-- Quick filters -->
              <button class="btn btn-sm active" onclick="filterAlertsByRelatedObjectType('all')" data-type="all" title="הצג הכל">
                הכל
              </button>
              <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('account')" data-type="account" title="חשבונות">
                <img src="images/icons/accounts.svg" alt="חשבונות" class="filter-icon">
              </button>
              <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('trade')" data-type="trade" title="טריידים">
                <img src="images/icons/trades.svg" alt="טריידים" class="filter-icon">
              </button>
              <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('trade_plan')" data-type="trade_plan" title="תוכניות">
                <img src="images/icons/trade_plans.svg" alt="תוכניות" class="filter-icon">
              </button>
              <button class="btn btn-sm btn-outline-primary filter-icon-btn" onclick="filterAlertsByRelatedObjectType('ticker')" data-type="ticker" title="טיקרים">
                <img src="images/icons/tickers.svg" alt="טיקרים" class="filter-icon">
              </button>
              
              <span class="filter-separator">|</span>
              
              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור התראות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- Alerts table -->
          <div class="section-body">
            <div class="table-responsive" id="alertsContainer">
              <table class="table" id="alertsTable" data-table-type="alerts">
                <thead>
                  <tr>
                    <th class="col-10">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        טיקר <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="col-18">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTableData(1, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        תנאי <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="col-8">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTableData(2, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        סטטוס <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="col-8">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTableData(3, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        הופעל <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="col-20">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTableData(4, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        קשור ל: <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="col-12">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTableData(5, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        הודעה <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="col-10">
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTableData(6, window.filteredAlertsData || alertsData, 'alerts', updateAlertsTable); }">
                        נוצר ב: <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="actions-cell col-14">
                      פעולות
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="8" class="loading">טוען התראות...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- End page-body -->

    <!-- Bottom page spacing -->
    <div class="bottom-spacing"></div>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Toast container for notifications -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3 toast-high-z-index"></div>

    <!-- Add Alert Modal -->
    <div class="modal fade" id="addAlertModal" tabindex="-1" aria-labelledby="addAlertModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="addAlertModalLabel">הוספת התראה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addAlertForm">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">התראה עבור:</label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationTradePlan" value="3" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationTradePlan">תוכנית טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationTrade" value="2" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationTrade">טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationAccount" value="1" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationAccount">חשבון</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationTicker" value="4" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationTicker">טיקר</label>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="alertRelatedObjectSelect" disabled
                          onchange="onRelatedObjectChange(this)">
                          <option value="">בחר אובייקט לשיוך...</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">

                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">תנאי התראה *</label>
                    <div class="row">
                      <div class="col-md-4">
                        <select class="form-select" id="conditionAttribute" required disabled>
                          <option value="">בחר תכונה...</option>
                          <option value="price">מחיר</option>
                          <option value="change">שינוי</option>
                          <option value="ma">ממוצע נע</option>
                          <option value="volume">נפח מסחר</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <select class="form-select" id="conditionOperator" required disabled>
                          <option value="">בחר אופרטור...</option>
                          <option value="more_than">יותר מ</option>
                          <option value="less_than">פחות מ</option>
                          <option value="cross">חוצה</option>
                          <option value="cross_up">חוצה למעלה</option>
                          <option value="cross_down">חוצה למטה</option>
                          <option value="change">שינוי</option>
                          <option value="change_up">שינוי למעלה</option>
                          <option value="change_down">שינוי למטה</option>
                          <option value="equals">שווה</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <input type="number" class="form-control" id="conditionNumber" step="0.01" placeholder="ערך"
                          required disabled>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="alertMessage" class="form-label">הודעת התראה</label>
                    <input type="text" class="form-control" id="alertMessage" placeholder="הודעה שתוצג בעת הפעלת ההתראה"
                      disabled>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-success btn-save" onclick="saveAlert()">שמור
              התראה</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Alert Modal -->
    <div class="modal fade" id="editAlertModal" tabindex="-1" aria-labelledby="editAlertModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="editAlertModalLabel">עריכת התראה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editAlertForm">
              <input type="hidden" id="editAlertId">
              <input type="hidden" id="editAlertStatus">
              <input type="hidden" id="editAlertIsTriggered">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">התראה עבור:</label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationTradePlan" value="3"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationTradePlan">תוכנית טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationTrade" value="2"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationTrade">טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationAccount" value="1"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationAccount">חשבון</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationTicker" value="4"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationTicker">טיקר</label>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="editAlertRelatedObjectSelect"
                          onchange="onEditRelatedObjectChange(this)">
                          <option value="">בחר אובייקט לשיוך...</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">

                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">תנאי התראה *</label>
                    <div class="row">
                      <div class="col-md-4">
                        <select class="form-select" id="editConditionAttribute" required disabled>
                          <option value="">בחר תכונה...</option>
                          <option value="price">מחיר</option>
                          <option value="change">שינוי</option>
                          <option value="ma">ממוצע נע</option>
                          <option value="volume">נפח מסחר</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <select class="form-select" id="editConditionOperator" required disabled>
                          <option value="">בחר אופרטור...</option>
                          <option value="more_than">יותר מ</option>
                          <option value="less_than">פחות מ</option>
                          <option value="cross">חוצה</option>
                          <option value="cross_up">חוצה למעלה</option>
                          <option value="cross_down">חוצה למטה</option>
                          <option value="change">שינוי</option>
                          <option value="change_up">שינוי למעלה</option>
                          <option value="change_down">שינוי למטה</option>
                          <option value="equals">שווה</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <input type="number" class="form-control" id="editConditionNumber" step="0.01" placeholder="ערך"
                          required disabled>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editAlertMessage" class="form-label">הודעת התראה</label>
                    <input type="text" class="form-control" id="editAlertMessage"
                      placeholder="הודעה שתוצג בעת הפעלת ההתראה" disabled>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editAlertState" class="form-label">מצב התראה</label>
                    <select class="form-select" id="editAlertState" onchange="updateStatusAndTriggered()">
                      <option value="new">חדש (פתוח + לא הופעל)</option>
                      <option value="active">פעיל (פתוח + שומר על מצב הפעלה)</option>
                      <option value="unread">לא נקרא (סגור + חדש)</option>
                      <option value="read">נקרא (סגור + נקרא)</option>
                      <option value="cancelled">מבוטל (מבוטל + לא הופעל)</option>
                    </select>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-success btn-save" onclick="updateAlert()">עדכן
              התראה</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </div> <!-- End background-wrapper -->

    <!-- Modular files -->
    <script src="scripts/main.js"></script>
    <script src="scripts/header-system.js"></script>
    <script src="scripts/alert-service.js"></script>
    <script src="scripts/alerts.js"></script>
    <script src="scripts/active-alerts-component.js"></script>
    <script>
      // אתחול מערכת ראש הדף החדשה
      document.addEventListener("DOMContentLoaded", () => {
        console.log('🚀 טעינת דף התראות עם מערכת ראש דף חדשה...');

        // אתחול HeaderSystem
        if (window.headerSystem && !window.headerSystem.isInitialized) {
          console.log('✅ אתחול HeaderSystem...');
          window.headerSystem.init();
        }

        // וידוא שהמודולים נסגרים בלחיצה על הרקע
        const modals = document.querySelectorAll('.modal');
        modals.forEach(modal => {
          // הוספת data-bs-backdrop אם לא קיים
          if (!modal.hasAttribute('data-bs-backdrop')) {
            modal.setAttribute('data-bs-backdrop', 'true');
          }
          
          // הוספת data-bs-keyboard אם לא קיים
          if (!modal.hasAttribute('data-bs-keyboard')) {
            modal.setAttribute('data-bs-keyboard', 'true');
          }

          // הוספת event listener לסגירה בלחיצה על הרקע
          modal.addEventListener('click', (event) => {
            if (event.target === modal) {
              const modalInstance = bootstrap.Modal.getInstance(modal);
              if (modalInstance) {
                modalInstance.hide();
              }
            }
          });
        });

        console.log('✅ מודולים הוגדרו לסגירה בלחיצה על הרקע');
      });
      
    </script>
</body>

</html>
