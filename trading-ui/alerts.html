<!DOCTYPE html>
<!--
  ========================================
  דף ההתראות - Alerts Page
  ========================================
  
  דף זה מציג את כל ההתראות במערכת
  כולל טבלה עם מיון ופילטרים, הוספה ועריכה
  
  תכונות:
  - טבלת התראות עם מיון ופילטרים
  - הוספת התראה חדשה
  - עריכת התראה קיימת
  - מחיקת התראה
  - מערכת התראות גלובלית
  
  מחבר: Tik.track Development Team
  תאריך עדכון אחרון: 2025
  ========================================
-->
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול התראות - TikTrack</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- CSS Files - Ordered by priority (weak to strong) -->
  <!-- 1. Apple theme (base) -->
  <link rel="stylesheet" href="styles/apple-theme.css">

  <!-- 2. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 3. General styles -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- 4. Typography -->
  <link rel="stylesheet" href="styles/typography.css">

  <!-- 5. Table styles -->
  <link rel="stylesheet" href="styles/table.css">

  <!-- 6. Header system styles (highest priority) -->
  <link rel="stylesheet" href="styles/header-system.css">

  <!-- Modular grid files -->
  <script src="scripts/button-icons.js"></script>
  <script src="scripts/header-system.js"></script>
  <script src="scripts/console-cleanup.js"></script>
  <script src="scripts/simple-filter.js"></script>
  <script src="scripts/translation-utils.js"></script>
  <script src="scripts/data-utils.js"></script>
  <script src="scripts/notification-system.js"></script>
  <script src="scripts/ui-utils.js"></script>
  <script src="scripts/linked-items.js"></script>
  <script src="scripts/table-mappings.js"></script>
  <script src="scripts/date-utils.js"></script>
  <script src="scripts/tables.js"></script>
  <script src="scripts/page-utils.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/alerts.js"></script>
  <script src="scripts/active-alerts-component.js"></script>
  <script src="scripts/accounts.js"></script>
</head>

<body class="alerts-page">
  <!-- General background -->
  <div class="background-wrapper">

    <!-- כותרת האפליקציה החדשה - נוצרת אוטומטית על ידי header-system.js -->
    <!-- unified-header ייווצר כאן אוטומטית -->

    <!-- Page body - All content after header -->
    <div class="page-body">
      <!-- Alerts area - top-Section -->
      <div class="top-section" id="alertsTopSection">
        <!-- Alerts header -->
        <div class="section-header">
          <div class="table-title">
            <img src="images/icons/alerts.svg" alt="התראות"
              style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
            התראות
          </div>
          <div class="table-actions">
            <button class="refresh-btn" onclick="showAddAlertModal()" title="הוסף התראה חדשה">
              <span class="action-icon">➕</span> הוסף
            </button>
            <div class="action-separator"></div>
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור התראות">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- Alert cards -->
        <div class="section-body">
          <!-- Active alerts web component -->
          <active-alerts></active-alerts>

          <!-- Data summary -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ התראות: <strong id="totalAlerts">0</strong></div>
            <div>התראות פעילות: <strong id="activeAlerts">0</strong></div>
            <div>התראות חדשות: <strong id="newAlerts">0</strong></div>
            <div>התראות היום: <strong id="todayAlerts">0</strong></div>
            <div>התראות השבוע: <strong id="weekAlerts">0</strong></div>
          </div>
        </div>
      </div> <!-- End top-section -->

      <!-- Main content -->
      <div class="main-content">

        <!-- Alerts area - content-section -->
        <div class="content-section alerts-page" id="alertsMainSection">
          <!-- Alerts header -->
          <div class="section-header">
            <div class="table-title">
              <img src="images/icons/alerts.svg" alt="ההתראות שלי"
                style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
              ההתראות שלי
            </div>
            <div class="table-count">טוען...</div>
            <div class="table-actions">
              <button class="refresh-btn" onclick="showAddAlertModal()" title="הוסף התראה חדשה">
                <span class="action-icon">➕</span> הוסף
              </button>
              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור התראות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- Alerts table -->
          <div class="section-body">
            <div class="table-responsive" id="alertsContainer">
              <table class="table" id="alertsTable" data-table-type="alerts">
                <thead>
                  <tr>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        טיקר <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        תנאי <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        סטטוס <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        הופעל <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        קשור ל: <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        הודעה <span class="sort-icon">↕</span>
                      </button>
                    </th>

                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(7); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none; white-space: nowrap;">
                        נוצר ב: <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="actions-cell">
                      פעולות
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="8" class="loading">טוען התראות...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- End page-body -->

    <!-- Bottom page spacing -->
    <div style="height: 3rem;"></div>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Toast container for notifications -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

    <!-- Add Alert Modal -->
    <div class="modal fade" id="addAlertModal" tabindex="-1" aria-labelledby="addAlertModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addAlertModalLabel">הוספת התראה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addAlertForm">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">התראה עבור:</label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationTradePlan" value="3" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationTradePlan">תוכנית טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationTrade" value="2" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationTrade">טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationAccount" value="1" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationAccount">חשבון</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="alertRelationType" id="alertRelationTicker" value="4" required
                            onchange="onRelationTypeChange(this)">
                          <label for="alertRelationTicker">טיקר</label>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="alertRelatedObjectSelect" style="width: 100%;" disabled
                          onchange="onRelatedObjectChange(this)">
                          <option value="">בחר אובייקט לשיוך...</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">

                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">תנאי התראה *</label>
                    <div class="row">
                      <div class="col-md-4">
                        <select class="form-select" id="conditionAttribute" required disabled>
                          <option value="">בחר תכונה...</option>
                          <option value="price">מחיר</option>
                          <option value="change">שינוי</option>
                          <option value="ma">ממוצע נע</option>
                          <option value="volume">נפח מסחר</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <select class="form-select" id="conditionOperator" required disabled>
                          <option value="">בחר אופרטור...</option>
                          <option value="more_than">יותר מ</option>
                          <option value="less_than">פחות מ</option>
                          <option value="cross">חוצה</option>
                          <option value="cross_up">חוצה למעלה</option>
                          <option value="cross_down">חוצה למטה</option>
                          <option value="change">שינוי</option>
                          <option value="change_up">שינוי למעלה</option>
                          <option value="change_down">שינוי למטה</option>
                          <option value="equals">שווה</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <input type="number" class="form-control" id="conditionNumber" step="0.01" placeholder="ערך"
                          required disabled>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="alertMessage" class="form-label">הודעת התראה</label>
                    <input type="text" class="form-control" id="alertMessage" placeholder="הודעה שתוצג בעת הפעלת ההתראה"
                      disabled>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-success" onclick="saveAlert()"
              style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">שמור
              התראה</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Alert Modal -->
    <div class="modal fade" id="editAlertModal" tabindex="-1" aria-labelledby="editAlertModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editAlertModalLabel">עריכת התראה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editAlertForm">
              <input type="hidden" id="editAlertId">
              <input type="hidden" id="editAlertStatus">
              <input type="hidden" id="editAlertIsTriggered">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">התראה עבור:</label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationTradePlan" value="3"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationTradePlan">תוכנית טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationTrade" value="2"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationTrade">טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationAccount" value="1"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationAccount">חשבון</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editAlertRelationType" id="editAlertRelationTicker" value="4"
                            required onchange="onEditRelationTypeChange(this)">
                          <label for="editAlertRelationTicker">טיקר</label>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="editAlertRelatedObjectSelect" style="width: 100%;"
                          onchange="onEditRelatedObjectChange(this)">
                          <option value="">בחר אובייקט לשיוך...</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">

                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">תנאי התראה *</label>
                    <div class="row">
                      <div class="col-md-4">
                        <select class="form-select" id="editConditionAttribute" required disabled>
                          <option value="">בחר תכונה...</option>
                          <option value="price">מחיר</option>
                          <option value="change">שינוי</option>
                          <option value="ma">ממוצע נע</option>
                          <option value="volume">נפח מסחר</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <select class="form-select" id="editConditionOperator" required disabled>
                          <option value="">בחר אופרטור...</option>
                          <option value="more_than">יותר מ</option>
                          <option value="less_than">פחות מ</option>
                          <option value="cross">חוצה</option>
                          <option value="cross_up">חוצה למעלה</option>
                          <option value="cross_down">חוצה למטה</option>
                          <option value="change">שינוי</option>
                          <option value="change_up">שינוי למעלה</option>
                          <option value="change_down">שינוי למטה</option>
                          <option value="equals">שווה</option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <input type="number" class="form-control" id="editConditionNumber" step="0.01" placeholder="ערך"
                          required disabled>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editAlertMessage" class="form-label">הודעת התראה</label>
                    <input type="text" class="form-control" id="editAlertMessage"
                      placeholder="הודעה שתוצג בעת הפעלת ההתראה" disabled>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editAlertState" class="form-label">מצב התראה</label>
                    <select class="form-select" id="editAlertState" onchange="updateStatusAndTriggered()">
                      <option value="new">חדש (פתוח + לא הופעל)</option>
                      <option value="active">פעיל (פתוח + שומר על מצב הפעלה)</option>
                      <option value="unread">לא נקרא (סגור + חדש)</option>
                      <option value="read">נקרא (סגור + נקרא)</option>
                      <option value="cancelled">מבוטל (מבוטל + לא הופעל)</option>
                    </select>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-success" onclick="updateAlert()"
              style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
              התראה</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <script>
      // אתחול מערכת ראש הדף החדשה
      document.addEventListener("DOMContentLoaded", () => {
        console.log('🚀 טעינת דף התראות עם מערכת ראש דף חדשה...');

        // אתחול HeaderSystem
        if (window.headerSystem && !window.headerSystem.isInitialized) {
          console.log('✅ אתחול HeaderSystem...');
          window.headerSystem.init();
        }
      });
    </script>
</body>

</html>
