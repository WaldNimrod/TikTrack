<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת שמירת התראות ל-IndexedDB</title>
    
    <!-- Google Fonts - עם font-display: swap -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Bootstrap CSS - Must load first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=1e88302_20251013_022247" rel="stylesheet" crossorigin="anonymous">
    
    <!-- ITCSS Architecture - Individual Files (September 2025) -->
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .button:hover { background: #0056b3; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ffc107; }
    </style>
</head>
<body>
    <h1>🧪 בדיקת שמירת התראות ל-IndexedDB</h1>
    
    <div class="test-section">
        <h3>1. אתחול IndexedDB</h3>
        <button class="button" onclick="initializeIndexedDB()">אתחל IndexedDB</button>
        <div id="init-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>2. יצירת התראה ידנית</h3>
        <button class="button" onclick="createTestNotification()">צור התראה לבדיקה</button>
        <div id="notification-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>3. בדיקת נתונים ב-IndexedDB</h3>
        <button class="button" onclick="checkIndexedDBData()">בדוק נתונים ב-IndexedDB</button>
        <div id="data-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>4. בדיקת נתונים ב-localStorage</h3>
        <button class="button" onclick="checkLocalStorageData()">בדוק נתונים ב-localStorage</button>
        <div id="localstorage-log" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>5. בדיקת מערכת הלוגים המאוחדת</h3>
        <button class="button" onclick="testUnifiedLogSystem()">בדוק מערכת לוגים</button>
        <div id="unified-log" class="log"></div>
    </div>

    <!-- Scripts -->
    <script src="scripts/notification-system.js?v=1e88302_20251013_022247"></script>
    <script src="scripts/notification-category-detector.js?v=1e88302_20251013_022247"></script>
    <script src="scripts/unified-log-manager.js?v=1e88302_20251013_022247"></script>
    <script src="scripts/unified-log-display.js?v=1e88302_20251013_022247"></script>
    <script src="scripts/unified-log-api.js?v=1e88302_20251013_022247"></script>

    <script>
        let logContainer = null;
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const logMessage = `[${timestamp}] ${message}\n`;
            
            if (logContainer) {
                logContainer.textContent += logMessage;
                logContainer.className = `log ${type}`;
            }
            console.log(logMessage);
        }
        
        async function initializeIndexedDB() {
            logContainer = document.getElementById('init-log');
            logContainer.textContent = '';
            
            try {
                log('🚀 מתחיל אתחול IndexedDB...');
                
                if (!window.UnifiedIndexedDB) {
                    log('❌ UnifiedIndexedDB לא זמין', 'error');
                    return;
                }
                
                if (window.UnifiedIndexedDB.isInitialized) {
                    log('✅ IndexedDB כבר מאותחל', 'success');
                    return;
                }
                
                await window.UnifiedIndexedDB.initialize();
                log('✅ IndexedDB אותחל בהצלחה', 'success');
                
            } catch (error) {
                log(`❌ שגיאה באתחול IndexedDB: ${error.message}`, 'error');
            }
        }
        
        async function createTestNotification() {
            logContainer = document.getElementById('notification-log');
            logContainer.textContent = '';
            
            try {
                log('🔔 יוצר התראה לבדיקה...');
                
                const testNotification = {
                    type: 'success',
                    title: 'בדיקת שמירה',
                    message: 'זוהי התראה לבדיקת שמירה ב-IndexedDB',
                    category: 'system',
                    time: new Date(),
                    timestamp: Date.now(),
                    page: window.location.pathname,
                    url: window.location.href
                };
                
                log(`📝 התראה נוצרה: ${JSON.stringify(testNotification, null, 2)}`);
                
                // שמירה דרך מערכת ההתראות
                if (window.showNotification) {
                    window.showNotification(testNotification.message, testNotification.type);
                    log('✅ התראה נשלחה דרך מערכת ההתראות', 'success');
                } else {
                    log('⚠️ מערכת ההתראות לא זמינה', 'warning');
                }
                
                // שמירה ישירה ל-IndexedDB
                if (window.UnifiedIndexedDB && window.UnifiedIndexedDB.isInitialized) {
                    try {
                        const result = await window.UnifiedIndexedDB.saveNotificationHistory(testNotification, 'test-manual');
                        log(`✅ התראה נשמרה ישירות ל-IndexedDB עם ID: ${result}`, 'success');
                    } catch (error) {
                        log(`❌ שגיאה בשמירה ישירה: ${error.message}`, 'error');
                    }
                } else {
                    log('⚠️ IndexedDB לא זמין לשמירה ישירה', 'warning');
                }
                
            } catch (error) {
                log(`❌ שגיאה ביצירת התראה: ${error.message}`, 'error');
            }
        }
        
        async function checkIndexedDBData() {
            logContainer = document.getElementById('data-log');
            logContainer.textContent = '';
            
            try {
                log('🔍 בודק נתונים ב-IndexedDB...');
                
                if (!window.UnifiedIndexedDB || !window.UnifiedIndexedDB.isInitialized) {
                    log('❌ IndexedDB לא זמין', 'error');
                    return;
                }
                
                const data = await window.UnifiedIndexedDB.getNotificationHistory();
                log(`📊 נמצאו ${data.length} רשומות ב-IndexedDB`);
                
                if (data.length > 0) {
                    log('📋 5 הרשומות האחרונות:');
                    data.slice(-5).forEach((item, index) => {
                        log(`${index + 1}. ${item.title || 'ללא כותרת'} - ${item.type} - ${new Date(item.timestamp).toLocaleString('he-IL')}`);
                    });
                } else {
                    log('📭 אין נתונים ב-IndexedDB', 'warning');
                }
                
            } catch (error) {
                log(`❌ שגיאה בבדיקת IndexedDB: ${error.message}`, 'error');
            }
        }
        
        function checkLocalStorageData() {
            logContainer = document.getElementById('localstorage-log');
            logContainer.textContent = '';
            
            try {
                log('🔍 בודק נתונים ב-localStorage...');
                
                const savedHistory = localStorage.getItem('tiktrack_global_notifications_history');
                if (savedHistory) {
                    const data = JSON.parse(savedHistory);
                    log(`📊 נמצאו ${data.length} רשומות ב-localStorage`);
                    
                    if (data.length > 0) {
                        log('📋 5 הרשומות האחרונות:');
                        data.slice(0, 5).forEach((item, index) => {
                            log(`${index + 1}. ${item.title || 'ללא כותרת'} - ${item.type} - ${new Date(item.timestamp).toLocaleString('he-IL')}`);
                        });
                    }
                } else {
                    log('📭 אין נתונים ב-localStorage', 'warning');
                }
                
            } catch (error) {
                log(`❌ שגיאה בבדיקת localStorage: ${error.message}`, 'error');
            }
        }
        
        async function testUnifiedLogSystem() {
            logContainer = document.getElementById('unified-log');
            logContainer.textContent = '';
            
            try {
                log('🔍 בודק מערכת הלוגים המאוחדת...');
                
                if (!window.UnifiedLogAPI) {
                    log('❌ UnifiedLogAPI לא זמין', 'error');
                    return;
                }
                
                // אתחול מערכת הלוגים
                if (!window.UnifiedLogAPI.initialized) {
                    await window.UnifiedLogAPI.initialize();
                    log('✅ מערכת הלוגים אותחלה', 'success');
                }
                
                // קבלת נתונים
                const logData = await window.UnifiedLogManager.getLogData('notificationHistory');
                log(`📊 מערכת הלוגים מצאה ${logData.data.length} רשומות`);
                
                if (logData.data.length > 0) {
                    log('📋 3 הרשומות האחרונות:');
                    logData.data.slice(0, 3).forEach((item, index) => {
                        log(`${index + 1}. ${item.title || 'ללא כותרת'} - ${item.type} - ${new Date(item.timestamp).toLocaleString('he-IL')}`);
                    });
                } else {
                    log('📭 אין נתונים במערכת הלוגים', 'warning');
                }
                
            } catch (error) {
                log(`❌ שגיאה בבדיקת מערכת הלוגים: ${error.message}`, 'error');
            }
        }
        
        // אתחול אוטומטי
        window.addEventListener('load', () => {
            log('🚀 דף הבדיקה נטען');
        });
    </script>
</body>
</html>
