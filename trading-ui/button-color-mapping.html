    <script>
        // Available colors from preferences
        const AVAILABLE_COLORS = {
            'primaryColor': { name: 'צבע ראשי', variable: '--primary-color' },
            'secondaryColor': { name: 'צבע משני', variable: '--secondary-color' },
            'successColor': { name: 'הצלחה', variable: '--success-color' },
            'warningColor': { name: 'אזהרה', variable: '--warning-color' },
            'dangerColor': { name: 'סכנה', variable: '--danger-color' },
            'infoColor': { name: 'מידע', variable: '--info-color' },
            
            // Entity colors
            'entityTradePlanColor': { name: 'תכנוני טריידים', variable: '--entity-trade-plan-color' },
            'entityTradeColor': { name: 'טריידים', variable: '--entity-trade-color' },
            'entityAlertColor': { name: 'התראות', variable: '--entity-alert-color' },
            'entityNoteColor': { name: 'הערות', variable: '--entity-note-color' },
            'entityTradingAccountColor': { name: 'חשבונות מסחר', variable: '--entity-trading-account-color' },
            'entityTickerColor': { name: 'טיקרים', variable: '--entity-ticker-color' },
            'entityExecutionColor': { name: 'ביצועים', variable: '--entity-execution-color' },
            'entityCashFlowColor': { name: 'תזרימי מזומנים', variable: '--entity-cash-flow-color' },
            
            // Value colors
            'valuePositiveColor': { name: 'ערכים חיוביים', variable: '--value-positive-color' },
            'valueNegativeColor': { name: 'ערכים שליליים', variable: '--value-negative-color' },
            'valueNeutralColor': { name: 'ערכים נייטרליים', variable: '--value-neutral-color' },
            
            // Chart colors
            'chartPrimaryColor': { name: 'צבע ראשי לגרפים', variable: '--chart-primary-color' },
            'chartBackgroundColor': { name: 'צבע רקע גרפים', variable: '--chart-background-color' },
            'chartTextColor': { name: 'צבע טקסט גרפים', variable: '--chart-text-color' },
            'chartGridColor': { name: 'צבע רשת גרפים', variable: '--chart-grid-color' },
            'chartBorderColor': { name: 'צבע גבול גרפים', variable: '--chart-border-color' },
            'chartPointColor': { name: 'צבע נקודות גרפים', variable: '--chart-point-color' }
        };

        // Button types with their default colors
        const BUTTON_TYPES = {
            'EDIT': { name: 'עריכה', defaultColor: 'secondaryColor', icon: '✏️', text: 'ערוך' },
            'DELETE': { name: 'מחיקה', defaultColor: 'dangerColor', icon: '🗑️', text: 'מחק' },
            'ADD': { name: 'הוספה', defaultColor: 'successColor', icon: '➕', text: 'הוסף' },
            'SAVE': { name: 'שמירה', defaultColor: 'successColor', icon: '💾', text: 'שמור' },
            'CANCEL': { name: 'ביטול', defaultColor: 'secondaryColor', icon: '❌', text: 'בטל' },
            'LINK': { name: 'קישור', defaultColor: 'infoColor', icon: '🔗', text: 'קישור' },
            'CLOSE': { name: 'סגירה', defaultColor: 'secondaryColor', icon: '✖️', text: 'סגור' },
            'REFRESH': { name: 'ריענון', defaultColor: 'secondaryColor', icon: '🔄', text: 'רענן' },
            'EXPORT': { name: 'ייצוא', defaultColor: 'primaryColor', icon: '📤', text: 'ייצא' },
            'IMPORT': { name: 'ייבוא', defaultColor: 'successColor', icon: '📥', text: 'ייבא' },
            'SEARCH': { name: 'חיפוש', defaultColor: 'infoColor', icon: '🔍', text: 'חפש' },
            'FILTER': { name: 'סינון', defaultColor: 'secondaryColor', icon: '🔽', text: 'סנן' },
            'SORT': { name: 'מיון', defaultColor: 'secondaryColor', icon: '🔢', text: 'מיין' },
            'TOGGLE': { name: 'החלפה', defaultColor: 'warningColor', icon: '🔄', text: 'החלף' },
            'COPY': { name: 'העתקה', defaultColor: 'secondaryColor', icon: '📋', text: 'העתק' },
            'REACTIVATE': { name: 'הפעלה מחדש', defaultColor: 'successColor', icon: '🔄', text: 'הפעל מחדש' },
            'VIEW': { name: 'צפייה', defaultColor: 'entityTradeColor', icon: '👁️', text: 'הצג' },
            'DUPLICATE': { name: 'שכפול', defaultColor: 'entityTradePlanColor', icon: '📋', text: 'שכפל' },
            'ARCHIVE': { name: 'ארכיון', defaultColor: 'entityNoteColor', icon: '📦', text: 'ארכב' },
            'RESTORE': { name: 'שחזור', defaultColor: 'entityAlertColor', icon: '♻️', text: 'שחזר' },
            'APPROVE': { name: 'אישור', defaultColor: 'entityExecutionColor', icon: '✅', text: 'אשר' },
            'REJECT': { name: 'דחייה', defaultColor: 'dangerColor', icon: '❌', text: 'דחה' },
            'PAUSE': { name: 'השהייה', defaultColor: 'warningColor', icon: '⏸️', text: 'השהה' },
            'PLAY': { name: 'הפעלה', defaultColor: 'successColor', icon: '▶️', text: 'הפעל' },
            'STOP': { name: 'עצירה', defaultColor: 'dangerColor', icon: '⏹️', text: 'עצור' },
            'READ': { name: 'קריאה', defaultColor: 'entityTickerColor', icon: '📖', text: 'קרא' },
            'CHECK': { name: 'בדיקה', defaultColor: 'entityTradingAccountColor', icon: '✔️', text: 'בדוק' }
        };

        function createButtonExample(buttonType, colorKey) {
            const button = BUTTON_TYPES[buttonType];
            const color = AVAILABLE_COLORS[colorKey];
            
            const buttonElement = document.createElement('button');
            buttonElement.className = 'btn btn-sm button-example';
            buttonElement.setAttribute('data-button-type', buttonType);
            buttonElement.innerHTML = `${button.icon} ${button.text}`;
            
            // Apply dynamic color
            if (color && color.variable) {
                buttonElement.style.borderColor = `var(${color.variable})`;
                buttonElement.style.color = `var(${color.variable})`;
            }
            
            return buttonElement;
        }

        function createColorDropdown(buttonType, currentColor) {
            const select = document.createElement('select');
            select.className = 'form-select color-dropdown';
            select.setAttribute('data-button-type', buttonType);
            select.style.minWidth = '200px';
            
            // Add options for all available colors
            Object.entries(AVAILABLE_COLORS).forEach(([key, color]) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = `${color.name} (${color.variable})`;
                if (key === currentColor) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
            
            // Add change event listener
            select.addEventListener('change', function() {
                updateButtonExample(buttonType, this.value);
            });
            
            return select;
        }

        function updateButtonExample(buttonType, colorKey) {
            const buttonCell = document.querySelector(`[data-button-type="${buttonType}"]`).closest('tr').querySelector('.button-preview');
            const newButton = createButtonExample(buttonType, colorKey);
            buttonCell.innerHTML = '';
            buttonCell.appendChild(newButton);
        }

        function generateColorMappingTable() {
            const tableBody = document.getElementById('colorMappingTable');
            tableBody.innerHTML = '';
            
            Object.entries(BUTTON_TYPES).forEach(([buttonType, button]) => {
                const row = document.createElement('tr');
                
                // Button type name
                const typeCell = document.createElement('td');
                typeCell.innerHTML = `<strong>${button.name}</strong><br><small class="text-muted">${buttonType}</small>`;
                
                // Button example
                const exampleCell = document.createElement('td');
                exampleCell.className = 'button-preview';
                const exampleButton = createButtonExample(buttonType, button.defaultColor);
                exampleCell.appendChild(exampleButton);
                
                // Current color
                const currentColorCell = document.createElement('td');
                const currentColor = AVAILABLE_COLORS[button.defaultColor];
                currentColorCell.innerHTML = `<strong>${currentColor.name}</strong><br><small class="text-muted">${currentColor.variable}</small>`;
                
                // Color dropdown
                const dropdownCell = document.createElement('td');
                const dropdown = createColorDropdown(buttonType, button.defaultColor);
                dropdownCell.appendChild(dropdown);
                
                // CSS variable
                const variableCell = document.createElement('td');
                variableCell.innerHTML = `<code>--color-action-${buttonType.toLowerCase()}</code>`;
                
                row.appendChild(typeCell);
                row.appendChild(exampleCell);
                row.appendChild(currentColorCell);
                row.appendChild(dropdownCell);
                row.appendChild(variableCell);
                
                tableBody.appendChild(row);
                
                // Debug log
                console.log(`Created dropdown for ${buttonType} with ${Object.keys(AVAILABLE_COLORS).length} options`);
            });
        }

        function copyColorMappings() {
            const mappings = {};
            
            // Collect all current selections
            document.querySelectorAll('.color-dropdown').forEach(select => {
                const buttonType = select.getAttribute('data-button-type');
                const selectedColor = select.value;
                mappings[buttonType] = selectedColor;
            });
            
            // Generate CSS code
            let cssCode = '/* Updated Button Color Mappings */\n';
            cssCode += ':root {\n';
            
            Object.entries(mappings).forEach(([buttonType, colorKey]) => {
                const color = AVAILABLE_COLORS[colorKey];
                cssCode += `    --color-action-${buttonType.toLowerCase()}: var(${color.variable});\n`;
            });
            
            cssCode += '}\n\n';
            
            // Generate mapping object for JavaScript
            cssCode += '/* JavaScript Mapping Object */\n';
            cssCode += 'const BUTTON_COLOR_MAPPINGS = {\n';
            Object.entries(mappings).forEach(([buttonType, colorKey], index, array) => {
                const comma = index < array.length - 1 ? ',' : '';
                cssCode += `    ${buttonType}: '${colorKey}'${comma}\n`;
            });
            cssCode += '};\n';
            
            // Copy to clipboard
            navigator.clipboard.writeText(cssCode).then(() => {
                // Show success notification
                const alert = document.createElement('div');
                alert.className = 'alert alert-success alert-dismissible fade show position-fixed';
                alert.style.top = '20px';
                alert.style.right = '20px';
                alert.style.zIndex = '9999';
                alert.innerHTML = `
                    <img src="/trading-ui/images/icons/tabler/check.svg" width="16" height="16" alt="check" class="icon"> שיוכי הצבעים הועתקו ללוח!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                document.body.appendChild(alert);
                
                // Auto-remove after 3 seconds
                setTimeout(() => {
                    if (alert.parentNode) {
                        alert.parentNode.removeChild(alert);
                    }
                }, 3000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('שגיאה בהעתקה ללוח. נסה שוב.');
            });
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Initializing color mapping page...');
            console.log('Available colors:', Object.keys(AVAILABLE_COLORS).length);
            console.log('Button types:', Object.keys(BUTTON_TYPES).length);
            
            generateColorMappingTable();
            
            // Check if dropdowns were created
            setTimeout(() => {
                const dropdowns = document.querySelectorAll('.color-dropdown');
                console.log(`Found ${dropdowns.length} dropdowns in the page`);
                
                if (dropdowns.length === 0) {
                    console.error('No dropdowns found! Check the table generation.');
                } else {
                    console.log('First dropdown options:', dropdowns[0].children.length);
                }
            }, 1000);
            
            // Initialize unified app
            if (window.unifiedAppInitializer) {
                window.unifiedAppInitializer.initialize();
            }
        });
    </script>
