<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מערכת Caching - TikTrack</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/apple-theme.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-wrapper">
        <!-- unified-header auto-generated -->
        <div class="page-body">
            <div class="top-section">
                <div class="section-header">
                    <div class="table-title">
                        <img src="/images/icons/development.svg" style="width: 40px; height: 40px;">
                        בדיקת מערכת Caching מתקדמת
                    </div>
                </div>
            </div>
            
            <div class="main-content">
                <!-- Cache Statistics -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-chart-bar me-2"></i>סטטיסטיקות Cache</h5>
                                <button class="btn btn-sm btn-primary float-start" id="refresh-stats">
                                    <i class="fas fa-sync me-1"></i>רענן
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="cache-stats-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען סטטיסטיקות...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-heartbeat me-2"></i>בדיקת בריאות</h5>
                                <button class="btn btn-sm btn-success float-start" id="health-check">
                                    <i class="fas fa-check me-1"></i>בדוק
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="health-check-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-success" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען בדיקת בריאות...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Cache Operations -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-cogs me-2"></i>פעולות Cache</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <button class="btn btn-warning" id="clear-cache">
                                        <i class="fas fa-trash me-1"></i>נקה Cache
                                    </button>
                                    <button class="btn btn-info" id="invalidate-tickers">
                                        <i class="fas fa-ban me-1"></i>בטל Cache טיקרים
                                    </button>
                                    <button class="btn btn-secondary" id="invalidate-trades">
                                        <i class="fas fa-ban me-1"></i>בטל Cache טריידים
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-info-circle me-2"></i>מידע על המערכת</h5>
                                <button class="btn btn-sm btn-outline-secondary float-start" id="get-info">
                                    <i class="fas fa-info me-1"></i>קבל מידע
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="system-info-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-info" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען מידע...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Performance Testing -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-tachometer-alt me-2"></i>בדיקת ביצועים</h5>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="test-iterations" class="form-label">מספר איטרציות:</label>
                                            <input type="number" class="form-control" id="test-iterations" value="100" min="1" max="1000">
                                        </div>
                                        <button class="btn btn-primary" id="run-performance-test">
                                            <i class="fas fa-play me-1"></i>הרץ בדיקת ביצועים
                                        </button>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="performance-results">
                                            <p class="text-muted">תוצאות בדיקת הביצועים יופיעו כאן</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Log Panel -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-terminal me-2"></i>יומן פעילות</h5>
                                <button class="btn btn-sm btn-outline-secondary float-start" id="clear-log">
                                    <i class="fas fa-trash me-1"></i>נקה יומן
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="log-content" class="log-panel" style="max-height: 300px; overflow-y: auto;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="scripts/cache-test.js"></script>
</body>
</html>
