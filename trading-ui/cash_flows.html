<body class="cash-flows-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Cash flows area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <h1>
                        <img src="images/icons/cash_flows.svg" alt="תזרימי מזומנים" class="section-icon">
                        תזרימי מזומנים
                    </h1>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים ותזרימי המזומנים">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור תזרימי מזומנים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ תזרימים: <strong id="totalCashFlows">0</strong></div>
                        <div>סה"כ הפקדות: <strong id="totalDeposits">$0</strong></div>
                        <div>סה"כ משיכות: <strong id="totalWithdrawals">$0</strong></div>
                        <div>יתרה נוכחית: <strong id="currentBalance">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Cash flows management area - content-section -->
                <div class="content-section" id="main" data-section="main">
                    <!-- Cash flows header -->
                    <div class="section-header">
                        <h2>
                            <img src="images/icons/cash_flows.svg" alt="ניהול תזרימי מזומנים" class="section-icon">
                            ניהול תזרימי מזומנים
                            <span class="table-count" id="cashFlowsCount">טוען...</span>
                        </h2>
                        <div class="header-actions">
                            <button id="addCashFlowBtn" class="refresh-btn" onclick="showAddCashFlowModal()" title="הוסף תזרים מזומנים חדש">
                                <img src="images/icons/cash_flows.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול תזרימי מזומנים">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Cash flows table -->
                    <div class="section-body">
                        <div class="table-responsive" id="cashFlowsContainer">
                            <table class="data-table" id="cashFlowsTable" data-table-type="cash_flows">
                                <thead>
                                    <tr>
                                        <th class="col-account">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, cashFlowsData, 'cash_flows', updateCashFlowsTable); }">
                                                חשבון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, cashFlowsData, 'cash_flows', updateCashFlowsTable); }"

                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-amount">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, cashFlowsData, 'cash_flows', updateCashFlowsTable); }"

                                                סכום <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-date">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, cashFlowsData, 'cash_flows', updateCashFlowsTable); }"

                                                תאריך <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-description">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, cashFlowsData, 'cash_flows', updateCashFlowsTable); }"

                                                תיאור <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-source">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(5, cashFlowsData, 'cash_flows', updateCashFlowsTable); }"

                                                מקור <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="7" class="loading">טוען תזרימי מזומנים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div class="page-bottom-spacing"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Cash Flow Modal -->
        <div class="modal fade" id="addCashFlowModal" tabindex="-1" aria-labelledby="addCashFlowModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-cash-flow">
                    <div class="modal-header entity-header entity-cash-flow">
                        <h4 class="modal-title entity-title">הוספת תזרים מזומנים חדש</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addCashFlowForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowType" class="form-label entity-label">סוג תזרים</label>
                                        <select class="form-select" id="cashFlowType" required>
                                            <option value="">בחר סוג תזרים</option>
                                            <option value="deposit" selected>הפקדה</option>
                                            <option value="withdrawal">משיכה</option>
                                            <option value="transfer">העברה</option>
                                            <option value="fee">עמלה</option>
                                            <option value="dividend">דיבידנד</option>
                                            <option value="interest">ריבית</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowAmount" class="form-label entity-label">סכום</label>
                                        <input type="number" class="form-control" id="cashFlowAmount" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowCurrency" class="form-label entity-label">מטבע</label>
                                        <select class="form-select" id="cashFlowCurrencyId" required>
                                            <option value="">בחר מטבע</option>
                                            <option value="1">דולר אמריקאי (USD)</option>
                                            <option value="2">אירו (EUR)</option>
                                            <option value="3">לירה שטרלינג (GBP)</option>
                                            <option value="4">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowAccount" class="form-label entity-label">חשבון מסחר</label>
                                        <select class="form-select" id="cashFlowAccountId" required>
                                            <option value="">בחר חשבון</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowDate" class="form-label entity-label">תאריך תזרים</label>
                                        <input type="datetime-local" class="form-control" id="cashFlowDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowDescription" class="form-label entity-label">תיאור</label>
                                        <input type="text" class="form-control" id="cashFlowDescription" placeholder="תיאור התזרים">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowUsdRate" class="form-label entity-label">שער דולר</label>
                                        <input type="number" class="form-control" id="cashFlowUsdRate" step="0.000001" min="0" value="1.000000" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowSource" class="form-label entity-label">מקור</label>
                                        <select class="form-select" id="cashFlowSource">
                                            <option value="manual" selected>ידני</option>
                                            <option value="file_import">יבוא קובץ</option>
                                            <option value="direct_import">יבוא ישיר</option>
                                            <option value="api">API</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-entity btn-entity-cash-flow" onclick="saveCashFlow()">הוסף תזרים</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Cash Flow Modal -->
        <div class="modal fade" id="editCashFlowModal" tabindex="-1" aria-labelledby="editCashFlowModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-cash-flow">
                    <div class="modal-header entity-header entity-cash-flow">
                        <h4 class="modal-title entity-title">עריכת תזרים מזומנים</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editCashFlowForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowType" class="form-label entity-label">סוג תזרים</label>
                                        <select class="form-select" id="editCashFlowType" required>
                                            <option value="deposit">הפקדה</option>
                                            <option value="withdrawal">משיכה</option>
                                            <option value="transfer">העברה</option>
                                            <option value="fee">עמלה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowAmount" class="form-label entity-label">סכום</label>
                                        <input type="number" class="form-control" id="editCashFlowAmount" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowCurrency" class="form-label entity-label">מטבע</label>
                                        <select class="form-select" id="editCashFlowCurrencyId" required>
                                            <option value="1">דולר אמריקאי (USD)</option>
                                            <option value="2">אירו (EUR)</option>
                                            <option value="3">לירה שטרלינג (GBP)</option>
                                            <option value="4">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowAccount" class="form-label entity-label">חשבון מסחר</label>
                                        <select class="form-select" id="editCashFlowAccountId" required>
                                            <option value="">בחר חשבון</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowDate" class="form-label entity-label">תאריך תזרים</label>
                                        <input type="datetime-local" class="form-control" id="editCashFlowDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowDescription" class="form-label entity-label">תיאור</label>
                                        <input type="text" class="form-control" id="editCashFlowDescription">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowUsdRate" class="form-label entity-label">שער דולר</label>
                                        <input type="number" class="form-control" id="editCashFlowUsdRate" step="0.000001" min="0" value="1.000000" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowSource" class="form-label entity-label">מקור</label>
                                        <select class="form-select" id="editCashFlowSource">
                                            <option value="manual">ידני</option>
                                            <option value="file_import">יבוא קובץ</option>
                                            <option value="direct_import">יבוא ישיר</option>
                                            <option value="api">API</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-entity btn-entity-cash-flow" onclick="updateCashFlow()">עדכן תזרים</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
