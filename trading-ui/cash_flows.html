<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>תזרימי מזומנים - TikTrack</title>
    
    <!-- 
    ===== CORRECTED CASH_FLOWS PAGE =====
    
    This page has been corrected to follow the proper architecture:
    1. Complete ITCSS implementation
    2. All base package systems included
    3. Correct loading order
    4. Scripts moved to body
    
    ======================================
    -->
    
    <!-- Google Fonts -->
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_page-headers.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_info-summary.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_constraints.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_system-management.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_chart-management.css?v=1.0.0">
    
    
    <!-- 08-themes - Themes -->
    <link rel="stylesheet" href="styles-new/08-themes/_light.css?v=1.0.0">
    
    <!-- 09-utilities - Utility Classes -->
    <link rel="stylesheet" href="styles-new/09-utilities/_utilities.css?v=1.0.0">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=1.0.0">
</head>

<body class="cash-flows-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Cash flows area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/cash_flows.svg" alt="תזרימי מזומנים" class="section-icon">
                        תזרימי מזומנים
                    </div>
                    <div class="table-actions">
                        <button data-button-type="COPY" data-variant="full" data-onclick="copyDetailedLog()" data-text="העתק לוג מפורט" title="העתק לוג מפורט"></button>
                        <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('top')" data-text="הצג/הסתר"></button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ תזרימים: <strong id="totalCashFlows">0</strong></div>
                        <div>סה"כ הפקדות: <strong id="totalDeposits">$0</strong></div>
                        <div>סה"כ משיכות: <strong id="totalWithdrawals">$0</strong></div>
                        <div>יתרה נוכחית: <strong id="currentBalance">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Cash flows management area - content-section -->
                <div class="content-section" id="main">
                    <!-- Cash flows header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/cash_flows.svg" alt="ניהול תזרימי מזומנים" class="section-icon">
                            ניהול תזרימי מזומנים
                        </div>
                        <div class="table-count" id="cashFlowsCount">טוען...</div>
                        <div class="table-actions">
                            <button data-button-type="ADD" data-entity-type="cash_flow" data-variant="full" data-onclick="showAddModal()" data-text="הוסף תזרים מזומנים" title="הוסף תזרים מזומנים חדש"></button>
                            <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('main')" data-text="הצג/הסתר"></button>
                        </div>
                    </div>

                    <!-- Cash flows table -->
                    <div class="section-body">
                        <div class="table-responsive" id="cashFlowsContainer">
                            <table class="table" id="cashFlowsTable" data-table-type="cash_flows">
                                <thead>
                                    <tr>
                                        <th class="col-account">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">חשבון <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">סוג <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-amount">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">סכום <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-date">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">תאריך <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-description">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">תיאור <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-source">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">מקור <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="7" class="loading">טוען תזרימי מזומנים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Cash Flow Modal -->
        <div class="modal fade" id="addCashFlowModal" tabindex="-1" aria-labelledby="addCashFlowModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addCashFlowModalLabel">הוספת תזרים מזומנים חדש</h5>
                        <button data-button-type="CLOSE" data-entity-type="cash_flow" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addCashFlowForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowType" class="form-label">סוג תזרים</label>
                                        <select class="form-select" id="cashFlowType" required>
                                            <option value="">בחר סוג תזרים</option>
                                            <option value="deposit">הפקדה</option>
                                            <option value="withdrawal">משיכה</option>
                                            <option value="transfer">העברה</option>
                                            <option value="fee">עמלה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowAmount" class="form-label">סכום</label>
                                        <input type="number" class="form-control" id="cashFlowAmount" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="cashFlowCurrency" required>
                                            <option value="">בחר מטבע</option>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowAccount" class="form-label">חשבון מסחר</label>
                                        <select class="form-select" id="cashFlowAccount" required>
                                            <option value="">בחר חשבון</option>
                                            <option value="demo">חשבון דמו</option>
                                            <option value="live">חשבון חי</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowDate" class="form-label">תאריך תזרים</label>
                                        <input type="datetime-local" class="form-control" id="cashFlowDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowDescription" class="form-label">תיאור</label>
                                        <input type="text" class="form-control" id="cashFlowDescription" placeholder="תיאור התזרים">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button data-button-type="CANCEL" data-onclick="data-bs-dismiss='modal'" data-text="ביטול" title="ביטול"></button>
                        <button data-button-type="SAVE" data-entity-type="cash_flow" data-onclick="saveForm()" data-text="שמור" title="שמור תזרים מזומנים"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Cash Flow Modal -->
        <div class="modal fade" id="editCashFlowModal" tabindex="-1" aria-labelledby="editCashFlowModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editCashFlowModalLabel">עריכת תזרים מזומנים</h5>
                        <button data-button-type="CLOSE" data-entity-type="cash_flow" data-size="large" data-variant="small" data-onclick="data-bs-dismiss='modal'" data-text="" title="סגור מודל" aria-label="סגור"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editCashFlowForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowType" class="form-label">סוג תזרים</label>
                                        <select class="form-select" id="editCashFlowType" required>
                                            <option value="deposit">הפקדה</option>
                                            <option value="withdrawal">משיכה</option>
                                            <option value="transfer">העברה</option>
                                            <option value="fee">עמלה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowAmount" class="form-label">סכום</label>
                                        <input type="number" class="form-control" id="editCashFlowAmount" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="editCashFlowCurrency" required>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowAccount" class="form-label">חשבון מסחר</label>
                                        <select class="form-select" id="editCashFlowAccount" required>
                                            <option value="demo">חשבון דמו</option>
                                            <option value="live">חשבון חי</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowDate" class="form-label">תאריך תזרים</label>
                                        <input type="datetime-local" class="form-control" id="editCashFlowDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowDescription" class="form-label">תיאור</label>
                                        <input type="text" class="form-control" id="editCashFlowDescription">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button data-button-type="CANCEL" data-onclick="data-bs-dismiss='modal'" data-text="ביטול" title="ביטול"></button>
                        <button data-button-type="SAVE" data-entity-type="cash_flow" data-onclick="saveForm()" data-text="שמור" title="שמור תזרים מזומנים"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Base Package Scripts -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    <script src="scripts/ui-utils.js?v=1.0.0"></script>
    <script src="scripts/page-utils.js?v=1.0.0"></script>
    <script src="scripts/translation-utils.js?v=1.0.0"></script>
    <script src="scripts/button-system-init.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/header-system.js?v=1.0.0"></script>
    <script src="scripts/preferences.js?v=1.0.0"></script>
    
    <!-- CRUD Package Scripts -->
    <script src="scripts/tables.js?v=1.0.0"></script>
    <script src="scripts/data-utils.js?v=1.0.0"></script>
    <script src="scripts/date-utils.js?v=1.0.0"></script>
    <script src="scripts/modules/actions-menu-system.js?v=1.0.0"></script>
    
    <!-- Page Configs and Initializer -->
    <script src="scripts/init-system/package-manifest.js?v=1.0.0"></script>
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    <!-- Page-specific Scripts -->
    <script src="scripts/cash_flows.js?v=1.0.0"></script>
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
