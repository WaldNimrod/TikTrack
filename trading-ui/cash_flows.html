<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<body class="cash-flows-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Cash flows area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/cash_flows.svg" alt="תזרימי מזומנים" class="section-icon">
                        תזרימי מזומנים
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים ותזרימי המזומנים">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור תזרימי מזומנים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ תזרימים: <strong id="totalCashFlows">0</strong></div>
                        <div>סה"כ הפקדות: <strong id="totalDeposits">$0</strong></div>
                        <div>סה"כ משיכות: <strong id="totalWithdrawals">$0</strong></div>
                        <div>יתרה נוכחית: <strong id="currentBalance">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Cash flows management area - content-section -->
                <div class="content-section" id="main">
                    <!-- Cash flows header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/cash_flows.svg" alt="ניהול תזרימי מזומנים" class="section-icon">
                            ניהול תזרימי מזומנים
                        </div>
                        <div class="table-count" id="cashFlowsCount">טוען...</div>
                        <div class="table-actions">
                            <button id="addCashFlowBtn" class="refresh-btn" onclick="showAddCashFlowModal()" title="הוסף תזרים מזומנים חדש">
                                <img src="images/icons/cash_flows.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול תזרימי מזומנים">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- Cash flows table -->
                    <div class="section-body">
                        <div class="table-responsive" id="cashFlowsContainer">
                            <table class="table" id="cashFlowsTable" data-table-type="cash_flows">
                                <thead>
                                    <tr>
                                        <th class="col-account">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                חשבון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-amount">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סכום <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-date">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תאריך <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-description">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תיאור <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-source">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מקור <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="7" class="loading">טוען תזרימי מזומנים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Cash Flow Modal -->
        <div class="modal fade" id="addCashFlowModal" tabindex="-1" aria-labelledby="addCashFlowModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addCashFlowModalLabel">הוספת תזרים מזומנים חדש</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addCashFlowForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowType" class="form-label">סוג תזרים</label>
                                        <select class="form-select" id="cashFlowType" required>
                                            <option value="">בחר סוג תזרים</option>
                                            <option value="deposit">הפקדה</option>
                                            <option value="withdrawal">משיכה</option>
                                            <option value="transfer">העברה</option>
                                            <option value="fee">עמלה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowAmount" class="form-label">סכום</label>
                                        <input type="number" class="form-control" id="cashFlowAmount" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="cashFlowCurrency" required>
                                            <option value="">בחר מטבע</option>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowAccount" class="form-label">חשבון מסחר</label>
                                        <select class="form-select" id="cashFlowAccount" required>
                                            <option value="">בחר חשבון</option>
                                            <option value="demo">חשבון דמו</option>
                                            <option value="live">חשבון חי</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowDate" class="form-label">תאריך תזרים</label>
                                        <input type="datetime-local" class="form-control" id="cashFlowDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cashFlowDescription" class="form-label">תיאור</label>
                                        <input type="text" class="form-control" id="cashFlowDescription" placeholder="תיאור התזרים">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="addCashFlow()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            תזרים</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Cash Flow Modal -->
        <div class="modal fade" id="editCashFlowModal" tabindex="-1" aria-labelledby="editCashFlowModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editCashFlowModalLabel">עריכת תזרים מזומנים</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editCashFlowForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowType" class="form-label">סוג תזרים</label>
                                        <select class="form-select" id="editCashFlowType" required>
                                            <option value="deposit">הפקדה</option>
                                            <option value="withdrawal">משיכה</option>
                                            <option value="transfer">העברה</option>
                                            <option value="fee">עמלה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowAmount" class="form-label">סכום</label>
                                        <input type="number" class="form-control" id="editCashFlowAmount" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="editCashFlowCurrency" required>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowAccount" class="form-label">חשבון מסחר</label>
                                        <select class="form-select" id="editCashFlowAccount" required>
                                            <option value="demo">חשבון דמו</option>
                                            <option value="live">חשבון חי</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowDate" class="form-label">תאריך תזרים</label>
                                        <input type="datetime-local" class="form-control" id="editCashFlowDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editCashFlowDescription" class="form-label">תיאור</label>
                                        <input type="text" class="form-control" id="editCashFlowDescription">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="updateCashFlow()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
                            תזרים</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/translation-utils.js?v=1.0.0"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-policy-manager.js?v=1.0.0"></script>
    <script src="scripts/memory-optimizer.js?v=1.0.0"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
    <script src="scripts/ui-utils.js?v=1.0.0"></script>
    <script src="scripts/color-scheme-system.js?v=1.0.0"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- Stage 6: Data and Utility Systems -->
    <script src="scripts/data-utils.js?v=1.0.0"></script>
    <script src="scripts/date-utils.js?v=1.0.0"></script>
    <script src="scripts/button-icons.js?v=1.0.0"></script>
    <script src="scripts/tables.js?v=1.0.0"></script>
    <script src="scripts/table-mappings.js?v=1.0.0"></script>
    <script src="scripts/page-utils.js?v=1.0.0"></script>
    
    <!-- Stage 7: Additional Systems (As needed) -->
    <script src="scripts/preferences.js?v=1.0.0"></script>
    <script src="scripts/notification-category-detector.js?v=1.0.0"></script>
    <script src="scripts/global-notification-collector.js?v=1.0.0"></script>
    <script src="scripts/system-management.js?v=1.0.0"></script>
    <script src="scripts/realtime-notifications-client.js?v=1.0.0"></script>
    <script src="scripts/error-handlers.js?v=1.0.0"></script>
    
    <!-- Stage 8: Page-specific Script -->
    <script src="scripts/cash_flows.js?v=1.0.0"></script>
    
    <!-- Local copyDetailedLog function for cash_flows page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
    
    <!-- Debug script for responsive table -->
    <script src="debug_table_final.js"></script>
</body>
</html>
