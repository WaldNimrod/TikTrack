    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css?v=05b6de6f_20251025_005449">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=05b6de6f_20251025_005449">
</head>
<body>
    <!-- Header System -->
    <div id="unified-header"></div>

    <div class="main-content">
        <div class="top-section" data-section="top">
            <div class="section-header">
                <h2>📊 ניהול גרפים</h2>
                <div class="header-actions">
                    <button data-button-type="COPY" data-variant="full" data-onclick="" data-text="העתק לוג מפורט" title="העתק לוג מפורט עם כל הנתונים והסטטוס"></button>
                    <button data-button-type="TOGGLE" data-onclick="refreshChartsStatus()" data-classes="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-sync"></i> רענן סטטוס
                    </button>
                    <button data-button-type="EXPORT" data-onclick="exportAllCharts()" data-classes="btn btn-outline-success btn-sm">
                        <i class="fas fa-download"></i> ייצא הכל
                    </button>
                </div>
            </div>
        </div>
        
        <!-- סקירה כללית -->
        <div class="content-section" id="overviewSection">
            <div class="section-header">
                <h3>📈 סקירת גרפים</h3>
                <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('overviewSection')" data-text="הצג/הסתר" title="הצג/הסתר סקשן"></button>
            </div>
            <div class="section-content">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-chart-bar fa-2x text-primary mb-2"></i>
                                <h5 class="card-title" id="totalCharts">0</h5>
                                <p class="card-text">סה"כ גרפים</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-chart-line fa-2x text-success mb-2"></i>
                                <h5 class="card-title" id="activeCharts">0</h5>
                                <p class="card-text">גרפים פעילים</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-exclamation-triangle fa-2x text-warning mb-2"></i>
                                <h5 class="card-title" id="errorCharts">0</h5>
                                <p class="card-text">גרפים עם שגיאות</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-memory fa-2x text-info mb-2"></i>
                                <h5 class="card-title" id="memoryUsage">0MB</h5>
                                <p class="card-text">שימוש זיכרון</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- ניהול גרפים -->
        <div class="content-section" id="managementSection">
            <div class="section-header">
                <h3>🔧 ניהול גרפים</h3>
                <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('managementSection')" data-text="הצג/הסתר" title="הצג/הסתר סקשן"></button>
            </div>
            <div class="section-content">
                <div class="row mb-3">
                    <div class="col-12">
                        <button data-button-type="ADD" data-entity-type="chart" data-variant="full" data-onclick="createNewChart()" data-text="צור גרף חדש" title="צור גרף חדש"></button>
                        <button data-button-type="REFRESH" data-onclick="refreshAllCharts()" data-text="רענן">
                            <i class="fas fa-sync"></i> רענן הכל
                        </button>
                        <button data-button-type="DELETE" data-onclick="destroyAllCharts()" data-text="מחק הכל" title="מחק כל הגרפים">
                        </button>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5>🧪 גרפים לדוגמה</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-12">
                                        <button class="btn btn-primary btn-sm me-2 mb-2" onclick="createTestChart()">
                                            <i class="fas fa-plus"></i> גרף בדיקה
                                        </button>
                                        <button class="btn btn-info btn-sm me-2 mb-2" onclick="createPerformanceChart()">
                                            <i class="fas fa-chart-line"></i> גרף ביצועים
                                        </button>
                                        <button class="btn btn-success btn-sm me-2 mb-2" onclick="createAccountChart()">
                                            <i class="fas fa-users"></i> גרף חשבונות
                                        </button>
                                        <button class="btn btn-warning btn-sm me-2 mb-2" onclick="createMixedChart()">
                                            <i class="fas fa-layer-group"></i> גרף מעורב
                                        </button>
                                        <button class="btn btn-secondary btn-sm me-2 mb-2" onclick="updateTestChart()">
                                            <i class="fas fa-sync"></i> עדכן נתונים
                                        </button>
                                        <button data-button-type="VIEW" data-onclick="exportTestChart()" data-classes="btn btn-outline-primary">
                                            <i class="fas fa-download"></i> ייצא גרף
                                        </button>
                                        <button data-button-type="DELETE" data-onclick="destroyTestChart()" data-classes="btn btn-outline-danger">
                                            <i class="fas fa-trash"></i> מחק גרף
                                        </button>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-12">
                                        <canvas id="testChart" width="800" height="400" style="max-width: 100%; height: auto;"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-3">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5>📋 רשימת גרפים</h5>
                            </div>
                            <div class="card-body" id="chartsList">
                                <!-- Charts will be dynamically populated here -->
                                <p class="text-muted">אין גרפים פעילים כרגע</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- הגדרות מערכת -->
        <div class="content-section" id="settingsSection">
            <div class="section-header">
                <h3>⚙️ הגדרות מערכת</h3>
                <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('settingsSection')" data-text="הצג/הסתר" title="הצג/הסתר סקשן"></button>
            </div>
            <div class="section-content">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>🎨 הגדרות גרפים</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label" for="chartTheme">נושא גרפים:</label>
                                    <select class="form-select" id="chartTheme" onchange="changeChartTheme(this.value)">
                                        <option value="default">ברירת מחדל</option>
                                        <option value="dark">כהה</option>
                                        <option value="light">בהיר</option>
                                    </select>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="autoRefresh" onchange="toggleAutoRefresh(this.checked)">
                                    <label class="form-check-label" for="autoRefresh">רענון אוטומטי</label>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label" for="refreshInterval">מרווח רענון (שניות):</label>
                                    <input type="number" class="form-control" id="refreshInterval" value="30" min="5" max="300">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>📤 אפשרויות ייצוא</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label" for="exportFormat">פורמט:</label>
                                    <select class="form-select" id="exportFormat">
                                        <option value="png">PNG</option>
                                        <option value="jpg">JPG</option>
                                        <option value="pdf">PDF</option>
                                        <option value="svg">SVG</option>
                                    </select>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label" for="exportQuality">איכות:</label>
                                    <select class="form-select" id="exportQuality">
                                        <option value="low">נמוכה</option>
                                        <option value="medium">בינונית</option>
                                        <option value="high" selected>גבוהה</option>
                                        <option value="ultra">אולטרה</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
