                    </div>

                        <div class="card text-center">

                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card text-center">

                                <p class="card-text">שימוש זיכרון</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- ניהול גרפים -->

                <h3>🔧 ניהול גרפים</h3>

            </div>
            <div class="section-content">
                <div class="row mb-3">
                    <div class="col-12">
                        <button data-button-type="ADD" data-entity-type="chart" data-variant="full" data-onclick="createNewChart()" data-text="צור גרף חדש" title="צור גרף חדש"></button>
                        <button data-button-type="REFRESH" data-onclick="refreshAllCharts()" data-text="רענן">

                        </button>
                        <button data-button-type="DELETE" data-onclick="destroyAllCharts()" data-text="מחק הכל" title="מחק כל הגרפים">
                        </button>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5>🧪 גרפים לדוגמה</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-12">
                                        <button class="btn btn-primary btn-sm me-2 mb-2" data-onclick="createTestChart()" data-button-type="PRIMARY">
                                            <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> גרף בדיקה
                                        </button>
                                        <button class="btn btn-info btn-sm me-2 mb-2" data-onclick="createPerformanceChart()" data-button-type="PRIMARY">
                                            <img src="/trading-ui/images/icons/tabler/chart-line.svg" width="16" height="16" alt="chart-line" class="icon"> גרף ביצועים
                                        </button>
                                        <button class="btn btn-success btn-sm me-2 mb-2" data-onclick="createAccountChart()" data-button-type="PRIMARY">
                                            <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> גרף חשבונות
                                        </button>
                                        <button class="btn btn-warning btn-sm me-2 mb-2" data-onclick="createMixedChart()" data-button-type="PRIMARY">
                                            <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> גרף מעורב
                                        </button>
                                        <button class="btn btn-secondary btn-sm me-2 mb-2" data-onclick="updateTestChart()" data-button-type="PRIMARY">
                                            <img src="/trading-ui/images/icons/tabler/info-circle.svg" width="16" height="16" alt="icon" class="icon"> עדכן נתונים
                                        </button>
                                        <button data-button-type="VIEW" data-onclick="exportTestChart()" data-classes="btn btn-outline-primary">
                                            <img src="/trading-ui/images/icons/tabler/download.svg" width="16" height="16" alt="download" class="icon"> ייצא גרף
                                        </button>
                                        <button data-button-type="DELETE" data-onclick="destroyTestChart()" data-classes="btn btn-outline-danger">
                                            <img src="/trading-ui/images/icons/tabler/trash.svg" width="16" height="16" alt="trash" class="icon"> מחק גרף
                                        </button>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-12">
                                        <canvas id="testChart" width="800" height="400" ></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                            </div>

                                <div class="mb-3">
                                    <label class="form-label" for="chartTheme">נושא גרפים:</label>
                                    <select class="form-select" id="chartTheme" onchange="changeChartTheme(this.value)">
                                        <option value="default">ברירת מחדל</option>
                                        <option value="dark">כהה</option>
                                        <option value="light">בהיר</option>
                                    </select>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="autoRefresh" onchange="toggleAutoRefresh(this.checked)">
                                    <label class="form-check-label" for="autoRefresh">רענון אוטומטי</label>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label" for="refreshInterval">מרווח רענון (שניות):</label>
                                    <input type="number" class="form-control" id="refreshInterval" value="30" min="5" max="300">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>📤 אפשרויות ייצוא</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label" for="exportFormat">פורמט:</label>
                                    <select class="form-select" id="exportFormat">
                                        <option value="png">PNG</option>
                                        <option value="jpg">JPG</option>
                                        <option value="pdf">PDF</option>
                                        <option value="svg">SVG</option>
                                    </select>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label" for="exportQuality">איכות:</label>
                                    <select class="form-select" id="exportQuality">
                                        <option value="low">נמוכה</option>
                                        <option value="medium">בינונית</option>
                                        <option value="high" selected>גבוהה</option>
                                        <option value="ultra">אולטרה</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
