<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>יצירת Linter Dashboard - TikTrack</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles/apple-theme.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/header-system.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="styles/table.css">
    <link rel="stylesheet" href="styles/notification-system.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .linter-dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--apple-text-primary);
            margin-bottom: 1rem;
        }

        .dashboard-subtitle {
            font-size: 1.1rem;
            color: var(--apple-text-secondary);
            margin-bottom: 2rem;
        }

        .config-section {
            background: var(--apple-bg-elevated);
            border: 1px solid var(--apple-border-light);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--apple-shadow-light);
        }

        .config-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--apple-text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--apple-text-primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            border: 1px solid var(--apple-border-light);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #007aff 0%, #0056b3 100%);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .preview-section {
            background: var(--apple-bg-elevated);
            border: 1px solid var(--apple-border-light);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--apple-shadow-light);
        }

        .preview-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--apple-text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preview-content {
            background: var(--apple-bg-primary);
            border: 1px solid var(--apple-border-light);
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 200px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-ready {
            background: rgba(52, 199, 89, 0.1);
            color: #34c759;
            border: 1px solid rgba(52, 199, 89, 0.2);
        }

        .status-pending {
            background: rgba(255, 149, 0, 0.1);
            color: #ff9500;
            border: 1px solid rgba(255, 149, 0, 0.2);
        }

        .actions-section {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: var(--apple-bg-elevated);
            border: 1px solid var(--apple-border-light);
            color: var(--apple-text-primary);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--apple-bg-secondary);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="page-body">
        <!-- unified-header auto-generated -->
        <div id="unified-header"></div>
        
        <div class="linter-dashboard">
            <div class="dashboard-header">
                <h1 class="dashboard-title">🔧 יצירת Linter Dashboard</h1>
                <p class="dashboard-subtitle">כלי ליצירת dashboard מותאם אישית לבדיקת קוד</p>
            </div>

            <!-- Configuration Section -->
            <div class="config-section">
                <h2 class="config-title">
                    ⚙️ הגדרות Dashboard
                </h2>
                
                <form id="linterConfigForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">שם Dashboard</label>
                                <input type="text" class="form-control" id="dashboardName" 
                                       placeholder="לדוגמה: Dashboard ראשי" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">תיאור</label>
                                <input type="text" class="form-control" id="dashboardDescription" 
                                       placeholder="תיאור קצר של ה-dashboard">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">סוג בדיקות</label>
                                <select class="form-control" id="linterType" required>
                                    <option value="">בחר סוג בדיקה</option>
                                    <option value="eslint">ESLint - JavaScript/TypeScript</option>
                                    <option value="pylint">Pylint - Python</option>
                                    <option value="htmlhint">HTMLHint - HTML</option>
                                    <option value="csslint">CSSLint - CSS</option>
                                    <option value="mixed">מעורב - מספר שפות</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">תדירות עדכון (שניות)</label>
                                <input type="number" class="form-control" id="updateInterval" 
                                       value="30" min="5" max="300">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">תיקיות לבדיקה</label>
                        <textarea class="form-control" id="targetFolders" rows="3" 
                                  placeholder="trading-ui/scripts&#10;Backend/routes&#10;Backend/services"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">קבצים להחרגה</label>
                        <textarea class="form-control" id="excludeFiles" rows="2" 
                                  placeholder="node_modules/&#10;*.min.js&#10;backups/"></textarea>
                    </div>
                </form>
            </div>

            <!-- Preview Section -->
            <div class="preview-section">
                <h2 class="preview-title">
                    👁️ תצוגה מקדימה
                </h2>
                
                <div class="preview-content">
                    <div class="text-center">
                        <div class="status-indicator status-pending">
                            <span>⏳</span>
                            <span>Dashboard לא נוצר עדיין</span>
                        </div>
                        <p class="mt-3 text-muted">לאחר מילוי ההגדרות ולחיצה על "צור Dashboard", תוכל לראות כאן תצוגה מקדימה</p>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="actions-section">
                <button type="button" class="btn btn-primary" onclick="createDashboard()">
                    🚀 צור Dashboard
                </button>
                <button type="button" class="btn btn-secondary" onclick="previewDashboard()">
                    👁️ תצוגה מקדימה
                </button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">
                    🔄 איפוס
                </button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- TikTrack Scripts -->
    <script src="scripts/main.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/header-system.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/console-cleanup.js"></script>

    <script>
        // אתחול מערכת ראש הדף
        document.addEventListener("DOMContentLoaded", () => {
            console.log('🚀 טעינת דף יצירת Linter Dashboard...');

            // אתחול HeaderSystem
            if (window.headerSystem && !window.headerSystem.isInitialized) {
                console.log('✅ אתחול HeaderSystem...');
                window.headerSystem.init();
            }

            // בדיקת זמינות מערכת התראות
            if (typeof window.showSuccessNotification === 'function') {
                console.log('✅ מערכת התראות זמינה');
            } else {
                console.log('⚠️ מערכת התראות לא זמינה');
            }
        });

        function createDashboard() {
            const form = document.getElementById('linterConfigForm');
            const formData = new FormData(form);
            
            // בדיקת מילוי שדות חובה
            const dashboardName = document.getElementById('dashboardName').value;
            const linterType = document.getElementById('linterType').value;
            
            if (!dashboardName || !linterType) {
                if (typeof window.showErrorNotification === 'function') {
                    window.showErrorNotification('שגיאה', 'אנא מלא את כל השדות החובה');
                } else {
                    alert('אנא מלא את כל השדות החובה');
                }
                return;
            }

            // יצירת Dashboard
            const config = {
                name: dashboardName,
                description: document.getElementById('dashboardDescription').value,
                type: linterType,
                updateInterval: parseInt(document.getElementById('updateInterval').value),
                targetFolders: document.getElementById('targetFolders').value.split('\n').filter(f => f.trim()),
                excludeFiles: document.getElementById('excludeFiles').value.split('\n').filter(f => f.trim())
            };

            // עדכון תצוגה מקדימה
            updatePreview(config);
            
            if (typeof window.showSuccessNotification === 'function') {
                window.showSuccessNotification('הצלחה', `Dashboard "${dashboardName}" נוצר בהצלחה!`);
            } else {
                alert(`Dashboard "${dashboardName}" נוצר בהצלחה!`);
            }
        }

        function previewDashboard() {
            const dashboardName = document.getElementById('dashboardName').value;
            const linterType = document.getElementById('linterType').value;
            
            if (!dashboardName || !linterType) {
                if (typeof window.showErrorNotification === 'function') {
                    window.showErrorNotification('שגיאה', 'אנא מלא את השדות החובה לתצוגה מקדימה');
                } else {
                    alert('אנא מלא את השדות החובה לתצוגה מקדימה');
                }
                return;
            }

            const config = {
                name: dashboardName,
                description: document.getElementById('dashboardDescription').value,
                type: linterType,
                updateInterval: parseInt(document.getElementById('updateInterval').value),
                targetFolders: document.getElementById('targetFolders').value.split('\n').filter(f => f.trim()),
                excludeFiles: document.getElementById('excludeFiles').value.split('\n').filter(f => f.trim())
            };

            updatePreview(config);
        }

        function updatePreview(config) {
            const previewContent = document.querySelector('.preview-content');
            
            previewContent.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <h4>📊 ${config.name}</h4>
                        <p class="text-muted">${config.description || 'ללא תיאור'}</p>
                        <div class="status-indicator status-ready">
                            <span>✅</span>
                            <span>מוכן לפעולה</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h5>⚙️ הגדרות</h5>
                        <ul class="list-unstyled">
                            <li><strong>סוג:</strong> ${config.type}</li>
                            <li><strong>עדכון:</strong> כל ${config.updateInterval} שניות</li>
                            <li><strong>תיקיות:</strong> ${config.targetFolders.length}</li>
                            <li><strong>החרגות:</strong> ${config.excludeFiles.length}</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function resetForm() {
            document.getElementById('linterConfigForm').reset();
            document.getElementById('updateInterval').value = '30';
            
            const previewContent = document.querySelector('.preview-content');
            previewContent.innerHTML = `
                <div class="text-center">
                    <div class="status-indicator status-pending">
                        <span>⏳</span>
                        <span>Dashboard לא נוצר עדיין</span>
                    </div>
                    <p class="mt-3 text-muted">לאחר מילוי ההגדרות ולחיצה על "צור Dashboard", תוכל לראות כאן תצוגה מקדימה</p>
                </div>
            `;
        }
    </script>
</body>

</html>
