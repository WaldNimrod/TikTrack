<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד בדיקות CRUD - TikTrack</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
    
    <style>
        .testing-dashboard {
            padding: 20px;
        }
        
        .summary-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-number {
            font-size: 2em;
            font-weight: bold;
            color: #007bff;
        }
        
        .summary-label {
            font-size: 0.9em;
            color: #6c757d;
        }
        
        .page-test-card {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .page-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        
        .page-header.critical { background: #f8d7da; }
        .page-header.high { background: #fff3cd; }
        .page-header.medium { background: #d1ecf1; }
        
        .page-body {
            padding: 20px;
        }
        
        .test-section {
            margin-bottom: 20px;
        }
        
        .test-section h4, .test-section h5 {
            color: #495057;
            margin-bottom: 10px;
        }
        
        .checklist {
            list-style: none;
            padding: 0;
        }
        
        .checklist li {
            margin: 5px 0;
        }
        
        .checklist input[type="checkbox"] {
            margin-left: 10px;
        }
        
        .buttons-list {
            display: grid;
            gap: 10px;
        }
        
        .button-item {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #dee2e6;
        }
        
        .button-item.create { background: #d4edda; }
        .button-item.update { background: #fff3cd; }
        .button-item.delete { background: #f8d7da; }
        .button-item.other { background: #e2e3e5; }
        
        .priority-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-not-tested { background: #6c757d; }
        .status-testing { background: #ffc107; }
        .status-passed { background: #28a745; }
        .status-failed { background: #dc3545; }
        
        .test-actions {
            margin-bottom: 20px;
        }
        
        .test-actions .btn {
            margin-left: 10px;
        }
        
        .nav-tabs .nav-link {
            color: #495057;
        }
        
        .nav-tabs .nav-link.active {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Header placeholder -->
            <div id="unified-header"></div>
            
            <div class="testing-dashboard">
                <div class="container-with-border">
                    <h1>🧪 דשבורד בדיקות CRUD - TikTrack</h1>
                    <p><strong>נוצר:</strong> 06/09/2025 04:05</p>
                    
                    <div class="summary-stats" id="summaryStats">
                        <div class="summary-item">
                            <div class="summary-number" id="totalPages">12</div>
                            <div class="summary-label">עמודים לבדיקה</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number" id="testedPages">0</div>
                            <div class="summary-label">עמודים נבדקו</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number" id="passedPages">0</div>
                            <div class="summary-label">עמודים תקינים</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number" id="progressPercent">0%</div>
                            <div class="summary-label">התקדמות</div>
                        </div>
                    </div>
                    
                    <!-- טאבים לפי ישויות -->
                    <ul class="nav nav-tabs" id="entityTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="main-tab" data-bs-toggle="tab" data-bs-target="#main" type="button" role="tab">
                                🏠 ראשי
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="trades-tab" data-bs-toggle="tab" data-bs-target="#trades" type="button" role="tab">
                                📈 טריידים
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="accounts-tab" data-bs-toggle="tab" data-bs-target="#accounts" type="button" role="tab">
                                🏦 חשבונות
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="alerts-tab" data-bs-toggle="tab" data-bs-target="#alerts" type="button" role="tab">
                                🔔 התראות
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="tickers-tab" data-bs-toggle="tab" data-bs-target="#tickers" type="button" role="tab">
                                📊 טיקרים
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="executions-tab" data-bs-toggle="tab" data-bs-target="#executions" type="button" role="tab">
                                ⚡ ביצועים
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="other-tab" data-bs-toggle="tab" data-bs-target="#other" type="button" role="tab">
                                📝 אחר
                            </button>
                        </li>
                    </ul>
                    
                    <!-- תוכן הטאבים -->
                    <div class="tab-content" id="entityTabContent">
                        <!-- הטאבים יוכנסו כאן -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/console-cleanup.js"></script>
    <script src="/static/js/translation-utils.js"></script>
    <script src="/static/js/notification-system.js"></script>
    <script src="/static/js/ui-utils.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/header-system.js"></script>
    
    <script>
        // פונקציות JavaScript יוכנסו כאן
    </script>
</body>
</html>
