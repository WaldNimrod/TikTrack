<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>ניהול CSS - TikTrack</title>
    
    <!-- 
    ===== IMPORTANT DEVELOPMENT RULES =====
    
    CSS RULES:
    - Only external CSS files are used, following the system's CSS architecture
    - NO inline styles or styles within the page are allowed in this system
    - All styling must be defined in external stylesheets according to ITCSS methodology
    
    JAVASCRIPT RULES:
    - All functions are located in external files
    - NO functions are allowed within the page
    - All system functions use shared global functions located in dedicated files
    - Page-specific functions should be centralized only in the page's dedicated script file
    
    ======================================
    -->
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Unified CSS - אחרי Bootstrap כדי לדרוס אותו -->
    <!-- CSS Files - אחרי Bootstrap כדי לדרוס אותו -->
    <!-- 🔄 MAJOR ARCHITECTURE CHANGE - September 2025: Individual <link> tags instead of @import -->

    <link rel="stylesheet" href="styles-new/01-settings/_colors-dynamic.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_colors-semantic.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_spacing.css?v=v1.0.0">

    <link rel="stylesheet" href="styles-new/03-generic/_reset.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/03-generic/_base.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css?v=v1.0.0">

    <link rel="stylesheet" href="styles-new/05-objects/_layout.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_grid.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_buttons-advanced.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_tables.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_cards.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=v1.0.1">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=v1.0.0">
    
    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v38_fixed">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-wrapper">
        <!-- Header System -->
        <div id="unified-header"></div>

        <!-- Page body -->
        <div class="page-body">
            <!-- Main content limited in width -->
            <div class="main-content">
                <!-- TEMPLATE ZONE LOCKED - DO NOT MODIFY HEADER STRUCTURE -->
                <!-- CONTENT SECTIONS EDITABLE - START -->
                <!-- UI Content Section Top Start-->
                <div class="top-section">
                    <div class="section-header">
                        <h2>🎨 ניהול CSS</h2>
                        <div class="header-actions">
                            <button class="btn btn-outline-primary btn-sm" onclick="copyDetailedLog()" title="העתק לוג מפורט">
                                <i class="fas fa-copy"></i> העתק לוג
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleAllSections()" title="הצג/הסתר כל הסקשנים">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- כאן נכנס התוכן של גוף הסקשן -->
                        <div class="info-summary">
                            <div>קבצי CSS: <strong id="activeCssFiles">25</strong></div>
                            <div>שכבות ITCSS: <strong>6</strong></div>
                            <div>גודל כולל: <strong id="totalCssSize">2.1MB</strong></div>
                            <div>סטטוס: <strong>פעיל</strong></div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section Top End -->  

                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="section1">
                    <div class="section-header">
                        <h2>📊 סטטיסטיקות CSS</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section1')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <!-- כאן נכנס התוכן של גוף הסקשן -->
                        <div class="row">
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h5 class="card-title text-primary">📁 קבצים</h5>
                                        <h3 class="text-primary" id="activeCssFiles">25</h3>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h5 class="card-title text-info">💾 גודל</h5>
                                        <h3 class="text-info" id="totalCssSize">2.1MB</h3>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h5 class="card-title text-success">🎨 שכבות</h5>
                                        <h3 class="text-success">6</h3>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h5 class="card-title text-warning">📏 כללים</h5>
                                        <h3 class="text-warning" id="totalCssRules">856</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 1 End -->   

                <!-- UI Content Section 2 Start-->
                <div class="content-section" id="section2">
                    <div class="section-header">
                        <h2>🎯 ניהול שכבות</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section2')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <!-- כאן נכנס התוכן של גוף הסקשן -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h3>🎨 שכבות ITCSS</h3>
                                    </div>
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <label class="form-label">Settings:</label>
                                            <span class="badge bg-success">פעיל</span>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Components:</label>
                                            <span class="badge bg-success">פעיל</span>
                                        </div>
                                        <button class="btn btn-primary">רענן שכבות</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h3>🔧 כלי ניהול</h3>
                                    </div>
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <label class="form-label">אופטימיזציה:</label>
                                            <span class="badge bg-warning">מוגבל</span>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">דחיסה:</label>
                                            <span class="badge bg-success">פעיל</span>
                                        </div>
                                        <button class="btn btn-secondary">רענן כלים</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 2 End--> 

                <!-- UI Content Section 3 Start-->
                <div class="content-section" id="section3">
                    <div class="section-header">
                        <h2>📋 פעולות CSS</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section3')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <!-- כאן נכנס התוכן של גוף הסקשן -->
                        <div class="row">
                            <div class="col-md-4">
                                <button class="btn btn-success w-100 mb-3">
                                    <i class="fas fa-sync"></i> רענן CSS
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-info w-100 mb-3">
                                    <i class="fas fa-compress"></i> דחוס קבצים
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-warning w-100 mb-3">
                                    <i class="fas fa-check"></i> בדוק תקינות
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 3 End-->
                <!-- CONTENT SECTIONS EDITABLE - END -->
            </div>
        </div>
    </div>

    <script src="scripts/tables.js"></script>

    <script src="scripts/page-utils.js"></script>

    <script src="scripts/main.js"></script>

    <script src="scripts/notification-system.js"></script>

    <script src="scripts/header-system.js"></script>

    <script src="scripts/css-management.js"></script>
