<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>בסיס נתונים - TikTrack</title>
    
    <!-- 
    ===== CORRECTED DB_DISPLAY PAGE =====
    
    This page has been corrected to follow the proper architecture:
    1. Single HTML tag (removed duplicate)
    2. Complete ITCSS implementation
    3. All base package systems included
    4. Correct loading order
    5. Scripts moved to body
    6. Single header (removed duplicate)
    
    ======================================
    -->
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS - Must load first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ITCSS Architecture - Complete Implementation -->
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=1.0.0">
    
    <!-- Page-specific Styles -->
    <link rel="stylesheet" href="styles-new/07-pages/_db_display.css?v=1.0.0">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">
</head>

<body class="db-display-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body db-display">
            <!-- Database area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/db_display.svg" alt="בסיס נתונים" class="table-icon">
                        בסיס נתונים
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים מבסיס הנתונים">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור בסיס נתונים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ טבלאות: <strong id="totalTables">0</strong></div>
                        <div>סה"כ רשומות: <strong id="totalRecords">0</strong></div>
                        <div>גודל בסיס נתונים: <strong id="dbSize">0 MB</strong></div>
                        <div>עדכון אחרון: <strong id="lastUpdate">-</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Database management area - content-section -->
                <div class="content-section" id="main">
                    <!-- Database header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/db_display.svg" alt="ניהול בסיס נתונים" class="section-icon">
                            ניהול בסיס נתונים
                        </div>
                        <div class="table-count" id="dbCount">טוען...</div>
                        <div class="table-actions">
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול בסיס נתונים">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- Database tables -->
                    <div class="section-body">
                        <div class="table-responsive" id="dbContainer">
                            <table class="table" id="dbTable" data-table-type="db_display">
                                <thead>
                                    <tr>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                שם טבלה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מספר רשומות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                גודל <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th>
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                עדכון אחרון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="actions-cell">
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="5" class="loading">טוען נתוני בסיס נתונים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/translation-system.js?v=1.0.0"></script>
    <script src="scripts/page-state-management.js?v=1.0.0"></script>
    <script src="scripts/section-state-persistence.js?v=1.0.0"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/modal-management.js?v=1.0.0"></script>
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    <script src="scripts/confirm-replacement.js?v=1.0.0"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-policy-manager.js?v=1.0.0"></script>
    <script src="scripts/memory-optimizer.js?v=1.0.0"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
    <script src="scripts/ui-utils.js?v=1.0.0"></script>
    <script src="scripts/color-scheme-system.js?v=1.0.0"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- Stage 6: Data and Utility Systems -->
    <script src="scripts/data-utils.js?v=1.0.0"></script>
    <script src="scripts/tables.js?v=1.0.0"></script>
    <script src="scripts/table-mapping.js?v=1.0.0"></script>
    <script src="scripts/page-utils.js?v=1.0.0"></script>
    
    <!-- Stage 7: Additional Systems (As needed) -->
    <!-- Preferences System (Required before Services) -->
    <script src="scripts/preferences.js?v=1.0.0"></script>
    <script src="scripts/preferences-core.js?v=1.0.0"></script>
    
    <script src="scripts/notification-category-detector.js?v=1.0.0"></script>
    <script src="scripts/global-notification-collector.js?v=1.0.0"></script>
    <script src="scripts/system-management.js?v=1.0.0"></script>
    <script src="scripts/realtime-notifications-client.js?v=1.0.0"></script>
    <script src="scripts/error-handlers.js?v=1.0.0"></script>
    
    <!-- Stage 8: Page-specific Script -->
    <script src="scripts/db_display.js?v=1.0.0"></script>
    
    <!-- 14. Init System Check (Available on all pages) -->
    <script src="scripts/init-system-check.js?v=1.0.0"></script>
    
    <!-- 15. Monitoring Functions (Required for page checks) -->
    <script src="scripts/monitoring-functions.js?v=1.0.0"></script>
    
    <!-- Local copyDetailedLog function for db_display page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
