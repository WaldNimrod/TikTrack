<body class="db-extradata-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Database extra data area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/db_extradata.svg" alt="טבלאות עזר" class="section-icon">
                        טבלאות עזר
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים מטבלאות העזר">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור טבלאות עזר">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ טבלאות עזר: <strong id="totalExtraTables">0</strong></div>
                        <div>סה"כ רשומות: <strong id="totalExtraRecords">0</strong></div>
                        <div>גודל נתונים: <strong id="extraDataSize">0 MB</strong></div>
                        <div>עדכון אחרון: <strong id="extraLastUpdate">-</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Extra data management area - content-section -->
                <div class="content-section" id="main" data-section="main">
                    <!-- Extra data header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/db_extradata.svg" alt="ניהול טבלאות עזר" class="section-icon">
                            ניהול טבלאות עזר
                        </div>
                        <div class="table-count" id="extraDataCount">טוען...</div>
                        <div class="table-actions">
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול טבלאות עזר">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- Extra data tables -->
                    <div class="section-body">
                        <div class="table-responsive" id="extraDataContainer">
                            <table class="table" id="extraDataTable" data-table-type="db_extradata">
                                <thead>
                                    <tr>
                                        <th class="col-name">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.extradataTableData || [], 'db_extradata', window.updateExtradataTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                שם טבלה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-data-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, window.extradataTableData || [], 'db_extradata', window.updateExtradataTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סוג נתונים <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-records">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, window.extradataTableData || [], 'db_extradata', window.updateExtradataTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מספר רשומות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-description">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, window.extradataTableData || [], 'db_extradata', window.updateExtradataTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תיאור <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="5" class="loading">טוען נתוני טבלאות עזר...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>
    </div>

    <!-- Stage 9: Page-specific Script -->
