<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תכנונים - Tik.track</title>

  
    <!-- ===== CSS Architecture - ITCSS Based ===== -->
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack CSS - New ITCSS Architecture -->
    <link rel="stylesheet" href="dist/main.css">
    
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modular files -->
    <script src="scripts/console-cleanup.js"></script>
    <script src="scripts/header-system.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/main.js"></script>

  </head>

  <body>
    <!-- unified-header ייווצר כאן אוטומטית -->
    <div id="unified-header"></div>
    
    <div class="background-wrapper">
      <div class="page-body">
        <div class="container">
          <h1>עמוד עיצובים</h1>
          <p>תוכן העמוד יבוא כאן...</p>
        </div>
      </div>
    </div>

    <!-- Page initialization -->
    <script>
      // Page initialization
      document.addEventListener('DOMContentLoaded', function () {
        console.log('🔄 Initializing designs page...');
        if (typeof initializeDesignsPage === 'function') {
          initializeDesignsPage();
        }
        
        // אתחול מערכת הכותרת החדשה (כוללת תפריט ראשי)
        console.log("🔄 Initializing unified header system...");
        if (window.headerSystem) {
          window.headerSystem.init();
        }
      });
    </script>
  </body>

</html>
