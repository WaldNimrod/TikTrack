<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זיהוי כפילויות קוד - TikTrack</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link href="/styles-new/01-base/_variables.css" rel="stylesheet">
    <link href="/styles-new/02-layout/_containers.css" rel="stylesheet">
    <link href="/styles-new/03-components/_buttons.css" rel="stylesheet">
    <link href="/styles-new/04-components/_cards.css" rel="stylesheet">
    <link href="/styles-new/05-components/_tables.css" rel="stylesheet">
    <link href="/styles-new/06-components/_tables.css" rel="stylesheet">
    <link href="/styles-new/07-components/_forms.css" rel="stylesheet">
    <link href="/styles-new/08-components/_modals.css" rel="stylesheet">
    <link href="/styles-new/09-components/_notifications.css" rel="stylesheet">
    <link href="/styles-new/10-components/_charts.css" rel="stylesheet">
    <link href="/styles-new/11-components/_filters.css" rel="stylesheet">
    <link href="/styles-new/12-components/_navigation.css" rel="stylesheet">
    <link href="/styles-new/13-components/_header.css" rel="stylesheet">
    <link href="/styles-new/14-components/_footer.css" rel="stylesheet">
    <link href="/styles-new/15-components/_loading.css" rel="stylesheet">
    <link href="/styles-new/16-components/_animations.css" rel="stylesheet">
    <link href="/styles-new/17-components/_responsive.css" rel="stylesheet">
    <link href="/styles-new/18-components/_accessibility.css" rel="stylesheet">
    <link href="/styles-new/19-components/_print.css" rel="stylesheet">
    <link href="/styles-new/20-components/_utilities.css" rel="stylesheet">
    
    <style>
        .duplicate-card {
            border-left: 4px solid #dc3545;
            margin-bottom: 1rem;
        }
        
        .duplicate-card.near {
            border-left-color: #ffc107;
        }
        
        .duplicate-card.similar {
            border-left-color: #fd7e14;
        }
        
        .duplicate-card.potential {
            border-left-color: #0dcaf0;
        }
        
        .similarity-bar {
            height: 8px;
            background: linear-gradient(90deg, #dc3545 0%, #ffc107 50%, #198754 100%);
            border-radius: 4px;
            position: relative;
        }
        
        .similarity-indicator {
            position: absolute;
            top: -2px;
            width: 12px;
            height: 12px;
            background: white;
            border: 2px solid #333;
            border-radius: 50%;
            transform: translateX(-50%);
        }
        
        .confidence-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 5px;
        }
        
        .confidence-high { background-color: #198754; }
        .confidence-medium { background-color: #ffc107; }
        .confidence-low { background-color: #dc3545; }
        
        .category-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        
        .recommendation-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .file-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .file-content {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .stats-card {
            text-align: center;
            padding: 1.5rem;
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .stats-label {
            color: #6c757d;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="app-header">
        <!-- Header content will be loaded by header-system.js -->
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">
            <!-- Page Header -->
            <div class="page-header">
                <div class="row align-items-center">
                    <div class="col">
                        <h1 class="page-title">
                            <i class="fas fa-copy text-primary me-2"></i>
                            זיהוי כפילויות קוד
                        </h1>
                        <p class="page-subtitle">מערכת מתקדמת לזיהוי ותיעוד כפילויות קוד במערכת</p>
                    </div>
                    <div class="col-auto">
                        <div class="page-actions">
                            <button class="btn btn-primary" onclick="runDuplicateDetection()">
                                <i class="fas fa-search me-1"></i>
                                הרץ בדיקה
                            </button>
                            <button class="btn btn-outline-secondary" onclick="exportReport()">
                                <i class="fas fa-download me-1"></i>
                                ייצא דוח
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="row mb-4" id="statisticsCards">
                <div class="col-md-3">
                    <div class="card stats-card">
                        <div class="stats-number text-danger" id="exactDuplicates">-</div>
                        <div class="stats-label">כפילויות מדויקות</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stats-card">
                        <div class="stats-number text-warning" id="nearDuplicates">-</div>
                        <div class="stats-label">כפילויות קרובות</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stats-card">
                        <div class="stats-number text-info" id="similarPatterns">-</div>
                        <div class="stats-label">דפוסים דומים</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stats-card">
                        <div class="stats-number text-primary" id="totalFunctions">-</div>
                        <div class="stats-label">סה"כ פונקציות</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-filter text-primary me-2"></i>
                        מסננים
                    </h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">סוג כפילות</label>
                            <select class="form-select" id="duplicateTypeFilter">
                                <option value="all">הכל</option>
                                <option value="exact">מדויקות</option>
                                <option value="near">קרובות</option>
                                <option value="similar">דומות</option>
                                <option value="potential">פוטנציאליות</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">קטגוריה</label>
                            <select class="form-select" id="categoryFilter">
                                <option value="all">הכל</option>
                                <option value="VALIDATION">תקינות</option>
                                <option value="NOTIFICATION">התראות</option>
                                <option value="DATA_LOADING">טעינת נתונים</option>
                                <option value="FORMATTING">עיצוב</option>
                                <option value="UI_MANAGEMENT">ניהול UI</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">רמת דמיון מינימלית</label>
                            <input type="range" class="form-range" id="similarityRange" min="0" max="100" value="75">
                            <div class="text-center">
                                <span id="similarityValue">75%</span>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">פעולות</label>
                            <div class="d-grid">
                                <button class="btn btn-outline-primary" onclick="applyFilters()">
                                    <i class="fas fa-filter me-1"></i>
                                    החל מסננים
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Duplicates List -->
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-list text-primary me-2"></i>
                        כפילויות שזוהו
                    </h5>
                </div>
                <div class="card-body">
                    <div id="duplicatesList">
                        <div class="text-center text-muted py-5">
                            <i class="fas fa-search fa-3x mb-3"></i>
                            <p>לחץ על "הרץ בדיקה" כדי להתחיל לזהות כפילויות</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">טוען...</span>
                    </div>
                    <h5>מזהה כפילויות קוד...</h5>
                    <p class="text-muted">זה עשוי לקחת כמה דקות</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Duplicate Details Modal -->
    <div class="modal fade" id="duplicateDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">פרטי כפילות</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="duplicateDetailsContent">
                    <!-- Content will be populated dynamically -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
                    <button type="button" class="btn btn-primary" onclick="openInEditor()">
                        <i class="fas fa-code me-1"></i>
                        פתח בעורך
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- TikTrack Core Scripts -->
    <script src="scripts/init-system/package-manifest-new.js?v=05b6de6f_20251025_005449"></script>
    <script src="scripts/init-system/unified-app-initializer.js?v=05b6de6f_20251025_005449"></script>
    
    <!-- Page-specific Script -->
    <script src="scripts/duplicate-detector-ui.js?v=05b6de6f_20251025_005449"></script>
</body>
</html>
