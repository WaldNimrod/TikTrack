    <title>תצוגת מערכת צבעים דינמית - TikTrack</title>
  
  <!-- 
  CSS Loading Order - ראו: documentation/frontend/css/CSS_ARCHITECTURE.md
  Bootstrap חייב להיטען לפני CSS שלנו כדי ש-CSS שלנו יוכל לדרוס אותו
  -->
  
  <!-- Bootstrap Framework -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="styles-new/master.css?v=1.0.0">
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">  
  <!-- Unified CSS - אחרי Bootstrap כדי לדרוס אותו -->
  <!-- CSS Files - אחרי Bootstrap כדי לדרוס אותו -->

    <script src="scripts/global-favicon.js"></script>
</head>

<body>
    <div class="background-wrapper">
        <!-- Header System -->
        <div id="unified-header"></div>

        <!-- Page body -->
        <div class="page-body">
            <!-- Main content limited in width -->
            <div class="main-content">
                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h2><i class="fas fa-palette"></i> מבוא למערכת הצבעים הדינמית</h2>
                        <div class="section-actions">
                            <button data-button-type="COPY" data-variant="full" data-onclick="copyDetailedLog()" data-text="העתק לוג מפורט" title="העתק לוג מפורט עם כל הנתונים והסטטוס"></button>
                            <button class="filter-toggle-btn" onclick="toggleAllSections()" title="הצג/הסתר סקשן">
                                ${createToggleButton("toggleSection('top')", "הצג/הסתר סקשן")}
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- הסקשן העליון נשאר ריק בכוונה - התוכן מתחיל מהסקשנים הבאים -->
                    </div>
                </div>
                <!-- UI Content Section Top End -->

                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="section1">
                    <div class="section-header">
                        <h2><i class="fas fa-hashtag"></i> ערכים מספריים</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section1')" title="הצג/הסתר סקשן">
                            ${createToggleButton("toggleSection('section1')", "הצג/הסתר סקשן")}
                        </button>
                    </div>
                    <div class="section-body" id="section1-content">
                        <!-- כאן יוזרק התוכן של סקשן ערכים מספריים -->
                    </div>
                </div>
                <!-- UI Content Section 1 End -->

                <!-- UI Content Section 2 Start-->
                <div class="content-section" id="section2">
                    <div class="section-header">
                        <h2><i class="fas fa-tags"></i> ישויות מערכת</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section2')" title="הצג/הסתר סקשן">
                            ${createToggleButton("toggleSection('section1')", "הצג/הסתר סקשן")}
                        </button>
                    </div>
                    <div class="section-body" id="section2-content">
                        <!-- כאן יוזרק התוכן של סקשן ישויות -->
                    </div>
                </div>
                <!-- UI Content Section 2 End -->

                <!-- UI Content Section 3 Start-->
                <div class="content-section" id="section3">
                    <div class="section-header">
                        <h2><i class="fas fa-chart-bar"></i> סטטוסים ומודלים</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section3')" title="הצג/הסתר סקשן">
                            ${createToggleButton("toggleSection('section1')", "הצג/הסתר סקשן")}
                        </button>
                    </div>
                    <div class="section-body" id="section3-content">
                        <!-- כאן יוזרק התוכן של סקשן סטטוסים ומודלים -->
                    </div>
                </div>
                <!-- UI Content Section 3 End -->

                <!-- UI Content Section 4 Start-->
                <div class="content-section" id="section4">
                    <div class="section-header">
                        <h2><i class="fas fa-cogs"></i> API ופונקציות</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section4')" title="הצג/הסתר סקשן">
                            ${createToggleButton("toggleSection('section1')", "הצג/הסתר סקשן")}
                        </button>
                    </div>
                    <div class="section-body" id="section4-content">
                        <!-- כאן יוזרק התוכן של סקשן API ופונקציות -->
                    </div>
                </div>
                <!-- UI Content Section 4 End -->
            </div>
        </div>
    </div>

    <!-- Core System Scripts -->
    <script src="scripts/translation-utils.js?v=1.1.0"></script>
    <script src="scripts/button-icons.js?v=1.0.0"></script>
    <script src="scripts/data-utils.js?v=1.1.0"></script>
    <script src="scripts/notification-system.js?v=1.1.0"></script>
    <script src="scripts/ui-utils.js?v=1.1.0"></script>
    <script src="scripts/page-utils.js?v=1.1.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.1.0"></script>
    <script src="scripts/cache-sync-manager.js?v=1.1.0"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Header System Script -->
    <script src="scripts/header-system.js?v=v6.0.0_20250917"></script>
    
    <!-- Button System -->
    <script src="scripts/button-system-init.js?v=1.0.0"></script>

    <!-- Dynamic Color System Scripts -->
    <script src="scripts/color-scheme-system.js?v=1.1.0"></script>

    <!-- Preferences System Scripts -->

    <!-- Unified Initialization System -->
    <!-- Page Configs and Initializer -->
    <script src="scripts/init-system/package-manifest.js?v=1.0.0"></script>
    <script src="scripts/page-initialization-configs.js"></script>
    <script src="scripts/unified-app-initializer.js"></script>
    
    <!-- 14. Init System Check (Available on all pages) -->
    <script src="scripts/init-system-check.js?v=1.0.0"></script>
    
    <!-- 15. Monitoring Functions (Required for page checks) -->
    <script src="scripts/monitoring-functions.js?v=1.0.0"></script>
    
    <!-- Page-specific Script -->
    <script src="scripts/dynamic-colors-display.js?v=1.0.0"></script>
    <!-- Local copyDetailedLog function for dynamic-colors-display page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
