<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת טעינה דינמית - TikTrack</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=bd7dc47_20251013_044649" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=bd7dc47_20251013_044649" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
        .module-card {
            transition: all 0.3s ease;
        }
        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .module-loaded {
            border-left: 4px solid #28a745;
        }
        .module-loading {
            border-left: 4px solid #ffc107;
        }
        .module-error {
            border-left: 4px solid #dc3545;
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card stats-card">
                    <div class="card-body text-center">
                        <h1 class="card-title">
                            <i class="fas fa-rocket"></i> בדיקת טעינה דינמית
                        </h1>
                        <p class="card-text">מערכת הטעינה הדינמית החדשה של TikTrack</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title text-primary">
                            <i class="fas fa-cubes"></i> מודולים
                        </h5>
                        <h3 id="total-modules">0</h3>
                        <p class="text-muted">סה"כ מודולים</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title text-success">
                            <i class="fas fa-check-circle"></i> נטענו
                        </h5>
                        <h3 id="loaded-modules">0</h3>
                        <p class="text-muted">מודולים נטענו</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title text-warning">
                            <i class="fas fa-clock"></i> טוענים
                        </h5>
                        <h3 id="loading-modules">0</h3>
                        <p class="text-muted">מודולים בטעינה</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title text-info">
                            <i class="fas fa-chart-pie"></i> התקדמות
                        </h5>
                        <h3 id="loading-progress">0%</h3>
                        <p class="text-muted">אחוז טעינה</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-cogs"></i> בקרות טעינה
                        </h5>
                        <div class="row">
                            <div class="col-md-4">
                                <button class="btn btn-primary w-100" onclick="loadAllModules()">
                                    <i class="fas fa-download"></i> טען כל המודולים
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" onclick="loadPageModules('trades')">
                                    <i class="fas fa-chart-line"></i> טען מודולי עמוד מעקב
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-warning w-100" onclick="refreshStats()">
                                    <i class="fas fa-sync"></i> רענן סטטיסטיקות
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modules Grid -->
        <div class="row" id="modules-grid">
            <!-- Modules will be loaded here dynamically -->
        </div>

        <!-- Log -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-terminal"></i> לוג טעינה
                        </h5>
                        <div id="loading-log" class="bg-dark text-light p-3 rounded loading-log-container">
                            <div class="text-success">🚀 מערכת טעינה דינמית מוכנה...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Core Systems First -->
    <script src="scripts/modules/core-systems.js?v=bd7dc47_20251013_044649"></script>
    
    <!-- Load Dynamic Loader Config -->
    <script src="scripts/modules/dynamic-loader-config.js?v=bd7dc47_20251013_044649"></script>

    <!-- Test Script -->
    <script>
        // Test functions
        function log(message, type = 'info') {
            const logElement = document.getElementById('loading-log');
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const emoji = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            const color = type === 'success' ? 'text-success' : type === 'error' ? 'text-danger' : type === 'warning' ? 'text-warning' : 'text-info';
            
            logElement.innerHTML += `<div class="${color}">${emoji} [${timestamp}] ${message}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function updateStats() {
            if (window.getLoadingStats) {
                const stats = window.getLoadingStats();
                document.getElementById('total-modules').textContent = stats.totalModules;
                document.getElementById('loaded-modules').textContent = stats.loadedModules;
                document.getElementById('loading-modules').textContent = stats.loadingModules;
                document.getElementById('loading-progress').textContent = stats.loadingProgress;
            }
        }

        function refreshStats() {
            updateStats();
            updateModulesGrid();
            log('סטטיסטיקות עודכנו', 'info');
        }

        function updateModulesGrid() {
            const grid = document.getElementById('modules-grid');
            grid.innerHTML = '';

            if (window.getAvailableModules) {
                const modules = window.getAvailableModules();
                
                modules.forEach(moduleName => {
                    const config = window.DynamicLoaderConfig.getModuleConfig(moduleName);
                    const isLoaded = window.isModuleLoaded ? window.isModuleLoaded(moduleName) : false;
                    
                    const cardClass = isLoaded ? 'module-loaded' : 'module-loading';
                    const statusIcon = isLoaded ? 'fa-check-circle text-success' : 'fa-clock text-warning';
                    
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4 mb-3';
                    card.innerHTML = `
                        <div class="card module-card ${cardClass}">
                            <div class="card-body">
                                <h6 class="card-title">
                                    <i class="fas ${statusIcon}"></i> ${config.name}
                                </h6>
                                <p class="card-text text-muted">${config.description}</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted">${config.size}</small>
                                    <button class="btn btn-sm btn-outline-primary" onclick="loadSingleModule('${moduleName}')">
                                        <i class="fas fa-download"></i> טען
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            }
        }

        async function loadSingleModule(moduleName) {
            log(`מתחיל טעינת מודול: ${moduleName}`, 'info');
            
            if (window.loadModule) {
                const success = await window.loadModule(moduleName);
                if (success) {
                    log(`מודול ${moduleName} נטען בהצלחה`, 'success');
                } else {
                    log(`שגיאה בטעינת מודול ${moduleName}`, 'error');
                }
            } else {
                log('פונקציית loadModule לא זמינה', 'error');
            }
            
            updateStats();
            updateModulesGrid();
        }

        async function loadAllModules() {
            log('מתחיל טעינת כל המודולים...', 'info');
            
            if (window.getAvailableModules) {
                const modules = window.getAvailableModules();
                
                for (const moduleName of modules) {
                    await loadSingleModule(moduleName);
                    // Small delay between loads
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                log('טעינת כל המודולים הושלמה', 'success');
            } else {
                log('פונקציית getAvailableModules לא זמינה', 'error');
            }
        }

        async function loadPageModules(pageName) {
            log(`מתחיל טעינת מודולים לעמוד: ${pageName}`, 'info');
            
            if (window.DynamicLoaderConfig) {
                const requirements = window.DynamicLoaderConfig.getPageRequirements(pageName);
                if (requirements) {
                    log(`נמצאו ${requirements.modules.length} מודולים נדרשים`, 'info');
                    
                    for (const moduleName of requirements.modules) {
                        await loadSingleModule(moduleName);
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    
                    log(`טעינת מודולי עמוד ${pageName} הושלמה`, 'success');
                } else {
                    log(`לא נמצאו דרישות לעמוד ${pageName}`, 'warning');
                }
            } else {
                log('DynamicLoaderConfig לא זמין', 'error');
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            log('דף בדיקה נטען', 'success');
            
            // Wait a bit for core systems to load
            setTimeout(() => {
                updateStats();
                updateModulesGrid();
                log('מערכת בדיקה מוכנה', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
