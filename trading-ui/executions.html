<body class="executions-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Executions area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <h1>
                        <img src="images/icons/executions.svg" alt="עסקעות" class="section-icon">
                        עסקעות
                    </h1>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והעסקעות">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור עסקעות">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ עסקעות: <strong id="totalExecutions">0</strong> (<span id="totalBuyExecutions" class="buy-color">0</span> קניה / <span id="totalSellExecutions" class="sell-color">0</span> מכירה)</div>
                        <div>סה"כ קניה: <strong id="totalBuyAmount">$0</strong></div>
                        <div>סה"כ מכירות: <strong id="totalSellAmount">$0</strong></div>
                        <div>מאזן: <strong id="balanceAmount">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Executions management area - content-section -->
                <div class="content-section" id="main" data-section="main">
                    <!-- Executions header -->
                    <div class="section-header">
                        <h2>
                            <img src="images/icons/executions.svg" alt="ניהול עסקעות" class="section-icon">
                            ניהול עסקעות
                            <span class="table-count" id="executionsCount">טוען...</span>
                        </h2>
                        <div class="header-actions">
                            <button id="addExecutionBtn" class="refresh-btn" onclick="openExecutionDetails()" title="הוסף עסקה חדשה">
                                <img src="images/icons/executions.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול עסקעות">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Executions table -->
                    <div class="section-body">
                        <div class="table-responsive" id="executionsContainer">
                            <table class="table" id="executionsTable" data-table-type="executions">
                                <thead>
                                    <tr>
                                        <th class="col-ticker">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                טיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-action">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                פעולה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-account">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                חשבון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-quantity">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                כמות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מחיר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-pnl">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(5, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                P&L <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-execution-date">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(6, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תאריך ביצוע <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-source">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(7, window.filteredExecutionsData || window.executionsData, 'executions', window.updateExecutionsTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מקור <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="9" class="loading">טוען עסקעות...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Execution Modal -->
        <div class="modal fade" id="addExecutionModal" tabindex="-1" aria-labelledby="addExecutionModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addExecutionModalLabel">הוספת עסקה חדשה</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addExecutionForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionTicker" class="form-label">טיקר</label>
                                        <select class="form-select" id="executionTicker" required>
                                            <option value="">בחר טיקר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionType" class="form-label">סוג עסקה</label>
                                        <select class="form-select" id="executionType" required>
                                            <option value="">בחר סוג</option>
                                            <option value="buy">קניה</option>
                                            <option value="sell">מכירה</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionQuantity" class="form-label">כמות</label>
                                        <input type="number" class="form-control" id="executionQuantity" min="1" step="1" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionPrice" class="form-label">מחיר</label>
                                        <input type="number" class="form-control" id="executionPrice" min="0" step="0.01" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionDate" class="form-label">תאריך עסקה</label>
                                        <input type="datetime-local" class="form-control" id="executionDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionAccount" class="form-label">טרייד</label>
                                        <select class="form-select" id="executionAccount" required>
                                            <option value="">בחר טרייד</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionCommission" class="form-label">עמלה</label>
                                        <input type="number" class="form-control" id="executionCommission" min="0" step="0.01" value="0">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="executionNotes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="executionNotes" rows="2" placeholder="הערות אופציונליות"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="addExecution()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            עסקה</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Execution Modal -->
        <div class="modal fade" id="editExecutionModal" tabindex="-1" aria-labelledby="editExecutionModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editExecutionModalLabel">עריכת עסקה</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editExecutionForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionTicker" class="form-label">טיקר</label>
                                        <select class="form-select" id="editExecutionTicker" required>
                                            <option value="">בחר טיקר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionType" class="form-label">סוג עסקה</label>
                                        <select class="form-select" id="editExecutionType" required>
                                            <option value="buy">קניה</option>
                                            <option value="sell">מכירה</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionQuantity" class="form-label">כמות</label>
                                        <input type="number" class="form-control" id="editExecutionQuantity" min="1" step="1" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionPrice" class="form-label">מחיר</label>
                                        <input type="number" class="form-control" id="editExecutionPrice" min="0" step="0.01" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionDate" class="form-label">תאריך עסקה</label>
                                        <input type="datetime-local" class="form-control" id="editExecutionDate" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionAccount" class="form-label">טרייד</label>
                                        <select class="form-select" id="editExecutionAccount" required>
                                            <option value="">בחר טרייד</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionCommission" class="form-label">עמלה</label>
                                        <input type="number" class="form-control" id="editExecutionCommission" min="0" step="0.01" value="0">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editExecutionNotes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="editExecutionNotes" rows="2" placeholder="הערות אופציונליות"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="updateExecution()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
                            עסקה</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
