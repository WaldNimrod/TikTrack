                        <div class="table-actions">

                        </div>

                    <div class="section-body">

                                    <tr>

                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }">

                                            </button>
                                        </th>
                                        <th class="col-action">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }">
