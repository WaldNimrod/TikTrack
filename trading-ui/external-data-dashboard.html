<!DOCTYPE html>
<html lang="he" dir="rtl">
            <!-- ===== CSS Architecture - Unified CSS ===== -->
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack CSS - Unified CSS (No @import) -->
    <link rel="stylesheet" href="styles-new/unified.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Error Handlers -->
    <script src="scripts/error-handlers.js"></script>
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=20250115_fix_level3_bg"></head>
<body class="external-data-dashboard-page">
    <!-- Unified Header Container -->
    <div id="unified-header"></div>
    <!-- General background -->
    <div class="background-wrapper">
        
        <!-- unified-header ייווצר כאן אוטומטית -->
        <div id="unified-header"></div>
        
        <!-- Page body - All content after header -->
        <div class="page-body">
            <!-- Dashboard area - top-Section -->
            <div class="top-section">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/development.svg?v=20250905" alt="דשבורד נתונים חיצוניים"
                            style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        דשבורד נתונים חיצוניים
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-outline-primary btn-sm" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והסטטוס">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור דשבורד">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Dashboard summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>ספקי נתונים: <strong id="providersStats">0</strong></div>
                        <div>ציטוטים במטמון: <strong id="cacheStats">0</strong></div>
                        <div>אחוז פגיעות: <strong id="hitRateStats">0%</strong></div>
                        <div>סטטוס כללי: <strong id="overallStatus">בדיקה...</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content" data-section="external-data">
                <div class="dashboard-container">

        <!-- System Status -->
        <div class="status-grid">
            <div class="status-card">
                <h3>🔌 Yahoo Finance</h3>
                <div id="yahoo-status" class="status-indicator">בדיקה...</div>
                <div id="yahoo-details" class="status-details"></div>
            </div>

            <div class="status-card">
                <h3>💾 מטמון</h3>
                <div id="cache-status-indicator" class="status-indicator">בדיקה...</div>
                <div id="cache-details" class="status-details"></div>
            </div>

            <div class="status-card">
                <h3>🗄️ בסיס נתונים</h3>
                <div id="db-status" class="status-indicator">בדיקה...</div>
                <div id="db-details" class="status-details"></div>
            </div>

            <div class="status-card">
                <h3>🔌 API</h3>
                <div id="api-status-indicator" class="status-indicator">בדיקה...</div>
                <div id="api-details" class="status-details"></div>
            </div>
        </div>

        <!-- Providers Section -->
        <div class="section">
            <h2>🏢 ספקי נתונים</h2>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="refreshProviders()">🔄 רענן ספקים</button>
                <button class="btn btn-warning" onclick="testAllProviders()">🧪 בדוק כל הספקים</button>
            </div>
            <div id="providers-grid" class="providers-grid">
                <!-- Providers will be loaded here -->
            </div>
        </div>

        <!-- Cache Statistics -->
        <div class="section">
            <h2>📊 סטטיסטיקות מטמון</h2>
            <div class="action-buttons">
                <button class="btn btn-success" onclick="optimizeCache()">⚡ אופטמז מטמון</button>
                <button class="btn btn-danger" onclick="clearCache()">🗑️ נקה מטמון</button>
            </div>
            <div id="cache-stats" class="cache-stats-grid">
                <!-- Cache stats will be loaded here -->
            </div>
        </div>

        <!-- Group Refresh History -->
        <div class="section">
            <h2>📊 היסטוריית עדכונים קבוצתיים</h2>
            <div class="group-refresh-filters">
                <select id="group-category-filter">
                    <option value="">כל הקטגוריות</option>
                    <option value="active_trades">טיקרים עם טרייד פעיל</option>
                    <option value="no_active_trades">טיקרים ללא טרייד פעיל</option>
                    <option value="closed">טיקרים סגורים/מבוטלים</option>
                </select>
                <select id="group-status-filter">
                    <option value="">כל הסטטוסים</option>
                    <option value="completed">הושלם</option>
                    <option value="failed">נכשל</option>
                    <option value="started">התחיל</option>
                </select>
                <input type="number" id="group-limit" placeholder="מספר רשומות" value="20" min="1" max="100">
                <button class="btn btn-primary" onclick="refreshGroupHistory()">🔄 רענן היסטוריה</button>
                <button class="btn btn-success" onclick="exportGroupHistory()">📥 ייצא היסטוריה</button>
            </div>
            <div id="group-refresh-content" class="group-refresh-content">
                <!-- Group refresh history will be loaded here -->
            </div>
        </div>

        <!-- System Logs -->
        <div class="section">
            <h2>📋 לוגים מערכתיים</h2>
            <div class="log-filters">
                <select id="log-level-filter">
                    <option value="all">כל הרמות</option>
                    <option value="info">מידע</option>
                    <option value="warning">אזהרה</option>
                    <option value="error">שגיאה</option>
                </select>
                <input type="text" id="log-search" placeholder="חיפוש בלוגים...">
                <button class="btn btn-primary" onclick="refreshLogs()">🔄 רענן לוגים</button>
                <button class="btn btn-danger" onclick="clearLogs()">🗑️ נקה לוגים</button>
                <button class="btn btn-secondary" onclick="copyDetailedLog()">📋 העתק לוג מפורט</button>
            </div>
            <div id="log-content" class="log-content">
                <!-- Logs will be loaded here -->
            </div>
        </div>

        <!-- Data Management -->
        <div class="section">
            <h2>📊 ניהול נתונים</h2>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="analyzeData()">📊 נתח נתונים</button>
                <button class="btn btn-success" onclick="exportData()">📤 ייצא נתונים</button>
                <button class="btn btn-warning" onclick="backupData()">💾 גבה נתונים</button>
            </div>
                </div>
            </div> <!-- End main-content -->
        </div> <!-- End page-body -->
    </div> <!-- End background-wrapper -->

    <!-- Scripts -->
    <script src="scripts/header-system.js?v=20250115_navigation_fix"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/external-data-dashboard.js"></script>
</body>
</html>
