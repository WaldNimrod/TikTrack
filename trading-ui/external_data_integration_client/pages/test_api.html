    <script>
        // פונקציה לבדיקת endpoint בסיסי
        async function testEndpoint() {
            addLog('info', 'בודק endpoint בסיסי...');
            
            try {
                const startTime = performance.now();
                const response = await fetch('/api/v1/tickers/');
                const endTime = performance.now();
                const responseTime = endTime - startTime;
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    addLog('success', `Endpoint תקין - זמן תגובה: ${responseTime.toFixed(2)}ms`);
                    displayResults('בדיקת endpoint בסיסי', {
                        status: 'success',
                        message: 'Endpoint תקין ומגיב',
                        response: {
                            status: response.status,
                            statusText: response.statusText,
                            responseTime: `${responseTime.toFixed(2)}ms`,
                            data: data
                        },
                        headers: Object.fromEntries(response.headers.entries())
                    });
                } else {
                    addLog('error', `Endpoint נכשל - סטטוס: ${response.status}`);
                    displayResults('שגיאה ב-endpoint', {
                        status: 'error',
                        message: `Endpoint נכשל עם סטטוס ${response.status}`,
                        response: {
                            status: response.status,
                            statusText: response.statusText,
                            data: data
                        }
                    });
                }
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת endpoint: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת בקשת POST
        async function testPostRequest() {
            addLog('info', 'בודק בקשת POST...');
            
            try {
                const testData = {
                    test: true,
                    timestamp: new Date().toISOString(),
                    message: 'בדיקת POST request'
                };
                
                const startTime = performance.now();
                const response = await fetch('/api/v1/tickers/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                const endTime = performance.now();
                const responseTime = endTime - startTime;
                
                const data = await response.json();
                
                if (response.ok) {
                    addLog('success', `בקשת POST הצליחה - זמן תגובה: ${responseTime.toFixed(2)}ms`);
                    displayResults('בדיקת בקשת POST', {
                        status: 'success',
                        message: 'בקשת POST הצליחה',
                        request: {
                            method: 'POST',
                            data: testData
                        },
                        response: {
                            status: response.status,
                            statusText: response.statusText,
                            responseTime: `${responseTime.toFixed(2)}ms`,
                            data: data
                        }
                    });
                } else {
                    addLog('warning', `בקשת POST נכשלה - סטטוס: ${response.status}`);
                    displayResults('בקשת POST נכשלה', {
                        status: 'warning',
                        message: `בקשת POST נכשלה עם סטטוס ${response.status}`,
                        request: {
                            method: 'POST',
                            data: testData
                        },
                        response: {
                            status: response.status,
                            statusText: response.statusText,
                            data: data
                        }
                    });
                }
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת POST: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת אימות
        async function testAuthentication() {
            addLog('info', 'בודק אימות...');
            
            try {
                // בדיקה ללא token
                const response1 = await fetch('/api/v1/tickers/');
                const data1 = await response1.json();
                
                // בדיקה עם token לא תקין
                const response2 = await fetch('/api/v1/tickers/', {
                    headers: {
                        'Authorization': 'Bearer invalid-token'
                    }
                });
                const data2 = await response2.json();
                
                const authStatus = {
                    noToken: {
                        status: response1.status,
                        allowed: response1.status === 200
                    },
                    invalidToken: {
                        status: response2.status,
                        allowed: response2.status === 401
                    }
                };
                
                const isSecure = !authStatus.noToken.allowed && authStatus.invalidToken.allowed;
                const status = isSecure ? 'success' : 'warning';
                const message = isSecure ? 'אימות מוגדר נכון' : 'אימות דורש הגדרה';
                
                addLog(status, message);
                displayResults('בדיקת אימות', {
                    status: status,
                    message: message,
                    authentication: authStatus,
                    recommendations: isSecure ? 
                        ['אימות מוגדר נכון', 'המערכת מאובטחת'] : 
                        ['שקול הוספת אימות', 'הגדר middleware לאימות']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת אימות: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת הגבלת קצב
        async function testRateLimiting() {
            addLog('info', 'בודק הגבלת קצב...');
            
            try {
                const requests = [];
                const startTime = performance.now();
                
                // שליחת 10 בקשות ברצף
                for (let i = 0; i < 10; i++) {
                    const requestStart = performance.now();
                    const response = await fetch('/api/v1/health');
                    const requestEnd = performance.now();
                    
                    requests.push({
                        request: i + 1,
                        status: response.status,
                        responseTime: requestEnd - requestStart,
                        timestamp: new Date().toISOString()
                    });
                    
                    // עיכוב קצר בין בקשות
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                
                const endTime = performance.now();
                const totalTime = endTime - startTime;
                
                const successfulRequests = requests.filter(r => r.status === 200).length;
                const failedRequests = requests.filter(r => r.status === 429).length;
                const otherFailures = requests.filter(r => r.status !== 200 && r.status !== 429).length;
                
                const hasRateLimit = failedRequests > 0;
                const status = hasRateLimit ? 'success' : 'warning';
                const message = hasRateLimit ? 
                    'הגבלת קצב פעילה' : 'הגבלת קצב לא מוגדרת';
                
                addLog(status, message);
                displayResults('בדיקת הגבלת קצב', {
                    status: status,
                    message: message,
                    summary: {
                        totalRequests: requests.length,
                        successful: successfulRequests,
                        rateLimited: failedRequests,
                        otherFailures: otherFailures,
                        totalTime: `${totalTime.toFixed(2)}ms`,
                        averageTime: `${(totalTime / requests.length).toFixed(2)}ms`
                    },
                    requests: requests,
                    recommendations: hasRateLimit ? 
                        ['הגבלת קצב פעילה', 'המערכת מוגנת'] : 
                        ['שקול הוספת הגבלת קצב', 'הגדר rate limiting']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת הגבלת קצב: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת טיפול בשגיאות
        async function testErrorHandling() {
            addLog('info', 'בודק טיפול בשגיאות...');
            
            try {
                const errorTests = [
                    {
                        name: 'Endpoint לא קיים',
                        url: '/api/v1/nonexistent',
                        expectedStatus: 404
                    },
                    {
                        name: 'בקשת POST עם נתונים לא תקינים',
                        url: '/api/v1/preferences',
                        method: 'POST',
                        body: 'invalid-json',
                        expectedStatus: 400
                    },
                    {
                        name: 'בקשת GET עם פרמטרים לא תקינים',
                        url: '/api/v1/tickers?invalid=param',
                        expectedStatus: 200 // או 400 תלוי בולידציה
                    }
                ];
                
                const results = [];
                
                for (const test of errorTests) {
                    try {
                        const options = {
                            method: test.method || 'GET'
                        };
                        
                        if (test.body) {
                            options.body = test.body;
                            options.headers = {
                                'Content-Type': 'application/json'
                            };
                        }
                        
                        const response = await fetch(test.url, options);
                        const data = await response.json();
                        
                        results.push({
                            test: test.name,
                            expectedStatus: test.expectedStatus,
                            actualStatus: response.status,
                            passed: response.status === test.expectedStatus,
                            data: data
                        });
                        
                    } catch (error) {
                        results.push({
                            test: test.name,
                            expectedStatus: test.expectedStatus,
                            actualStatus: 'error',
                            passed: false,
                            error: error.message
                        });
                    }
                }
                
                const passedTests = results.filter(r => r.passed).length;
                const totalTests = results.length;
                
                const status = passedTests === totalTests ? 'success' : 'warning';
                const message = passedTests === totalTests ? 
                    'כל בדיקות השגיאות עברו' : `${passedTests}/${totalTests} בדיקות עברו`;
                
                addLog(status, message);
                displayResults('בדיקת טיפול בשגיאות', {
                    status: status,
                    message: message,
                    results: results,
                    summary: {
                        total: totalTests,
                        passed: passedTests,
                        failed: totalTests - passedTests
                    },
                    recommendations: passedTests === totalTests ? 
                        ['טיפול בשגיאות תקין', 'המערכת יציבה'] : 
                        ['שפר טיפול בשגיאות', 'הוסף ולידציה']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת טיפול בשגיאות: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת ביצועי API
        async function testPerformance() {
            addLog('info', 'בודק ביצועי API...');
            
            try {
                const performanceTests = [
                    { name: 'Health Check', url: '/api/v1/health' },
                    { name: 'Tickers List', url: '/api/v1/tickers' },
                    { name: 'Accounts List', url: '/api/v1/accounts' }
                ];
                
                const results = [];
                
                for (const test of performanceTests) {
                    const times = [];
                    
                    // 5 בדיקות לכל endpoint
                    for (let i = 0; i < 5; i++) {
                        const startTime = performance.now();
                        const response = await fetch(test.url);
                        const endTime = performance.now();
                        
                        times.push(endTime - startTime);
                        
                        // עיכוב קצר בין בדיקות
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    
                    const avgTime = times.reduce((a, b) => a + b, 0) / times.length;
                    const minTime = Math.min(...times);
                    const maxTime = Math.max(...times);
                    
                    results.push({
                        endpoint: test.name,
                        url: test.url,
                        averageTime: avgTime,
                        minTime: minTime,
                        maxTime: maxTime,
                        times: times,
                        performance: avgTime < 100 ? 'excellent' : 
                                   avgTime < 300 ? 'good' : 
                                   avgTime < 500 ? 'acceptable' : 'poor'
                    });
                }
                
                const excellentCount = results.filter(r => r.performance === 'excellent').length;
                const goodCount = results.filter(r => r.performance === 'good').length;
                const acceptableCount = results.filter(r => r.performance === 'acceptable').length;
                const poorCount = results.filter(r => r.performance === 'poor').length;
                
                const overallPerformance = poorCount > 0 ? 'poor' : 
                                         acceptableCount > 0 ? 'acceptable' : 
                                         goodCount > 0 ? 'good' : 'excellent';
                
                const status = overallPerformance === 'excellent' || overallPerformance === 'good' ? 'success' : 'warning';
                const message = `ביצועי API: ${overallPerformance}`;
                
                addLog(status, message);
                displayResults('בדיקת ביצועי API', {
                    status: status,
                    message: message,
                    results: results,
                    summary: {
                        excellent: excellentCount,
                        good: goodCount,
                        acceptable: acceptableCount,
                        poor: poorCount,
                        overall: overallPerformance
                    },
                    recommendations: overallPerformance === 'excellent' ? 
                        ['ביצועים מעולים', 'שמור על המצב הנוכחי'] : 
                        ['שקול אופטימיזציה', 'בדוק bottlenecks']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת ביצועים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת בקשות מקבילות
        async function testConcurrentRequests() {
            addLog('info', 'בודק בקשות מקבילות...');
            
            try {
                const concurrentCount = 5;
                const startTime = performance.now();
                
                // שליחת בקשות מקבילות
                const promises = [];
                for (let i = 0; i < concurrentCount; i++) {
                    promises.push(
                        fetch('/api/v1/health').then(async response => {
                            const data = await response.json();
                            return {
                                request: i + 1,
                                status: response.status,
                                data: data,
                                timestamp: new Date().toISOString()
                            };
                        })
                    );
                }
                
                const results = await Promise.all(promises);
                const endTime = performance.now();
                const totalTime = endTime - startTime;
                
                const successfulRequests = results.filter(r => r.status === 200).length;
                const failedRequests = results.filter(r => r.status !== 200).length;
                
                const isConcurrent = totalTime < (concurrentCount * 100); // פחות מ-100ms לכל בקשה
                const status = isConcurrent ? 'success' : 'warning';
                const message = isConcurrent ? 
                    'בקשות מקבילות נתמכות' : 'בקשות מקבילות איטיות';
                
                addLog(status, message);
                displayResults('בדיקת בקשות מקבילות', {
                    status: status,
                    message: message,
                    summary: {
                        concurrentRequests: concurrentCount,
                        successful: successfulRequests,
                        failed: failedRequests,
                        totalTime: `${totalTime.toFixed(2)}ms`,
                        averageTime: `${(totalTime / concurrentCount).toFixed(2)}ms`,
                        concurrent: isConcurrent
                    },
                    results: results,
                    recommendations: isConcurrent ? 
                        ['בקשות מקבילות נתמכות', 'המערכת יעילה'] : 
                        ['שקול אופטימיזציה', 'בדוק bottlenecks']
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת בקשות מקבילות: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת בקשה מותאמת
        async function testCustomRequest() {
            const request = document.getElementById('custom-request').value.trim();
            if (!request) {
                addLog('warning', 'נא להזין URL או נתונים');
                return;
            }
            
            addLog('info', `מריץ בקשה מותאמת: ${request}`);
            
            try {
                let url, method, body;
                
                // בדיקה אם זה URL או נתונים
                if (request.startsWith('/') || request.startsWith('http')) {
                    url = request;
                    method = 'GET';
                } else {
                    // נסה לפרסר כנתונים
                    try {
                        const parsed = JSON.parse(request);
                        url = parsed.url || '/api/v1/health';
                        method = parsed.method || 'GET';
                        body = parsed.body;
                    } catch {
                        url = request;
                        method = 'GET';
                    }
                }
                
                const startTime = performance.now();
                const options = {
                    method: method
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                    options.headers = {
                        'Content-Type': 'application/json'
                    };
                }
                
                const response = await fetch(url, options);
                const endTime = performance.now();
                const responseTime = endTime - startTime;
                
                const data = await response.json();
                
                const status = response.ok ? 'success' : 'warning';
                const message = response.ok ? 
                    'בקשה מותאמת הצליחה' : 'בקשה מותאמת נכשלה';
                
                addLog(status, message);
                displayResults('בדיקת בקשה מותאמת', {
                    status: status,
                    message: message,
                    request: {
                        url: url,
                        method: method,
                        body: body
                    },
                    response: {
                        status: response.status,
                        statusText: response.statusText,
                        responseTime: `${responseTime.toFixed(2)}ms`,
                        data: data
                    }
                });
                
            } catch (error) {
                addLog('error', `שגיאה בביצוע בקשה מותאמת: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לתצוגת תוצאות
        function displayResults(title, data) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            const resultHtml = `
                <div class="alert alert-info mb-2">
                    <h6>${title}</h6>
                    <pre class="mb-0"><code>${JSON.stringify(data, null, 2)}</code></pre>
                </div>
            `;
            
            resultsContainer.innerHTML = resultHtml;
        }

        // פונקציה להוספת לוג
        function addLog(level, message) {
            const logContainer = document.getElementById('test-logs');
            if (!logContainer) return;
            
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const levelClass = level === 'error' ? 'text-danger' : 
                              level === 'warning' ? 'text-warning' : 
                              level === 'success' ? 'text-success' : 'text-info';
            
            const logHtml = `
                <div class="log-entry mb-1">
                    <small class="text-muted">[${timestamp}]</small>
                    <span class="${levelClass}">[${level.toUpperCase()}]</span>
                    <span>${message}</span>
                </div>
            `;
            
            logContainer.innerHTML = logHtml + logContainer.innerHTML;
            logContainer.scrollTop = 0;
        }

        // פונקציה לניקוי לוגים
        function clearTestLogs() {
            const logContainer = document.getElementById('test-logs');
            const resultsContainer = document.getElementById('test-results');
            
            if (logContainer) logContainer.innerHTML = '';
            if (resultsContainer) resultsContainer.innerHTML = '';
            
            addLog('info', 'לוגים נוקו');
        }

        // אתחול event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // הוספת event listeners לכפתורים
            document.getElementById('test-endpoint')?.addEventListener('click', testEndpoint);
            document.getElementById('test-post-request')?.addEventListener('click', testPostRequest);
            document.getElementById('test-authentication')?.addEventListener('click', testAuthentication);
            document.getElementById('test-rate-limiting')?.addEventListener('click', testRateLimiting);
            document.getElementById('test-error-handling')?.addEventListener('click', testErrorHandling);
            document.getElementById('test-performance')?.addEventListener('click', testPerformance);
            document.getElementById('test-concurrent-requests')?.addEventListener('click', testConcurrentRequests);
            document.getElementById('test-custom-request')?.addEventListener('click', testCustomRequest);

            // הוספת event listener למקש Enter בשדה הבקשה המותאמת
            document.getElementById('custom-request')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    testCustomRequest();
                }
            });

            // הוספת הודעה ראשונית
            addLog('info', 'דף בדיקת API נטען בהצלחה');
            
            // בדיקה אוטומטית של endpoint בסיסי
            setTimeout(() => {
                testEndpoint();
            }, 1000);
        });
    </script>
</body>
