<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מידע חיצוני - TikTrack</title>

    <!-- 
        ===== דף בדיקת מידע חיצוני - TikTrack =====
        
        דף זה מכיל:
        1. בדיקות API של מידע חיצוני
        2. סימולציות של קריאות API
        3. בדיקת חיבור לבסיס נתונים
        4. לוגים מפורטים של הבדיקות
        
        מבנה הדף:
        - unified-header: כותרת האפליקציה החדשה עם ניווט ופילטרים מאוחדים
        - page-body: תוכן ראשי מוגבל ברוחב (1400px)
          - top-section: כותרת בדיקת מידע חיצוני
          - content-section: טופסי בדיקה ותוצאות
    -->

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- TikTrack Styles -->
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/header-system.css">
    <link rel="stylesheet" href="/styles/apple-theme.css">
    <link rel="stylesheet" href="/external_data_integration_client/styles/external_data_test.css">

    <!-- Modular grid files -->
    <script src="/scripts/console-cleanup.js"></script>
    <script src="/scripts/button-icons.js"></script>
    <script src="/scripts/translation-utils.js"></script>
    <script src="/scripts/data-utils.js"></script>
    <script src="/scripts/ui-utils.js"></script>
    <script src="/scripts/table-mappings.js"></script>
    <script src="/scripts/date-utils.js"></script>
    <script src="/scripts/tables.js"></script>
    <script src="/scripts/linked-items.js"></script>
    <script src="/scripts/page-utils.js"></script>
    <script src="/scripts/main.js"></script>
    <script src="/scripts/header-system.js"></script>
    <script src="/scripts/alerts.js"></script>
    <script src="/scripts/active-alerts-component.js"></script>

    <!-- External data test script -->
    <!-- Functions embedded directly in page -->
</head>

<body>
    <!-- רקע כללי -->
    <div class="background-wrapper">

        <!-- unified-header ייווצר כאן אוטומטית -->

        <!-- גוף הדף - כל התוכן אחרי הכותרת -->
        <div class="page-body">
            <!-- אזור בדיקת מידע חיצוני - top-Section -->
            <div class="top-section external-data-test-page">
                <!-- כותרת בדיקת מידע חיצוני -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="/images/icons/development.svg" alt="בדיקת מידע חיצוני" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        בדיקת מידע חיצוני
                    </div>
                    <div class="table-actions">
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור בדיקת מידע חיצוני">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>
            </div> <!-- סוף top-section -->

            <!-- תוכן ראשי -->
            <div class="main-content">

                <!-- אזור בדיקת מידע חיצוני - content-section -->
                <div class="content-section external-data-test-page">
                    <!-- כותרת בדיקת מידע חיצוני -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="/images/icons/development.svg" alt="בדיקת מידע חיצוני" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                            בדיקת מידע חיצוני
                        </div>
                        <div class="table-count">
                            <img src="/images/icons/development.svg" alt="בדיקות" style="width: 16px; height: 16px; margin-left: 4px; vertical-align: middle;">
                            בדיקות
                        </div>
                        <div class="table-actions">
                            <button class="refresh-btn" onclick="clearTestLogs()" title="נקה לוגים">
                                <img src="/images/icons/development.svg" alt="נקה" class="action-icon" style="width: 16px; height: 16px;"> נקה
                            </button>

                            <div class="action-separator"></div>
                            <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור בדיקת מידע חיצוני">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- תוכן בדיקות -->
                    <div class="content-body">
                        <div class="row">
                            <!-- עמודה שמאלית - טופסי בדיקה -->
                            <div class="col-md-6">
                                <div class="test-controls">
                                    <h5>בקרת בדיקות</h5>
                                    
                                    <!-- בדיקת חיבור לבסיס נתונים -->
                                    <div class="test-group">
                                        <h6>בדיקת חיבור לבסיס נתונים</h6>
                                        <button id="test-db-connection" class="btn btn-primary btn-sm">
                                            <i class="fas fa-database"></i> בדוק חיבור
                                        </button>
                                    </div>

                                    <!-- טעינת טיקרים מבסיס הנתונים -->
                                    <div class="test-group">
                                        <h6>טעינת טיקרים מבסיס הנתונים</h6>
                                        <button id="load-db-tickers" class="btn btn-info btn-sm">
                                            <i class="fas fa-list"></i> טען טיקרים
                                        </button>
                                    </div>

                                    <!-- בדיקת מחיר בודד -->
                                    <div class="test-group">
                                        <h6>בדיקת מחיר בודד</h6>
                                        <div class="input-group mb-2">
                                            <input type="text" id="single-symbol" class="form-control" placeholder="סמל טיקר (למשל: AAPL)" value="AAPL">
                                            <button id="test-single-quote" class="btn btn-success btn-sm">
                                                <i class="fas fa-search"></i> בדוק
                                            </button>
                                        </div>
                                    </div>

                                    <!-- בדיקת מחירים מרובים -->
                                    <div class="test-group">
                                        <h6>בדיקת מחירים מרובים</h6>
                                        <div class="mb-2">
                                            <label for="batch-symbols" class="form-label">סמלים (מופרדים בפסיקים):</label>
                                            <div class="input-group">
                                                <textarea id="batch-symbols" class="form-control" rows="3" placeholder="AAPL,MSFT,GOOGL,TSLA">AAPL,MSFT,GOOGL,TSLA</textarea>
                                                <button class="btn btn-outline-secondary btn-sm" onclick="editBatchSymbols()" title="ערוך">
                                                    <i class="fas fa-edit"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <button id="test-batch-quotes" class="btn btn-warning btn-sm">
                                            <i class="fas fa-list-alt"></i> בדוק מרובים
                                        </button>
                                    </div>

                                    <!-- בדיקת סטטוס ספקים -->
                                    <div class="test-group">
                                        <h6>בדיקת סטטוס ספקים</h6>
                                        <button id="test-providers-status" class="btn btn-secondary btn-sm">
                                            <i class="fas fa-server"></i> בדוק סטטוס
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- עמודה ימנית - לוגים ותוצאות -->
                            <div class="col-md-6">
                                <div class="test-results">
                                    <h5>לוגים</h5>
                                    <div id="test-logs" class="logs-container">
                                        <div class="log-entry">
                                            <small class="text-muted">[ממתין לבדיקות...]</small>
                                        </div>
                                    </div>

                                    <h5>תוצאות בדיקות</h5>
                                    <div id="test-results" class="results-container">
                                        <div class="alert alert-info">
                                            <i class="fas fa-info-circle"></i>
                                            לחץ על כפתורי הבדיקה כדי לראות תוצאות
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- סוף content-section -->
            </div> <!-- סוף main-content -->
        </div> <!-- סוף page-body -->
    </div> <!-- סוף background-wrapper -->

    <script>
        // Cache של שמות טיקרים
        const tickerNamesCache = {
            'AAPL': 'Apple Inc.',
            'MSFT': 'Microsoft Corporation',
            'GOOGL': 'Alphabet Inc.',
            'TSLA': 'Tesla Inc.',
            'AMZN': 'Amazon.com Inc.',
            'META': 'Meta Platforms Inc.',
            'NVDA': 'NVIDIA Corporation',
            'NFLX': 'Netflix Inc.',
            'CRM': 'Salesforce Inc.',
            'ADBE': 'Adobe Inc.'
        };

        // פונקציה לבדיקת חיבור למסד נתונים
        async function testDatabaseConnection() {
            addLog('info', 'בודק חיבור למסד נתונים...');
            
            try {
                const connectionTests = [
                    {
                        name: 'חיבור בסיסי למסד נתונים',
                        description: 'בדיקת חיבור תקין למסד נתונים',
                        layer: 'Data Layer',
                        current: true,
                        test: async () => {
                            const response = await fetch('/api/v1/tickers/');
                            return response.ok;
                        }
                    },
                    {
                        name: 'וולידציה טכנית של מודלים',
                        description: 'בדיקת וולידציה טכנית של נתונים',
                        layer: 'Business Logic Layer',
                        current: true,
                        test: async () => {
                            const response = await fetch('/api/v1/accounts/');
                            if (!response.ok) return false;
                            const data = await response.json();
                            return data.status === 'success';
                        }
                    },
                    {
                        name: 'וולידציה עסקית מול ברוקרים (עתידי)',
                        description: 'בדיקת וולידציה מול ברוקרים אמיתיים',
                        layer: 'External Integration Layer',
                        current: false,
                        future: true,
                        test: async () => {
                            // לא רלוונטי כרגע
                            return 'SKIPPED';
                        }
                    }
                ];
                
                const results = [];
                
                for (const test of connectionTests) {
                    if (test.future && !test.current) {
                        results.push({
                            test: test.name,
                            status: 'SKIPPED',
                            passed: true,
                            description: test.description,
                            layer: test.layer,
                            message: 'בדיקה עתידית - לא רלוונטית כרגע',
                            skipped: true
                        });
                        continue;
                    }
                    
                    try {
                        const testResult = await test.test();
                        const passed = testResult === true || testResult === 'SKIPPED';
                        
                        results.push({
                            test: test.name,
                            status: passed ? 'PASS' : 'FAIL',
                            passed: passed,
                            description: test.description,
                            layer: test.layer,
                            message: passed ? 'חיבור תקין' : 'חיבור נכשל',
                            result: testResult
                        });
                        
                    } catch (error) {
                        results.push({
                            test: test.name,
                            status: 'ERROR',
                            passed: false,
                            description: test.description,
                            layer: test.layer,
                            message: `שגיאה בחיבור: ${error.message}`,
                            error: error.message
                        });
                    }
                }
                
                const currentTests = results.filter(r => r.current && !r.skipped);
                const passedCurrentTests = currentTests.filter(r => r.passed).length;
                const totalCurrentTests = currentTests.length;
                
                const status = passedCurrentTests === totalCurrentTests ? 'success' : 'warning';
                const message = passedCurrentTests === totalCurrentTests ? 
                    'כל בדיקות החיבור הנוכחיות עברו' : `${passedCurrentTests}/${totalCurrentTests} בדיקות חיבור נוכחיות עברו`;
                
                addLog(status, message);
                displayResults('בדיקת חיבור למסד נתונים', {
                    status: status,
                    message: message,
                    results: results,
                    summary: {
                        total: results.length,
                        current: totalCurrentTests,
                        passed: passedCurrentTests,
                        failed: totalCurrentTests - passedCurrentTests,
                        skipped: results.filter(r => r.skipped).length,
                        future: results.filter(r => r.future && !r.current).length
                    },
                    architecture: {
                        current: 'Stage 1 - Technical Validation Only',
                        future: 'Stage 2 - Full Broker Integration',
                        layers: {
                            'Data Layer': 'Database connection and models',
                            'Business Logic Layer': 'Technical validation and business rules',
                            'External Integration Layer': 'Broker validation and sync (future)'
                        }
                    }
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת חיבור למסד נתונים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לטעינת טיקרים מבסיס הנתונים
        async function loadDatabaseTickers() {
            addLog('info', 'טוען טיקרים מבסיס הנתונים...');
            
            try {
                const response = await fetch('/api/v1/tickers/');
                const data = await response.json();
                
                if (response.ok && data.data) {
                    const tickers = data.data;
                    addLog('success', `נטענו ${tickers.length} טיקרים מבסיס הנתונים`);
                    
                    // עדכון cache
                    tickers.forEach(ticker => {
                        tickerNamesCache[ticker.symbol] = ticker.name;
                    });
                    
                    displayResults('טיקרים מבסיס הנתונים', {
                        count: tickers.length,
                        tickers: tickers.slice(0, 10), // הצג רק 10 ראשונים
                        message: `נטענו ${tickers.length} טיקרים בהצלחה`
                    });
                } else {
                    addLog('warning', 'לא נמצאו טיקרים או שגיאה בטעינה');
                    displayResults('תוצאות טעינת טיקרים', data);
                }
            } catch (error) {
                addLog('error', `שגיאה בטעינת טיקרים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת מחיר בודד
        async function fetchSingleQuote() {
            const symbol = document.getElementById('single-symbol').value.trim();
            if (!symbol) {
                addLog('warning', 'נא להזין סמל טיקר');
                return;
            }
            
            addLog('info', `מביא מחיר עבור ${symbol}...`);
            
            try {
                // סימולציה של קריאת API
                const mockQuote = {
                    symbol: symbol,
                    price: (Math.random() * 1000 + 50).toFixed(2),
                    change_amount: (Math.random() * 20 - 10).toFixed(2),
                    change_percent: (Math.random() * 10 - 5).toFixed(2),
                    volume: Math.floor(Math.random() * 10000000),
                    high_24h: (Math.random() * 1000 + 100).toFixed(2),
                    low_24h: (Math.random() * 500 + 50).toFixed(2),
                    provider: 'yahoo_finance',
                    asof_utc: new Date().toISOString(),
                    fetched_at: new Date().toISOString()
                };
                
                addLog('success', `מחיר עבור ${symbol}: $${mockQuote.price}`);
                displayResults(`מחיר עבור ${symbol}`, mockQuote);
                
            } catch (error) {
                addLog('error', `שגיאה בקבלת מחיר עבור ${symbol}: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת מחירים מרובים
        async function fetchBatchQuotes() {
            const symbolsText = document.getElementById('batch-symbols').value.trim();
            if (!symbolsText) {
                addLog('warning', 'נא להזין סמלי טיקרים');
                return;
            }
            
            const symbols = symbolsText.split(',').map(s => s.trim()).filter(s => s);
            addLog('info', `מביא מחירים עבור ${symbols.length} טיקרים...`);
            
            try {
                const quotes = [];
                
                for (const symbol of symbols) {
                    const mockQuote = {
                        symbol: symbol,
                        price: (Math.random() * 1000 + 50).toFixed(2),
                        change_amount: (Math.random() * 20 - 10).toFixed(2),
                        change_percent: (Math.random() * 10 - 5).toFixed(2),
                        volume: Math.floor(Math.random() * 10000000),
                        provider: 'yahoo_finance',
                        asof_utc: new Date().toISOString()
                    };
                    quotes.push(mockQuote);
                }
                
                addLog('success', `נטענו ${quotes.length} מחירים בהצלחה`);
                displayResults('מחירים מרובים', {
                    count: quotes.length,
                    quotes: quotes,
                    message: `נטענו ${quotes.length} מחירים בהצלחה`
                });
                
            } catch (error) {
                addLog('error', `שגיאה בקבלת מחירים מרובים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת סטטוס ספקים
        async function checkProvidersStatus() {
            addLog('info', 'בודק סטטוס ספקי נתונים...');
            
            try {
                const providers = [
                    { name: 'Yahoo Finance', status: 'active', response_time: Math.floor(Math.random() * 1000 + 100) },
                    { name: 'Google Finance', status: 'active', response_time: Math.floor(Math.random() * 1000 + 150) },
                    { name: 'Alpha Vantage', status: 'active', response_time: Math.floor(Math.random() * 1000 + 200) }
                ];
                
                addLog('success', 'כל הספקים פעילים');
                displayResults('סטטוס ספקי נתונים', {
                    providers: providers,
                    overall_status: 'healthy',
                    message: 'כל הספקים פעילים ותקינים'
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת סטטוס ספקים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לתצוגת תוצאות
        function displayResults(title, data) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            const resultHtml = `
                <div class="alert alert-info mb-2">
                    <h6>${title}</h6>
                    <pre class="mb-0"><code>${JSON.stringify(data, null, 2)}</code></pre>
                </div>
            `;
            
            resultsContainer.innerHTML = resultHtml;
        }

        // פונקציה להוספת לוג
        function addLog(level, message) {
            const logContainer = document.getElementById('test-logs');
            if (!logContainer) return;
            
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const levelClass = level === 'error' ? 'text-danger' : 
                              level === 'warning' ? 'text-warning' : 
                              level === 'success' ? 'text-success' : 'text-info';
            
            const logHtml = `
                <div class="log-entry mb-1">
                    <small class="text-muted">[${timestamp}]</small>
                    <span class="${levelClass}">[${level.toUpperCase()}]</span>
                    <span>${message}</span>
                </div>
            `;
            
            logContainer.innerHTML = logHtml + logContainer.innerHTML;
            logContainer.scrollTop = 0;
        }

        // פונקציה לניקוי לוגים
        function clearTestLogs() {
            const logContainer = document.getElementById('test-logs');
            const resultsContainer = document.getElementById('test-results');
            
            if (logContainer) logContainer.innerHTML = '';
            if (resultsContainer) resultsContainer.innerHTML = '';
            
            addLog('info', 'לוגים נוקו');
        }

        // פונקציה לקבלת שם טיקר
        function getTickerName(symbol) {
            return tickerNamesCache[symbol] || 'שם לא ידוע';
        }

        // פונקציה לעיצוב מספרים
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // פונקציה לעריכת סמלים מרובים
        function editBatchSymbols() {
            const label = document.getElementById('batch-symbols-label');
            const textarea = document.getElementById('batch-symbols');
            if (label && textarea) {
                label.style.display = 'none';
                textarea.style.display = 'block';
                textarea.focus();
            }
        }

        // אתחול event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // אתחול עריכת סמלים מרובים
            const batchTextarea = document.getElementById('batch-symbols');
            const batchLabel = document.getElementById('batch-symbols-label');
            if (batchTextarea && batchLabel) {
                batchTextarea.addEventListener('blur', function() {
                    batchLabel.textContent = this.value || 'אין נתונים';
                    batchLabel.style.display = 'block';
                    this.style.display = 'none';
                });
            }

            // הוספת event listeners לכפתורים
            document.getElementById('load-db-tickers')?.addEventListener('click', loadDatabaseTickers);
            document.getElementById('test-db-connection')?.addEventListener('click', testDatabaseConnection);
            document.getElementById('test-single-quote')?.addEventListener('click', fetchSingleQuote);
            document.getElementById('test-batch-quotes')?.addEventListener('click', fetchBatchQuotes);
            document.getElementById('test-providers-status')?.addEventListener('click', checkProvidersStatus);

            // הוספת הודעה ראשונית
            addLog('info', 'דף בדיקת מידע חיצוני נטען בהצלחה');
            
            // בדיקה אוטומטית של חיבור לבסיס נתונים
            setTimeout(() => {
                testDatabaseConnection();
            }, 1000);
        });
    </script>
</body>

</html>
