<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מידע חיצוני - TikTrack</title>

    <!-- 
        ===== דף בדיקת מידע חיצוני - TikTrack =====
        
        דף זה מכיל:
        1. בדיקות API של מידע חיצוני
        2. סימולציות של קריאות API
        3. בדיקת חיבור לבסיס נתונים
        4. לוגים מפורטים של הבדיקות
        
        מבנה הדף:
        - unified-header: כותרת האפליקציה החדשה עם ניווט ופילטרים מאוחדים
        - page-body: תוכן ראשי מוגבל ברוחב (1400px)
          - top-section: כותרת בדיקת מידע חיצוני
          - content-section: טופסי בדיקה ותוצאות
    -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- TikTrack Styles -->
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/header-system.css">
    <link rel="stylesheet" href="/styles/apple-theme.css">
    <link rel="stylesheet" href="/external_data_integration_client/styles/external_data_test.css">

    <!-- Modular grid files -->

    <script src="/scripts/translation-utils.js"></script>
    <script src="/scripts/data-utils.js"></script>
    <script src="/scripts/ui-utils.js"></script>
    <script src="/scripts/table-mappings.js"></script>
    <script src="/scripts/date-utils.js"></script>
    <script src="/scripts/tables.js"></script>
    <script src="/scripts/linked-items.js"></script>
    <script src="/scripts/page-utils.js"></script>
    <script src="/scripts/main.js"></script>
    <script src="/scripts/header-system.js"></script>
    <script src="/scripts/alerts.js"></script>
    <script src="/scripts/active-alerts-component.js"></script>

    <!-- External data test script -->
    <!-- Functions embedded directly in page -->
</head>

<body>
    <!-- רקע כללי -->
    <div class="background-wrapper">

        <!-- unified-header ייווצר כאן אוטומטית -->

        <!-- גוף הדף - כל התוכן אחרי הכותרת -->
        <div class="page-body">
            <!-- אזור בדיקת מידע חיצוני - top-Section -->
            <div class="top-section external-data-test-page">
                <!-- כותרת בדיקת מידע חיצוני -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="/images/icons/development.svg" alt="בדיקת מידע חיצוני" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        בדיקת מידע חיצוני
                    </div>
                    <div class="table-actions">
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור בדיקת מידע חיצוני">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>
            </div> <!-- סוף top-section -->

            <!-- תוכן ראשי -->
            <div class="main-content">

                <!-- אזור בדיקת מידע חיצוני - content-section -->
                <div class="content-section external-data-test-page">
                    <!-- כותרת בדיקת מידע חיצוני -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="/images/icons/development.svg" alt="בדיקת מידע חיצוני" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                            בדיקת מידע חיצוני
                        </div>
                        <div class="table-count">
                            <img src="/images/icons/development.svg" alt="בדיקות" style="width: 16px; height: 16px; margin-left: 4px; vertical-align: middle;">
                            בדיקות
                        </div>
                        <div class="table-actions">
                            <button class="refresh-btn" onclick="clearTestLogs()" title="נקה לוגים">
                                <img src="/images/icons/development.svg" alt="נקה" class="action-icon" style="width: 16px; height: 16px;"> נקה
                            </button>

                            <div class="action-separator"></div>
                            <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור בדיקת מידע חיצוני">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- תוכן בדיקות -->
                    <div class="section-body">
                        <!-- Loading Indicator -->
                        <div id="loading-indicator" class="loading-overlay" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">טוען...</span>
                            </div>
                        </div>

                        <!-- Error Display -->
                        <div id="error-display" class="alert alert-danger" style="display: none;">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span id="error-message"></span>
                        </div>

                        <!-- Current Time Display -->
                        <div class="text-muted mb-3">
                            <i class="fas fa-clock me-1"></i>
                            <span id="current-time">טוען זמן...</span>
                        </div>

                        <!-- Two Column Layout -->
                        <div class="row">
                            <!-- Left Column - Tests -->
                            <div class="col-md-6">
                                <h6 class="mb-3"><i class="fas fa-flask me-2"></i>בדיקות</h6>
                                
                                <!-- API Tests -->
                                <div class="row">
                                    <!-- Single Quote Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-chart-line me-1"></i>
                                                    מחיר בודד
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="mb-1">
                                                    <label class="form-label small mb-1">טיקר:</label>
                                                    <select class="form-select form-select-sm" id="db-tickers-select" style="font-size: 10px;">
                                                        <option value="">בחר...</option>
                                                    </select>
                                                </div>
                                                <div class="mb-1">
                                                    <label class="form-label small mb-1">או הזן:</label>
                                                    <input type="text" class="form-control form-control-sm" id="single-symbol" placeholder="AAPL" value="AAPL" style="font-size: 10px;">
                                                </div>
                                                <button class="btn btn-primary btn-sm w-100" id="test-single-quote" style="font-size: 10px; padding: 2px 8px;">
                                                    <i class="fas fa-search me-1"></i>בדוק
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Batch Quotes Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-list me-1"></i>
                                                    מחירים מרובים
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="mb-1">
                                                    <div class="d-flex align-items-center mb-1">
                                                        <label class="form-label small mb-0 me-2">סמלים:</label>
                                                        <button class="btn btn-outline-secondary btn-sm" onclick="editBatchSymbols()" title="ערוך">
                                                            <i class="fas fa-edit" style="font-size: 10px;"></i>
                                                        </button>
                                                    </div>
                                                    <div class="data-label" id="batch-symbols-label" style="font-size: 11px; line-height: 1.2; max-height: 30px; overflow: hidden; background: #f8f9fa; padding: 4px; border-radius: 3px;">AAPL,MSFT,GOOGL</div>
                                                    <textarea class="form-control form-control-sm" id="batch-symbols" rows="2" style="display: none; font-size: 10px;">AAPL,MSFT,GOOGL,TSLA,NVDA</textarea>
                                                </div>
                                                <button class="btn btn-success btn-sm w-100" id="test-batch-quotes" style="font-size: 10px; padding: 2px 8px;">
                                                    <i class="fas fa-list me-1"></i>בדוק
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Database Connection Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-database me-1"></i>
                                                    בסיס נתונים
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-info btn-sm" id="load-db-tickers" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-download me-1"></i>טען טיקרים
                                                    </button>
                                                    <button class="btn btn-outline-warning btn-sm" id="test-db-connection" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-plug me-1"></i>בדוק חיבור
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- API Simulation Test -->
                                    <div class="col-6 mb-2">
                                        <div class="card test-card">
                                            <div class="card-header py-1">
                                                <h6 class="card-title mb-0">
                                                    <i class="fas fa-cogs me-1"></i>
                                                    סימולציה
                                                </h6>
                                            </div>
                                            <div class="card-body py-1">
                                                <div class="d-grid gap-1">
                                                    <button class="btn btn-outline-secondary btn-sm" id="simulate-api-success" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-check me-1"></i>הצלחה
                                                    </button>
                                                    <button class="btn btn-outline-danger btn-sm" id="simulate-api-error" style="font-size: 10px; padding: 2px 8px;">
                                                        <i class="fas fa-times me-1"></i>שגיאה
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Right Column - Feedback -->
                            <div class="col-md-6">
                                <h6 class="mb-3"><i class="fas fa-comments me-2"></i>משוב</h6>
                                
                                <!-- Test Results -->
                                <div class="card result-card mb-3">
                                    <div class="card-header py-2">
                                        <h6 class="card-title mb-0">
                                            <i class="fas fa-chart-bar me-2"></i>
                                            תוצאות בדיקות
                                        </h6>
                                    </div>
                                    <div class="card-body py-2">
                                        <div id="test-results" style="max-height: 200px; overflow-y: auto;">
                                            <!-- תוצאות יוצגו כאן -->
                                        </div>
                                    </div>
                                </div>

                                <!-- Test Logs -->
                                <div class="card log-card">
                                    <div class="card-header py-2">
                                        <h6 class="card-title mb-0">
                                            <i class="fas fa-file-alt me-2"></i>
                                            לוג בדיקות
                                            <button class="btn btn-sm btn-outline-secondary float-start" onclick="clearTestLogs()">
                                                <i class="fas fa-trash me-1"></i>נקה
                                            </button>
                                        </h6>
                                    </div>
                                    <div class="card-body py-2">
                                        <div class="log-container" id="test-logs" style="max-height: 300px; overflow-y: auto;">
                                            <!-- לוגים יוצגו כאן -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- סוף content-section -->
            </div> <!-- סוף main-content -->
        </div> <!-- סוף page-body -->
    </div> <!-- סוף background-wrapper -->

    <!-- JavaScript Files -->
    <script src="/scripts/header-system.js"></script>
    
    <script>
        // אתחול HeaderSystem
        document.addEventListener('DOMContentLoaded', () => {
            if (window.headerSystem && !window.headerSystem.isInitialized) {
                window.headerSystem.init();
            }
        });

        // ===== פונקציות בדיקת מידע חיצוני =====
        
        // משתנים גלובליים
        let externalDataTester = null;
        let tickerNamesCache = {
            'AAPL': 'Apple Inc.',
            'GOOGL': 'Alphabet Inc.',
            'MSFT': 'Microsoft Corporation',
            'TSLA': 'Tesla Inc.',
            'NVDA': 'NVIDIA Corporation',
            'META': 'Meta Platforms Inc.',
            'AMZN': 'Amazon.com Inc.',
            'NFLX': 'Netflix Inc.',
            'SPY': 'SPDR S&P 500 ETF',
            'QQQ': 'Invesco QQQ Trust',
            'IWM': 'iShares Russell 2000 ETF',
            'GLD': 'SPDR Gold Shares',
            'SLV': 'iShares Silver Trust',
            'USO': 'United States Oil Fund',
            'TLT': 'iShares 20+ Year Treasury Bond ETF'
        };

        // פונקציה לטעינת טיקרים מבסיס הנתונים
        async function loadDatabaseTickers() {
            console.log('🔄 Loading database tickers...');
            
            try {
                const response = await fetch('/api/v1/tickers/');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const tickers = await response.json();
                
                // עדכון cache עם שמות טיקרים
                tickers.forEach(ticker => {
                    tickerNamesCache[ticker.symbol] = ticker.name || 'ללא שם';
                });
                
                // עדכון select dropdown
                const select = document.getElementById('db-tickers-select');
                if (select) {
                    select.innerHTML = '<option value="">בחר טיקר...</option>';
                    
                    tickers.forEach(ticker => {
                        const option = document.createElement('option');
                        option.value = ticker.symbol;
                        option.textContent = `${ticker.symbol} - ${ticker.name || 'ללא שם'}`;
                        select.appendChild(option);
                    });
                }

                console.log('✅ Database tickers loaded:', tickers.length);
                addLog('success', `${tickers.length} טיקרים נטענו מבסיס הנתונים`);
                
            } catch (error) {
                console.error('❌ Error loading database tickers:', error);
                addLog('error', `שגיאה בטעינת טיקרים: ${error.message}`);
            }
        }

        // פונקציה לבדיקת חיבור לבסיס הנתונים
        async function testDatabaseConnection() {
            console.log('🔄 Testing database connection...');
            
            try {
                const endpoints = [
                    '/api/v1/tickers/',
                    '/api/v1/accounts/',
                    '/api/v1/trades/'
                ];

                const results = {};
                
                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(endpoint);
                        results[endpoint] = {
                            status: response.status,
                            ok: response.ok,
                            count: 0
                        };
                        
                        if (response.ok) {
                            const data = await response.json();
                            results[endpoint].count = Array.isArray(data) ? data.length : 1;
                        }
                    } catch (error) {
                        results[endpoint] = {
                            status: 'error',
                            ok: false,
                            error: error.message
                        };
                    }
                }

                console.log('✅ Database connection test results:', results);
                addLog('success', 'בדיקת חיבור לבסיס הנתונים הושלמה');
                displayResults('סטטוס חיבור לבסיס הנתונים', results);
                
            } catch (error) {
                console.error('❌ Error testing database connection:', error);
                addLog('error', `שגיאה בבדיקת חיבור: ${error.message}`);
            }
        }

        // פונקציה להבאת מחיר בודד
        async function fetchSingleQuote() {
            const symbol = document.getElementById('single-symbol')?.value.trim();
            if (!symbol) {
                addLog('warning', 'נא להזין סמל לבדיקה');
                return;
            }

            console.log('🔄 Fetching single quote for:', symbol);
            addLog('info', `מביא מחיר עבור ${symbol}`);

            try {
                // סימולציה של קריאת API
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const quote = {
                    symbol: symbol,
                    price: Math.random() * 1000 + 50,
                    change_amount: (Math.random() - 0.5) * 20,
                    change_percent: (Math.random() - 0.5) * 5,
                    volume: Math.floor(Math.random() * 10000000),
                    high_24h: Math.random() * 1000 + 50,
                    low_24h: Math.random() * 1000 + 50,
                    open_price: Math.random() * 1000 + 50,
                    previous_close: Math.random() * 1000 + 50,
                    provider: 'yahoo_finance',
                    asof_utc: new Date().toISOString(),
                    fetched_at: new Date().toISOString()
                };

                displaySingleQuote(quote);
                addLog('success', `מחיר עבור ${symbol} התקבל בהצלחה`);
                
            } catch (error) {
                console.error('❌ Error fetching single quote:', error);
                addLog('error', `שגיאה בקבלת מחיר עבור ${symbol}: ${error.message}`);
            }
        }

        // פונקציה להבאת מחירים מרובים
        async function fetchBatchQuotes() {
            const symbolsText = document.getElementById('batch-symbols')?.value.trim();
            if (!symbolsText) {
                addLog('warning', 'נא להזין סמלים לבדיקה');
                return;
            }

            const symbols = symbolsText.split(',').map(s => s.trim()).filter(s => s);
            console.log('🔄 Fetching batch quotes for:', symbols);
            addLog('info', `מביא מחירים עבור ${symbols.length} סמלים`);

            try {
                const results = [];
                for (const symbol of symbols) {
                    const quote = {
                        symbol: symbol,
                        price: Math.random() * 1000 + 50,
                        change_amount: (Math.random() - 0.5) * 20,
                        change_percent: (Math.random() - 0.5) * 5,
                        volume: Math.floor(Math.random() * 10000000),
                        high_24h: Math.random() * 1000 + 50,
                        low_24h: Math.random() * 1000 + 50,
                        open_price: Math.random() * 1000 + 50,
                        previous_close: Math.random() * 1000 + 50,
                        provider: 'yahoo_finance',
                        asof_utc: new Date().toISOString(),
                        fetched_at: new Date().toISOString()
                    };
                    results.push(quote);
                    
                    // סימולציה של עיכוב בין בקשות
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                displayBatchResults(results);
                addLog('success', `${results.length} מחירים התקבלו בהצלחה`);
                
            } catch (error) {
                console.error('❌ Error fetching batch quotes:', error);
                addLog('error', `שגיאה בקבלת מחירים: ${error.message}`);
            }
        }

        // פונקציה לתצוגת מחיר בודד
        function displaySingleQuote(quote) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            const changeClass = quote.change_percent > 0 ? 'text-success' : 
                               quote.change_percent < 0 ? 'text-danger' : 'text-muted';
            
            const resultHtml = `
                <div class="alert alert-info mb-2">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong>${quote.symbol}</strong> - ${getTickerName(quote.symbol)}
                            <br><small class="text-muted">$${quote.price.toFixed(2)}</small>
                        </div>
                        <div class="text-end">
                            <div class="${changeClass}">
                                ${quote.change_amount > 0 ? '+' : ''}${quote.change_amount.toFixed(2)}
                            </div>
                            <div class="${changeClass}">
                                ${quote.change_percent > 0 ? '+' : ''}${quote.change_percent.toFixed(2)}%
                            </div>
                        </div>
                    </div>
                    <small class="text-muted">
                        נפח: ${formatNumber(quote.volume)} | 
                        גבוה: $${quote.high_24h.toFixed(2)} | 
                        נמוך: $${quote.low_24h.toFixed(2)}
                    </small>
                </div>
            `;
            
            resultsContainer.innerHTML = resultHtml;
        }

        // פונקציה לתצוגת תוצאות מרובות
        function displayBatchResults(quotes) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            let resultsHtml = '';
            quotes.forEach(quote => {
                const changeClass = quote.change_percent > 0 ? 'text-success' : 
                                   quote.change_percent < 0 ? 'text-danger' : 'text-muted';
                
                resultsHtml += `
                    <div class="alert alert-light mb-1">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${quote.symbol}</strong> - ${getTickerName(quote.symbol)}
                            </div>
                            <div class="text-end">
                                <div>$${quote.price.toFixed(2)}</div>
                                <div class="${changeClass}">
                                    ${quote.change_amount > 0 ? '+' : ''}${quote.change_amount.toFixed(2)} 
                                    (${quote.change_percent > 0 ? '+' : ''}${quote.change_percent.toFixed(2)}%)
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            resultsContainer.innerHTML = resultsHtml;
        }

        // פונקציה לתצוגת תוצאות
        function displayResults(title, data) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            const resultHtml = `
                <div class="alert alert-info mb-2">
                    <h6>${title}</h6>
                    <pre class="mb-0"><code>${JSON.stringify(data, null, 2)}</code></pre>
                </div>
            `;
            
            resultsContainer.innerHTML = resultHtml;
        }

        // פונקציה להוספת לוג
        function addLog(level, message) {
            const logContainer = document.getElementById('test-logs');
            if (!logContainer) return;
            
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const levelClass = level === 'error' ? 'text-danger' : 
                              level === 'warning' ? 'text-warning' : 
                              level === 'success' ? 'text-success' : 'text-info';
            
            const logHtml = `
                <div class="log-entry mb-1">
                    <small class="text-muted">[${timestamp}]</small>
                    <span class="${levelClass}">[${level.toUpperCase()}]</span>
                    <span>${message}</span>
                </div>
            `;
            
            logContainer.innerHTML += logHtml;
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // פונקציה לניקוי לוגים
        function clearTestLogs() {
            const logContainer = document.getElementById('test-logs');
            const resultsContainer = document.getElementById('test-results');
            
            if (logContainer) logContainer.innerHTML = '';
            if (resultsContainer) resultsContainer.innerHTML = '';
            
            addLog('info', 'לוגים נוקו');
        }

        // פונקציה לקבלת שם טיקר
        function getTickerName(symbol) {
            return tickerNamesCache[symbol] || 'שם לא ידוע';
        }

        // פונקציה לעיצוב מספרים
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // פונקציה לעריכת סמלים מרובים
        function editBatchSymbols() {
            const label = document.getElementById('batch-symbols-label');
            const textarea = document.getElementById('batch-symbols');
            if (label && textarea) {
                label.style.display = 'none';
                textarea.style.display = 'block';
                textarea.focus();
            }
        }

        // אתחול event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // אתחול עריכת סמלים מרובים
            const batchTextarea = document.getElementById('batch-symbols');
            const batchLabel = document.getElementById('batch-symbols-label');
            if (batchTextarea && batchLabel) {
                batchTextarea.addEventListener('blur', function() {
                    batchLabel.textContent = this.value || 'אין נתונים';
                    batchLabel.style.display = 'block';
                    this.style.display = 'none';
                });
            }

            // הוספת event listeners לכפתורים
            document.getElementById('load-db-tickers')?.addEventListener('click', loadDatabaseTickers);
            document.getElementById('test-db-connection')?.addEventListener('click', testDatabaseConnection);
            document.getElementById('test-single-quote')?.addEventListener('click', fetchSingleQuote);
            document.getElementById('test-batch-quotes')?.addEventListener('click', fetchBatchQuotes);

            // הוספת הודעה ראשונית
            addLog('info', 'דף בדיקת מידע חיצוני נטען בהצלחה');
        });
    </script>
</body>

</html>
