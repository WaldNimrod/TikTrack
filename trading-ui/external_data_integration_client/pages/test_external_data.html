<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <!-- Bootstrap CSS - Must load first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=2fba6e8_20251013_051239" rel="stylesheet" crossorigin="anonymous">
    <!-- ITCSS Architecture - Individual Files (September 2025) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מערכת מידע חיצוני - TikTrack</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css?v=2fba6e8_20251013_051239" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles/external_data_test.css?v=2fba6e8_20251013_051239">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=2fba6e8_20251013_051239">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-chart-line me-2"></i>
                TikTrack - בדיקת מערכת מידע חיצוני
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text">
                    <i class="fas fa-clock me-1"></i>
                    <span id="current-time"></span>
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <!-- Status Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-server fa-2x text-primary mb-2"></i>
                        <h5 class="card-title">סטטוס שרת</h5>
                        <span class="badge bg-success" id="server-status">פעיל</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-database fa-2x text-info mb-2"></i>
                        <h5 class="card-title">בסיס נתונים</h5>
                        <span class="badge bg-success" id="db-status">מחובר</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-wifi fa-2x text-warning mb-2"></i>
                        <h5 class="card-title">Yahoo Finance</h5>
                        <span class="badge bg-success" id="yahoo-status">מחובר</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <i class="fas fa-sync fa-2x text-secondary mb-2"></i>
                        <h5 class="card-title">רענון אחרון</h5>
                        <span class="text-muted" id="last-refresh">לא עודכן</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Test Controls -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-cogs me-2"></i>בקרת בדיקות</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="test-symbol" class="form-label">סמל לבדיקה:</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="test-symbol" placeholder="AAPL" value="AAPL">
                                        <button class="btn btn-primary" type="button" id="fetch-single">
                                            <i class="fas fa-download me-1"></i>קבל מחיר
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">סמלים לבדיקה מרובה:</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="test-symbols" placeholder="AAPL,GOOGL,MSFT,TSLA" value="AAPL,GOOGL,MSFT,TSLA">
                                        <button class="btn btn-info" type="button" id="fetch-batch">
                                            <i class="fas fa-download me-1"></i>קבל מחירים
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">פעולות מערכת:</label>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-success" type="button" id="refresh-all">
                                            <i class="fas fa-sync me-1"></i>רענן כל המחירים
                                        </button>
                                        <button class="btn btn-warning" type="button" id="check-providers">
                                            <i class="fas fa-check me-1"></i>בדוק סטטוס ספקים
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="row">
            <div class="col-md-8">
                <!-- Single Quote Result -->
                <div class="card mb-4" id="single-quote-card" style="display: none;">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-line me-2"></i>תוצאת מחיר בודד</h5>
                    </div>
                    <div class="card-body">
                        <div id="single-quote-content"></div>
                    </div>
                </div>

                <!-- Batch Results -->
                <div class="card mb-4" id="batch-results-card" style="display: none;">
                    <div class="card-header">
                        <h5><i class="fas fa-list me-2"></i>תוצאות בדיקה מרובה</h5>
                    </div>
                    <div class="card-body">
                        <div id="batch-results-content"></div>
                    </div>
                </div>

                <!-- System Status -->
                <div class="card mb-4" id="system-status-card" style="display: none;">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle me-2"></i>סטטוס מערכת</h5>
                    </div>
                    <div class="card-body">
                        <div id="system-status-content"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <!-- Log Panel -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-terminal me-2"></i>יומן פעילות</h5>
                        <button class="btn btn-sm btn-outline-secondary float-start" id="clear-log">
                            <i class="fas fa-trash me-1"></i>נקה
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="log-content" class="log-panel"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">טוען...</span>
                    </div>
                    <p class="mt-2" id="loading-message">מעבד בקשה...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js?v=2fba6e8_20251013_051239"></script>
    
    <!-- Custom JS -->
    <script src="../scripts/external_data_test.js?v=2fba6e8_20251013_051239"></script>
</body>
</html>
