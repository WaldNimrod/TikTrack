    <script>
        // פונקציה לבדיקת מודל העדפות
        async function testPreferencesModel() {
            addLog('info', 'בודק מודל העדפות...');
            
            try {
                const mockPreferences = {
                    user_id: 1,
                    timezone: 'Asia/Jerusalem',
                    primaryCurrency: 'USD',
                    defaultStopLoss: 5,
                    defaultTargetPrice: 10,
                    defaultCommission: 1.0,
                    consoleCleanupInterval: 60000,
                    defaultStatusFilter: 'open',
                    defaultTypeFilter: 'swing',
                    defaultAccountFilter: 'all',
                    defaultDateRangeFilter: 'this_week',
                    defaultSearchFilter: '',
                    dataRefreshInterval: 5,
                    primaryDataProvider: 'yahoo',
                    secondaryDataProvider: 'google',
                    cacheTTL: 5,
                    maxBatchSize: 25,
                    requestDelay: 200,
                    retryAttempts: 2,
                    retryDelay: 5,
                    autoRefresh: true,
                    verboseLogging: false
                };
                
                // ולידציה של המודל
                const validation = validatePreferencesModel(mockPreferences);
                
                if (validation.isValid) {
                    addLog('success', 'מודל העדפות תקין');
                    displayResults('בדיקת מודל העדפות', {
                        status: 'success',
                        message: 'מודל העדפות תקין ומכיל את כל השדות הנדרשים',
                        preferences: mockPreferences,
                        validation: validation
                    });
                } else {
                    addLog('error', 'שגיאה במודל העדפות');
                    displayResults('שגיאה במודל העדפות', {
                        status: 'error',
                        message: 'מודל העדפות מכיל שגיאות',
                        errors: validation.errors
                    });
                }
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת מודל העדפות: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת מודל מחירים

            try {
                const mockQuote = {
                    id: 1,
                    ticker_id: 1,
                    price: 150.25,
                    change_amount: 2.50,
                    change_percent: 1.69,
                    volume: 1500000,
                    high_24h: 152.00,
                    low_24h: 148.50,
                    open_price: 149.75,
                    previous_close: 147.75,
                    provider: 'yahoo_finance',
                    asof_utc: new Date().toISOString(),
                    fetched_at: new Date().toISOString(),
                    last_updated: new Date().toISOString(),
                    created_at: new Date().toISOString()
                };
                
                // ולידציה של המודל
                const validation = validateQuoteModel(mockQuote);
                
                if (validation.isValid) {
                    addLog('success', 'מודל מחירים תקין');

                        message: 'מודל מחירים תקין ומכיל את כל השדות הנדרשים',
                        quote: mockQuote,
                        validation: validation
                    });
                } else {
                    addLog('error', 'שגיאה במודל מחירים');
                    displayResults('שגיאה במודל מחירים', {
                        status: 'error',
                        message: 'מודל מחירים מכיל שגיאות',

            } catch (error) {

        // פונקציה לבדיקת מודל טיקר
        async function testTickerModel() {
            addLog('info', 'בודק מודל טיקר...');
            
            try {
                const mockTicker = {
                    id: 1,
                    symbol: 'AAPL',
                    name: 'Apple Inc.',
                    type: 'stock',
                    remarks: 'American technology company',
                    currency_id: 1,
                    active_trades: true,
                    status: 'open',
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                
                // ולידציה של המודל
                const validation = validateTickerModel(mockTicker);
                
                if (validation.isValid) {
                    addLog('success', 'מודל טיקר תקין');
                    displayResults('בדיקת מודל טיקר', {
                        status: 'success',
                        message: 'מודל טיקר תקין ומכיל את כל השדות הנדרשים',
                        ticker: mockTicker,
                        validation: validation
                    });
                } else {
                    addLog('error', 'שגיאה במודל טיקר');
                    displayResults('שגיאה במודל טיקר', {
                        status: 'error',
                        message: 'מודל טיקר מכיל שגיאות',

                    });

        // פונקציה לבדיקת ולידציה נתונים
        async function testDataValidation() {
            addLog('info', 'בודק ולידציה נתונים...');
            
            try {
                const testCases = [
                    {
                        name: 'מחיר תקין',
                        data: { price: 150.25 },
                        expected: true
                    },
                    {
                        name: 'מחיר שלילי',
                        data: { price: -10 },
                        expected: false
                    },
                    {
                        name: 'אחוז שינוי תקין',
                        data: { change_percent: 5.5 },
                        expected: true
                    },
                    {
                        name: 'אחוז שינוי גבוה מדי',
                        data: { change_percent: 1500 },
                        expected: false
                    },
                    {
                        name: 'נפח תקין',
                        data: { volume: 1000000 },
                        expected: true
                    },
                    {
                        name: 'נפח שלילי',
                        data: { volume: -1000 },
                        expected: false
                    }
                ];
                
                const results = testCases.map(testCase => {
                    const isValid = validateDataField(testCase.data);
                    return {
                        test: testCase.name,
                        data: testCase.data,
                        expected: testCase.expected,
                        actual: isValid,
                        passed: isValid === testCase.expected
                    };
                });
                
                const passedTests = results.filter(r => r.passed).length;
                const totalTests = results.length;
                
                if (passedTests === totalTests) {
                    addLog('success', `כל ${totalTests} בדיקות הוולידציה עברו בהצלחה`);
                } else {
                    addLog('warning', `${passedTests}/${totalTests} בדיקות הוולידציה עברו`);
                }
                
                displayResults('בדיקת ולידציה נתונים', {
                    status: passedTests === totalTests ? 'success' : 'warning',
                    message: `${passedTests}/${totalTests} בדיקות עברו`,
                    results: results,
                    summary: {
                        total: totalTests,
                        passed: passedTests,
                        failed: totalTests - passedTests
                    }
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת ולידציה: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציה לבדיקת וולידציה של מבנה נתונים
        async function testStructureValidation() {
            addLog('info', 'בודק וולידציה של מבנה נתונים...');
            
            try {
                const structureTests = [
                    {
                        name: 'וולידציה טכנית - שדות קיימים',
                        description: 'בדיקה שכל השדות קיימים במודל',
                        layer: 'Business Logic Layer',
                        current: true,
                        test: () => {
                            const allowedFields = {'name', 'currency_id', 'status', 'cash_balance', 'total_value', 'total_pl', 'notes'};
                            const testData = {'name': 'Test', 'currency_id': 1, 'status': 'open'};
                            const invalidFields = Object.keys(testData).filter(field => !allowedFields.has(field));
                            return invalidFields.length === 0;
                        }
                    },
                    {
                        name: 'וולידציה טכנית - אילוצי מסד נתונים',
                        description: 'בדיקה של אילוצי NOT NULL, UNIQUE, FOREIGN KEY',
                        layer: 'Business Logic Layer',
                        current: true,
                        test: () => {
                            // סימולציה של בדיקת אילוצים
                            return true; // תמיד עובר כרגע
                        }
                    },
                    {
                        name: 'וולידציה עסקית - חוקי מסחר (עתידי)',
                        description: 'בדיקה של חוקי מסחר וברוקרים',
                        layer: 'External Integration Layer',
                        current: false,
                        future: true,
                        test: () => {
                            // לא רלוונטי כרגע
                            return 'SKIPPED';
                        }
                    },
                    {
                        name: 'וולידציה עסקית - סנכרון עם ברוקר (עתידי)',
                        description: 'בדיקה של סנכרון עם חשבונות אמיתיים',
                        layer: 'External Integration Layer',
                        current: false,
                        future: true,
                        test: () => {
                            // לא רלוונטי כרגע
                            return 'SKIPPED';
                        }
                    }
                ];
                
                const results = [];
                
                for (const test of structureTests) {
                    if (test.future && !test.current) {
                        results.push({
                            test: test.name,
                            status: 'SKIPPED',
                            passed: true,
                            description: test.description,
                            layer: test.layer,
                            message: 'בדיקה עתידית - לא רלוונטית כרגע',
                            skipped: true
                        });
                        continue;
                    }
                    
                    try {
                        const testResult = test.test();
                        const passed = testResult === true || testResult === 'SKIPPED';
                        
                        results.push({
                            test: test.name,
                            status: passed ? 'PASS' : 'FAIL',
                            passed: passed,
                            description: test.description,
                            layer: test.layer,
                            message: passed ? 'בדיקה עברה בהצלחה' : 'בדיקה נכשלה',
                            result: testResult
                        });
                        
                    } catch (error) {
                        results.push({
                            test: test.name,
                            status: 'ERROR',
                            passed: false,
                            description: test.description,
                            layer: test.layer,
                            message: `שגיאה בבדיקה: ${error.message}`,
                            error: error.message
                        });
                    }
                }
                
                const currentTests = results.filter(r => r.current && !r.skipped);
                const passedCurrentTests = currentTests.filter(r => r.passed).length;
                const totalCurrentTests = currentTests.length;
                
                const status = passedCurrentTests === totalCurrentTests ? 'success' : 'warning';
                const message = passedCurrentTests === totalCurrentTests ? 
                    'כל בדיקות המבנה הנוכחיות עברו' : `${passedCurrentTests}/${totalCurrentTests} בדיקות מבנה נוכחיות עברו`;
                
                addLog(status, message);
                displayResults('בדיקת וולידציה של מבנה נתונים', {
                    status: status,
                    message: message,
                    results: results,
                    summary: {
                        total: results.length,
                        current: totalCurrentTests,
                        passed: passedCurrentTests,
                        failed: totalCurrentTests - passedCurrentTests,
                        skipped: results.filter(r => r.skipped).length,
                        future: results.filter(r => r.future && !r.current).length
                    },
                    architecture: {
                        current: 'Stage 1 - Technical Validation Only',
                        future: 'Stage 2 - Full Broker Integration',
                        layers: {
                            'Business Logic Layer': 'Technical validation and database constraints',
                            'External Integration Layer': 'Business rules and broker validation (future)'
                        }
                    }
                });
                
            } catch (error) {
                addLog('error', `שגיאה בבדיקת מבנה נתונים: ${error.message}`);
                displayResults('שגיאה', { error: error.message });
            }
        }

        // פונקציות ולידציה עזר
        function validatePreferencesModel(preferences) {
            const requiredFields = [
                'user_id', 'timezone', 'primaryCurrency', 'dataRefreshInterval',
                'primaryDataProvider', 'cacheTTL', 'maxBatchSize'
            ];
            
            const errors = [];
            
            requiredFields.forEach(field => {
                if (!preferences.hasOwnProperty(field)) {
                    errors.push(`שדה חסר: ${field}`);
                }
            });
            
            if (preferences.dataRefreshInterval < 1 || preferences.dataRefreshInterval > 60) {
                errors.push('מרווח רענון נתונים חייב להיות בין 1 ל-60 דקות');
            }
            
            if (preferences.maxBatchSize < 1 || preferences.maxBatchSize > 100) {
                errors.push('גודל batch מקסימלי חייב להיות בין 1 ל-100');
            }
            
            return {
                isValid: errors.length === 0,
                errors: errors
            };
        }

        function validateQuoteModel(quote) {
            const requiredFields = [
                'ticker_id', 'price', 'provider', 'asof_utc', 'fetched_at'
            ];
            
            const errors = [];
            
            requiredFields.forEach(field => {
                if (!quote.hasOwnProperty(field)) {
                    errors.push(`שדה חסר: ${field}`);
                }
            });
            
            if (quote.price <= 0) {
                errors.push('מחיר חייב להיות חיובי');
            }
            
            if (quote.volume && quote.volume < 0) {
                errors.push('נפח חייב להיות חיובי');
            }
            
            return {
                isValid: errors.length === 0,
                errors: errors
            };
        }

        function validateTickerModel(ticker) {
            const requiredFields = [
                'symbol', 'name', 'type', 'status', 'currency_id'
            ];
            
            const errors = [];
            
            requiredFields.forEach(field => {
                if (!ticker.hasOwnProperty(field)) {
                    errors.push(`שדה חסר: ${field}`);
                }
            });
            
            if (ticker.symbol && ticker.symbol.length > 10) {
                errors.push('סמל טיקר לא יכול להיות ארוך מ-10 תווים');
            }
            
            if (ticker.name && ticker.name.length > 100) {
                errors.push('שם טיקר לא יכול להיות ארוך מ-100 תווים');
            }
            
            const validTypes = ['stock', 'etf', 'crypto', 'forex', 'commodity'];
            if (ticker.type && !validTypes.includes(ticker.type)) {
                errors.push(`סוג טיקר חייב להיות אחד מ: ${validTypes.join(', ')}`);
            }
            
            const validStatuses = ['open', 'closed', 'cancelled'];
            if (ticker.status && !validStatuses.includes(ticker.status)) {
                errors.push(`סטטוס טיקר חייב להיות אחד מ: ${validStatuses.join(', ')}`);
            }
            
            return {
                isValid: errors.length === 0,
                errors: errors
            };
        }

        function validateDataField(data) {
            // בדיקת מחיר
            if (data.price !== undefined) {
                if (data.price <= 0) {
                    return false;
                }
            }
            
            // בדיקת אחוז שינוי
            if (data.change_percent !== undefined) {
                if (data.change_percent < -100 || data.change_percent > 1000) {
                    return false;
                }
            }
            
            // בדיקת נפח
            if (data.volume !== undefined) {
                if (data.volume < 0) {
                    return false;
                }
            }
            
            return true;
        }

        function validateStructure(structure) {
            // בדיקת מבנה קבועה - תמיד תחזיר true
            return true;
        }

        // פונקציה לתצוגת תוצאות
        function displayResults(title, data) {
            const resultsContainer = document.getElementById('test-results');
            if (!resultsContainer) return;
            
            const resultHtml = `
                <div class="alert alert-info mb-2">
                    <h6>${title}</h6>
                    <pre class="mb-0"><code>${JSON.stringify(data, null, 2)}</code></pre>
                </div>
            `;
            
            resultsContainer.innerHTML = resultHtml;
        }

        // פונקציה להוספת לוג
        function addLog(level, message) {
            const logContainer = document.getElementById('test-logs');
            if (!logContainer) return;
            
            const timestamp = new Date().toLocaleTimeString('he-IL');
            const levelClass = level === 'error' ? 'text-danger' : 
                              level === 'warning' ? 'text-warning' : 
                              level === 'success' ? 'text-success' : 'text-info';
            
            const logHtml = `
                <div class="log-entry mb-1">
                    <small class="text-muted">[${timestamp}]</small>
                    <span class="${levelClass}">[${level.toUpperCase()}]</span>
                    <span>${message}</span>
                </div>
            `;
            
            logContainer.innerHTML = logHtml + logContainer.innerHTML;
            logContainer.scrollTop = 0;
        }

        // פונקציה לניקוי לוגים
        function clearTestLogs() {
            const logContainer = document.getElementById('test-logs');
            const resultsContainer = document.getElementById('test-results');
            
            if (logContainer) logContainer.innerHTML = '';
            if (resultsContainer) resultsContainer.innerHTML = '';
            
            addLog('info', 'לוגים נוקו');
        }

        // אתחול event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // הוספת event listeners לכפתורים
            document.getElementById('test-preferences-model')?.addEventListener('click', testPreferencesModel);
            document.getElementById('test-quote-model')?.addEventListener('click', testQuoteModel);
            document.getElementById('test-ticker-model')?.addEventListener('click', testTickerModel);
            document.getElementById('test-data-validation')?.addEventListener('click', testDataValidation);
            document.getElementById('test-structure-validation')?.addEventListener('click', testStructureValidation);

            // הוספת הודעה ראשונית
            addLog('info', 'דף בדיקת מודלים נטען בהצלחה');
            
            // בדיקה אוטומטית של מודל העדפות
            setTimeout(() => {
                testPreferencesModel();
            }, 1000);
        });
    </script>
