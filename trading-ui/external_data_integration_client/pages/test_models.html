<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מודלים - TikTrack</title>

    <!-- 
        ===== דף בדיקת מודלים - TikTrack =====
        
        דף זה מכיל:
        1. בדיקות מודלים של מידע חיצוני
        2. ולידציה של מבני נתונים
        3. סימולציות של מודלים
        4. לוגים מפורטים של הבדיקות
        
        מבנה הדף:
        - unified-header: כותרת האפליקציה החדשה עם ניווט ופילטרים מאוחדים
        - page-body: תוכן ראשי מוגבל ברוחב (1400px)
          - top-section: כרטיסיות התראות וסיכום נתונים
          - content-section: טופסי בדיקה ותוצאות
    -->

    <!-- CSS Files - Ordered by priority (weak to strong) -->
    <!-- 1. Apple theme (base) -->
    <link rel="stylesheet" href="/styles/apple-theme.css">

    <!-- 2. Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 3. General styles -->
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/header-system.css">

    <!-- 4. Typography -->
    <link rel="stylesheet" href="/styles/typography.css">

    <!-- 5. Table styles -->
    <link rel="stylesheet" href="/styles/table.css">

    <!-- 6. External data test styles (page specific) -->
    <link rel="stylesheet" href="/external_data_integration_client/styles/external_data_test.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modular grid files -->
    <script src="/scripts/console-cleanup.js"></script>
    <script src="/scripts/translation-utils.js"></script>
    <script src="/scripts/data-utils.js"></script>
    <script src="/scripts/ui-utils.js"></script>
    <script src="/scripts/table-mappings.js"></script>
    <script src="/scripts/date-utils.js"></script>
    <script src="/scripts/tables.js"></script>
    <script src="/scripts/linked-items.js"></script>
    <script src="/scripts/page-utils.js"></script>
    <script src="/scripts/main.js"></script>
    <script src="/scripts/header-system.js"></script>
    <script src="/scripts/alerts.js"></script>
    <script src="/scripts/active-alerts-component.js"></script>

    <!-- Models test script -->
    <script src="/external_data_integration_client/scripts/models_test.js"></script>
</head>

<body>
    <!-- רקע כללי -->
    <div class="background-wrapper">

        <!-- unified-header ייווצר כאן אוטומטית -->

        <!-- גוף הדף - כל התוכן אחרי הכותרת -->
        <div class="page-body">
            <!-- אזור בדיקת מודלים - top-Section -->
            <div class="top-section models-test-page">
                <!-- כותרת בדיקת מודלים -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="/images/icons/research.svg" alt="בדיקת מודלים" style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
                        בדיקת מודלים
                    </div>
                    <div class="table-actions">
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור בדיקת מודלים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- כרטיסיות התראות -->
                <div class="section-body">
                    <!-- ווב קומפוננט של התראות פעילות -->
                    <active-alerts></active-alerts>

                    <!-- סיכום נתונים -->
                    <div class="info-summary" id="summaryStats">
                        <div>בדיקות מודלים: <strong id="modelTests">0</strong></div>
                        <div>בדיקות ולידציה: <strong id="validationTests">0</strong></div>
                        <div>בדיקות מבנה: <strong id="structureTests">0</strong></div>
                        <div>זמן תגובה ממוצע: <strong id="avgResponseTime">0ms</strong></div>
                    </div>
                </div>
            </div> <!-- סוף top-section -->

            <!-- תוכן ראשי -->
            <div class="main-content">

                <!-- אזור בדיקת מודלים - content-section -->
                <div class="content-section models-test-page">
                    <!-- כותרת בדיקת מודלים -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="/images/icons/research.svg" alt="בדיקות מודלים" style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
                            בדיקות מודלים
                        </div>
                        <div class="table-count" id="testCount">טוען...</div>
                        <div class="table-actions">
                            <button class="refresh-btn" onclick="runAllModelTests()" title="הרץ את כל בדיקות המודלים">
                                <i class="fas fa-play me-1"></i> הרץ בדיקות
                            </button>

                            <div class="action-separator"></div>
                            <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור בדיקות">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- תוכן הבדיקות -->
                    <div class="section-body">
                        <div class="container-fluid">
                            <!-- Loading Indicator -->
                            <div id="loading-indicator" class="loading-overlay" style="display: none;">
                                <div class="loading-spinner">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">טוען...</span>
                                    </div>
                                    <div class="loading-text mt-2">טוען...</div>
                                </div>
                            </div>

                            <!-- Error Display -->
                            <div id="error-display" class="alert alert-danger" style="display: none;">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <span id="error-message"></span>
                            </div>

                            <!-- Current Time Display -->
                            <div class="current-time-display mb-3">
                                <i class="fas fa-clock me-2"></i>
                                <span id="current-time">טוען זמן...</span>
                            </div>

                            <!-- Test Forms -->
                            <div class="row">
                                <!-- Quote Model Test -->
                                <div class="col-md-6 mb-4">
                                    <div class="card test-card">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-chart-line me-2"></i>
                                                בדיקת מודל מחיר
                                            </h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label class="form-label">נתוני מחיר לבדיקה:</label>
                                                <textarea class="form-control" id="quote-data" rows="4" placeholder='{"symbol": "AAPL", "price": 150.25, "change_amount": 2.50, "change_percent": 1.69, "volume": 50000000}'>{"symbol": "AAPL", "price": 150.25, "change_amount": 2.50, "change_percent": 1.69, "volume": 50000000, "high_24h": 152.00, "low_24h": 148.50, "open_price": 149.75, "previous_close": 147.75, "fetched_at": "2025-08-29T04:00:00Z"}</textarea>
                                            </div>
                                            <button class="btn btn-primary w-100" id="test-quote-model">
                                                <i class="fas fa-check me-1"></i>בדוק מודל
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Ticker Model Test -->
                                <div class="col-md-6 mb-4">
                                    <div class="card test-card">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-tag me-2"></i>
                                                בדיקת מודל טיקר
                                            </h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label class="form-label">נתוני טיקר לבדיקה:</label>
                                                <textarea class="form-control" id="ticker-data" rows="4" placeholder='{"symbol": "AAPL", "name": "Apple Inc.", "sector": "Technology", "currency": "USD"}'>{"symbol": "AAPL", "name": "Apple Inc.", "sector": "Technology", "currency": "USD", "exchange": "NASDAQ", "is_active": true, "created_at": "2025-08-29T04:00:00Z"}</textarea>
                                            </div>
                                            <button class="btn btn-success w-100" id="test-ticker-model">
                                                <i class="fas fa-check me-1"></i>בדוק מודל
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Additional Model Tests -->
                            <div class="row">
                                <!-- Market Preferences Test -->
                                <div class="col-md-6 mb-4">
                                    <div class="card test-card">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-cog me-2"></i>
                                                בדיקת מודל העדפות שוק
                                            </h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label class="form-label">נתוני העדפות לבדיקה:</label>
                                                <textarea class="form-control" id="preferences-data" rows="4" placeholder='{"user_id": 1, "timezone": "Asia/Jerusalem", "refresh_interval": 300}'>{"user_id": 1, "timezone": "Asia/Jerusalem", "refresh_interval": 300, "default_currency": "USD", "show_alerts": true, "auto_refresh": true, "created_at": "2025-08-29T04:00:00Z"}</textarea>
                                            </div>
                                            <button class="btn btn-info w-100" id="test-preferences-model">
                                                <i class="fas fa-check me-1"></i>בדוק מודל
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Validation Test -->
                                <div class="col-md-6 mb-4">
                                    <div class="card test-card">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-shield-alt me-2"></i>
                                                בדיקת ולידציה
                                            </h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label class="form-label">בדיקות ולידציה:</label>
                                                <div class="d-grid gap-2">
                                                    <button class="btn btn-outline-warning" id="test-data-validation">
                                                        <i class="fas fa-check-circle me-1"></i>בדוק ולידציה
                                                    </button>
                                                    <button class="btn btn-outline-secondary" id="test-structure-validation">
                                                        <i class="fas fa-sitemap me-1"></i>בדוק מבנה
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Test Results -->
                            <div class="row">
                                <!-- Quote Model Results -->
                                <div class="col-md-6 mb-4">
                                    <div class="card result-card" id="quote-model-card" style="display: none;">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-chart-line me-2"></i>
                                                תוצאות מודל מחיר
                                            </h5>
                                        </div>
                                        <div class="card-body" id="quote-model-content">
                                            <!-- תוכן דינמי -->
                                        </div>
                                    </div>
                                </div>

                                <!-- Ticker Model Results -->
                                <div class="col-md-6 mb-4">
                                    <div class="card result-card" id="ticker-model-card" style="display: none;">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-tag me-2"></i>
                                                תוצאות מודל טיקר
                                            </h5>
                                        </div>
                                        <div class="card-body" id="ticker-model-content">
                                            <!-- תוכן דינמי -->
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Additional Results -->
                            <div class="row">
                                <div class="col-12 mb-4">
                                    <div class="card result-card" id="validation-results-card" style="display: none;">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-shield-alt me-2"></i>
                                                תוצאות ולידציה
                                            </h5>
                                        </div>
                                        <div class="card-body" id="validation-results-content">
                                            <!-- תוכן דינמי -->
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Test Logs -->
                            <div class="row">
                                <div class="col-12">
                                    <div class="card log-card">
                                        <div class="card-header">
                                            <h5 class="card-title mb-0">
                                                <i class="fas fa-file-alt me-2"></i>
                                                לוג בדיקות מודלים
                                                <button class="btn btn-sm btn-outline-secondary float-start" onclick="clearModelLogs()">
                                                    <i class="fas fa-trash me-1"></i>נקה
                                                </button>
                                            </h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="log-container" id="model-test-logs">
                                                <!-- לוגים יוצגו כאן -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- סוף content-section -->
            </div> <!-- סוף main-content -->
        </div> <!-- סוף page-body -->
    </div> <!-- סוף background-wrapper -->

    <script>
        // אתחול HeaderSystem
        document.addEventListener('DOMContentLoaded', () => {
            if (window.headerSystem && !window.headerSystem.isInitialized) {
                window.headerSystem.init();
            }
        });
    </script>
</body>

</html>
