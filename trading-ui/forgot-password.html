<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איפוס סיסמה - TikTrack</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css">
    
    <style>
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Hebrew', sans-serif;
        }
        
        .login-wrapper {
            width: 80%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid #e0e0e0;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo {
            margin-bottom: 1.5rem;
        }
        
        .login-logo img {
            max-width: 200px;
            height: auto;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--apple-text-primary, #000);
            text-align: right;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--apple-border, #C6C6C8);
            border-radius: 8px;
            font-size: 1rem;
            direction: rtl;
            text-align: right;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--apple-blue, #007AFF);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--apple-blue, #007AFF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background: #0051D5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .login-success {
            background: #efe;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--apple-border, #C6C6C8);
        }
        
        .back-link a {
            color: var(--apple-blue, #007AFF);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .info-text {
            color: var(--apple-text-secondary, #666);
            font-size: 0.9rem;
            text-align: right;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <img src="images/logo.svg" alt="TikTrack Logo" />
                </div>
            </div>
            
            <div class="login-error" id="errorMessage"></div>
            <div class="login-success" id="successMessage"></div>
            
            <div class="info-text" id="infoText">
                הזן את כתובת האימייל או שם המשתמש שלך, ונשלח לך קישור לאיפוס הסיסמה.
            </div>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="emailOrUsername">אימייל או שם משתמש</label>
                    <input type="text" id="emailOrUsername" class="form-control" placeholder="הכנס אימייל או שם משתמש" required autofocus>
                </div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <span id="submitBtnText">שלח קישור איפוס סיסמה</span>
                    <span id="submitBtnSpinner" style="display: none;">⏳ שולח...</span>
                </button>
            </form>
            
            <div class="back-link">
                <a href="login.html">← חזרה להתחברות</a>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="scripts/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotPasswordForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const infoText = document.getElementById('infoText');
            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const submitBtnSpinner = document.getElementById('submitBtnSpinner');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Hide previous messages
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                
                // Get input value
                const emailOrUsername = document.getElementById('emailOrUsername').value.trim();
                
                if (!emailOrUsername) {
                    showError('אנא הזן אימייל או שם משתמש');
                    return;
                }
                
                // Set loading state
                submitBtn.disabled = true;
                submitBtnText.style.display = 'none';
                submitBtnSpinner.style.display = 'inline';
                
                try {
                    // Determine if input is email or username
                    const isEmail = emailOrUsername.includes('@');
                    const data = isEmail 
                        ? { email: emailOrUsername }
                        : { username: emailOrUsername };
                    
                    const response = await fetch('/api/auth/password-reset/request', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify(data),
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        // Show success message
                        successMessage.textContent = 'אם החשבון קיים במערכת, נשלח לך קישור לאיפוס סיסמה לכתובת האימייל שלך.';
                        successMessage.style.display = 'block';
                        infoText.style.display = 'none';
                        form.style.display = 'none';
                    } else {
                        showError(result.error?.message || 'שגיאה בשליחת קישור איפוס סיסמה');
                    }
                } catch (error) {
                    showError('שגיאה בשליחת קישור איפוס סיסמה: ' + (error.message || 'שגיאה לא ידועה'));
                } finally {
                    // Reset loading state
                    submitBtn.disabled = false;
                    submitBtnText.style.display = 'inline';
                    submitBtnSpinner.style.display = 'none';
                }
            });
            
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
