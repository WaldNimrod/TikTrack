<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שחזור סיסמה - TikTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles-new/master.css">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #eef2ff 0%, #f8fafc 45%, #e0e7ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-card p {
      color: var(--apple-text-secondary, #555);
      margin-bottom: 1.5rem;
    }
    .auth-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .auth-status {
      margin-top: 1rem;
      color: var(--apple-text-secondary, #555);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="mb-3">
      <img src="images/logo.svg" alt="TikTrack Logo" style="height: 52px;">
    </div>
    <h1>שחזור סיסמה</h1>
    <p>הזן את כתובת האימייל שלך ונשלח לך קישור לאיפוס הסיסמה</p>

    <form id="forgotPasswordForm" class="text-start">
      <div class="mb-3">
        <label for="email" class="form-label">כתובת אימייל</label>
        <input type="email" class="form-control" id="email" name="email" required
               placeholder="your@email.com">
        <div class="invalid-feedback">
          אנא הזן כתובת אימייל תקינה
        </div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span class="spinner-border spinner-border-sm d-none" role="status"></span>
          שלח קישור איפוס
        </button>
      </div>
    </form>

    <div class="auth-actions mt-3">
      <a class="btn btn-outline-secondary" href="login.html">חזרה להתחברות</a>
      <a class="btn btn-link" href="register.html">משתמש חדש?</a>
    </div>

    <div class="auth-status mt-3" id="forgotStatus"></div>
  </div>

  <!-- Core scripts -->
  <!-- Init System Scripts - Load Order Critical -->
  <script src="scripts/init-system/package-manifest.js" defer></script>
  <script src="scripts/page-initialization-configs.js" defer></script>
  <script src="scripts/modules/core-systems.js" defer></script>
  <!-- End Init System Scripts -->
  <script src="scripts/api-config.js" defer></script>
  <script src="scripts/logger-service.js" defer></script>
  <script src="scripts/notification-system.js" defer></script>
  <script src="scripts/unified-cache-manager.js" defer></script>
  <script src="scripts/auth.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('forgotPasswordForm');
      const submitBtn = document.getElementById('submitBtn');
      const spinner = submitBtn.querySelector('.spinner-border');
      const statusEl = document.getElementById('forgotStatus');
      const emailInput = document.getElementById('email');

      const setStatus = (msg, isError = false) => {
        if (statusEl) {
          statusEl.textContent = msg || '';
          statusEl.className = `auth-status ${isError ? 'text-danger' : 'text-success'}`;
        }
      };

      const setLoading = (loading) => {
        submitBtn.disabled = loading;
        spinner.classList.toggle('d-none', !loading);
        submitBtn.textContent = loading ? ' שולח...' : 'שלח קישור איפוס';
        if (!loading) submitBtn.insertBefore(spinner, submitBtn.firstChild);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();

        const email = emailInput.value.trim();
        if (!email) {
          emailInput.classList.add('is-invalid');
          return;
        }

        emailInput.classList.remove('is-invalid');
        setLoading(true);
        setStatus('');

        try {
          const response = await fetch('/api/auth/password-reset/request', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email })
          });

          const data = await response.json();

          if (response.ok) {
            setStatus('קישור איפוס נשלח בהצלחה לכתובת האימייל שלך', false);
            form.reset();
          } else {
            throw new Error(data.message || 'שגיאה בשליחת קישור האיפוס');
          }
        } catch (error) {
          console.error('Forgot password error:', error);
          setStatus(error.message || 'שגיאה בשליחת קישור האיפוס', true);
        } finally {
          setLoading(false);
        }
      };

      form.addEventListener('submit', handleSubmit);

      // Clear validation on input
      emailInput.addEventListener('input', () => {
        emailInput.classList.remove('is-invalid');
      });
    });
  </script>
  <script src="scripts/color-scheme-system.js" defer></script> <!-- Dynamic color system -->
</body>
</html>
