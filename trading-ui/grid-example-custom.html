<DOCTYPE html> 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דוגמה - גריד מותאם אישית</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- AG-Grid CSS -->
  <link href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-quartz.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles/apple-theme.css" />
  <link rel="stylesheet" href="styles/menu.css?v=6" />
  <link rel="stylesheet" href="styles/styles.css?v=10" />
  <link rel="stylesheet" href="styles/grid.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <!-- Web Component של הכותרת -->
  <app-header></app-header>

  <div class="background-wrapper">
    <div class="container">
      <div class="content-wrapper">
        <div class="top-bar">
          <h1>דוגמה - גריד מותאם אישית</h1>
        </div>

        <div class="info-section">
          <h3>דוגמה לגריד עם עמודות מותאמות אישית</h3>
          <p>דף זה מדגים כיצד ליצור גריד עם עמודות שונות מהגריד הסטנדרטי</p>
        </div>

        <div class="stats-container">
          <div class="stats-item">
            <div class="stats-label">סה"כ</div>
            <div class="stats-value stats-total">0</div>
          </div>
          <div class="stats-item">
            <div class="stats-label">פתוח</div>
            <div class="stats-value stats-open">0</div>
          </div>
          <div class="stats-item">
            <div class="stats-label">סגור</div>
            <div class="stats-value stats-closed">0</div>
          </div>
          <div class="stats-item">
            <div class="stats-label">מבוטל</div>
            <div class="stats-value stats-cancelled">0</div>
          </div>
        </div>

        <div id="agGridFloating" class="ag-theme-quartz grid-container" style="height: 500px; width: 100%;"></div>
      </div>
    </div>
  </div>

  <!-- Web Component Header -->
  <script src="scripts/app-header.js"></script>
  
  <!-- Grid System Scripts -->
  <script src="scripts/grid-core.js"></script>
  <script src="scripts/grid-filters.js"></script>
  <script src="scripts/grid-data.js"></script>
  <script src="scripts/grid-init.js"></script>
  
  <script>
    // הגדרת עמודות הגריד המותאמות אישית לדף זה
    const getPageColumnDefs = () => [
      { 
        headerName: "מזהה", 
        field: "id", 
        width: 80,
        minWidth: 60,
        maxWidth: 100,
        cellStyle: { fontWeight: 'bold' }
      },
      { 
        headerName: "שם", 
        field: "name", 
        width: 150,
        minWidth: 120,
        maxWidth: 200,
        cellRenderer: params => `<strong>${params.value}</strong>`
      },
      { 
        headerName: "קטגוריה", 
        field: "category", 
        width: 120,
        minWidth: 100,
        maxWidth: 150,
        cellClass: params => `badge-category ${params.value}`
      },
      { 
        headerName: "ערך", 
        field: "value", 
        width: 100,
        minWidth: 80,
        maxWidth: 120,
        cellClass: params => params.value > 0 ? 'positive' : 'negative',
        cellRenderer: params => `$${params.value.toLocaleString()}`
      },
      { 
        headerName: "אחוז", 
        field: "percentage", 
        width: 100,
        minWidth: 80,
        maxWidth: 120,
        cellClass: params => params.value > 0 ? 'positive' : 'negative',
        cellRenderer: params => `${params.value > 0 ? '+' : ''}${params.value}%`
      },
      { 
        headerName: "תאריך יצירה", 
        field: "created_at", 
        width: 120,
        minWidth: 100,
        maxWidth: 150,
        cellRenderer: params => {
          const date = new Date(params.value);
          return date.toLocaleDateString('he-IL');
        }
      },
      { 
        headerName: "סטטוס", 
        field: "status", 
        width: 100,
        minWidth: 80,
        maxWidth: 120,
        cellClass: params => `badge-status ${params.value}`,
        filter: true
      },
      {
        headerName: "פעולות",
        field: "actions",
        width: 120,
        minWidth: 100,
        maxWidth: 150,
        cellRenderer: params => {
          return `
            <button onclick="editItem('${params.data.id}')" class="btn btn-sm btn-primary" style="background: #29a6a8 !important; border-color: #29a6a8 !important; color: white !important; padding: 6px 12px !important; border-radius: 6px !important; font-size: 12px !important; font-weight: 500 !important; transition: all 0.2s ease !important; box-shadow: 0 2px 6px rgba(41, 166, 168, 0.3) !important;">ערוך</button>
            <button onclick="deleteItem('${params.data.id}')" class="btn btn-sm btn-danger">מחק</button>
          `;
        }
      }
    ];

    // הגדרות הגריד המותאמות אישית לדף זה
    const getPageGridOptions = (rowData = []) => ({
      columnDefs: getPageColumnDefs(),
      rowData: rowData,
      theme: 'legacy',
      defaultColDef: {
        sortable: true,
        filter: false,
        resizable: true,
        wrapText: true,
        autoHeight: true,
        cellStyle: { 
          textAlign: 'center', 
          direction: 'rtl', 
          padding: '6px', 
          fontSize: '0.9rem', 
          lineHeight: '1.5' 
        },
        headerClass: 'ag-header-center',
        floatingFilter: false,
        suppressSizeToFit: false
      },
      isExternalFilterPresent: isExternalFilterPresent,
      doesExternalFilterPass: doesExternalFilterPass,
      onGridReady: onGridReady,
      // הגדרות נוספות מותאמות אישית
      rowSelection: 'single',
      animateRows: true,
      pagination: true,
      paginationPageSize: 10
    });

    // נתוני דוגמה מותאמים אישית
    const getCustomSampleData = (count = 10) => {
      const categories = ['טכנולוגיה', 'פיננסים', 'בריאות', 'אנרגיה', 'תקשורת'];
      const statuses = ['פעיל', 'לא פעיל', 'ממתין', 'מבוטל'];
      const names = ['פרויקט א', 'פרויקט ב', 'פרויקט ג', 'פרויקט ד', 'פרויקט ה'];
      
      const data = [];
      for (let i = 1; i <= count; i++) {
        const category = categories[Math.floor(Math.random() * categories.length)];
        const status = statuses[Math.floor(Math.random() * statuses.length)];
        const name = names[Math.floor(Math.random() * names.length)];
        const value = Math.floor(Math.random() * 10000) - 5000;
        const percentage = Math.floor(Math.random() * 200) - 100;
        
        data.push({
          id: i,
          name: `${name} ${i}`,
          category: category,
          value: value,
          percentage: percentage,
          created_at: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString(),
          status: status,
          actions: 'פעולות'
        });
      }
      
      return data;
    };

    // פונקציות פעולות
    function editItem(id) {
      alert(`עריכת פריט ${id}`);
    }

    function deleteItem(id) {
      if (confirm(`האם אתה בטוח שברצונך למחוק פריט ${id}?`)) {
        alert(`פריט ${id} נמחק`);
      }
    }

    // אתחול הדף
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Custom grid page loaded, initializing...');
      
      // יצירת נתוני דוגמה מותאמים אישית
      const customData = getCustomSampleData(15);
      window.rowData = customData;
      
      // יצירת הגריד עם הגדרות מותאמות אישית
      const gridOptions = createGrid('#agGridFloating', customData);
      
      if (gridOptions) {
        console.log('Custom grid initialized successfully');
        
        // עדכון סטטיסטיקות
        updateSummaryStats(customData);
      } else {
        console.error('Failed to initialize custom grid');
      }
    });

  </script>
</body>
</html>
