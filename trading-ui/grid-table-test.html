<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גריד טבלה - TikTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=Alef&display=swap" rel="stylesheet" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/apple-theme.css" />
  <link rel="stylesheet" href="styles/menu.css?v=6" />
  <link rel="stylesheet" href="styles/styles.css?v=6" />
  <link rel="stylesheet" href="styles/grid.css?v=9" />
  <link rel="stylesheet" href="styles/grid-table.css?v=1" />
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
  <body>
  <!-- Web Component של הכותרת -->
  <app-header></app-header>

  <div class="background-wrapper">
    <div class="container">
      <div class="content-wrapper">
        <div class="top-bar">
          <h1>בדיקת גריד מסוג טבלה</h1>
        </div>

        <!-- אלמנטי בדיקה ספציפיים לדף זה -->
        <div class="filter-test-section">
          <h3>בדיקת פילטר סטטוס</h3>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="status-open" checked>
              <span>פתוח</span>
            </label>
            <label>
              <input type="checkbox" id="status-closed">
              <span>סגור</span>
            </label>
            <label>
              <input type="checkbox" id="status-cancelled">
              <span>מבוטל</span>
            </label>
          </div>
        </div>

        <div class="info-summary">
          <div>סה"כ רשומות: <strong id="totalRecords">0</strong></div>
          <div>סה"כ סכום: <strong id="totalAmount">$0</strong></div>
          <div>סכום ממוצע: <strong id="averageAmount">$0</strong></div>
        </div>

        <div class="status-indicator">
          <div class="status-item">
            <div class="status-dot success"></div>
            <span>טבלה מוכנה</span>
          </div>
          <div class="status-item">
            <div class="status-dot warning"></div>
            <span>טוען נתונים...</span>
          </div>
        </div>

        <!-- טבלת טריידים -->
        <div class="table-container">
          <div class="table-header">
            <div class="table-title">
              💰 טריידים
            </div>
            <div class="table-count" id="tradesCount">סה"כ רשומות: טוען...</div>
            <div class="button-container">
              <input type="date" id="startDate" style="padding: 6px 12px; border: 1px solid var(--apple-border-light); border-radius: 6px; font-size: 14px;" onchange="filterByDate()" placeholder="מתאריך">
              <input type="date" id="endDate" style="padding: 6px 12px; border: 1px solid var(--apple-border-light); border-radius: 6px; font-size: 14px;" onchange="filterByDate()" placeholder="עד תאריך">
              <button onclick="clearDateFilter()" style="padding: 6px 12px; border: 1px solid var(--apple-border-light); border-radius: 6px; font-size: 14px; background: #f8f9fa; cursor: pointer;" title="נקה תאריכים">🗑️</button>
              <input type="text" id="tradesSearch" placeholder="חיפוש בטריידים..." style="padding: 6px 12px; border: 1px solid var(--apple-border-light); border-radius: 6px; font-size: 14px;" onkeyup="searchTrades()">
              <button onclick="clearSearchFilter()" style="padding: 6px 12px; border: 1px solid var(--apple-border-light); border-radius: 6px; font-size: 14px; background: #f8f9fa; cursor: pointer;" title="נקה חיפוש">🗑️</button>
            </div>
            
            <!-- הצגת החיפוש הנוכחי -->
            <div id="currentSearchDisplay" style="margin-top: 10px; padding: 8px 12px; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; font-size: 14px; display: none;">
              <strong>חיפוש נוכחי:</strong> <span id="currentSearchText"></span>
            </div>
              <button class="refresh-btn" onclick="resetAllFiltersAndReloadData()" title="רענן טבלה">
                <span style="color: #29a6a8; font-size: 0.7em;">🔄</span> רענן
              </button>
            </div>
          </div>
          <div id="tradesTable" class="loading">טוען טריידים...</div>
          
          <!-- דפדפן הטבלה -->
          <div class="pagination-container" id="paginationContainer" style="display: none;">
            <div class="pagination-info">
              <span id="paginationInfo">מציג 0-0 מתוך 0 רשומות</span>
            </div>
            <div class="pagination-controls">
              <div class="page-size-selector">
                <span>רשומות לדף:</span>
                <select id="pageSize" onchange="changePageSize()">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
              <div class="pagination-buttons">
                <button class="pagination-btn" id="firstPage" onclick="goToPage(1)" title="דף ראשון">
                  ⏮️
                </button>
                <button class="pagination-btn" id="prevPage" onclick="goToPreviousPage()" title="דף קודם">
                  ◀️
                </button>
                <div class="page-numbers" id="pageNumbers">
                  <!-- מספרי דפים יוכנסו כאן דינמית -->
                </div>
                <button class="pagination-btn" id="nextPage" onclick="goToNextPage()" title="דף הבא">
                  ▶️
                </button>
                <button class="pagination-btn" id="lastPage" onclick="goToLastPage()" title="דף אחרון">
                  ⏭️
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Web Component Header -->
  <script src="scripts/app-header.js?v=7"></script>
  
  <script>
    let tradesData = [];
    let filteredData = [];
    let currentPage = 1;
    let pageSize = 25;
    let totalPages = 1;

    // פונקציה גלובלית לאיפוס כל הפילטרים ורענון הטבלה
    async function resetAllFiltersAndReloadData() {
      console.log('=== resetAllFiltersAndReloadData called ===');
      
      // איפוס כל הפילטרים דרך הקומפוננטה
      const header = document.querySelector('app-header');
      if (header && typeof header.clearAllFilters === 'function') {
        console.log('Calling clearAllFilters from component');
        header.clearAllFilters();
      } else {
        console.log('Component clearAllFilters not available, using fallback');
        closeAllFilters();
      }
      
      // טעינת נתונים מחדש ישירות ללא קריאה לפונקציות האיפוס
      await loadTradesDataDirect();
    }

    // פונקציה לטעינת נתוני טריידים (עם איפוס)
    async function loadTradesData() {
      console.log('=== loadTradesData called ===');
      
      // איפוס כל הפילטרים דרך הקומפוננטה
      const header = document.querySelector('app-header');
      if (header && typeof header.clearAllFilters === 'function') {
        console.log('Calling clearAllFilters from component');
        header.clearAllFilters();
      } else {
        console.log('Component clearAllFilters not available, using fallback');
        closeAllFilters();
      }
      
      // טעינת נתונים מחדש
      await loadTradesDataDirect();
    }

    // פונקציה לטעינת נתוני טריידים ישירות ללא איפוס
    async function loadTradesDataDirect() {
      console.log('=== loadTradesDataDirect called ===');
      
      try {
        console.log('Loading trades data...');
        const response = await fetch('/api/trades');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        tradesData = await response.json();
        console.log('Trades loaded:', tradesData);
        console.log('First trade:', tradesData[0]);
        console.log('Total trades:', tradesData.length);
        
        if (!Array.isArray(tradesData)) {
          console.error('Invalid data format received:', tradesData);
          throw new Error('Invalid data format received from server');
        }
        
        // מיפוי נתונים מהשרת לפורמט הנדרש
        tradesData = tradesData.map(trade => {
          // מיפוי סטטוס
          let status = 'פתוח';
          if (trade.status === 'open') status = 'פתוח';
          else if (trade.status === 'closed') status = 'סגור';
          else if (trade.status === 'מבוטל') status = 'מבוטל';
          else status = trade.status || 'פתוח';
          
          // מיפוי סוג
          let type = 'סווינג';
          if (trade.type === 'buy' || trade.type === 'long') type = 'סווינג';
          else if (trade.type === 'sell' || trade.type === 'short') type = 'השקעה';
          else type = trade.type || 'סווינג';
          
          return {
            ticker: trade.ticker_symbol || 'N/A',
            date: trade.opened_at ? new Date(trade.opened_at).toLocaleDateString('he-IL') : 'N/A',
            originalDate: trade.opened_at ? new Date(trade.opened_at) : null, // שמירת התאריך המקורי לפילטור
            type: type,
            amount: trade.total_pl ? `$${trade.total_pl.toLocaleString()}` : '$0',
            target: trade.target || '$0 (0%)',
            stop: trade.stop || '$0 (0%)',
            current: trade.current || '$0 (0%)',
            status: status,
            action: '⬅️',
            account: trade.account_name || 'N/A'
          };
        });
        
        filteredData = [...tradesData];
        console.log('Final trades data:', tradesData);
        console.log('Filtered data:', filteredData);
        console.log('Sample trade status:', tradesData[0]?.status);
        console.log('Sample trade type:', tradesData[0]?.type);
        console.log('Sample trade account:', tradesData[0]?.account);
        console.log('Filtered data length:', filteredData.length);
        currentPage = 1; // איפוס לדף ראשון
        
        // הצגת כל הנתונים בהתחלה
        console.log('Showing all data initially');
        console.log('About to call updateTable with filteredData length:', filteredData.length);
        updateTable();
        updateSummary();
        updatePagination();
        
      } catch (error) {
        console.error('Error loading trades:', error);
        document.getElementById('tradesTable').innerHTML = `<div class="loading">שגיאה בטעינת הנתונים: ${error.message}</div>`;
        // איפוס הנתונים במקרה של שגיאה
        tradesData = [];
        filteredData = [];
        updateTable();
        updateSummary();
        updatePagination();
      }
    }

    // פונקציה לעדכון הטבלה
    function updateTable() {
      const tableContainer = document.getElementById('tradesTable');
      const countElement = document.getElementById('tradesCount');
      
      if (!tableContainer || !countElement) {
        console.error('Required DOM elements not found');
        return;
      }
      
      console.log('updateTable called with filteredData length:', filteredData?.length);
      
      if (!filteredData || filteredData.length === 0) {
        console.log('No filtered data, showing empty message');
        tableContainer.innerHTML = '<div class="loading">לא נמצאו טריידים</div>';
        countElement.textContent = 'סה"כ רשומות: 0';
        const paginationContainer = document.getElementById('paginationContainer');
        if (paginationContainer) {
          paginationContainer.style.display = 'none';
        }
        return;
      }

      // חישוב דפדפן
      totalPages = Math.ceil(filteredData.length / pageSize);
      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = Math.min(startIndex + pageSize, filteredData.length);
      const pageData = filteredData.slice(startIndex, endIndex);

      // יצירת הטבלה
      const table = document.createElement('table');
      table.className = 'data-table';
      
      // יצירת כותרות
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      
      const headers = [
        'חשבון', 'נכס', 'תאריך', 'סוג', 'סכום/כמות', 'יעד', 'סטופ', 'נוכחי', 'סטטוס', 'המרה'
      ];
      
      headers.forEach(header => {
        const th = document.createElement('th');
        th.textContent = header;
        headerRow.appendChild(th);
      });
      
      thead.appendChild(headerRow);
      table.appendChild(thead);
      
      // יצירת שורות נתונים
      const tbody = document.createElement('tbody');
      pageData.forEach(row => {
        const tr = document.createElement('tr');
        
        // חשבון
        const accountTd = document.createElement('td');
        accountTd.innerHTML = `<span class="account-name">${row.account || 'N/A'}</span>`;
        tr.appendChild(accountTd);
        
        // נכס
        const tickerTd = document.createElement('td');
        tickerTd.innerHTML = `<span class="ticker-link" onclick="openPlanDetails('${row.ticker || 'N/A'}')">${row.ticker || 'N/A'}</span>`;
        tr.appendChild(tickerTd);
        
        // תאריך
        const dateTd = document.createElement('td');
        dateTd.textContent = row.date || 'N/A';
        tr.appendChild(dateTd);
        
        // סוג
        const typeTd = document.createElement('td');
        typeTd.innerHTML = `<span class="type-badge ${(row.type || 'סווינג').toLowerCase()}">${row.type || 'סווינג'}</span>`;
        tr.appendChild(typeTd);
        
        // סכום/כמות
        const amountTd = document.createElement('td');
        const amountClass = row.amount && row.amount.includes("(+") ? 'positive' : 
                           row.amount && row.amount.includes("(-") ? 'negative' : '';
        amountTd.innerHTML = `<span class="${amountClass}">${row.amount || '$0'}</span>`;
        tr.appendChild(amountTd);
        
        // יעד
        const targetTd = document.createElement('td');
        const targetClass = row.target && row.target.includes("(+") ? 'positive' : 
                           row.target && row.target.includes("(-") ? 'negative' : '';
        targetTd.innerHTML = `<span class="${targetClass}">${row.target || '$0 (0%)'}</span>`;
        tr.appendChild(targetTd);
        
        // סטופ
        const stopTd = document.createElement('td');
        const stopClass = row.stop && row.stop.includes("(+") ? 'positive' : 
                         row.stop && row.stop.includes("(-") ? 'negative' : '';
        stopTd.innerHTML = `<span class="${stopClass}">${row.stop || '$0 (0%)'}</span>`;
        tr.appendChild(stopTd);
        
        // נוכחי
        const currentTd = document.createElement('td');
        const currentClass = row.current && row.current.includes("(+") ? 'positive' : 
                           row.current && row.current.includes("(-") ? 'negative' : '';
        currentTd.innerHTML = `<span class="${currentClass}">${row.current || '$0 (0%)'}</span>`;
        tr.appendChild(currentTd);
        
        // סטטוס
        const statusTd = document.createElement('td');
        let statusClass = '';
        const status = row.status || 'פתוח';
        if (status === 'פתוח') statusClass = 'open';
        else if (status === 'סגור') statusClass = 'closed';
        else if (status === 'מבוטל') statusClass = 'cancelled';
        statusTd.innerHTML = `<span class="status-badge ${statusClass}">${status}</span>`;
        tr.appendChild(statusTd);
        
        // המרה
        const actionTd = document.createElement('td');
        actionTd.innerHTML = `<span class="action-icon">${row.action || '⬅️'}</span>`;
        tr.appendChild(actionTd);
        
        tbody.appendChild(tr);
      });
      
      table.appendChild(tbody);
      
      // ניקוי והחלפת התוכן
      tableContainer.innerHTML = '';
      tableContainer.appendChild(table);
      
      // עדכון מספר הרשומות
      countElement.textContent = `סה"כ רשומות: ${filteredData.length}`;
      
      // הצגת הדפדפן
      const paginationContainer = document.getElementById('paginationContainer');
      if (paginationContainer) {
        paginationContainer.style.display = 'flex';
      }
    }

    // פונקציה לעדכון הדפדפן
    function updatePagination() {
      const paginationInfo = document.getElementById('paginationInfo');
      const pageNumbers = document.getElementById('pageNumbers');
      
      if (!paginationInfo || !pageNumbers) {
        console.error('Pagination elements not found');
        return;
      }
      
      if (filteredData.length === 0) {
        paginationInfo.textContent = 'מציג 0-0 מתוך 0 רשומות';
        pageNumbers.innerHTML = '';
        return;
      }
      
      const startIndex = (currentPage - 1) * pageSize + 1;
      const endIndex = Math.min(currentPage * pageSize, filteredData.length);
      
      paginationInfo.textContent = `מציג ${startIndex}-${endIndex} מתוך ${filteredData.length} רשומות`;
      
      // יצירת מספרי דפים
      pageNumbers.innerHTML = '';
      
      const maxVisiblePages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
      
      if (endPage - startPage + 1 < maxVisiblePages) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
      }
      
      for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.className = `page-number ${i === currentPage ? 'active' : ''}`;
        pageBtn.textContent = i;
        pageBtn.onclick = () => goToPage(i);
        pageNumbers.appendChild(pageBtn);
      }
      
      // עדכון כפתורי ניווט
      const firstPageBtn = document.getElementById('firstPage');
      const prevPageBtn = document.getElementById('prevPage');
      const nextPageBtn = document.getElementById('nextPage');
      const lastPageBtn = document.getElementById('lastPage');
      
      if (firstPageBtn) firstPageBtn.disabled = currentPage === 1;
      if (prevPageBtn) prevPageBtn.disabled = currentPage === 1;
      if (nextPageBtn) nextPageBtn.disabled = currentPage === totalPages;
      if (lastPageBtn) lastPageBtn.disabled = currentPage === totalPages;
    }

    // פונקציות ניווט בדפדפן
    function goToPage(page) {
      if (page >= 1 && page <= totalPages) {
        currentPage = page;
        updateTable();
        updatePagination();
      } else {
        console.warn('Invalid page number:', page, 'Total pages:', totalPages);
      }
    }

    function goToPreviousPage() {
      if (currentPage > 1) {
        goToPage(currentPage - 1);
      }
    }

    function goToNextPage() {
      if (currentPage < totalPages) {
        goToPage(currentPage + 1);
      }
    }

    function goToFirstPage() {
      goToPage(1);
    }

    function goToLastPage() {
      goToPage(totalPages);
    }

    function changePageSize() {
      const pageSizeElement = document.getElementById('pageSize');
      if (!pageSizeElement) {
        console.error('Page size element not found');
        return;
      }
      
      pageSize = parseInt(pageSizeElement.value);
      if (isNaN(pageSize) || pageSize < 1) {
        console.error('Invalid page size:', pageSizeElement.value);
        pageSize = 25; // ברירת מחדל
      }
      
      currentPage = 1; // חזרה לדף ראשון
      updateTable();
      updatePagination();
    }

    // פונקציה לעדכון הסיכום
    function updateSummary() {
      const totalRecordsElement = document.getElementById('totalRecords');
      const totalAmountElement = document.getElementById('totalAmount');
      const averageAmountElement = document.getElementById('averageAmount');
      
      if (!totalRecordsElement || !totalAmountElement || !averageAmountElement) {
        console.error('Summary elements not found');
        return;
      }
      
      totalRecordsElement.textContent = filteredData.length;
      
      // חישוב סכומים (דוגמה פשוטה)
      const totalAmount = filteredData.length * 20000; // דוגמה
      const averageAmount = filteredData.length > 0 ? totalAmount / filteredData.length : 0;
      
      totalAmountElement.textContent = `$${totalAmount.toLocaleString()}`;
      averageAmountElement.textContent = `$${averageAmount.toLocaleString()}`;
    }

    // פונקציה לפילטור הנתונים
    function filterData(selectedStatuses, selectedTypes, selectedAccounts) {
      console.log('=== filterData called ===');
      console.log('Filters:', { selectedStatuses, selectedTypes, selectedAccounts });
      console.log('Total trades data:', tradesData.length);
      
      // קבלת ערך החיפוש הנוכחי
      const searchTerm = document.getElementById('tradesSearch').value.toLowerCase();
      console.log('Search term:', searchTerm);
      
      // קבלת ערכי התאריך הנוכחיים
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      console.log('Date range:', { startDate, endDate });
      
      filteredData = tradesData.filter(row => {
        // פילטר סטטוס
        if (selectedStatuses && selectedStatuses.length > 0) {
          // אם נבחרו כל הסטטוסים (או "הכול"), לא לסנן
          const allStatuses = ['פתוח', 'סגור', 'מבוטל'];
          const isAllSelected = selectedStatuses.length === allStatuses.length || 
                               selectedStatuses.includes('הכול') ||
                               selectedStatuses.length === 0;
          
          if (!isAllSelected && !selectedStatuses.includes(row.status)) {
            return false;
          }
        }
        
        // פילטר סוג
        if (selectedTypes && selectedTypes.length > 0) {
          // אם נבחרו כל הסוגים (או "הכול"), לא לסנן
          const allTypes = ['סווינג', 'השקעה', 'פאסיבי'];
          const isAllSelected = selectedTypes.length === allTypes.length || 
                               selectedTypes.includes('הכול') ||
                               selectedTypes.length === 0;
          
          if (!isAllSelected && !selectedTypes.includes(row.type)) {
            return false;
          }
        }
        
        // פילטר חשבון
        if (selectedAccounts && selectedAccounts.length > 0) {
          // אם נבחרו כל החשבונות (או "הכול"), לא לסנן
          const isAllSelected = selectedAccounts.includes('הכול') || selectedAccounts.length === 0;
          
          if (!isAllSelected && !selectedAccounts.includes(row.account)) {
            return false;
          }
        }
        
        // פילטר חיפוש
        if (searchTerm) {
          console.log('Searching in row:', {
            ticker: row.ticker,
            account: row.account,
            type: row.type,
            status: row.status,
            amount: row.amount,
            date: row.date
          });
          
          const matchesSearch = (
            (row.ticker && row.ticker.toLowerCase().includes(searchTerm)) ||
            (row.account && row.account.toLowerCase().includes(searchTerm)) ||
            (row.type && row.type.toLowerCase().includes(searchTerm)) ||
            (row.status && row.status.toLowerCase().includes(searchTerm)) ||
            (row.amount && row.amount.toLowerCase().includes(searchTerm)) ||
            (row.date && row.date.includes(searchTerm))
          );
          
          console.log('Search result for row:', row.ticker, 'matches:', matchesSearch);
          
          if (!matchesSearch) {
            return false;
          }
        }
        
        // פילטר תאריך
        if (startDate || endDate) {
          if (!row.originalDate) {
            console.log('Row has no original date:', row);
            return false; // אם אין תאריך מקורי, לא להציג
          }
          
          const rowDate = row.originalDate;
          console.log('Checking date filter for row:', row.ticker, 'date:', rowDate, 'against range:', { startDate, endDate });
          
          if (startDate && endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            // הגדרת זמן לסוף היום עבור endDate
            end.setHours(23, 59, 59, 999);
            if (!(rowDate >= start && rowDate <= end)) {
              console.log('Date filter rejected:', row.ticker, 'date:', rowDate, 'not in range:', start, 'to', end);
              return false;
            }
          } else if (startDate) {
            const start = new Date(startDate);
            if (!(rowDate >= start)) {
              console.log('Start date filter rejected:', row.ticker, 'date:', rowDate, 'before:', start);
              return false;
            }
          } else if (endDate) {
            const end = new Date(endDate);
            // הגדרת זמן לסוף היום עבור endDate
            end.setHours(23, 59, 59, 999);
            if (!(rowDate <= end)) {
              console.log('End date filter rejected:', row.ticker, 'date:', rowDate, 'after:', end);
              return false;
            }
          }
        }
        
        return true;
      });
      
      console.log('Filtered data result:', filteredData.length, 'records');
      
      currentPage = 1; // חזרה לדף ראשון
      updateTable();
      updateSummary();
      updatePagination();
    }

    // פונקציה לפילטור לפי תאריך

      const selectedTypes = window.selectedTypesForFilter || [];

      console.log('Current filters:', { selectedStatuses, selectedTypes, selectedAccounts });
      
      // הפעלת הפילטרים דרך הפונקציה הראשית
      filterData(selectedStatuses, selectedTypes, selectedAccounts);
      
      console.log('=== filterByDate completed ===');
    }

    // פונקציה לחיפוש חופשי
    function searchTrades() {

        console.error('Search input not found');

      }
      
      const searchTerm = searchInput.value.toLowerCase();
      
      console.log('=== searchTrades called ===');
      console.log('Search term:', searchTerm);
      console.log('Search input value:', searchInput.value);
      
      // הצגת החיפוש הנוכחי
      updateSearchDisplay(searchTerm);
      
      // קבלת הפילטרים הנוכחיים מקומפוננטת התפריט
      const selectedStatuses = window.selectedStatusesForFilter || [];
      const selectedTypes = window.selectedTypesForFilter || [];
      const selectedAccounts = window.selectedAccountsForFilter || [];
      
      console.log('Current filters:', { selectedStatuses, selectedTypes, selectedAccounts });
      
      // הפעלת הפילטרים דרך הפונקציה הראשית
      filterData(selectedStatuses, selectedTypes, selectedAccounts);
      
      console.log('=== searchTrades completed ===');
    }

    // פונקציה לעדכון הצגת החיפוש
    function updateSearchDisplay(searchTerm) {
      const searchDisplay = document.getElementById('currentSearchDisplay');
      const searchText = document.getElementById('currentSearchText');
      
      if (!searchDisplay || !searchText) {
        console.error('Search display elements not found');
        return;
      }
      
      if (searchTerm && searchTerm.trim() !== '') {
        searchText.textContent = searchTerm;
        searchDisplay.style.display = 'block';
        console.log('Search display updated with:', searchTerm);
      } else {
        searchDisplay.style.display = 'none';
        console.log('Search display hidden - no search term');
      }
    }

    // פונקציה לניקוי פילטר החיפוש
    function clearSearchFilter() {
      document.getElementById('tradesSearch').value = '';
      updateSearchDisplay(''); // הסתרת הצגת החיפוש
      searchTrades();
    }

    // פונקציה לניקוי פילטר התאריך
    function clearDateFilter() {
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      filterByDate();
    }

    // פונקציה לסגירת כל הפילטרים הפתוחים
    function closeAllFilters() {
      console.log('=== closeAllFilters called ===');
      
      // ניקוי שדה החיפוש
      const searchInput = document.getElementById('tradesSearch');
      if (searchInput) {
        searchInput.value = '';
      }
      
      // ניקוי שדות התאריך
      const startDateField = document.getElementById('startDate');
      const endDateField = document.getElementById('endDate');
      if (startDateField) startDateField.value = '';
      if (endDateField) endDateField.value = '';
      
      // איפוס הפילטרים בקומפוננטת התפריט
      if (typeof window.resetComponentFilters === 'function') {
        window.resetComponentFilters();
      }
      
      // איפוס המשתנים הגלובליים
      window.selectedStatusesForFilter = [];
      window.selectedTypesForFilter = [];
      window.selectedAccountsForFilter = [];
      window.selectedDateRangeForFilter = null;
      
      // ניקוי localStorage
      localStorage.removeItem('planningFilterStatuses');
      localStorage.removeItem('planningFilterTypes');
      localStorage.removeItem('planningFilterAccounts');
      localStorage.removeItem('planningFilterDateRange');
      
      console.log('All filters cleared');
    }

    // פונקציה לפתיחת פרטי תכנון
    function openPlanDetails(ticker) {
      console.log('Opening plan details for:', ticker);
      if (!ticker || ticker === 'N/A') {
        console.warn('Invalid ticker for plan details:', ticker);
        return;
      }
      // כאן אפשר להוסיף לוגיקה לפתיחת פרטי התכנון
      alert(`פתיחת פרטי תכנון עבור ${ticker}`);
    }

    // פונקציות גלובליות לקומפוננט הכותרת
    window.updateGridFromComponent = function(selectedStatuses, selectedTypes = null, selectedAccounts = null, selectedDateRange = null, searchTerm = null) {
      console.log('=== updateGridFromComponent called in grid-table-test ===');
      console.log('Selected statuses:', selectedStatuses);
      console.log('Selected types:', selectedTypes);
      console.log('Selected accounts:', selectedAccounts);
      console.log('Selected date range:', selectedDateRange);
      console.log('Search term:', searchTerm);
      
      // שמירת הערכים הנבחרים לשימוש מאוחר יותר
      window.selectedStatusesForFilter = selectedStatuses;
      window.selectedTypesForFilter = selectedTypes;
      window.selectedAccountsForFilter = selectedAccounts;
      window.selectedDateRangeForFilter = selectedDateRange;
      window.selectedSearchTermForFilter = searchTerm;
      
      // שמירת הפילטרים ב-localStorage לזכירה במעבר בין דפים
      localStorage.setItem('planningFilterStatuses', JSON.stringify(selectedStatuses));
      if (selectedTypes) {
        localStorage.setItem('planningFilterTypes', JSON.stringify(selectedTypes));
      }
      if (selectedAccounts) {
        localStorage.setItem('planningFilterAccounts', JSON.stringify(selectedAccounts));
      }
      if (selectedDateRange) {
        localStorage.setItem('planningFilterDateRange', selectedDateRange);
      }
      if (searchTerm) {
        localStorage.setItem('planningFilterSearch', searchTerm);
      }
      
      // עדכון שדה החיפוש אם יש חיפוש
      if (searchTerm && typeof window.updateSearchFieldFromComponent === 'function') {
        window.updateSearchFieldFromComponent(searchTerm);
      }
      
      // עדכון שדות התאריך אם יש טווח תאריכים
      if (selectedDateRange && typeof window.updateDateFieldsFromComponent === 'function') {
        window.updateDateFieldsFromComponent(selectedDateRange);
      } else {
        // הפעלת הפילטרים על הטבלה
        filterData(selectedStatuses, selectedTypes, selectedAccounts);
      }
      
      console.log('=== updateGridFromComponent completed in grid-table-test ===');
    }

    window.updateTestCheckboxesFromComponent = function(selectedValues) {
      console.log('=== updateTestCheckboxesFromComponent called in grid-table-test ===');
      console.log('Selected values:', selectedValues);
      // פונקציה זו נדרשת על ידי הקומפוננט אבל לא רלוונטית לעמוד זה
      console.log('Test checkboxes update not needed for table test page');
    }

    // פונקציה לאיפוס הפילטרים בקומפוננטת התפריט
    window.resetComponentFilters = function() {
      console.log('=== resetComponentFilters called ===');
      
      // איפוס הפילטרים בקומפוננטת התפריט
      const header = document.querySelector('app-header');
      if (header && header.shadowRoot) {
        // איפוס פילטר הסטטוס
        const statusMenu = header.shadowRoot.getElementById('statusFilterMenu');
        if (statusMenu) {
          const statusItems = statusMenu.querySelectorAll('.status-filter-item');
          statusItems.forEach(item => item.classList.remove('selected'));
        }
        
        // איפוס פילטר הסוג
        const typeMenu = header.shadowRoot.getElementById('typeFilterMenu');
        if (typeMenu) {
          const typeItems = typeMenu.querySelectorAll('.type-filter-item');
          typeItems.forEach(item => item.classList.remove('selected'));
        }
        
        // איפוס פילטר החשבון
        const accountMenu = header.shadowRoot.getElementById('accountFilterMenu');
        if (accountMenu) {
          const accountItems = accountMenu.querySelectorAll('.account-filter-item');
          accountItems.forEach(item => item.classList.remove('selected'));
        }
        
        // איפוס פילטר התאריך
        const dateRangeMenu = header.shadowRoot.getElementById('dateRangeFilterMenu');
        if (dateRangeMenu) {
          const dateRangeItems = dateRangeMenu.querySelectorAll('.date-range-filter-item');
          dateRangeItems.forEach(item => {
            const text = item.querySelector('.option-text').textContent;
            if (text === 'הכול') {
              item.classList.add('selected');
            } else {
              item.classList.remove('selected');
            }
          });
          
          // עדכון הטקסט של פילטר התאריך ל"הכול"
          const dateRangeToggle = header.shadowRoot.querySelector('.date-range-filter-toggle');
          if (dateRangeToggle) {
            const buttonText = dateRangeToggle.querySelector('.selected-date-range-text');
            if (buttonText) {
              buttonText.textContent = 'הכול';
            }
          }
          
          // סגירת התפריט של פילטר התאריך
          if (typeof header.closeDateRangeFilter === 'function') {
            header.closeDateRangeFilter();
          }
        }
        
        // עדכון הטקסט של שאר הפילטרים
        const statusToggle = header.shadowRoot.querySelector('.status-filter-toggle');
        if (statusToggle) {
          const buttonText = statusToggle.querySelector('.selected-status-text');
          if (buttonText) {
            buttonText.textContent = 'הכול';
          }
        }
        
        const typeToggle = header.shadowRoot.querySelector('.type-filter-toggle');
        if (typeToggle) {
          const buttonText = typeToggle.querySelector('.selected-type-text');
          if (buttonText) {
            buttonText.textContent = 'הכול';
          }
        }
        
        const accountToggle = header.shadowRoot.querySelector('.account-filter-toggle');
        if (accountToggle) {
          const buttonText = accountToggle.querySelector('.selected-account-text');
          if (buttonText) {
            buttonText.textContent = 'הכול';
          }
        }
        
        console.log('Component filters reset');
      } else {
        console.log('Header component not found for reset');
      }
    }

    // פונקציה לסגירת פילטרים אחרים
    window.closeOtherFilters = function(activeFilterType) {
      console.log('=== closeOtherFilters called ===');
      console.log('Active filter type:', activeFilterType);
      
      const header = document.querySelector('app-header');
      if (!header || !header.shadowRoot) {
        console.log('Header component not found');
        return;
      }
      
      // סגירת כל התפריטים הנפתחים חוץ מהפעיל
      const filterTypes = ['status', 'type', 'account', 'dateRange'];
      
      filterTypes.forEach(filterType => {
        if (filterType !== activeFilterType) {
          // סגירה ספציפית לכל פילטר
          if (filterType === 'dateRange' && typeof header.closeDateRangeFilter === 'function') {
            header.closeDateRangeFilter();
          } else {
            const menu = header.shadowRoot.getElementById(`${filterType}FilterMenu`);
            if (menu) {
              menu.classList.remove('show');
            }
            
            const toggle = header.shadowRoot.querySelector(`.${filterType}-filter-toggle`);
            if (toggle) {
              toggle.classList.remove('active');
            }
          }
        }
      });
      
      console.log('Other filters closed');
    }

    // פונקציה לעדכון שדה החיפוש מקומפוננטת התפריט
    window.updateSearchFieldFromComponent = function(searchTerm) {
      console.log('=== updateSearchFieldFromComponent called ===');
      console.log('Search term from component:', searchTerm);
      
      const searchField = document.getElementById('tradesSearch');
      if (!searchField) {
        console.error('Search field not found');
        return;
      }
      
      // עדכון שדה החיפוש
      searchField.value = searchTerm;
      
      // הצגת החיפוש הנוכחי
      updateSearchDisplay(searchTerm);
      
      console.log('Search field updated with:', searchTerm);
    }

    // פונקציה לעדכון שדות התאריך מקומפוננטת התפריט
    window.updateDateFieldsFromComponent = function(dateRange) {
      console.log('=== updateDateFieldsFromComponent called ===');
      console.log('Date range from component:', dateRange);
      
      const startDateField = document.getElementById('startDate');
      const endDateField = document.getElementById('endDate');
      
      if (!startDateField || !endDateField) {
        console.error('Date fields not found');
        return;
      }
      
      // ניקוי השדות
      startDateField.value = '';
      endDateField.value = '';
      
      if (!dateRange || dateRange === 'הכול') {
        console.log('No date range selected, clearing fields');
        // הפעלת הפילטר אחרי ניקוי השדות
        filterByDate();
        return;
      }
      
      // חישוב התאריכים לפי הטווח הנבחר
      const today = new Date();
      let startDate = new Date();
      let endDate = new Date();
      
      switch (dateRange) {
        case 'שבוע':
          startDate.setDate(today.getDate() - 7);
          break;
        case 'MTD':
          startDate = new Date(today.getFullYear(), today.getMonth(), 1);
          break;
        case '30 יום':
          startDate.setDate(today.getDate() - 30);
          break;
        case '60 יום':
          startDate.setDate(today.getDate() - 60);
          break;
        case '90 יום':
          startDate.setDate(today.getDate() - 90);
          break;
        case 'שנה':
          startDate.setFullYear(today.getFullYear() - 1);
          break;
        case 'YTD':
          startDate = new Date(today.getFullYear(), 0, 1);
          break;
        case 'שנה קודמת':
          startDate = new Date(today.getFullYear() - 1, 0, 1);
          endDate = new Date(today.getFullYear() - 1, 11, 31);
          break;
        default:
          console.log('Unknown date range:', dateRange);
          return;
      }
      
      // עדכון השדות
      startDateField.value = startDate.toISOString().split('T')[0];
      endDateField.value = endDate.toISOString().split('T')[0];
      
      console.log('Updated date fields:', {
        startDate: startDateField.value,
        endDate: endDateField.value
      });
      
      // הפעלת הפילטר
      filterByDate();
    }

    // טעינת נתונים בעת טעינת הדף
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM Content Loaded - Initializing table test page');
      loadTradesData();
    });
  </script>
