<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת רכיבים פונקציונליים - Header System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            direction: rtl;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #test-element {
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            margin: 10px 0;
        }
        .menu-open {
            display: block !important;
        }
        .filter-menu.show {
            display: block !important;
        }
        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>🔧 בדיקת רכיבים פונקציונליים - Header System</h1>
    
    <div class="test-section">
        <h2>MenuComponent Tests</h2>
        <button onclick="testMenuComponent()">בדוק MenuComponent</button>
        <div id="menucomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>FilterComponent Tests</h2>
        <button onclick="testFilterComponent()">בדוק FilterComponent</button>
        <div id="filtercomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>NavigationComponent Tests</h2>
        <button onclick="testNavigationComponent()">בדוק NavigationComponent</button>
        <div id="navigationcomponent-results"></div>
    </div>
    
    <div class="test-section">
        <h2>Functional Components Integration Tests</h2>
        <button onclick="testFunctionalComponentsIntegration()">בדוק אינטגרציה</button>
        <div id="functional-integration-results"></div>
    </div>
    
    <!-- אלמנט לבדיקות -->
    <div id="test-element">
        <div id="unified-header">
            <div class="header-top">
                <div class="header-nav">
                    <nav class="main-nav" id="mainNavigation"></nav>
                </div>
            </div>
            <div class="filters-container" id="headerFilters">
                <div class="header-filters" id="headerFiltersContent"></div>
            </div>
        </div>
    </div>
    
    <!-- טעינת קבצי המערכת -->
    <script src="../utils/DOMUtils.js"></script>
    <script src="../utils/EventUtils.js"></script>
    <script src="../utils/StateUtils.js"></script>
    <script src="../constants/Events.js"></script>
    <script src="../constants/Selectors.js"></script>
    <script src="../constants/Config.js"></script>
    <script src="../services/EventService.js"></script>
    <script src="../services/StateService.js"></script>
    <script src="../services/UIService.js"></script>
    <script src="../components/StateComponent.js"></script>
    <script src="../components/UIComponent.js"></script>
    <script src="../components/TranslationComponent.js"></script>
    <script src="../components/PreferencesComponent.js"></script>
    <script src="../components/MenuComponent.js"></script>
    <script src="../components/FilterComponent.js"></script>
    <script src="../components/NavigationComponent.js"></script>
    <script src="../index.js"></script>
    
    <script>
        // פונקציות בדיקה
        
        function addResult(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            container.appendChild(div);
        }
        
        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }
        
        function testMenuComponent() {
            clearResults('menucomponent-results');
            addResult('menucomponent-results', 'מתחיל בדיקת MenuComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof MenuComponent === 'undefined') {
                    addResult('menucomponent-results', '❌ MenuComponent לא קיים', 'error');
                    return;
                }
                addResult('menucomponent-results', '✅ MenuComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const menuComponent = new MenuComponent(headerSystem);
                
                if (menuComponent) {
                    addResult('menucomponent-results', '✅ יצירת מופע MenuComponent עובד', 'success');
                } else {
                    addResult('menucomponent-results', '❌ יצירת מופע MenuComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['setActiveItem', 'toggleMenu', 'addMenuItem', 'removeMenuItem', 'updateMenuItem', 'getMenuItem', 'getAllMenuItems', 'getActiveItem', 'isMenuOpen'];
                
                methods.forEach(method => {
                    if (typeof menuComponent[method] === 'function') {
                        addResult('menucomponent-results', `✅ MenuComponent.${method} קיים`, 'success');
                    } else {
                        addResult('menucomponent-results', `❌ MenuComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת פריטי תפריט
                const menuItems = menuComponent.getAllMenuItems();
                if (Array.isArray(menuItems) && menuItems.length > 0) {
                    addResult('menucomponent-results', '✅ MenuComponent.getAllMenuItems עובד', 'success');
                } else {
                    addResult('menucomponent-results', '❌ MenuComponent.getAllMenuItems לא עובד', 'error');
                }
                
                // בדיקת הוספת פריט תפריט
                const newMenuItem = {
                    id: 'test-item',
                    text: 'Test Item',
                    href: '/test',
                    icon: '🧪',
                    order: 99,
                    visible: true,
                    submenu: []
                };
                
                menuComponent.addMenuItem(newMenuItem);
                const addedItem = menuComponent.getMenuItem('test-item');
                
                if (addedItem && addedItem.id === 'test-item') {
                    addResult('menucomponent-results', '✅ MenuComponent.addMenuItem עובד', 'success');
                } else {
                    addResult('menucomponent-results', '❌ MenuComponent.addMenuItem לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = menuComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('menucomponent-results', '✅ MenuComponent.getInfo עובד', 'success');
                } else {
                    addResult('menucomponent-results', '❌ MenuComponent.getInfo לא עובד', 'error');
                }
                
                addResult('menucomponent-results', '✅ בדיקת MenuComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('menucomponent-results', `❌ שגיאה בבדיקת MenuComponent: ${error.message}`, 'error');
            }
        }
        
        function testFilterComponent() {
            clearResults('filtercomponent-results');
            addResult('filtercomponent-results', 'מתחיל בדיקת FilterComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof FilterComponent === 'undefined') {
                    addResult('filtercomponent-results', '❌ FilterComponent לא קיים', 'error');
                    return;
                }
                addResult('filtercomponent-results', '✅ FilterComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const filterComponent = new FilterComponent(headerSystem);
                
                if (filterComponent) {
                    addResult('filtercomponent-results', '✅ יצירת מופע FilterComponent עובד', 'success');
                } else {
                    addResult('filtercomponent-results', '❌ יצירת מופע FilterComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['setFilterValue', 'getFilterValue', 'getAllActiveFilters', 'resetFilters', 'clearFilters', 'getFilter', 'getAllFilters'];
                
                methods.forEach(method => {
                    if (typeof filterComponent[method] === 'function') {
                        addResult('filtercomponent-results', `✅ FilterComponent.${method} קיים`, 'success');
                    } else {
                        addResult('filtercomponent-results', `❌ FilterComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת פילטרים
                const filters = filterComponent.getAllFilters();
                if (Array.isArray(filters) && filters.length > 0) {
                    addResult('filtercomponent-results', '✅ FilterComponent.getAllFilters עובד', 'success');
                } else {
                    addResult('filtercomponent-results', '❌ FilterComponent.getAllFilters לא עובד', 'error');
                }
                
                // בדיקת הגדרת ערך פילטר
                filterComponent.setFilterValue('status', 'open');
                const statusValue = filterComponent.getFilterValue('status');
                
                if (statusValue === 'open') {
                    addResult('filtercomponent-results', '✅ FilterComponent.setFilterValue/getFilterValue עובד', 'success');
                } else {
                    addResult('filtercomponent-results', '❌ FilterComponent.setFilterValue/getFilterValue לא עובד', 'error');
                }
                
                // בדיקת פילטרים פעילים
                const activeFilters = filterComponent.getAllActiveFilters();
                if (activeFilters && typeof activeFilters === 'object') {
                    addResult('filtercomponent-results', '✅ FilterComponent.getAllActiveFilters עובד', 'success');
                } else {
                    addResult('filtercomponent-results', '❌ FilterComponent.getAllActiveFilters לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = filterComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('filtercomponent-results', '✅ FilterComponent.getInfo עובד', 'success');
                } else {
                    addResult('filtercomponent-results', '❌ FilterComponent.getInfo לא עובד', 'error');
                }
                
                addResult('filtercomponent-results', '✅ בדיקת FilterComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('filtercomponent-results', `❌ שגיאה בבדיקת FilterComponent: ${error.message}`, 'error');
            }
        }
        
        function testNavigationComponent() {
            clearResults('navigationcomponent-results');
            addResult('navigationcomponent-results', 'מתחיל בדיקת NavigationComponent...', 'info');
            
            try {
                // בדיקת קיום
                if (typeof NavigationComponent === 'undefined') {
                    addResult('navigationcomponent-results', '❌ NavigationComponent לא קיים', 'error');
                    return;
                }
                addResult('navigationcomponent-results', '✅ NavigationComponent קיים', 'success');
                
                // יצירת מופע
                const headerSystem = new HeaderSystem();
                const navigationComponent = new NavigationComponent(headerSystem);
                
                if (navigationComponent) {
                    addResult('navigationcomponent-results', '✅ יצירת מופע NavigationComponent עובד', 'success');
                } else {
                    addResult('navigationcomponent-results', '❌ יצירת מופע NavigationComponent לא עובד', 'error');
                }
                
                // בדיקת פונקציות
                const methods = ['goBack', 'goForward', 'refresh', 'goHome', 'navigateTo', 'navigateToReplace', 'canGoBack', 'canGoForward', 'getNavigationHistory', 'getCurrentHistoryItem'];
                
                methods.forEach(method => {
                    if (typeof navigationComponent[method] === 'function') {
                        addResult('navigationcomponent-results', `✅ NavigationComponent.${method} קיים`, 'success');
                    } else {
                        addResult('navigationcomponent-results', `❌ NavigationComponent.${method} לא קיים`, 'error');
                    }
                });
                
                // בדיקת היסטוריית ניווט
                const history = navigationComponent.getNavigationHistory();
                if (Array.isArray(history)) {
                    addResult('navigationcomponent-results', '✅ NavigationComponent.getNavigationHistory עובד', 'success');
                } else {
                    addResult('navigationcomponent-results', '❌ NavigationComponent.getNavigationHistory לא עובד', 'error');
                }
                
                // בדיקת מצב ניווט
                const canGoBack = navigationComponent.canGoBack();
                const canGoForward = navigationComponent.canGoForward();
                
                if (typeof canGoBack === 'boolean' && typeof canGoForward === 'boolean') {
                    addResult('navigationcomponent-results', '✅ NavigationComponent.canGoBack/canGoForward עובד', 'success');
                } else {
                    addResult('navigationcomponent-results', '❌ NavigationComponent.canGoBack/canGoForward לא עובד', 'error');
                }
                
                // בדיקת פריט נוכחי
                const currentItem = navigationComponent.getCurrentHistoryItem();
                if (currentItem && typeof currentItem === 'object') {
                    addResult('navigationcomponent-results', '✅ NavigationComponent.getCurrentHistoryItem עובד', 'success');
                } else {
                    addResult('navigationcomponent-results', '❌ NavigationComponent.getCurrentHistoryItem לא עובד', 'error');
                }
                
                // בדיקת getInfo
                const info = navigationComponent.getInfo();
                if (info && typeof info === 'object') {
                    addResult('navigationcomponent-results', '✅ NavigationComponent.getInfo עובד', 'success');
                } else {
                    addResult('navigationcomponent-results', '❌ NavigationComponent.getInfo לא עובד', 'error');
                }
                
                addResult('navigationcomponent-results', '✅ בדיקת NavigationComponent הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('navigationcomponent-results', `❌ שגיאה בבדיקת NavigationComponent: ${error.message}`, 'error');
            }
        }
        
        function testFunctionalComponentsIntegration() {
            clearResults('functional-integration-results');
            addResult('functional-integration-results', 'מתחיל בדיקת אינטגרציה בין רכיבים פונקציונליים...', 'info');
            
            try {
                // יצירת מערכת
                const headerSystem = new HeaderSystem();
                
                // יצירת רכיבים
                const menuComponent = new MenuComponent(headerSystem);
                const filterComponent = new FilterComponent(headerSystem);
                const navigationComponent = new NavigationComponent(headerSystem);
                
                // בדיקת אינטגרציה בין MenuComponent ו-FilterComponent
                menuComponent.setActiveItem('trades');
                const activeItem = menuComponent.getActiveItem();
                
                if (activeItem === 'trades') {
                    addResult('functional-integration-results', '✅ אינטגרציה בין MenuComponent ו-FilterComponent עובדת', 'success');
                } else {
                    addResult('functional-integration-results', '❌ אינטגרציה בין MenuComponent ו-FilterComponent לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה בין FilterComponent ו-NavigationComponent
                filterComponent.setFilterValue('status', 'open');
                const filterValue = filterComponent.getFilterValue('status');
                
                if (filterValue === 'open') {
                    addResult('functional-integration-results', '✅ אינטגרציה בין FilterComponent ו-NavigationComponent עובדת', 'success');
                } else {
                    addResult('functional-integration-results', '❌ אינטגרציה בין FilterComponent ו-NavigationComponent לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה בין NavigationComponent ו-MenuComponent
                const canGoBack = navigationComponent.canGoBack();
                const canGoForward = navigationComponent.canGoForward();
                
                if (typeof canGoBack === 'boolean' && typeof canGoForward === 'boolean') {
                    addResult('functional-integration-results', '✅ אינטגרציה בין NavigationComponent ו-MenuComponent עובדת', 'success');
                } else {
                    addResult('functional-integration-results', '❌ אינטגרציה בין NavigationComponent ו-MenuComponent לא עובדת', 'error');
                }
                
                // בדיקת אינטגרציה מלאה
                const allComponentsWorking = menuComponent && filterComponent && navigationComponent;
                
                if (allComponentsWorking) {
                    addResult('functional-integration-results', '✅ אינטגרציה מלאה בין כל הרכיבים הפונקציונליים עובדת', 'success');
                } else {
                    addResult('functional-integration-results', '❌ אינטגרציה מלאה בין כל הרכיבים הפונקציונליים לא עובדת', 'error');
                }
                
                addResult('functional-integration-results', '✅ בדיקת אינטגרציה הושלמה בהצלחה', 'success');
                
            } catch (error) {
                addResult('functional-integration-results', `❌ שגיאה בבדיקת אינטגרציה: ${error.message}`, 'error');
            }
        }
        
        // בדיקה אוטומטית בטעינת העמוד
        window.addEventListener('load', () => {
            addResult('menucomponent-results', 'עמוד נטען - מוכן לבדיקות רכיבים פונקציונליים', 'info');
        });
    </script>
</body>
</html>
