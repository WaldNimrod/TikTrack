</head>
<body class="index-page">
    <!-- Header -->
    <div id="unified-header"></div>
    
    <!-- Main Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Top Section -->
            <div class="top-section" data-section="top">
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/home.svg" alt="דף הבית" class="section-icon">
                        דף הבית - TikTrack
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-primary">כפתור</button>
                        <button class="btn btn-outline-warning">הצג/הסתר</button>
                    </div>
                </div>
                <div class="section-body">
                    <active-alerts></active-alerts>
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ טריידים: <strong id="totalTrades">0</strong></div>
                        <div>סה"כ התראות: <strong id="totalAlerts">0</strong></div>
                        <div>יתרה נוכחית: <strong id="currentBalance">$0</strong></div>
                        <div>רווח/הפסד: <strong id="totalPnL">$0</strong></div>
                    </div>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="main-content">
                <div class="content-section" id="main">
                    <div class="section-header">
                        <div class="table-title">

                            לוח בקרה
                        </div>
                        <div class="table-count" id="dashboardCount">טוען...</div>
                        <div class="table-actions">
                            <button class="btn btn-outline-warning">הצג/הסתר</button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- Recent Trades and Active Alerts -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>טריידים אחרונים</h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="recentTrades">טוען טריידים...</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>התראות פעילות</h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="activeAlerts">טוען התראות...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Charts Row 1 -->
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>סטטוס טריידים</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="tradesStatusChart" width="300" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>חשבונות</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="accountChart" width="300" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>גרף מעורב</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="mixedChart" width="300" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Performance Chart -->
                        <div class="row mt-3">
                            <div class="col-md-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>ביצועים</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="performanceChart" width="400" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Spacer -->
    <div style="height: 3rem;"></div>
    
    <!-- Notification Containers -->
    <div class="notification-container" id="notificationContainer"></div>
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js?v=0da3519a_20251102_104906"></script>

    <!-- 🔓 TEMPLATE ZONE 6 - Page-Specific Scripts (ADD NEW SCRIPTS HERE) -->

        // Smart initialization - Enhanced TikTrack
        if (window.smartAppInit) {
            window.smartAppInit.initialize({
                name: 'index',

                packages: ['graphs', 'monitoring', 'advanced-notifications'],
                features: ['charts-system', 'real-time-updates'],
                customInit: 'initializeIndexPage' // Assuming this function exists in index.js
            });
        }
    </script>
    
    <!-- Page-specific Script -->
    <script src="scripts/index.js?v=0da3519a_20251102_104906"></script>
