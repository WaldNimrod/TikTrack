<body class="index-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Dashboard area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <h1>
                        <img src="images/icons/home.svg" alt="דף הבית" class="section-icon">
                        דף הבית - TikTrack
                    </h1>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים מדף הבית">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור דף הבית">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Dashboard summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ טריידים: <strong id="totalTrades">0</strong></div>
                        <div>סה"כ התראות: <strong id="totalAlerts">0</strong></div>
                        <div>יתרה נוכחית: <strong id="currentBalance">$0</strong></div>
                        <div>רווח/הפסד: <strong id="totalPnL">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Dashboard management area - content-section -->
                <div class="content-section" id="main" data-section="main">
                    <!-- Dashboard header -->
                    <div class="section-header">
                        <h2>
                            <img src="images/icons/home.svg" alt="לוח בקרה" class="section-icon">
                            לוח בקרה
                            <span class="table-count" id="dashboardCount">טוען...</span>
                        </h2>
                        <div class="header-actions">
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור לוח בקרה">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Dashboard content -->
                    <div class="section-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>טריידים אחרונים</h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="recentTrades">טוען טריידים...</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>התראות פעילות</h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="activeAlerts">טוען התראות...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>סטטוס טריידים</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="tradesStatusChart" width="400" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>חשבונות</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="accountChart" width="400" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>ביצועים</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="performanceChart" width="400" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>גרף מעורב</h5>
                                    </div>
                                    <div class="card-body">
                                        <canvas id="mixedChart" width="400" height="200"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== DYNAMIC LOADING SYSTEM ===== -->
    
    <!-- Core Systems (Always Required) -->
    <script src="scripts/modules/core-systems.js?v=20251006"></script>

    <script src="scripts/modules/dynamic-loader-config.js?v=20251006"></script>

    <script src="scripts/page-initialization-configs.js?v=20251001"></script>

    <script src="scripts/global-favicon.js?v=20251001"></script>
    <script src="scripts/translation-utils.js?v=20251001"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    <script src="scripts/date-utils.js?v=20251001"></script>
    <script src="scripts/button-icons.js?v=20251001"></script>
    <script src="scripts/page-utils.js?v=20251001"></script>
    <script src="scripts/preferences.js?v=20251001"></script>
    <script src="scripts/notification-category-detector.js?v=20251001"></script>
    <script src="scripts/global-notification-collector.js?v=20251001"></script>
    <script src="scripts/system-management.js?v=20251001"></script>
    <script src="scripts/entity-details-modal.js?v=20251001"></script>
    <script src="scripts/warning-system.js?v=20251001"></script>
    <script src="scripts/color-demo-toggle.js?v=20251001"></script>
    <script src="scripts/console-cleanup.js?v=20251001"></script>
    <script src="scripts/data-collector.js?v=20251001"></script>
    <script src="scripts/linked-items.js?v=20251001"></script>
    <script src="scripts/notification-system-tester.js?v=20251001"></script>
    
    <!-- Chart System Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/charts/chart-loader.js?v=20251001"></script>
    <script src="scripts/charts/chart-theme.js?v=20251001"></script>
    <script src="scripts/charts/chart-system.js?v=20251001"></script>
    <script src="scripts/charts/chart-export.js?v=20251001"></script>
    <script src="scripts/charts/adapters/trades-adapter.js?v=20251001"></script>
    <script src="scripts/charts/adapters/performance-adapter.js?v=20251001"></script>
    <script src="scripts/charts/adapters/linter-adapter.js?v=20251001"></script>
    
    <!-- Stage 9: Page-specific Script -->
    <script src="scripts/index.js?v=20251001"></script>
    
    <!-- Local copyDetailedLog function for index page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
