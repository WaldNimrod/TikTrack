<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מערכת אתחול - TikTrack</title>
    
    <link rel="stylesheet" href="styles-new/master.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="init-system-page">
    <div id="unified-header"></div>
    
    <div class="background-wrapper">
        <div class="page-body">
            <div class="main-content">
                <!-- סטטוס מערכת -->
                <div class="content-section">
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/server.svg" alt="ניהול מערכת אתחול" class="section-icon">
                            ניהול מערכת אתחול
                        </div>
                    </div>
                    <div class="section-body">
                        <div id="systemStatus" class="system-status">
                            <div class="status-loading">
                                <i class="fas fa-spinner fa-spin"></i>
                                טוען סטטוס מערכת...
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- כלי בדיקה -->
                <div class="content-section">
                    <div class="section-header">
                        <h2>🔍 כלי בדיקה</h2>
                    </div>
                    <div class="section-body">
                        <div class="tools-grid">
                            <button onclick="runValidator()" class="btn btn-primary tool-btn">
                                <i class="fas fa-check-circle"></i>
                                הרץ בדיקות תקינות
                            </button>
                            <button onclick="analyzeScripts()" class="btn btn-info tool-btn">
                                <i class="fas fa-search"></i>
                                נתח סקריפטים
                            </button>
                            <button onclick="showPerformance()" class="btn btn-success tool-btn">
                                <i class="fas fa-chart-line"></i>
                                דוח ביצועים
                            </button>
                            <button onclick="showPackageStats()" class="btn btn-warning tool-btn">
                                <i class="fas fa-boxes"></i>
                                סטטיסטיקות חבילות
                            </button>
                        </div>
                        <div id="toolsResults" class="tools-results mt-3"></div>
                    </div>
                </div>
                
                <!-- יוצר עמוד חדש -->
                <div class="content-section">
                    <div class="section-header">
                        <h2>✨ יוצר עמוד חדש</h2>
                    </div>
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">שם עמוד:</label>
                                <input type="text" id="newPageName" class="form-control" placeholder="my-new-page">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">חבילות:</label>
                                <div id="packagesCheckboxes" class="packages-checkboxes"></div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <button onclick="generatePage()" class="btn btn-primary">
                                <i class="fas fa-magic"></i>
                                יצור HTML
                            </button>
                            <button onclick="generateConfig()" class="btn btn-secondary">
                                <i class="fas fa-cog"></i>
                                יצור Config
                            </button>
                            <button onclick="generateJavaScript()" class="btn btn-info">
                                <i class="fas fa-code"></i>
                                יצור JavaScript
                            </button>
                        </div>
                        <div id="generatedContent" class="generated-content mt-3"></div>
                    </div>
                </div>
                
                <!-- Package Manifest -->
                <div class="content-section">
                    <div class="section-header">
                        <h2>📦 חבילות מערכת</h2>
                    </div>
                    <div class="section-body">
                        <div id="packagesList" class="packages-list">
                            <div class="loading">
                                <i class="fas fa-spinner fa-spin"></i>
                                טוען רשימת חבילות...
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- דוח ביצועים -->
                <div class="content-section">
                    <div class="section-header">
                        <h2>📊 דוח ביצועים</h2>
                    </div>
                    <div class="section-body">
                        <div id="performanceReport" class="performance-report">
                            <div class="loading">
                                <i class="fas fa-spinner fa-spin"></i>
                                טוען דוח ביצועים...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="scripts/init-system/package-manifest.js?v=1.0.0" defer></script>
        <script src="scripts/init-system/validators/runtime-validator.js?v=1.0.0" defer></script>
        <script src="scripts/init-system/dev-tools/script-analyzer.js?v=1.0.0" defer></script>
        <script src="scripts/init-system/dev-tools/page-template-generator.js?v=1.0.0" defer></script>
        <script src="scripts/init-system-management.js?v=1.0.0" defer></script>
</body>
</html>
