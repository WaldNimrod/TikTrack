<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ניטור Linter בזמן אמת - TikTrack</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles/apple-theme.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/header-system.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="styles/table.css">
    <link rel="stylesheet" href="styles/notification-system.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="page-body">
        <!-- unified-header auto-generated -->
        <div id="unified-header"></div>
        
        <div class="monitor-dashboard">
            <div class="dashboard-header">
                <h1 class="dashboard-title">🔍 ניטור Linter בזמן אמת</h1>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span class="status-text">מתחבר...</span>
                </div>
            </div>

            <!-- Statistics Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <h3 class="stat-title">שגיאות</h3>
                        <i class="stat-icon bi bi-exclamation-triangle text-danger"></i>
                    </div>
                    <div class="stat-value" id="errorCount">0</div>
                    <div class="stat-change neutral" id="errorChange">+0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <h3 class="stat-title">אזהרות</h3>
                        <i class="stat-icon bi bi-exclamation-circle text-warning"></i>
                    </div>
                    <div class="stat-value" id="warningCount">0</div>
                    <div class="stat-change neutral" id="warningChange">+0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <h3 class="stat-title">הצלחות</h3>
                        <i class="stat-icon bi bi-check-circle text-success"></i>
                    </div>
                    <div class="stat-value" id="successCount">0</div>
                    <div class="stat-change neutral" id="successChange">+0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <h3 class="stat-title">קבצים נסרקו</h3>
                        <i class="stat-icon bi bi-file-text text-info"></i>
                    </div>
                    <div class="stat-value" id="filesScanned">0</div>
                    <div class="stat-change neutral" id="filesChange">+0</div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="chart-section">
                <h2 class="chart-title">
                    <i class="bi bi-graph-up"></i>
                    סטטיסטיקות Linter
                </h2>
                <div class="chart-container">
                    <canvas id="linterChart"></canvas>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-section">
                <h2 class="chart-title">
                    <i class="bi bi-gear"></i>
                    הגדרות ניטור
                </h2>
                <div class="controls-grid">
                    <div class="control-group">
                        <label class="control-label">תדירות סריקה (שניות)</label>
                        <input type="number" class="control-input" id="scanInterval" value="5" min="1" max="60">
                    </div>
                    <div class="control-group">
                        <label class="control-label">רמת לוג</label>
                        <select class="control-select" id="logLevel">
                            <option value="error">שגיאות בלבד</option>
                            <option value="warning" selected>אזהרות ושגיאות</option>
                            <option value="info">כל ההודעות</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label class="control-label">תיקיות לסריקה</label>
                        <input type="text" class="control-input" id="scanPaths" value="trading-ui/">
                    </div>
                </div>
                <div class="controls-grid">
                    <button class="btn btn-primary" id="startMonitoring">
                        <i class="bi bi-play-fill"></i> התחל ניטור
                    </button>
                    <button class="btn btn-secondary" id="stopMonitoring" disabled>
                        <i class="bi bi-stop-fill"></i> עצור ניטור
                    </button>
                    <button class="btn btn-success" id="clearLogs">
                        <i class="bi bi-trash"></i> נקה לוגים
                    </button>
                    <button class="btn btn-danger" id="exportLogs">
                        <i class="bi bi-download"></i> ייצא לוגים
                    </button>
                </div>
            </div>

            <!-- Logs Section -->
            <div class="logs-section">
                <div class="logs-header">
                    <h2 class="logs-title">
                        <i class="bi bi-terminal"></i>
                        לוגי Linter
                    </h2>
                    <div class="logs-controls">
                        <div class="refresh-toggle" id="autoRefreshToggle">
                            <span class="toggle-label">רענון אוטומטי</span>
                        </div>
                    </div>
                </div>
                <div class="logs-container" id="logsContainer">
                    <div class="log-entry">
                        <span class="log-timestamp">[00:00:00]</span>
                        <span class="log-level info">[INFO]</span>
                        <span class="log-message">מערכת ניטור Linter אותחלה</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="scripts/console-cleanup.js"></script>
    <script src="scripts/header-system.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/linter-realtime-monitor.js"></script>
</body>
</html>
