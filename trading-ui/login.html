<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - TikTrack</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css">
    
    <style>
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Hebrew', sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            margin: 2rem;
            border: 1px solid #e0e0e0;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo {
            margin-bottom: 1.5rem;
        }
        
        .login-logo img {
            max-width: 200px;
            height: auto;
        }
        
        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--apple-text-primary, #000);
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: var(--apple-text-secondary, #666);
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--apple-text-primary, #000);
            text-align: right;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--apple-border, #C6C6C8);
            border-radius: 8px;
            font-size: 1rem;
            direction: rtl;
            text-align: right;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--apple-blue, #007AFF);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--apple-blue, #007AFF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background: #0051D5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            direction: rtl;
        }
        
        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .remember-me label {
            cursor: pointer;
            color: var(--apple-text-secondary, #666);
        }
        
        .login-error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .login-success {
            background: #efe;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--apple-border, #C6C6C8);
        }
        
        .register-link a {
            color: var(--apple-blue, #007AFF);
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <!-- Login form will be inserted here by auth.js -->
    </div>
    
    <!-- Scripts -->
    <script src="scripts/auth.js"></script>
    <script>
        // Initialize login interface when page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                // Already logged in - redirect to dashboard
                window.location.href = 'index.html';
                return;
            }
            
            // Create login interface
            if (typeof createLoginInterface === 'function') {
                createLoginInterface('loginContainer', function() {
                    // On successful login, redirect to dashboard
                    window.location.href = 'index.html';
                });
            } else {
                // Fallback if auth.js is not loaded
                document.getElementById('loginContainer').innerHTML = `
                    <div class="login-header">
                        <div class="login-logo">
                            <img src="images/logo.svg" alt="TikTrack Logo" />
                        </div>
                        <h1 class="login-title">ברוכים הבאים ל-TikTrack</h1>
                        <p class="login-subtitle">מערכת ניהול השקעות מתקדמת</p>
                    </div>
                    <div class="alert alert-danger">
                        שגיאה בטעינת מערכת ההתחברות. אנא רענן את הדף.
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
