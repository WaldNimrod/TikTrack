    <script>
        // Auto-initialize HeaderSystem when DOM is ready
        (function() {
            function initHeader() {
                if (typeof window.HeaderSystem !== 'undefined' && typeof window.HeaderSystem.initialize === 'function') {
                    try {
                        window.HeaderSystem.initialize();
                    } catch (error) {
                        if (window.console && window.console.error) {
                            window.console.error('Error initializing HeaderSystem:', error);
                        }
                    }
                } else {
                    setTimeout(initHeader, 100);
                }
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initHeader);
            } else {
                setTimeout(initHeader, 100);
            }
        })();
    </script>

        <!-- ===== TEMPLATE ZONE 1: BACKGROUND WRAPPER (LOCKED) ===== -->
<div class="background-wrapper">
        <!-- ===== TEMPLATE ZONE 2: HEADER SYSTEM (LOCKED - DO NOT TOUCH) ===== -->

            <!-- ===== TEMPLATE ZONE 4: MAIN CONTENT (EDITABLE) ===== -->
            <div class="main-content">
                <!-- Header Section -->
                <div class="content-section"  data-section="economic_calendar_page-פילטרים">
                    <div class="section-header">
                        <h2><span class="icon-placeholder" data-icon="info-circle" data-size="16"></span> פילטרים</h2>
                        <div class="header-actions">
                            <button class="filter-toggle-btn" data-onclick="toggleSection('economic_calendar_page-פילטרים')" title="הצג/הסתר סקשן" data-button-type="FILTER">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="countryFilter" class="form-label">מדינה:</label>
                                        <select id="countryFilter" class="form-select" multiple>
                                            <option value="US" selected>ארה"ב</option>
                                            <option value="EU">אירופה</option>
                                            <option value="UK">בריטניה</option>
                                            <option value="JP">יפן</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="importanceFilter" class="form-label">חשיבות:</label>
                                        <select id="importanceFilter" class="form-select" multiple>
                                            <option value="high" selected>גבוהה</option>
                                            <option value="medium" selected>בינונית</option>
                                            <option value="low">נמוכה</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="eventTypeFilter" class="form-label">סוג אירוע:</label>
                                        <select id="eventTypeFilter" class="form-select" multiple>
                                            <option value="interest-rate" selected>ריבית</option>
                                            <option value="gdp" selected>תוצר</option>
                                            <option value="employment">תעסוקה</option>
                                            <option value="inflation">אינפלציה</option>
                                        </select>
                                    
                    </div>
                </div>
                        </div>
                        
                        <!-- Calendar View Section -->
                <div class="content-section"  data-section="economic_calendar_page-אירועים-כלכליים">
                    <div class="section-header">
                        <h2><span class="icon-placeholder" data-icon="info-circle" data-size="16"></span> אירועים כלכליים</h2>
                        <div class="header-actions">
                            <button class="filter-toggle-btn" data-onclick="toggleSection('economic_calendar_page-אירועים-כלכליים')" title="הצג/הסתר סקשן" data-button-type="FILTER">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- Save Event Button (shown after widget loads) -->
                        <div id="save-event-controls" class="mb-3 mockup-hidden">
                            <button id="save-event-from-widget-btn" class="btn btn-primary btn-sm" data-button-type="SAVE">
                                <span class="icon-placeholder" data-icon="bookmark" data-size="16"></span>
                                שמור אירוע נבחר
                            </button>
                            <small class="text-muted ms-2">לחץ על אירוע בווידג'ט ואז לחץ על הכפתור לשמירה</small>
                        </div>
                        
                        <!-- TradingView Economic Calendar Widget Container -->
                        <div id="economic-calendar-widget-container" class="economic-calendar-widget-wrapper">
                            <!-- Loading State -->
                            <div id="economic-calendar-loading" class="economic-calendar-loading text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">טוען...</span>
                                </div>
                                <p class="mt-3 text-muted">טוען לוח שנה כלכלי...</p>
                            </div>
                            
                            <!-- Error State (hidden by default) -->
                            <div id="economic-calendar-error" class="economic-calendar-error alert alert-danger hidden" role="alert">
                                <span class="icon-placeholder" data-icon="alert-circle" data-size="16"></span>
                                <strong>שגיאה בטעינת לוח השנה הכלכלי:</strong>
                                <span id="economic-calendar-error-message"></span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Saved Events Section -->
