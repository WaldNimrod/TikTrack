<!DOCTYPE html>
<html lang="he" dir="rtl" class="modal-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשומת יומן - TikTrack</title>
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="../../../../trading-ui/styles-new/master.css">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css">
    
    <!-- Header Styles -->
    <link rel="stylesheet" href="../../../../trading-ui/styles-new/header-styles.css">
    
    <style>
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
        }
        
        /* Modal Container */
        .modal-container {
            background: white;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        
        /* Modal Header */
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c757d;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .modal-close:hover {
            background: #f8f9fa;
            color: #000;
        }
        
        /* Modal Body */
        .modal-body {
            padding: 1.5rem;
        }
        
        /* Modal Footer */
        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
    </style>
</head>
<body class="modal-page">
    <!-- Modal Overlay -->
    <div class="modal-overlay">
        <div class="modal-container">
            <!-- Modal Header -->
            <div class="modal-header">
                <h2 class="modal-title">רשומת יומן חדשה</h2>
                <button class="modal-close" onclick="window.close()">×</button>
            </div>
            
            <!-- Modal Body -->
            <div class="modal-body">
                <!-- Date and Time -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="entryDate" class="form-label">תאריך:</label>
                        <input type="date" id="entryDate" class="form-control" value="2025-01-15">
                    </div>
                    <div class="col-md-6">
                        <label for="entryTime" class="form-label">שעה:</label>
                        <input type="time" id="entryTime" class="form-control" value="14:30">
                    </div>
                </div>
                
                <!-- Link to Trade/Plan -->
                <div class="mb-3">
                    <label for="linkedTrade" class="form-label">קישור לטרייד/תוכנית:</label>
                    <select id="linkedTrade" class="form-select">
                        <option value="">אין קישור</option>
                        <option value="123">Trade #123 - AAPL</option>
                        <option value="124">Trade #124 - TSLA</option>
                        <option value="plan-1">Plan #1 - MSFT</option>
                    </select>
                </div>
                
                <!-- Emotional Tracking -->
                <div class="mb-3">
                    <label class="form-label">תיעוד רגשי:</label>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-emoji-laughing"></i> שמח
                        </button>
                        <button class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-emoji-smile"></i> מרוצה
                        </button>
                        <button class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-emoji-neutral"></i> ניטרלי
                        </button>
                        <button class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-emoji-frown"></i> עצוב
                        </button>
                        <button class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-emoji-angry"></i> כועס
                        </button>
                    </div>
                </div>
                
                <!-- Notes and Analysis -->
                <div class="mb-3">
                    <label for="entryNotes" class="form-label">הערות וניתוח:</label>
                    <div id="entryNotes" style="min-height: 200px; border: 1px solid #ced4da; border-radius: 4px;">
                        <!-- Rich Text Editor would go here (Quill) -->
                        <p>ניתוח טרייד AAPL - כניסה טובה, יציאה מוקדמת מדי. צריך לשפר את ניהול הסיכון.</p>
                    </div>
                </div>
                
                <!-- Tags -->
                <div class="mb-3">
                    <label for="entryTags" class="form-label">תגיות:</label>
                    <input type="text" id="entryTags" class="form-control" placeholder="הזן תגיות מופרדות בפסיקים (למשל: ניתוח, למידה, שיפור)">
                    <small class="text-muted">תגיות קיימות: ניתוח, למידה, שיפור, הצלחה, כישלון</small>
                </div>
                
                <!-- Images/Charts -->
                <div class="mb-3">
                    <label class="form-label">תמונות/גרפים:</label>
                    <div class="border rounded p-3" style="background: #f8f9fa;">
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-upload"></i> העלה תמונה
                            </button>
                            <button class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-graph-up"></i> הוסף גרף
                            </button>
                        </div>
                        <div class="mt-2">
                            <small class="text-muted">ניתן להעלות תמונות או להוסיף גרפים מהטרייד</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="window.close()">ביטול</button>
                <button class="btn btn-primary">שמור</button>
            </div>
        </div>
    </div>
</body>
</html>
