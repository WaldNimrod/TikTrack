    <script>
        // Auto-initialize HeaderSystem when DOM is ready
        (function() {
            function initHeader() {
                if (typeof window.HeaderSystem !== 'undefined' && typeof window.HeaderSystem.initialize === 'function') {
                    try {
                        window.HeaderSystem.initialize();
                    } catch (error) {
                        if (window.Logger?.error) {
                            window.Logger.error('Error initializing HeaderSystem', error, { page: 'price-history-page' });
                        }
                    }
                } else {
                    setTimeout(initHeader, 100);
                }
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initHeader);
            } else {
                setTimeout(initHeader, 100);
            }
        })();
    </script>

    <!-- Initialize Preferences System and Dynamic Colors -->
    <script>
        // Initialize only once
        let isPageInitialized = false;
        
        document.addEventListener('DOMContentLoaded', async () => {
            if (isPageInitialized) {
                if (window.Logger) {
                    window.Logger.info('⏸️ Page already initialized, skipping...', { page: 'price-history-page' });
                }
                return;
            }
            
            isPageInitialized = true;
            
            try {
                if (window.PreferencesCore && typeof window.PreferencesCore.initializeWithLazyLoading === 'function') {
                    await window.PreferencesCore.initializeWithLazyLoading();
                }
            } catch (error) {
                if (window.Logger) {
                    window.Logger.warn('Preferences initialization failed (non-critical)', { page: 'price-history-page', error });
                }
            }
        });
        
        // Also try immediate execution if DOM is already loaded
        if (document.readyState === 'loading') {
            // DOM is still loading, waiting for DOMContentLoaded...
        } else {
            // DOM already loaded, trigger manually
            setTimeout(() => {
                if (!isPageInitialized) {
                    document.dispatchEvent(new Event('DOMContentLoaded'));
                }
            }, 100);
        }
    </script>
