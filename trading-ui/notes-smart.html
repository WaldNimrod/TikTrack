<body class="notes-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <div class="main-content">
                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h2><i class="bi bi-journal-text"></i> הערות</h2>
                            <div class="section-header-controls">
                                <button class="btn btn-primary btn-sm" onclick="window.addNewNote()" id="addNoteBtn">
                                    <i class="bi bi-plus-circle"></i> הוסף הערה
                                </button>
                                <button class="btn btn-outline-secondary btn-sm" onclick="window.toggleSection('infoSummary')" id="toggleInfoBtn">
                                    <i class="bi bi-chevron-down"></i>
                                </button>
                                <button class="btn btn-outline-secondary btn-sm" onclick="window.toggleAllSections()" id="toggleAllBtn">
                                    <i class="bi bi-arrows-expand"></i> פתח/סגור הכל
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="section-body" id="infoSummary">
                    <div class="card">
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <div class="text-center">
                                        <small class="text-muted">סה"כ הערות</small>
                                        <div id="totalNotesCount" class="fw-bold">טוען...</div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="text-center">
                                        <small class="text-muted">הערות פעילות</small>
                                        <div id="activeNotesCount" class="fw-bold">טוען...</div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="text-center">
                                        <small class="text-muted">הערות מועדפות</small>
                                        <div id="favoriteNotesCount" class="fw-bold">טוען...</div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="text-center">
                                        <small class="text-muted">סטטוס מערכת</small>
                                        <div id="systemStatus" class="text-success fw-bold">פעיל</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section Top End -->  

                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="section1">
                    <div class="section-header">
                        <h2>📝 ניהול הערות</h2>
                        <button class="btn btn-outline-warning" onclick="window.toggleSection('section1')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label class="form-label">חיפוש הערות</label>
                                    <div class="input-group">
                                        <input type="text" id="notesSearch" class="form-control" placeholder="חפש בהערות...">
                                        <button class="btn btn-outline-secondary" type="button" onclick="window.searchNotes()">
                                            <i class="bi bi-search"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">סינון לפי קטגוריה</label>
                                    <select id="notesCategoryFilter" class="form-select" onchange="window.filterNotesByCategory()">
                                        <option value="all">כל הקטגוריות</option>
                                        <option value="trading">מסחר</option>
                                        <option value="analysis">ניתוח</option>
                                        <option value="ideas">רעיונות</option>
                                        <option value="reminders">תזכורות</option>
                                        <option value="other">אחר</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-12">
                                <div class="notes-list" id="notesList">
                                    <!-- Notes will be loaded here -->
                                    <div class="text-center text-muted py-4">
                                        <i class="bi bi-journal-text fs-1"></i>
                                        <p>טוען הערות...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 1 End -->   

                <!-- UI Content Section 2 Start-->
                <div class="content-section" id="section2">
                    <div class="section-header">
                        <h2>➕ הוספת הערה חדשה</h2>
                        <button class="btn btn-outline-warning" onclick="window.toggleSection('section2')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <form id="newNoteForm">
                            <div class="row">
                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label class="form-label">כותרת הערה</label>
                                        <input type="text" id="noteTitle" class="form-control" placeholder="הכנס כותרת להערה" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label class="form-label">קטגוריה</label>
                                        <select id="noteCategory" class="form-select" required>
                                            <option value="">בחר קטגוריה</option>
                                            <option value="trading">מסחר</option>
                                            <option value="analysis">ניתוח</option>
                                            <option value="ideas">רעיונות</option>
                                            <option value="reminders">תזכורות</option>
                                            <option value="other">אחר</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-12">
                                    <div class="mb-3">
                                        <label class="form-label">תוכן הערה</label>
                                        <textarea id="noteContent" class="form-control" rows="6" placeholder="הכנס את תוכן ההערה כאן..." required></textarea>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="noteFavorite">
                                            <label class="form-check-label" for="noteFavorite">
                                                הערה מועדפת
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="noteReminder">
                                            <label class="form-check-label" for="noteReminder">
                                                תזכורת
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row" id="reminderDateRow" style="display: none;">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">תאריך תזכורת</label>
                                        <input type="date" id="noteReminderDate" class="form-control">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">שעת תזכורת</label>
                                        <input type="time" id="noteReminderTime" class="form-control">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-12">
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-save"></i> שמור הערה
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary" onclick="window.clearNoteForm()">
                                            <i class="bi bi-arrow-clockwise"></i> נקה טופס
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- UI Content Section 2 End--> 

                <!-- UI Content Section 3 Start-->
                <div class="content-section" id="section3">
                    <div class="section-header">
                        <h2>📊 סטטיסטיקות הערות</h2>
                        <button class="btn btn-outline-warning" onclick="window.toggleSection('section3')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5 class="card-title mb-0">
                                            <i class="bi bi-pie-chart"></i> חלוקה לפי קטגוריות
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="categoryChart" class="text-center text-muted">
                                            <i class="bi bi-pie-chart fs-1"></i>
                                            <p>טוען נתונים...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5 class="card-title mb-0">
                                            <i class="bi bi-bar-chart"></i> הערות לפי חודש
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="monthlyChart" class="text-center text-muted">
                                            <i class="bi bi-bar-chart fs-1"></i>
                                            <p>טוען נתונים...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mt-3">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h5 class="card-title mb-0">
                                            <i class="bi bi-list-ul"></i> הערות אחרונות
                                        </h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="recentNotesList" class="text-center text-muted">
                                            <i class="bi bi-list-ul fs-1"></i>
                                            <p>טוען נתונים...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 3 End--> 
            </div>
            <!-- 🔒 LOCKED TEMPLATE ZONE 4 - End Main Content Container (DO NOT MODIFY) -->

    <!-- 🔓 TEMPLATE ZONE 6 - Page-Specific Scripts (ADD NEW SCRIPTS HERE) -->
    
    <!-- Notes Page Specific Scripts -->
    <script>
        // Notes page specific functions
        window.addNewNote = function() {
            // Scroll to the add note section
            document.getElementById('section2').scrollIntoView({ behavior: 'smooth' });
            // Focus on title input
            document.getElementById('noteTitle').focus();
        };

        window.searchNotes = function() {
            const searchTerm = document.getElementById('notesSearch').value;
            console.log('Searching notes for:', searchTerm);
            // Implementation for searching notes
        };

        window.filterNotesByCategory = function() {
            const category = document.getElementById('notesCategoryFilter').value;
            console.log('Filtering notes by category:', category);
            // Implementation for filtering notes
        };

        window.clearNoteForm = function() {
            document.getElementById('newNoteForm').reset();
            document.getElementById('reminderDateRow').style.display = 'none';
        };

        // Handle reminder checkbox change
        document.addEventListener('DOMContentLoaded', function() {
            const reminderCheckbox = document.getElementById('noteReminder');
            const reminderDateRow = document.getElementById('reminderDateRow');
            
            if (reminderCheckbox && reminderDateRow) {
                reminderCheckbox.addEventListener('change', function() {
                    reminderDateRow.style.display = this.checked ? 'block' : 'none';
                });
            }
        });

        // Handle form submission
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('newNoteForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('Note form submitted');
                    // Implementation for saving note
                });
            }
        });

        // Smart initialization - Enhanced TikTrack
        if (window.smartAppInitializer) {
            window.smartAppInitializer.initialize();
        }
    </script>
