<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Tik.track</title>

  <!-- 
    ===== Notes Page - TikTrack =====
    
    This page contains:
    1. Notes table - First section
    2. Accounts table - Second section (recently added)
    3. Alert cards - In the upper part
    4. Advanced filtering and sorting system
    
    Page structure:
    - app-header: Application header with navigation
    - page-body: Main content limited in width (1400px)
      - top-section: Alert cards and data summary
      - content-section (1): Notes table
      - content-section (2): Accounts table
    
    Recent changes:
    - Copying from trade plans page
    - Adding complete accounts table
    - Improving alert cards design
    - Fixing independent close buttons
    - Centralizing account functions in accounts.js
  -->

  <!-- CSS Files - Ordered by priority (weak to strong) -->
  <!-- 1. Apple theme (base) -->
  <link rel="stylesheet" href="styles/apple-theme.css">

  <!-- 2. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 3. General styles -->
  <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/header-system.css">
  <!-- 4. Typography -->
  <link rel="stylesheet" href="styles/typography.css">

  <!-- 5. Table styles -->
  <link rel="stylesheet" href="styles/table.css">

  <!-- 6. Header system styles (highest priority) -->

  <!-- 7. Warning system styles -->
  <link rel="stylesheet" href="styles/warning-system.css">

  <style>
    /* Quick filters styling */
    .quick-filters .btn.active {
      background-color: #007bff;
      color: white;
      border-color: #007bff;
    }

    .quick-filters .btn:hover {
      background-color: #0056b3;
      border-color: #0056b3;
      color: white;
    }

    .search-input-wrapper {
      position: relative;
    }

    .search-filter-input {
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
    }

    .search-filter-input:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      outline: 0;
    }

    /* Table row hover effect */
    #notesTable tbody tr:hover {
      background-color: rgba(0, 123, 255, 0.1);
      transition: background-color 0.2s ease;
    }

    /* Prevent action buttons from triggering row click */
    .actions-cell button {
      pointer-events: auto;
    }
  </style>

</head>

<body class="notes-page">
  <!-- General background -->
  <div class="background-wrapper">

    <!-- Application header -->
    <!-- Unified Header System -->
    <div id="unified-header-container"></div>

    <!-- Page body - All content after header -->
    <div class="page-body">
      <!-- Notes area - top-Section -->
      <div class="top-section">
        <!-- Main header -->
        <div class="section-header">
          <div class="table-title">
            <img src="images/icons/home.svg" alt="הערות"
              style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
            הערות
          </div>
          <div class="table-actions">
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="Show/hide notes area">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- Alert cards -->
        <div class="section-body">
          <active-alerts></active-alerts>

          <!-- Data summary -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ הערות: <strong id="totalNotes">0</strong></div>
            <div>הערות פעילות: <strong id="activeNotes">0</strong></div>
            <div>הערות חדשות: <strong id="recentNotes">0</strong></div>
            <div>סה"כ קישורים: <strong id="totalLinks">0</strong></div>
          </div>

          <!-- Quick filters -->
          <div class="quick-filters" style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-sm btn-outline-primary active" onclick="filterNotesByType('all')" data-type="all">
              הכל
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="filterNotesByType('account')" data-type="account">
              🏦 חשבונות
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="filterNotesByType('trade')" data-type="trade">
              📈 טריידים
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="filterNotesByType('trade_plan')"
              data-type="trade_plan">
              📋 תוכניות
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="filterNotesByType('ticker')" data-type="ticker">
              📊 טיקרים
            </button>
          </div>
        </div>
      </div> <!-- End top-section -->

      <!-- Main content -->
      <div class="main-content">

        <!-- Notes area - content-section -->
        <div class="content-section notes-page">
          <!-- Notes header -->
          <div class="section-header">
            <div class="table-title">
              <img src="images/icons/home.svg" alt="ההערות שלי"
                style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
              ההערות שלי
            </div>
            <div class="table-count">9 הערות</div>
            <div class="table-actions">
              <!-- Search functionality -->
              <div class="search-input-wrapper" style="margin-left: 10px;">
                <input type="text" class="search-filter-input" placeholder="חיפוש בהערות..."
                  onkeyup="filterNotesData(this.value)" style="width: 200px;">
              </div>
              <button class="refresh-btn" onclick="loadNotesData()" title="רענן נתונים">
                <img src="images/icons/home.svg" alt="רענן" class="action-icon" style="width: 16px; height: 16px;">
                רענן
              </button>
              <button class="refresh-btn" onclick="openNoteDetails()" title="הוסף הערה חדשה">
                <img src="images/icons/home.svg" alt="הוסף" class="action-icon" style="width: 16px; height: 16px;">
                הוסף
              </button>
              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור הערות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- Notes table -->
          <div class="section-body">
            <div class="table-responsive" id="notesContainer">
              <table class="table" data-table-type="notes">
                <thead>
                  <tr>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        סימבול <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        קשור ל <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        תוכן <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        קובץ מצורף <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); } else { console.error('sortTable function not found'); }"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        נוצר ב <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="actions-cell">
                      פעולות
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="6" class="text-center text-danger">
                      <div style="padding: 20px;">
                        <h5>⚠️ שגיאה בטעינת נתונים</h5>
                        <p>לא ניתן לטעון נתוני הערות מהשרת</p>
                        <p><small>פרטי השגיאה: פונקציית טעינת נתונים לא מוגדרת</small></p>
                        <button class="btn btn-sm btn-primary" onclick="loadNotesData()">נסה שוב</button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- End page-body -->

    <!-- Bottom page spacing -->
    <div class="bottom-spacer"></div>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Add Note Modal -->
    <div class="modal fade" id="addNoteModal" tabindex="-1" aria-labelledby="addNoteModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="addNoteModalLabel">הוסף הערה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addNoteForm">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">הערה עבור: <span class="text-danger">*</span></label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationTicker" value="4" required
                            onchange="onNoteRelationTypeChange()" checked>
                          <label for="noteRelationTicker">טיקר</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationTradePlan" value="3" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="noteRelationTradePlan">תוכנית טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationTrade" value="2" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="noteRelationTrade">טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationAccount" value="1" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="noteRelationAccount">חשבון</label>
                        </div>
                        <div class="invalid-feedback" id="relationTypeError"></div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="noteRelatedObjectSelect" style="width: 100%;" required>
                          <option value="">בחר אובייקט לשיוך...</option>
                        </select>
                        <div class="invalid-feedback" id="relatedObjectError"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label for="noteContent" class="form-label">תוכן ההערה <span class="text-danger">*</span></label>
                    <!-- עורך טקסט עשיר -->
                    <div class="rich-text-editor">
                      <div class="editor-toolbar">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('bold')"
                          title="מודגש">
                          <strong>B</strong>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('italic')"
                          title="נטוי">
                          <em>I</em>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('underline')"
                          title="קו תחתון">
                          <u>U</u>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('strikethrough')" title="קו חוצה">
                          <s>S</s>
                        </button>
                        <span class="toolbar-separator">|</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h1')"
                          title="כותרת 1">H1</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h2')"
                          title="כותרת 2">H2</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h3')"
                          title="כותרת 3">H3</button>
                        <span class="toolbar-separator">|</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('ul')"
                          title="רשימה לא ממוספרת">•</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('ol')"
                          title="רשימה ממוספרת">1.</button>
                        <span class="toolbar-separator">|</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('link')"
                          title="הוסף קישור">🔗</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="clearFormatting()"
                          title="נקה עיצוב">🧹</button>
                      </div>
                      <div class="editor-content" id="noteContent" contenteditable="true"
                        style="min-height: 150px; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.75rem; background: white;"
                        placeholder="הקלד את תוכן ההערה כאן..."></div>
                    </div>
                    <div class="invalid-feedback" id="contentError"></div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="noteAttachment" class="form-label">קובץ מצורף</label>
                    <input type="file" class="form-control" id="noteAttachment"
                      accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-primary" onclick="saveNote()">שמור הערה</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Note Modal -->
    <div class="modal fade" id="editNoteModal" tabindex="-1" aria-labelledby="editNoteModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="editNoteModalLabel">ערוך הערה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editNoteForm">
              <input type="hidden" id="editNoteId">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">הערה עבור: <span class="text-danger">*</span></label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationTradePlan" value="3"
                            required onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationTradePlan">תוכנית טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationTrade" value="2" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationTrade">טרייד</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationAccount" value="1"
                            required onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationAccount">חשבון</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationTicker" value="4" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationTicker">טיקר</label>
                        </div>
                        <div class="invalid-feedback" id="editRelationTypeError"></div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="editNoteRelatedObjectSelect" style="width: 100%;" required>
                          <option value="">בחר אובייקט לשיוך...</option>
                        </select>
                        <div class="invalid-feedback" id="editRelatedObjectError"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label for="editNoteContent" class="form-label">תוכן ההערה <span
                        class="text-danger">*</span></label>
                    <!-- עורך טקסט עשיר -->
                    <div class="rich-text-editor">
                      <div class="editor-toolbar">
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('bold', 'edit')" title="מודגש">
                          <strong>B</strong>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('italic', 'edit')" title="נטוי">
                          <em>I</em>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('underline', 'edit')" title="קו תחתון">
                          <u>U</u>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('strikethrough', 'edit')" title="קו חוצה">
                          <s>S</s>
                        </button>
                        <span class="toolbar-separator">|</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('h1', 'edit')" title="כותרת 1">H1</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('h2', 'edit')" title="כותרת 2">H2</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('h3', 'edit')" title="כותרת 3">H3</button>
                        <span class="toolbar-separator">|</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('ul', 'edit')" title="רשימה לא ממוספרת">•</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('ol', 'edit')" title="רשימה ממוספרת">1.</button>
                        <span class="toolbar-separator">|</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                          onclick="formatText('link', 'edit')" title="הוסף קישור">🔗</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="clearFormatting('edit')"
                          title="נקה עיצוב">🧹</button>
                      </div>
                      <div class="editor-content" id="editNoteContent" contenteditable="true"
                        style="min-height: 150px; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.75rem; background: white;"
                        placeholder="הקלד את תוכן ההערה כאן..."></div>
                    </div>
                    <div class="invalid-feedback" id="editContentError"></div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editNoteAttachment" class="form-label">קובץ מצורף</label>
                    <input type="file" class="form-control" id="editNoteAttachment"
                      accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label class="form-label">קובץ מצורף נוכחי</label>
                    <div id="currentAttachmentDisplay" class="form-control-plaintext"
                      style="min-height: 38px; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.375rem 0.75rem; background: #f8f9fa;">
                      אין קובץ מצורף
                    </div>
                    <div class="mt-2" id="attachmentActions" style="display: none;">
                      <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeCurrentAttachment()">
                        🗑️ מחק קובץ
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-warning" onclick="replaceCurrentAttachment()">
                        🔄 החלף קובץ
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-primary" onclick="updateNoteFromModal()">שמור הערה</button>
          </div>
        </div>
      </div>
    </div>

    <!-- View Note Modal -->
    <div class="modal fade" id="viewNoteModal" tabindex="-1" aria-labelledby="viewNoteModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="viewNoteModalLabel">צפייה בהערה</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-md-12">
                <div class="mb-3">
                  <label class="form-label fw-bold">קשור ל:</label>
                  <div id="viewNoteRelated" class="form-control-plaintext"></div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-bold">תוכן:</label>
                  <div id="viewNoteContent" class="form-control-plaintext"
                    style="min-height: 100px; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.75rem; background: #f8f9fa;">
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-bold">קובץ מצורף:</label>
                  <div id="viewNoteAttachment" class="form-control-plaintext"></div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-bold">נוצר ב:</label>
                  <div id="viewNoteCreated" class="form-control-plaintext"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
            <button type="button" class="btn btn-primary" onclick="editCurrentNote()">ערוך</button>
          </div>
        </div>
      </div>
