<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הערות - Tik.track</title>

  <!-- 
    ===== דף הערות - TikTrack =====
    
    דף זה מכיל:
    1. טבלת הערות - הסקשן הראשון
    2. טבלת חשבונות - הסקשן השני (נוסף לאחרונה)
    3. כרטיסיות התראות - בחלק העליון
    4. מערכת פילטרים ומיון מתקדמת
    
    מבנה הדף:
    - app-header: כותרת האפליקציה עם ניווט
    - page-body: תוכן ראשי מוגבל ברוחב (1400px)
      - top-section: כרטיסיות התראות וסיכום נתונים
      - content-section (1): טבלת הערות
      - content-section (2): טבלת חשבונות
    
    שינויים אחרונים:
    - שיכפול מדף עיצובים
    - הוספת טבלת חשבונות מלאים
    - שיפור עיצוב כרטיסיות התראות
    - תיקון כפתורי סגירה עצמאיים
    - ריכוז פונקציות חשבונות ב-accounts.js
  -->

  <!-- Apple Theme CSS - בסיס כללי -->
  <link rel="stylesheet" href="styles/apple-theme.css">

  <!-- Main Styles - סגנונות הפרויקט -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- Menu CSS - תפריט -->
  <link rel="stylesheet" href="styles/menu.css">

  <!-- Grid Table CSS - טבלאות וגרידים -->
  <link rel="stylesheet" href="styles/grid-table.css">

  <!-- Typography CSS - טיפוגרפיה ופונטים -->
  <link rel="stylesheet" href="styles/typography.css">

  <!-- Bootstrap CSS - נטען אחרון כדי לא לדרוס הגדרות מותאמות -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- קבצים מודולריים של הגריד -->
  <script src="scripts/app-header.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/grid-filters.js"></script>
  <script src="scripts/alerts.js"></script>
  <script src="scripts/notes.js"></script>
</head>

<body>
  <!-- רקע כללי -->
  <div class="background-wrapper">

    <!-- כותרת האפליקציה -->
    <app-header></app-header>

    <!-- גוף הדף - כל התוכן אחרי הכותרת -->
    <div class="page-body">
      <!-- אזור הערות - top-Section -->
      <div class="top-section">
        <!-- כותרת ראשית -->
        <div class="section-header">
          <div class="table-title">
            📋 כותרת ראשית
          </div>
          <div class="table-actions">
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור הערות">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- כרטיסיות התראות -->
        <div class="section-body">
          <active-alerts></active-alerts>

          <!-- סיכום נתונים -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ הערות: <strong id="totalNotes">0</strong></div>
            <div>הערות פעילות: <strong id="activeNotes">0</strong></div>
            <div>הערות אחרונות: <strong id="recentNotes">0</strong></div>
            <div>סה"כ קישורים: <strong id="totalLinks">0</strong></div>
          </div>
        </div>
      </div> <!-- סוף top-section -->

      <!-- תוכן ראשי -->
      <div class="main-content">

        <!-- אזור הערות - content-section -->
        <div class="content-section">
          <!-- כותרת הערות -->
          <div class="section-header">
            <div class="table-title">
              📋 כותרת הסקשן
            </div>
            <div class="table-count">9 הערות</div>
            <div class="table-actions">
              <button class="refresh-btn" onclick="openNoteDetails()" title="הוסף הערה חדשה">
                <span class="action-icon">➕</span> הוסף
              </button>
              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור הערות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- טבלת הערות -->
          <div class="section-body">
            <div class="table-responsive" id="notesContainer">
              <table class="table" id="notesTable" data-table-type="notes">
                <thead>
                  <tr>
                    <th>תאריך<br><span class="header-subtitle">Date</span></th>
                    <th>תוכן<br><span class="header-subtitle">Content</span></th>
                    <th>מקושר ל<br><span class="header-subtitle">Related To</span></th>
                    <th>סוג<br><span class="header-subtitle">Type</span></th>
                    <th>סטטוס<br><span class="header-subtitle">Status</span></th>
                    <th class="actions-header">
                      פעולות
                      <br><span class="header-subtitle">Actions</span>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="6" class="text-center text-danger">
                      <div style="padding: 20px;">
                        <h5>⚠️ שגיאה בטעינת נתונים</h5>
                        <p>לא ניתן לטעון את נתוני ההערות מהשרת</p>
                        <p><small>פרטי השגיאה: פונקציית טעינת נתונים לא מוגדרת</small></p>
                        <button class="btn btn-sm btn-primary" onclick="loadNotesData()">נסה שוב</button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- סוף page-body -->

    <!-- מרווח בתחתית הדף -->
    <div class="bottom-spacer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- קבצים מודולריים -->
    <script src="scripts/notes.js"></script>
</body>

</html>
