<body class="notes-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Notes area - top-Section -->
            <div class="top-section notes-page" data-section="top">
                <!-- Main header -->
                <div class="section-header entity-note-main-header">
                    <h1>
                        <img src="images/icons/home.svg" alt="הערות" class="section-icon">
                        הערות
                    </h1>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים וההערות">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="Show/hide notes area">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ הערות: <strong id="totalNotes">0</strong></div>
                        <div>הערות פעילות: <strong id="activeNotes">0</strong></div>
                        <div>הערות חדשות: <strong id="recentNotes">0</strong></div>
                        <div>סה"כ קישורים: <strong id="totalLinks">0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Notes management area - content-section -->
                <div class="content-section notes-page" id="main" data-section="main">
                    <!-- Notes header -->
                    <div class="section-header entity-note-sub-header">
                        <h2>
                            <img src="images/icons/home.svg" alt="ניהול הערות" class="section-icon">
                            ניהול הערות
                        </h2>
                        <div class="header-actions">
                            <button id="addNoteBtn" class="refresh-btn" onclick="showAddNoteModal()" title="הוסף הערה חדשה">
                                <img src="images/icons/home.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול הערות">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Notes table -->
                    <div class="section-body">
                        <div class="table-responsive" id="notesContainer">
                            <table class="data-table notes-table" id="notesTable" data-table-type="notes">
                                <thead>
                                    <tr>
                                        <th class="col-ticker">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, notesData, 'notes', updateNotesTable); }">
                                                טיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-related-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, notesData, 'notes', updateNotesTable); }">
                                                קשור ל <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-content">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, notesData, 'notes', updateNotesTable); }">
                                                תוכן <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-attachment">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, notesData, 'notes', updateNotesTable); }">
                                                קובץ <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-created">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, notesData, 'notes', updateNotesTable); }">
                                                תאריך <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell">
                                            <span class="actions-header-icon">⋮</span>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6" class="loading">טוען הערות...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div class="page-bottom-spacing"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Note Modal -->
        <div class="modal fade" id="addNoteModal" tabindex="-1" aria-labelledby="addNoteModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-note">
                    <div class="modal-header entity-header entity-note">
                        <h4 class="modal-title entity-title">הוספת הערה חדשה</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addNoteForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="noteRelatedType" class="form-label entity-label">סוג קשר</label>
                                        <select class="form-select" id="noteRelationType" required>
                                            <option value="">בחר סוג קשר</option>
                                            <option value="1">חשבון</option>
                                            <option value="2">טרייד</option>
                                            <option value="3">תוכנית טרייד</option>
                                            <option value="4">טיקר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="noteRelatedId" class="form-label entity-label">מזהה פריט</label>
                                        <select class="form-select" id="noteRelationId" required disabled>
                                            <option value="">בחר קודם סוג קשר</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="noteContent" class="form-label entity-label">תוכן ההערה</label>
                                        <textarea class="form-control" id="noteContent" rows="6" placeholder="תוכן ההערה..." required></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="noteAttachment" class="form-label entity-label">קובץ מצורף (אופציונלי)</label>
                                        <input type="file" class="form-control" id="noteAttachment" accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-entity btn-entity-note" onclick="addNote()">הוסף הערה</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Note Modal -->
        <div class="modal fade" id="editNoteModal" tabindex="-1" aria-labelledby="editNoteModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-note">
                    <div class="modal-header entity-header entity-note">
                        <h4 class="modal-title entity-title">עריכת הערה</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editNoteForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editNoteRelatedType" class="form-label entity-label">סוג קשר</label>
                                        <select class="form-select" id="editNoteRelatedType" required>
                                            <option value="1">חשבון</option>
                                            <option value="2">טרייד</option>
                                            <option value="3">תוכנית טרייד</option>
                                            <option value="4">טיקר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editNoteRelatedId" class="form-label entity-label">מזהה פריט</label>
                                        <select class="form-select" id="editNoteRelatedId" required>
                                            <option value="">בחר פריט</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNoteContent" class="form-label entity-label">תוכן ההערה</label>
                                        <textarea class="form-control" id="editNoteContent" rows="6" required></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNoteAttachment" class="form-label entity-label">קובץ מצורף (אופציונלי)</label>
                                        <input type="file" class="form-control" id="editNoteAttachment" accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-entity btn-entity-note" onclick="updateNote()">עדכן הערה</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js?v=2fba6e8_20251013_051239"></script>
