<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הערות - TikTrack</title>

  <!-- ========================================
   * דף הערות - Notes Page
   * ========================================
   * 
   * דף זה מאפשר ניהול הערות המקושרות לאובייקטים שונים:
   * - חשבונות (accounts)
   * - טריידים (trades) 
   * - תכנונים (trade plans)
   * - טיקרים (tickers)
   * 
   * תכונות עיקריות:
   * - טבלת הערות עם מיון וסינון
   * - מודלים להוספה ועריכה עם עורך טקסט מעוצב
   * - צרוף קבצים (PDF, תמונות)
   * - שיוך לאובייקטים עם סינון לפי סטטוס
   * - עיצוב מותאם עם איקונים וצבעים לכל סוג אובייקט
   * 
   * מחבר: Tik.track Development Team
   * תאריך עדכון אחרון: 2025
   * ======================================== -->

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/grid-table.css">
  <link rel="stylesheet" href="styles/menu.css">
  <link rel="stylesheet" href="styles/apple-theme.css">
  <link rel="stylesheet" href="styles/typography.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/tiktrack_logo_32px.png">
</head>

<body>
  <!-- רקע כללי -->
  <div class="background-wrapper">

    <!-- כותרת האפליקציה -->
    <app-header></app-header>

    <!-- גוף הדף - כל התוכן אחרי הכותרת -->
    <div class="page-body">
      <!-- אזור הערות - top-Section -->
      <div class="top-section" id="notesTopSection">
        <!-- כותרת הערות -->
        <div class="section-header">
          <div class="table-title">
            📝 הערות
          </div>
          <div class="table-actions">
            <button class="refresh-btn" onclick="openNoteDetails()" title="הוסף הערה חדשה">
              <span class="action-icon">➕</span> הוסף
            </button>
            <div class="action-separator"></div>
            <button class="filter-toggle-btn"
              onclick="if (typeof window.toggleTopSection === 'function') { window.toggleTopSection(); } else { console.error('toggleTopSection function not found'); }"
              title="הצג/הסתר אזור הערות">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- כרטיסיות התראות -->
        <div class="section-body">
          <!-- ווב קומפוננט של התראות פעילות -->
          <active-alerts></active-alerts>

          <!-- סיכום נתונים -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ הערות: <strong id="totalNotes">0</strong></div>
            <div>הערות היום: <strong id="todayNotes">0</strong></div>
            <div>הערות השבוע: <strong id="weekNotes">0</strong></div>
            <div>הערות חשובות: <strong id="importantNotes">0</strong></div>
          </div>
        </div>
      </div> <!-- סוף top-section -->

      <!-- תוכן ראשי -->
      <div class="main-content">

        <!-- אזור הערות - content-section -->
        <div class="content-section" id="notesMainSection">
          <!-- כותרת הערות -->
          <div class="section-header">
            <div class="table-title">
              📝 ההערות שלי
            </div>
            <div class="table-count">טוען...</div>
            <div class="table-actions">
              <button class="refresh-btn" onclick="openNoteDetails()" title="הוסף הערה חדשה">
                <span class="action-icon">➕</span> הוסף
              </button>
              <div class="action-separator"></div>
              <button class="filter-toggle-btn"
                onclick="if (typeof window.toggleMainSection === 'function') { window.toggleMainSection(); } else { console.error('toggleMainSection function not found'); }"
                title="הצג/הסתר אזור הערות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- טבלת הערות -->
          <div class="section-body">
            <div class="table-responsive" id="notesContainer">
              <table class="table" id="notesTable" data-table-type="notes">
                <thead>
                  <tr>
                    <th>
                      <button class="btn btn-link sortable-header-btn" onclick="sortTable(0)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>סימבול
                        <br><span class="header-subtitle">Symbol</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header-btn" onclick="sortTable(1)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>אובייקט מקושר
                        <br><span class="header-subtitle">Related Object</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header-btn" onclick="sortTable(2)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>תוכן
                        <br><span class="header-subtitle">Content</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header-btn" onclick="sortTable(3)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>קובץ מצורף
                        <br><span class="header-subtitle">Attachment</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header-btn" onclick="sortTable(4)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        <span class="sort-icon">↕</span>נוצר ב
                        <br><span class="header-subtitle">Created At</span>
                      </button>
                    </th>
                    <th class="actions-header">
                      פעולות
                      <br><span class="header-subtitle">Actions</span>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="6" class="loading">טוען הערות...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- סוף page-body -->
  </div> <!-- סוף background-wrapper -->

  <!-- מרווח בתחתית הדף -->
  <div style="height: 3rem;"></div>

  <!-- Add Note Modal -->
  <div class="modal fade" id="addNoteModal" tabindex="-1" aria-labelledby="addNoteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addNoteModalLabel">הוספת הערה</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addNoteForm">
            <div class="row">
              <div class="col-md-12">
                <div class="mb-3">
                  <label class="form-label">הערה עבור:</label>
                  <div class="row">
                    <div class="col-md-6">
                      <div class="radio-group-item">
                        <input type="radio" name="noteRelationType" id="noteRelationTradePlan" value="trade_plan"
                          required>
                        <label for="noteRelationTradePlan">תוכנית טרייד</label>
                      </div>
                      <div class="radio-group-item">
                        <input type="radio" name="noteRelationType" id="noteRelationTrade" value="trade" required>
                        <label for="noteRelationTrade">טרייד</label>
                      </div>
                      <div class="radio-group-item">
                        <input type="radio" name="noteRelationType" id="noteRelationAccount" value="account" required>
                        <label for="noteRelationAccount">חשבון</label>
                      </div>
                      <div class="radio-group-item">
                        <input type="radio" name="noteRelationType" id="noteRelationTicker" value="ticker" required>
                        <label for="noteRelationTicker">טיקר</label>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <select class="form-select" id="noteRelatedObjectSelect" style="width: 100%;">
                        <option value="">בחר אובייקט לשיוך...</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-12">
                <div class="mb-3">
                  <label for="noteContent" class="form-label">תוכן הערה *</label>
                  <div class="text-editor-toolbar">
                    <!-- עיצוב בסיסי -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('bold')"
                        title="מודגש">
                        <strong>B</strong>
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('italic')"
                        title="נטוי">
                        <em>I</em>
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('underline')"
                        title="קו תחתון">
                        <u>U</u>
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="formatText('strikethrough')" title="קו חוצה">
                        <s>S</s>
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- כותרות -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h3')"
                        title="כותרת">
                        H3
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h4')"
                        title="כותרת משנה">
                        H4
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- רשימות -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('ul')"
                        title="רשימה לא ממוספרת">
                        • List
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('ol')"
                        title="רשימה ממוספרת">
                        1. List
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- יישור טקסט -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('alignLeft')"
                        title="יישור שמאל">
                        ⬅️
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('alignCenter')"
                        title="יישור מרכז">
                        ↔️
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('alignRight')"
                        title="יישור ימין">
                        ➡️
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- כיוון טקסט -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="formatText('directionLtr')" title="כיוון משמאל לימין">
                        LTR
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="formatText('directionRtl')" title="כיוון מימין לשמאל">
                        RTL
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- צבעים -->
                    <div class="toolbar-group">
                      <div class="dropdown">
                        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
                          data-bs-toggle="dropdown" title="צבע טקסט">
                          🎨
                        </button>
                        <ul class="dropdown-menu color-palette">
                          <li><button type="button" class="color-option" data-color="#000000"
                              style="background-color: #000000;" onclick="setTextColor('#000000')"
                              title="שחור"></button></li>
                          <li><button type="button" class="color-option" data-color="#FF0000"
                              style="background-color: #FF0000;" onclick="setTextColor('#FF0000')"
                              title="אדום"></button></li>
                          <li><button type="button" class="color-option" data-color="#00FF00"
                              style="background-color: #00FF00;" onclick="setTextColor('#00FF00')"
                              title="ירוק"></button></li>
                          <li><button type="button" class="color-option" data-color="#0000FF"
                              style="background-color: #0000FF;" onclick="setTextColor('#0000FF')"
                              title="כחול"></button></li>
                          <li><button type="button" class="color-option" data-color="#FFFF00"
                              style="background-color: #FFFF00;" onclick="setTextColor('#FFFF00')"
                              title="צהוב"></button></li>
                          <li><button type="button" class="color-option" data-color="#FF00FF"
                              style="background-color: #FF00FF;" onclick="setTextColor('#FF00FF')"
                              title="מגנטה"></button></li>
                          <li><button type="button" class="color-option" data-color="#00FFFF"
                              style="background-color: #00FFFF;" onclick="setTextColor('#00FFFF')"
                              title="ציאן"></button></li>
                          <li><button type="button" class="color-option" data-color="#FFA500"
                              style="background-color: #FFA500;" onclick="setTextColor('#FFA500')"
                              title="כתום"></button></li>
                          <li><button type="button" class="color-option" data-color="#800080"
                              style="background-color: #800080;" onclick="setTextColor('#800080')"
                              title="סגול"></button></li>
                          <li><button type="button" class="color-option" data-color="#808080"
                              style="background-color: #808080;" onclick="setTextColor('#808080')"
                              title="אפור"></button></li>
                        </ul>
                      </div>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('link')"
                        title="קישור">
                        🔗
                      </button>
                    </div>
                  </div>
                  <div class="text-editor-content" id="noteContentEditor" contenteditable="true"
                    style="border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.375rem 0.75rem; min-height: 120px; background-color: white; overflow-y: auto;">
                  </div>
                  <textarea class="form-control" id="noteContent" rows="4" required style="display: none;"></textarea>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="noteAttachment" class="form-label">קובץ מצורף</label>
                  <input type="file" class="form-control" id="noteAttachment" accept=".jpg,.jpeg,.png,.gif,.pdf"
                    max="524288">
                  <small class="form-text text-muted">מותר: תמונות (JPG, PNG, GIF) ו-PDF. גודל מקסימלי: 512KB</small>
                  <div id="noteAttachmentPreview" class="mt-2" style="display: none;">
                    <img id="noteAttachmentImage" class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
                    <div id="noteAttachmentInfo" class="mt-1"></div>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
          <button type="button" class="btn btn-success" onclick="saveNote()"
            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">שמור
            הערה</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Note Modal -->
  <div class="modal fade" id="editNoteModal" tabindex="-1" aria-labelledby="editNoteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editNoteModalLabel">עריכת הערה</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="editNoteForm">
            <input type="hidden" id="editNoteId">
            <div class="row">
              <div class="col-md-12">
                <div class="mb-3">
                  <label class="form-label">הערה עבור:</label>
                  <div class="radio-group-item">
                    <input type="radio" name="editNoteRelationType" id="editNoteRelationTradePlan" value="trade_plan"
                      required>
                    <label for="editNoteRelationTradePlan">תוכנית טרייד</label>
                    <select class="form-control mt-2" id="editNoteTradePlanId"
                      style="display: none; margin-top: 10px; width: 100%;">
                      <option value="">בחר תוכנית טרייד...</option>
                    </select>
                  </div>
                  <div class="radio-group-item">
                    <input type="radio" name="editNoteRelationType" id="editNoteRelationTrade" value="trade" required>
                    <label for="editNoteRelationTrade">טרייד</label>
                    <select class="form-control mt-2" id="editNoteTradeId"
                      style="display: none; margin-top: 10px; width: 100%;">
                      <option value="">בחר טרייד...</option>
                    </select>
                  </div>
                  <div class="radio-group-item">
                    <input type="radio" name="editNoteRelationType" id="editNoteRelationAccount" value="account"
                      required>
                    <label for="editNoteRelationAccount">חשבון</label>
                    <select class="form-control mt-2" id="editNoteAccountId"
                      style="display: none; margin-top: 10px; width: 100%;">
                      <option value="">בחר חשבון...</option>
                    </select>
                  </div>
                  <div class="radio-group-item">
                    <input type="radio" name="editNoteRelationType" id="editNoteRelationTicker" value="ticker" required>
                    <label for="editNoteRelationTicker">טיקר</label>
                    <select class="form-control mt-2" id="editNoteTickerId"
                      style="display: none; margin-top: 10px; width: 100%;">
                      <option value="">בחר טיקר...</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-12">
                <div class="mb-3">
                  <label for="editNoteContent" class="form-label">תוכן הערה</label>
                  <div class="text-editor-toolbar">
                    <!-- עיצוב בסיסי -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('bold')"
                        title="מודגש">
                        <strong>B</strong>
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('italic')"
                        title="נטוי">
                        <em>I</em>
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('underline')"
                        title="קו תחתון">
                        <u>U</u>
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="formatText('strikethrough')" title="קו חוצה">
                        <s>S</s>
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- כותרות -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h3')"
                        title="כותרת">
                        H3
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('h4')"
                        title="כותרת משנה">
                        H4
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- רשימות -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('ul')"
                        title="רשימה לא ממוספרת">
                        • List
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('ol')"
                        title="רשימה ממוספרת">
                        1. List
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- יישור טקסט -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('alignLeft')"
                        title="יישור שמאל">
                        ⬅️
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('alignCenter')"
                        title="יישור מרכז">
                        ↔️
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('alignRight')"
                        title="יישור ימין">
                        ➡️
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- כיוון טקסט -->
                    <div class="toolbar-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="formatText('directionLtr')" title="כיוון משמאל לימין">
                        LTR
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="formatText('directionRtl')" title="כיוון מימין לשמאל">
                        RTL
                      </button>
                    </div>

                    <span class="toolbar-separator">|</span>

                    <!-- צבעים -->
                    <div class="toolbar-group">
                      <div class="dropdown">
                        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
                          data-bs-toggle="dropdown" title="צבע טקסט">
                          🎨
                        </button>
                        <ul class="dropdown-menu color-palette">
                          <li><button type="button" class="color-option" data-color="#000000"
                              style="background-color: #000000;" onclick="setTextColor('#000000')"
                              title="שחור"></button></li>
                          <li><button type="button" class="color-option" data-color="#FF0000"
                              style="background-color: #FF0000;" onclick="setTextColor('#FF0000')"
                              title="אדום"></button></li>
                          <li><button type="button" class="color-option" data-color="#00FF00"
                              style="background-color: #00FF00;" onclick="setTextColor('#00FF00')"
                              title="ירוק"></button></li>
                          <li><button type="button" class="color-option" data-color="#0000FF"
                              style="background-color: #0000FF;" onclick="setTextColor('#0000FF')"
                              title="כחול"></button></li>
                          <li><button type="button" class="color-option" data-color="#FFFF00"
                              style="background-color: #FFFF00;" onclick="setTextColor('#FFFF00')"
                              title="צהוב"></button></li>
                          <li><button type="button" class="color-option" data-color="#FF00FF"
                              style="background-color: #FF00FF;" onclick="setTextColor('#FF00FF')"
                              title="מגנטה"></button></li>
                          <li><button type="button" class="color-option" data-color="#00FFFF"
                              style="background-color: #00FFFF;" onclick="setTextColor('#00FFFF')"
                              title="ציאן"></button></li>
                          <li><button type="button" class="color-option" data-color="#FFA500"
                              style="background-color: #FFA500;" onclick="setTextColor('#FFA500')"
                              title="כתום"></button></li>
                          <li><button type="button" class="color-option" data-color="#800080"
                              style="background-color: #800080;" onclick="setTextColor('#800080')"
                              title="סגול"></button></li>
                          <li><button type="button" class="color-option" data-color="#808080"
                              style="background-color: #808080;" onclick="setTextColor('#808080')"
                              title="אפור"></button></li>
                        </ul>
                      </div>
                      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="formatText('link')"
                        title="קישור">
                        🔗
                      </button>
                    </div>
                  </div>
                  <div class="text-editor-content" id="editNoteContentEditor" contenteditable="true"
                    style="border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.375rem 0.75rem; min-height: 120px; background-color: white; overflow-y: auto;">
                  </div>
                  <textarea class="form-control" id="editNoteContent" rows="4" required
                    style="display: none;"></textarea>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="editNoteAttachment" class="form-label">קובץ מצורף (Attachment)</label>
                  <input type="file" class="form-control" id="editNoteAttachment" accept=".jpg,.jpeg,.png,.gif,.pdf"
                    max="524288">
                  <small class="form-text text-muted">מותר: תמונות (JPG, PNG, GIF) ו-PDF. גודל מקסימלי: 512KB</small>
                  <div id="editNoteAttachmentPreview" class="mt-2" style="display: none;">
                    <img id="editNoteAttachmentImage" class="img-thumbnail"
                      style="max-width: 200px; max-height: 200px;">
                    <div id="editNoteAttachmentInfo" class="mt-1"></div>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="updateNoteFromModal()" title="שמור">💾</button>
        </div>
      </div>
    </div>
  </div>
