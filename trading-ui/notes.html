<body class="notes-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Notes area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <h1>
                        <img src="images/icons/home.svg" alt="הערות" class="section-icon">
                        הערות
                    </h1>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים וההערות">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="Show/hide notes area">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ הערות: <strong id="totalNotes">0</strong></div>
                        <div>הערות פעילות: <strong id="activeNotes">0</strong></div>
                        <div>הערות חדשות: <strong id="recentNotes">0</strong></div>
                        <div>סה"כ קישורים: <strong id="totalLinks">0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Notes management area - content-section -->
                <div class="content-section" id="main" data-section="main">
                    <!-- Notes header -->
                    <div class="section-header">
                        <h2>
                            <img src="images/icons/home.svg" alt="ניהול הערות" class="section-icon">
                            ניהול הערות
                            <span class="table-count" id="notesCount">טוען...</span>
                        </h2>
                        <div class="header-actions">
                            <button id="addNoteBtn" class="refresh-btn" onclick="showAddNoteModal()" title="הוסף הערה חדשה">
                                <img src="images/icons/home.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול הערות">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Notes table -->
                    <div class="section-body">
                        <div class="table-responsive" id="notesContainer">
                            <table class="table" id="notesTable" data-table-type="notes">
                                <thead>
                                    <tr>
                                        <th class="col-title">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, notesData, 'notes', updateNotesTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                כותרת <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-content">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, notesData, 'notes', updateNotesTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תוכן <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, notesData, 'notes', updateNotesTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-created">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, notesData, 'notes', updateNotesTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                נוצר ב <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-updated">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, notesData, 'notes', updateNotesTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                עודכן ב <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6" class="loading">טוען הערות...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Note Modal -->
        <div class="modal fade" id="addNoteModal" tabindex="-1" aria-labelledby="addNoteModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addNoteModalLabel">הוספת הערה חדשה</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addNoteForm">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="noteTitle" class="form-label">כותרת ההערה</label>
                                        <input type="text" class="form-control" id="noteTitle" placeholder="כותרת ההערה" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="noteContent" class="form-label">תוכן ההערה</label>
                                        <textarea class="form-control" id="noteContent" rows="6" placeholder="תוכן ההערה..." required></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="noteStatus" class="form-label">סטטוס</label>
                                        <select class="form-select" id="noteStatus" required>
                                            <option value="active">פעיל</option>
                                            <option value="archived">בארכיון</option>
                                            <option value="draft">טיוטה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="notePriority" class="form-label">עדיפות</label>
                                        <select class="form-select" id="notePriority">
                                            <option value="low">נמוכה</option>
                                            <option value="medium">בינונית</option>
                                            <option value="high">גבוהה</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="addNote()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            הערה</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Note Modal -->
        <div class="modal fade" id="editNoteModal" tabindex="-1" aria-labelledby="editNoteModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editNoteModalLabel">עריכת הערה</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editNoteForm">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNoteTitle" class="form-label">כותרת ההערה</label>
                                        <input type="text" class="form-control" id="editNoteTitle" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNoteContent" class="form-label">תוכן ההערה</label>
                                        <textarea class="form-control" id="editNoteContent" rows="6" required></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editNoteStatus" class="form-label">סטטוס</label>
                                        <select class="form-select" id="editNoteStatus" required>
                                            <option value="active">פעיל</option>
                                            <option value="archived">בארכיון</option>
                                            <option value="draft">טיוטה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editNotePriority" class="form-label">עדיפות</label>
                                        <select class="form-select" id="editNotePriority">
                                            <option value="low">נמוכה</option>
                                            <option value="medium">בינונית</option>
                                            <option value="high">גבוהה</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="updateNote()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
                            הערה</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=20251001"></script>
    <script src="scripts/unified-app-initializer.js?v=20251001"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=20251001"></script>
    <script src="scripts/translation-utils.js?v=20251001"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/notification-system.js?v=20251001"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=20251001"></script>
    <script src="scripts/unified-cache-manager.js?v=20251001"></script>
    <script src="scripts/cache-policy-manager.js?v=20251001"></script>
    <script src="scripts/memory-optimizer.js?v=20251001"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
    <script src="scripts/ui-utils.js?v=20251001"></script>
    <script src="scripts/color-scheme-system.js?v=20251001"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- Stage 6: Data and Utility Systems -->
    <script src="scripts/data-utils.js?v=20251001"></script>
    <script src="scripts/date-utils.js?v=20251001"></script>
    <script src="scripts/button-icons.js?v=20251001"></script>
    <script src="scripts/tables.js?v=20251001"></script>
    <script src="scripts/table-mappings.js?v=20251006"></script>
    <script src="scripts/page-utils.js?v=20251001"></script>
    
    <!-- Stage 7: Additional Systems (As needed) -->
    <script src="scripts/preferences.js?v=20251001"></script>
    <script src="scripts/notification-category-detector.js?v=20251001"></script>
    <script src="scripts/global-notification-collector.js?v=20251001"></script>
    <script src="scripts/system-management.js?v=20251001"></script>
    
    <!-- Stage 8: Modal and Warning Systems -->
    <script src="scripts/entity-details-modal.js?v=20251001"></script>
    <script src="scripts/warning-system.js?v=20251001"></script>
    <script src="scripts/error-handlers.js?v=20251001"></script>
    
    <!-- Stage 9: Page-specific Script -->
    <script src="scripts/notes.js?v=20251001"></script>
    
    <!-- Local copyDetailedLog function for notes page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
