<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Tik.track</title>

  <!-- 
    ===== Notes Page - TikTrack =====
    
    This page contains:
    1. Notes table - First section
    2. Accounts table - Second section (recently added)
    3. Alert cards - In the upper part
    4. Advanced filtering and sorting system
    
    Page structure:
    - app-header: Application header with navigation
    - page-body: Main content limited in width (1400px)
      - top-section: Alert cards and data summary
      - content-section (1): Notes table
      - content-section (2): Accounts table
    
    Recent changes:
    - Copying from trade plans page
    - Adding complete accounts table
    - Improving alert cards design
    - Fixing independent close buttons
    - Centralizing account functions in accounts.js
  -->

  <!-- CSS Files - Ordered by priority (weak to strong) -->
  <!-- 1. Apple theme (base) -->
  <link rel="stylesheet" href="styles/apple-theme.css">

  <!-- 2. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 3. General styles -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- 4. Typography -->
  <link rel="stylesheet" href="styles/typography.css">

  <!-- 5. Table styles -->
  <link rel="stylesheet" href="styles/table.css">

  <!-- 6. Header system styles (highest priority) -->
  <link rel="stylesheet" href="styles/header-system.css">

  <!-- Modular grid files -->
  <script src="scripts/header-system.js"></script>
  <script src="scripts/console-cleanup.js"></script>
  <script src="scripts/translation-utils.js"></script>
  <script src="scripts/data-utils.js"></script>
  <script src="scripts/ui-utils.js"></script>
  <script src="scripts/table-mappings.js"></script>
  <script src="scripts/linked-items.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/simple-filter.js"></script>
  <script src="scripts/alerts.js"></script>
  <script src="scripts/notes.js"></script>
</head>

<body>
  <!-- General background -->
  <div class="background-wrapper">

    <!-- Application header -->
    <!-- Unified Header System -->
    <div id="unified-header-container"></div>

    <!-- Page body - All content after header -->
    <div class="page-body">
      <!-- Notes area - top-Section -->
      <div class="top-section">
        <!-- Main header -->
        <div class="section-header">
          <div class="table-title">
            📋 הערות
          </div>
          <div class="table-actions">
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="Show/hide notes area">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- Alert cards -->
        <div class="section-body">
          <active-alerts></active-alerts>

          <!-- Data summary -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ הערות: <strong id="totalNotes">0</strong></div>
            <div>הערות פעילות: <strong id="activeNotes">0</strong></div>
            <div>הערות חדשות: <strong id="recentNotes">0</strong></div>
            <div>סה"כ קישורים: <strong id="totalLinks">0</strong></div>
          </div>
        </div>
      </div> <!-- End top-section -->

      <!-- Main content -->
      <div class="main-content">

        <!-- Notes area - content-section -->
        <div class="content-section">
          <!-- Notes header -->
          <div class="section-header">
            <div class="table-title">
              📋 ההערות שלי
            </div>
            <div class="table-count">9 הערות</div>
            <div class="table-actions">
              <button class="refresh-btn" onclick="openNoteDetails()" title="הוסף הערה חדשה">
                <span class="action-icon">➕</span> הוסף
              </button>
              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleMainSection()" title="הצג/הסתר אזור הערות">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>

          <!-- Notes table -->
          <div class="section-body">
            <div class="table-responsive" id="notesContainer">
              <table class="table" id="notesTable" data-table-type="notes">
                <thead>
                  <tr>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(0)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        סימבול <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(1)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        אובייקט משיוך <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(2)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        תוכן <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(3)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        קובץ מצורף <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header" onclick="sortTable(4)"
                        style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                        נוצר ב <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="actions-cell">
                      פעולות
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="6" class="text-center text-danger">
                      <div style="padding: 20px;">
                        <h5>⚠️ שגיאה בטעינת נתונים</h5>
                        <p>לא ניתן לטעון נתוני הערות מהשרת</p>
                        <p><small>פרטי השגיאה: פונקציית טעינת נתונים לא מוגדרת</small></p>
                        <button class="btn btn-sm btn-primary" onclick="loadNotesData()">נסה שוב</button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- End page-body -->

    <!-- Bottom page spacing -->
    <div class="bottom-spacer"></div>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Add Note Modal -->
    <div class="modal fade" id="addNoteModal" tabindex="-1" aria-labelledby="addNoteModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addNoteModalLabel">Add Note</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addNoteForm">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">Note for: <span class="text-danger">*</span></label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationTicker" value="4" required
                            onchange="onNoteRelationTypeChange()" checked>
                          <label for="noteRelationTicker">Ticker</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationTradePlan" value="3" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="noteRelationTradePlan">Trade Plan</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationTrade" value="2" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="noteRelationTrade">Trade</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="noteRelationType" id="noteRelationAccount" value="1" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="noteRelationAccount">Account</label>
                        </div>
                        <div class="invalid-feedback" id="relationTypeError"></div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="noteRelatedObjectSelect" style="width: 100%;" required>
                          <option value="">Select object to link...</option>
                        </select>
                        <div class="invalid-feedback" id="relatedObjectError"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label for="noteContent" class="form-label">Note Content <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="noteContent" rows="4" required
                      placeholder="Enter note content here..."></textarea>
                    <div class="invalid-feedback" id="contentError"></div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="noteAttachment" class="form-label">Attachment</label>
                    <input type="file" class="form-control" id="noteAttachment"
                      accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="saveNote()">Save Note</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Note Modal -->
    <div class="modal fade" id="editNoteModal" tabindex="-1" aria-labelledby="editNoteModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editNoteModalLabel">Edit Note</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editNoteForm">
              <input type="hidden" id="editNoteId">
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label class="form-label">Note for: <span class="text-danger">*</span></label>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationTradePlan" value="3"
                            required onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationTradePlan">Trade Plan</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationTrade" value="2" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationTrade">Trade</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationAccount" value="1"
                            required onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationAccount">Account</label>
                        </div>
                        <div class="radio-group-item">
                          <input type="radio" name="editNoteRelationType" id="editNoteRelationTicker" value="4" required
                            onchange="onNoteRelationTypeChange()">
                          <label for="editNoteRelationTicker">Ticker</label>
                        </div>
                        <div class="invalid-feedback" id="editRelationTypeError"></div>
                      </div>
                      <div class="col-md-6">
                        <select class="form-select" id="editNoteRelatedObjectSelect" style="width: 100%;" required>
                          <option value="">Select object to link...</option>
                        </select>
                        <div class="invalid-feedback" id="editRelatedObjectError"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label for="editNoteContent" class="form-label">Note Content <span
                        class="text-danger">*</span></label>
                    <textarea class="form-control" id="editNoteContent" rows="4" required
                      placeholder="Enter note content here..."></textarea>
                    <div class="invalid-feedback" id="editContentError"></div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editNoteAttachment" class="form-label">Attachment</label>
                    <input type="file" class="form-control" id="editNoteAttachment"
                      accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="updateNoteFromModal()">Save Note</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modular files -->
    <script src="scripts/header-system.js"></script>
    <script src="scripts/console-cleanup.js"></script>
    <script src="scripts/simple-filter.js"></script>
    <script src="scripts/translation-utils.js"></script>
    <script src="scripts/data-utils.js"></script>
    <script src="scripts/ui-utils.js"></script>
    <script src="scripts/table-mappings.js"></script>
    <script src="scripts/date-utils.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/linked-items.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/notes.js"></script>
    <script>
      // אתחול מערכת הכותרת החדשה
      document.addEventListener("DOMContentLoaded", () => {
        console.log("🔄 Initializing unified header system...");
        if (window.headerSystem) {
          window.headerSystem.init();
        }
        if (window.simpleFilter) {
          window.simpleFilter.init();
        }
      });
    </script>
</body>

</html>
