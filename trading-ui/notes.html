    דף הערות - Tik.track
    ========================================
    
    תכונות עיקריות:
    - הצגת הערות בטבלה עם מיון וסינון
    - הוספת, עריכת ומחיקת הערות
    - חיפוש חופשי בכל השדות כולל סימבולים
    - סינון לפי תאריכים

    - עורך טקסט מתקדם עם תמיכה בעיצוב
    
    פונקציות עיקריות:
    - loadNotesData() - טעינת נתונים מהשרת
    - updateNotesTable() - עדכון הטבלה
    - sortTable() - מיון לפי עמודות

    תאריך עדכון אחרון: 2025
    ========================================
  -->

  <script>
    // פונקציות לעיצוב טקסט
    function formatText(command) {
      // מציאת העורך הפעיל
      let editor = null;
      
      // בדיקה איזה עורך פעיל כרגע
      const addEditor = document.getElementById('noteContentEditor');
      const editEditor = document.getElementById('editNoteContentEditor');
      
      if (addEditor && addEditor === document.activeElement) {
        editor = addEditor;
      } else if (editEditor && editEditor === document.activeElement) {
        editor = editEditor;
      } else {
        // אם אף עורך לא פעיל, ננסה למצוא עורך פתוח
        if (addEditor && addEditor.offsetParent !== null) {
          editor = addEditor;
        } else if (editEditor && editEditor.offsetParent !== null) {
          editor = editEditor;
        }
      }
      
      if (!editor) {
        console.warn('לא נמצא עורך טקסט פעיל');
        return;
      }
      
      editor.focus();
      
      switch (command) {
        case 'bold':
          document.execCommand('bold', false, null);
          break;
        case 'italic':
          document.execCommand('italic', false, null);
          break;
        case 'underline':
          document.execCommand('underline', false, null);
          break;
        case 'strikethrough':
          document.execCommand('strikethrough', false, null);
          break;
        case 'h3':
          document.execCommand('formatBlock', false, '<h3>');
          break;
        case 'h4':
          document.execCommand('formatBlock', false, '<h4>');
          break;
        case 'ul':
          document.execCommand('insertUnorderedList', false, null);
          break;
        case 'ol':
          document.execCommand('insertOrderedList', false, null);
          break;
        case 'link':
          const url = prompt('הכנס URL לקישור:');
          if (url) {
            document.execCommand('createLink', false, url);
          }
          break;
        case 'color':
          const color = prompt('הכנס צבע (למשל: red, #ff0000):');
          if (color) {
            document.execCommand('foreColor', false, color);
          }
          break;
      }
      
      // עדכון השדה הנסתר
      syncEditorContent();
    }
    
    // פונקציה להעתקת תוכן מהעורך לשדה הנסתר
    function syncEditorContent() {
      const addEditor = document.getElementById('noteContentEditor');
      const editEditor = document.getElementById('editNoteContentEditor');
      const addTextarea = document.getElementById('noteContent');
      const editTextarea = document.getElementById('editNoteContent');
      
      if (addEditor && addTextarea) {
        addTextarea.value = addEditor.innerHTML;
        console.log('🔄 עדכון תוכן הוספה:', addEditor.innerHTML);
      }
      
      if (editEditor && editTextarea) {

    // פונקציה לטיפול בבחירת קובץ
    function handleFileSelect(event, inputId) {
      const file = event.target.files[0];
      const previewId = inputId + 'Preview';
      const imageId = inputId + 'Image';
      const infoId = inputId + 'Info';
      
      if (!file) {
        document.getElementById(previewId).style.display = 'none';
        return;
      }
      
      // בדיקת סוג הקובץ
      const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'application/pdf'];
      if (!allowedTypes.includes(file.type)) {
        alert('סוג קובץ לא נתמך. מותר רק: JPG, PNG, GIF, PDF');
        event.target.value = '';
        document.getElementById(previewId).style.display = 'none';
        return;
      }
      
      // בדיקת גודל הקובץ (512KB)
      const maxSize = 524288; // 512KB in bytes
      if (file.size > maxSize) {
        alert('הקובץ גדול מדי. גודל מקסימלי: 512KB');
        event.target.value = '';
        document.getElementById(previewId).style.display = 'none';
        return;
      }
      
      // הצגת מידע על הקובץ
      const infoDiv = document.getElementById(infoId);
      const fileSizeKB = (file.size / 1024).toFixed(1);
      infoDiv.innerHTML = `
        <strong>שם הקובץ:</strong> ${file.name}<br>
        <strong>גודל:</strong> ${fileSizeKB}KB<br>
        <strong>סוג:</strong> ${file.type}
      `;
      
      // הצגת תמונה מקדימה אם זה קובץ תמונה
      const previewDiv = document.getElementById(previewId);
      const imageElement = document.getElementById(imageId);
      
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imageElement.src = e.target.result;
          imageElement.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        imageElement.style.display = 'none';
      }
      
      previewDiv.style.display = 'block';
      console.log('📎 קובץ נבחר:', file.name, 'גודל:', fileSizeKB + 'KB');
    }

     * @param {number} columnIndex - אינדקס העמודה למיון (0-4)
     */
    function sortTable(columnIndex) {
      console.log('🔄 === SORT TABLE FUNCTION CALLED ===');
      console.log('🔄 Column clicked:', columnIndex);
      console.log('🔄 Current sort column:', notesCurrentSortColumn);
      console.log('🔄 Current sort direction:', notesCurrentSortDirection);

      if (notesCurrentSortColumn === columnIndex) {
        notesCurrentSortDirection = notesCurrentSortDirection === 'asc' ? 'desc' : 'asc';
        console.log('🔄 Same column clicked, direction changed to:', notesCurrentSortDirection);
      } else {
        notesCurrentSortColumn = columnIndex;
        notesCurrentSortDirection = 'asc';
        console.log('🔄 New column clicked, set to column:', columnIndex, 'direction: asc');
      }
      
      // מיון הנתונים
      notes.sort((a, b) => {
        let aValue, bValue;
        
        switch (columnIndex) {
          case 0: // מזהה (ID)
            aValue = parseInt(a.id);
            bValue = parseInt(b.id);
            break;
          case 1: // אובייקט מקושר

          case 4: // קובץ מצורף

            bValue = (b.attachment || '').toLowerCase();
            break;
          default:
            return 0;

        console.log(`🔄 Comparing: ${aValue} vs ${bValue}`);

          const result = notesCurrentSortDirection === 'asc' ? -1 : 1;

    /**
     * פונקציה להמרת תאריך למיון
     * ממירה תאריך בפורמט dd.mm.yyyy למילישניות לצורך מיון
     * @param {string} dateStr - תאריך בפורמט dd.mm.yyyy
     * @returns {number} זמן במילישניות או 0 אם הפורמט לא תקין
     */
    function parseDateForSort(dateStr) {
      const parts = dateStr.split('.');
      if (parts.length === 3) {
        const day = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1;
        const year = parseInt(parts[2]);
        return new Date(year, month, day).getTime();
      }
      return 0;
    }

      console.log('🔄 Selected types:', selectedTypes);
      console.log('🔄 Selected accounts:', selectedAccounts);
      console.log('🔄 Selected date range:', selectedDateRange);
      console.log('🔄 Search term:', searchTerm);
      
      // קריאה לפונקציה הגלובלית
      if (typeof window.updateGridFromComponentGlobal === 'function') {
        window.updateGridFromComponentGlobal(selectedStatuses, selectedTypes, selectedAccounts, selectedDateRange, searchTerm, 'notes');
      } else {
        console.log('🔄 Global updateGridFromComponentGlobal function not available, using local filtering');
        
        // שמירת הפילטרים ב-localStorage
        localStorage.setItem('notesFilterStatuses', JSON.stringify(selectedStatuses));
        localStorage.setItem('notesFilterTypes', JSON.stringify(selectedTypes));
        localStorage.setItem('notesFilterAccounts', JSON.stringify(selectedAccounts));
        localStorage.setItem('notesFilterDateRanges', JSON.stringify([selectedDateRange]));
        localStorage.setItem('notesFilterSearch', searchTerm);
        
        // שמירת הפילטרים במשתנים הגלובליים
        window.selectedStatusesForFilter = selectedStatuses;
        window.selectedTypesForFilter = selectedTypes;
        window.selectedAccountsForFilter = selectedAccounts;
        window.selectedDateRangeForFilter = selectedDateRange;
        window.searchTermForFilter = searchTerm;
        
        // החלת הפילטרים על הנתונים
        filterNotesData(selectedStatuses, selectedTypes, selectedAccounts, selectedDateRange, searchTerm);
      }
      
      console.log('🔄 === updateGridFromComponent completed for notes ===');
    };
    
    /**
     * פונקציה מותאמת לפילטור נתוני הערות
     * מסננת את ההערות לפי הפילטרים הנבחרים ומעדכנת את הטבלה
     * @param {Array} selectedStatuses - סטטוסים נבחרים (לא רלוונטי להערות)
     * @param {Array} selectedTypes - סוגים נבחרים (לא רלוונטי להערות)
     * @param {Array} selectedAccounts - חשבונות נבחרים (לא רלוונטי להערות)
     * @param {string} selectedDateRange - טווח תאריכים נבחר
     * @param {string} searchTerm - מונח חיפוש חופשי
     */
    function filterNotesData(selectedStatuses, selectedTypes, selectedAccounts, selectedDateRange, searchTerm) {
      console.log('🔄 === FILTER NOTES DATA ===');
      console.log('🔄 Selected statuses:', selectedStatuses);
      console.log('🔄 Selected types:', selectedTypes);
      console.log('🔄 Selected accounts:', selectedAccounts);
      console.log('🔄 Date range:', selectedDateRange);
      console.log('🔄 Search term:', searchTerm);
      
      if (!notesData || notesData.length === 0) {
        console.log('🔄 No notes data available for filtering');
        return;
      }
      
      let filteredNotes = [...notesData];
      
      // פילטר לפי תאריכים
      if (selectedDateRange && selectedDateRange !== 'הכול') {
        console.log('🔄 Filtering by date range:', selectedDateRange);
        const now = new Date();
        let startDate = new Date();
        
        switch (selectedDateRange) {
          case 'שבוע':
            startDate.setDate(now.getDate() - 7);
            break;
          case 'MTD':
            startDate = new Date(now.getFullYear(), now.getMonth(), 1);
            break;
          case '30 יום':
            startDate.setDate(now.getDate() - 30);
            break;
          case '60 יום':
            startDate.setDate(now.getDate() - 60);
            break;
          case '90 יום':
            startDate.setDate(now.getDate() - 90);
            break;
          case 'שנה':
            startDate.setFullYear(now.getFullYear() - 1);
            break;
          case 'YTD':
            startDate = new Date(now.getFullYear(), 0, 1);
            break;
          case 'שנה קודמת':
            startDate = new Date(now.getFullYear() - 1, 0, 1);
            const endDate = new Date(now.getFullYear() - 1, 11, 31);
            break;
        }
        
        filteredNotes = filteredNotes.filter(note => {
          const noteDate = new Date(note.created_at);
          let isIncluded;
          if (selectedDateRange === 'שנה קודמת') {
            isIncluded = noteDate >= startDate && noteDate <= endDate;
          } else {
            isIncluded = noteDate >= startDate && noteDate <= now;
          }
          console.log(`🔄 Note ${note.id}: date=${noteDate}, included=${isIncluded}`);
          return isIncluded;
        });
        console.log('🔄 After date range filter:', filteredNotes.length, 'notes');
      }
      
      // פילטר לפי חיפוש חופשי - חיפוש בכל השדות כולל סימבולים ושמות
      if (searchTerm && searchTerm.trim() !== '') {
        console.log('🔄 Filtering by search term:', searchTerm);
        const searchLower = searchTerm.toLowerCase();
        filteredNotes = filteredNotes.filter(note => {
          // חיפוש בשדות בסיסיים
          const idMatch = (note.id || '').toString().toLowerCase().includes(searchLower);
          const contentMatch = (note.content || '').toLowerCase().includes(searchLower);
          const relatedTypeMatch = (note.related_type || '').toLowerCase().includes(searchLower);
          const relatedIdMatch = (note.related_id || '').toString().toLowerCase().includes(searchLower);
          const attachmentMatch = (note.attachment || '').toLowerCase().includes(searchLower);
          const createdAtMatch = (note.created_at || '').toLowerCase().includes(searchLower);
          
          // חיפוש בשדות נוספים אם קיימים (לתאימות לאחור)
          const accountIdMatch = (note.account_id || '').toString().toLowerCase().includes(searchLower);
          const tradeIdMatch = (note.trade_id || '').toString().toLowerCase().includes(searchLower);
          const tradePlanIdMatch = (note.trade_plan_id || '').toString().toLowerCase().includes(searchLower);
          
          // חיפוש בשדה "אובייקט מקושר" - שם הסימבול או שם החשבון
          let relatedObjectMatch = false;
          if (note.related_type === 'trade' || note.related_type === 'trade_plan') {
            // נחפש את הסימבול של הטיקר (AAPL, TSLA, וכו') - לתאימות לאחור
            const tickerId = note.related_type === 'trade' ? 
              (window.tradesData ? window.tradesData.find(t => t.id == note.related_id)?.ticker_id : null) :
              (window.tradePlansData ? window.tradePlansData.find(p => p.id == note.related_id)?.ticker_id : null);
            
            if (tickerId && window.tickersData) {
              const ticker = window.tickersData.find(tick => tick.id == tickerId);
              if (ticker && ticker.symbol) {
                relatedObjectMatch = ticker.symbol.toLowerCase().includes(searchLower);
              }
            }
          } else if (note.related_type === 'account') {
            // נחפש את שם החשבון
            if (window.accountsData) {
              const account = window.accountsData.find(acc => acc.id == note.related_id);
              if (account && account.name) {
                relatedObjectMatch = account.name.toLowerCase().includes(searchLower);
              }
            }
          }
          
          const isIncluded = idMatch || contentMatch || relatedTypeMatch || relatedIdMatch || 
                            attachmentMatch || createdAtMatch || accountIdMatch || tradeIdMatch || 
                            tradePlanIdMatch || relatedObjectMatch;
          
          console.log(`🔄 Note ${note.id}: id match=${idMatch}, content match=${contentMatch}, related_type match=${relatedTypeMatch}, related_id match=${relatedIdMatch}, attachment match=${attachmentMatch}, created_at match=${createdAtMatch}, related_object match=${relatedObjectMatch}, included=${isIncluded}`);
          return isIncluded;
        });
        console.log('🔄 After search filter:', filteredNotes.length, 'notes');
      }
      
      // עדכון הטבלה
      if (typeof window.updateNotesTable === 'function') {
        window.updateNotesTable(filteredNotes);
      } else {
        console.error('❌ updateNotesTable function not found');
      }
    }
    
    // פונקציה לטעינת הערות (כמו בדף database.html)
    async function loadNotes() {
      try {
        console.log('🔄 טוען הערות...');
        const notes = await loadNotesData();
        
        // עדכון הטבלה עם הנתונים
        if (typeof updateNotesTable === 'function') {
          await updateNotesTable(notes);
        } else {
          console.error('❌ פונקציית updateNotesTable לא נמצאה');
        }
        
      } catch (error) {
        console.error('❌ שגיאה בטעינת הערות:', error);
        const tbody = document.querySelector('.main-content table tbody');
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">שגיאה בטעינת נתונים</td></tr>';
        }
      }
    }
    
    // הגדרת הפונקציה כגלובלית
    window.loadNotes = loadNotes;
    
    /**
     * פונקציה לאיפוס כל הפילטרים למצב ברירת המחדל
     * מאפסת את כל הפילטרים ב-localStorage ובמשתנים הגלובליים
     * @param {string} pageName - שם הדף (notes, designs, tracking)
     */
    window.resetAllFiltersForPage = function(pageName) {
      console.log(`🔄 === Resetting all filters for ${pageName} ===`);
      
      if (pageName === 'notes') {
        // איפוס הפילטרים למצב ברירת המחדל
        const defaultStatuses = ['פתוח']; // רק "פתוח" מסומן
        const defaultTypes = []; // כל הסוגים מסומנים (אין פילטר)
        const defaultAccounts = []; // כל החשבונות מסומנים (אין פילטר)
        const defaultDateRange = 'הכול'; // "הכול" מסומן
        const defaultSearch = ''; // חיפוש ריק
        
        // שמירת הפילטרים ב-localStorage
        localStorage.setItem('notesFilterStatuses', JSON.stringify(defaultStatuses));
        localStorage.setItem('notesFilterTypes', JSON.stringify(defaultTypes));
        localStorage.setItem('notesFilterAccounts', JSON.stringify(defaultAccounts));
        localStorage.setItem('notesFilterDateRanges', JSON.stringify([defaultDateRange]));
        localStorage.setItem('notesFilterSearch', defaultSearch);
        
        // עדכון המשתנים הגלובליים
        window.selectedStatusesForFilter = defaultStatuses;
        window.selectedTypesForFilter = defaultTypes;
        window.selectedAccountsForFilter = defaultAccounts;
        window.selectedDateRangeForFilter = defaultDateRange;
        window.searchTermForFilter = defaultSearch;
        
        // רענון הנתונים עם הפילטרים החדשים
        filterNotesData(defaultStatuses, defaultTypes, defaultAccounts, defaultDateRange, defaultSearch);
        
        console.log(`🔄 === Reset completed for ${pageName} ===`);
      }
    };
    
    // פונקציה לרענון התראות
    function refreshAlerts() {
      if (typeof loadAlertsForCards === 'function') {
        loadAlertsForCards();
        showNotification('התראות רועננו', 'success');
      }
    }
    
    // הגדרת הפונקציה כגלובלית
    window.refreshAlerts = refreshAlerts;
    
    /**
     * פונקציה לאיפוס פילטרים ורענון נתונים
     * מאפסת את כל הפילטרים למצב ברירת המחדל וטוענת נתונים חדשים מהשרת
     */
    function resetAllFiltersAndReloadData() {
      console.log('🔄 === Resetting filters and reloading data ===');
      
      // איפוס הפילטרים למצב ברירת המחדל
      window.resetAllFiltersForPage('notes');
      
      // רענון הנתונים מהשרת
      loadNotes();
    }
    
    // הגדרת הפונקציה כגלובלית
    window.resetAllFiltersAndReloadData = resetAllFiltersAndReloadData;
    
    // אתחול הדף
    document.addEventListener('DOMContentLoaded', function() {
      // טעינת מצב הסקשנים לפי הדף הנוכחי
      if (typeof window.loadSectionStates === 'function') {
        window.loadSectionStates();
      }
      
      console.log('🔄 === DOM CONTENT LOADED ===');
      window.initializePageFilters('notes');
      
      // הגדרת רדיו באטונים
      setupRadioButtons();
      
      // הגדרת טיפול בקבצים
      setupFileHandlers();
      
      // הגדרת event listeners לעורך הטקסט
      const addEditor = document.getElementById('noteContentEditor');
      const editEditor = document.getElementById('editNoteContentEditor');
      
      if (addEditor) {
        addEditor.addEventListener('input', syncEditorContent);
        addEditor.addEventListener('blur', syncEditorContent);
      }
      
      if (editEditor) {
        editEditor.addEventListener('input', syncEditorContent);
        editEditor.addEventListener('blur', syncEditorContent);
      }
      
      // שחזור מצב הסגירה
      restoreNotesSectionState();
      
      // טעינת נתונים
      loadNotes();
      
      // טעינת התראות
      if (typeof loadAlertsForCards === 'function') {
        console.log('🔄 טוען התראות...');
        loadAlertsForCards();
      }
      
      // הגדרת כותרות למיון אחרי טעינת נתונים
      setTimeout(() => {
        console.log('🔄 === SETUP SORTABLE HEADERS AFTER DATA LOAD ===');
        setupSortableHeaders();
      }, 1000);
      
      // הגדרת כותרות למיון
      setTimeout(() => {
        console.log('🔄 === SETUP SORTABLE HEADERS ===');
        setupSortableHeaders();
      }, 500);
      
      // בדיקת פילטרים שמורים אחרי 1 שנייה
      setTimeout(() => {
        window.debugSavedFilters('notes');
        
        // עדכון סטטיסטיקות הטבלה
        updateTableStats();
      }, 1000);
    });
  </script>
</body>
