<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מערכת התראות - TikTrack</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles-new/01-settings/_variables.css">
    <link rel="stylesheet" href="styles-new/02-tools/_normalize.css">
    <link rel="stylesheet" href="styles-new/03-generic/_shared.css">
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css">
    <link rel="stylesheet" href="styles-new/04-elements/_links.css">
    <link rel="stylesheet" href="styles-new/04-elements/_lists.css">
    <link rel="stylesheet" href="styles-new/04-elements/_page.css">
    <link rel="stylesheet" href="styles-new/05-objects/_containers.css">
    <link rel="stylesheet" href="styles-new/05-objects/_grid.css">
    <link rel="stylesheet" href="styles-new/05-objects/_layout.css">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css">
    <link rel="stylesheet" href="styles-new/06-components/_cards.css">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css">
    <link rel="stylesheet" href="styles-new/06-components/_page-headers.css">
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">
    
    <style>
        .test-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 1px solid #e9ecef;
            border-radius: 0.5rem;
            background-color: #f8f9fa;
        }
        
        .test-button {
            margin: 0.25rem;
            min-width: 120px;
        }
        
        .test-result {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.375rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .test-result.success {
            background-color: #d1edff;
            border: 1px solid #0ea5e9;
            color: #0c4a6e;
        }
        
        .test-result.error {
            background-color: #fef2f2;
            border: 1px solid #ef4444;
            color: #991b1b;
        }
        
        .test-result.info {
            background-color: #f0f9ff;
            border: 1px solid #3b82f6;
            color: #1e40af;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 0.5rem;
        }
        
        .status-indicator.success { background-color: #10b981; }
        .status-indicator.error { background-color: #ef4444; }
        .status-indicator.warning { background-color: #f59e0b; }
        .status-indicator.info { background-color: #3b82f6; }
    </style>
</head>
<body>
    <!-- unified-header ייווצר כאן אוטומטית -->
    <div id="unified-header"></div>
    
    <div class="page-body">
        <div class="main-content">
            <div class="container-fluid">
        <!-- Header -->
        <div class="row">
            <div class="col-12">
                <div class="page-header">
                    <h1 class="page-title">🧪 בדיקת מערכת התראות</h1>
                    <p class="page-subtitle">בדיקות מקיפות למערכת הקטגוריות החדשה</p>
                </div>
            </div>
        </div>

        <!-- Test Controls -->
        <div class="row">
            <div class="col-12">
                <div class="test-section">
                    <h5>🎛️ בקרות בדיקה</h5>
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-primary test-button" onclick="runQuickTest()">
                            ⚡ בדיקה מהירה
                        </button>
                        <button class="btn btn-success test-button" onclick="runFullTest()">
                            🧪 בדיקה מלאה
                        </button>
                        <button class="btn btn-info test-button" onclick="testNotifications()">
                            🔔 בדיקת הודעות
                        </button>
                        <button class="btn btn-warning test-button" onclick="testCategories()">
                            📊 בדיקת קטגוריות
                        </button>
                        <button class="btn btn-secondary test-button" onclick="clearResults()">
                            🗑️ נקה תוצאות
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Manual Tests -->
        <div class="row">
            <div class="col-md-6">
                <div class="test-section">
                    <h5>🔔 בדיקות הודעות ידניות</h5>
                    <div class="d-grid gap-2">
                        <button class="btn btn-success" onclick="showTestNotification('success', 'system')">
                            ✅ הודעת הצלחה (מערכת)
                        </button>
                        <button class="btn btn-danger" onclick="showTestNotification('error', 'system')">
                            ❌ הודעת שגיאה (מערכת)
                        </button>
                        <button class="btn btn-warning" onclick="showTestNotification('warning', 'ui')">
                            ⚠️ הודעת אזהרה (ממשק)
                        </button>
                        <button class="btn btn-info" onclick="showTestNotification('info', 'ui')">
                            ℹ️ הודעת מידע (ממשק)
                        </button>
                        <button class="btn btn-primary" onclick="showTestNotification('success', 'business')">
                            💼 הודעת עסקית
                        </button>
                        <button class="btn btn-dark" onclick="showTestNotification('info', 'development')">
                            🔧 הודעת פיתוח
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="test-section">
                    <h5>🤖 בדיקות זיהוי אוטומטי</h5>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-success" onclick="testAutoDetection('טרייד נשמר בהצלחה')">
                            🎯 "טרייד נשמר בהצלחה"
                        </button>
                        <button class="btn btn-outline-info" onclick="testAutoDetection('Cache נוקה בהצלחה')">
                            🧹 "Cache נוקה בהצלחה"
                        </button>
                        <button class="btn btn-outline-danger" onclick="testAutoDetection('שגיאה בקריאת נתונים')">
                            💥 "שגיאה בקריאת נתונים"
                        </button>
                        <button class="btn btn-outline-warning" onclick="testAutoDetection('הדף ירענן בעוד 3 שניות')">
                            🔄 "הדף ירענן בעוד 3 שניות"
                        </button>
                        <button class="btn btn-outline-dark" onclick="testAutoDetection('Debug: loading file')">
                            🐛 "Debug: loading file"
                        </button>
                        <button class="btn btn-outline-primary" onclick="testAutoDetection('Performance: slow query detected')">
                            ⚡ "Performance: slow query detected"
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Control -->
        <div class="row">
            <div class="col-12">
                <div class="test-section">
                    <h5>⚙️ בקרת קטגוריות</h5>
                    <div class="row">
                        <div class="col-md-6">
                            <h6>התראות מערכת:</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="notifications_system_enabled" checked>
                                <label class="form-check-label" for="notifications_system_enabled">
                                    התראות מערכת
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="notifications_business_enabled" checked>
                                <label class="form-check-label" for="notifications_business_enabled">
                                    התראות עסקיות
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="notifications_ui_enabled" checked>
                                <label class="form-check-label" for="notifications_ui_enabled">
                                    התראות ממשק משתמש
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="notifications_development_enabled" checked>
                                <label class="form-check-label" for="notifications_development_enabled">
                                    התראות פיתוח
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="notifications_performance_enabled">
                                <label class="form-check-label" for="notifications_performance_enabled">
                                    התראות ביצועים
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6>לוגים לקונסול:</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="console_logs_system_enabled" checked>
                                <label class="form-check-label" for="console_logs_system_enabled">
                                    לוגי מערכת
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="console_logs_business_enabled" checked>
                                <label class="form-check-label" for="console_logs_business_enabled">
                                    לוגי עסקיים
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="console_logs_ui_enabled" checked>
                                <label class="form-check-label" for="console_logs_ui_enabled">
                                    לוגי ממשק משתמש
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="console_logs_development_enabled">
                                <label class="form-check-label" for="console_logs_development_enabled">
                                    לוגי פיתוח
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="console_logs_performance_enabled">
                                <label class="form-check-label" for="console_logs_performance_enabled">
                                    לוגי ביצועים
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="row">
            <div class="col-12">
                <div class="test-section">
                    <h5>📊 תוצאות בדיקות</h5>
                    <div id="test-results" class="test-result info">
                        לחץ על אחת מכפתורי הבדיקה למעלה כדי להתחיל...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/notification-category-detector.js"></script>
    <script src="scripts/notification-migration-system.js"></script>
    <script src="scripts/notification-system-tester.js"></script>
    <script src="scripts/preferences.js"></script>

    <script>
        // Test Functions
        async function runQuickTest() {
            showResult('info', 'מפעיל בדיקה מהירה...');
            
            try {
                const result = await window.notificationSystemTester.quickTest();
                showResult('success', `✅ בדיקה מהירה הושלמה בהצלחה!\n\nתוצאות:\n- פונקציות בסיסיות: ${result.basicFunctions}\n- פונקציות חכמות: ${result.smartFunctions}\n- קטגוריות מופעלות: ${result.enabledCategories}\n- סה"כ בדיקות: ${result.totalTests}`);
            } catch (error) {
                showResult('error', `❌ שגיאה בבדיקה מהירה: ${error.message}`);
            }
        }

        async function runFullTest() {
            showResult('info', 'מפעיל בדיקה מלאה... זה עלול לקחת כמה שניות...');
            
            try {
                const result = await window.notificationSystemTester.runAllTests();
                showResult('success', `✅ בדיקה מלאה הושלמה!\n\nתוצאות מפורטות:\n${JSON.stringify(result, null, 2)}`);
            } catch (error) {
                showResult('error', `❌ שגיאה בבדיקה מלאה: ${error.message}`);
            }
        }

        async function testNotifications() {
            showResult('info', 'מפעיל בדיקת הודעות...');
            
            try {
                const result = await window.notificationSystemTester.testBasicNotifications();
                const successCount = result.filter(r => r.success).length;
                const totalCount = result.length;
                
                let details = `✅ בדיקת הודעות הושלמה!\n\nתוצאות: ${successCount}/${totalCount} הצליחו\n\nפרטים:\n`;
                result.forEach(r => {
                    details += `${r.success ? '✅' : '❌'} ${r.test}: ${r.success ? 'הצליח' : (r.error || 'נכשל')}\n`;
                });
                
                showResult('success', details);
            } catch (error) {
                showResult('error', `❌ שגיאה בבדיקת הודעות: ${error.message}`);
            }
        }

        async function testCategories() {
            showResult('info', 'מפעיל בדיקת קטגוריות...');
            
            try {
                const result = await window.notificationSystemTester.testCategories();
                const enabledCount = Object.values(result).filter(Boolean).length;
                const totalCount = Object.keys(result).length;
                
                let details = `✅ בדיקת קטגוריות הושלמה!\n\nתוצאות: ${enabledCount}/${totalCount} מופעלות\n\nפרטים:\n`;
                Object.entries(result).forEach(([category, enabled]) => {
                    details += `${enabled ? '✅' : '❌'} ${category}: ${enabled ? 'מופעל' : 'כבוי'}\n`;
                });
                
                showResult('success', details);
            } catch (error) {
                showResult('error', `❌ שגיאה בבדיקת קטגוריות: ${error.message}`);
            }
        }

        async function showTestNotification(type, category) {
            try {
                const messages = {
                    success: 'זוהי הודעת הצלחה לבדיקה',
                    error: 'זוהי הודעת שגיאה לבדיקה',
                    warning: 'זוהי הודעת אזהרה לבדיקה',
                    info: 'זוהי הודעת מידע לבדיקה'
                };
                
                const titles = {
                    success: 'הצלחה',
                    error: 'שגיאה',
                    warning: 'אזהרה',
                    info: 'מידע'
                };
                
                await window.showNotification(messages[type], type, titles[type], 3000, category);
                showResult('success', `✅ הודעת ${type} (${category}) נשלחה בהצלחה!`);
            } catch (error) {
                showResult('error', `❌ שגיאה בשליחת הודעה: ${error.message}`);
            }
        }

        async function testAutoDetection(message) {
            try {
                if (typeof window.detectCategory === 'function') {
                    const detected = window.detectCategory(message, 'info', 'בדיקה', 'test.js', 'testFunction');
                    showResult('success', `✅ זיהוי אוטומטי עבור: "${message}"\n\nקטגוריה מזוהה: ${detected}`);
                } else {
                    showResult('error', '❌ פונקציית זיהוי אוטומטי לא זמינה');
                }
            } catch (error) {
                showResult('error', `❌ שגיאה בזיהוי אוטומטי: ${error.message}`);
            }
        }

        function showResult(type, message) {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.className = `test-result ${type}`;
            resultsDiv.textContent = message;
        }

        function clearResults() {
            showResult('info', 'תוצאות נוקו. לחץ על אחת מכפתורי הבדיקה למעלה כדי להתחיל...');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🧪 Notification Test Page loaded');
            
            // Auto-run quick test on load
            setTimeout(() => {
                runQuickTest();
            }, 1000);
        });
    </script>
    
    <!-- Header System Script -->
    <script src="scripts/header-system.js?v=v6.0.0"></script>
            </div>
        </div>
    </div>
</body>
</html>
