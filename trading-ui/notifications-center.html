<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>מרכז התראות - TikTrack</title>
    
    <!-- 
    ===== IMPORTANT DEVELOPMENT RULES =====
    
    CSS RULES:
    - Only external CSS files are used, following the system's CSS architecture
    - NO inline styles or styles within the page are allowed in this system
    - All styling must be defined in external stylesheets according to ITCSS methodology
    
    JAVASCRIPT RULES:
    - All functions are located in external files
    - NO functions are allowed within the page
    - All system functions use shared global functions located in dedicated files
    - Page-specific functions should be centralized only in the page's dedicated script file
    
    ======================================
    
    CSS Loading Order - ראו: documentation/frontend/css/CSS_ARCHITECTURE.md
    Bootstrap חייב להיטען לפני CSS שלנו כדי ש-CSS שלנו יוכל לדרוס אותו
    -->
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Files - אחרי Bootstrap כדי לדרוס אותו -->

    <link rel="stylesheet" href="styles-new/03-generic/_base.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_links.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_forms-base.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_buttons-base.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_layout.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_grid.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_buttons-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_tables.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_cards.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=v20250924_fixed_black_text">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=1.0.0">
    
    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v38_fixed">
    
    <!-- Dynamic Color System Scripts -->
    <script src="scripts/color-scheme-system.js"></script>
    
    <!-- Preferences System Scripts -->
    <script src="scripts/preferences.js"></script>
    
    <!-- Color Demo Toggle Script -->
    <script src="scripts/color-demo-toggle.js"></script>
</head>

<body>
    <div class="background-wrapper">
        <!-- Header System -->
        <div id="unified-header"></div>

        <!-- Page body -->
        <div class="page-body">
            <!-- Main content limited in width -->
            <div class="main-content" data-section="notifications-center">
                <!-- UI Content Section Top Start-->
                <div class="top-section">
                    <div class="section-header">
                        <!-- כאן נכנס הכותרת של הסקשן עם כותרת מימין וכפתור פתיחה וסגירה כמו שיש לנו כבר מוגדר בצד שמאל -->
                        <h2>🔔 מרכז התראות</h2>
                        <div class="header-actions">
                            <button class="btn btn-sm btn-outline-primary" onclick="copyNotificationsToClipboard()" title="העתק לוג התראות ללוח">
                                <i class="fas fa-copy"></i> העתק ללוח
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט ללוח">
                                <i class="fas fa-clipboard-list"></i> לוג מפורט
                            </button>
                            <button class="btn btn-sm btn-success" onclick="testSuccessNotification()" title="בדיקת הודעת הצלחה">
                                <i class="fas fa-check"></i> הצלחה
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="testErrorNotification()" title="בדיקת הודעת שגיאה">
                                <i class="fas fa-times"></i> שגיאה
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="testWarningNotification()" title="בדיקת הודעת אזהרה">
                                <i class="fas fa-exclamation-triangle"></i> אזהרה
                            </button>
                            <button class="btn btn-sm btn-info" onclick="testInfoNotification()" title="בדיקת הודעת מידע">
                                <i class="fas fa-info"></i> מידע
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר סקשן">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleAllSections()" title="הצג/הסתר כל הסקשנים">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- קומפוננט התראות פעילות -->
                        <active-alerts></active-alerts>

                        <!-- סיכום סטטיסטיקות מהיר -->
                        <div class="info-summary" id="summaryStats">
                            <div class="row">
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-success">הודעות הצלחה</h5>
                                            <h3 class="text-success" id="successCount">0</h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-danger">שגיאות</h5>
                                            <h3 class="text-danger" id="errorCount">0</h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-warning">אזהרות</h5>
                                            <h3 class="text-warning" id="warningCount">0</h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-info">הודעות מידע</h5>
                                            <h3 class="text-info" id="infoCount">0</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- סטטוס חיבור בשורה אחת -->
                        <div class="info-summary mt-3">
                            <div class="row">
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-primary">סטטוס מערכת</h5>
                                            <h6 class="text-primary" id="overallStatus">בדיקה...</h6>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-info">WebSocket</h5>
                                            <h6 class="text-info" id="websocketStatus">מתחבר...</h6>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-secondary">זמן חיבור</h5>
                                            <h6 class="text-secondary" id="connectionTime">-</h6>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-dark">הודעות נשלחו</h5>
                                            <h6 class="text-dark" id="messagesSent">0</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <!-- UI Content Section Top End -->  


                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="section1">
                    <div class="section-header">
                        <h2>📊 סקירה כללית</h2>
                        <button class="filter-toggle-btn" onclick="toggleSection('section1')" title="הצג/הסתר סקשן">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div class="section-body">
                        <div class="info-summary" id="overviewStats">
                            <div>התראות פעילות: <strong id="activeAlertsCount">0</strong></div>
                            <div>הודעות חדשות: <strong id="newMessagesCount">0</strong></div>
                            <div>עדכון אחרון: <strong id="lastUpdateTime">-</strong></div>
                            <div>סטטוס: <strong id="systemStatus">בדיקה...</strong></div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 1 End --> 

                <!-- UI Content Section 2 Start-->
                <div class="content-section" id="section2">
                    <div class="section-header">
                        <!-- כאן נכנס הכותרת של הסקשן עם כותרת מימין וכפתור פתיחה וסגירה כמו שיש לנו כבר מוגדר בצד שמאל -->
                        <h2>📜 היסטוריית התראות</h2>
                        <div class="section-header-actions">
                            <button class="btn btn-sm btn-outline-danger" onclick="clearHistory()">
                                <i class="fas fa-trash"></i> נקה היסטוריה
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('section2')" title="הצג/הסתר סקשן">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <!-- היסטוריית התראות -->
                        <div class="history-card">
                            <div class="card-header">
                                <div class="history-controls">
                                    <select id="historyFilter" class="form-select form-select-sm" onchange="filterHistory()">
                                        <option value="">כל ההתראות</option>
                                        <option value="success">הצלחה</option>
                                        <option value="error">שגיאה</option>
                                        <option value="warning">אזהרה</option>
                                        <option value="info">מידע</option>
                                    </select>
                                    <select id="pageFilter" class="form-select form-select-sm" onchange="filterHistory()">
                                        <option value="">כל העמודים</option>
                                    </select>
                                    <select id="historyPeriod" class="form-select form-select-sm" onchange="filterHistory()">
                                        <option value="1h">שעה אחרונה</option>
                                        <option value="24h" selected>24 שעות אחרונות</option>
                                        <option value="7d">שבוע אחרון</option>
                                        <option value="30d">חודש אחרון</option>
                                    </select>
                                    <button class="btn btn-sm btn-outline-primary" onclick="copyFilteredHistoryToClipboard()" title="העתק היסטוריה מסוננת ללוח">
                                        <i class="fas fa-copy"></i> העתק לוג
                                    </button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="history-container" id="notificationHistory">
                                    <div class="empty-state">
                                        <i class="fas fa-history"></i>
                                        <p>אין היסטוריית התראות</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 2 End--> 
            </div>
        </div>
    </div>

    <!-- Essential System Components -->
    <script src="scripts/unified-indexeddb-adapter.js"></script>
    <script src="scripts/project-files-scanner.js"></script>
    <script src="scripts/data-collector.js"></script>
    
    <!-- 🔄 NEW UNIFIED INITIALIZATION SYSTEM -->
    <!-- Core Systems -->
    <script src="scripts/global-favicon.js"></script>
    <script src="scripts/ui-utils.js"></script>
    <script src="scripts/data-utils.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/system-management.js"></script>
    <script src="scripts/notification-category-detector.js"></script>
    <script src="scripts/notification-migration-system.js"></script>
    <script src="scripts/global-notification-collector.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/central-refresh-system.js"></script>
    
    <!-- New Unified Initialization System -->
    <script src="scripts/application-initializer.js"></script>
    <script src="scripts/page-initialization-configs.js"></script>
    <script src="scripts/unified-app-initializer.js"></script>

    <!-- Page-specific scripts -->
    <script src="scripts/realtime-notifications-client.js"></script>
    <script src="scripts/notifications-center.js"></script>
</body>
</html>
