<!DOCTYPE html>
<html lang="he" dir="rtl">
            <!-- ===== CSS Architecture - Unified CSS ===== -->
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack CSS - Unified CSS (No @import) -->
    <link rel="stylesheet" href="styles-new/unified.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Error Handlers -->
    <script src="scripts/error-handlers.js"></script>
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=20250115_level3_fix"></head>
<body class="notifications-center-page">
    <!-- Unified Header Container -->
    <div id="unified-header"></div>
    <div class="background-wrapper">
        <!-- unified-header יווצר כאן אוטומטית -->
        <div id="unified-header"></div>
        
        <!-- Page body - All content after header -->
        <div class="page-body">
            <!-- Page area - top-Section -->
            <div class="top-section">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/development.svg?v=20250905" alt="מרכז התראות"
                            style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        מרכז התראות
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-outline-primary btn-sm" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והסטטוס">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור מרכז התראות">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Page summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>הודעות הצלחה: <strong id="successStats">0</strong></div>
                        <div>שגיאות: <strong id="errorStats">0</strong></div>
                        <div>אזהרות: <strong id="warningStats">0</strong></div>
                        <div>סטטוס: <strong id="overallStatus">בדיקה...</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content" data-section="notifications">
                <div class="container">
            
            <!-- Statistics Card -->
            <div class="stats-card">
                <div class="card-header">
                    <h3><i class="fas fa-chart-bar"></i> סטטיסטיקות התראות</h3>
                    <button class="btn btn-sm btn-outline-primary" onclick="copyNotificationsToClipboard()" title="העתק לוג התראות ללוח">
                        <i class="fas fa-copy"></i> העתק ללוח
                    </button>
                </div>
                <div class="card-body">
                    <div class="stats-grid">
                        <div class="stat-item success">
                            <div class="stat-icon">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="stat-content">
                                <div class="stat-value" id="successCount">0</div>
                                <div class="stat-label">הצלחות</div>
                            </div>
                        </div>
                        <div class="stat-item error">
                            <div class="stat-icon">
                                <i class="fas fa-exclamation-circle"></i>
                            </div>
                            <div class="stat-content">
                                <div class="stat-value" id="errorCount">0</div>
                                <div class="stat-label">שגיאות</div>
                            </div>
                        </div>
                        <div class="stat-item warning">
                            <div class="stat-icon">
                                <i class="fas fa-exclamation-triangle"></i>
                            </div>
                            <div class="stat-content">
                                <div class="stat-value" id="warningCount">0</div>
                                <div class="stat-label">אזהרות</div>
                            </div>
                        </div>
                        <div class="stat-item info">
                            <div class="stat-icon">
                                <i class="fas fa-info-circle"></i>
                            </div>
                            <div class="stat-content">
                                <div class="stat-value" id="infoCount">0</div>
                                <div class="stat-label">הודעות מידע</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Connection Status Card -->
            <div class="status-card">
                <div class="card-header">
                    <h3><i class="fas fa-wifi"></i> סטטוס חיבור</h3>
                    <div class="status-badge" id="connectionStatus">
                        <span class="status-dot"></span>
                        <span class="status-text">מתחבר...</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="label">WebSocket:</span>
                            <span class="value" id="websocketStatus">מתחבר...</span>
                        </div>
                        <div class="status-item">
                            <span class="label">זמן חיבור:</span>
                            <span class="value" id="connectionTime">-</span>
                        </div>
                        <div class="status-item">
                            <span class="label">הודעות נשלחו:</span>
                            <span class="value" id="messagesSent">0</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Settings Card -->
            <div class="settings-card">
                <div class="card-header">
                    <h3><i class="fas fa-cog"></i> הגדרות התראות</h3>
                </div>
                <div class="card-body">
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label class="setting-label">
                                <input type="checkbox" id="enableRealtime" checked>
                                <span class="checkmark"></span>
                                התראות בזמן אמת
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="setting-label">
                                <input type="checkbox" id="enableSounds" checked>
                                <span class="checkmark"></span>
                                צלילי התראה
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="setting-label">
                                <input type="checkbox" id="enableBackgroundTasks" checked>
                                <span class="checkmark"></span>
                                משימות ברקע
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="setting-label">
                                <input type="checkbox" id="enableDataUpdates" checked>
                                <span class="checkmark"></span>
                                עדכוני נתונים
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="setting-label">
                                <input type="checkbox" id="enableExternalData" checked>
                                <span class="checkmark"></span>
                                נתונים חיצוניים
                            </label>
                        </div>
                        <div class="setting-item">
                            <label class="setting-label">
                                <input type="checkbox" id="enableSystemEvents" checked>
                                <span class="checkmark"></span>
                                אירועי מערכת
                            </label>
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn btn-primary" onclick="saveNotificationSettings()">
                            <i class="fas fa-save"></i> שמור הגדרות
                        </button>
                        <button class="btn btn-outline-secondary" onclick="resetNotificationSettings()">
                            <i class="fas fa-undo"></i> אפס הגדרות
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- History Card -->
            <div class="history-card">
                <div class="card-header">
                    <h3><i class="fas fa-history"></i> היסטוריית התראות</h3>
                    <div class="card-actions">
                        <select id="historyFilter" class="form-select form-select-sm" onchange="filterHistory()">
                            <option value="">כל ההתראות</option>
                            <option value="success">הצלחה</option>
                            <option value="error">שגיאה</option>
                            <option value="warning">אזהרה</option>
                            <option value="info">מידע</option>
                        </select>
                        <select id="historyPeriod" class="form-select form-select-sm" onchange="filterHistory()">
                            <option value="1h">שעה אחרונה</option>
                            <option value="24h" selected>24 שעות אחרונות</option>
                            <option value="7d">שבוע אחרון</option>
                            <option value="30d">חודש אחרון</option>
                        </select>
                        <button class="btn btn-sm btn-outline-danger" onclick="clearHistory()">
                            <i class="fas fa-trash"></i> נקה היסטוריה
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="history-container" id="notificationHistory">
                        <div class="empty-state">
                            <i class="fas fa-history"></i>
                            <p>אין היסטוריית התראות</p>
                        </div>
                    </div>
                </div>
            </div>
            </div> <!-- End main-content -->
        </div> <!-- End page-body -->
    </div> <!-- End background-wrapper -->
    
    <!-- Bootstrap JS - חייב להיות ראשון -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="scripts/console-cleanup.js"></script>
    <script src="scripts/translation-utils.js"></script>
    <script src="scripts/data-utils.js"></script>
    <script src="scripts/ui-utils.js"></script>
    <script src="scripts/table-mappings.js"></script>
    <script src="scripts/date-utils.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/linked-items.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/header-system.js?v=20250115_level3_fix"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/realtime-notifications-client.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/notifications-center.js"></script>
</body>
</html>
