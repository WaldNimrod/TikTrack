<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול העדפות - TikTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles/unified.css?v=v1.0.0" rel="stylesheet">
    <link href="styles/header-styles.css?v=v1.0.0" rel="stylesheet">
    <style>
        .preference-row {
            transition: background-color 0.2s;
        }
        .preference-row:hover {
            background-color: #f8f9fa;
        }
        .status-badge {
            font-size: 0.8em;
        }
        .topic-select {
            min-width: 200px;
        }
        .setting-id {
            font-family: monospace;
            font-size: 0.85em;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="background-wrapper">
        <!-- Unified Header -->
        <div id="unified-header"></div>
        
        <div class="page-body">
            <div class="main-content">
                <!-- Top Section -->
                <div class="top-section">
                    <div class="section-header">
                        <h1>📋 ניהול העדפות - עמוד זמני</h1>
                        <p>סמן סטטוס ונושא לכל הגדרה במערכת</p>
                    </div>
                </div>

                <!-- Content Section -->
                <div class="content-section">
                    <div class="section-header">
                        <h2>🎯 הגדרות מערכת</h2>
                        <p>לכל הגדרה - סמן סטטוס דרוש ונושא נכון</p>
                    </div>
                    <div class="section-body">
                        <div class="table-responsive">
                            <table class="table table-hover" id="preferencesTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>הגדרה</th>
                                        <th>נושא נוכחי</th>
                                        <th>סטטוס דרוש</th>
                                        <th>נושא נכון</th>
                                        <th>פעולות</th>
                                    </tr>
                                </thead>
                                <tbody id="preferencesTableBody">
                                    <!-- תוכן הטבלה יטען דינמית -->
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-4">
                            <button class="btn btn-primary" onclick="saveAllChanges()">
                                <i class="bi bi-save"></i> שמור שינויים
                            </button>
                            <button class="btn btn-outline-secondary" onclick="resetChanges()">
                                <i class="bi bi-arrow-clockwise"></i> איפוס שינויים
                            </button>
                            <button class="btn btn-outline-info" onclick="exportResults()">
                                <i class="bi bi-download"></i> ייצא תוצאות
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/header-system.js?v=v1.0.0"></script>
    
    <script>
        // הגדרות המערכת - כל ההגדרות הקיימות
        const preferences = [
            // הגדרות בסיסיות
            { id: 'primaryCurrency', name: 'מטבע ראשי', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'secondaryCurrency', name: 'מטבע משני', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'timezone', name: 'אזור זמן', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'language', name: 'שפת הממשק', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'defaultStopLoss', name: 'סטופ לוס ברירת מחדל', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'defaultTargetPrice', name: 'יעד ברירת מחדל', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'defaultCommission', name: 'עמלה ברירת מחדל', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            
            // פילטרים ברירת מחדל
            { id: 'defaultAccountFilter', name: 'חשבון ברירת מחדל', currentTopic: 'פילטרים ברירת מחדל', category: 'filters' },
            { id: 'defaultStatusFilter', name: 'סטטוס ברירת מחדל', currentTopic: 'פילטרים ברירת מחדל', category: 'filters' },
            { id: 'defaultTypeFilter', name: 'סוג השקעה ברירת מחדל', currentTopic: 'פילטרים ברירת מחדל', category: 'filters' },
            { id: 'defaultDateRangeFilter', name: 'טווח תאריכים ברירת מחדל', currentTopic: 'פילטרים ברירת מחדל', category: 'filters' },
            
            // הגדרות ממשק משתמש
            { id: 'primaryColor', name: 'צבע ראשי', currentTopic: 'הגדרות ממשק משתמש', category: 'ui' },
            { id: 'secondaryColor', name: 'צבע משני', currentTopic: 'הגדרות ממשק משתמש', category: 'ui' },
            { id: 'successColor', name: 'צבע הצלחה', currentTopic: 'הגדרות ממשק משתמש', category: 'ui' },
            { id: 'warningColor', name: 'צבע אזהרה', currentTopic: 'הגדרות ממשק משתמש', category: 'ui' },
            { id: 'tableRowsPerPage', name: 'מספר שורות בטבלה', currentTopic: 'הגדרות ממשק משתמש', category: 'ui' },
            { id: 'defaultTheme', name: 'עיצוב ברירת מחדל', currentTopic: 'הגדרות ממשק משתמש', category: 'ui' },
            
            // הגדרות מערכת ושרת
            { id: 'serverUrl', name: 'כתובת שרת', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            { id: 'serverPort', name: 'פורט', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            { id: 'refreshInterval', name: 'מרווח רענון', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            { id: 'cacheTTL', name: 'זמן Cache', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            { id: 'maxMemorySize', name: 'גודל זיכרון מקסימלי', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            
            // הגדרות מסחר
            { id: 'defaultStopLoss', name: 'סטופ לוס ברירת מחדל', currentTopic: 'הגדרות מסחר', category: 'trading' },
            { id: 'defaultTargetPrice', name: 'יעד ברירת מחדל', currentTopic: 'הגדרות מסחר', category: 'trading' },
            { id: 'defaultCommission', name: 'עמלה ברירת מחדל', currentTopic: 'הגדרות מסחר', category: 'trading' },
            
            // הגדרות מערכת נוספות
            { id: 'consoleCleanupInterval', name: 'זמן ניקוי קונסולה', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            { id: 'manualConsoleCleanup', name: 'ניקוי ידני של קונסולה', currentTopic: 'הגדרות מערכת ושרת', category: 'system' },
            
            // פילטרים נוספים
            { id: 'defaultSearchFilter', name: 'טקסט חיפוש ברירת מחדל', currentTopic: 'פילטרים ברירת מחדל', category: 'filters' },
            
            // הגדרות בדיקות
            { id: 'useTempDatabase', name: 'שימוש בבסיס נתונים זמני', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'backupBeforeTests', name: 'גיבוי לפני בדיקות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'cleanupAfterTests', name: 'ניקוי אחרי בדיקות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'parallelTests', name: 'בדיקות מקבילות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'showProgress', name: 'הצגת התקדמות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'stopOnError', name: 'עצירה בשגיאה', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'detailedReport', name: 'דוח מפורט', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'saveReports', name: 'שמירת דוחות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'htmlReport', name: 'דוח HTML', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'errorNotifications', name: 'התראות שגיאה', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'successNotifications', name: 'התראות הצלחה', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'measureTime', name: 'מדידת זמן', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'measureMemory', name: 'מדידת זיכרון', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            
            // הגדרות אבטחה
            { id: 'securityTests', name: 'בדיקות אבטחה', currentTopic: 'הגדרות אבטחה', category: 'security' },
            { id: 'penetrationTests', name: 'בדיקות חדירה', currentTopic: 'הגדרות אבטחה', category: 'security' },
            { id: 'debugMode', name: 'מצב דיבוג', currentTopic: 'הגדרות אבטחה', category: 'security' },
            { id: 'dryRun', name: 'הרצה יבשה', currentTopic: 'הגדרות אבטחה', category: 'security' },
            { id: 'isolatedTests', name: 'בדיקות מבודדות', currentTopic: 'הגדרות אבטחה', category: 'security' },
            
            // סטטיסטיקות בדיקות
            { id: 'totalTests', name: 'סה"כ בדיקות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'activeTests', name: 'בדיקות פעילות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'inactiveTests', name: 'בדיקות לא פעילות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'testCategories', name: 'קטגוריות בדיקות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'totalCRUDTests', name: 'סה"כ בדיקות CRUD', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'activeCRUDTests', name: 'בדיקות CRUD פעילות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'inactiveCRUDTests', name: 'בדיקות CRUD לא פעילות', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            { id: 'crudOperations', name: 'פעולות CRUD', currentTopic: 'הגדרות בדיקות', category: 'testing' },
            
            // הגדרות מתקדמות
            { id: 'logLevel', name: 'רמת לוג', currentTopic: 'הגדרות מתקדמות', category: 'advanced' },
            { id: 'maxLogFileSize', name: 'גודל קובץ לוג מקסימלי', currentTopic: 'הגדרות מתקדמות', category: 'advanced' },
            { id: 'maxAccountRisk', name: 'סיכון מקסימלי לחשבון', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'maxTradeRisk', name: 'סיכון מקסימלי לטרייד', currentTopic: 'הגדרות בסיסיות', category: 'general' },
            { id: 'maxPositionSize', name: 'גודל פוזיציה מקסימלי', currentTopic: 'הגדרות בסיסיות', category: 'general' }
        ];

        // נושאים זמינים
        const topics = [
            'הגדרות בסיסיות',
            'הגדרות מסחר',
            'פילטרים ברירת מחדל', 
            'הגדרות ממשק משתמש',
            'הגדרות מערכת ושרת',
            'הגדרות מתקדמות',
            'הגדרות בדיקות',
            'הגדרות אבטחה'
        ];

        // טעינת הטבלה
        function loadPreferencesTable() {
            const tbody = document.getElementById('preferencesTableBody');
            tbody.innerHTML = '';

            preferences.forEach(pref => {
                const row = document.createElement('tr');
                row.className = 'preference-row';
                row.innerHTML = `
                    <td>
                        <strong>${pref.name}</strong>
                        <br><small class="setting-id">ID: ${pref.id}</small>
                    </td>
                    <td>
                        <span class="badge bg-secondary">${pref.currentTopic}</span>
                    </td>
                    <td>
                        <select class="form-select form-select-sm status-select" data-id="${pref.id}">
                            <option value="active">פעיל</option>
                            <option value="disabled">לא פעיל (עתידי)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm topic-select" data-id="${pref.id}">
                            <option value="keep">להשאיר (${pref.currentTopic})</option>
                            ${topics.filter(topic => topic !== pref.currentTopic).map(topic => 
                                `<option value="${topic}">${topic}</option>`
                            ).join('')}
                        </select>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-info" onclick="showDetails('${pref.id}')">
                            <i class="bi bi-info-circle"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // הצגת פרטים
        function showDetails(prefId) {
            const pref = preferences.find(p => p.id === prefId);
            if (pref) {
                alert(`פרטי הגדרה:\n\nשם: ${pref.name}\nID: ${pref.id}\nנושא נוכחי: ${pref.currentTopic}\nקטגוריה: ${pref.category}`);
            }
        }

        // שמירת שינויים
        function saveAllChanges() {
            const changes = [];
            
            document.querySelectorAll('.status-select').forEach(select => {
                const prefId = select.dataset.id;
                const status = select.value;
                const pref = preferences.find(p => p.id === prefId);
                
                if (pref) {
                    changes.push({
                        id: prefId,
                        name: pref.name,
                        status: status,
                        currentTopic: pref.currentTopic
                    });
                }
            });

            document.querySelectorAll('.topic-select').forEach(select => {
                const prefId = select.dataset.id;
                const newTopic = select.value;
                const pref = preferences.find(p => p.id === prefId);
                
                if (pref && newTopic !== 'keep') {
                    const change = changes.find(c => c.id === prefId);
                    if (change) {
                        change.newTopic = newTopic;
                    }
                }
            });

            // הצגת סיכום השינויים
            if (changes.length > 0) {
                let summary = 'שינויים שנשמרו:\n\n';
                changes.forEach(change => {
                    summary += `• ${change.name}\n`;
                    summary += `  סטטוס: ${change.status === 'active' ? 'פעיל' : 'לא פעיל'}\n`;
                    if (change.newTopic) {
                        summary += `  נושא חדש: ${change.newTopic}\n`;
                    }
                    summary += '\n';
                });
                
                alert(summary);
                window.showNotification('שינויים נשמרו בהצלחה!', 'success');
            } else {
                window.showNotification('לא בוצעו שינויים', 'info');
            }
        }

        // איפוס שינויים
        function resetChanges() {
            if (confirm('האם אתה בטוח שברצונך לאפס את כל השינויים?')) {
                loadPreferencesTable();
                window.showNotification('שינויים אופסו', 'info');
            }
        }

        // ייצוא תוצאות
        function exportResults() {
            const results = [];
            
            document.querySelectorAll('.status-select').forEach(select => {
                const prefId = select.dataset.id;
                const status = select.value;
                const pref = preferences.find(p => p.id === prefId);
                const topicSelect = document.querySelector(`.topic-select[data-id="${prefId}"]`);
                const newTopic = topicSelect ? topicSelect.value : 'keep';
                
                if (pref) {
                    results.push({
                        id: pref.id,
                        name: pref.name,
                        currentTopic: pref.currentTopic,
                        status: status,
                        newTopic: newTopic === 'keep' ? pref.currentTopic : newTopic
                    });
                }
            });

            const dataStr = JSON.stringify(results, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'preferences-management-results.json';
            link.click();
            URL.revokeObjectURL(url);
            
            window.showNotification('תוצאות יוצאו בהצלחה!', 'success');
        }

        // טעינה ראשונית
        document.addEventListener('DOMContentLoaded', function() {
            loadPreferencesTable();
        });
    </script>
</body>
</html>
