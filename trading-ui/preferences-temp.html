    <div id="unified-header"></div>

    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Main Content Container (DO NOT MODIFY) -->
    <div class="main-content">
        <!-- UI Content Section Top Start-->
        <div class="top-section">
            <div class="section-header">
                <div class="row">
                    <div class="col-md-8">
                        <h2><i class="bi bi-info-circle"></i> מידע כללי על ההעדפות</h2>
                    </div>
                    <div class="col-md-4">
                        <div class="d-flex justify-content-end gap-2">
                            <button class="btn btn-success" onclick="window.saveAllPreferences()" id="saveAllBtn">
                                <i class="bi bi-save"></i> שמור הכל
                            </button>
                            <button class="btn btn-warning" onclick="window.resetToDefaults()" id="resetBtn">
                                <i class="bi bi-arrow-clockwise"></i> איפוס
                            </button>
                            <button class="btn btn-outline-secondary" onclick="window.toggleAllSections()" id="toggleAllBtn">
                                <i class="bi bi-arrows-expand"></i> פתח/סגור הכל
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="section-body" id="infoSummary">
                <div class="row">
                    <div class="col-md-6">
                        <div class="info-item">
                            <strong>פרופיל פעיל:</strong>
                            <span id="activeProfileInfo">ברירת מחדל</span>
                        </div>
                        <div class="info-item">
                            <strong>מספר העדפות:</strong>
                            <span id="preferencesCount">טוען...</span>
                        </div>
                        <div class="info-item">
                            <strong>סטטוס מערכת:</strong>
                            <span id="systemStatus" class="text-success">פעיל</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-item">
                            <strong>עדכון אחרון:</strong>
                            <span id="lastUpdate">טוען...</span>
                        </div>
                        <div class="info-item">
                            <strong>גרסת מערכת:</strong>
                            <span id="systemVersion">3.0</span>
                        </div>
                        <div class="info-item">
                            <strong>מטבע ראשי:</strong>
                            <span id="primaryCurrencyInfo">USD</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
