<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מערכת Query Optimization - TikTrack</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/apple-theme.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-wrapper">
        <!-- unified-header auto-generated -->
        <div class="page-body">
            <div class="top-section">
                <div class="section-header">
                    <div class="table-title">
                        <img src="/images/icons/development.svg" style="width: 40px; height: 40px;">
                        בדיקת מערכת Query Optimization חכמה
                    </div>
                </div>
            </div>
            
            <div class="main-content">
                <!-- Performance Overview -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-chart-line me-2"></i>סקירת ביצועים</h5>
                                <button class="btn btn-sm btn-primary float-start" id="refresh-stats">
                                    <i class="fas fa-sync me-1"></i>רענן
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="performance-stats-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען סטטיסטיקות...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-lightbulb me-2"></i>הזדמנויות אופטימיזציה</h5>
                                <button class="btn btn-sm btn-success float-start" id="get-opportunities">
                                    <i class="fas fa-search me-1"></i>חפש
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="optimization-opportunities-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-success" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען הזדמנויות...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Slow Queries -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-exclamation-triangle me-2"></i>Queries איטיים</h5>
                                <button class="btn btn-sm btn-warning float-start" id="get-slow-queries">
                                    <i class="fas fa-clock me-1"></i>בדוק
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="slow-queries-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-warning" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען queries איטיים...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- System Information -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-info-circle me-2"></i>מידע על המערכת</h5>
                                <button class="btn btn-sm btn-outline-secondary float-start" id="get-system-info">
                                    <i class="fas fa-info me-1"></i>קבל מידע
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="system-info-content">
                                    <div class="text-center">
                                        <div class="spinner-border text-info" role="status">
                                            <span class="visually-hidden">טוען...</span>
                                        </div>
                                        <p class="mt-2">טוען מידע...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-cogs me-2"></i>פעולות ניהול</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <button class="btn btn-warning" id="clear-profiles">
                                        <i class="fas fa-trash me-1"></i>נקה פרופילים
                                    </button>
                                    <button class="btn btn-info" id="export-profiles">
                                        <i class="fas fa-download me-1"></i>ייצא פרופילים
                                    </button>
                                    <button class="btn btn-secondary" id="export-temp">
                                        <i class="fas fa-file-alt me-1"></i>ייצא זמני
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Query Testing -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-play-circle me-2"></i>בדיקת Queries</h5>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="test-query-type" class="form-label">סוג Query:</label>
                                            <select class="form-select" id="test-query-type">
                                                <option value="tickers">טיקרים</option>
                                                <option value="trades">טריידים</option>
                                                <option value="accounts">חשבונות</option>
                                                <option value="executions">ביצועים</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label for="test-iterations" class="form-label">מספר איטרציות:</label>
                                            <input type="number" class="form-control" id="test-iterations" value="10" min="1" max="100">
                                        </div>
                                        <button class="btn btn-primary" id="run-query-test">
                                            <i class="fas fa-play me-1"></i>הרץ בדיקה
                                        </button>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="query-test-results">
                                            <p class="text-muted">תוצאות בדיקת ה-Queries יופיעו כאן</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Log Panel -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-terminal me-2"></i>יומן פעילות</h5>
                                <button class="btn btn-sm btn-outline-secondary float-start" id="clear-log">
                                    <i class="fas fa-trash me-1"></i>נקה יומן
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="log-content" class="log-panel" style="max-height: 300px; overflow-y: auto;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="scripts/query-optimization-test.js"></script>
</body>
</html>
