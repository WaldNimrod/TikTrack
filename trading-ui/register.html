<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה - TikTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles-new/master.css">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #eef2ff 0%, #f8fafc 45%, #e0e7ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-card p {
      color: var(--apple-text-secondary, #555);
      margin-bottom: 1.5rem;
    }
    .auth-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .auth-status {
      margin-top: 1rem;
      color: var(--apple-text-secondary, #555);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">
          <img src="images/logo.svg" alt="TikTrack Logo" />
        </div>
        <h1 class="login-title">הרשמה</h1>
        <p class="login-subtitle">הצטרפו ל-TikTrack</p>
      </div>

      <div class="login-error" id="registerError"></div>
      <div class="login-success" id="registerSuccess"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="username">שם משתמש</label>
          <input type="text" id="username" class="form-control" placeholder="הכנס שם משתמש" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">אימייל (אופציונלי)</label>
          <input type="email" id="email" class="form-control" placeholder="הכנס אימייל">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">סיסמה</label>
          <input type="password" id="password" class="form-control" placeholder="הכנס סיסמה" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">אימות סיסמה</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="אמת סיסמה" required>
        </div>

        <button type="submit" class="btn-login" id="registerBtn">
          הרשמה
        </button>
      </form>

      <div class="login-links">
        <a href="login.html">כבר יש לך חשבון? התחבר</a>
      </div>
    </div>
  </div>

  <!-- Core scripts -->
  <!-- Init System Scripts - Load Order Critical -->
  <script src="scripts/init-system/package-manifest.js" defer></script>
  <script src="scripts/page-initialization-configs.js" defer></script>
  <script src="scripts/modules/core-systems.js" defer></script>
  <!-- End Init System Scripts -->
  <script src="scripts/api-config.js" defer></script>
  <script src="scripts/logger-service.js" defer></script>
  <script src="scripts/notification-system.js" defer></script>
  <script src="scripts/unified-cache-manager.js" defer></script>
  <script src="scripts/auth.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('registerForm');
      if (!form) {
        console.error('[register.js] Register form not found');
        return;
      }

      // Setup form submission handler
      form.addEventListener('submit', handleRegisterSubmit);

      // Focus on username field
      const usernameField = document.getElementById('username');
      if (usernameField) {
        usernameField.focus();
      }

      // Log initialization
      if (window.Logger?.info) {
        window.Logger.info('[register.js] Register page initialized successfully', { page: 'register' });
      }
    });

    async function handleRegisterSubmit(e) {
      e.preventDefault();

      // Get form values
      const username = document.getElementById('username')?.value?.trim();
      const email = document.getElementById('email')?.value?.trim();
      const password = document.getElementById('password')?.value?.trim();
      const confirmPassword = document.getElementById('confirmPassword')?.value?.trim();

      // Clear previous messages
      showRegisterError('');
      showRegisterSuccess('');

      if (!username || !password || !confirmPassword) {
        showRegisterError('אנא מלא את כל השדות הנדרשים');
        return;
      }

      if (password !== confirmPassword) {
        showRegisterError('הסיסמאות אינן תואמות');
        return;
      }

      if (password.length < 6) {
        showRegisterError('הסיסמה חייבת להכיל לפחות 6 תווים');
        return;
      }

      // Set loading state
      setLoadingState(true);

      try {
        // Here you would implement the actual registration API call
        // For now, show success message
        showRegisterSuccess('הרשמה הושלמה בהצלחה! מועבר לעמוד ההתחברות...');

        // Redirect to login after short delay
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        console.error('[register.js] Registration failed:', error);
        showRegisterError(error.message || 'שגיאה בהרשמה');
      } finally {
        setLoadingState(false);
      }
    }

    function showRegisterError(message) {
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');

      if (errorDiv) {
        errorDiv.textContent = message;
        errorDiv.style.display = message ? 'block' : 'none';
      }

      if (successDiv) {
        successDiv.style.display = 'none';
      }
    }

    function showRegisterSuccess(message) {
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');

      if (successDiv) {
        successDiv.textContent = message;
        successDiv.style.display = message ? 'block' : 'none';
      }

      if (errorDiv) {
        errorDiv.style.display = 'none';
      }
    }

    function setLoadingState(loading) {
      const submitBtn = document.getElementById('registerBtn');
      if (submitBtn) {
        submitBtn.disabled = loading;
        submitBtn.textContent = loading ? 'מבצע הרשמה...' : 'הרשמה';
      }
    }
  </script>
  <script src="scripts/color-scheme-system.js" defer></script> <!-- Dynamic color system -->
</body>
</html>
