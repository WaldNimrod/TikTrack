<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה - TikTrack</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Hebrew', sans-serif;
            padding: 2rem 0;
        }
        
        .register-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            margin: 2rem;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .register-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .register-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--apple-text-primary, #000);
            margin-bottom: 0.5rem;
        }
        
        .register-subtitle {
            color: var(--apple-text-secondary, #666);
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--apple-text-primary, #000);
            text-align: right;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--apple-border, #C6C6C8);
            border-radius: 8px;
            font-size: 1rem;
            direction: rtl;
            text-align: right;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--apple-blue, #007AFF);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        
        .invalid-feedback {
            display: block;
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            text-align: right;
        }
        
        .btn-register {
            width: 100%;
            padding: 0.75rem;
            background: var(--apple-blue, #007AFF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-register:hover {
            background: #0051D5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .register-error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .register-success {
            background: #efe;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--apple-border, #C6C6C8);
        }
        
        .login-link a {
            color: var(--apple-blue, #007AFF);
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .password-requirements {
            font-size: 0.875rem;
            color: var(--apple-text-secondary, #666);
            margin-top: 0.5rem;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-logo">📊</div>
            <h1 class="register-title">הרשמה ל-TikTrack</h1>
            <p class="register-subtitle">צור חשבון חדש כדי להתחיל</p>
        </div>
        
        <div class="register-error" id="registerError"></div>
        <div class="register-success" id="registerSuccess"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="username">שם משתמש *</label>
                <input type="text" id="username" class="form-control" placeholder="הכנס שם משתמש" required>
                <div class="invalid-feedback" id="usernameError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">אימייל</label>
                <input type="email" id="email" class="form-control" placeholder="הכנס כתובת אימייל (אופציונלי)">
                <div class="invalid-feedback" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="firstName">שם פרטי</label>
                <input type="text" id="firstName" class="form-control" placeholder="הכנס שם פרטי (אופציונלי)">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="lastName">שם משפחה</label>
                <input type="text" id="lastName" class="form-control" placeholder="הכנס שם משפחה (אופציונלי)">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">סיסמה *</label>
                <input type="password" id="password" class="form-control" placeholder="הכנס סיסמה (מינימום 6 תווים)" required minlength="6">
                <div class="password-requirements">הסיסמה חייבת להכיל לפחות 6 תווים</div>
                <div class="invalid-feedback" id="passwordError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirmPassword">אימות סיסמה *</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="הכנס סיסמה שוב" required minlength="6">
                <div class="invalid-feedback" id="confirmPasswordError"></div>
            </div>
            
            <button type="submit" class="btn-register" id="registerBtn">
                <span id="registerBtnText">הרשם</span>
                <span id="registerBtnSpinner" style="display: none;">⏳ נרשם...</span>
            </button>
        </form>
        
        <div class="login-link">
            כבר יש לך חשבון? <a href="login.html">התחבר כאן</a>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="scripts/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            const form = document.getElementById('registerForm');
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const registerBtn = document.getElementById('registerBtn');
            const registerBtnText = document.getElementById('registerBtnText');
            const registerBtnSpinner = document.getElementById('registerBtnSpinner');
            
            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
            
            function showSuccess(message) {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }
            
            function setLoading(loading) {
                registerBtn.disabled = loading;
                registerBtnText.style.display = loading ? 'none' : 'inline';
                registerBtnSpinner.style.display = loading ? 'inline' : 'none';
            }
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Clear previous errors
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
                document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
                
                // Get form values
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                // Validation
                if (!username) {
                    showError('שם משתמש הוא שדה חובה');
                    document.getElementById('username').classList.add('is-invalid');
                    return;
                }
                
                if (password.length < 6) {
                    showError('הסיסמה חייבת להכיל לפחות 6 תווים');
                    document.getElementById('password').classList.add('is-invalid');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('הסיסמאות לא תואמות');
                    document.getElementById('confirmPassword').classList.add('is-invalid');
                    return;
                }
                
                setLoading(true);
                
                try {
                    // Check if register function exists
                    if (typeof register === 'function') {
                        const result = await register(username, password, email || undefined, firstName || undefined, lastName || undefined);
                        
                        if (result && result.success) {
                            showSuccess('הרשמה הצליחה! מעביר לדף ההתחברות...');
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 1500);
                        } else {
                            showError(result?.error || 'הרשמה נכשלה');
                        }
                    } else {
                        // Fallback: call API directly
                        const response = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                username,
                                password,
                                email: email || undefined,
                                first_name: firstName || undefined,
                                last_name: lastName || undefined
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok && data.status === 'success') {
                            showSuccess('הרשמה הצליחה! מעביר לדף ההתחברות...');
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 1500);
                        } else {
                            showError(data.error?.message || 'הרשמה נכשלה');
                        }
                    }
                } catch (error) {
                    showError('שגיאה בהרשמה: ' + error.message);
                } finally {
                    setLoading(false);
                }
            });
        });
    </script>
</body>
</html>
