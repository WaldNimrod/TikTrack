<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תחקיר - Tik.track</title>

  
                                                <!-- ===== CSS Architecture - Unified CSS ===== -->
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack CSS - Unified CSS (No @import) -->
    <link rel="stylesheet" href="styles-new/unified.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Error Handlers -->
    <script src="scripts/error-handlers.js"></script>
    <script src="scripts/table-mappings.js"></script>
    <script src="scripts/date-utils.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/linked-items.js"></script>
    <script src="scripts/page-utils.js"></script>
          <script src="scripts/color-scheme-system.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/header-system.js?v=20250901_3"></script>
  <script src="scripts/notification-system.js"></script>
  <script src="scripts/validation-utils.js"></script>
  

    <!-- Page initialization -->
    <script>
      // אתחול הדף
      document.addEventListener('DOMContentLoaded', function () {
        console.log('🚀 טעינת דף תחקיר עם מערכת ראש דף חדשה...');

        // אתחול HeaderSystem
        if (window.headerSystem && !window.headerSystem.isInitialized) {
          console.log('✅ אתחול HeaderSystem...');
          window.headerSystem.init();
        }

        // אתחול דף התחקיר
        if (typeof initializeResearchPage === 'function') {
          initializeResearchPage();
        }
      });
    </script>
  </div> <!-- End background-wrapper -->

  <!-- Main Content -->
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="content-section">
          <div class="section-header">
            <h1 class="section-title">🔍 תחקיר שוק</h1>
            <div class="section-actions">
              <button class="btn btn-primary" onclick="loadResearchData()">
                <i class="bi bi-arrow-clockwise"></i> רענן נתונים
              </button>
              <button class="btn btn-success" onclick="exportResearchData()">
                <i class="bi bi-download"></i> ייצא נתונים
              </button>
            </div>
          </div>
          
          <div class="section-body">
            <!-- Research Tools -->
            <div class="row mb-4">
              <div class="col-md-6">
                <div class="card">
                  <div class="card-header">
                    <h5>📊 כלי תחקיר</h5>
                  </div>
                  <div class="card-body">
                    <div class="d-grid gap-2">
                      <button class="btn btn-outline-primary" onclick="analyzeMarketTrends()">
                        <i class="bi bi-graph-up"></i> ניתוח מגמות שוק
                      </button>
                      <button class="btn btn-outline-info" onclick="compareTickers()">
                        <i class="bi bi-bar-chart"></i> השוואת טיקרים
                      </button>
                      <button class="btn btn-outline-warning" onclick="technicalAnalysis()">
                        <i class="bi bi-cpu"></i> ניתוח טכני
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              
              <div class="col-md-6">
                <div class="card">
                  <div class="card-header">
                    <h5>📈 נתונים מהירים</h5>
                  </div>
                  <div class="card-body">
                    <div class="d-grid gap-2">
                      <button class="btn btn-outline-success" onclick="getMarketOverview()">
                        <i class="bi bi-eye"></i> סקירת שוק
                      </button>
                      <button class="btn btn-outline-danger" onclick="getVolatilityIndex()">
                        <i class="bi bi-lightning"></i> מדד תנודתיות
                      </button>
                      <button class="btn btn-outline-secondary" onclick="getNewsFeed()">
                        <i class="bi bi-newspaper"></i> חדשות שוק
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- Research Results -->
            <div class="card">
              <div class="card-header">
                <h5>📋 תוצאות תחקיר</h5>
              </div>
              <div class="card-body">
                <div id="researchResults">
                  <div class="text-center text-muted">
                    <i class="bi bi-search" style="font-size: 3rem;"></i>
                    <p>לחץ על אחד מכלי התחקיר כדי להתחיל</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
