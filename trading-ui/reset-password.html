<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איפוס סיסמה - TikTrack</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css">
    
    <style>
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Hebrew', sans-serif;
        }
        
        .login-wrapper {
            width: 80%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid #e0e0e0;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo {
            margin-bottom: 1.5rem;
        }
        
        .login-logo img {
            max-width: 200px;
            height: auto;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--apple-text-primary, #000);
            text-align: right;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--apple-border, #C6C6C8);
            border-radius: 8px;
            font-size: 1rem;
            direction: rtl;
            text-align: right;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--apple-blue, #007AFF);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--apple-blue, #007AFF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background: #0051D5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .login-success {
            background: #efe;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--apple-border, #C6C6C8);
        }
        
        .back-link a {
            color: var(--apple-blue, #007AFF);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .info-text {
            color: var(--apple-text-secondary, #666);
            font-size: 0.9rem;
            text-align: right;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .password-strength {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: right;
        }
        
        .password-strength.weak {
            color: #c33;
        }
        
        .password-strength.medium {
            color: #fa0;
        }
        
        .password-strength.strong {
            color: #3c3;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <img src="images/logo.svg" alt="TikTrack Logo" />
                </div>
            </div>
            
            <div class="login-error" id="errorMessage"></div>
            <div class="login-success" id="successMessage"></div>
            
            <div id="invalidTokenMessage" style="display: none;">
                <div class="login-error">
                    הקישור לאיפוס סיסמה לא תקף או שפג תוקפו. אנא בקש קישור חדש.
                </div>
                <div class="back-link">
                    <a href="forgot-password.html">בקש קישור חדש</a>
                </div>
            </div>
            
            <form id="resetPasswordForm" style="display: none;">
                <div class="info-text">
                    הזן סיסמה חדשה. הסיסמה חייבת להכיל לפחות 6 תווים.
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="newPassword">סיסמה חדשה</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="הכנס סיסמה חדשה" required minlength="6" autofocus>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">אימות סיסמה</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="אמת סיסמה חדשה" required minlength="6">
                </div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <span id="submitBtnText">אפס סיסמה</span>
                    <span id="submitBtnSpinner" style="display: none;">⏳ מאפס...</span>
                </button>
            </form>
            
            <div class="back-link" id="backLink" style="display: none;">
                <a href="login.html">← חזרה להתחברות</a>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="scripts/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const invalidTokenMessage = document.getElementById('invalidTokenMessage');
            const resetPasswordForm = document.getElementById('resetPasswordForm');
            const backLink = document.getElementById('backLink');
            const form = document.getElementById('resetPasswordForm');
            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const submitBtnSpinner = document.getElementById('submitBtnSpinner');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordStrength = document.getElementById('passwordStrength');
            
            // Check if token is provided
            if (!token) {
                showError('קישור איפוס סיסמה לא תקין. חסר token.');
                invalidTokenMessage.style.display = 'block';
                return;
            }
            
            // Validate token
            try {
                const validateResponse = await fetch('/api/auth/password-reset/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ token: token }),
                });
                
                const validateResult = await validateResponse.json();
                
                if (validateResult.status === 'success' && validateResult.data?.valid) {
                    // Token is valid, show form
                    resetPasswordForm.style.display = 'block';
                    backLink.style.display = 'block';
                } else {
                    // Token is invalid
                    invalidTokenMessage.style.display = 'block';
                }
            } catch (error) {
                showError('שגיאה בבדיקת קישור איפוס סיסמה: ' + (error.message || 'שגיאה לא ידועה'));
                invalidTokenMessage.style.display = 'block';
            }
            
            // Password strength indicator
            newPasswordInput.addEventListener('input', function() {
                const password = this.value;
                if (password.length === 0) {
                    passwordStrength.textContent = '';
                    return;
                }
                
                let strength = 'weak';
                let strengthText = 'חלשה';
                
                if (password.length >= 8 && /[A-Za-z]/.test(password) && /[0-9]/.test(password)) {
                    strength = 'strong';
                    strengthText = 'חזקה';
                } else if (password.length >= 6) {
                    strength = 'medium';
                    strengthText = 'בינונית';
                }
                
                passwordStrength.textContent = `עוצמת סיסמה: ${strengthText}`;
                passwordStrength.className = `password-strength ${strength}`;
            });
            
            // Form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Hide previous messages
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                
                // Get password values
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // Validate passwords match
                if (newPassword !== confirmPassword) {
                    showError('הסיסמאות אינן תואמות');
                    return;
                }
                
                // Validate password length
                if (newPassword.length < 6) {
                    showError('סיסמה חייבת להכיל לפחות 6 תווים');
                    return;
                }
                
                // Set loading state
                submitBtn.disabled = true;
                submitBtnText.style.display = 'none';
                submitBtnSpinner.style.display = 'inline';
                
                try {
                    const response = await fetch('/api/auth/password-reset/reset', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            token: token,
                            new_password: newPassword,
                        }),
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        // Show success message
                        successMessage.textContent = 'הסיסמה עודכנה בהצלחה! מעביר לדף התחברות...';
                        successMessage.style.display = 'block';
                        form.style.display = 'none';
                        
                        // Redirect to login after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        showError(result.error?.message || 'שגיאה באיפוס סיסמה');
                    }
                } catch (error) {
                    showError('שגיאה באיפוס סיסמה: ' + (error.message || 'שגיאה לא ידועה'));
                } finally {
                    // Reset loading state
                    submitBtn.disabled = false;
                    submitBtnText.style.display = 'inline';
                    submitBtnSpinner.style.display = 'none';
                }
            });
            
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
