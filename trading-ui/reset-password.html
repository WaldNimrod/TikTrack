    <style>
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Hebrew', sans-serif;
        }
        
        .login-wrapper {
            width: 80%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid #e0e0e0;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo {
            margin-bottom: 1.5rem;
        }
        
        .login-logo img {
            max-width: 200px;
            height: auto;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--apple-text-primary, #000);
            text-align: right;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--apple-border, #C6C6C8);
            border-radius: 8px;
            font-size: 1rem;
            direction: rtl;
            text-align: right;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--apple-blue, #007AFF);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--apple-blue, #007AFF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background: #0051D5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .login-success {
            background: #efe;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: right;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--apple-border, #C6C6C8);
        }
        
        .back-link a {
            color: var(--apple-blue, #007AFF);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .info-text {
            color: var(--apple-text-secondary, #666);
            font-size: 0.9rem;
            text-align: right;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .password-strength {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: right;
        }
        
        .password-strength.weak {
            color: #c33;
        }
        
        .password-strength.medium {
            color: #fa0;
        }
        
        .password-strength.strong {
            color: #3c3;
        }
    </style>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <img src="images/logo.svg" alt="TikTrack Logo" />
                </div>
            </div>
            
            <div class="login-error" id="errorMessage"></div>
            <div class="login-success" id="successMessage"></div>
            
            <div id="invalidTokenMessage" style="display: none;">
                <div class="login-error">
                    הקישור לאיפוס סיסמה לא תקף או שפג תוקפו. אנא בקש קישור חדש.
                </div>
                <div class="back-link">
                    <a href="forgot-password.html">בקש קישור חדש</a>
                </div>
            </div>
            
            <form id="resetPasswordForm" style="display: none;">
                <div class="info-text">
                    הזן סיסמה חדשה. הסיסמה חייבת להכיל לפחות 6 תווים.
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="newPassword">סיסמה חדשה</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="הכנס סיסמה חדשה" required minlength="6" autofocus>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">אימות סיסמה</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="אמת סיסמה חדשה" required minlength="6">
                </div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <span id="submitBtnText">אפס סיסמה</span>
                    <span id="submitBtnSpinner" style="display: none;">⏳ מאפס...</span>
                </button>
            </form>
            
            <div class="back-link" id="backLink" style="display: none;">
                <a href="login.html">← חזרה להתחברות</a>
            </div>
        </div>
    </div>
