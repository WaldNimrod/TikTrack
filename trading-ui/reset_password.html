<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איפוס סיסמה - TikTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles-new/master.css">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #eef2ff 0%, #f8fafc 45%, #e0e7ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-card p {
      color: var(--apple-text-secondary, #555);
      margin-bottom: 1.5rem;
    }
    .auth-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .auth-status {
      margin-top: 1rem;
      color: var(--apple-text-secondary, #555);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="mb-3">
      <img src="images/logo.svg" alt="TikTrack Logo" style="height: 52px;">
    </div>
    <h1>איפוס סיסמה</h1>
    <p>הזן את הסיסמה החדשה שלך</p>

    <form id="resetPasswordForm" class="text-start">
      <div class="mb-3">
        <label for="password" class="form-label">סיסמה חדשה</label>
        <input type="password" class="form-control" id="password" name="password" required
               minlength="6" placeholder="לפחות 6 תווים">
        <div class="invalid-feedback">
          הסיסמה חייבת להכיל לפחות 6 תווים
        </div>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">אימות סיסמה</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required
               placeholder="הזן שוב את הסיסמה">
        <div class="invalid-feedback">
          הסיסמאות לא תואמות
        </div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span class="spinner-border spinner-border-sm d-none" role="status"></span>
          איפוס סיסמה
        </button>
      </div>
    </form>

    <div class="auth-actions mt-3">
      <a class="btn btn-outline-secondary" href="login.html">חזרה להתחברות</a>
      <a class="btn btn-link" href="forgot_password.html">שכחת סיסמה?</a>
    </div>

    <div class="auth-status mt-3" id="resetStatus"></div>
  </div>

  <!-- Core scripts -->
  <!-- Init System Scripts - Load Order Critical -->
  <script src="scripts/init-system/package-manifest.js" defer></script>
  <script src="scripts/page-initialization-configs.js" defer></script>
  <script src="scripts/modules/core-systems.js" defer></script>
  <!-- End Init System Scripts -->
  <script src="scripts/api-config.js" defer></script>
  <script src="scripts/logger-service.js" defer></script>
  <script src="scripts/notification-system.js" defer></script>
  <script src="scripts/unified-cache-manager.js" defer></script>
  <script src="scripts/auth.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('resetPasswordForm');
      const submitBtn = document.getElementById('submitBtn');
      const spinner = submitBtn.querySelector('.spinner-border');
      const statusEl = document.getElementById('resetStatus');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      const setStatus = (msg, isError = false) => {
        if (statusEl) {
          statusEl.textContent = msg || '';
          statusEl.className = `auth-status mt-3 ${isError ? 'text-danger' : 'text-success'}`;
        }
      };

      const setLoading = (loading) => {
        submitBtn.disabled = loading;
        spinner.classList.toggle('d-none', !loading);
        submitBtn.textContent = loading ? ' מאפס...' : 'איפוס סיסמה';
        if (!loading) submitBtn.insertBefore(spinner, submitBtn.firstChild);
      };

      // Check token on page load
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        setStatus('קישור איפוס לא תקף או חסר token.', true);
        submitBtn.disabled = true;
        return;
      }

      const handleSubmit = async (e) => {
        e.preventDefault();

        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Validate password length
        if (password.length < 6) {
          passwordInput.classList.add('is-invalid');
          return;
        }

        // Validate password match
        if (password !== confirmPassword) {
          confirmPasswordInput.classList.add('is-invalid');
          return;
        }

        passwordInput.classList.remove('is-invalid');
        confirmPasswordInput.classList.remove('is-invalid');

        setLoading(true);
        setStatus('');

        try {
          const response = await fetch('/api/auth/password-reset/reset', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              token: token,
              new_password: password
            })
          });

          const data = await response.json();

          if (response.ok) {
            setStatus('הסיסמה אופסה בהצלחה! מועבר להתחברות...', false);
            setTimeout(() => {
              window.location.href = 'login.html?reset=success';
            }, 2000);
          } else {
            throw new Error(data.message || 'שגיאה באיפוס הסיסמה');
          }
        } catch (error) {
          console.error('Reset password error:', error);
          setStatus(error.message || 'שגיאה באיפוס הסיסמה', true);
        } finally {
          setLoading(false);
        }
      };

      form.addEventListener('submit', handleSubmit);

      // Clear validation on input
      passwordInput.addEventListener('input', () => {
        passwordInput.classList.remove('is-invalid');
      });

      confirmPasswordInput.addEventListener('input', () => {
        confirmPasswordInput.classList.remove('is-invalid');
      });
    });
  </script>
  <script src="scripts/color-scheme-system.js" defer></script> <!-- Dynamic color system -->
</body>
</html>
