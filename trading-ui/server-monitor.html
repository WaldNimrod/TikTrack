<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS Files - אחרי Bootstrap כדי לדרוס אותו -->

    <link rel="stylesheet" href="styles-new/01-settings/_colors-dynamic.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_colors-semantic.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_spacing.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_typography.css?v=v1.0.0">

    <link rel="stylesheet" href="styles-new/03-generic/_base.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_links.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_forms-base.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_buttons-base.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_layout.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_grid.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_buttons-advanced.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_tables.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_cards.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=v1.0.1">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=v1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=v1.0.0">

    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=v1.0.0">

    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v38_fixed">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="server-monitor-page">
    <!-- Unified Header Container -->
    <div id="unified-header"></div>
    
    <div class="background-wrapper">
        <!-- Page body - All content after header -->
        <div class="page-body">
            <!-- Page area - top-Section -->
            <div class="top-section">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/development.svg?v=20250905" alt="ניטור שרת"
                            style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        ניטור שרת
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-outline-primary btn-sm" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והסטטוס">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור ניטור שרת">
                            <span class="section-toggle-icon">▼</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Page summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סטטוס שרת: <strong id="serverStatusStats">בדיקה...</strong></div>
                        <div>בסיס נתונים: <strong id="databaseStatusStats">בדיקה...</strong></div>
                        <div>Cache: <strong id="cacheStatusStats">בדיקה...</strong></div>
                        <div>סטטוס: <strong id="overallStatus">בדיקה...</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content" data-section="server-monitor">
                <div class="container">
                    <!-- UI Content Section 1 Start-->
                    <div class="content-section" id="section1">
                        <div class="section-header">
                            <h2>📊 סטטוס שרת</h2>
                            <button class="filter-toggle-btn" onclick="toggleSection('section1')" title="הצג/הסתר סקשן">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                        <div class="section-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5><i class="fas fa-server"></i> סטטוס שרת</h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="status-value" id="serverStatus">בודק...</div>
                                            <div class="status-details">
                                                <span>פורט: 8080</span>
                                                <span>זמן פעילות: <span id="uptime">-</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5><i class="fas fa-database"></i> בסיס נתונים</h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="status-value" id="databaseStatus">בודק...</div>
                                            <div class="status-details">
                                                <span>גודל: <span id="dbSize">-</span></span>
                                                <span>טיקרים: <span id="tickerCount">-</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5><i class="fas fa-memory"></i> Cache</h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="status-value" id="cacheStatus">בודק...</div>
                                            <div class="status-details">
                                                <span>ערכים: <span id="cacheEntries">-</span></span>
                                                <span>זיכרון: <span id="cacheMemory">-</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5><i class="fas fa-microchip"></i> מערכת</h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="status-value" id="systemStatus">בודק...</div>
                                            <div class="status-details">
                                                <span>CPU: <span id="cpuUsage">-</span></span>
                                                <span>זיכרון: <span id="memoryUsage">-</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- UI Content Section 1 End-->

                    <!-- UI Content Section 2 Start-->
                    <div class="content-section" id="section2">
                        <div class="section-header">
                            <h2>⚡ פעולות מהירות</h2>
                            <button class="filter-toggle-btn" onclick="toggleSection('section2')" title="הצג/הסתר סקשן">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                        <div class="section-body">
                            <div class="quick-actions actions-default">
                                <button class="btn btn-primary" onclick="serverMonitor.checkServerHealth()">
                                    <i class="fas fa-heartbeat"></i> בדיקת בריאות שרת
                                </button>
                                <button class="btn btn-success" onclick="serverMonitor.restartServer()">
                                    <i class="fas fa-redo"></i> הפעלת שרת מחדש
                                </button>
                                <button class="btn btn-warning" onclick="serverMonitor.clearCache()">
                                    <i class="fas fa-broom"></i> ניקוי Cache
                                </button>
                                <button class="btn btn-info" onclick="ServerMonitor.optimizeDatabase()">
                                    <i class="fas fa-database"></i> אופטימיזציית DB
                                </button>
                                <button class="btn btn-danger" onclick="serverMonitor.emergencyStop()">
                                    <i class="fas fa-stop-circle"></i> עצירת חירום
                                </button>
                                <button class="btn btn-secondary" onclick="ServerMonitor.exportLogs()">
                                    <i class="fas fa-download"></i> ייצוא לוגים
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- UI Content Section 2 End-->
                </div>
            </div> <!-- End main-content -->
        </div> <!-- End page-body -->
    </div> <!-- End background-wrapper -->
    
    <!-- Scripts -->
    <script src="scripts/header-system.js?v=v34_fixes"></script>
    <script src="scripts/color-scheme-system.js"></script>
    <script src="scripts/preferences.js"></script>
    <script src="scripts/ui-utils.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/translation-utils.js"></script>
    <script src="scripts/data-utils.js"></script>
    <script src="scripts/linked-items.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/central-refresh-system.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/server-monitor.js?v=v1.0.0"></script>
</body>
</html>
