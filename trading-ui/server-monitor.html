    <script>
        // Page-specific functionality
        function generateDetailedLog() {
            try {
                const logData = {
                    timestamp: new Date().toISOString(),
                    page: 'server-monitor',
                    url: window.location.href,
                    userAgent: navigator.userAgent,
                    viewport: {
                        width: window.innerWidth,
                        height: window.innerHeight
                    },
                    performance: {
                        loadTime: performance.timing.loadEventEnd - performance.timing.navigationStart,
                        domContentLoaded: performance.timing.domContentLoadedEventEnd - performance.timing.navigationStart
                    },
                    memory: window.performance.memory ? {
                        used: window.performance.memory.usedJSHeapSize,
                        total: window.performance.memory.totalJSHeapSize,
                        limit: window.performance.memory.jsHeapSizeLimit
                    } : null,
                    serverStatus: {
                        monitoringStatus: document.getElementById('monitoringStatus')?.textContent || 'לא נמצא',
                        serverStatus: document.getElementById('serverStatus')?.textContent || 'לא נמצא',
                        databaseStatus: document.getElementById('databaseStatus')?.textContent || 'לא נמצא',
                        summaryStats: document.getElementById('summaryStats')?.textContent || 'לא נמצא'
                    },
                    sections: {
                        section1: {
                            title: 'פעולות מהירות',
                            visible: !document.getElementById('section1')?.classList.contains('d-none'),
                            content: document.getElementById('section1')?.textContent || 'לא נמצא'
                        },
                        section2: {
                            title: 'סטטיסטיקות מערכת',
                            visible: !document.getElementById('section2')?.classList.contains('d-none'),
                            content: document.getElementById('section2')?.textContent || 'לא נמצא'
                        },
                        section3: {
                            title: 'לוגים',
                            visible: !document.getElementById('section3')?.classList.contains('d-none'),
                            content: document.getElementById('section3')?.textContent || 'לא נמצא'
                        }
                    },
                    console: {
                        errors: [],
                        warnings: [],
                        logs: []
                    }
                };

                // Capture console messages
                const originalError = console.error;
                const originalWarn = console.warn;
                const originalLog = console.log;

                console.error = function(...args) {
                    logData.console.errors.push(args.join(' '));
                    originalError.apply(console, args);
                };

                console.warn = function(...args) {
                    logData.console.warnings.push(args.join(' '));
                    originalWarn.apply(console, args);
                };

                console.log = function(...args) {
                    logData.console.logs.push(args.join(' '));
                    originalLog.apply(console, args);
                };

                return JSON.stringify(logData, null, 2);
            } catch (error) {
                return `Error generating log: ${error.message}`;
            }
        }

        function copyDetailedLog() {
            try {
                const logContent = generateDetailedLog();
                navigator.clipboard.writeText(logContent).then(() => {
                    if (window.showNotification) {
                        window.showNotification('לוג מפורט הועתק ללוח', 'success');
                    } else {
                        alert('לוג מפורט הועתק ללוח');
                    }
                }).catch(err => {
                    console.error('Failed to copy log:', err);
                    // Fallback: show in console
                    console.log('Detailed Log:', logContent);
                    if (window.showNotification) {
                        window.showNotification('לוג מפורט הוצג בקונסול', 'info');
                    } else {
                        alert('לוג מפורט הוצג בקונסול');
                    }
                });
            } catch (error) {
                console.error('Error copying log:', error);
                if (window.showNotification) {
                    window.showNotification('שגיאה בהעתקת הלוג', 'error');
                } else {
                    alert('שגיאה בהעתקת הלוג');
                }
            }
        }

        // Export functions to global scope
        window.copyDetailedLog = copyDetailedLog;
        window.generateDetailedLog = generateDetailedLog;

        // Page initialization
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Server Monitor page loaded');
            
            // Initialize monitoring
            if (typeof initializeMonitoring === 'function') {
                initializeMonitoring();
            }
            
            // Start status refresh
            if (typeof startStatusRefresh === 'function') {
                startStatusRefresh();
            }
        });
    </script>
