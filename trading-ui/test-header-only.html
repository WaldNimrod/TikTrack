    <!-- Local  function for test-header-only page -->
    <script>
        // Make the local  function available globally for this page only
        
        // Test preferences availability
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🧪 Testing preferences availability...');
            
            // First, try to load preferences
            if (window.loadUserPreferences) {
                console.log('🔄 Loading preferences...');
                try {
                    const prefs = await window.loadUserPreferences();
                    console.log('✅ Preferences loaded:', prefs);
                } catch (error) {
                    console.error('❌ Error loading preferences:', error);
                }
            }
            
            setTimeout(async () => {
                try {
                    // Test getPreferenceFromMemory
                    if (window.getPreferenceFromMemory) {
                        console.log('✅ getPreferenceFromMemory is available');
                        
                        const defaultAccount = window.getPreferenceFromMemory('default_trading_account');
                        console.log('🧪 default_trading_account value:', defaultAccount);
                        
                        const defaultCommission = window.getPreferenceFromMemory('defaultCommission');
                        console.log('🧪 defaultCommission value:', defaultCommission);
                        
                        // Test window.currentPreferences
                        if (window.currentPreferences) {
                            console.log('✅ window.currentPreferences available');
                            console.log('🧪 All preferences count:', Object.keys(window.currentPreferences).length);
                            console.log('🧪 default_trading_account in prefs:', window.currentPreferences['default_trading_account']);
                            console.log('🧪 defaultCommission in prefs:', window.currentPreferences['defaultCommission']);
                        } else {
                            console.log('⚠️ window.currentPreferences not available');
                        }
                        
                        // Test localStorage fallback
                        const stored = localStorage.getItem('tikTrack_preferences');
                        if (stored) {
                            console.log('✅ localStorage tikTrack_preferences found');
                            const parsed = JSON.parse(stored);
                            console.log('🧪 default_trading_account in localStorage:', parsed['default_trading_account']);
                            console.log('🧪 defaultCommission in localStorage:', parsed['defaultCommission']);
                        } else {
                            console.log('⚠️ localStorage tikTrack_preferences not found');
                        }
                    } else {
                        console.log('❌ getPreferenceFromMemory is not available');
                    }
                } catch (error) {
                    console.error('❌ Error testing preferences:', error);
                }
            }, 2000);
        });
    </script>
