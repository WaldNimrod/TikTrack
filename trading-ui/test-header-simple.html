<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מערכת הכותרת החדשה</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">
    
    <style>
        body { padding: 20px; }
        .test-section { border: 1px solid #ccc; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <!-- unified-header ייווצר כאן אוטומטית -->
    <div id="unified-header"></div>
    
    <div class="page-body">
        <div class="main-content">
            <h1>בדיקת מערכת הכותרת החדשה</h1>
            
            <div class="test-section">
                <h3>סטטוס המערכת</h3>
                <p id="systemStatus">טוען...</p>
            </div>
            
            <div class="test-section">
                <h3>בדיקת פונקציות</h3>
                <button onclick="testHeaderSystem()" class="btn btn-primary">בדוק מערכת</button>
                <button onclick="toggleFilterSection()" class="btn btn-secondary">הצג/הסתר פילטרים</button>
            </div>
        </div>
    </div>
    
    <!-- Header System Script -->
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <script>
        function testHeaderSystem() {
            const status = document.getElementById('systemStatus');
            
            if (window.headerSystemInstance) {
                const info = window.headerSystemInstance.getInfo();
                status.innerHTML = `
                    <strong>✅ המערכת פעילה!</strong><br>
                    גרסה: ${info.version}<br>
                    מאותחל: ${info.isInitialized ? 'כן' : 'לא'}<br>
                    רכיבים: ${info.components.join(', ')}<br>
                    שירותים: ${info.services.join(', ')}
                `;
                status.style.color = 'green';
            } else {
                status.innerHTML = '<strong>❌ המערכת לא זמינה</strong>';
                status.style.color = 'red';
            }
        }
        
        // Auto-test on load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(testHeaderSystem, 1000);
        });
    </script>
</body>
</html>
