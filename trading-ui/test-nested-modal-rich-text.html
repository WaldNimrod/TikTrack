<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Nested Modal Rich Text Editor</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Quill.js CSS -->
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    
    <style>
        .test-log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .test-log .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
        }
        .test-log .log-entry.success { color: #28a745; }
        .test-log .log-entry.warning { color: #ffc107; }
        .test-log .log-entry.error { color: #dc3545; }
        .test-log .log-entry.info { color: #17a2b8; }
        
        .modal-nested {
            z-index: calc(var(--bs-modal-zindex, 1055) + var(--modal-nested-offset, 20));
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Test: Nested Modal Rich Text Editor</h1>
        <p>בדיקת אתחול Rich Text Editor במודלים מקוננים</p>
        
        <div class="mb-3">
            <button class="btn btn-primary" onclick="openParentModal()">פתח מודל ראשי</button>
            <button class="btn btn-secondary" onclick="clearLog()">נקה לוג</button>
        </div>
        
        <div class="test-log" id="testLog"></div>
    </div>
    
    <!-- Parent Modal (Linked Items) -->
    <div class="modal fade" id="linkedItemsModal" tabindex="-1" aria-labelledby="linkedItemsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="linkedItemsModalLabel">פריטים מקושרים</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>זהו מודל ראשי (Linked Items)</p>
                    <button class="btn btn-primary" onclick="openNestedModal()">פתח מודל עריכה (מקונן)</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Nested Modal (Edit Note) -->
    <div class="modal fade modal-nested" id="notesModal" tabindex="-1" aria-labelledby="notesModalLabel" aria-hidden="true" style="--modal-nested-offset: 40;">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="notesModalLabel">עריכת הערה</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="notesModalForm">
                        <div class="mb-3">
                            <label for="noteContent" class="form-label">תוכן הערה</label>
                            <div id="noteContent" style="min-height: 200px;"></div>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="saveNote()">שמור</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Quill.js -->
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    
    <script>
        // Test logging system
        const testLog = document.getElementById('testLog');
        let logEntries = [];
        
        function log(message, type = 'info') {
            const timestamp = new Date().toISOString();
            const entry = { timestamp, message, type };
            logEntries.push(entry);
            
            const logElement = document.createElement('div');
            logElement.className = `log-entry ${type}`;
            logElement.textContent = `[${timestamp}] ${message}`;
            testLog.appendChild(logElement);
            testLog.scrollTop = testLog.scrollHeight;
            
            console.log(`[TEST] ${message}`);
        }
        
        function clearLog() {
            logEntries = [];
            testLog.innerHTML = '';
        }
        
        // Performance tracking
        const performanceMarkers = {};
        
        function markStart(name) {
            performanceMarkers[name] = performance.now();
            log(`⏱️ START: ${name}`, 'info');
        }
        
        function markEnd(name) {
            if (performanceMarkers[name]) {
                const duration = performance.now() - performanceMarkers[name];
                log(`⏱️ END: ${name} - ${duration.toFixed(2)}ms`, 'info');
                delete performanceMarkers[name];
            }
        }
        
        // Modal visibility checks
        function checkModalVisibility(modalId) {
            const modal = document.getElementById(modalId);
            if (!modal) {
                return { exists: false };
            }
            
            const checks = {
                exists: true,
                hasShowClass: modal.classList.contains('show'),
                display: modal.style.display,
                offsetParent: modal.offsetParent !== null,
                offsetWidth: modal.offsetWidth,
                offsetHeight: modal.offsetHeight,
                visibility: getComputedStyle(modal).visibility,
                opacity: getComputedStyle(modal).opacity,
                zIndex: getComputedStyle(modal).zIndex,
                isNested: modal.classList.contains('modal-nested')
            };
            
            const isFullyVisible = checks.hasShowClass && 
                                  checks.display !== 'none' &&
                                  checks.offsetParent &&
                                  checks.offsetWidth > 0 &&
                                  checks.offsetHeight > 0;
            
            checks.isFullyVisible = isFullyVisible;
            
            return checks;
        }
        
        function checkContainerVisibility(containerId) {
            const container = document.getElementById(containerId);
            if (!container) {
                return { exists: false };
            }
            
            const checks = {
                exists: true,
                offsetParent: container.offsetParent !== null,
                display: container.style.display,
                hasDNone: container.classList.contains('d-none'),
                offsetWidth: container.offsetWidth,
                offsetHeight: container.offsetHeight,
                visibility: getComputedStyle(container).visibility,
                opacity: getComputedStyle(container).opacity
            };
            
            const isVisible = checks.offsetParent && 
                             checks.display !== 'none' && 
                             !checks.hasDNone &&
                             checks.offsetWidth > 0 && 
                             checks.offsetHeight > 0 &&
                             checks.visibility !== 'hidden' &&
                             checks.opacity !== '0';
            
            checks.isVisible = isVisible;
            
            return checks;
        }
        
        // Open parent modal
        function openParentModal() {
            log('🚀 Opening parent modal (Linked Items)', 'info');
            markStart('parent-modal-open');
            
            if (window.ModalManagerV2 && typeof window.ModalManagerV2.showModal === 'function') {
                window.ModalManagerV2.showModal('linkedItemsModal', 'view').then(() => {
                    markEnd('parent-modal-open');
                    log('✅ Parent modal shown', 'success');
                    
                    const visibility = checkModalVisibility('linkedItemsModal');
                    log(`📊 Parent modal visibility: ${JSON.stringify(visibility, null, 2)}`, 'info');
                }).catch(error => {
                    window.Logger?.error('Error showing linked items modal via ModalManagerV2', { error, modalId: 'linkedItemsModal', page: 'test-nested-modal-rich-text' });
                    // Fallback to Bootstrap
                    if (bootstrap?.Modal) {
                        const modal = new bootstrap.Modal(document.getElementById('linkedItemsModal'));
                        modal.show();
                        markEnd('parent-modal-open');
                        log('✅ Parent modal shown (Bootstrap fallback)', 'success');
                    }
                });
            } else if (bootstrap?.Modal) {
                const modal = new bootstrap.Modal(document.getElementById('linkedItemsModal'));
                
                document.getElementById('linkedItemsModal').addEventListener('shown.bs.modal', () => {
                    markEnd('parent-modal-open');
                    log('✅ Parent modal shown', 'success');
                    
                    const visibility = checkModalVisibility('linkedItemsModal');
                    log(`📊 Parent modal visibility: ${JSON.stringify(visibility, null, 2)}`, 'info');
                }, { once: true });
                
                modal.show();
            }
        }
        
        // Open nested modal
        function openNestedModal() {
            log('🚀 Opening nested modal (Edit Note)', 'info');
            markStart('nested-modal-open');
            
            const nestedModal = document.getElementById('notesModal');
            if (window.ModalManagerV2 && typeof window.ModalManagerV2.showModal === 'function') {
                window.ModalManagerV2.showModal('notesModal', 'edit').then(() => {
                    markEnd('nested-modal-open');
                    log('✅ Nested modal shown', 'success');
                }).catch(error => {
                    window.Logger?.error('Error showing notes modal via ModalManagerV2', { error, modalId: 'notesModal', page: 'test-nested-modal-rich-text' });
                    // Fallback to Bootstrap
                    if (bootstrap?.Modal) {
                        const modal = new bootstrap.Modal(nestedModal, {
                            backdrop: false
                        });
                        modal.show();
                        markEnd('nested-modal-open');
                        log('✅ Nested modal shown (Bootstrap fallback)', 'success');
                    }
                });
            } else if (bootstrap?.Modal) {
                const modal = new bootstrap.Modal(nestedModal, {
                    backdrop: false
                });
                modal.show();
                markEnd('nested-modal-open');
                log('✅ Nested modal shown (Bootstrap fallback)', 'success');
            
            // Track Bootstrap events
            nestedModal.addEventListener('show.bs.modal', () => {
                log('📢 Bootstrap event: show.bs.modal fired', 'info');
                const visibility = checkModalVisibility('notesModal');
                log(`📊 Modal visibility at show.bs.modal: ${JSON.stringify(visibility, null, 2)}`, 'info');
            }, { once: true });
            
            nestedModal.addEventListener('shown.bs.modal', () => {
                markEnd('nested-modal-open');
                log('✅ Bootstrap event: shown.bs.modal fired', 'success');
                
                const visibility = checkModalVisibility('notesModal');
                log(`📊 Modal visibility at shown.bs.modal: ${JSON.stringify(visibility, null, 2)}`, 'info');
                
                // Try to initialize Rich Text Editor
                setTimeout(() => {
                    initializeRichTextEditor();
                }, 100);
            }, { once: true });
            
            modal.show();
        }
        
        // Initialize Rich Text Editor
        function initializeRichTextEditor() {
            log('🔧 Attempting to initialize Rich Text Editor', 'info');
            markStart('rich-text-init');
            
            // Check Quill.js
            if (typeof window.Quill === 'undefined') {
                log('❌ Quill.js not available', 'error');
                markEnd('rich-text-init');
                return;
            }
            
            log('✅ Quill.js is available', 'success');
            
            // Check container visibility
            const containerVisibility = checkContainerVisibility('noteContent');
            log(`📊 Container visibility: ${JSON.stringify(containerVisibility, null, 2)}`, 'info');
            
            if (!containerVisibility.isVisible) {
                log('⚠️ Container not visible, waiting...', 'warning');
                
                // Retry with polling
                let retries = 10;
                const pollInterval = setInterval(() => {
                    retries--;
                    const visibility = checkContainerVisibility('noteContent');
                    log(`🔄 Retry ${10 - retries}/10: ${JSON.stringify(visibility, null, 2)}`, 'info');
                    
                    if (visibility.isVisible || retries === 0) {
                        clearInterval(pollInterval);
                        if (visibility.isVisible) {
                            tryInitializeEditor();
                        } else {
                            log('❌ Container still not visible after retries', 'error');
                            markEnd('rich-text-init');
                        }
                    }
                }, 200);
                
                return;
            }
            
            tryInitializeEditor();
        }
        
        function tryInitializeEditor() {
            try {
                const container = document.getElementById('noteContent');
                if (!container) {
                    log('❌ Container element not found', 'error');
                    markEnd('rich-text-init');
                    return;
                }
                
                // Check if already initialized
                if (container.querySelector('.ql-container')) {
                    log('⚠️ Editor already initialized', 'warning');
                    markEnd('rich-text-init');
                    return;
                }
                
                log('✅ Initializing Quill editor...', 'info');
                const quill = new window.Quill(container, {
                    theme: 'snow',
                    placeholder: 'הכנס תוכן כאן...',
                    direction: 'rtl'
                });
                
                log('✅ Rich Text Editor initialized successfully', 'success');
                markEnd('rich-text-init');
                
                // Set content
                quill.setContents([
                    { insert: 'זהו תוכן בדיקה' }
                ]);
                log('✅ Content set in editor', 'success');
                
            } catch (error) {
                log(`❌ Error initializing editor: ${error.message}`, 'error');
                markEnd('rich-text-init');
            }
        }
        
        function saveNote() {
            const container = document.getElementById('noteContent');
            const quill = container.querySelector('.ql-container') ? window.Quill.find(container) : null;
            
            if (quill) {
                const content = quill.getContents();
                log(`✅ Note saved: ${JSON.stringify(content)}`, 'success');
            } else {
                log('❌ Editor not initialized', 'error');
            }
        }
        
        // Log page load
        log('📄 Test page loaded', 'info');
        log(`✅ Quill.js available: ${typeof window.Quill !== 'undefined'}`, typeof window.Quill !== 'undefined' ? 'success' : 'error');
    </script>
</body>
</html>
