<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 1 Recovery Test - TikTrack</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=b5171288_20251102_035016" rel="stylesheet">
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=b5171288_20251102_035016">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css?v=b5171288_20251102_035016">
</head>
<body class="test-page">
    <div class="container mt-4">
        <h1>Phase 1 Recovery Test</h1>
        <p>בדיקת שחזור שלב 1 - מערכת ניטור וסקריפטים חדשים</p>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>בדיקת מערכת ניטור</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-primary" onclick="runMonitoringTest()">הרץ בדיקת ניטור</button>
                        <div id="monitoringResults" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>בדיקת Logger Service</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success" onclick="testLoggerService()">בדוק Logger Service</button>
                        <div id="loggerResults" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-3">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>בדיקת Cache Sync Manager</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-info" onclick="testCacheSyncManager()">בדוק Cache Sync Manager</button>
                        <div id="cacheSyncResults" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>בדיקת Unified Cache Manager</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-warning" onclick="testUnifiedCacheManager()">בדוק Unified Cache Manager</button>
                        <div id="cacheResults" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>תוצאות בדיקה כוללות</h5>
                    </div>
                    <div class="card-body">
                        <div id="overallResults"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js?v=b5171288_20251102_035016"></script>
    
    <!-- Base Package Scripts -->
    <script src="scripts/global-favicon.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/notification-system.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/ui-utils.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/page-utils.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/translation-utils.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/button-icons.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/event-handler-manager.js?v=b5171288_20251102_035016"></script> <!-- מערכת ניהול אירועים מרכזית -->
<script src="scripts/button-system-init.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/color-scheme-system.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/unified-cache-manager.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/logger-service.js?v=b5171288_20251102_035016"></script> <!-- שירות לוגים מתקדם -->
    <script src="scripts/cache-sync-manager.js?v=b5171288_20251102_035016"></script> <!-- מנהל סנכרון מטמון -->
    <script src="scripts/header-system.js?v=b5171288_20251102_035016"></script>
    
    <!-- Init System Scripts -->
    <script src="scripts/init-system/package-manifest.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/page-initialization-configs.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/unified-app-initializer.js?v=b5171288_20251102_035016"></script>
    <script src="scripts/init-system-check.js?v=b5171288_20251102_035016"></script>

    <script>
        // Test functions
        function runMonitoringTest() {
            const resultsDiv = document.getElementById('monitoringResults');
            resultsDiv.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> טוען...';
            
            try {
                if (typeof window.runPageMonitoring === 'function') {
                    const results = window.runPageMonitoring();
                    resultsDiv.innerHTML = `<div class="alert alert-success">✅ מערכת ניטור עובדת תקין</div><pre>${JSON.stringify(results, null, 2)}</pre>`;
                } else {
                    resultsDiv.innerHTML = '<div class="alert alert-warning">⚠️ פונקציית ניטור לא זמינה</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
        
        function testLoggerService() {
            const resultsDiv = document.getElementById('loggerResults');
            resultsDiv.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> טוען...';
            
            try {
                if (typeof window.Logger !== 'undefined') {
                    // Test logger functionality
                    window.Logger.info('Test log from Phase 1 recovery test');
                    window.Logger.debug('Debug test message');
                    window.Logger.warn('Warning test message');
                    
                    const stats = window.Logger.getStats();
                    resultsDiv.innerHTML = `<div class="alert alert-success">✅ Logger Service עובד תקין</div><pre>${JSON.stringify(stats, null, 2)}</pre>`;
                } else {
                    resultsDiv.innerHTML = '<div class="alert alert-danger">❌ Logger Service לא זמין</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
        
        function testCacheSyncManager() {
            const resultsDiv = document.getElementById('cacheSyncResults');
            resultsDiv.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> טוען...';
            
            try {
                if (typeof window.CacheSyncManager !== 'undefined') {
                    const status = window.CacheSyncManager.getSyncStatus();
                    resultsDiv.innerHTML = `<div class="alert alert-success">✅ Cache Sync Manager עובד תקין</div><pre>${JSON.stringify(status, null, 2)}</pre>`;
                } else {
                    resultsDiv.innerHTML = '<div class="alert alert-danger">❌ Cache Sync Manager לא זמין</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
        
        function testUnifiedCacheManager() {
            const resultsDiv = document.getElementById('cacheResults');
            resultsDiv.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> טוען...';
            
            try {
                if (typeof window.UnifiedCacheManager !== 'undefined') {
                    // Test cache functionality
                    window.UnifiedCacheManager.set('test-key', 'test-value');
                    const value = window.UnifiedCacheManager.get('test-key');
                    
                    if (value === 'test-value') {
                        resultsDiv.innerHTML = '<div class="alert alert-success">✅ Unified Cache Manager עובד תקין</div>';
                    } else {
                        resultsDiv.innerHTML = '<div class="alert alert-warning">⚠️ Unified Cache Manager עובד חלקית</div>';
                    }
                } else {
                    resultsDiv.innerHTML = '<div class="alert alert-danger">❌ Unified Cache Manager לא זמין</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">❌ שגיאה: ${error.message}</div>`;
            }
        }
        
        // Run all tests on page load
        window.addEventListener('load', function() {
            setTimeout(() => {
                runMonitoringTest();
                testLoggerService();
                testCacheSyncManager();
                testUnifiedCacheManager();
                
                // Update overall results
                updateOverallResults();
            }, 2000);
        });
        
        function updateOverallResults() {
            const resultsDiv = document.getElementById('overallResults');
            const tests = [
                { name: 'Logger Service', element: 'loggerResults' },
                { name: 'Cache Sync Manager', element: 'cacheSyncResults' },
                { name: 'Unified Cache Manager', element: 'cacheResults' },
                { name: 'Monitoring System', element: 'monitoringResults' }
            ];
            
            let allPassed = true;
            let results = '<h6>סיכום בדיקות:</h6><ul>';
            
            tests.forEach(test => {
                const element = document.getElementById(test.element);
                const hasSuccess = element.innerHTML.includes('alert-success');
                const hasError = element.innerHTML.includes('alert-danger');
                
                if (hasSuccess) {
                    results += `<li class="text-success">✅ ${test.name} - עובד תקין</li>`;
                } else if (hasError) {
                    results += `<li class="text-danger">❌ ${test.name} - נכשל</li>`;
                    allPassed = false;
                } else {
                    results += `<li class="text-warning">⚠️ ${test.name} - לא נבדק</li>`;
                }
            });
            
            results += '</ul>';
            
            if (allPassed) {
                results += '<div class="alert alert-success"><strong>🎉 כל הבדיקות עברו בהצלחה!</strong></div>';
            } else {
                results += '<div class="alert alert-warning"><strong>⚠️ חלק מהבדיקות נכשלו</strong></div>';
            }
            
            resultsDiv.innerHTML = results;
        }
    </script>
</body>
</html>
