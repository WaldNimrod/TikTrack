<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת פונקציות - Preferences</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>בדיקת פונקציות - Preferences</h1>
        <div id="results"></div>
    </div>

    <!-- Header System Script -->
    <script src="scripts/header-system.js"></script>
    
    <!-- Scripts - Same as preferences.html -->
    <script src="scripts/global-favicon.js"></script>
    <script src="scripts/ui-utils.js"></script>
    <script src="scripts/data-utils.js"></script>
    <script src="scripts/notification-system.js"></script>
    <script src="scripts/system-management.js"></script>
    <script src="scripts/notification-category-detector.js"></script>
    <script src="scripts/notification-migration-system.js"></script>
    <script src="scripts/global-notification-collector.js"></script>
    <script src="scripts/tables.js"></script>
    <script src="scripts/page-utils.js"></script>
    <script src="scripts/central-refresh-system.js"></script>
    <script src="scripts/preferences.js"></script>
    
    <!-- New Unified Initialization System -->
    <script src="scripts/application-initializer.js"></script>
    <script src="scripts/page-initialization-configs.js"></script>
    <script src="scripts/unified-app-initializer.js"></script>
    
    <script>
        function testFunctions() {
            const results = [];
            const functionsToTest = [
                'copyDetailedLog',
                'toggleSection',
                'saveAllPreferences',
                'resetToDefaults',
                'toggleAllSections',
                'initializeUnifiedApp',
                'getUnifiedAppStatus'
            ];
            
            functionsToTest.forEach(funcName => {
                const exists = typeof window[funcName] === 'function';
                results.push({
                    name: funcName,
                    exists: exists,
                    status: exists ? '✅ זמין' : '❌ לא זמין'
                });
            });
            
            displayResults(results);
        }
        
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            let html = '<div class="card"><div class="card-body"><h5>תוצאות בדיקת פונקציות:</h5><ul class="list-group">';
            
            results.forEach(result => {
                html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                    ${result.name}
                    <span class="badge ${result.exists ? 'bg-success' : 'bg-danger'} rounded-pill">
                        ${result.status}
                    </span>
                </li>`;
            });
            
            html += '</ul></div></div>';
            resultsDiv.innerHTML = html;
        }
        
        // Test after page loads
        setTimeout(testFunctions, 2000);
    </script>
</body>
</html>
