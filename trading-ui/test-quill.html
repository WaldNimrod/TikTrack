<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">
    <link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill.js Test</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        #editor {
            height: 300px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <!-- Unified Header -->
    <div id="unified-header"></div>
    <h1>Quill.js Test Page</h1>
    
    <div id="status"></div>
    
    <div id="editor"></div>
    
    <button onclick="testQuill()">Test Quill.js</button>
    <button onclick="loadQuill()">Load Quill.js Dynamically</button>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        function logStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
            if (window.Logger) { window.Logger.info(message, { page: 'test-quill', component: 'test-page' }); };
        }
        
        // Initialize PreferencesSystem if available
        if (window.PreferencesSystem && typeof window.PreferencesSystem.initialize === 'function') {
            window.PreferencesSystem.initialize().then(() => {
                if (window.Logger) {
                    window.Logger.info('PreferencesSystem initialized', {
                        page: 'test-quill',
                        component: 'preferences-system',
                        action: 'init-complete'
                    });
                }
            }).catch(error => {
                if (window.Logger) {
                    window.Logger.warn('PreferencesSystem initialization failed', {
                        page: 'test-quill',
                        component: 'preferences-system',
                        action: 'init-failed',
                        error: error.message
                    });
                }
            });
        }
        
        // בדיקה ראשונית
        window.addEventListener('DOMContentLoaded', () => {
            logStatus('DOM Content Loaded', 'info');
            
            // בדיקה אם Quill.js נטען
            setTimeout(() => {
                if (typeof window.Quill !== 'undefined') {
                    logStatus('✅ Quill.js is available', 'success');
                    initEditor();
                } else {
                    logStatus('❌ Quill.js is NOT available', 'error');
                    logStatus('Checking for script tag...', 'info');
                    
                    const script = document.querySelector('script[src*="quill"]');
                    if (script) {
                        logStatus('✅ Found Quill.js script tag', 'info');
                        logStatus(`Script src: ${script.src}`, 'info');
                        logStatus(`Script complete: ${script.complete}`, 'info');
                        logStatus(`Script readyState: ${script.readyState}`, 'info');
                        
                        script.addEventListener('load', () => {
                            logStatus('✅ Script load event fired', 'success');
                            setTimeout(() => {
                                if (typeof window.Quill !== 'undefined') {
                                    logStatus('✅ Quill.js is now available', 'success');
                                    initEditor();
                                } else {
                                    logStatus('❌ Quill.js still not available after load event', 'error');
                                }
                            }, 100);
                        });
                        
                        script.addEventListener('error', (e) => {
                            logStatus('❌ Script error event fired', 'error');
                            logStatus(`Error: ${e.message || 'Unknown error'}`, 'error');
                        });
                    } else {
                        logStatus('❌ No Quill.js script tag found', 'error');
                    }
                }
            }, 1000);
        });
        
        function initEditor() {
            try {
                const quill = new Quill('#editor', {
                    theme: 'snow',
                    direction: 'rtl'
                });
                logStatus('✅ Quill editor initialized successfully', 'success');
            } catch (error) {
                logStatus(`❌ Error initializing Quill: ${error.message}`, 'error');
            }
        }
        
        function testQuill() {
            if (typeof window.Quill !== 'undefined') {
                logStatus('✅ Quill.js is available', 'success');
                initEditor();
            } else {
                logStatus('❌ Quill.js is NOT available', 'error');
            }
        }
        
        function loadQuill() {
            logStatus('Attempting to load Quill.js dynamically...', 'info');
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js';
            script.async = false;
            script.onload = () => {
                logStatus('✅ Script loaded', 'success');
                setTimeout(() => {
                    if (typeof window.Quill !== 'undefined') {
                        logStatus('✅ Quill.js is now available', 'success');
                        initEditor();
                    } else {
                        logStatus('❌ Quill.js still not available', 'error');
                    }
                }, 100);
            };
            script.onerror = (e) => {
                logStatus('❌ Script load error', 'error');
                logStatus(`Error: ${e.message || 'Unknown error'}`, 'error');
            };
            document.head.appendChild(script);
        }
    </script>
    
    <!-- Quill.js from CDN -->
        <script src="scripts/error-handlers.js?v=1.0.0"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js" 
            onload="if (window.Logger) { window.Logger.info('✅ Quill.js loaded from CDN', { page: 'test-quill', component: 'test-page' }); }; window.QuillLoaded = true;" 
            onerror="if (window.Logger) { window.Logger.error('❌ Failed to load Quill.js from CDN', { page: 'test-quill', component: 'test-page' }); };"></script>
    <script src="scripts/header-system.js?v=1.0.0"></script> <!-- Header system -->
    <script src="scripts/button-system-init.js?v=1.0.0"></script> <!-- Button system -->
</body>
</html>
