<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Nested Modal Rich Text Editor</title>
    
    <!-- Bootstrap CSS - Must load first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">
    
    <!-- System CSS - After Bootstrap to override it -->
    <link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906">
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906">
    
    <!-- Quill.js CSS -->
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    
    <style>
        .test-log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .test-log .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
        }
        .test-log .log-entry.success { color: #28a745; }
        .test-log .log-entry.warning { color: #ffc107; }
        .test-log .log-entry.error { color: #dc3545; }
        .test-log .log-entry.info { color: #17a2b8; }
        
        .modal-nested {
            z-index: calc(var(--bs-modal-zindex, 1055) + var(--modal-nested-offset, 20));
        }
    </style>
</head>
<body>
    <!-- Unified Header -->
    <div id="unified-header"></div>
    <div class="container mt-5">
        <h1>Test: Nested Modal Rich Text Editor</h1>
        <p>בדיקת אתחול Rich Text Editor במודלים מקוננים</p>
        
        <div class="mb-3">
            <button class="btn btn-primary" onclick="openParentModal()">פתח מודל ראשי</button>
            <button class="btn btn-secondary" onclick="clearLog()">נקה לוג</button>
        </div>
        
        <div class="test-log" id="testLog"></div>
    </div>
    
    <!-- Parent Modal (Linked Items) -->
