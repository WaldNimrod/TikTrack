<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">
    <link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906">
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת אינטגרציה User-Ticker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-section h2 {
            margin-top: 0;
            color: #26baac;
        }
        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
        }
        .test-result.pass {
            background-color: #d4edda;
            color: #155724;
        }
        .test-result.fail {
            background-color: #f8d7da;
            color: #721c24;
        }
        .test-result.info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        button {
            background-color: #26baac;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background-color: #1e9d91;
        }
        #results {
            margin-top: 20px;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Unified Header -->
    <div id="unified-header"></div>
    <h1>בדיקת אינטגרציה User-Ticker</h1>
    
    <div class="test-section">
        <h2>בדיקות API</h2>
        <button onclick="testAPIEndpoints()">בדוק API Endpoints</button>
        <div id="api-results"></div>
    </div>
    
    <div class="test-section">
        <h2>בדיקות Frontend Services</h2>
        <button onclick="testFrontendServices()">בדוק Frontend Services</button>
        <div id="frontend-results"></div>
    </div>
    
    <div class="test-section">
        <h2>בדיקות ממשקי בחירה</h2>
        <button onclick="testSelectPopulators()">בדוק ממשקי בחירה</button>
        <div id="select-results"></div>
    </div>
    
    <div class="test-section">
        <h2>בדיקות ביצועים</h2>
        <button onclick="testPerformance()">בדוק ביצועים</button>
        <div id="performance-results"></div>
    </div>
    
    <div class="test-section">
        <h2>בדיקה מלאה</h2>
        <button onclick="runAllTests()">הרץ כל הבדיקות</button>
        <div id="all-results"></div>
    </div>
    
    <div id="results"></div>
    
    <script>
        // Load required scripts
        const scripts = [
            '/trading-ui/scripts/services/tickers-data.js',
            '/trading-ui/scripts/services/select-populator-service.js'
        ];
        
        // Initialize PreferencesSystem if available
        if (window.PreferencesSystem && typeof window.PreferencesSystem.initialize === 'function') {
            window.PreferencesSystem.initialize().then(() => {
                if (window.Logger) {
                    window.Logger.info('PreferencesSystem initialized', {
                        page: 'test-user-ticker-integration',
                        component: 'preferences-system',
                        action: 'init-complete'
                    });
                }
            }).catch(error => {
                if (window.Logger) {
                    window.Logger.warn('PreferencesSystem initialization failed', {
                        page: 'test-user-ticker-integration',
                        component: 'preferences-system',
                        action: 'init-failed',
                        error: error.message
                    });
                }
            });
        }
        
        let scriptsLoaded = 0;
        scripts.forEach(src => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = () => {
                scriptsLoaded++;
                if (scriptsLoaded === scripts.length) {
                    if (window.Logger) { window.Logger.info('All scripts loaded', { page: 'test-user-ticker-integration', component: 'test-user-ticker-integration' }); }
                }
            };
            document.head.appendChild(script);
        });
        
        function addResult(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            container.appendChild(div);
        }
        
        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }
        
        async function testAPIEndpoints() {
            clearResults('api-results');
            addResult('api-results', 'מתחיל בדיקות API...', 'info');
            
            // Test GET /api/tickers/my
            try {
                const CACHE_KEY = 'test-user-ticker-integration-tickers-my';
                const CACHE_TTL = 45 * 1000; // 45 seconds
                let tickers = [];
                let elapsed = 0;
                
                // Try cache first
                if (window.UnifiedCacheManager && typeof window.UnifiedCacheManager.get === 'function') {
                    const cached = await window.UnifiedCacheManager.get(CACHE_KEY, { ttl: CACHE_TTL });
                    if (cached) {
                        tickers = Array.isArray(cached) ? cached : (Array.isArray(cached?.data) ? cached.data : []);
                        elapsed = 0; // Cache hit - instant
                    }
                }
                
                if (tickers.length === 0) {
                    const start = performance.now();
                    const response = await fetch('/api/tickers/my');
                    elapsed = performance.now() - start;
                    
                    if (!response.ok) {
                        addResult('api-results', `❌ GET /api/tickers/my failed: ${response.status}`, 'fail');
                        return;
                    }
                    
                    const data = await response.json();
                    tickers = data.data || [];
                    
                    // Save to cache
                    if (window.UnifiedCacheManager && typeof window.UnifiedCacheManager.save === 'function') {
                        await window.UnifiedCacheManager.save(CACHE_KEY, tickers, { ttl: CACHE_TTL, syncToBackend: false });
                    }
                }
                
                addResult('api-results', `✅ GET /api/tickers/my: ${tickers.length} tickers in ${elapsed.toFixed(2)}ms`, 'pass');
                
                if (tickers.length > 0) {
                    const sample = tickers[0];
                    const hasCustom = 'name_custom' in sample && 'type_custom' in sample && 'user_ticker_status' in sample;
                    addResult('api-results', hasCustom ? '✅ Custom fields in response' : '❌ Missing custom fields', hasCustom ? 'pass' : 'fail');
                }
            } catch (error) {
                addResult('api-results', `❌ Error: ${error.message}`, 'fail');
            }
        }
        
        async function testFrontendServices() {
            clearResults('frontend-results');
            addResult('frontend-results', 'מתחיל בדיקות Frontend Services...', 'info');
            
            if (!window.tickersData) {
                addResult('frontend-results', '❌ window.tickersData not available', 'fail');
                return;
            }
            
            try {
                const start = performance.now();
                const tickers = await window.tickersData.getUserTickers({ force: true });
                const elapsed = performance.now() - start;
                
                addResult('frontend-results', `✅ getUserTickers: ${tickers.length} tickers in ${elapsed.toFixed(2)}ms`, 'pass');
                
                if (tickers.length > 0) {
                    const sample = tickers[0];
                    const hasCustom = 'name_custom' in sample || 'type_custom' in sample;
                    addResult('frontend-results', hasCustom ? '✅ Custom fields attached' : '❌ Missing custom fields', hasCustom ? 'pass' : 'fail');
                }
            } catch (error) {
                addResult('frontend-results', `❌ Error: ${error.message}`, 'fail');
            }
        }
        
        async function testSelectPopulators() {
            clearResults('select-results');
            addResult('select-results', 'מתחיל בדיקות ממשקי בחירה...', 'info');
            
            if (!window.SelectPopulatorService) {
                addResult('select-results', '❌ SelectPopulatorService not available', 'fail');
                return;
            }
            
            // Create test select
            const testSelect = document.createElement('select');
            testSelect.id = 'test-select-' + Date.now();
            document.body.appendChild(testSelect);
            
            try {
                const start = performance.now();
                await window.SelectPopulatorService.populateTickersSelect(testSelect, {
                    includeEmpty: true
                });
                const elapsed = performance.now() - start;
                
                const options = Array.from(testSelect.options);
                addResult('select-results', `✅ populateTickersSelect: ${options.length} options in ${elapsed.toFixed(2)}ms`, 'pass');
                
                if (options.length > 1) {
                    const sampleOption = options.find(opt => opt.value && opt.value !== '');
                    if (sampleOption) {
                        addResult('select-results', `✅ Sample option: ${sampleOption.text}`, 'pass');
                    }
                }
            } catch (error) {
                addResult('select-results', `❌ Error: ${error.message}`, 'fail');
            } finally {
                document.body.removeChild(testSelect);
            }
        }
        
        async function testPerformance() {
            clearResults('performance-results');
            addResult('performance-results', 'מתחיל בדיקות ביצועים...', 'info');
            
            if (!window.tickersData) {
                addResult('performance-results', '❌ window.tickersData not available', 'fail');
                return;
            }
            
            // Test multiple calls
            const iterations = 10;
            const times = [];
            
            for (let i = 0; i < iterations; i++) {
                const start = performance.now();
                await window.tickersData.getUserTickers({ force: false });
                times.push(performance.now() - start);
            }
            
            const avg = times.reduce((a, b) => a + b, 0) / times.length;
            const min = Math.min(...times);
            const max = Math.max(...times);
            
            addResult('performance-results', `✅ Average: ${avg.toFixed(2)}ms`, 'pass');
            addResult('performance-results', `   Min: ${min.toFixed(2)}ms, Max: ${max.toFixed(2)}ms`, 'info');
            
            if (avg > 100) {
                addResult('performance-results', '⚠️  Performance warning: Average time > 100ms', 'fail');
            } else {
                addResult('performance-results', '✅ Performance is acceptable', 'pass');
            }
        }
        
        async function runAllTests() {
            clearResults('all-results');
            addResult('all-results', 'מתחיל בדיקות מלאות...', 'info');
            
            await testAPIEndpoints();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testFrontendServices();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testSelectPopulators();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testPerformance();
            
            addResult('all-results', '✅ כל הבדיקות הושלמו', 'pass');
        }
    </script>

    <!-- Authentication protection for testing -->
        <script src="scripts/logger-service.js?v=1.0.0"></script>
        <script src="scripts/error-handlers.js?v=1.0.0"></script>
<script src="scripts/auth.js?v=1.0.0" defer></script>
    <script src="scripts/auth-guard.js?v=1.0.0" defer></script>
    <script src="scripts/header-system.js?v=1.0.0"></script> <!-- Header system -->
    <script src="scripts/button-system-init.js?v=1.0.0"></script> <!-- Button system -->
  <script src="scripts/color-scheme-system.js></script> <!-- Dynamic color system -->
</body>
</html>
