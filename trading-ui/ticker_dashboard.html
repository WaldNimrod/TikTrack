<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד טיקר - TikTrack</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">
    
    <!-- TikTrack Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906" media="print" onload="this.media='all'; this.onload=null;">
    
    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906" media="print" onload="this.media='all'; this.onload=null;">
</head>

<body class="ticker-dashboard-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <div class="main-content" data-section="ticker-dashboard">

                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h2><img src="/trading-ui/images/icons/tabler/chart-bar.svg" width="24" height="24" alt="chart-bar" class="icon"> דשבורד טיקר</h2>
                        <div class="section-header-controls">
                            <button data-button-type="ADD" data-onclick="addTicker()" data-text="הוסף טיקר" title="הוסף טיקר חדש">
                            </button>
                            <button data-button-type="REFRESH" data-onclick="refreshDashboard()" data-text="רענן" title="רענן נתונים">
                            </button>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="content-section" data-section="ticker-dashboard-content">
                        <div class="section-body">
                            <div class="alert alert-info">
                                <h5><i class="fas fa-chart-line"></i> דשבורד טיקר</h5>
                                <p>צפייה מפורטת בנתונים ובסטטיסטיקות של טיקר ספציפי.</p>
                                <p><strong>סטטוס:</strong> <span class="badge bg-success">פעיל</span></p>
                            </div>

                            <!-- Ticker Selector -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h6>בחירת טיקר</h6>
                                </div>
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <select class="form-select" id="tickerSelector">
                                                <option value="">בחר טיקר...</option>
                                                <option value="AAPL">AAPL - Apple Inc.</option>
                                                <option value="GOOGL">GOOGL - Alphabet Inc.</option>
                                                <option value="MSFT">MSFT - Microsoft Corp.</option>
                                                <option value="TSLA">TSLA - Tesla Inc.</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <button class="btn btn-primary" onclick="loadTickerData()">
                                                <i class="fas fa-search"></i> הצג נתונים
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Ticker Data Display -->
                            <div id="tickerDataSection" style="display: none;">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="card">
                                            <div class="card-header">
                                                <h6>מידע בסיסי</h6>
                                            </div>
                                            <div class="card-body">
                                                <div class="row">
                                                    <div class="col-sm-6">
                                                        <p><strong>טיקר:</strong> <span id="tickerSymbol">-</span></p>
                                                        <p><strong>שם:</strong> <span id="tickerName">-</span></p>
                                                    </div>
                                                    <div class="col-sm-6">
                                                        <p><strong>מחיר נוכחי:</strong> <span id="currentPrice">-</span></p>
                                                        <p><strong>שינוי יומי:</strong> <span id="dailyChange">-</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="card">
                                            <div class="card-header">
                                                <h6>סטטיסטיקות</h6>
                                            </div>
                                            <div class="card-body">
                                                <div class="row">
                                                    <div class="col-sm-6">
                                                        <p><strong>שיא 52 שבועות:</strong> <span id="yearHigh">-</span></p>
                                                        <p><strong>שפל 52 שבועות:</strong> <span id="yearLow">-</span></p>
                                                    </div>
                                                    <div class="col-sm-6">
                                                        <p><strong>נפח ממוצע:</strong> <span id="avgVolume">-</span></p>
                                                        <p><strong>שווי שוק:</strong> <span id="marketCap">-</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Chart Placeholder -->
                                <div class="card mt-4">
                                    <div class="card-header">
                                        <h6>גרף טיקר</h6>
                                    </div>
                                    <div class="card-body text-center">
                                        <div style="height: 300px; background: #f8f9fa; border: 2px dashed #dee2e6; border-radius: 5px; display: flex; align-items: center; justify-content: center;">
                                            <div class="text-muted">
                                                <i class="fas fa-chart-line fa-3x mb-3"></i>
                                                <br>
                                                <strong>גרף טיקר</strong>
                                                <br>
                                                <small>גרף מחירים וניתוח טכני יוצג כאן</small>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div> <!-- .main-content -->
        </div> <!-- .page-body -->
    </div> <!-- .background-wrapper -->

    <!-- Scripts -->
    <script src="scripts/api-config.js?v=1.0.0" defer></script>
    <script src="scripts/api-fetch-wrapper.js?v=1.0.0" defer></script>
    <script src="scripts/global-favicon.js?v=1.0.0" defer></script>
    <script src="scripts/cache-sync-manager.js?v=1.0.0" defer></script>
    <script src="scripts/error-handlers.js?v=1.0.0" defer></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0" defer></script>
    <script src="scripts/logger-service.js?v=1.0.0" defer></script>
    <script src="scripts/auth.js?v=1.0.0" defer></script>
    <script src="scripts/auth-guard.js?v=1.0.0" defer></script>
    <script src="scripts/header-system.js?v=1.0.0" defer></script>
    <script src="scripts/button-system-init.js?v=1.0.0" defer></script>
    <script src="scripts/icon-system.js?v=1.0.0" defer></script>
    <script src="scripts/notification-system.js?v=1.0.0" defer></script>
    <!-- Preferences Package -->
    <script src="scripts/preferences-cache.js?v=1.0.0" defer></script>
    <script src="scripts/services/preferences-v4.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-events.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-core.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-ui-layer.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-colors.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-manager.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-profiles.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-lazy-loader.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-validation.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-ui-v4.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-ui.js?v=1.0.0" defer></script>
    <script src="scripts/preferences-group-manager.js?v=1.0.0" defer></script>
    <!-- Package Manifest and Page Configs - Required before core-systems.js -->
    <script src="scripts/init-system/package-manifest.js?v=1.0.0" defer></script> <!-- Package manifest -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0" defer></script> <!-- Page initialization configurations -->
    <script src="scripts/core-systems.js?v=1.0.0" defer></script>
    <script src="scripts/modal-manager-v2.js?v=1.0.0" defer></script>
    <script src="scripts/event-handler-manager.js?v=1.0.0" defer></script>
    <script src="scripts/ui-basic.js?v=1.0.0" defer></script>
    <script src="scripts/init-system.js?v=1.0.0" defer></script>

    <!-- Page-specific script -->
    <script>
        // Ticker Dashboard page functionality
        window.addTicker = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('דשבורד טיקר', 'הוספת טיקר חדש תתווסף בקרוב...', 3000);
            }
        };

        window.refreshDashboard = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('דשבורד טיקר', 'מרענן נתונים...', 2000);
            }

            // Simulate data refresh
            setTimeout(() => {
                if (window.NotificationSystem) {
                    window.NotificationSystem.showSuccess('דשבורד טיקר', 'הנתונים עודכנו!', 3000);
                }
            }, 1000);
        };

        window.loadTickerData = function() {
            const tickerSelect = document.getElementById('tickerSelector');
            const selectedTicker = tickerSelect.value;

            if (!selectedTicker) {
                if (window.NotificationSystem) {
                    window.NotificationSystem.showWarning('שגיאה', 'אנא בחר טיקר תחילה');
                }
                return;
            }

            // Show loading
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('דשבורד טיקר', 'טוען נתוני טיקר...', 2000);
            }

            // Simulate loading ticker data
            setTimeout(() => {
                loadTickerMockData(selectedTicker);
                document.getElementById('tickerDataSection').style.display = 'block';

                if (window.NotificationSystem) {
                    window.NotificationSystem.showSuccess('דשבורד טיקר', 'נתוני הטיקר נטענו בהצלחה!');
                }
            }, 1500);
        };

        function loadTickerMockData(ticker) {
            const mockData = {
                'AAPL': {
                    symbol: 'AAPL',
                    name: 'Apple Inc.',
                    currentPrice: '$150.25',
                    dailyChange: '+$2.30 (+1.56%)',
                    yearHigh: '$199.62',
                    yearLow: '$124.17',
                    avgVolume: '52.8M',
                    marketCap: '$2.35T'
                },
                'GOOGL': {
                    symbol: 'GOOGL',
                    name: 'Alphabet Inc.',
                    currentPrice: '$142.80',
                    dailyChange: '-$1.20 (-0.83%)',
                    yearHigh: '$191.75',
                    yearLow: '$83.34',
                    avgVolume: '24.5M',
                    marketCap: '$1.78T'
                },
                'MSFT': {
                    symbol: 'MSFT',
                    name: 'Microsoft Corp.',
                    currentPrice: '$305.20',
                    dailyChange: '+$5.40 (+1.80%)',
                    yearHigh: '$420.82',
                    yearLow: '$213.43',
                    avgVolume: '28.3M',
                    marketCap: '$2.26T'
                },
                'TSLA': {
                    symbol: 'TSLA',
                    name: 'Tesla Inc.',
                    currentPrice: '$248.50',
                    dailyChange: '+$12.80 (+5.43%)',
                    yearHigh: '$299.29',
                    yearLow: '$101.81',
                    avgVolume: '65.2M',
                    marketCap: '$792.4B'
                }
            };

            const data = mockData[ticker];
            if (data) {
                document.getElementById('tickerSymbol').textContent = data.symbol;
                document.getElementById('tickerName').textContent = data.name;
                document.getElementById('currentPrice').textContent = data.currentPrice;
                document.getElementById('dailyChange').textContent = data.dailyChange;
                document.getElementById('yearHigh').textContent = data.yearHigh;
                document.getElementById('yearLow').textContent = data.yearLow;
                document.getElementById('avgVolume').textContent = data.avgVolume;
                document.getElementById('marketCap').textContent = data.marketCap;
            }
        }

        // Auto-initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎯 Ticker Dashboard page loaded');
        });
    </script>

    <!-- Initialization System Scripts -->
    <script src="scripts/init-system/package-manifest.js?v=1.0.0" defer></script> <!-- Package manifest -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0" defer></script> <!-- Page initialization configurations -->
    <script src="scripts/init-system-check.js?v=1.0.0" defer></script> <!-- Initialization system check -->
    <script src="scripts/modules/core-systems.js?v=1.0.0" defer></script> <!-- Core systems (UnifiedAppInitializer) -->

    <!-- Additional required scripts -->
    <script src="scripts/color-scheme-system.js?v=1.0.0" defer></script> <!-- Dynamic color system -->
</body>
</html>
