<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת מחיקת טיקרים - TikTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles/styles.css" rel="stylesheet">
    <style>
        .test-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }

        .table-responsive {
            margin-top: 20px;
        }

        .btn-group-sm .btn {
            margin: 0 2px;
        }
    </style>
</head>

<body>
    <div class="test-container">
        <h1>🧪 בדיקת מחיקת טיקרים</h1>
        <p class="text-muted">דף פשוט לבדיקת פונקציונאליות מחיקת טיקרים</p>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>📊 טבלת טיקרים</h5>
                        <div class="table-count" id="tickersCount">טוען...</div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="tickersTable">
                                <thead>
                                    <tr>
                                        <th>מזהה</th>
                                        <th>סמל</th>
                                        <th>שם</th>
                                        <th>סוג</th>
                                        <th>הערות</th>
                                        <th>מטבע</th>
                                        <th>טריידים פעילים</th>
                                        <th>תאריך יצירה</th>
                                        <th>תאריך עדכון</th>
                                        <th>פעולות</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="10" class="text-center">טוען נתונים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Scripts -->
    <script src="scripts/main.js"></script>
    <script src="scripts/tickers.js"></script>

    <script>
        // פונקציה לטעינת טיקרים
        async function loadTickers() {
            try {
                console.log('🔄 טוען טיקרים...');
                const response = await window.apiCall('/api/tickers');
                const tickers = response.data || response;

                const tbody = document.querySelector('#tickersTable tbody');
                if (!tbody) {
                    console.error('❌ לא נמצא tbody לטבלת טיקרים');
                    return;
                }

                tbody.innerHTML = tickers.map(ticker => `
                    <tr data-id="${ticker.id}">
                        <td>${ticker.id}</td>
                        <td>${ticker.symbol || '-'}</td>
                        <td>${ticker.name || '-'}</td>
                        <td>${ticker.type || '-'}</td>
                        <td>${ticker.remarks || '-'}</td>
                        <td>${ticker.currency || '-'}</td>
                        <td>${ticker.active_trades ? 'כן' : 'לא'}</td>
                        <td>${window.formatDateTime ? window.formatDateTime(ticker.created_at) : ticker.created_at}</td>
                        <td>${window.formatDateTime ? window.formatDateTime(ticker.updated_at) : ticker.updated_at}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="editTickerRecord(${ticker.id})" title="ערוך">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteTickerRecord(${ticker.id})" title="מחק">🗑️</button>
                        </td>
                    </tr>
                `).join('');

                document.getElementById('tickersCount').textContent = `${tickers.length} טיקרים`;
                console.log('✅ טיקרים נטענו בהצלחה');

            } catch (error) {
                console.error('❌ שגיאה בטעינת טיקרים:', error);
                document.querySelector('#tickersTable tbody').innerHTML = '<tr><td colspan="10" class="text-center text-danger">שגיאה בטעינת נתונים</td></tr>';
            }
        }

        // טעינת נתונים כשהדף נטען
        document.addEventListener('DOMContentLoaded', function () {
            console.log('🚀 דף בדיקת טיקרים נטען');
            loadTickers();
        });
        
        // הוספת הפונקציה לגלובל
        window.loadTickers = loadTickers;
    </script>
</body>

</html>
