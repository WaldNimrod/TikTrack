<body class="tickers-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Main content -->
            <div class="main-content">
                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h1>
                            <img src="images/icons/tickers.svg" alt="טיקרים" class="table-icon">
                            טיקרים
                        </h1>
                        <div class="header-actions">
                            <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והטיקרים">
                                <i class="fas fa-copy"></i> העתק לוג מפורט
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור טיקרים">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <active-alerts></active-alerts>

                        <!-- Data summary -->
                        <div class="info-summary" id="summaryStats">
                            <div>סה"כ טיקרים: <strong id="totalTickers">0</strong></div>
                            <div>טיקרים פעילים: <strong id="activeTickers">0</strong></div>
                            <div>טיקרים פתוחים: <strong id="openTickers">0</strong></div>
                            <div>טיקרים סגורים: <strong id="closedTickers">0</strong></div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section Top End -->  

                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="main" data-section="main">
                    <!-- Tickers header -->
                    <div class="section-header">
                        <h2>
                            <img src="images/icons/tickers.svg" alt="ניהול טיקרים" class="section-icon">
                            ניהול טיקרים
                            <span class="table-count" id="tickersCount">טוען...</span>
                        </h2>
                        <div class="header-actions">
                            <button id="addTickerBtn" class="refresh-btn" onclick="showAddTickerModal()" title="הוסף תיקר חדש">
                                <img src="images/icons/tickers.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול טיקרים">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Tickers table -->
                    <div class="section-body">
                        <div class="table-responsive" id="tickersContainer">
                            <table class="data-table" id="tickersTable" data-table-type="tickers">
                                <thead>
                                    <tr>
                                        <th class="col-name">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }">
                                                שם הטיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }">
                                                מחיר נוכחי <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-change">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }">
                                                שינוי יומי <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-updated">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }">
                                                עדכון אחרון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            <span class="actions-header-icon">⋮</span>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6" class="loading">טוען טיקרים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 1 End-->   
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div class="page-bottom-spacing"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Ticker Modal -->
        <div class="modal fade" id="addTickerModal" tabindex="-1" aria-labelledby="addTickerModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-ticker">
                    <div class="modal-header entity-header entity-ticker">
                        <h4 class="modal-title entity-title">הוספת טיקר חדש</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addTickerForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerSymbol" class="form-label entity-label">סמל הטיקר</label>
                                        <input type="text" class="form-control" id="addTickerSymbol" placeholder="AAPL" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerName" class="form-label entity-label">שם החברה</label>
                                        <input type="text" class="form-control" id="addTickerName" placeholder="Apple Inc." required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerType" class="form-label entity-label">סוג הטיקר</label>
                                        <select class="form-select" id="addTickerType" required>
                                            <option value="">בחר סוג</option>
                                            <option value="stock">מניה</option>
                                            <option value="etf">ETF</option>
                                            <option value="bond">אג"ח</option>
                                            <option value="crypto">קריפטו</option>
                                            <option value="forex">מטבע חוץ</option>
                                            <option value="commodity">סחורה</option>
                                            <option value="other">אחר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerCurrency" class="form-label entity-label">מטבע</label>
                                        <select class="form-select" id="addTickerCurrency" required>
                                            <option value="">בחר מטבע...</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerStatus" class="form-label entity-label">סטטוס</label>
                                        <select class="form-select" id="addTickerStatus" required>
                                            <option value="open">פתוח</option>
                                            <option value="closed">סגור</option>
                                            <option value="cancelled">מבוטל</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerActiveTrades" class="form-label entity-label">טריידים פעילים</label>
                                        <select class="form-select" id="addTickerActiveTrades">
                                            <option value="">לא מוגדר</option>
                                            <option value="true">כן</option>
                                            <option value="false">לא</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="addTickerRemarks" class="form-label entity-label">הערות</label>
                                        <textarea class="form-control" id="addTickerRemarks" rows="3" placeholder="הערות נוספות..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-entity btn-entity-ticker" onclick="saveTicker()">הוסף טיקר</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Ticker Modal -->
        <div class="modal fade" id="editTickerModal" tabindex="-1" aria-labelledby="editTickerModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-ticker">
                    <div class="modal-header entity-header entity-ticker">
                        <h4 class="modal-title entity-title">עריכת טיקר</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editTickerForm">
                            <input type="hidden" id="editTickerId" name="id">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerSymbol" class="form-label">סמל הטיקר</label>
                                        <input type="text" class="form-control" id="editTickerSymbol" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerName" class="form-label entity-label">שם החברה</label>
                                        <input type="text" class="form-control" id="editTickerName" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerType" class="form-label entity-label">סוג הטיקר</label>
                                        <select class="form-select" id="editTickerType" required>
                                            <option value="">בחר סוג</option>
                                            <option value="stock">מניה</option>
                                            <option value="etf">ETF</option>
                                            <option value="bond">אג"ח</option>
                                            <option value="crypto">קריפטו</option>
                                            <option value="forex">מטבע חוץ</option>
                                            <option value="commodity">סחורה</option>
                                            <option value="other">אחר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerCurrency" class="form-label entity-label">מטבע</label>
                                        <select class="form-select" id="editTickerCurrency" required>
                                            <option value="">בחר מטבע...</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerStatus" class="form-label entity-label">סטטוס</label>
                                        <select class="form-select" id="editTickerStatus" required>
                                            <option value="open">פתוח</option>
                                            <option value="closed">סגור</option>
                                            <option value="cancelled">מבוטל</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerActiveTrades" class="form-label entity-label">טריידים פעילים</label>
                                        <select class="form-select" id="editTickerActiveTrades">
                                            <option value="">לא מוגדר</option>
                                            <option value="true">כן</option>
                                            <option value="false">לא</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editTickerRemarks" class="form-label entity-label">הערות</label>
                                        <textarea class="form-control" id="editTickerRemarks" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-entity btn-entity-ticker" onclick="updateTicker()">עדכן טיקר</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js?v=bd7dc47_20251013_044649"></script>

    <script src="scripts/global-favicon.js?v=bd7dc47_20251013_044649"></script>
    <script src="scripts/page-utils.js?v=bd7dc47_20251013_044649"></script>

    <script src="scripts/translation-utils.js?v=bd7dc47_20251013_044649"></script>

    <!-- Actions Menu System -->
