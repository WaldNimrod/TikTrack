<body class="tickers-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Main content -->
            <div class="main-content">
                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h1>
                            <img src="images/icons/tickers.svg" alt="טיקרים" class="table-icon">
                            טיקרים
                        </h1>
                        <div class="header-actions">
                            <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והטיקרים">
                                <i class="fas fa-copy"></i> העתק לוג מפורט
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור טיקרים">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>
                    <div class="section-body">
                        <active-alerts></active-alerts>

                        <!-- Data summary -->
                        <div class="info-summary" id="summaryStats">
                            <div>סה"כ טיקרים: <strong id="totalTickers">0</strong></div>
                            <div>טיקרים פעילים: <strong id="activeTickers">0</strong></div>
                            <div>טיקרים פתוחים: <strong id="openTickers">0</strong></div>
                            <div>טיקרים סגורים: <strong id="closedTickers">0</strong></div>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section Top End -->  

                <!-- UI Content Section 1 Start-->
                <div class="content-section" id="main" data-section="main">
                    <!-- Tickers header -->
                    <div class="section-header">
                        <h2>
                            <img src="images/icons/tickers.svg" alt="ניהול טיקרים" class="section-icon">
                            ניהול טיקרים
                            <span class="table-count" id="tickersCount">טוען...</span>
                        </h2>
                        <div class="header-actions">
                            <button id="addTickerBtn" class="refresh-btn" onclick="showAddTickerModal()" title="הוסף תיקר חדש">
                                <img src="images/icons/tickers.svg" alt="הוסף" class="action-icon">
                                הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול טיקרים">
                                <span class="section-toggle-icon">▼</span>
                            </button>
                        </div>
                    </div>

                    <!-- Tickers table -->
                    <div class="section-body">
                        <div class="table-responsive" id="tickersContainer">
                            <table class="table" id="tickersTable" data-table-type="tickers">
                                <thead>
                                    <tr>
                                        <th class="col-name">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                שם הטיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מחיר נוכחי <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-change">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                שינוי יומי <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-updated">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                עדכון אחרון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, window.filteredTickersData || window.tickersData, 'tickers', window.updateTickersTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="10" class="loading">טוען טיקרים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- UI Content Section 1 End-->   
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Ticker Modal -->
        <div class="modal fade" id="addTickerModal" tabindex="-1" aria-labelledby="addTickerModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addTickerModalLabel">הוספת טיקר חדש</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addTickerForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerSymbol" class="form-label">סמל הטיקר</label>
                                        <input type="text" class="form-control" id="addTickerSymbol" placeholder="AAPL" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerName" class="form-label">שם החברה</label>
                                        <input type="text" class="form-control" id="addTickerName" placeholder="Apple Inc." required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerType" class="form-label">סוג הטיקר</label>
                                        <select class="form-select" id="addTickerType" required>
                                            <option value="">בחר סוג</option>
                                            <option value="stock">מניה</option>
                                            <option value="etf">ETF</option>
                                            <option value="bond">אג"ח</option>
                                            <option value="crypto">קריפטו</option>
                                            <option value="forex">מטבע חוץ</option>
                                            <option value="commodity">סחורה</option>
                                            <option value="other">אחר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="addTickerCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="addTickerCurrency" required>
                                            <option value="">בחר מטבע...</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="addTickerRemarks" class="form-label">הערות</label>
                                        <textarea class="form-control" id="addTickerRemarks" rows="3" placeholder="הערות נוספות..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="saveTicker()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            טיקר</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Ticker Modal -->
        <div class="modal fade" id="editTickerModal" tabindex="-1" aria-labelledby="editTickerModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editTickerModalLabel">עריכת טיקר</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editTickerForm">
                            <input type="hidden" id="editTickerId" name="id">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerSymbol" class="form-label">סמל הטיקר</label>
                                        <input type="text" class="form-control" id="editTickerSymbol" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerName" class="form-label">שם החברה</label>
                                        <input type="text" class="form-control" id="editTickerName" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerType" class="form-label">סוג הטיקר</label>
                                        <select class="form-select" id="editTickerType" required>
                                            <option value="">בחר סוג</option>
                                            <option value="stock">מניה</option>
                                            <option value="etf">ETF</option>
                                            <option value="bond">אג"ח</option>
                                            <option value="crypto">קריפטו</option>
                                            <option value="forex">מטבע חוץ</option>
                                            <option value="commodity">סחורה</option>
                                            <option value="other">אחר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="editTickerCurrency" required>
                                            <option value="">בחר מטבע...</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerStatus" class="form-label">סטטוס</label>
                                        <select class="form-select" id="editTickerStatus">
                                            <option value="not_cancelled">לא מבוטל</option>
                                            <option value="cancelled">מבוטל</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <!-- Empty column for layout -->
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editTickerRemarks" class="form-label">הערות</label>
                                        <textarea class="form-control" id="editTickerRemarks" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="updateTicker()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
                            טיקר</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== DYNAMIC LOADING SYSTEM ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=20251001"></script>
    <script src="scripts/unified-app-initializer.js?v=20251001"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=20251001"></script>
    <script src="scripts/translation-utils.js?v=20251001"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/notification-system.js?v=20251001"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=20251001"></script>
    <script src="scripts/unified-cache-manager.js?v=20251001"></script>
    <script src="scripts/cache-policy-manager.js?v=20251001"></script>
    <script src="scripts/memory-optimizer.js?v=20251001"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
    <script src="scripts/ui-utils.js?v=20251001"></script>
    <script src="scripts/color-scheme-system.js?v=20251001"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- Stage 6: Data and Utility Systems -->
    <script src="scripts/data-utils.js?v=20251001"></script>
    <script src="scripts/date-utils.js?v=20251001"></script>
    <script src="scripts/button-icons.js?v=20251001"></script>
    <script src="scripts/table-mappings.js?v=20251006"></script>
        <script src="scripts/tables.js?v=20251011"></script>
    <script src="scripts/page-utils.js?v=20251001"></script>
    
    <!-- Stage 7: Additional Systems (As needed) -->
    <script src="scripts/preferences.js?v=20251001"></script>
    <script src="scripts/notification-category-detector.js?v=20251001"></script>
    <script src="scripts/global-notification-collector.js?v=20251001"></script>
    <script src="scripts/system-management.js?v=20251001"></script>
    
    <!-- Stage 8: Modal and Warning Systems -->
    <script src="scripts/entity-details-modal.js?v=20251001"></script>
    <script src="scripts/warning-system.js?v=20251001"></script>
    <script src="scripts/error-handlers.js?v=20251001"></script>
    
    <!-- Stage 9: Validation System -->
    <script src="scripts/validation-utils.js?v=20251001"></script>
    
    <!-- Stage 10: Linked Items System -->
    <script src="scripts/linked-items.js?v=20251001"></script>
    
    <!-- Stage 11: External Data Service -->
    <script src="scripts/external-data-service.js?v=20251001"></script>
    
    <!-- Stage 12: Page-specific Script -->
    <script src="scripts/tickers.js?v=20251002"></script>
    
    <!-- Local copyDetailedLog function for tickers page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
