<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>טיקרים - Tik.track</title>

  <!-- 
    ===== דף טיקרים - TikTrack =====
    
    דף זה מכיל:
    1. טבלת טיקרים - הסקשן הראשי
    2. כרטיסיות התראות - בחלק העליון
    3. מערכת פילטרים ומיון מתקדמת
    4. מערכת פריטים מקושרים מתקדמת
    
    מבנה הדף:
    - app-header: כותרת האפליקציה עם ניווט
    - page-body: תוכן ראשי מוגבל ברוחב (1400px)
      - top-section: כרטיסיות התראות וסיכום נתונים
      - content-section: טבלת טיקרים
    
    מערכת הפריטים המקושרים:
    - מודל מתקדם עם badges צבעוניים
    - 4 כפתורי פעולה לכל פריט (צפייה, עריכה, פתיחת דף, מחיקה)
    - עיצוב responsive עם תמיכה ב-RTL
    - כותרת דינמית עם סימבול הטיקר
    
    שינויים אחרונים:
    - עדכון שם הדף לטיקרים
    - שיפור עיצוב כרטיסיות התראות
    - תיקון כפתורי סגירה עצמאיים
    - ריכוז פונקציות טיקרים ב-tickers.js?v=20250830_1
    - הוספת מערכת פריטים מקושרים מתקדמת
    - הוספת קובץ CSS ייעודי למודל הפריטים המקושרים
  -->

  <!-- CSS Files - Ordered by priority (weak to strong) -->
  <!-- 1. Apple theme (base) -->
  <link rel="stylesheet" href="styles/apple-theme.css">

  <!-- 2. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 3. General styles -->
  <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/header-system.css">
  <!-- 4. Typography -->
  <link rel="stylesheet" href="styles/typography.css">

  <!-- 5. Table styles -->
  <link rel="stylesheet" href="styles/table.css">

  <!-- 6. Header system styles (highest priority) -->

  <!-- 7. Warning system styles -->
  <link rel="stylesheet" href="styles/notification-system.css">

  <!-- 8. Linked items modal styles -->
  <link rel="stylesheet" href="styles/linked-items.css">

  <!-- Modular grid files - loaded at end of file -->
</head>

<body class="tickers-page">
  <!-- General background -->
  <div class="background-wrapper">

    <!-- Application header -->
    <!-- Unified Header System -->
    <!-- Unified Header System will create header automatically -->

    <!-- Page body - All content after header -->
    <div class="page-body">
      <!-- Designs area - top-Section -->
      <div class="top-section">
        <!-- Main header -->
        <div class="section-header">
          <div class="table-title">
            <img src="images/icons/tickers.svg" alt="טיקרים" class="table-icon">
            טיקרים
          </div>
          <div class="table-actions">
            <button class="filter-toggle-btn" onclick="toggleTopSection()" title="הצג/הסתר אזור עיצובים">
              <span class="filter-icon">▲</span>
            </button>
          </div>
        </div>

        <!-- Alert cards -->
        <div class="section-body">
          <active-alerts></active-alerts>

          <!-- Data summary -->
          <div class="info-summary" id="summaryStats">
            <div>סה"כ טיקרים: <strong id="totalTickers">0</strong></div>
            <div>סה"כ טיקרים עם טרייד: <strong id="activeTickers">0</strong></div>
            <div>התראות חדשות: <strong id="newAlerts">0</strong></div>
            <div>עדכון אחרון: <strong id="latestUpdate">אין נתונים</strong></div>
            <div>עדכון ישן ביותר: <strong id="oldestUpdate">אין נתונים</strong></div>
          </div>
        </div>
      </div> <!-- End top-section -->

      <!-- Main content -->
      <div class="main-content">

        <!-- Tickers area - content-section -->
        <div class="content-section tickers-page" data-section="tickers">
          <!-- Tickers header -->
          <div class="section-header">
            <div class="table-title">
              <img src="images/icons/tickers.svg" alt="הטיקרים שלי" class="table-icon">
              הטיקרים שלי
            </div>
            <div class="table-count">9 טיקרים</div>
            <div class="table-actions">
              <button class="refresh-btn" onclick="showAddTickerModal()" title="הוסף תיקר חדש">
                <img src="images/icons/tickers.svg" alt="הוסף" class="action-icon">
                הוסף
              </button>
              <div class="action-separator"></div>
              <button class="filter-toggle-btn" onclick="toggleTickersSection()" title="הצג/הסתר אזור טיקרים">
                <span class="filter-icon">▲</span>
              </button>
            </div>
          </div>



          <!-- Tickers table -->
          <div class="section-body">
            <div class="table-responsive" id="tickersContainer">
              <table class="table" data-table-type="tickers">
                <colgroup>
                  
                </colgroup>
                <thead>
                  <tr>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }">
                        סמל <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }">
                        יש טריידים <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }">
                        סוג <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }">
                        מטבע <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }">
                        עודכן ב <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }">
                        שם <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(6); }">
                        נוצר ב <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(7); }">
                        הערות <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th>
                      <button class="btn btn-link sortable-header"
                        onclick="if (typeof window.sortTable === 'function') { window.sortTable(8); }">
                        סטטוס <span class="sort-icon">↕</span>
                      </button>
                    </th>
                    <th class="actions-cell">פעולות</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- נתונים יוכנסו כאן דינמית -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>


    </div> <!-- End page-body -->

    <!-- Bottom page spacing -->
    <div class="bottom-spacer"></div>

    <!-- Notification system -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- CSS for modals and table -->
    <style>
      /* וידוא שהמודול מופיע מעל הכל */
      .modal {
        z-index: 1055;
      }

      .modal-backdrop {
        z-index: 1050;
      }

      /* עיצוב תא הפעולות */
      .actions-cell {
        text-align: center;
        vertical-align: middle;
        white-space: nowrap;
        min-width: 150px;
      }

      .actions-cell .btn-group {
        display: inline-flex;
        gap: 2px;
      }

      .actions-cell .btn {
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
        border-radius: 0.25rem;
      }

      /* רוחב קבוע לטבלה */
      table[data-table-type="tickers"] {
        table-layout: fixed;
        width: 100%;
      }

      /* התאמה לטקסט ארוך */
      table[data-table-type="tickers"] td {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* אפשרות לטקסט ארוך בהערות */
      table[data-table-type="tickers"] td:nth-child(8) {
        white-space: normal;
        word-wrap: break-word;
      }
    </style>

    <!-- Add Ticker Modal -->
    <div class="modal fade" id="addTickerModal" tabindex="-1" aria-labelledby="addTickerModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="addTickerModalLabel">הוספת טיקר חדש</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addTickerForm">
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="addTickerSymbol" class="form-label">סמל טיקר *</label>
                    <input type="text" class="form-control" id="addTickerSymbol" name="symbol" required placeholder="למשל: AAPL"
                      maxlength="10">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="addTickerName" class="form-label">שם החברה *</label>
                    <input type="text" class="form-control" id="addTickerName" required placeholder="למשל: Apple Inc."
                      maxlength="100">
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="addTickerType" class="form-label">סוג *</label>
                    <select class="form-select" id="addTickerType" required>
                      <option value="">בחר סוג...</option>
                      <option value="stock">מניה</option>
                      <option value="etf">ETF</option>
                      <option value="bond">אגרת חוב</option>
                      <option value="crypto">קריפטו</option>
                      <option value="forex">מטבע חוץ</option>
                      <option value="commodity">סחורה</option>
                      <option value="other">אחר</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="addTickerCurrency" class="form-label">מטבע *</label>
                    <select class="form-select" id="addTickerCurrency" name="currency_id" required>
                      <option value="">בחר מטבע...</option>
                      <!-- Options will be loaded dynamically -->
                    </select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label for="addTickerRemarks" class="form-label">הערות</label>
                    <textarea class="form-control" id="addTickerRemarks" rows="3" placeholder="הערות נוספות על הטיקר..."
                      maxlength="500"></textarea>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-success btn-success-outline" onclick="saveTicker()">
              שמור טיקר
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Ticker Modal -->
    <div class="modal fade" id="editTickerModal" tabindex="-1" aria-labelledby="editTickerModalLabel" aria-hidden="true"
      data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="editTickerModalLabel">עריכת טיקר</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editTickerForm">
              <input type="hidden" id="editTickerId">
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editTickerSymbol" class="form-label">סמל טיקר *</label>
                    <input type="text" class="form-control" id="editTickerSymbol" name="symbol" required placeholder="למשל: AAPL"
                      maxlength="10">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editTickerName" class="form-label">שם החברה *</label>
                    <input type="text" class="form-control" id="editTickerName" required placeholder="למשל: Apple Inc."
                      maxlength="100">
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editTickerType" class="form-label">סוג *</label>
                    <select class="form-select" id="editTickerType" required>
                      <option value="">בחר סוג...</option>
                      <option value="stock">מניה</option>
                      <option value="etf">ETF</option>
                      <option value="bond">אגרת חוב</option>
                      <option value="crypto">קריפטו</option>
                      <option value="forex">מטבע חוץ</option>
                      <option value="commodity">סחורה</option>
                      <option value="other">אחר</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="editTickerCurrency" class="form-label">מטבע *</label>
                    <select class="form-select" id="editTickerCurrency" name="currency_id" required>
                      <option value="">בחר מטבע...</option>
                      <!-- Options will be loaded dynamically -->
                    </select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <label for="editTickerRemarks" class="form-label">הערות</label>
                    <textarea class="form-control" id="editTickerRemarks" rows="3"
                      placeholder="הערות נוספות על הטיקר..." maxlength="500"></textarea>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-success btn-success-outline" onclick="updateTicker()">
              עדכן טיקר
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Ticker Modal -->
    <div class="modal fade" id="deleteTickerModal" tabindex="-1" aria-labelledby="deleteTickerModalLabel"
      aria-hidden="true" data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="deleteTickerModalLabel">מחיקת טיקר</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p>האם אתה בטוח שברצונך למחוק את הטיקר <strong id="deleteTickerName"></strong>?</p>
            <p class="text-danger">פעולה זו אינה הפיכה!</p>
            <input type="hidden" id="deleteTickerId">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
            <button type="button" class="btn btn-danger btn-danger-outline" onclick="confirmDeleteTicker()">
              מחק טיקר
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- מודל הצגת פריטים מקושרים -->
    <div class="modal fade" id="linkedItemsModal" tabindex="-1" aria-labelledby="linkedItemsModalLabel"
      aria-hidden="true" data-bs-backdrop="true" data-bs-keyboard="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header modal-header-colored">
            <h5 class="modal-title" id="linkedItemsModalLabel">פרטים מקושרים</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="linkedItemsModalBody">
            <!-- תוכן המודל יוכנס כאן דינמית -->
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
          </div>
        </div>
      </div>
    </div>
