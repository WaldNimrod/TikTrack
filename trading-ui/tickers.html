<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>טיקרים - TikTrack</title>
    
    <!-- 
    ===== CORRECTED TICKERS PAGE =====
    
    This page has been corrected to follow the proper architecture:
    1. Complete ITCSS implementation
    2. All base package systems included
    3. Correct loading order
    4. Scripts moved to body
    
    ======================================
    -->
    
    <!-- Google Fonts -->
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_page-headers.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_info-summary.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_constraints.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_system-management.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_chart-management.css?v=1.0.0">
    
    
    <!-- 08-themes - Themes -->
    <link rel="stylesheet" href="styles-new/08-themes/_light.css?v=1.0.0">
    
    <!-- 09-utilities - Utility Classes -->
    <link rel="stylesheet" href="styles-new/09-utilities/_utilities.css?v=1.0.0">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=1.0.0">
</head>

<body class="tickers-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Tickers area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/tickers.svg" alt="טיקרים" class="table-icon" style="width: 28px; height: 28px;">
                        טיקרים
                    </div>
                    <div class="table-actions">
                        <button data-button-type="COPY" data-variant="full" data-onclick="copyDetailedLog()" data-text="העתק לוג מפורט" title="העתק לוג מפורט"></button>
                        <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('top')" data-text="הצג/הסתר"></button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ טיקרים: <strong id="totalTickers">0</strong></div>
                        <div>טיקרים פעילים: <strong id="activeTickers">0</strong></div>
                        <div>מחיר ממוצע: <strong id="averagePrice">$0</strong></div>
                        <div>שינוי יומי: <strong id="dailyChange">0%</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Tickers management area - content-section -->
                <div class="content-section" id="main">
                    <!-- Tickers header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/tickers.svg" alt="ניהול טיקרים" class="section-icon" style="width: 28px; height: 28px;">
                            ניהול טיקרים
                        </div>
                        <div class="table-count" id="tickersCount">טוען...</div>
                        <div class="table-actions">
                            <button data-button-type="ADD" data-entity-type="ticker" data-variant="full" data-onclick="showAddTickerModal()" data-text="הוסף טיקר" title="הוסף טיקר חדש" aria-label="הוסף טיקר חדש"></button>
                            <div class="action-separator"></div>
                            <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('main')" data-text="הצג/הסתר"></button>
                        </div>
                    </div>

                    <!-- Tickers table -->
                    <div class="section-body">
                        <div class="table-responsive" id="tickersContainer">
                            <table class="table" id="tickersTable" data-table-type="tickers">
                                <thead>
                                    <tr>
                                        <th class="col-name">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">שם הטיקר <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">מחיר נוכחי <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-change">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">שינוי יומי <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-volume">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">נפח <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">סטטוס <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">סוג <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-company">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(6); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">שם החברה <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-remarks">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(7); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">הערות <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-updated">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(8); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">עודכן ב <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="10" class="loading">טוען טיקרים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Ticker Modal -->
        <div class="modal fade" id="addTickerModal" tabindex="-1" aria-labelledby="addTickerModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored d-flex justify-content-between align-items-center">
                        <h5 class="modal-title" id="addTickerModalLabel">הוספת טיקר חדש</h5>
                        <button data-button-type="CLOSE" data-bs-dismiss="modal" data-text="סגור"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addTickerForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="tickerSymbol" class="form-label">סמל הטיקר</label>
                                        <input type="text" class="form-control" id="tickerSymbol" placeholder="AAPL" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="tickerName" class="form-label">שם החברה</label>
                                        <input type="text" class="form-control" id="tickerName" placeholder="Apple Inc." required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="tickerExchange" class="form-label">בורסה</label>
                                        <select class="form-select" id="tickerExchange" required>
                                            <option value="">בחר בורסה</option>
                                            <option value="NASDAQ">NASDAQ</option>
                                            <option value="NYSE">NYSE</option>
                                            <option value="AMEX">AMEX</option>
                                            <option value="TSX">TSX</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="tickerSector" class="form-label">סקטור</label>
                                        <select class="form-select" id="tickerSector">
                                            <option value="">בחר סקטור</option>
                                            <option value="Technology">טכנולוגיה</option>
                                            <option value="Healthcare">בריאות</option>
                                            <option value="Finance">פיננסים</option>
                                            <option value="Energy">אנרגיה</option>
                                            <option value="Consumer">צריכה</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="tickerDescription" class="form-label">תיאור הטיקר</label>
                                        <textarea class="form-control" id="tickerDescription" rows="3" placeholder="תיאור הטיקר..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer d-flex justify-content-end">
                        <button data-button-type="CANCEL" data-bs-dismiss="modal" data-text="ביטול"></button>
                        <button data-button-type="SAVE" data-onclick="saveTicker()" data-text="שמור"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Ticker Modal -->
        <div class="modal fade" id="editTickerModal" tabindex="-1" aria-labelledby="editTickerModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored d-flex justify-content-between align-items-center">
                        <h5 class="modal-title" id="editTickerModalLabel">עריכת טיקר</h5>
                        <button data-button-type="CLOSE" data-bs-dismiss="modal" data-text="סגור"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editTickerForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerSymbol" class="form-label">סמל הטיקר</label>
                                        <input type="text" class="form-control" id="editTickerSymbol" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerName" class="form-label">שם החברה</label>
                                        <input type="text" class="form-control" id="editTickerName" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerExchange" class="form-label">בורסה</label>
                                        <select class="form-select" id="editTickerExchange" required>
                                            <option value="NASDAQ">NASDAQ</option>
                                            <option value="NYSE">NYSE</option>
                                            <option value="AMEX">AMEX</option>
                                            <option value="TSX">TSX</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTickerSector" class="form-label">סקטור</label>
                                        <select class="form-select" id="editTickerSector">
                                            <option value="Technology">טכנולוגיה</option>
                                            <option value="Healthcare">בריאות</option>
                                            <option value="Finance">פיננסים</option>
                                            <option value="Energy">אנרגיה</option>
                                            <option value="Consumer">צריכה</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editTickerDescription" class="form-label">תיאור הטיקר</label>
                                        <textarea class="form-control" id="editTickerDescription" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer d-flex justify-content-end">
                        <button data-button-type="CANCEL" data-bs-dismiss="modal" data-text="ביטול"></button>
                        <button data-button-type="SAVE" data-onclick="updateTicker()" data-text="עדכן"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Base Package Scripts -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    <script src="scripts/warning-system.js?v=1.0.0"></script>
    <script src="scripts/entity-details-api.js?v=1.0.0"></script>
    <script src="scripts/entity-details-renderer.js?v=1.0.0"></script>
    <script src="scripts/entity-details-modal.js?v=1.0.0"></script>
    <script src="scripts/ui-utils.js?v=1.0.0"></script>
    <script src="scripts/page-utils.js?v=1.0.0"></script>
    <script src="scripts/translation-utils.js?v=1.0.0"></script>
    <script src="scripts/button-icons.js?v=1.0.0"></script>
    <script src="scripts/button-system-init.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- CRUD Package Scripts -->
    <script src="scripts/tables.js?v=1.0.0"></script>
    <script src="scripts/data-utils.js?v=1.0.0"></script>
    <script src="scripts/pagination-system.js?v=1.0.0"></script>
    <script src="scripts/modules/actions-menu-system.js?v=1.0.1"></script>
    
    <!-- Preferences System (Required before Services) -->
    <script src="scripts/preferences.js?v=1.0.0"></script>
    <script src="scripts/preferences-core.js?v=1.0.0"></script>
    
    <!-- Services Package Scripts -->
    <script src="scripts/services/data-collection-service.js?v=1.0.0"></script>
    <script src="scripts/services/field-renderer-service.js?v=1.0.0"></script>
    <script src="scripts/services/select-populator-service.js?v=1.0.0"></script>
    <script src="scripts/services/crud-response-handler.js?v=1.0.0"></script>
    <script src="scripts/services/default-value-setter.js?v=1.0.0"></script>
    <script src="scripts/services/statistics-calculator.js?v=1.0.0"></script>
    
    <!-- Page Configs and Initializer -->
    <script src="scripts/init-system/package-manifest.js?v=1.0.0"></script>
    <!-- Page Configs and Initializer -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    <!-- Page-specific Scripts -->
    <script src="scripts/tickers.js?v=1.0.0"></script>
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
