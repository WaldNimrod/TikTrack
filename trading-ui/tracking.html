      if (!gridApi) return;

      let activeTrades = 0;
      let profitableTrades = 0;
      
      gridApi.forEachNodeAfterFilter(node => {
        const data = node.data;
        if (data) {
          // חישוב ערך כולל
          const currentValue = parseFloat(data.currentValue.replace(/[$,]/g, ''));
          totalValue += currentValue;
          
          // חישוב רווח/הפסד
          const pnl = parseFloat(data.pnl.replace(/[$,]/g, ''));
          totalProfit += pnl;
          
          if (data.status === 'פעיל') {
            activeTrades++;
          }
          
          if (pnl > 0) {
            profitableTrades++;
          }
        }
      });
      
      // עדכון התצוגה
      const summaryElements = document.querySelectorAll('.info-summary div');
      if (summaryElements.length >= 4) {
        summaryElements[0].innerHTML = `סה"כ טריידים פעילים: <strong>${activeTrades}</strong>`;
        summaryElements[1].innerHTML = `ערך תיק כולל: <strong>₪${totalValue.toLocaleString()}</strong>`;
        summaryElements[2].innerHTML = `רווח כולל: <strong style="color: ${totalProfit >= 0 ? 'green' : 'red'}">${totalProfit >= 0 ? '+' : ''}₪${totalProfit.toLocaleString()}</strong>`;

    // האזנה לשינויים בקומפוננט הכותרת
    function setupHeaderListener() {
      const header = document.querySelector('app-header');
      if (header) {
        // האזנה לשינויים בפילטר
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
              const filterSection = header.shadowRoot?.querySelector('#statusFilterSection');
              if (filterSection) {
                const isCollapsed = filterSection.classList.contains('collapsed');
                updateBackgroundPadding(isCollapsed);
              }
            }
          });
        });

        // התחלת ההאזנה
        setTimeout(() => {
          const filterSection = header.shadowRoot?.querySelector('#statusFilterSection');
          if (filterSection) {
            observer.observe(filterSection, { attributes: true });
          }
          
          // עדכון נוסף של הקומפוננט עם הפילטר השמור אחרי שהקומפוננט מוכן
          const savedFilter = loadSavedFilter();
          if (savedFilter) {
            console.log('Header ready - updating with saved filter:', savedFilter);
            updateHeaderComponentWithFilter(savedFilter);
          }
        }, 1000);
      }
    }

      }
    }

    // פונקציה להחלת פילטר תאריכים
    function applyDateRangeFilterToGrid(selectedDateRange) {
      if (!gridApi) {
        console.log('Grid API not available yet');
        return;
      }

      console.log('Applying date range filter to grid:', selectedDateRange);

      try {
        if (!selectedDateRange || selectedDateRange === 'הכול') {
          // אם לא נבחר טווח תאריכים או נבחר "הכול" - הצג הכל
          console.log('Showing all dates');
          gridApi.setGridOption('rowData', rowData);
        } else {
          // חישוב טווח התאריכים
          const now = new Date();
          let startDate = new Date();
          
          switch (selectedDateRange) {
            case 'שבוע':
              startDate.setDate(now.getDate() - 7);
              break;
            case 'MTD':
              startDate = new Date(now.getFullYear(), now.getMonth(), 1);
              break;
            case '30 יום':
              startDate.setDate(now.getDate() - 30);
              break;
            case '60 יום':
              startDate.setDate(now.getDate() - 60);
              break;
            case '90 יום':
              startDate.setDate(now.getDate() - 90);
              break;
            case 'שנה':
              startDate.setFullYear(now.getFullYear() - 1);
              break;
            case 'YTD':
              startDate = new Date(now.getFullYear(), 0, 1);
              break;
            case 'שנה קודמת':
              startDate = new Date(now.getFullYear() - 1, 0, 1);
              const endDate = new Date(now.getFullYear() - 1, 11, 31);
              break;
            default:
              console.log('Unknown date range:', selectedDateRange);
              gridApi.setGridOption('rowData', rowData);
              return;
          }
          
          // סינון הנתונים לפי טווח התאריכים
          const filteredData = rowData.filter(row => {
            if (!row.opened_at) return false;
            const rowDate = new Date(row.opened_at);
            return rowDate >= startDate && rowDate <= now;
          });
          
          console.log('Date range filter applied:', selectedDateRange, 'Showing', filteredData.length, 'rows');
          gridApi.setGridOption('rowData', filteredData);
        }
        
        // עדכון הסטטיסטיקות
        updateSummaryStats();
        
      } catch (error) {
        console.error('Error updating grid data with date filter:', error);
      }
    }

    // הפיכת הפונקציה לזמינה גלובלית

          console.log('Loaded saved date range filter:', filters.dateRanges);
        }
        if (savedSearchFilter) {
          filters.search = savedSearchFilter;
          console.log('Loaded saved search filter:', filters.search);
        }
        
        return filters;
      } catch (error) {
        console.error('Error loading saved filters:', error);
      }
      return null;
    }

    // פונקציות לטעינת נתונים אמיתיים
    async function loadSummaryStats() {
      try {
        const response = await fetch('/api/accounts/stats');
        const stats = await response.json();
        
        // עדכון סטטיסטיקות סיכום
        document.getElementById('activeTradesCount').textContent = stats.active_accounts || 0;
        document.getElementById('totalPortfolioValue').textContent = formatCurrency(stats.total_value || 0);
        
        const profitLoss = stats.total_profit_loss || 0;
        const profitElement = document.getElementById('totalProfitLoss');
        profitElement.textContent = formatCurrency(profitLoss);
        profitElement.style.color = profitLoss >= 0 ? 'green' : 'red';
        
        const percentageElement = document.getElementById('profitPercentage');
        percentageElement.textContent = `${stats.profit_percentage || 0}%`;
        percentageElement.style.color = profitLoss >= 0 ? 'green' : 'red';
        
      } catch (error) {
        console.error('Error loading summary stats:', error);
      }
    }
    
    async function loadAlerts() {
      try {
        const response = await fetch('/api/alerts');
        const alerts = await response.json();
        
        const alertsContainer = document.getElementById('alertsContainer');
        
        if (alerts.length === 0) {
          alertsContainer.innerHTML = `
            <div class="alert-card">
              <div class="no-alerts">אין התראות פעילות</div>
            </div>
          `;
          return;
        }
        
        const activeAlerts = alerts.filter(alert => alert.status === 'active');
        
        if (activeAlerts.length === 0) {
          alertsContainer.innerHTML = `
            <div class="alert-card">
              <div class="no-alerts">אין התראות פעילות</div>
            </div>
          `;
          return;
        }
        
        alertsContainer.innerHTML = activeAlerts.map(alert => `
          <div class="alert-card">
            <strong onclick="openTradeDetails('${alert.ticker_symbol || 'Unknown'}')">${alert.ticker_symbol || 'Unknown'}</strong><br />
            ${alert.condition || 'התראה'}<br />
            <span class="price">סטטוס: ${alert.status}</span>
            <button class="btn btn-secondary" onclick="markAlertAsRead(this, '${alert.ticker_symbol || 'Unknown'}')">סמן כנקרא</button>
          </div>
        `).join('');
        
      } catch (error) {
        console.error('Error loading alerts:', error);
      }
    }
    
    async function loadDetailedStats() {
      try {
        const response = await fetch('/api/stats');
        const stats = await response.json();
        
        // עדכון סטטיסטיקות מפורטות
        document.getElementById('dailyProfit').textContent = formatCurrency(stats.daily_profit || 0);
        document.getElementById('weeklyProfit').textContent = formatCurrency(stats.weekly_profit || 0);
        document.getElementById('monthlyProfit').textContent = formatCurrency(stats.monthly_profit || 0);
        document.getElementById('profitableTrades').textContent = `${stats.profitable_trades || 0}/${stats.total_trades || 0}`;
        
        // עדכון צבעים
        const dailyChange = document.getElementById('dailyProfitChange');
        const weeklyChange = document.getElementById('weeklyProfitChange');
        const monthlyChange = document.getElementById('monthlyProfitChange');
        const tradesChange = document.getElementById('profitableTradesChange');
        
        const dailyProfit = stats.daily_profit || 0;
        const weeklyProfit = stats.weekly_profit || 0;
        const monthlyProfit = stats.monthly_profit || 0;
        const profitableRate = stats.total_trades > 0 ? (stats.profitable_trades / stats.total_trades) * 100 : 0;
        
        dailyChange.textContent = `${dailyProfit >= 0 ? '+' : ''}${((dailyProfit / (stats.total_value || 1)) * 100).toFixed(1)}%`;
        dailyChange.className = `change ${dailyProfit >= 0 ? 'positive' : 'negative'}`;
        
        weeklyChange.textContent = `${weeklyProfit >= 0 ? '+' : ''}${((weeklyProfit / (stats.total_value || 1)) * 100).toFixed(1)}%`;
        weeklyChange.className = `change ${weeklyProfit >= 0 ? 'positive' : 'negative'}`;
        
        monthlyChange.textContent = `${monthlyProfit >= 0 ? '+' : ''}${((monthlyProfit / (stats.total_value || 1)) * 100).toFixed(1)}%`;
        monthlyChange.className = `change ${monthlyProfit >= 0 ? 'positive' : 'negative'}`;
        
        tradesChange.textContent = `${profitableRate.toFixed(1)}%`;
        tradesChange.className = `change ${profitableRate >= 50 ? 'positive' : 'negative'}`;
        
      } catch (error) {
        console.error('Error loading detailed stats:', error);
      }
    }
    
    function formatCurrency(amount) {
      return new Intl.NumberFormat('he-IL', {
        style: 'currency',
        currency: 'ILS',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(amount);
    }
    
    // אתחול הדף
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM loaded - setting up header listener');
      // הגדרת האזנה לכותרת
      setupHeaderListener();
      
      // טעינת נתונים אמיתיים
      loadSummaryStats();
      loadAlerts();
      loadDetailedStats();
      
      // עדכון הקומפוננט הכותרת עם הפילטר השמור (אם יש)
      const savedFilter = loadSavedFilters();
      if (savedFilter && savedFilter.statuses) {
        console.log('DOM loaded - updating header with saved filter:', savedFilter.statuses);
        // הקומפוננט יטען את הפילטר השמור אוטומטית
      }
    });
  </script>
