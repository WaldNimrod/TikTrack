<body class="trade-plans-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Planning area - top-Section -->
            <div class="top-section planning-page" data-section="top">
                <!-- Planning header -->
                <div class="section-header">
                    <h1>
                        <img src="images/icons/trade_plans.svg" alt="תכנון טריידים והשקעות" class="section-icon">
                        תכנון טריידים והשקעות
                    </h1>
                    <div class="header-actions">
                        <button class="refresh-btn"
                            onclick="if (typeof window.openAddTradePlanModal === 'function') { window.openAddTradePlanModal(); }"
                            title="הוסף תכנון חדש">
                            <img src="images/icons/trade_plans.svg" alt="הוסף" class="action-icon">
                            הוסף
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והתכנונים">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור עיצובים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <!-- Active alerts web component -->
                    <active-alerts></active-alerts>

                    <!-- Alerts cards container -->
                    <div class="alerts-cards" id="alertsCards"></div>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ תכנונים: <strong id="totalDesigns">0</strong></div>
                        <div>סה"כ השקעה: <strong id="totalInvestment">$0</strong></div>
                        <div>השקעה ממוצעת: <strong id="avgInvestment">$0</strong></div>
                        <div>רווח כולל: <strong id="totalProfit">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- My planning area - content-section -->
                <div class="content-section planning-page" id="main" data-section="main">
                    <!-- My planning header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/trade_plans.svg" alt="התכנונים שלי"
                                style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
                            התכנונים שלי
                        </div>
                        <div class="table-count" id="trade_plansCount">טוען...</div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <button id="addTradePlanBtn" class="refresh-btn"
                                onclick="if (typeof window.showAddTradePlanModal === 'function') { window.showAddTradePlanModal(); }"
                                title="הוסף תכנון חדש">
                                <img src="images/icons/trade_plans.svg" alt="הוסף" class="action-icon"
                                    style="width: 16px; height: 16px;"> הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור התכנונים שלי">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- Planning table -->
                    <div class="section-body">
                        <div class="table-responsive" id="trade_plansContainer">
                            <table class="table trade-plans-table" id="trade_plansTable" data-table-type="trade_plans">
                                <thead>
                                    <tr>
                                        <th class="col-ticker">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                טיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-date">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תאריך <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-side">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                צד <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-quantity">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                כמות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(5, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מחיר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-investment">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(6, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                השקעה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(7, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-profit">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(8, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                רווח <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-notes">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(9, window.filteredTradePlansData || window.tradePlansData, 'trade_plans', window.updateTradePlansTable); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                הערות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="11" class="loading">טוען תכנונים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Trade Plan Modal -->
        <div class="modal fade" id="addTradePlanModal" tabindex="-1" aria-labelledby="addTradePlanModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addTradePlanModalLabel">הוספת תכנון חדש</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addTradePlanForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="ticker" class="form-label">טיקר</label>
                                        <select class="form-select" id="addTradePlanTickerId" required>
                                            <option value="">בחר טיקר</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="tradingAccount" class="form-label">חשבון מסחר</label>
                                        <select class="form-select" id="addTradePlanTradingAccount" required>
                                            <option value="">בחר חשבון</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="type" class="form-label">סוג השקעה</label>
                                        <select class="form-select" id="addTradePlanInvestmentType" required>
                                            <option value="">בחר סוג השקעה</option>
                                            <option value="swing">Swing</option>
                                            <option value="day">Day</option>
                                            <option value="scalp">Scalp</option>
                                            <option value="position">Position</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="side" class="form-label">צד</label>
                                        <select class="form-select" id="addTradePlanSide" required>
                                            <option value="Long">Long</option>
                                            <option value="Short">Short</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="status" class="form-label">סטטוס</label>
                                        <select class="form-select" id="addTradePlanStatus" required>
                                            <option value="open">פתוח</option>
                                            <option value="closed">סגור</option>
                                            <option value="cancelled">מבוטל</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="amount" class="form-label">סכום מתוכנן</label>
                                        <input type="number" class="form-control" id="addTradePlanPlannedAmount" step="0.01" min="0" placeholder="1000" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="quantity" class="form-label">כמות</label>
                                        <input type="number" class="form-control" id="addTradePlanShares" step="1" min="1" placeholder="100" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="price" class="form-label">מחיר</label>
                                        <input type="number" class="form-control" id="addTradePlanCurrentPrice" step="0.01" min="0" placeholder="150.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="entryConditions" class="form-label">תנאי כניסה</label>
                                        <textarea class="form-control" id="addTradePlanEntryConditions" rows="2" placeholder="תנאי כניסה לטרייד..."></textarea>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="reasons" class="form-label">סיבות</label>
                                        <textarea class="form-control" id="addTradePlanReasons" rows="2" placeholder="סיבות לטרייד..."></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="stopPrice" class="form-label">מחיר עצירה</label>
                                        <input type="number" class="form-control" id="addTradePlanStopPrice" step="0.01" min="0" placeholder="140.00">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="targetPrice" class="form-label">מחיר יעד</label>
                                        <input type="number" class="form-control" id="addTradePlanTargetPrice" step="0.01" min="0" placeholder="160.00">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="stopPercentage" class="form-label">אחוז עצירה</label>
                                        <input type="number" class="form-control" id="stopPercentage" step="0.01" min="0" placeholder="5.00">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="targetPercentage" class="form-label">אחוז יעד</label>
                                        <input type="number" class="form-control" id="targetPercentage" step="0.01" min="0" placeholder="10.00">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="currentPrice" class="form-label">מחיר נוכחי</label>
                                        <input type="number" class="form-control" id="currentPrice" step="0.01" min="0" placeholder="150.00">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="notes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="notes" rows="2" placeholder="הערות נוספות..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="saveNewTradePlan()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            תכנון</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Trade Plan Modal -->
        <div class="modal fade" id="editTradePlanModal" tabindex="-1" aria-labelledby="editTradePlanModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editTradePlanModalLabel">עריכת תכנון</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editTradePlanForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTicker" class="form-label">טיקר</label>
                                        <input type="text" class="form-control" id="editTicker" required disabled>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editPlanDate" class="form-label">תאריך</label>
                                        <input type="date" class="form-control" id="editPlanDate" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editType" class="form-label">סוג השקעה</label>
                                        <select class="form-select" id="editType" required>
                                            <option value="swing">Swing</option>
                                            <option value="day">Day</option>
                                            <option value="scalp">Scalp</option>
                                            <option value="position">Position</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editSide" class="form-label">צד</label>
                                        <select class="form-select" id="editSide" required>
                                            <option value="Long">Long</option>
                                            <option value="Short">Short</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editQuantity" class="form-label">כמות</label>
                                        <input type="number" class="form-control" id="editQuantity" step="1" min="1" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editPrice" class="form-label">מחיר</label>
                                        <input type="number" class="form-control" id="editPrice" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNotes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="editNotes" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
