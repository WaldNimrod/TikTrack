<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>תכנון טריידים - TikTrack</title>
    
    <!-- 
    ===== CORRECTED TRADE_PLANS PAGE =====
    
    This page has been corrected to follow the proper architecture:
    1. Single HTML tag (removed duplicate)
    2. Complete ITCSS implementation
    3. All base package systems included
    4. Correct loading order
    5. Scripts moved to body
    
    ======================================
    -->
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS - Must load first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ITCSS Architecture - Complete Implementation -->
    
    <!-- 01-settings - Variables and Settings -->
    <link rel="stylesheet" href="styles-new/01-settings/_variables.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_colors-dynamic.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_colors-semantic.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_spacing.css?v=1.0.0">

    <!-- 02-tools - Functions and Mixins -->

    <!-- 03-generic - Reset and Normalization -->
    <link rel="stylesheet" href="styles-new/03-generic/_reset.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/03-generic/_base.css?v=1.0.0">
    
    <!-- 04-elements - Basic HTML Elements -->
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_links.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_forms-base.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_buttons-base.css?v=1.0.0">
    
    <!-- 05-objects - Layout Structures -->
    <link rel="stylesheet" href="styles-new/05-objects/_layout.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_grid.css?v=1.0.0">
    
    <!-- 06-components - UI Components -->
    <link rel="stylesheet" href="styles-new/06-components/_buttons-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_tables.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_cards.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=1.0.0">
    
    <!-- 07-pages - Page-specific Styles -->
    <link rel="stylesheet" href="styles-new/07-pages/_trade_plans.css?v=1.0.0">
    
    <!-- 08-themes - Themes -->
    <link rel="stylesheet" href="styles-new/08-themes/_light.css?v=1.0.0">
    
    <!-- 09-utilities - Utility Classes -->
    <link rel="stylesheet" href="styles-new/09-utilities/_spacing.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/09-utilities/_text.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/09-utilities/_display.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/09-utilities/_responsive.css?v=1.0.0">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">
</head>

<body class="trade-plans-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Planning area - top-Section -->
            <div class="top-section planning-page">
                <!-- Planning header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/trade_plans.svg" alt="תכנון טריידים והשקעות" class="section-icon">
                        תכנון טריידים והשקעות
                    </div>
                    <div class="table-actions">
                        <button class="refresh-btn"
                            onclick="if (typeof window.openAddTradePlanModal === 'function') { window.openAddTradePlanModal(); }"
                            title="הוסף תכנון חדש">
                            <img src="images/icons/trade_plans.svg" alt="הוסף" class="action-icon">
                            הוסף
                        </button>
                        <div class="action-separator"></div>
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והתכנונים">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור עיצובים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <!-- Active alerts web component -->
                    <active-alerts></active-alerts>

                    <!-- Alerts cards container -->
                    <div class="alerts-cards" id="alertsCards"></div>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ תכנונים: <strong id="totalDesigns">0</strong></div>
                        <div>סה"כ השקעה: <strong id="totalInvestment">$0</strong></div>
                        <div>השקעה ממוצעת: <strong id="avgInvestment">$0</strong></div>
                        <div>רווח כולל: <strong id="totalProfit">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- My planning area - content-section -->
                <div class="content-section planning-page" id="main">
                    <!-- My planning header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/trade_plans.svg" alt="התכנונים שלי"
                                style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
                            התכנונים שלי
                        </div>
                        <div class="table-count" id="trade_plansCount">טוען...</div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <button id="addTradePlanBtn" class="refresh-btn"
                                onclick="if (typeof window.showAddTradePlanModal === 'function') { window.showAddTradePlanModal(); }"
                                title="הוסף תכנון חדש">
                                <img src="images/icons/trade_plans.svg" alt="הוסף" class="action-icon"
                                    style="width: 16px; height: 16px;"> הוסף
                            </button>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור התכנונים שלי">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- Planning table -->
                    <div class="section-body">
                        <div class="table-responsive" id="trade_plansContainer">
                            <table class="table trade-plans-table" id="trade_plansTable" data-table-type="trade_plans">
                                <thead>
                                    <tr>
                                        <th class="col-ticker">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                טיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-date">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תאריך <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-side">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                צד <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-quantity">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                כמות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מחיר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-investment">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(6); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                השקעה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(7); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-profit">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(8); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                רווח <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-notes">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTable === 'function') { window.sortTable(9); }"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                הערות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="11" class="loading">טוען תכנונים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>

        <!-- Add Trade Plan Modal -->
        <div class="modal fade" id="addTradePlanModal" tabindex="-1" aria-labelledby="addTradePlanModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="addTradePlanModalLabel">הוספת תכנון חדש</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addTradePlanForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="ticker" class="form-label">טיקר</label>
                                        <input type="text" class="form-control" id="ticker" placeholder="AAPL" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="planDate" class="form-label">תאריך</label>
                                        <input type="date" class="form-control" id="planDate" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="type" class="form-label">סוג</label>
                                        <select class="form-select" id="type" required>
                                            <option value="">בחר סוג</option>
                                            <option value="buy">קנייה</option>
                                            <option value="sell">מכירה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="side" class="form-label">צד</label>
                                        <select class="form-select" id="side" required>
                                            <option value="">בחר צד</option>
                                            <option value="long">Long</option>
                                            <option value="short">Short</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="quantity" class="form-label">כמות</label>
                                        <input type="number" class="form-control" id="quantity" step="1" min="1" placeholder="100" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="price" class="form-label">מחיר</label>
                                        <input type="number" class="form-control" id="price" step="0.01" min="0" placeholder="150.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="notes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="notes" rows="3" placeholder="הוסף הערות על התכנון..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="addTradePlan()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">הוסף
                            תכנון</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Trade Plan Modal -->
        <div class="modal fade" id="editTradePlanModal" tabindex="-1" aria-labelledby="editTradePlanModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="editTradePlanModalLabel">עריכת תכנון</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editTradePlanForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTicker" class="form-label">טיקר</label>
                                        <input type="text" class="form-control" id="editTicker" required disabled>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editPlanDate" class="form-label">תאריך</label>
                                        <input type="date" class="form-control" id="editPlanDate" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editType" class="form-label">סוג</label>
                                        <select class="form-select" id="editType" required>
                                            <option value="buy">קנייה</option>
                                            <option value="sell">מכירה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editSide" class="form-label">צד</label>
                                        <select class="form-select" id="editSide" required>
                                            <option value="long">Long</option>
                                            <option value="short">Short</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editQuantity" class="form-label">כמות</label>
                                        <input type="number" class="form-control" id="editQuantity" step="1" min="1" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editPrice" class="form-label">מחיר</label>
                                        <input type="number" class="form-control" id="editPrice" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNotes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="editNotes" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                        <button type="button" class="btn btn-success" onclick="updateTradePlan()"
                            style="border: 2px solid #28a745; background-color: white; color: #28a745; font-size: 0.9rem; padding: 0.375rem 0.75rem;">עדכן
                            תכנון</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/translation-utils.js?v=1.0.0"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-policy-manager.js?v=1.0.0"></script>
    <script src="scripts/memory-optimizer.js?v=1.0.0"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
    <script src="scripts/ui-utils.js?v=1.0.0"></script>
    <script src="scripts/color-scheme-system.js?v=1.0.0"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- Stage 6: Data and Utility Systems -->
    <script src="scripts/data-utils.js?v=1.0.0"></script>
    <script src="scripts/date-utils.js?v=1.0.0"></script>
    <script src="scripts/button-icons.js?v=1.0.0"></script>
    <script src="scripts/tables.js?v=1.0.0"></script>
    <script src="scripts/table-mappings.js?v=1.0.0"></script>
    <script src="scripts/page-utils.js?v=1.0.0"></script>
    
    <!-- Stage 7: Additional Systems (As needed) -->
    <script src="scripts/preferences.js?v=1.0.0"></script>
    <script src="scripts/notification-category-detector.js?v=1.0.0"></script>
    <script src="scripts/global-notification-collector.js?v=1.0.0"></script>
    <script src="scripts/system-management.js?v=1.0.0"></script>
    <script src="scripts/realtime-notifications-client.js?v=1.0.0"></script>
    <script src="scripts/error-handlers.js?v=1.0.0"></script>
    
    <!-- Stage 8: Page-specific Script -->
    <script src="scripts/trade_plans.js?v=1.0.0"></script>
    
    <!-- Local copyDetailedLog function for trade_plans page -->
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
