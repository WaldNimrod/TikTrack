<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>מעקב טריידים - TikTrack</title>
    
    <!-- 
    ===== CORRECTED TRADES PAGE =====
    
    This page has been corrected to follow the proper architecture:
    1. Complete ITCSS implementation
    2. All base package systems included
    3. Correct loading order
    4. Scripts moved to body
    
    ======================================
    -->
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS - Must load first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ITCSS Architecture - Complete Implementation -->
    
    <!-- 01-settings - Variables and Settings -->
    <link rel="stylesheet" href="styles-new/01-settings/_variables.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_colors-dynamic.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_colors-semantic.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_spacing.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_typography.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/01-settings/_rtl-logical.css?v=1.0.0">
    
    <!-- 02-tools - Functions and Mixins -->
    <link rel="stylesheet" href="styles-new/02-tools/_mixins.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/02-tools/_functions.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/02-tools/_utilities.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/02-tools/_rtl-helpers.css?v=1.0.0">
    
    <!-- 03-generic - Reset and Normalization -->
    <link rel="stylesheet" href="styles-new/03-generic/_reset.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/03-generic/_base.css?v=1.0.0">
    
    <!-- 04-elements - Basic HTML Elements -->
    <link rel="stylesheet" href="styles-new/04-elements/_headings.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_links.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_forms-base.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/04-elements/_buttons-base.css?v=1.0.0">
    
    <!-- 05-objects - Layout Structures -->
    <link rel="stylesheet" href="styles-new/05-objects/_layout.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/05-objects/_grid.css?v=1.0.0">
    
    <!-- 06-components - UI Components -->
    <link rel="stylesheet" href="styles-new/06-components/_buttons-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_tables.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_cards.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_modals.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_notifications.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_navigation.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_forms-advanced.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_badges-status.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_entity-colors.css?v=1.0.0">
    
    <!-- 07-pages - Page-specific Styles -->
    <link rel="stylesheet" href="styles-new/07-pages/_trades.css?v=1.0.0">
    
    <!-- 08-themes - Themes -->
    <link rel="stylesheet" href="styles-new/08-themes/_light.css?v=1.0.0">
    
    <!-- 09-utilities - Utility Classes -->
    <link rel="stylesheet" href="styles-new/09-utilities/_spacing.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/09-utilities/_text.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/09-utilities/_display.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/09-utilities/_responsive.css?v=1.0.0">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=v6.0.0">
</head>

<body class="trades-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- אזור מעקב טריידים - top-Section -->
            <div class="top-section tracking-page">
                <!-- כותרת מעקב טריידים -->
                <div class="section-header entity-trade-main-header">
                    <div class="table-title">
                        <img src="images/icons/trades.svg" alt="מעקב טריידים" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                        מעקב טריידים
                    </div>
                    <div class="table-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והטריידים">
                            <i class="fas fa-copy"></i> העתק לוג מפורט
                        </button>
                        <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור מעקב טריידים">
                            <span class="filter-icon">▲</span>
                        </button>
                    </div>
                </div>

                <!-- כרטיסיות התראות -->
                <div class="section-body">
                    <!-- Color Scheme Demo for Trades -->
                    <div id="tradesColorDemo" class="mb-3" style="display: none;">
                        <div class="d-flex gap-2 mb-2">
                            <span class="entity-trade-badge">טרייד פעיל</span>
                            <span class="entity-account-badge">Interactive Brokers</span>
                            <div class="entity-trade-border p-2 border rounded">
                                <small>עמלה: <span class="numeric-text-negative">-$5.00</span></small>
                            </div>
                        </div>
                        <div class="alert alert-info">
                            <small>🎨 דמונסטרציה למערכת הצבעים הדינמית - מתעדכנת אוטומטית לפי סוג הישות</small>
                        </div>
                    </div>
                    
                    <!-- ווב קומפוננט של התראות פעילות -->
                    <active-alerts></active-alerts>

                    <!-- סיכום נתונים -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ טריידים: <strong id="totalTrades">0</strong></div>
                        <div>טריידים פתוחים: <strong id="openTrades">0</strong></div>
                        <div>טריידים סגורים: <strong id="closedTrades">0</strong></div>
                        <div>רווח/הפסד כולל: <strong id="totalPL">$0</strong></div>
                    </div>
                </div>
            </div> <!-- סוף top-section -->

            <!-- תוכן ראשי -->
            <div class="main-content">

                <!-- אזור הטריידים שלי - content-section -->
                <div class="content-section tracking-page" id="main">
                    <!-- כותרת הטריידים שלי -->
                    <div class="section-header entity-trade-main-header">
                        <div class="table-title">
                            <img src="images/icons/trades.svg" alt="הטריידים שלי" style="width: 40px; height: 40px; margin-left: 8px; vertical-align: middle;">
                            הטריידים שלי
                        </div>
                        <div class="table-count" id="tradesCount">טוען...</div>
                        <div class="table-actions">
                            <button id="addTradeBtn" class="refresh-btn" onclick="showAddTradeModal()" title="הוסף טרייד חדש">
                                <img src="images/icons/trades.svg" alt="הוסף" class="action-icon" style="width: 16px; height: 16px;"> הוסף
                            </button>
                            
                            <!-- כפתורי עריכה ומחיקה נסתרים (לזיהוי בבדיקות) -->
                            <button id="editTradeBtn" class="refresh-btn d-none" onclick="editTradeRecord('')" title="ערוך טרייד נבחר">
                                <img src="images/icons/trades.svg" alt="ערוך" class="action-icon" style="width: 16px; height: 16px;"> ערוך
                            </button>
                            <button id="deleteTradeBtn" class="refresh-btn d-none" onclick="deleteTradeRecord('')" title="מחק טרייד נבחר">
                                <img src="images/icons/trades.svg" alt="מחק" class="action-icon" style="width: 16px; height: 16px;"> מחק
                            </button>

                            <div class="action-separator"></div>
                            <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור הטריידים שלי">
                                <span class="filter-icon">▲</span>
                            </button>
                        </div>
                    </div>

                    <!-- טבלת טריידים -->
                    <div class="section-body">
                        <div class="table-responsive" id="tradesContainer">
                            <table class="table" id="tradesTable" data-table-type="trades">
                                <thead>
                                    <tr>
                                        <th class="col-ticker">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="0"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                טיקר <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-price">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="1"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                מחיר נוכחי <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-change">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="2"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                שינוי % <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="3"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="4"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-side">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="5"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                צד <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-plan">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="6"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                תוכנית <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-pnl">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="7"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                רווח/הפסד <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-created">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="8"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                נוצר ב <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-closed">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="9"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                נסגר ב <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-account">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="10"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                חשבון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-notes">
                                            <button class="btn btn-link sortable-header"
                                                data-sort-column="11"
                                                style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">
                                                הערות <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="13" class="loading">טוען טריידים...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="table-footer">
                        <!-- כפתורי ההוספה עברו לכותרת הטבלה -->
                    </div>
                </div>
            </div>

        </div> <!-- סוף page-body -->

        <!-- מרווח בתחתית הדף -->
        <div style="height: 3rem;"></div>

        <!-- מודל עריכת טרייד -->
        <div class="modal fade" id="editTradeModal" tabindex="-1" aria-labelledby="editTradeModalLabel" aria-hidden="true" data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg" style="max-width: 800px; margin: 1.75rem auto;">
                <div class="modal-content">
                    <div class="modal-header" style="background-color: #ff9c05; color: white;">
                        <h5 class="modal-title" id="editTradeModalLabel" style="order: 1;">עריכת טרייד</h5>
                        <div style="order: 2;">
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                    </div>

                    <!-- שורת מידע ואיקונים מתחת לכותרת -->
                    <div class="d-flex justify-content-between align-items-center p-2"
                        style="background-color: #f8f9fa; border-bottom: 1px solid #dee2e6;">
                        <!-- מידע טיקר, מחיר ושינוי יומי -->
                        <div class="d-flex gap-4 align-items-center">
                            <div class="d-flex align-items-center">
                                <span class="text-muted me-2" style="font-size: 14px;">טיקר:</span>
                                <span id="modalTickerSymbol" class="fw-bold" style="font-size: 16px; color: #333;">-</span>
                            </div>
                            <div class="d-flex align-items-center">
                                <span class="text-muted me-2" style="font-size: 14px;">מחיר:</span>
                                <span id="modalCurrentPrice" class="fw-bold" style="font-size: 16px; color: #333;">-</span>
                            </div>
                            <div class="d-flex align-items-center">
                                <span class="text-muted me-2" style="font-size: 14px;">שינוי:</span>
                                <span id="modalPriceChange" class="fw-bold" style="font-size: 16px;">-</span>
                            </div>
                        </div>

                        <!-- איקונים לפעולות נוספות -->
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="openLinkedItemsModal('trade', '')" title="הצג פריטים מקושרים">
                                <i class="fas fa-link"></i>
                            </button>
                            <button type="button" class="btn btn-outline-info btn-sm" onclick="addImportantNote()" title="הוסף הערה חשובה">
                                <i class="fas fa-sticky-note"></i>
                            </button>
                            <button type="button" class="btn btn-outline-warning btn-sm" onclick="addReminder()" title="הוסף תזכורת">
                                <i class="fas fa-bell"></i>
                            </button>
                        </div>
                    </div>

                    <div class="modal-body">
                        <form id="editTradeForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTicker" class="form-label">טיקר</label>
                                        <input type="text" class="form-control" id="editTicker" required disabled>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editStatus" class="form-label">סטטוס</label>
                                        <select class="form-select" id="editStatus" required>
                                            <option value="open">פתוח</option>
                                            <option value="closed">סגור</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editType" class="form-label">סוג</label>
                                        <select class="form-select" id="editType" required>
                                            <option value="buy">קנייה</option>
                                            <option value="sell">מכירה</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editSide" class="form-label">צד</label>
                                        <select class="form-select" id="editSide" required>
                                            <option value="long">Long</option>
                                            <option value="short">Short</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editTradePlan" class="form-label">תוכנית טרייד</label>
                                        <select class="form-select" id="editTradePlan">
                                            <option value="">בחר תוכנית</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccount" class="form-label">חשבון</label>
                                        <select class="form-select" id="editAccount" required>
                                            <option value="">בחר חשבון</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editNotes" class="form-label">הערות</label>
                                        <textarea class="form-control" id="editNotes" rows="3" placeholder="הוסף הערות על הטרייד..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="modal-footer">
                        <div class="d-flex justify-content-between w-100">
                            <!-- כפתורים בצד שמאל -->
                            <div>
                                <button type="button" class="btn btn-info me-2" onclick="addImportantNote()">
                                    <img src="images/icons/home.svg" alt="יש לי עוד משהו חשוב" class="btn-icon" style="width: 16px; height: 16px;"> יש לי עוד משהו חשוב
                                </button>
                                <button type="button" class="btn btn-warning" onclick="addReminder()">
                                    <img src="images/icons/alerts.svg" alt="תזכיר לי כש..." class="btn-icon" style="width: 16px; height: 16px;"> תזכיר לי כש...
                                </button>
                            </div>

                            <!-- כפתורים בצד ימין -->
                            <div>
                                <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">ביטול</button>
                                <button type="button" class="btn btn-success" onclick="saveNewTradeRecord()">
                                    שמור
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- מודל הצגת פריטים מקושרים -->
        <div class="modal fade" id="linkedItemsModal" tabindex="-1" aria-labelledby="linkedItemsModalLabel" aria-hidden="true" data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored">
                        <h5 class="modal-title" id="linkedItemsModalLabel">פרטים מקושרים</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="linkedItemsModalBody">
                        <!-- תוכן המודל יוכנס כאן דינמית -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1000000002;"></div>
    </div> <!-- End background-wrapper -->
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Stage 1: Initialization Systems (Must be first) -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    
    <!-- Stage 2: Core Base Systems -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/translation-utils.js?v=1.0.0"></script>
    
    <!-- Stage 3: UI Base Systems -->
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    
    <!-- Stage 4: Cache and Refresh Systems -->
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-policy-manager.js?v=1.0.0"></script>
    <script src="scripts/memory-optimizer.js?v=1.0.0"></script>
    
    <!-- Stage 5: Advanced UI Systems (Always required) -->
