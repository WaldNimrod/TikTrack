<!DOCTYPE html>
<html lang="he" dir="rtl" class="trades-page">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב טריידים - TikTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet"><link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906">
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906">




































    <!-- Bootstrap Icons and FontAwesome removed - using Tabler Icons via IconSystem -->
</head>
<body class="trades-page">
<div id="unified-header">
</div>
<div class="background-wrapper">
<div class="page-body">
<div class="top-section tracking-page">
<div class="section-header entity-trade-main-header">
<div class="table-title">
<img src="images/icons/entities/trades.svg" alt="מעקב טריידים" class="section-icon"> מעקב טריידים </div>
<div class="table-actions">
<button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('top')" data-text="הצג/הסתר" title="הצג/הסתר"></button>
</div>
</div>
<div class="section-body">
<active-alerts>
</active-alerts>
<div class="info-summary" id="summaryStats">
<div>סה"כ טריידים: <strong id="totalTrades">0</strong>
</div>
<div>טריידים פתוחים: <strong id="openTrades">0</strong>
</div>
<div>טריידים סגורים: <strong id="closedTrades">0</strong>
</div>
<div>רווח/הפסד כולל: <strong id="totalPL">$0</strong>
</div>
</div>
</div>
</div>
<div class="main-content">
<div class="content-section tracking-page" id="main">
<div class="section-header entity-trade-main-header">
<div class="table-title">
<img src="images/icons/entities/trades.svg" alt="הטריידים שלי" class="section-icon"> הטריידים שלי </div>
<div class="table-count" id="tradesCount">טוען...</div>
<div class="table-actions">
<button data-button-type="ADD" data-entity-type="trade" data-variant="full" data-onclick="showAddTradeModal()" data-text="הוסף טרייד" title="הוסף טרייד חדש"></button>
<button id="editTradeBtn" data-button-type="EDIT" data-onclick="editTradeRecord('')" data-text="ערוך" title="ערוך טרייד נבחר"></button>
<button id="deleteTradeBtn" data-button-type="DELETE" data-onclick="deleteTradeRecord('')" data-text="מחק" title="מחק טרייד נבחר"></button>
<div class="action-separator">
</div>
<button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('top')" data-text="הצג/הסתר" title="הצג/הסתר"></button>
</div>
</div>
<div class="section-body">
<div class="table-responsive" id="tradesContainer">
<table class="table" id="tradesTable" data-table-type="trades">
<thead>
<tr>
<th class="col-ticker">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="טיקר">
</button>
</th>
<th class="col-price">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="מחיר נוכחי">
</button>
</th>
<th class="col-change">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="שינוי %">
</button>
</th>
<th class="col-status">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="סטטוס">
</button>
</th>
<th class="col-type">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="סוג">
</button>
</th>
<th class="col-side">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="צד">
</button>
</th>
<th class="col-plan">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(6); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="תוכנית">
</button>
</th>
<th class="col-pnl">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(7); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="רווח/הפסד">
</button>
</th>
<th class="col-created">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(8); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="נוצר ב">
</button>
</th>
<th class="col-closed">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(9); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="נסגר ב">
</button>
</th>
<th class="col-account">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(10); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="חשבון">
</button>
</th>
<th class="col-notes">
<button data-button-type="SORT" data-onclick="if (typeof window.sortTable === 'function') { window.sortTable(11); }" data-classes="btn btn-link sortable-header" data-attributes="style='border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;'" data-text="הערות">
</button>
</th>
<th class="col-actions actions-cell actions-3-items"></th>
</tr>
</thead>
<tbody>
<tr>
<td colspan="13" class="loading">טוען טריידים...</td>
</tr>
</tbody>
</table>
</div>
</div>
<div class="table-footer">
</div>
</div>
</div>
</div>
<div class="page-bottom-spacing">
</div>
