<body class="trading-accounts-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Main Page Content - לפי התבנית הסטנדרטית -->
    <div class="main-content">
        <!-- UI Content Section Top Start-->
        <div class="top-section" data-section="top">
            <div class="section-header">
                <!-- UI section main top header comes here -->
                <h1>
                    <img src="images/icons/trading_accounts.svg" alt="חשבונות מסחר" class="section-icon">
                    חשבונות מסחר
                </h1>
                <div class="header-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyDetailedLog()" title="העתק לוג מפורט עם כל הנתונים והחשבונות המסחר">
                        <i class="fas fa-copy"></i> העתק לוג מפורט
                    </button>
                    <button class="filter-toggle-btn" onclick="toggleSection('top')" title="הצג/הסתר אזור חשבונות מסחר">
                        <span class="filter-icon">▲</span>
                    </button>
                </div>
            </div>
            <div class="section-body">
                <!-- UI Top section body comes here -->
                <!-- Trading Accounts Summary -->
                <div class="info-summary" id="summaryStats">
                    <div><strong>סה"כ חשבונות מסחר:</strong> <span id="totalAccounts">0</span></div>
                    <div><strong>חשבונות מסחר פעילים:</strong> <span id="activeAccounts">0</span></div>
                    <div><strong>סה"כ יתרה:</strong> <span id="totalBalance">$0</span></div>
                </div>
            </div>
        </div>
        <!-- UI Content Section Top End -->

        <!-- UI Content Section 1 Start-->
        <div class="content-section" id="main" data-section="main">
            <div class="section-header">
                <!-- UI section title comes here -->
                <h2>
                    <img src="images/icons/trading_accounts.svg" alt="ניהול חשבונות מסחר" class="section-icon">
                    ניהול חשבונות מסחר
                </h2>
                <div class="header-actions">
                    <button id="addAccountBtn" class="refresh-btn" onclick="showAddAccountModal()" title="הוסף חשבון מסחר חדש">
                        <img src="images/icons/trading_accounts.svg" alt="הוסף" class="action-icon">
                        הוסף
                    </button>
                    <button class="filter-toggle-btn" onclick="toggleSection('main')" title="הצג/הסתר אזור ניהול חשבונות מסחר">
                        <span class="section-toggle-icon">▼</span>
                    </button>
                </div>
            </div>
            <div class="section-body">
                <!-- UI section body comes here -->
                        <div class="table-responsive" id="accountsContainer">
                            <table class="data-table" id="accountsTable" data-table-type="accounts">
                                <thead>
                                    <tr>
                                        <th class="col-name">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(0, window.filteredTradingAccountsData || window.trading_accountsData, 'trading_accounts', window.updateTradingAccountsTable); }">
                                                שם החשבון <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(1, window.filteredTradingAccountsData || window.trading_accountsData, 'trading_accounts', window.updateTradingAccountsTable); }"

                                                סוג <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-currency">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(2, window.filteredTradingAccountsData || window.trading_accountsData, 'trading_accounts', window.updateTradingAccountsTable); }"

                                                מטבע <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-balance">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(3, window.filteredTradingAccountsData || window.trading_accountsData, 'trading_accounts', window.updateTradingAccountsTable); }"

                                                יתרה <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(4, window.filteredTradingAccountsData || window.trading_accountsData, 'trading_accounts', window.updateTradingAccountsTable); }"

                                                סטטוס <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-created">
                                            <button class="btn btn-link sortable-header"
                                                onclick="if (typeof window.sortTableData === 'function') { window.sortTableData(5, window.filteredTradingAccountsData || window.trading_accountsData, 'trading_accounts', window.updateTradingAccountsTable); }"

                                                נוצר ב <span class="sort-icon">↕</span>
                                            </button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="accountsTableBody">
                                    <tr>
                                        <td colspan="9" class="loading">טוען חשבונות מסחר...</td>
                                    </tr>
                                </tbody>
                            </table>
                </div>
            </div>
        </div>
        <!-- UI Content Section 1 End -->

        <!-- Bottom page spacing -->
        <div class="page-bottom-spacing"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Account Modal -->
        <div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-account">
                    <div class="modal-header entity-header entity-account">
                        <h4 class="modal-title entity-title">הוספת חשבון מסחר חדש</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addAccountForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountName" class="form-label entity-label">שם החשבון</label>
                                        <input type="text" class="form-control" id="accountName" placeholder="שם החשבון" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountStatus" class="form-label entity-label">סטטוס</label>
                                        <select class="form-select" id="accountStatus" required>
                                            <option value="open">פתוח</option>
                                            <option value="closed">סגור</option>
                                            <option value="cancelled">מבוטל</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountCurrency" class="form-label entity-label">מטבע</label>
                                        <select class="form-select" id="accountCurrency" required>
                                            <option value="">בחר מטבע</option>
                                            <option value="1">דולר אמריקאי (USD)</option>
                                            <option value="2">אירו (EUR)</option>
                                            <option value="3">לירה שטרלינג (GBP)</option>
                                            <option value="4">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountBalance" class="form-label entity-label">יתרה התחלתית</label>
                                        <input type="number" class="form-control" id="accountBalance" step="0.01" min="0" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="accountDescription" class="form-label entity-label">תיאור החשבון</label>
                                        <textarea class="form-control" id="accountDescription" rows="3" placeholder="תיאור החשבון..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-entity btn-entity-account" onclick="addAccount()">הוסף חשבון</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Account Modal -->
        <div class="modal fade" id="editAccountModal" tabindex="-1" aria-labelledby="editAccountModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content entity-account">
                    <div class="modal-header entity-header entity-account">
                        <h4 class="modal-title entity-title">עריכת חשבון מסחר</h4>
                        <button type="button" class="btn-close btn-close-end" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editAccountForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountName" class="form-label entity-label">שם החשבון</label>
                                        <input type="text" class="form-control" id="editAccountName" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountStatus" class="form-label entity-label">סטטוס</label>
                                        <select class="form-select" id="editAccountStatus" required>
                                            <option value="open">פתוח</option>
                                            <option value="closed">סגור</option>
                                            <option value="cancelled">מבוטל</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountCurrency" class="form-label entity-label">מטבע</label>
                                        <select class="form-select" id="editAccountCurrency" required>
                                            <option value="1">דולר אמריקאי (USD)</option>
                                            <option value="2">אירו (EUR)</option>
                                            <option value="3">לירה שטרלינג (GBP)</option>
                                            <option value="4">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountBalance" class="form-label entity-label">יתרה נוכחית</label>
                                        <input type="number" class="form-control" id="editAccountBalance" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editAccountDescription" class="form-label entity-label">תיאור החשבון</label>
                                        <textarea class="form-control" id="editAccountDescription" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-footer-end">
                        <button type="button" class="btn btn-entity btn-entity-account" onclick="updateAccount()">עדכן חשבון</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="scripts/global-favicon.js?v=20250112"></script>

    <script src="scripts/translation-utils.js?v=20250112"></script>

    <script src="scripts/services/data-collection-service.js?v=1.0.0"></script>

    <script src="scripts/services/crud-response-handler.js?v=2.0.0"></script>
    <script src="scripts/services/statistics-calculator.js?v=1.0.0"></script>

    <script src="scripts/trading_accounts.js?v=20250112opt2"></script>
