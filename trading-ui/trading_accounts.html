<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set by global-favicon.js -->
    <title>חשבונות מסחר - TikTrack</title>
    
    <!-- 
    ===== CORRECTED TRADING_ACCOUNTS PAGE =====
    
    This page has been corrected to follow the proper architecture:
    1. Single HTML tag (removed duplicate)
    2. Complete ITCSS implementation
    3. All base package systems included
    4. Correct loading order
    5. Scripts moved to body
    
    ======================================
    -->
    
    <!-- TikTrack ITCSS Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_system-management.css?v=1.0.0">
    <link rel="stylesheet" href="styles-new/06-components/_chart-management.css?v=1.0.0">
    
    
    <!-- 08-themes - Themes -->
    <link rel="stylesheet" href="styles-new/08-themes/_light.css?v=1.0.0">
    
    <!-- 09-utilities - Utility Classes -->
    <link rel="stylesheet" href="styles-new/09-utilities/_utilities.css?v=1.0.0">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Header Styles - Separate CSS file (Exception to unified CSS system) -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=1.0.0">
</head>

<body class="trading-accounts-page">
    <!-- Header System - Created automatically by header-system.js -->
    <div id="unified-header"></div>
    
    <!-- Page Content -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- Trading Accounts area - top-Section -->
            <div class="top-section" data-section="top">
                <!-- Main header -->
                <div class="section-header">
                    <div class="table-title">
                        <img src="images/icons/trading_accounts.svg" alt="חשבונות מסחר" class="section-icon" style="width: 28px; height: 28px;">
                        חשבונות מסחר
                    </div>
                    <div class="table-actions">
                        <button data-button-type="COPY" data-variant="full" data-onclick="copyDetailedLog()" data-text="העתק לוג מפורט" title="העתק לוג מפורט"></button>
                        <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('top')" data-text="הצג/הסתר"></button>
                    </div>
                </div>

                <!-- Alert cards -->
                <div class="section-body">
                    <active-alerts></active-alerts>

                    <!-- Data summary -->
                    <div class="info-summary" id="summaryStats">
                        <div>סה"כ חשבונות: <strong id="totalAccounts">0</strong></div>
                        <div>חשבונות פעילים: <strong id="activeAccounts">0</strong></div>
                        <div>חשבונות פתוחים: <strong id="openAccounts">0</strong></div>
                        <div>סה"כ יתרה: <strong id="totalBalance">$0</strong></div>
                    </div>
                </div>
            </div> <!-- End top-section -->

            <!-- Main content -->
            <div class="main-content">
                <!-- Accounts management area - content-section -->
                <div class="content-section" id="main">
                    <!-- Accounts header -->
                    <div class="section-header">
                        <div class="table-title">
                            <img src="images/icons/trading_accounts.svg" alt="ניהול חשבונות מסחר" class="section-icon" style="width: 28px; height: 28px;">
                            ניהול חשבונות מסחר
                        </div>
                        <div class="table-count" id="accountsCount">טוען...</div>
                        <div class="table-actions">
                            <button data-button-type="ADD" data-entity-type="account" data-variant="full" data-onclick="showAddTradingAccountModal()" data-text="הוסף חשבון" title="הוסף חשבון חדש"></button>
                            <button data-button-type="TOGGLE" data-variant="small" data-onclick="toggleSection('main')" data-text="הצג/הסתר"></button>
                        </div>
                    </div>

                    <!-- Accounts table -->
                    <div class="section-body">
                        <div class="table-responsive" id="accountsContainer">
                            <table class="table" id="accountsTable" data-table-type="accounts">
                                <thead>
                                    <tr>
                                        <th class="col-name">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(0); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">שם החשבון <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-type">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(1); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">סוג <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-currency">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(2); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">מטבע <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-balance">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(3); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">יתרה <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-status">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(4); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">סטטוס <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-created">
                                            <button class="btn btn-link sortable-header" onclick="if (typeof window.sortTable === 'function') { window.sortTable(5); }" style="border: none; background: none; padding: 0; margin: 0; width: 100%; text-align: center; color: inherit; text-decoration: none;">נוצר ב <span class="sort-icon">↕</span></button>
                                        </th>
                                        <th class="col-actions actions-cell actions-3-btn">
                                            פעולות
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="7" class="loading">טוען חשבונות...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom page spacing -->
        <div style="height: 3rem;"></div>

        <!-- Notification system -->
        <div class="notification-container" id="notificationContainer"></div>

        <!-- Toast container for notifications -->
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Add Account Modal -->
        <div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored d-flex justify-content-between align-items-center">
                        <h5 class="modal-title" id="addAccountModalLabel">הוספת חשבון מסחר חדש</h5>
                        <button data-button-type="CLOSE" data-bs-dismiss="modal" data-text="סגור"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addAccountForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountName" class="form-label">שם החשבון</label>
                                        <input type="text" class="form-control" id="accountName" placeholder="שם החשבון" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountType" class="form-label">סוג החשבון</label>
                                        <select class="form-select" id="accountType" required>
                                            <option value="">בחר סוג חשבון</option>
                                            <option value="demo">דמו</option>
                                            <option value="live">חי</option>
                                            <option value="paper">נייר</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="accountCurrency" required>
                                            <option value="">בחר מטבע</option>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="accountBalance" class="form-label">יתרה התחלתית</label>
                                        <input type="number" class="form-control" id="accountBalance" step="0.01" min="0" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="accountDescription" class="form-label">תיאור החשבון</label>
                                        <textarea class="form-control" id="accountDescription" rows="3" placeholder="תיאור החשבון..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer d-flex justify-content-end">
                        <button data-button-type="CANCEL" data-bs-dismiss="modal" data-text="ביטול"></button>
                        <button data-button-type="SAVE" data-onclick="addAccount()" data-text="שמור"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Account Modal -->
        <div class="modal fade" id="editAccountModal" tabindex="-1" aria-labelledby="editAccountModalLabel" aria-hidden="true"
            data-bs-backdrop="true" data-bs-keyboard="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header modal-header-colored d-flex justify-content-between align-items-center">
                        <h5 class="modal-title" id="editAccountModalLabel">עריכת חשבון מסחר</h5>
                        <button data-button-type="CLOSE" data-bs-dismiss="modal" data-text="סגור"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editAccountForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountName" class="form-label">שם החשבון</label>
                                        <input type="text" class="form-control" id="editAccountName" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountType" class="form-label">סוג החשבון</label>
                                        <select class="form-select" id="editAccountType" required>
                                            <option value="demo">דמו</option>
                                            <option value="live">חי</option>
                                            <option value="paper">נייר</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountCurrency" class="form-label">מטבע</label>
                                        <select class="form-select" id="editAccountCurrency" required>
                                            <option value="USD">דולר אמריקאי (USD)</option>
                                            <option value="EUR">אירו (EUR)</option>
                                            <option value="GBP">לירה שטרלינג (GBP)</option>
                                            <option value="ILS">שקל ישראלי (ILS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="editAccountBalance" class="form-label">יתרה נוכחית</label>
                                        <input type="number" class="form-control" id="editAccountBalance" step="0.01" min="0" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="editAccountDescription" class="form-label">תיאור החשבון</label>
                                        <textarea class="form-control" id="editAccountDescription" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer d-flex justify-content-end">
                        <button data-button-type="CANCEL" data-bs-dismiss="modal" data-text="ביטול"></button>
                        <button data-button-type="SAVE" data-onclick="updateAccount()" data-text="עדכן"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== BASE PACKAGE SYSTEMS - CORRECT LOADING ORDER ===== -->
    
    <!-- Base Package Scripts -->
    <script src="scripts/global-favicon.js?v=1.0.0"></script>
    <script src="scripts/notification-system.js?v=1.0.0"></script>
    <script src="scripts/ui-utils.js?v=1.0.0"></script>
    <script src="scripts/page-utils.js?v=1.0.0"></script>
    <script src="scripts/translation-utils.js?v=1.0.0"></script>
    <script src="scripts/button-icons.js?v=1.0.0"></script>
    <script src="scripts/button-system-init.js?v=1.0.0"></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0"></script>
    <script src="scripts/cache-sync-manager.js?v=1.0.0"></script>
    <script src="scripts/header-system.js?v=v6.0.0"></script>
    
    <!-- CRUD Package Scripts -->
    <script src="scripts/tables.js?v=1.0.0"></script>
    <script src="scripts/data-utils.js?v=1.0.0"></script>
    <script src="scripts/pagination-system.js?v=1.0.0"></script>
    <script src="scripts/modules/actions-menu-system.js?v=1.0.1"></script>
    
    <!-- Preferences System (Required before Services) -->
    <script src="scripts/preferences.js?v=1.0.0"></script>
    <script src="scripts/preferences-core.js?v=1.0.0"></script>
    <script src="scripts/preferences-page.js?v=1.0.0"></script>
    
    <!-- Services Package Scripts -->
    <script src="scripts/services/data-collection-service.js?v=1.0.0"></script>
    <script src="scripts/services/field-renderer-service.js?v=1.0.0"></script>
    <script src="scripts/services/select-populator-service.js?v=1.0.0"></script>
    <script src="scripts/services/crud-response-handler.js?v=1.0.0"></script>
    <script src="scripts/services/default-value-setter.js?v=1.0.0"></script>
    <script src="scripts/services/statistics-calculator.js?v=1.0.0"></script>
    
    <!-- Page Configs and Initializer -->
    <script src="scripts/init-system/package-manifest.js?v=1.0.0"></script>
    <!-- Page Configs and Initializer -->
    <script src="scripts/page-initialization-configs.js?v=1.0.0"></script>
    <script src="scripts/unified-app-initializer.js?v=1.0.0"></script>
    <!-- Page-specific Scripts -->
    <script src="scripts/trading_accounts.js?v=1.0.0"></script>
    <script>
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
    </script>
</body>
</html>
