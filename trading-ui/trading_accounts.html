    <!-- Local copyDetailedLog function for trading_accounts page -->
    <script>
        /**
         * Copy detailed log function for trading accounts page
         * Copies comprehensive diagnostic information to clipboard
         */
        function copyDetailedLog() {
            try {
                // Create comprehensive diagnostic log
                let logContent = `=== דוח אבחון מפורט - חשבונות מסחר ===\n`;
                logContent += `תאריך: ${new Date().toLocaleString('he-IL')}\n`;
                logContent += `URL: ${window.location.href}\n\n`;
                
                // === 1. Controller State ===
                logContent += `=== 1. מצב Controller ===\n`;
                if (window.tradingAccountsController) {
                    const ctrl = window.tradingAccountsController;
                    logContent += `✅ Controller exists\n`;
                    logContent += `   - initialized: ${ctrl.initialized}\n`;
                    logContent += `   - isLoading: ${ctrl.isLoading}\n`;
                    logContent += `   - data length: ${ctrl.data ? ctrl.data.length : 'undefined'}\n`;
                    logContent += `   - data: ${JSON.stringify(ctrl.data, null, 2)}\n`;
                } else {
                    logContent += `❌ Controller not found (window.tradingAccountsController)\n`;
                }
                logContent += `\n`;
                
                // === 2. Global Data Variables ===
                logContent += `=== 2. משתני נתונים גלובליים ===\n`;
                logContent += `   - window.trading_accountsData: ${window.trading_accountsData ? window.trading_accountsData.length + ' items' : 'undefined'}\n`;
                logContent += `   - window.tradingAccountsData: ${window.tradingAccountsData ? window.tradingAccountsData.length + ' items' : 'undefined'}\n`;
                logContent += `   - window.tradingAccountsDataLoaded: ${window.tradingAccountsDataLoaded}\n`;
                logContent += `   - window.tradingAccountsInitialized: ${window.tradingAccountsInitialized}\n`;
                logContent += `\n`;
                
                // === 3. DOM Elements ===
                logContent += `=== 3. אלמנטי DOM ===\n`;
                const table = document.querySelector('#accountsTable');
                const tbody = document.querySelector('#accountsTableBody');
                const rows = tbody ? tbody.querySelectorAll('tr') : [];
                logContent += `   - Table exists: ${table ? '✅ Yes' : '❌ No'}\n`;
                logContent += `   - Tbody exists: ${tbody ? '✅ Yes (#accountsTableBody)' : '❌ No'}\n`;
                logContent += `   - Rows in tbody: ${rows.length}\n`;
                if (rows.length > 0) {
                    logContent += `   - First row content: ${rows[0].innerHTML.substring(0, 100)}...\n`;
                }
                logContent += `\n`;
                
                // === 4. Functions Available ===
                logContent += `=== 4. פונקציות זמינות ===\n`;
                logContent += `   - window.getAccounts: ${typeof window.getAccounts}\n`;
                logContent += `   - window.TradingAccountsController: ${typeof window.TradingAccountsController}\n`;
                logContent += `   - window.updateTradingAccountsStatistics: ${typeof window.updateTradingAccountsStatistics}\n`;
                logContent += `   - window.setupTradingAccountsHandlers: ${typeof window.setupTradingAccountsHandlers}\n`;
                logContent += `\n`;
                
                // === 5. Cache System ===
                logContent += `=== 5. מערכת מטמון ===\n`;
                logContent += `   - UnifiedCacheManager: ${window.UnifiedCacheManager ? '✅ Available' : '❌ Not found'}\n`;
                if (window.UnifiedCacheManager) {
                    logContent += `   - Initialized: ${window.UnifiedCacheManager.isInitialized ? window.UnifiedCacheManager.isInitialized() : 'unknown'}\n`;
                }
                logContent += `\n`;
                
                // === 6. Actual Data from getAccounts ===
                logContent += `=== 6. נתונים מ-getAccounts() ===\n`;
                if (typeof window.getAccounts === 'function') {
                    window.getAccounts().then(accounts => {
                        logContent += `   - Returned ${accounts ? accounts.length : 0} accounts\n`;
                        if (accounts && accounts.length > 0) {
                            logContent += `   - First account: ${JSON.stringify(accounts[0], null, 2)}\n`;
                        }
                        logContent += `\n`;
                        
                        // === 7. API Response ===
                        logContent += `=== 7. תגובת API ===\n`;
                        fetch('/api/trading-accounts/')
                            .then(r => r.json())
                            .then(apiData => {
                                logContent += `   - API returned: ${JSON.stringify(apiData, null, 2)}\n`;
                                logContent += `\n`;
                                
                                // Copy final log to clipboard
                                navigator.clipboard.writeText(logContent).then(() => {
                                    if (typeof window.showSuccessNotification === 'function') {
                                        window.showSuccessNotification('דוח אבחון הועתק ללוח', 'הדוח כולל מידע מפורט על מצב העמוד');
                                    } else {
                                        alert('דוח אבחון הועתק ללוח!');
                                    }
                                }).catch(err => {
                                    console.error('שגיאה בהעתקה:', err);
                                    console.log(logContent); // Print to console as fallback
                                });
                            })
                            .catch(apiError => {
                                logContent += `   - API Error: ${apiError.message}\n`;
                                logContent += `\n`;
                                
                                // Copy log even if API fails
                                navigator.clipboard.writeText(logContent).then(() => {
                                    if (typeof window.showSuccessNotification === 'function') {
                                        window.showSuccessNotification('דוח אבחון הועתק ללוח', 'הדוח כולל מידע מפורט על מצב העמוד (שגיאת API)');
                                    } else {
                                        alert('דוח אבחון הועתק ללוח (עם שגיאת API)!');
                                    }
                                }).catch(err => {
                                    console.error('שגיאה בהעתקה:', err);
                                    console.log(logContent);
                                });
                            });
                    }).catch(getAccountsError => {
                        logContent += `   - getAccounts Error: ${getAccountsError.message}\n`;
                        logContent += `\n`;
                        
                        // Copy log even if getAccounts fails
                        navigator.clipboard.writeText(logContent).then(() => {
                            if (typeof window.showSuccessNotification === 'function') {
                                window.showSuccessNotification('דוח אבחון הועתק ללוח', 'הדוח כולל מידע מפורט על מצב העמוד (שגיאת getAccounts)');
                            } else {
                                alert('דוח אבחון הועתק ללוח (עם שגיאה)!');
                            }
                        }).catch(err => {
                            console.error('שגיאה בהעתקה:', err);
                            console.log(logContent);
                        });
                    });
                } else {
                    logContent += `   - ❌ getAccounts function not available\n`;
                    logContent += `\n`;
                    
                    // Copy log if getAccounts not available
                    navigator.clipboard.writeText(logContent).then(() => {
                        if (typeof window.showSuccessNotification === 'function') {
                            window.showSuccessNotification('דוח אבחון הועתק ללוח', 'הדוח כולל מידע מפורט על מצב העמוד');
                        } else {
                            alert('דוח אבחון הועתק ללוח!');
                        }
                    }).catch(err => {
                        console.error('שגיאה בהעתקה:', err);
                        console.log(logContent);
                    });
                }
                
            } catch (error) {
                console.error('שגיאה ב-copyDetailedLog:', error);
                if (typeof window.showErrorNotification === 'function') {
                    window.showErrorNotification('שגיאה ביצירת הדוח', error.message);
                } else {
                    alert('שגיאה ביצירת הדוח: ' + error.message);
                }
            }
        }
        
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
        
        // טעינת נתונים אחרי שהדף נטען - מעודכן למערכת מאוחדת
        // הוסר DOMContentLoaded listener כדי למנוע כפילות עם core-systems.js
        // הטעינה מתבצעת דרך trading_accounts.js
    </script>
</body>
</html>
