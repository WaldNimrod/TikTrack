    <!-- Local copyDetailedLog function for trading_accounts page -->
    <script>
        /**
         * Copy detailed log function for trading accounts page
         * Copies comprehensive account information to clipboard
         */
        function copyDetailedLog() {
            try {
                // Get all account data
                const accounts = window.trading_accountsData || [];
                const currencies = window.currenciesData || [];
                
                // Create detailed log content
                let logContent = `=== דוח מפורט - חשבונות מסחר ===\n`;
                logContent += `תאריך: ${new Date().toLocaleString('he-IL')}\n`;
                logContent += `סה"כ חשבונות מסחר: ${accounts.length}\n\n`;
                
                // Add account details
                accounts.forEach((account, index) => {
                    logContent += `--- חשבון ${index + 1} ---\n`;
                    logContent += `שם: ${account.name || 'לא זמין'}\n`;
                    logContent += `סוג: ${account.type || 'לא זמין'}\n`;
                    logContent += `מטבע: ${account.currency_symbol || account.currency_id || 'לא זמין'}\n`;
                    logContent += `יתרה: ${account.balance || '0'}\n`;
                    logContent += `סטטוס: ${account.status || 'לא זמין'}\n`;
                    logContent += `נוצר: ${account.created_at || 'לא זמין'}\n`;
                    if (account.description) {
                        logContent += `תיאור: ${account.description}\n`;
                    }
                    logContent += `\n`;
                });
                
                // Add currency information
                if (currencies.length > 0) {
                    logContent += `=== מטבעות זמינים ===\n`;
                    currencies.forEach(currency => {
                        logContent += `${currency.symbol}: ${currency.name} (שער: ${currency.usd_rate})\n`;
                    });
                }
                
                // Copy to clipboard
                navigator.clipboard.writeText(logContent).then(() => {
                    if (typeof showSuccessNotification === 'function') {
                        showSuccessNotification('דוח מפורט הועתק ללוח', 'הדוח כולל את כל פרטי החשבונות המסחר והמטבעות');
                    } else {
                        alert('דוח מפורט הועתק ללוח!');
                    }
                }).catch(err => {
                    console.error('שגיאה בהעתקה:', err);
                    if (typeof showErrorNotification === 'function') {
                        showErrorNotification('שגיאה בהעתקה', 'לא ניתן להעתיק את הדוח ללוח');
                    } else {
                        alert('שגיאה בהעתקה ללוח');
                    }
                });
                
            } catch (error) {
                console.error('שגיאה ב-copyDetailedLog:', error);
                if (typeof showErrorNotification === 'function') {
                    showErrorNotification('שגיאה ביצירת הדוח', error.message);
                } else {
                    alert('שגיאה ביצירת הדוח: ' + error.message);
                }
            }
        }
        
        // Make the local copyDetailedLog function available globally for this page only
        window.copyDetailedLog = copyDetailedLog;
