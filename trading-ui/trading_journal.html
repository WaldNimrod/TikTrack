<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן מסחר - TikTrack</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">

    <!-- TikTrack Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906" media="print" onload="this.media='all'; this.onload=null;">

    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906" media="print" onload="this.media='all'; this.onload=null;">
</head>

<body class="trading-journal-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <div class="main-content" data-section="trading-journal">

                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h2><img src="/trading-ui/images/icons/tabler/book.svg" width="24" height="24" alt="book" class="icon"> יומן מסחר</h2>
                        <div class="section-header-controls">
                            <button data-button-type="ADD" data-onclick="addJournalEntry()" data-text="הוסף רשומה" title="הוסף רשומת יומן חדשה">
                            </button>
                            <button data-button-type="REFRESH" data-onclick="refreshJournal()" data-text="רענן" title="רענן רשומות">
                            </button>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="content-section" data-section="trading-journal-content">
                        <div class="section-body">
                            <div class="alert alert-info">
                                <h5><i class="fas fa-book"></i> יומן מסחר</h5>
                                <p>תיעוד וניתוח של פעילות המסחר היומית.</p>
                                <p><strong>סטטוס:</strong> <span class="badge bg-success">פעיל</span></p>
                                <p><strong>רשומות ביומן:</strong> <span id="journalCount">0</span></p>
                            </div>

                            <!-- Journal Table -->
                            <div class="table-responsive">
                                <table class="table table-striped" id="tradingJournalTable">
                                    <thead>
                                        <tr>
                                            <th>תאריך</th>
                                            <th>טיקר</th>
                                            <th>פעולה</th>
                                            <th>כמות</th>
                                            <th>מחיר</th>
                                            <th>רווח/הפסד</th>
                                            <th>הערות</th>
                                            <th>פעולות</th>
                                        </tr>
                                    </thead>
                                    <tbody id="journalBody">
                                        <tr>
                                            <td colspan="8" class="text-center text-muted">
                                                <i class="fas fa-book-open"></i> אין רשומות ביומן
                                                <br>
                                                <small>לחץ על "הוסף רשומה" כדי להתחיל לתעד פעילות מסחר</small>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Summary Cards -->
                            <div class="row mt-4">
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-success" id="totalProfit">+₪0.00</h5>
                                            <p class="card-text">רווח כולל</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-danger" id="totalLoss">-₪0.00</h5>
                                            <p class="card-text">הפסד כולל</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-primary" id="winRate">0%</h5>
                                            <p class="card-text">אחוז הצלחה</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-info" id="totalTrades">0</h5>
                                            <p class="card-text">סה״כ עסקאות</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div> <!-- .main-content -->
        </div> <!-- .page-body -->
    </div> <!-- .background-wrapper -->

    <!-- Scripts -->
    <script src="scripts/api-config.js?v=1.0.0" defer></script>
    <script src="scripts/api-fetch-wrapper.js?v=1.0.0" defer></script>
    <script src="scripts/global-favicon.js?v=1.0.0" defer></script>
    <script src="scripts/cache-sync-manager.js?v=1.0.0" defer></script>
    <script src="scripts/error-handlers.js?v=1.0.0" defer></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0" defer></script>
    <script src="scripts/logger-service.js?v=1.0.0" defer></script>
    <script src="scripts/auth.js?v=1.0.0" defer></script>
    <script src="scripts/auth-guard.js?v=1.0.0" defer></script>
    <script src="scripts/header-system.js?v=1.0.0" defer></script>
    <script src="scripts/button-system-init.js?v=1.0.0" defer></script>
    <script src="scripts/icon-system.js?v=1.0.0" defer></script>
    <script src="scripts/notification-system.js?v=1.0.0" defer></script>
    <script src="scripts/core-systems.js?v=1.0.0" defer></script>
    <script src="scripts/modal-manager-v2.js?v=1.0.0" defer></script>
    <script src="scripts/event-handler-manager.js?v=1.0.0" defer></script>
    <script src="scripts/ui-basic.js?v=1.0.0" defer></script>
    <script src="scripts/init-system.js?v=1.0.0" defer></script>

    <!-- Page-specific script -->
    <script>
        // Trading Journal page functionality
        window.journalData = [];

        window.addJournalEntry = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('יומן מסחר', 'הוספת רשומה חדשה תתווסף בקרוב...', 3000);
            }
        };

        window.refreshJournal = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('יומן מסחר', 'מרענן רשומות...', 2000);
            }

            setTimeout(() => {
                updateJournalStats();
                if (window.NotificationSystem) {
                    window.NotificationSystem.showSuccess('יומן מסחר', 'הרשומות עודכנו!', 3000);
                }
            }, 1000);
        };

        function updateJournalStats() {
            const countElement = document.getElementById('journalCount');
            if (countElement) {
                countElement.textContent = window.journalData.length;
            }

            // Update summary cards
            const totalProfit = window.journalData.reduce((sum, entry) => {
                return sum + (entry.profit > 0 ? entry.profit : 0);
            }, 0);

            const totalLoss = window.journalData.reduce((sum, entry) => {
                return sum + (entry.profit < 0 ? Math.abs(entry.profit) : 0);
            }, 0);

            const winningTrades = window.journalData.filter(entry => entry.profit > 0).length;
            const winRate = window.journalData.length > 0 ? Math.round((winningTrades / window.journalData.length) * 100) : 0;

            document.getElementById('totalProfit').textContent = `+₪${totalProfit.toFixed(2)}`;
            document.getElementById('totalLoss').textContent = `-₪${totalLoss.toFixed(2)}`;
            document.getElementById('winRate').textContent = `${winRate}%`;
            document.getElementById('totalTrades').textContent = window.journalData.length;
        }

        // Load journal entries
        async function loadJournalEntries() {
            try {
                // For now, use mock data since API doesn't exist yet
                window.journalData = [
                    {
                        id: 1,
                        date: '2025-12-20',
                        ticker: 'AAPL',
                        action: 'קנייה',
                        quantity: 10,
                        price: 150.25,
                        profit: 225.00,
                        notes: 'רכישה טובה'
                    },
                    {
                        id: 2,
                        date: '2025-12-19',
                        ticker: 'TSLA',
                        action: 'מכירה',
                        quantity: 5,
                        price: 248.50,
                        profit: -150.00,
                        notes: 'מכירה בזמן'
                    }
                ];

                renderJournalTable();
                updateJournalStats();

            } catch (error) {
                console.error('Error loading journal entries:', error);
                if (window.NotificationSystem) {
                    window.NotificationSystem.showError('שגיאה', 'שגיאה בטעינת רשומות היומן');
                }
            }
        }

        function renderJournalTable() {
            const tbody = document.getElementById('journalBody');
            if (!tbody) return;

            tbody.innerHTML = '';

            if (window.journalData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center text-muted">
                            <i class="fas fa-book-open"></i> אין רשומות ביומן
                            <br>
                            <small>לחץ על "הוסף רשומה" כדי להתחיל לתעד פעילות מסחר</small>
                        </td>
                    </tr>
                `;
                return;
            }

            window.journalData.forEach(entry => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${entry.date}</td>
                    <td>${entry.ticker}</td>
                    <td>${entry.action}</td>
                    <td>${entry.quantity}</td>
                    <td>₪${entry.price.toFixed(2)}</td>
                    <td class="${entry.profit >= 0 ? 'text-success' : 'text-danger'}">
                        ${entry.profit >= 0 ? '+' : ''}₪${entry.profit.toFixed(2)}
                    </td>
                    <td>${entry.notes}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editJournalEntry(${entry.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteJournalEntry(${entry.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        window.editJournalEntry = function(id) {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('יומן מסחר', 'עריכת רשומה תתווסף בקרוב...', 3000);
            }
        };

        window.deleteJournalEntry = function(id) {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('יומן מסחר', 'מחיקת רשומה תתווסף בקרוב...', 3000);
            }
        };

        // Auto-initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎯 Trading Journal page loaded');
            loadJournalEntries();
        });
    </script>
</body>
</html>
