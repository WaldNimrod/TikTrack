                            <!-- View Mode Toggle -->
                            <div class="btn-group me-2" role="group" aria-label="View mode">
                                <button type="button" class="btn btn-outline-primary btn-sm" id="viewModeWeeklyBtn" onclick="window.tradingJournalPage?.switchViewMode('weekly')" title="תצוגה שבועית">
                                    <i class="fas fa-calendar-week"></i> שבועי
                                </button>
                                <button type="button" class="btn btn-outline-primary btn-sm active" id="viewModeMonthlyBtn" onclick="window.tradingJournalPage?.switchViewMode('monthly')" title="תצוגה חודשית">
                                    <i class="fas fa-calendar-alt"></i> חודשי
                                </button>
                            </div>

                            <!-- Notes CRUD Buttons -->
                            <div class="btn-group me-2" role="group" aria-label="Notes CRUD">
                                <button data-button-type="ADD" data-onclick="addJournalEntry('note')" data-text="הוסף הערה" title="הוסף הערה חדשה ליומן">
                                </button>
                                <button data-button-type="EDIT" data-onclick="editSelectedNote()" data-text="ערוך הערה" title="ערוך הערה נבחרת" disabled id="editNoteBtn">
                                </button>
                                <button data-button-type="DELETE" data-onclick="deleteSelectedNote()" data-text="מחק הערה" title="מחק הערה נבחרת" disabled id="deleteNoteBtn">
                                </button>
                            </div>

                            <button data-button-type="ADD" data-onclick="addJournalEntry()" data-text="הוסף רשומה" title="הוסף רשומת יומן חדשה">
                            </button>
                            <button data-button-type="REFRESH" data-onclick="refreshJournal()" data-text="רענן" title="רענן רשומות">
                            </button>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="content-section" data-section="trading-journal-content">
                        <div class="section-body">
                            <div class="alert alert-info">
                                <h5><i class="fas fa-book"></i> יומן מסחר</h5>
                                <p>תיעוד וניתוח של פעילות המסחר היומית.</p>
                                <p><strong>סטטוס:</strong> <span class="badge bg-success">פעיל</span></p>
                                <p><strong>רשומות ביומן:</strong> <span id="journalCount">0</span></p>
                            </div>

                            <!-- Journal Table -->
                            <div class="table-responsive">
                                <table class="table table-striped" id="tradingJournalTable">
                                    <thead>
                                        <tr>
                                            <th>תאריך</th>
                                            <th>טיקר</th>
                                            <th>פעולה</th>
                                            <th>כמות</th>
                                            <th>מחיר</th>
                                            <th>רווח/הפסד</th>
                                            <th>הערות</th>
                                            <th>פעולות</th>
                                        </tr>
                                    </thead>
                                    <tbody id="journalBody">
                                        <tr>
                                            <td colspan="8" class="text-center text-muted">
                                                <i class="fas fa-book-open"></i> אין רשומות ביומן
                                                <br>
                                                <small>לחץ על "הוסף רשומה" כדי להתחיל לתעד פעילות מסחר</small>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Summary Cards -->
                            <div class="row mt-4">
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-success" id="totalProfit">+₪0.00</h5>
                                            <p class="card-text">רווח כולל</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-danger" id="totalLoss">-₪0.00</h5>
                                            <p class="card-text">הפסד כולל</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-primary" id="winRate">0%</h5>
                                            <p class="card-text">אחוז הצלחה</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title text-info" id="totalTrades">0</h5>
                                            <p class="card-text">סה״כ עסקאות</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
