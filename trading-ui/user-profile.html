                                                                <input type="number" id="smtpPort" class="form-control" placeholder="587" required>
                                                            </div>

                                                                    <label class="form-check-label" for="smtpUseTls">מופעל</label>
                                                                </div>

                                                            </div>

                                                                <label class="form-label" for="smtpPassword">סיסמה (Password)</label>
                                                                <div class="input-group">
                                                                    <input type="password" id="smtpPassword" class="form-control" placeholder="הכנס סיסמה">
                                                                    <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn" title="הצג/הסתר סיסמה">
                                                                        <span id="togglePasswordIcon">👁️</span>
                                                                    </button>
                                                                </div>
                                                                <small class="form-text text-muted">הסיסמה תישמר מוצפנת במסד הנתונים</small>
                                                            </div>

                                                            <!-- From Settings -->
                                                            <div class="col-md-6">
                                                                <label class="form-label" for="smtpFromEmail">כתובת אימייל שולח (From Email)</label>
                                                                <input type="email" id="smtpFromEmail" class="form-control" placeholder="admin@mezoo.co" required>
                                                            </div>
                                                            <div class="col-md-6">
                                                                <label class="form-label" for="smtpFromName">שם שולח (From Name)</label>
                                                                <input type="text" id="smtpFromName" class="form-control" placeholder="TikTrack" required>
                                                            </div>

                                                            <!-- General Settings -->
                                                            <div class="col-md-6">

                                                                <div class="form-check form-switch mt-2">
                                                                    <input class="form-check-input" type="checkbox" id="smtpEnabled" checked>
                                                                    <label class="form-check-label" for="smtpEnabled">מופעל</label>
                                                                </div>
                                                            </div>
                                                            <div class="col-md-6">
                                                                <label class="form-label" for="smtpTestEmail">כתובת אימייל לבדיקה</label>
                                                                <input type="email" id="smtpTestEmail" class="form-control" placeholder="test@example.com">
                                                            </div>

                                                            <div class="col-12">

                                                                        <span id="updateSmtpBtnSpinner" style="display: none;">⏳ מעדכן...</span>

                                                                        <span id="testConnectionBtnSpinner" style="display: none;">⏳ בודק...</span>
                                                                    </button>

                                                            </div>

                                                                    </button>
                                                                </div>
                                                                <small class="form-text text-muted">המפתח יישמר מוצפן במסד הנתונים</small>
                                                                <div id="geminiKeyStatus" class="mt-2" style="display: none;"></div>
                                                            </div>

                                                            <!-- Perplexity API Key -->
                                                            <div class="col-md-6">

                                                                    <button type="button" class="btn btn-sm btn-link p-0 ms-1" data-onclick="window.AIAnalysisManager?.showHelpModal('perplexity')" title="עזרה">
                                                                        <span>❓</span>
                                                                    </button>
                                                                </label>
                                                                <div class="input-group">
                                                                    <input type="password" id="perplexityApiKey" class="form-control" placeholder="הכנס Perplexity API Key">

                                                                        <span id="togglePerplexityKeyIcon">👁️</span>
                                                                    </button>

                                                                <small class="form-text text-muted">המפתח יישמר מוצפן במסד הנתונים</small>
                                                                <div id="perplexityKeyStatus" class="mt-2" style="display: none;"></div>
                                                            </div>

                                                            <!-- Status Display -->
                                                            <div class="col-12">
                                                                <div id="aiAnalysisStatus" class="alert alert-info" style="display: none;">
                                                                    <strong>סטטוס:</strong> <span id="aiAnalysisStatusText"></span>
                                                                </div>
                                                            </div>

                                                            <!-- Action Buttons -->
                                                            <div class="col-12">
