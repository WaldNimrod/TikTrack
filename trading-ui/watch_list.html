<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת מעקב - TikTrack</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=0da3519a_20251102_104906" rel="stylesheet">

    <!-- TikTrack Master Styles -->
    <link rel="stylesheet" href="styles-new/master.css?v=0da3519a_20251102_104906" media="print" onload="this.media='all'; this.onload=null;">

    <!-- Header Styles -->
    <link rel="stylesheet" href="styles-new/header-styles.css?v=0da3519a_20251102_104906" media="print" onload="this.media='all'; this.onload=null;">
</head>

<body class="watch-list-page">
    <!-- 🔒 LOCKED TEMPLATE ZONE 1 - Header & Navigation (DO NOT MODIFY) -->
    <div id="unified-header"></div>
    <!-- 🔒 LOCKED TEMPLATE ZONE 2 - Background Wrapper (DO NOT MODIFY) -->
    <div class="background-wrapper">
        <div class="page-body">
            <!-- 🔒 LOCKED TEMPLATE ZONE 3 - Main Content Container (DO NOT MODIFY) -->
            <div class="main-content" data-section="watch-list">

                <!-- UI Content Section Top Start-->
                <div class="top-section" data-section="top">
                    <div class="section-header">
                        <h2><img src="/trading-ui/images/icons/tabler/eye.svg" width="24" height="24" alt="eye" class="icon"> רשימת מעקב</h2>
                        <div class="section-header-controls">
                            <button data-button-type="ADD" data-onclick="addToWatchList()" data-text="הוסף" title="הוסף טיקר למעקב">
                            </button>
                            <button data-button-type="REFRESH" data-onclick="refreshWatchList()" data-text="רענן" title="רענן נתונים">
                            </button>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="content-section" data-section="watch-list-content">
                        <div class="section-body">
                            <div class="card">
                                <div class="card-body">
                                    <div class="alert alert-info">
                                        <h5><i class="fas fa-eye"></i> רשימת מעקב</h5>
                                        <p>רשימת הטיקרים שברצונך לעקוב אחריהם בזמן אמת.</p>
                                        <p><strong>סטטוס:</strong> <span class="badge bg-success">פעיל</span></p>
                                        <p><strong>טיקרים במעקב:</strong> <span id="watchListCount">0</span></p>
                                    </div>

                                    <!-- Watch List Table -->
                                    <div class="table-responsive">
                                        <table class="table table-striped" id="watchListTable">
                                            <thead>
                                                <tr>
                                                    <th>טיקר</th>
                                                    <th>שם חברה</th>
                                                    <th>מחיר נוכחי</th>
                                                    <th>שינוי יומי</th>
                                                    <th>שינוי %</th>
                                                    <th>פעולות</th>
                                                </tr>
                                            </thead>
                                            <tbody id="watchListBody">
                                                <tr>
                                                    <td colspan="6" class="text-center text-muted">
                                                        <i class="fas fa-eye-slash"></i> אין טיקרים ברשימת המעקב
                                                        <br>
                                                        <small>לחץ על "הוסף" כדי להתחיל לעקוב אחרי טיקרים</small>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div> <!-- .main-content -->
        </div> <!-- .page-body -->
    </div> <!-- .background-wrapper -->

    <!-- Scripts -->
    <script src="scripts/api-config.js?v=1.0.0" defer></script>
    <script src="scripts/api-fetch-wrapper.js?v=1.0.0" defer></script>
    <script src="scripts/global-favicon.js?v=1.0.0" defer></script>
    <script src="scripts/cache-sync-manager.js?v=1.0.0" defer></script>
    <script src="scripts/error-handlers.js?v=1.0.0" defer></script>
    <script src="scripts/unified-cache-manager.js?v=1.0.0" defer></script>
    <script src="scripts/logger-service.js?v=1.0.0" defer></script>
    <script src="scripts/auth.js?v=1.0.0" defer></script>
    <script src="scripts/auth-guard.js?v=1.0.0" defer></script>
    <script src="scripts/header-system.js?v=1.0.0" defer></script>
    <script src="scripts/button-system-init.js?v=1.0.0" defer></script>
    <script src="scripts/icon-system.js?v=1.0.0" defer></script>
    <script src="scripts/notification-system.js?v=1.0.0" defer></script>
    <script src="scripts/core-systems.js?v=1.0.0" defer></script>
    <script src="scripts/modal-manager-v2.js?v=1.0.0" defer></script>
    <script src="scripts/event-handler-manager.js?v=1.0.0" defer></script>
    <script src="scripts/ui-basic.js?v=1.0.0" defer></script>
    <script src="scripts/init-system.js?v=1.0.0" defer></script>

    <!-- Page-specific script -->
    <script>
        // Watch List page functionality
        window.watchListData = [];

        window.addToWatchList = function() {
            // Placeholder for adding ticker to watch list
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('רשימת מעקב', 'פונקציונליות הוספה תתווסף בקרוב...', 3000);
            }
        };

        window.refreshWatchList = function() {
            if (window.NotificationSystem) {
                window.NotificationSystem.showInfo('רשימת מעקב', 'מרענן נתונים...', 2000);
            }

            // Simulate data refresh
            setTimeout(() => {
                updateWatchListCount();
                if (window.NotificationSystem) {
                    window.NotificationSystem.showSuccess('רשימת מעקב', 'הנתונים עודכנו!', 3000);
                }
            }, 1000);
        };

        function updateWatchListCount() {
            const countElement = document.getElementById('watchListCount');
            if (countElement) {
                countElement.textContent = window.watchListData.length;
            }
        }

        // Auto-initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎯 Watch List page loaded');
            updateWatchListCount();
        });
    </script>
  <script src="scripts/color-scheme-system.js></script> <!-- Dynamic color system -->
</body>
</html>
