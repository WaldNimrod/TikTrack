<tt-container>
          
  <!-- ============================================
       CONTAINER 0: סיכום דשבורד נתונים
       DATA_DASHBOARD_SPEC §3.1
       ============================================ -->
  
  <tt-section data-section="data-dashboard-summary">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <img src="/images/icons/entities/home.svg" alt="נתונים" class="index-section__header-icon" width="35" height="35">
        <h1 class="index-section__header-text">דשבורד נתונים</h1>
      </div>
      <div class="index-section__header-actions">
        <button class="index-section__header-toggle-btn js-section-toggle" aria-label="הצג/הסתר">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="index-section__body">
      <tt-section-row>
        <div class="col-12">
          <div class="info-summary" id="dataDashboardSummary">
            <div class="info-summary__row info-summary__row--first">
              <div class="info-summary__content">
                <div>סה"כ שערי חליפין: <strong id="totalRates">0</strong></div>
                <div>סטטוס עדכון: <strong id="ratesStaleness">—</strong></div>
              </div>
            </div>
          </div>
        </div>
      </tt-section-row>
    </div>
  </tt-section>

  <!-- ============================================
       CONTAINER 1: טבלה 1 — רשימת שערי חליפין
       DATA_DASHBOARD_SPEC §3.2 | מקור: GET /reference/exchange-rates
       ============================================ -->
  
  <tt-section data-section="exchange-rates-table">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <h2 class="index-section__header-text">שערי חליפין</h2>
      </div>
      <div class="index-section__header-meta">
        <span class="index-section__header-count" id="exchangeRatesCount">0 שערים</span>
      </div>
      <div class="index-section__header-actions">
        <button class="index-section__header-action-btn js-refresh-rates" aria-label="רענן שערים" title="רענן נתונים">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 0 0 -9 -9a9 9 0 0 0 -9 9a9 9 0 0 0 9 9"></path>
            <path d="M8 16l-4 -4l4 -4"></path>
            <path d="M16 8l4 4l-4 4"></path>
          </svg>
        </button>
        <button class="index-section__header-toggle-btn js-section-toggle" aria-label="הצג/הסתר">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="index-section__body">
      <tt-section-row>
        <div class="col-12">
          <div class="phoenix-table-wrapper">
            <table id="exchangeRatesTable" class="phoenix-table" role="table" aria-label="שערי חליפין">
              <thead class="phoenix-table__head" role="rowgroup">
                <tr class="phoenix-table__row" role="row">
                  <th class="phoenix-table__header col-pair">זוג מטבעות</th>
                  <th class="phoenix-table__header col-rate phoenix-table__header--numeric">שער עדכני</th>
                  <th class="phoenix-table__header col-time">זמן עדכון אחרון</th>
                </tr>
              </thead>
              <tbody class="phoenix-table__body" role="rowgroup" id="exchangeRatesTableBody">
              </tbody>
            </table>
          </div>
        </div>
      </tt-section-row>
    </div>
  </tt-section>

  <!-- ============================================
       CONTAINER 2: טבלה 2 — היסטוריה של שער נבחר
       DATA_DASHBOARD_SPEC §3.3 | דרופדאון + טבלה (placeholder עד API היסטוריה)
       ============================================ -->
  
  <tt-section data-section="exchange-rates-history">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <h2 class="index-section__header-text">היסטוריית שער נבחר</h2>
      </div>
      <div class="index-section__header-meta">
        <label for="historyRateSelect" class="sr-only">בחר זוג מטבעות</label>
        <select id="historyRateSelect" class="index-section__header-filter-select js-history-rate-select" aria-label="בחר זוג מטבעות">
          <option value="">— בחר שער —</option>
        </select>
      </div>
      <div class="index-section__header-actions">
        <button class="index-section__header-toggle-btn js-section-toggle" aria-label="הצג/הסתר">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="index-section__body">
      <tt-section-row>
        <div class="col-12">
          <div class="phoenix-table-wrapper">
            <table id="historyTable" class="phoenix-table" role="table" aria-label="היסטוריית שער">
              <thead class="phoenix-table__head" role="rowgroup">
                <tr class="phoenix-table__row" role="row">
                  <th class="phoenix-table__header col-datetime">תאריך/שעה</th>
                  <th class="phoenix-table__header col-rate phoenix-table__header--numeric">שער</th>
                </tr>
              </thead>
              <tbody class="phoenix-table__body" role="rowgroup" id="historyTableBody">
              </tbody>
            </table>
          </div>
          <p class="data-dashboard-history-note" id="historyNote">היסטוריה מלאה תתווסף כשניישם API היסטוריה. כרגע מוצגת השורה הנוכחית בלבד.</p>
        </div>
      </tt-section-row>
    </div>
  </tt-section>

</tt-container>
