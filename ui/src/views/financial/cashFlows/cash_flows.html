<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>יומן תזרים מזומנים - TikTrack</title>
    <link rel="stylesheet" href="./D15_IDENTITY_STYLES.css">
</head>
<body>
  <!-- Auth Guard: Check authentication before loading page -->
  <script src="/src/components/core/authGuard.js"></script>
  
  <!-- Header will be loaded dynamically via headerLoader.js -->
  <!-- IMPORTANT: Load phoenixFilterBridge.js BEFORE headerLoader.js -->
  <script src="../../components/core/phoenixFilterBridge.js"></script>
  <script src="../../components/core/headerLoader.js"></script>

  <!-- Page Content -->
  <div class="page-wrapper">
    <div class="page-container">
      <main>
        <tt-container>
          <tt-section>
            <div class="index-section__header">
              <h2 class="index-section__header-title">יומן תנועות מזומנים (הפקדות/משיכות):</h2>
            </div>
            <div class="filter-bar-inline">
              <label>טווח תאריכים:</label>
              <input type="date"> עד <input type="date">
            </div>
            <div class="index-section__content">
              <table class="legacy-audit-table">
                <thead>
                  <tr>
                    <th>תאריך פעולה:</th>
                    <th>סוג תנועה:</th>
                    <th>חשבון יעד/מקור:</th>
                    <th>סכום:</th>
                    <th>מטבע:</th>
                    <th>סטטוס:</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>20/01/2026</td>
                    <td class="text-deposit">הפקדה</td>
                    <td>IBKR - Main</td>
                    <td class="amount-pos">5,000.00</td>
                    <td>USD</td>
                    <td><span class="status-verified">מאושר</span></td>
                  </tr>
                  <tr>
                    <td>15/01/2026</td>
                    <td class="text-withdrawal">משיכה</td>
                    <td>IBKR - Main</td>
                    <td class="amount-neg">-1,200.00</td>
                    <td>USD</td>
                    <td><span class="status-verified">מאושר</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </tt-section>
        </tt-container>
      </main>
    </div>
  </div>

<!-- Modular Footer: Loaded dynamically via footerLoader.js -->
<script src="/src/views/shared/footerLoader.js"></script>
</body>
</html>
