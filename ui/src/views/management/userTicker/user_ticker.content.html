<tt-container>
          
  <!-- ============================================
       CONTAINER 0: סיכום מידע — הטיקרים שלי
       ============================================ -->
  
  <tt-section data-section="summary">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <img src="/images/icons/entities/home.svg" alt="הטיקרים שלי" class="index-section__header-icon" width="35" height="35">
        <h1 class="index-section__header-text">הטיקרים שלי</h1>
      </div>
      <div class="index-section__header-actions">
        <button class="index-section__header-toggle-btn js-section-toggle" aria-label="הצג/הסתר">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="index-section__body">
      <tt-section-row>
        <div class="col-12">
          <div class="info-summary" id="summaryStats">
            <div class="info-summary__row info-summary__row--first">
              <div class="info-summary__content">
                <div>סה"כ הטיקרים שלי: <strong id="totalTickers">0</strong></div>
                <div>טיקרים פעילים: <strong id="activeTickers">0</strong></div>
              </div>
            </div>
          </div>
        </div>
      </tt-section-row>
    </div>
  </tt-section>

  <!-- ============================================
       CONTAINER 1: טבלת הטיקרים שלי
       Data: GET /me/tickers
       ============================================ -->
  
  <tt-section data-section="user-tickers-management">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <img src="/images/icons/entities/home.svg" alt="הטיקרים שלי" class="index-section__header-icon" width="35" height="35">
        <h1 class="index-section__header-text">רשימת הטיקרים שלי</h1>
      </div>
      <div class="index-section__header-meta">
        <span class="index-section__header-count" id="tableTickersCount">0 טיקרים</span>
      </div>
      <div class="index-section__header-actions">
        <button class="index-section__header-action-btn js-add-ticker" aria-label="הוסף טיקר" title="הוסף טיקר לרשימה שלי">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
        </button>
        <button class="index-section__header-toggle-btn js-section-toggle" aria-label="הצג/הסתר">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="index-section__body">
      <tt-section-row>
        <div class="col-12">
          
          <div class="phoenix-table-wrapper">
            <table id="userTickersTable" class="phoenix-table js-table" data-table-type="user_ticker" role="table" aria-label="ניהול הטיקרים שלי">
              <thead class="phoenix-table__head" role="rowgroup">
                <tr class="phoenix-table__row" role="row">
                  <th class="phoenix-table__header col-symbol js-table-sort-trigger" data-sortable="true" data-sort-key="symbol" data-sort-type="string" data-column-index="0" role="columnheader" aria-sort="none" tabindex="0">
                    <span class="phoenix-table__header-text">סמל</span>
                    <span class="phoenix-table__sort-indicator js-sort-indicator">
                      <svg class="phoenix-table__sort-icon js-sort-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 9l4 -4l4 4"></path>
                        <path d="M8 15l4 4l4 -4"></path>
                      </svg>
                    </span>
                  </th>
                  <th class="phoenix-table__header col-price phoenix-table__header--numeric js-table-sort-trigger" data-sortable="true" data-sort-key="current_price" data-sort-type="numeric" data-column-index="1" role="columnheader" aria-sort="none" tabindex="0">
                    <span class="phoenix-table__header-text">מחיר אחרון</span>
                    <span class="phoenix-table__sort-indicator js-sort-indicator">
                      <svg class="phoenix-table__sort-icon js-sort-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 9l4 -4l4 4"></path>
                        <path d="M8 15l4 4l4 -4"></path>
                      </svg>
                    </span>
                  </th>
                  <th class="phoenix-table__header col-change phoenix-table__header--numeric js-table-sort-trigger" data-sortable="true" data-sort-key="daily_change_pct" data-sort-type="numeric" data-column-index="2" role="columnheader" aria-sort="none" tabindex="0">
                    <span class="phoenix-table__header-text">שינוי יומי</span>
                    <span class="phoenix-table__sort-indicator js-sort-indicator">
                      <svg class="phoenix-table__sort-icon js-sort-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 9l4 -4l4 4"></path>
                        <path d="M8 15l4 4l4 -4"></path>
                      </svg>
                    </span>
                  </th>
                  <th class="phoenix-table__header col-company js-table-sort-trigger" data-sortable="true" data-sort-key="company_name" data-sort-type="string" data-column-index="3" role="columnheader" aria-sort="none" tabindex="0">
                    <span class="phoenix-table__header-text">שם חברה</span>
                    <span class="phoenix-table__sort-indicator js-sort-indicator">
                      <svg class="phoenix-table__sort-icon js-sort-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 9l4 -4l4 4"></path>
                        <path d="M8 15l4 4l4 -4"></path>
                      </svg>
                    </span>
                  </th>
                  <th class="phoenix-table__header col-type js-table-sort-trigger" data-sortable="true" data-sort-key="ticker_type" data-sort-type="string" data-column-index="4" role="columnheader" aria-sort="none" tabindex="0">
                    <span class="phoenix-table__header-text">סוג</span>
                    <span class="phoenix-table__sort-indicator js-sort-indicator">
                      <svg class="phoenix-table__sort-icon js-sort-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 9l4 -4l4 4"></path>
                        <path d="M8 15l4 4l4 -4"></path>
                      </svg>
                    </span>
                  </th>
                  <th class="phoenix-table__header col-status js-table-sort-trigger" data-sortable="true" data-sort-key="is_active" data-sort-type="boolean" data-column-index="5" role="columnheader" aria-sort="none" tabindex="0">
                    <span class="phoenix-table__header-text">סטטוס</span>
                    <span class="phoenix-table__sort-indicator js-sort-indicator">
                      <svg class="phoenix-table__sort-icon js-sort-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 9l4 -4l4 4"></path>
                        <path d="M8 15l4 4l4 -4"></path>
                      </svg>
                    </span>
                  </th>
                  <th class="phoenix-table__header col-actions" data-sortable="false" role="columnheader">
                    <span class="phoenix-table__header-text sr-only">פעולות</span>
                  </th>
                </tr>
              </thead>
              <tbody class="phoenix-table__body" role="rowgroup" id="userTickersTableBody">
              </tbody>
            </table>
          </div>
          
          <div class="phoenix-table-pagination">
            <div class="phoenix-table-pagination__info">
              <span id="paginationInfo">מציג 0-0 מתוך 0 רשומות</span>
            </div>
            <div class="phoenix-table-pagination__controls">
              <div class="phoenix-table-pagination__page-size">
                <label class="phoenix-table-pagination__page-size-label">שורות לעמוד:</label>
                <select class="phoenix-table-pagination__page-size-select js-table-page-size" data-table-id="userTickersTable">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
              <div class="phoenix-table-pagination__pages" id="paginationControls">
                <button class="phoenix-table-pagination__button" aria-label="עמוד קודם" id="prevPageBtn" disabled>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"></path>
                  </svg>
                </button>
                <div id="pageNumbers"></div>
                <button class="phoenix-table-pagination__button" aria-label="עמוד הבא" id="nextPageBtn" disabled>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          
        </div>
      </tt-section-row>
    </div>
  </tt-section>

</tt-container>
