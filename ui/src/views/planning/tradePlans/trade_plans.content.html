<tt-container>
  <!-- CONTAINER 0: סיכום מידע — תוכניות טריידים -->
  <tt-section data-section="summary" data-entity="trade_plan">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <img
          src="/images/icons/entities/trade_plans.svg"
          alt="תוכניות טריידים"
          class="index-section__header-icon"
          width="35"
          height="35"
        />
        <h1 class="index-section__header-text">תוכניות טריידים</h1>
      </div>
      <div class="index-section__header-actions">
        <button
          class="index-section__header-toggle-btn js-section-toggle"
          aria-label="הצג/הסתר"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="index-section__body">
      <tt-section-row
        ><div class="col-12">
          <div class="info-summary" id="summaryStats">
            <div class="info-summary__row info-summary__row--first">
              <div class="info-summary__content">
                <div>סיכום מידע — תוכניות טריידים</div>
              </div>
            </div>
          </div>
        </div></tt-section-row
      >
    </div>
  </tt-section>

  <!-- CONTAINER 1: תוכניות טריידים — ריק -->
  <tt-section data-section="trade-plans-main" data-entity="trade_plan">
    <div class="index-section__header">
      <div class="index-section__header-title">
        <img
          src="/images/icons/entities/trade_plans.svg"
          alt="תוכניות טריידים"
          class="index-section__header-icon"
          width="35"
          height="35"
        />
        <h1 class="index-section__header-text">תוכניות טריידים</h1>
      </div>
      <div class="index-section__header-actions">
        <button
          class="index-section__header-toggle-btn js-section-toggle"
          aria-label="הצג/הסתר"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M6 9l6 6l6 -6"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="index-section__body">
      <tt-section-row
        ><div class="col-12"><!-- תוכן יוגדר בהמשך --></div></tt-section-row
      >
    </div>
  </tt-section>
</tt-container>
